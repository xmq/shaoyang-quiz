<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">正弦信号采样示意</title><desc id="desc">上方为连续正弦信号，中间为足够密集的采样点，下方为采样过稀导致不同信号可能产生相同样值的混叠。</desc>
  <style>.axis{stroke:#98a2b3;stroke-width:1}.sig{stroke:#1565c0;stroke-width:4;fill:none}.stem{stroke:#c62828;stroke-width:2}.dot{fill:#c62828}.bad{stroke:#7f56d9;stroke-width:4;fill:none;stroke-dasharray:7 7}.t{font:18px system-ui,sans-serif;fill:#101828}.s{font:14px system-ui,sans-serif;fill:#475467}</style>
  <rect x="18" y="18" width="924" height="464" rx="18" fill="#fff" stroke="#d0d5dd"/>
  <text x="480" y="48" text-anchor="middle" class="t" font-weight="700">采样定理：带限低通信号应满足 fₛ ≥ 2fᴴ</text>
  <line class="axis" x1="80" y1="155" x2="900" y2="155"/><path class="sig" d="M80 155C120 75 160 75 200 155S280 235 320 155S400 75 440 155S520 235 560 155S640 75 680 155S760 235 800 155S880 75 900 120"/><text x="90" y="95" class="t">连续信号x(t)</text>
  <line class="axis" x1="80" y1="315" x2="900" y2="315"/>
  <g><line class="stem" x1="100" y1="315" x2="100" y2="119"/><circle class="dot" cx="100" cy="119" r="5"/><line class="stem" x1="150" y1="315" x2="150" y2="95"/><circle class="dot" cx="150" cy="95" r="5"/><line class="stem" x1="200" y1="315" x2="200" y2="155"/><circle class="dot" cx="200" cy="155" r="5"/><line class="stem" x1="250" y1="315" x2="250" y2="215"/><circle class="dot" cx="250" cy="215" r="5"/><line class="stem" x1="300" y1="315" x2="300" y2="191"/><circle class="dot" cx="300" cy="191" r="5"/><line class="stem" x1="350" y1="315" x2="350" y2="115"/><circle class="dot" cx="350" cy="115" r="5"/><line class="stem" x1="400" y1="315" x2="400" y2="95"/><circle class="dot" cx="400" cy="95" r="5"/><line class="stem" x1="450" y1="315" x2="450" y2="155"/><circle class="dot" cx="450" cy="155" r="5"/><line class="stem" x1="500" y1="315" x2="500" y2="215"/><circle class="dot" cx="500" cy="215" r="5"/><line class="stem" x1="550" y1="315" x2="550" y2="191"/><circle class="dot" cx="550" cy="191" r="5"/></g>
  <text x="90" y="285" class="t">足够密集：可重建</text>
  <line class="axis" x1="80" y1="430" x2="900" y2="430"/><path class="bad" d="M80 430C180 345 280 345 380 430S580 515 680 430S840 345 900 395"/><g><line class="stem" x1="180" y1="430" x2="180" y2="365"/><circle class="dot" cx="180" cy="365" r="6"/><line class="stem" x1="380" y1="430" x2="380" y2="430"/><circle class="dot" cx="380" cy="430" r="6"/><line class="stem" x1="580" y1="430" x2="580" y2="495"/><circle class="dot" cx="580" cy="495" r="6"/><line class="stem" x1="780" y1="430" x2="780" y2="365"/><circle class="dot" cx="780" cy="365" r="6"/></g><text x="90" y="390" class="t">采样过稀：混叠</text><text x="780" y="470" class="s">实际工程需留滤波器过渡带裕量</text>
</svg>
