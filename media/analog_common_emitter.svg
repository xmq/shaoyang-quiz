<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" role="img" aria-labelledby="title desc">
  <title id="title">分压偏置共射放大电路</title><desc id="desc">输入信号经耦合电容进入基极，R1和R2提供分压偏置，集电极电阻产生输出电压，发射极电阻稳定静态工作点。</desc>
  <defs><marker id="npnArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#344054"/></marker></defs>
  <style>.w{stroke:#344054;stroke-width:4;fill:none;stroke-linecap:round}.r{fill:#fff;stroke:#c62828;stroke-width:4}.c{stroke:#1565c0;stroke-width:4}.t{font:18px system-ui,sans-serif;fill:#101828}.s{font:14px system-ui,sans-serif;fill:#475467}</style>
  <rect x="18" y="18" width="904" height="464" rx="18" fill="#f8fafc" stroke="#d0d5dd"/>
  <line class="w" x1="150" y1="70" x2="750" y2="70"/><text x="770" y="77" class="t">+VCC</text>
  <line class="w" x1="150" y1="430" x2="750" y2="430"/><path class="w" d="M450 430V460M420 460H480"/><text x="495" y="465" class="t">地</text>
  <rect class="r" x="285" y="95" width="55" height="105" rx="5"/><text x="270" y="150" text-anchor="end" class="t">R₁</text>
  <rect class="r" x="285" y="275" width="55" height="105" rx="5"/><text x="270" y="335" text-anchor="end" class="t">R₂</text>
  <line class="w" x1="312" y1="70" x2="312" y2="95"/><line class="w" x1="312" y1="200" x2="312" y2="275"/><line class="w" x1="312" y1="380" x2="312" y2="430"/>
  <line class="w" x1="312" y1="238" x2="440" y2="238"/>
  <line class="w" x1="490" y1="175" x2="490" y2="310"/><line class="w" x1="440" y1="238" x2="490" y2="238"/><line class="w" x1="490" y1="200" x2="560" y2="155"/><line class="w" x1="490" y1="280" x2="560" y2="330"/><line x1="520" y1="302" x2="548" y2="322" stroke="#344054" stroke-width="3" marker-end="url(#npnArrow)"/>
  <text x="470" y="225" class="t">B</text><text x="565" y="150" class="t">C</text><text x="565" y="350" class="t">E</text><text x="515" y="250" class="t">Q</text>
  <rect class="r" x="615" y="90" width="55" height="105" rx="5"/><text x="690" y="150" class="t">Rᶜ</text><line class="w" x1="642" y1="70" x2="642" y2="90"/><line class="w" x1="560" y1="155" x2="642" y2="195"/>
  <rect class="r" x="535" y="345" width="55" height="65" rx="5"/><text x="605" y="382" class="t">Rᴱ</text><line class="w" x1="560" y1="330" x2="562" y2="345"/><line class="w" x1="562" y1="410" x2="562" y2="430"/>
  <line class="c" x1="115" y1="220" x2="115" y2="255"/><line class="c" x1="135" y1="220" x2="135" y2="255"/><line class="w" x1="55" y1="238" x2="115" y2="238"/><line class="w" x1="135" y1="238" x2="312" y2="238"/><text x="55" y="218" class="t">uᵢ</text><text x="125" y="210" text-anchor="middle" class="s">C₁耦合</text>
  <line class="c" x1="745" y1="178" x2="745" y2="213"/><line class="c" x1="765" y1="178" x2="765" y2="213"/><line class="w" x1="642" y1="195" x2="745" y2="195"/><line class="w" x1="765" y1="195" x2="850" y2="195"/><text x="850" y="175" class="t">uₒ</text>
  <text x="150" y="410" class="s">R₁/R₂建立基极直流电位</text><text x="660" y="420" class="s">Rᴱ形成直流负反馈，稳定Q点</text><text x="690" y="250" class="s">输出与输入反相</text>
</svg>
