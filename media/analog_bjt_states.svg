<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">NPN三极管三种工作状态</title><desc id="desc">截止相当于开关断开，放大区集电极电流近似为贝塔倍基极电流，饱和相当于开关闭合。</desc>
  <defs><marker id="npn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#344054"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#d0d5dd;stroke-width:2}.t{font:19px system-ui,sans-serif;fill:#101828}.s{font:15px system-ui,sans-serif;fill:#475467}.pn{stroke:#344054;stroke-width:5;fill:none}.arr{stroke:#344054;stroke-width:3;marker-end:url(#npn)}.off{fill:#98a2b3}.active{fill:#1565c0}.sat{fill:#c62828}</style>
  <rect x="15" y="18" width="290" height="394" rx="18" class="box"/><rect x="335" y="18" width="290" height="394" rx="18" class="box"/><rect x="655" y="18" width="290" height="394" rx="18" class="box"/>
  <circle cx="160" cy="135" r="55" fill="#fff" stroke="#98a2b3" stroke-width="5"/><path class="pn" d="M160 80V190M105 135H160M160 105L215 75M160 165L215 200"/><circle cx="160" cy="135" r="10" class="off"/>
  <line class="arr" x1="182" y1="180" x2="207" y2="197"/><text x="160" y="45" text-anchor="middle" class="t" font-weight="700">截止区</text><text x="160" y="245" text-anchor="middle" class="t">IB≈0，IC≈0</text><text x="160" y="280" text-anchor="middle" class="s">发射结未充分正偏</text><text x="160" y="315" text-anchor="middle" class="s">等效开关断开</text><text x="160" y="355" text-anchor="middle" class="t">不放大</text>
  <circle cx="480" cy="135" r="55" fill="#fff" stroke="#1565c0" stroke-width="5"/><path class="pn" d="M480 80V190M425 135H480M480 105L535 75M480 165L535 200"/><circle cx="480" cy="135" r="10" class="active"/>
  <line class="arr" x1="502" y1="180" x2="527" y2="197"/><text x="480" y="45" text-anchor="middle" class="t" font-weight="700">放大区</text><text x="480" y="245" text-anchor="middle" class="t">IC≈βIB</text><text x="480" y="280" text-anchor="middle" class="s">发射结正偏、集电结反偏</text><text x="480" y="315" text-anchor="middle" class="s">小变化控制较大变化</text><text x="480" y="355" text-anchor="middle" class="t">用于线性放大</text>
  <circle cx="800" cy="135" r="55" fill="#fff" stroke="#c62828" stroke-width="5"/><path class="pn" d="M800 80V190M745 135H800M800 105L855 75M800 165L855 200"/><circle cx="800" cy="135" r="10" class="sat"/>
  <line class="arr" x1="822" y1="180" x2="847" y2="197"/><text x="800" y="45" text-anchor="middle" class="t" font-weight="700">饱和区</text><text x="800" y="245" text-anchor="middle" class="t">UCE≈UCE(sat)</text><text x="800" y="280" text-anchor="middle" class="s">两个PN结都正偏</text><text x="800" y="315" text-anchor="middle" class="s">不能再用IC=βIB</text><text x="800" y="355" text-anchor="middle" class="t">等效开关闭合</text>
</svg>
