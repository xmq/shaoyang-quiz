  <style>.axis{stroke:#344054;stroke-width:3}.curve{stroke:#c62828;stroke-width:5;fill:none}.dash{stroke:#98a2b3;stroke-width:2;stroke-dasharray:7 7}.t{font:18px system-ui,sans-serif;fill:#101828}.s{font:15px system-ui,sans-serif;fill:#475467}</style>
  <rect x="18" y="18" width="864" height="394" rx="18" fill="#fff" stroke="#d0d5dd"/>
