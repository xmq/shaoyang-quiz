<text x="48" y="517" fill="#667085" font-size="16">VB 调试时，数组下标越界会在访问 a(i) 的语句处报错。</text>
<rect x="92" y="115" width="470" height="320" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
<text x="110" y="145" fill="#172033" font-size="17" font-weight="700">VB 代码窗口</text><text x="125" y="185" fill="#1e293b" font-size="23">For i = 1 To 5</text><text x="125" y="233" fill="#1e293b" font-size="23">  a(i) = i * i</text><text x="125" y="281" fill="#1e293b" font-size="23">Next i</text><text x="125" y="329" fill="#1e293b" font-size="23">List1.AddItem Str(a(i))</text><rect x="110" y="304" width="410" height="45" fill="#fee2e2" opacity=".85"/><rect x="605" y="170" width="260" height="190" rx="14" fill="#fff" stroke="#cbd5e1"/>
<text x="623" y="200" fill="#172033" font-size="17" font-weight="700">Microsoft Visual Basic</text><circle cx="645" cy="235" r="19" fill="#dc2626"/><text x="645" y="242" fill="#fff" text-anchor="middle" font-size="22">×</text><text x="680" y="230" fill="#172033" font-size="18">运行时错误“9”：</text><text x="680" y="257" fill="#172033" font-size="18">下标越界</text><rect x="754" y="307" width="74" height="32" rx="5" fill="#2563eb"/><text x="791" y="330" text-anchor="middle" fill="#fff" font-size="15">确定</text></svg>
