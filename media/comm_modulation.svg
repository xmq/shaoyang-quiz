  <line class="axis" x1="110" y1="300" x2="930" y2="300"/><path class="env" d="M110 300C180 220 250 220 320 300S460 380 530 300S670 220 740 300S880 380 930 325M110 300C180 380 250 380 320 300S460 220 530 300S670 380 740 300S880 220 930 275"/>
  <path class="am" d="M110 300 q8-35 16 0 q8 35 16 0 q8-50 16 0 q8 50 16 0 q8-65 16 0 q8 65 16 0 q8-75 16 0 q8 75 16 0 q8-80 16 0 q8 80 16 0 q8-75 16 0 q8 75 16 0 q8-65 16 0 q8 65 16 0 q8-50 16 0 q8 50 16 0 q8-35 16 0 q8 35 16 0 q8-22 16 0 q8 22 16 0 q8-15 16 0 q8 15 16 0 q8-18 16 0 q8 18 16 0 q8-28 16 0 q8 28 16 0 q8-45 16 0 q8 45 16 0 q8-60 16 0 q8 60 16 0 q8-72 16 0 q8 72 16 0 q8-80 16 0 q8 80 16 0 q8-75 16 0 q8 75 16 0 q8-65 16 0 q8 65 16 0 q8-50 16 0 q8 50 16 0 q8-35 16 0 q8 35 16 0 q8-22 16 0 q8 22 16 0 q8-18 16 0 q8 18 16 0 q8-25 16 0 q8 25 16 0 q8-38 16 0 q8 38 16 0"/>
