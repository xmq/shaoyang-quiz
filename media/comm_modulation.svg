  <line class="axis" x1="110" y1="445" x2="930" y2="445"/><path class="fm" d="M110 445q18-38 36 0t36 0t36 0t24 0t24 0t24 0t16 0t16 0t16 0t16 0t16 0t16 0t20 0t20 0t20 0t28 0t28 0t28 0t36 0t36 0t36 0t28 0t28 0t28 0t20 0t20 0t20 0t16 0t16 0t16 0t16 0"/><text x="45" y="452" class="t">FM</text><text x="130" y="410" class="s">幅度不变，瞬时频率随消息变化</text>
</svg>
