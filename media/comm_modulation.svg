<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">基带、AM和FM波形对比</title><desc id="desc">基带消息缓慢变化，AM载波幅度随消息改变，FM载波幅度不变而疏密随消息改变。</desc>
  <style>.axis{stroke:#d0d5dd;stroke-width:1}.msg{stroke:#344054;stroke-width:4;fill:none}.am{stroke:#1565c0;stroke-width:2.5;fill:none}.env{stroke:#98a2b3;stroke-width:2;fill:none;stroke-dasharray:6 6}.fm{stroke:#c62828;stroke-width:3;fill:none}.t{font:18px system-ui,sans-serif;fill:#101828}.s{font:14px system-ui,sans-serif;fill:#475467}</style>
  <rect x="18" y="18" width="944" height="484" rx="18" fill="#fff" stroke="#d0d5dd"/>
  <text x="490" y="45" text-anchor="middle" class="t" font-weight="700">调制：用消息控制高频载波的某个参数</text>
