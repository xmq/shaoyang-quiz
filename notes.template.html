<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#175cd3">
  <title>计算机岗位考试 · 三色笔记</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #fff;
      --text: #182230;
      --muted: #667085;
      --border: #e4e7ec;
      --primary: #175cd3;
      --primary-soft: #eff6ff;
      --red: #b42318;
      --red-soft: #fff2f0;
      --blue: #175cd3;
      --black: #182230;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #eaf2ff 0, var(--bg) 280px);
      color: var(--text);
      font: 16px/1.75 system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    :where(button, input, a):focus-visible {
      outline: 3px solid rgba(23, 92, 211, .38);
      outline-offset: 2px;
    }
    .skip-link {
      position: fixed;
      left: 12px;
      top: -60px;
      z-index: 100;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
    }
    .skip-link:focus { top: 12px; }
    .hidden { display: none !important; }
    .sr-only { position: absolute !important; width: 1px !important; height: 1px !important; padding: 0 !important; margin: -1px !important; overflow: hidden !important; clip: rect(0, 0, 0, 0) !important; white-space: nowrap !important; border: 0 !important; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(228, 231, 236, .82);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(14px);
      padding-top: env(safe-area-inset-top);
    }
    .header-inner {
      width: min(1160px, 100%);
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: auto;
      padding: 8px max(18px, env(safe-area-inset-right)) 8px max(18px, env(safe-area-inset-left));
    }
    .quiz-link {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--primary);
      text-decoration: none;
      font-weight: 650;
    }
    .brand { font-size: 18px; font-weight: 800; letter-spacing: .01em; }
    .brand-sub { color: var(--muted); font-size: 13px; }

    main {
      width: min(1160px, 100%);
      margin: auto;
      padding: 26px max(18px, env(safe-area-inset-right)) max(56px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    }
    .directory-head {
      max-width: 720px;
      margin: 8px 0 22px;
    }
    .directory-head h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 38px); line-height: 1.25; }
    .directory-head p { margin: 0; color: var(--muted); }
    .directory-search { max-width: 560px; margin: 18px 0; }
    .search-box {
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 3px 12px rgba(16, 24, 40, .04);
    }
    .search-box:focus-within { border-color: var(--primary); }
    .search-box input { min-width: 0; flex: 1; border: 0; outline: 0; background: transparent; color: var(--text); }
    .search-box input { min-height: 44px; }
    .search-icon { color: var(--muted); }
    .icon-button {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 20px;
    }
    .icon-button:hover { background: var(--primary-soft); color: var(--primary); }
    .course-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .course-card {
      min-height: 104px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      color: var(--text);
      text-align: left;
      box-shadow: 0 6px 20px rgba(16, 24, 40, .05);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .course-card:hover { transform: translateY(-2px); border-color: #84adff; box-shadow: var(--shadow); }
    .course-icon {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: var(--primary-soft);
      font-size: 24px;
    }
    .course-name { font-size: 17px; font-weight: 750; line-height: 1.45; overflow-wrap: anywhere; }
    .empty-result { margin: 18px 0; padding: 26px; border-radius: 14px; background: #fff; color: var(--muted); text-align: center; }

    .study-toolbar {
      position: sticky;
      top: 59px;
      z-index: 15;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      margin: -10px 0 14px;
      padding: 10px 0;
      background: linear-gradient(180deg, rgba(244, 247, 251, .98), rgba(244, 247, 251, .92));
      backdrop-filter: blur(10px);
      align-items: start;
    }
    .search-area { min-width: 0; }
    .search-area .search-status { margin: 4px 4px 0; }
    .toolbar-actions { display: flex; align-items: flex-start; gap: 8px; }
    .text-button {
      min-height: 46px;
      height: 46px;
      padding: 0 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      white-space: nowrap;
    }
    .text-button:hover { border-color: #84adff; color: var(--primary); }
    .mobile-nav-toggle { display: none; }

    .study-layout { display: grid; grid-template-columns: 238px minmax(0, 1fr); gap: 18px; align-items: start; }
    .chapter-nav {
      position: sticky;
      top: 128px;
      max-height: calc(100vh - 148px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 6px 22px rgba(16, 24, 40, .06);
    }
    .chapter-nav-head {
      position: sticky;
      top: 0;
      z-index: 2;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 8px 7px 14px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      font-weight: 750;
    }
    .chapter-links { padding: 8px; }
    .chapter-link {
      width: 100%;
      min-height: 44px;
      display: -webkit-box;
      margin: 2px 0;
      padding: 9px 10px;
      overflow: hidden;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #475467;
      text-align: left;
      line-height: 1.45;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .chapter-link:hover, .chapter-link.active { background: var(--primary-soft); color: var(--primary); }
    .study.nav-collapsed .study-layout { grid-template-columns: 58px minmax(0, 1fr); }
    .study.nav-collapsed .chapter-nav-head { justify-content: center; padding: 7px; }
    .study.nav-collapsed .chapter-nav-label,
    .study.nav-collapsed .chapter-links { display: none; }

    .note {
      min-width: 0;
      padding: clamp(18px, 3vw, 34px);
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .note:focus { outline: none; }
    .note > h1 { margin: 0 0 14px; font-size: clamp(24px, 3.5vw, 32px); line-height: 1.35; }
    .note p { margin: 0 0 13px; overflow-wrap: anywhere; }
    .note code {
      padding: .1em .36em;
      border-radius: 5px;
      background: #f2f4f7;
      color: #7a271a;
      font: .92em/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .note ul { margin: 0 0 15px; padding-left: 1.35em; }
    .note ol { margin: 0 0 15px; padding-left: 1.6em; }
    .note li { margin: 5px 0; }
    .note blockquote { margin: 14px 0; padding: 10px 14px; border-left: 4px solid #98a2b3; background: #f8fafc; color: #475467; }
    .note pre { max-width: 100%; overflow: auto; margin: 14px 0; padding: 14px; border-radius: 10px; background: #101828; color: #f2f4f7; line-height: 1.65; }
    .note pre code { padding: 0; background: transparent; color: inherit; white-space: pre; }
    .note mark { padding: 0 .08em; border-radius: 3px; background: #fef08a; color: #422006; }
    .red { color: var(--red); font-weight: 750; }
    .blue { color: var(--blue); font-weight: 750; }
    .black { color: var(--black); }
    .chapter-section { margin: 24px 0 10px; scroll-margin-top: 138px; }
    .chapter-heading { margin: 0 0 14px; }
    .chapter-toggle {
      width: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 15px;
      border: 0;
      border-left: 6px solid var(--red);
      border-radius: 10px;
      background: var(--red-soft);
      color: var(--red);
      text-align: left;
      font-size: clamp(18px, 2.5vw, 22px);
      font-weight: 800;
      line-height: 1.45;
    }
    .chapter-chevron { flex: 0 0 auto; transition: transform .16s ease; }
    .chapter-section.collapsed .chapter-chevron { transform: rotate(-90deg); }
    .chapter-section.collapsed .chapter-body { display: none; }
    .point {
      margin: 20px 0 10px;
      padding: 10px 13px;
      border-left: 5px solid var(--blue);
      border-radius: 8px;
      background: var(--primary-soft);
      color: var(--blue);
      font-size: 17px;
      line-height: 1.5;
    }
    .table-wrap { width: 100%; overflow-x: auto; margin: 16px 0; border: 1px solid var(--border); border-radius: 10px; }
    .table-hint { margin: -8px 0 12px !important; color: var(--muted); font-size: 13px; }
    .note table { width: 100%; min-width: 620px; border-collapse: collapse; background: #fff; font-size: 14px; }
    .note th, .note td { padding: 10px 12px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    .note tr:last-child td { border-bottom: 0; }
    .note th:last-child, .note td:last-child { border-right: 0; }
    .note th { background: var(--primary-soft); color: var(--blue); font-weight: 750; }
    .search-status { min-height: 24px; margin: 8px 0 0; color: var(--muted); font-size: 13px; }
    .search-status:empty { display: none; }
    .nav-mask { display: none; }

    @media (max-width: 900px) {
      .course-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .study-layout { grid-template-columns: 210px minmax(0, 1fr); gap: 12px; }
    }

    @media (max-width: 700px) {
      .header-inner { min-height: 54px; padding: 6px max(10px, env(safe-area-inset-right)) 6px max(10px, env(safe-area-inset-left)); }
      .brand-sub { display: none; }
      main { padding: 18px max(10px, env(safe-area-inset-right)) max(42px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); }
      .course-grid { grid-template-columns: 1fr; gap: 10px; }
      .course-card { min-height: 76px; padding: 14px; border-radius: 14px; }
      .course-icon { width: 42px; height: 42px; flex-basis: 42px; }
      .study-toolbar { top: 55px; grid-template-columns: 46px minmax(0, 1fr) auto; gap: 6px; margin-top: -8px; padding: 8px 0; }
      .mobile-nav-toggle { display: inline-flex; }
      .toolbar-actions .text-button { width: 46px; padding: 0; font-size: 0; }
      .toolbar-actions .text-button::before { content: "↩"; font-size: 21px; }
      .study-layout, .study.nav-collapsed .study-layout { display: block; }
      .chapter-nav {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 40;
        width: min(84vw, 330px);
        max-height: none;
        border: 0;
        border-radius: 0;
        transform: translateX(-105%);
        transition: transform .18s ease;
        box-shadow: 10px 0 28px rgba(16, 24, 40, .2);
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .study.mobile-nav-open .chapter-nav { transform: translateX(0); }
      .study.nav-collapsed .chapter-nav-label { display: inline; }
      .study.nav-collapsed .chapter-links { display: block; }
      .nav-mask {
        position: fixed;
        inset: 0;
        z-index: 35;
        display: block;
        opacity: 0;
        pointer-events: none;
        background: rgba(16, 24, 40, .46);
        transition: opacity .18s ease;
      }
      .study.mobile-nav-open .nav-mask { opacity: 1; pointer-events: auto; }
      .note { padding: 18px 13px; border-radius: 14px; }
      .note > h1 { font-size: 23px; }
      .chapter-section { scroll-margin-top: 122px; }
      .chapter-toggle { min-height: 54px; padding: 11px 12px; border-left-width: 5px; font-size: 18px; }
      .point { margin-top: 17px; padding: 9px 10px; font-size: 16px; }
      .note p { line-height: 1.85; }
      .table-wrap { margin-right: -3px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">跳到主要内容</a>
  <header class="site-header">
    <div class="header-inner">
      <a class="quiz-link" href="./" aria-label="返回刷题首页">← 刷题</a>
      <div>
        <div class="brand">计算机岗位考试 · 三色笔记</div>
        <div class="brand-sub">按课程学习，按章节快速定位</div>
      </div>
    </div>
  </header>

  <main id="main">
    <section id="directory" aria-labelledby="directory-title">
      <div class="directory-head">
        <h1 id="directory-title">选择课程</h1>
        <p>每门课程均包含完整知识内容、得分关键词和易错点，点击课程即可开始学习。</p>
      </div>
      <div class="directory-search search-box">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input id="course-search" type="search" aria-label="搜索课程" placeholder="搜索课程名称" autocomplete="off">
        <button class="icon-button hidden" id="course-search-clear" type="button" aria-label="清空课程搜索">×</button>
      </div>
      <div class="course-grid" id="courses"></div>
      <div class="empty-result hidden" id="course-empty">没有找到匹配的课程</div>
      <p class="sr-only" id="course-status" role="status" aria-live="polite"></p>
    </section>

    <section class="study hidden" id="study" aria-label="课程内容">
      <div class="study-toolbar">
        <button class="icon-button mobile-nav-toggle" id="mobile-nav-toggle" type="button" aria-label="打开章节目录" aria-controls="chapter-nav" aria-expanded="false">☰</button>
        <div class="search-area">
          <div class="search-box">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input id="search" type="search" aria-label="搜索当前课程内容" placeholder="搜索当前课程" autocomplete="off">
            <button class="icon-button hidden" id="search-clear" type="button" aria-label="清空内容搜索">×</button>
          </div>
          <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
        </div>
        <div class="toolbar-actions">
          <button class="text-button" id="back" type="button" aria-label="返回选择课程">换课程</button>
        </div>
      </div>

      <div class="study-layout">
        <nav class="chapter-nav" id="chapter-nav" aria-label="章节目录" aria-hidden="false">
          <div class="chapter-nav-head">
            <span class="chapter-nav-label">章节目录</span>
            <button class="icon-button" id="nav-collapse" type="button" aria-label="收起章节目录" aria-expanded="true"><span aria-hidden="true">‹</span></button>
          </div>
          <div class="chapter-links" id="chapter-links"></div>
        </nav>
        <article class="note" id="content" tabindex="-1"></article>
      </div>
      <div class="nav-mask" id="nav-mask" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const items = __COURSE_DATA__;
    const directory = document.getElementById("directory");
    const courses = document.getElementById("courses");
    const courseEmpty = document.getElementById("course-empty");
    const courseStatus = document.getElementById("course-status");
    const courseSearch = document.getElementById("course-search");
    const courseSearchClear = document.getElementById("course-search-clear");
    const study = document.getElementById("study");
    const content = document.getElementById("content");
    const search = document.getElementById("search");
    const searchClear = document.getElementById("search-clear");
    const searchStatus = document.getElementById("search-status");
    const chapterNav = document.getElementById("chapter-nav");
    const chapterLinks = document.getElementById("chapter-links");
    const navCollapse = document.getElementById("nav-collapse");
    const mobileNavToggle = document.getElementById("mobile-nav-toggle");
    const navMask = document.getElementById("nav-mask");
    const studyToolbar = document.querySelector(".study-toolbar");
    const siteHeader = document.querySelector(".site-header");
    const mobileMedia = window.matchMedia("(max-width: 700px)");
    let currentCourse = null;
    let activeObserver = null;
    let collapsedBeforeSearch = null;
    let searchTimer = null;
    let mobileNavReturnFocus = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[char]));
    }

    function formatInline(value) {
      const source = String(value || "");
      let output = escapeHtml(source)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      if (source.startsWith("🔴")) output = `<span class="red">${output}</span>`;
      else if (source.startsWith("🔵")) output = `<span class="blue">${output}</span>`;
      else if (source.startsWith("⚫")) output = `<span class="black">${output}</span>`;
      return output;
    }

    function tableCells(line) {
      let trimmed = line.trim();
      if (trimmed.startsWith("|")) trimmed = trimmed.slice(1);
      if (trimmed.endsWith("|")) trimmed = trimmed.slice(0, -1);
      const cells = [];
      let cell = "";
      for (let index = 0; index < trimmed.length; index += 1) {
        if (trimmed[index] === "\\" && trimmed[index + 1] === "|") {
          cell += "|";
          index += 1;
        } else if (trimmed[index] === "|") {
          cells.push(cell.trim());
          cell = "";
        } else {
          cell += trimmed[index];
        }
      }
      cells.push(cell.trim());
      return cells;
    }

    function isSeparatorRow(cells) {
      return cells.length > 0 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
    }

    function isTableStart(lines, index) {
      if (index + 1 >= lines.length || !lines[index].includes("|") || !lines[index + 1].includes("|")) return false;
      const first = tableCells(lines[index]);
      const second = tableCells(lines[index + 1]);
      return first.length >= 2 && second.length === first.length;
    }

    function renderTable(rows) {
      const parsed = rows.map(tableCells);
      const bodyRows = isSeparatorRow(parsed[1] || []) ? parsed.slice(2) : parsed.slice(1);
      const header = parsed[0];
      return `<div class="table-wrap" tabindex="0" aria-label="可横向滚动的表格"><table><thead><tr>${header.map((cell) => `<th scope="col">${formatInline(cell)}</th>`).join("")}</tr></thead><tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${formatInline(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div><p class="table-hint">↔ 左右滑动查看完整表格</p>`;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.split(/\r?\n/);
      const output = ["<div class=\"preface\">"];
      let index = 0;
      let chapterOpen = false;
      let prefaceOpen = true;
      let listType = null;

      const closeList = () => {
        if (!listType) return;
        output.push(`</${listType}>`);
        listType = null;
      };
      const closePreface = () => {
        if (!prefaceOpen) return;
        closeList();
        output.push("</div>");
        prefaceOpen = false;
      };
      const closeChapter = () => {
        closeList();
        if (!chapterOpen) return;
        output.push("</div></section>");
        chapterOpen = false;
      };

      while (index < lines.length) {
        const trimmed = lines[index].trim();
        if (!trimmed) {
          closeList();
          index += 1;
          continue;
        }
        if (trimmed.startsWith("使用说明")) {
          index += 1;
          continue;
        }
        if (trimmed.startsWith("```")) {
          closeList();
          const language = trimmed.slice(3).trim().replace(/[^a-zA-Z0-9_-]/g, "");
          const code = [];
          index += 1;
          while (index < lines.length && !lines[index].trim().startsWith("```")) {
            code.push(lines[index]);
            index += 1;
          }
          if (index < lines.length) index += 1;
          output.push(`<pre><code${language ? ` class="language-${language}"` : ""}>${escapeHtml(code.join("\n"))}</code></pre>`);
          continue;
        }
        if (isTableStart(lines, index)) {
          closeList();
          const rows = [lines[index]];
          const columnCount = tableCells(lines[index]).length;
          index += 1;
          while (index < lines.length && lines[index].trim() && lines[index].includes("|") && tableCells(lines[index]).length === columnCount) {
            rows.push(lines[index]);
            index += 1;
          }
          output.push(renderTable(rows));
          continue;
        }

        const h1 = trimmed.match(/^#\s+(.+)$/);
        const markdownH2 = trimmed.match(/^##\s+(.+)$/);
        const markdownH3 = trimmed.match(/^###\s+(.+)$/);
        const plainChapter = trimmed.match(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?.*$/);
        const plainPoint = trimmed.match(/^(?:考点|专题|模块)\s*\d+[：:]?.*$/);

        if (markdownH2 || plainChapter) {
          closeChapter();
          closePreface();
          const title = markdownH2 ? markdownH2[1] : plainChapter[0];
          output.push(`<section class="chapter-section"><h2 class="chapter-heading"><button class="chapter-toggle" type="button" aria-expanded="true"><span class="chapter-title">${formatInline(title)}</span><span class="chapter-chevron" aria-hidden="true">▾</span></button></h2><div class="chapter-body">`);
          chapterOpen = true;
        } else if (h1) {
          closeList();
          output.push(`<h1>${formatInline(h1[1])}</h1>`);
        } else if (markdownH3 || plainPoint) {
          closeList();
          const title = markdownH3 ? markdownH3[1] : plainPoint[0];
          output.push(`<h3 class="point">${formatInline(title)}</h3>`);
        } else if (/^>\s?/.test(trimmed)) {
          closeList();
          output.push(`<blockquote>${formatInline(trimmed.replace(/^>\s?/, ""))}</blockquote>`);
        } else if (/^[-*]\s+/.test(trimmed) || /^\d+[.)]\s+/.test(trimmed)) {
          const nextListType = /^\d+[.)]\s+/.test(trimmed) ? "ol" : "ul";
          if (listType !== nextListType) {
            closeList();
            output.push(`<${nextListType}>`);
            listType = nextListType;
          }
          output.push(`<li>${formatInline(trimmed.replace(/^(?:[-*]|\d+[.)])\s+/, ""))}</li>`);
        } else {
          closeList();
          output.push(`<p>${formatInline(trimmed)}</p>`);
        }
        index += 1;
      }
      closePreface();
      closeChapter();
      content.innerHTML = output.join("");
      bindChapters();
    }

    function cleanChapterLabel(label) {
      const cleaned = label.replace(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?\s*/, "").trim();
      return cleaned || label;
    }

    function bindChapters() {
      if (activeObserver) activeObserver.disconnect();
      chapterLinks.innerHTML = "";
      const sections = [...content.querySelectorAll(".chapter-section")];
      sections.forEach((section, index) => {
        section.id = `chapter-${index + 1}`;
        const toggle = section.querySelector(".chapter-toggle");
        const title = section.querySelector(".chapter-title").textContent.trim();
        toggle.setAttribute("aria-controls", `${section.id}-body`);
        section.querySelector(".chapter-body").id = `${section.id}-body`;
        toggle.addEventListener("click", () => {
          const collapsed = section.classList.toggle("collapsed");
          toggle.setAttribute("aria-expanded", String(!collapsed));
        });

        const link = document.createElement("button");
        link.type = "button";
        link.className = "chapter-link";
        link.textContent = cleanChapterLabel(title);
        link.addEventListener("click", () => {
          section.classList.remove("collapsed");
          toggle.setAttribute("aria-expanded", "true");
          section.scrollIntoView({behavior: "smooth", block: "start"});
          if (mobileMedia.matches) {
            closeMobileNav({restoreFocus: false});
            toggle.focus({preventScroll: true});
          }
        });
        chapterLinks.appendChild(link);
      });

      chapterNav.classList.toggle("hidden", sections.length === 0);
      mobileNavToggle.classList.toggle("hidden", sections.length === 0);
      if (!sections.length) return;
      activeObserver = new IntersectionObserver((entries) => {
        const visible = entries.filter((entry) => entry.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
        if (!visible) return;
        const index = sections.indexOf(visible.target);
        chapterLinks.querySelectorAll(".chapter-link").forEach((link, linkIndex) => {
          const active = linkIndex === index;
          link.classList.toggle("active", active);
          if (active) link.setAttribute("aria-current", "location");
          else link.removeAttribute("aria-current");
        });
      }, {rootMargin: "-135px 0px -62% 0px", threshold: 0});
      sections.forEach((section) => activeObserver.observe(section));
    }

    function openCourse(course) {
      currentCourse = course;
      collapsedBeforeSearch = null;
      renderMarkdown(course.text);
      directory.classList.add("hidden");
      study.classList.remove("hidden");
      search.value = "";
      searchClear.classList.add("hidden");
      searchStatus.textContent = "";
      window.scrollTo({top: 0, behavior: "auto"});
      content.focus({preventScroll: true});
    }

    function showDirectory() {
      closeMobileNav();
      currentCourse = null;
      collapsedBeforeSearch = null;
      study.classList.add("hidden");
      directory.classList.remove("hidden");
      search.value = "";
      searchStatus.textContent = "";
      window.scrollTo({top: 0, behavior: "auto"});
      const title = document.getElementById("directory-title");
      title.setAttribute("tabindex", "-1");
      title.focus({preventScroll: true});
    }

    function courseHash(course) {
      return `#course=${encodeURIComponent(course.name)}`;
    }

    function navigateToCourse(course) {
      const target = courseHash(course);
      if (location.hash === target) {
        openCourse(course);
        return;
      }
      history.pushState({shaoyangCourse: true}, "", target);
      applyLocation();
    }

    function applyLocation() {
      const params = new URLSearchParams(location.hash.replace(/^#/, ""));
      const name = params.get("course");
      const course = name ? items.find((item) => item.name === name) : null;
      if (course) openCourse(course);
      else if (!study.classList.contains("hidden")) showDirectory();
    }

    function renderCourses(query = "") {
      const normalized = query.trim().toLowerCase();
      courses.innerHTML = "";
      const matches = items.filter((course) => course.name.toLowerCase().includes(normalized));
      matches.forEach((course) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "course-card";
        const icon = document.createElement("span");
        icon.className = "course-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.textContent = "📘";
        const name = document.createElement("span");
        name.className = "course-name";
        name.textContent = course.name;
        button.append(icon, name);
        button.addEventListener("click", () => navigateToCourse(course));
        courses.appendChild(button);
      });
      courseEmpty.classList.toggle("hidden", matches.length > 0);
      courseStatus.textContent = normalized ? `找到 ${matches.length} 门课程` : "";
    }

    function highlightMatches(root, query) {
      const nodes = [];
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.nodeValue.trim() || node.parentElement.closest("mark")) return NodeFilter.FILTER_REJECT;
          return node.nodeValue.toLowerCase().includes(query) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        },
      });
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach((node) => {
        const text = node.nodeValue;
        const lower = text.toLowerCase();
        const fragment = document.createDocumentFragment();
        let offset = 0;
        let found = lower.indexOf(query, offset);
        while (found !== -1) {
          fragment.append(document.createTextNode(text.slice(offset, found)));
          const mark = document.createElement("mark");
          mark.textContent = text.slice(found, found + query.length);
          fragment.append(mark);
          offset = found + query.length;
          found = lower.indexOf(query, offset);
        }
        fragment.append(document.createTextNode(text.slice(offset)));
        node.replaceWith(fragment);
      });
    }

    function filterContent() {
      const query = search.value.trim().toLowerCase();
      searchClear.classList.toggle("hidden", !query);
      if (!currentCourse) return;
      if (query && collapsedBeforeSearch === null) {
        collapsedBeforeSearch = new Set([...content.querySelectorAll(".chapter-section")]
          .map((section, index) => section.classList.contains("collapsed") ? index : -1)
          .filter((index) => index >= 0));
      }
      renderMarkdown(currentCourse.text);
      const sections = [...content.querySelectorAll(".chapter-section")];
      const targets = [...content.querySelectorAll(".preface, .chapter-section")];
      let matches = 0;
      let firstMatch = null;
      targets.forEach((target) => {
        const show = !query || target.textContent.toLowerCase().includes(query);
        target.classList.toggle("hidden", !show);
        if (query && show) {
          matches += 1;
          firstMatch ||= target;
          target.classList.remove("collapsed");
          target.querySelector(".chapter-toggle")?.setAttribute("aria-expanded", "true");
          highlightMatches(target, query);
        }
      });
      if (!query && collapsedBeforeSearch) {
        sections.forEach((section, index) => {
          const collapsed = collapsedBeforeSearch.has(index);
          section.classList.toggle("collapsed", collapsed);
          section.querySelector(".chapter-toggle")?.setAttribute("aria-expanded", String(!collapsed));
        });
        collapsedBeforeSearch = null;
      }
      searchStatus.textContent = query ? (matches ? `找到 ${matches} 个相关内容区，已定位到首个结果` : "当前课程没有匹配内容") : "";
      chapterLinks.querySelectorAll(".chapter-link").forEach((link, index) => link.classList.toggle("hidden", Boolean(query) && sections[index]?.classList.contains("hidden")));
      if (firstMatch) requestAnimationFrame(() => firstMatch.scrollIntoView({behavior: "smooth", block: "start"}));
    }

    function setDesktopNavCollapsed(collapsed) {
      study.classList.toggle("nav-collapsed", collapsed);
      navCollapse.setAttribute("aria-expanded", String(!collapsed));
      navCollapse.setAttribute("aria-label", collapsed ? "展开章节目录" : "收起章节目录");
      navCollapse.querySelector("span").textContent = collapsed ? "›" : "‹";
    }

    function openMobileNav() {
      mobileNavReturnFocus = document.activeElement;
      study.classList.add("mobile-nav-open");
      chapterNav.setAttribute("aria-hidden", "false");
      chapterNav.setAttribute("role", "dialog");
      chapterNav.setAttribute("aria-modal", "true");
      chapterNav.inert = false;
      studyToolbar.inert = true;
      content.inert = true;
      siteHeader.inert = true;
      mobileNavToggle.setAttribute("aria-expanded", "true");
      mobileNavToggle.setAttribute("aria-label", "关闭章节目录");
      navCollapse.setAttribute("aria-label", "关闭章节目录");
      navCollapse.querySelector("span").textContent = "×";
      document.body.style.overflow = "hidden";
      navCollapse.focus();
    }

    function closeMobileNav({restoreFocus = true} = {}) {
      const wasOpen = study.classList.contains("mobile-nav-open");
      study.classList.remove("mobile-nav-open");
      chapterNav.setAttribute("aria-hidden", String(mobileMedia.matches));
      chapterNav.removeAttribute("role");
      chapterNav.removeAttribute("aria-modal");
      chapterNav.inert = mobileMedia.matches;
      studyToolbar.inert = false;
      content.inert = false;
      siteHeader.inert = false;
      mobileNavToggle.setAttribute("aria-expanded", "false");
      mobileNavToggle.setAttribute("aria-label", "打开章节目录");
      document.body.style.overflow = "";
      if (wasOpen && restoreFocus && mobileNavReturnFocus && document.contains(mobileNavReturnFocus)) mobileNavReturnFocus.focus();
      mobileNavReturnFocus = null;
    }

    function trapMobileNavFocus(event) {
      const focusable = [...chapterNav.querySelectorAll("button:not([disabled]), [href], [tabindex]:not([tabindex='-1'])")]
        .filter((element) => !element.hidden && element.getClientRects().length);
      if (!focusable.length) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    courseSearch.addEventListener("input", () => {
      renderCourses(courseSearch.value);
      courseSearchClear.classList.toggle("hidden", !courseSearch.value);
    });
    courseSearchClear.addEventListener("click", () => {
      courseSearch.value = "";
      renderCourses();
      courseSearchClear.classList.add("hidden");
      courseSearch.focus();
    });
    search.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(filterContent, 160);
    });
    searchClear.addEventListener("click", () => {
      search.value = "";
      filterContent();
      search.focus();
    });
    document.getElementById("back").addEventListener("click", () => {
      if (history.state?.shaoyangCourse) history.back();
      else {
        history.replaceState(null, "", location.href.split("#")[0]);
        showDirectory();
      }
    });
    navCollapse.addEventListener("click", () => {
      if (mobileMedia.matches) closeMobileNav();
      else setDesktopNavCollapsed(!study.classList.contains("nav-collapsed"));
    });
    mobileNavToggle.addEventListener("click", () => {
      if (study.classList.contains("mobile-nav-open")) closeMobileNav();
      else openMobileNav();
    });
    navMask.addEventListener("click", closeMobileNav);
    document.addEventListener("keydown", (event) => {
      if (study.classList.contains("mobile-nav-open")) {
        if (event.key === "Escape") closeMobileNav();
        else if (event.key === "Tab") trapMobileNavFocus(event);
      }
    });
    mobileMedia.addEventListener("change", () => {
      closeMobileNav();
      if (!mobileMedia.matches) setDesktopNavCollapsed(study.classList.contains("nav-collapsed"));
    });

    window.addEventListener("popstate", applyLocation);
    renderCourses();
    closeMobileNav();
    applyLocation();
  </script>
</body>
</html>
