<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#143b6b">
  <title>__DOCUMENT_TITLE__</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #fff;
      --text: #182230;
      --muted: #667085;
      --border: #e4e7ec;
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --primary-soft: #eaf2ff;
      --deep: #143b6b;
      --red: #b42318;
      --red-soft: #fff2f0;
      --blue: #2563eb;
      --black: #182230;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }
    html { max-width: 100%; overflow-x: hidden; scroll-behavior: smooth; }
    body {
      max-width: 100%;
      overflow-x: hidden;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.75 system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    :where(button, input, a):focus-visible {
      outline: 3px solid rgba(37, 99, 235, .38);
      outline-offset: 2px;
    }
    .skip-link {
      position: fixed;
      left: 12px;
      top: -60px;
      z-index: 100;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
    }
    .skip-link:focus { top: 12px; }
    .hidden { display: none !important; }
    .sr-only { position: absolute !important; width: 1px !important; height: 1px !important; padding: 0 !important; margin: -1px !important; overflow: hidden !important; clip: rect(0, 0, 0, 0) !important; white-space: nowrap !important; border: 0 !important; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(228, 231, 236, .82);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(14px);
      padding-top: env(safe-area-inset-top);
    }
    .header-inner {
      width: min(1160px, 100%);
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: auto;
      padding: 8px max(18px, env(safe-area-inset-right)) 8px max(18px, env(safe-area-inset-left));
    }
    .module-link {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--primary);
      text-decoration: none;
      font-weight: 650;
      white-space: nowrap;
    }
    .module-link:hover { border-color: #84adff; background: var(--primary-soft); }
    .module-link[aria-current="page"] { border-color: #b9d2ff; background: var(--primary-soft); color: var(--primary-strong); }
    .header-brand { min-width: 0; display: inline-flex; align-items: center; gap: 10px; color: inherit; text-decoration: none; }
    .brand-mark { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 10px; background: var(--deep); color: #fff; font-weight: 850; }
    .module-nav { display: flex; gap: 7px; margin-left: auto; }
    .brand { font-size: 18px; font-weight: 800; letter-spacing: .01em; }

    main {
      width: min(1160px, 100%);
      margin: auto;
      padding: 26px max(18px, env(safe-area-inset-right)) max(56px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    }
    .directory-head {
      max-width: 720px;
      margin: 8px 0 18px;
    }
    .directory-head h1 { margin: 0; font-size: clamp(26px, 4vw, 36px); line-height: 1.25; }
    .directory-search { max-width: 560px; margin: 18px 0; }
    .search-box {
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 3px 12px rgba(16, 24, 40, .04);
    }
    .search-box:focus-within { border-color: var(--primary); }
    .search-box input { min-width: 0; flex: 1; border: 0; outline: 0; background: transparent; color: var(--text); }
    .search-box input { min-height: 44px; }
    .search-icon { color: var(--muted); }
    .icon-button {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 20px;
    }
    .icon-button:hover { background: var(--primary-soft); color: var(--primary); }
    .course-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .course-card {
      min-height: 78px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 17px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      text-align: left;
      box-shadow: 0 1px 3px rgba(16, 24, 40, .06);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .course-card:hover { transform: translateY(-2px); border-color: #84adff; box-shadow: var(--shadow); }
    .course-name { font-size: 17px; font-weight: 750; line-height: 1.45; overflow-wrap: anywhere; }
    .course-arrow { margin-left: auto; color: var(--primary); font-size: 17px; }
    .empty-result { margin: 18px 0; padding: 26px; border-radius: 14px; background: var(--panel); color: var(--muted); text-align: center; }

    .study-toolbar {
      position: sticky;
      top: 59px;
      z-index: 15;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      margin: -10px 0 14px;
      padding: 10px 0;
      background: rgba(244, 247, 251, .94);
      backdrop-filter: blur(10px);
      align-items: start;
    }
    .search-area { min-width: 0; }
    .search-area .search-status { margin: 4px 4px 0; }
    .toolbar-actions { display: flex; align-items: flex-start; gap: 8px; }
    .text-button {
      min-height: 46px;
      height: 46px;
      padding: 0 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--text);
      white-space: nowrap;
    }
    .text-button:hover { border-color: #84adff; color: var(--primary); }
    .mobile-nav-toggle,
    .mobile-search-toggle,
    .mobile-course-context,
    .mobile-module-context,
    .chapter-pager,
    .recall-card-pager { display: none; }

    .study-layout { display: grid; grid-template-columns: 238px minmax(0, 1fr); gap: 18px; align-items: start; }
    .study-content { min-width: 0; }
    .chapter-nav {
      position: sticky;
      top: 128px;
      max-height: calc(100vh - 148px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: var(--panel);
      box-shadow: 0 6px 22px rgba(16, 24, 40, .06);
    }
    .chapter-nav-head {
      position: sticky;
      top: 0;
      z-index: 2;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 8px 7px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      font-weight: 750;
    }
    .chapter-links { padding: 8px; }
    .chapter-link {
      width: 100%;
      min-height: 44px;
      display: -webkit-box;
      margin: 2px 0;
      padding: 9px 10px;
      overflow: hidden;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #475467;
      text-align: left;
      line-height: 1.45;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .chapter-link:hover, .chapter-link.active { background: var(--primary-soft); color: var(--primary); }
    .study.nav-collapsed .study-layout { grid-template-columns: 58px minmax(0, 1fr); }
    .study.nav-collapsed .chapter-nav-head { justify-content: center; padding: 7px; }
    .study.nav-collapsed .chapter-nav-label,
    .study.nav-collapsed .chapter-links { display: none; }

    .note {
      min-width: 0;
      padding: clamp(18px, 3vw, 34px);
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .note:focus { outline: none; }
    .note h1 { margin: 0 0 14px; font-size: clamp(24px, 3.5vw, 32px); line-height: 1.35; overflow-wrap: anywhere; }
    .note p { margin: 0 0 13px; overflow-wrap: anywhere; }
    .note code {
      padding: .1em .36em;
      border-radius: 5px;
      background: #f2f4f7;
      color: #7a271a;
      font: .92em/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .note ul { margin: 0 0 15px; padding-left: 1.35em; }
    .note ol { margin: 0 0 15px; padding-left: 1.6em; }
    .note li { margin: 5px 0; }
    .note blockquote { margin: 14px 0; padding: 10px 14px; border-left: 4px solid #98a2b3; background: #f8fafc; color: #475467; }
    .note pre { max-width: 100%; overflow: auto; margin: 14px 0; padding: 14px; border-radius: 10px; background: #101828; color: #f2f4f7; line-height: 1.65; }
    .note pre code { padding: 0; background: transparent; color: inherit; white-space: pre; }
    .note mark { padding: 0 .08em; border-radius: 3px; background: #fef08a; color: #422006; }
    .red { color: var(--red); font-weight: 750; }
    .blue { color: var(--blue); font-weight: 750; }
    .black { color: var(--black); }
    .recall-answer { display: inline; }
    .study.recall-mode .note :is(.red, .blue, .black):not(.recall-revealed) {
      display: inline-block;
      max-width: 100%;
      padding: .18em .55em;
      border: 1px dashed rgba(37, 99, 235, .42);
      border-radius: 7px;
      background: repeating-linear-gradient(135deg, rgba(37, 99, 235, .13) 0 8px, rgba(37, 99, 235, .06) 8px 16px);
      color: #1d4ed8 !important;
      font-weight: 700;
      cursor: pointer;
      user-select: text;
    }
    .study.recall-mode .note :is(.red, .blue, .black):not(.recall-revealed)::before { content: "点击核对：" attr(data-recall-cue); }
    .study.recall-mode .note :is(.red, .blue, .black):not(.recall-revealed) .recall-answer { display: none; }
    .study.recall-mode .note :is(.red, .blue, .black):focus-visible { outline: 3px solid rgba(37, 99, 235, .42); outline-offset: 2px; }
    .study.recall-mode .note :is(.red, .blue, .black).recall-revealed::before {
      display: inline-flex;
      margin-right: 6px;
      padding: 1px 6px;
      border: 1px solid currentColor;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1.55;
      vertical-align: .08em;
    }
    .study.recall-mode .note .red.recall-revealed::before { content: "结论"; }
    .study.recall-mode .note .blue.recall-revealed::before { content: "得分点"; }
    .study.recall-mode .note .black.recall-revealed::before { content: "条件 / 易错"; }
    .recall-prompt { margin: 11px 0 8px !important; padding: 9px 12px; border-left: 4px solid var(--blue); border-radius: 7px; background: #eff6ff; color: #1e3a8a; font-weight: 700; }
    .chapter-section { margin: 24px 0 10px; scroll-margin-top: 138px; }
    .chapter-heading { margin: 0 0 14px; }
    .chapter-toggle {
      width: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 15px;
      border: 0;
      border-left: 6px solid var(--primary);
      border-radius: 10px;
      background: var(--primary-soft);
      color: var(--deep);
      text-align: left;
      font-size: clamp(18px, 2.5vw, 22px);
      font-weight: 800;
      line-height: 1.45;
    }
    .chapter-heading-copy { min-width: 0; display: grid; gap: 6px; }
    .exam-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; font-size: 11px; font-weight: 750; line-height: 1.35; }
    .exam-level,
    .exam-types { min-height: 23px; display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; }
    .exam-level { background: var(--panel); }
    .exam-level.level-a { color: #b42318; }
    .exam-level.level-b { color: #175cd3; }
    .exam-level.level-c { color: #475467; }
    .exam-types { background: rgba(255, 255, 255, .62); color: #475467; }
    .chapter-chevron { flex: 0 0 auto; transition: transform .16s ease; }
    .chapter-section.collapsed .chapter-chevron { transform: rotate(-90deg); }
    .chapter-section.collapsed .chapter-body { display: none; }
    .point {
      margin: 20px 0 10px;
      padding: 10px 13px;
      border-left: 5px solid var(--blue);
      border-radius: 8px;
      background: var(--primary-soft);
      color: var(--blue);
      font-size: 17px;
      line-height: 1.5;
    }
    .table-wrap { width: 100%; overflow-x: auto; margin: 16px 0; border: 1px solid var(--border); border-radius: 10px; }
    .table-hint { margin: -8px 0 12px !important; color: var(--muted); font-size: 13px; }
    .note-figure { margin: 18px 0; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: var(--panel); text-align: center; }
    .note-figure img { display: block; width: 100%; max-width: 920px; max-height: 560px; margin: 0 auto; object-fit: contain; }
    .note-figure figcaption { margin-top: 10px; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .note table { width: 100%; min-width: 620px; border-collapse: collapse; background: var(--panel); font-size: 14px; }
    .note th, .note td { padding: 10px 12px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    .note tr:last-child td { border-bottom: 0; }
    .note th:last-child, .note td:last-child { border-right: 0; }
    .note th { background: var(--primary-soft); color: var(--blue); font-weight: 750; }
    .search-status { min-height: 24px; margin: 8px 0 0; color: var(--muted); font-size: 13px; }
    .search-status:empty { display: none; }
    .nav-mask { display: none; }
    .recall-card { min-width: 0; }

    /* 讲义保持连续文档形态，不复用三色笔记与刷题模块的卡片视觉。 */
    .lecture-page .note {
      padding: 6px 4px 28px;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }
    .lecture-page .chapter-toggle {
      min-height: 0;
      padding: 0 0 12px;
      border: 0;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      cursor: default;
    }
    .lecture-page .chapter-toggle[aria-expanded] { pointer-events: none; }
    .lecture-page .chapter-chevron { display: none; }
    .lecture-page .chapter-section.collapsed .chapter-body { display: block; }
    .lecture-page .exam-meta { gap: 0; color: var(--muted); font-weight: 650; }
    .lecture-page .exam-level,
    .lecture-page .exam-types {
      min-height: 0;
      padding: 0;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
    }
    .lecture-page .exam-level::after { content: "·"; margin: 0 6px; color: #98a2b3; }
    .lecture-page .point {
      margin: 21px 0 9px;
      padding: 0 0 6px;
      border: 0;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      background: transparent;
      color: var(--deep);
    }

    @media (max-width: 900px) {
      .course-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .study-layout { grid-template-columns: 210px minmax(0, 1fr); gap: 12px; }
    }

    @media (max-width: 700px) {
      .site-header { position: static; }
      .header-inner { min-height: 54px; flex-wrap: wrap; padding: 6px max(10px, env(safe-area-inset-right)) 6px max(10px, env(safe-area-inset-left)); }
      .header-brand { flex: 1 1 100%; }
      .brand-sub { display: none; }
      .module-nav { width: 100%; min-width: 0; margin-left: 0; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }
      .module-link { min-width: 0; padding: 4px 2px; font-size: 13px; line-height: 1.25; white-space: normal; text-align: center; overflow-wrap: anywhere; }
      main { padding: 18px max(10px, env(safe-area-inset-right)) max(42px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); }
      .course-grid { grid-template-columns: 1fr; gap: 10px; }
      .course-card { min-height: 76px; padding: 14px; border-radius: 14px; }
      .study-toolbar { top: 0; grid-template-columns: 46px minmax(0, 1fr) auto; gap: 6px; margin-top: -8px; padding: 8px 0; }
      .mobile-nav-toggle { display: inline-flex; }
      .toolbar-actions .text-button { width: 46px; padding: 0; font-size: 0; }
      .toolbar-actions #back::before { content: "↩"; font-size: 21px; }
      .toolbar-actions #recall-toggle::before { content: "忆"; font-size: 17px; font-weight: 750; }
      .toolbar-actions #recall-toggle[aria-pressed="true"]::before { content: "显"; }
      .toolbar-actions #recall-toggle[aria-pressed="true"] { background: var(--primary); color: #fff; }
      .study-layout, .study.nav-collapsed .study-layout { display: block; }
      .chapter-nav {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 40;
        width: min(84vw, 330px);
        max-height: none;
        border: 0;
        border-radius: 0;
        transform: translateX(-105%);
        transition: transform .18s ease;
        box-shadow: 10px 0 28px rgba(16, 24, 40, .2);
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .study.mobile-nav-open .chapter-nav { transform: translateX(0); }
      .study.nav-collapsed .chapter-nav-label { display: inline; }
      .study.nav-collapsed .chapter-links { display: block; }
      .nav-mask {
        position: fixed;
        inset: 0;
        z-index: 35;
        display: block;
        opacity: 0;
        pointer-events: none;
        background: rgba(16, 24, 40, .46);
        transition: opacity .18s ease;
      }
      .study.mobile-nav-open .nav-mask { opacity: 1; pointer-events: auto; }
      .note { padding: 18px 13px; border-radius: 14px; }
      .note h1 { font-size: 23px; }
      .chapter-section { scroll-margin-top: 122px; }
      .chapter-toggle { min-height: 54px; padding: 11px 12px; border-left-width: 5px; font-size: 18px; }
      .point { margin-top: 17px; padding: 9px 10px; font-size: 16px; }
      .note p { line-height: 1.85; }
      .table-wrap { margin-right: -3px; }

      body { padding-bottom: env(safe-area-inset-bottom); }
      .site-header { position: sticky; }
      body.is-studying .site-header { display: none; }
      .header-inner { min-height: 52px; flex-wrap: nowrap; padding: 6px 14px; }
      .header-brand { flex: 1 1 auto; }
      .brand { font-size: 15px; }
      .desktop-module-nav { display: none; }
      main { padding: 12px 8px 28px; }

      .study-toolbar {
        position: fixed;
        top: 0;
        right: 0;
        left: 0;
        z-index: 50;
        grid-template-columns: 76px minmax(0, 1fr) 76px;
        grid-template-rows: 44px;
        align-items: center;
        gap: 6px;
        height: calc(58px + env(safe-area-inset-top));
        margin: 0;
        padding: calc(7px + env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) 7px max(8px, env(safe-area-inset-left));
        border-bottom: 1px solid var(--border);
        background: rgba(244, 247, 251, .98);
      }
      .mobile-nav-toggle {
        width: 100%;
        min-width: 0;
        height: 44px;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 6px 9px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        color: var(--primary);
        font-size: 14px;
      }
      .mobile-nav-toggle strong { font-size: 11px; }
      .mobile-course-context,
      .mobile-module-context {
        position: relative;
        min-width: 0;
        width: 100%;
        height: 44px;
        min-height: 44px;
        display: flex;
        align-items: stretch;
        margin: 0;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
      }
      .mobile-course-context::after,
      .mobile-module-context::after {
        content: "⌄";
        position: absolute;
        top: 50%;
        right: 9px;
        color: var(--primary);
        font-size: 13px;
        line-height: 1;
        pointer-events: none;
        transform: translateY(-55%);
      }
      .mobile-course-context select,
      .mobile-module-context select {
        min-width: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0 27px 0 10px;
        border: 0;
        outline: 0;
        appearance: none;
        background: transparent;
        line-height: 1.2;
        text-overflow: ellipsis;
      }
      .mobile-course-context select { color: var(--text); font-size: 13px; font-weight: 750; }
      .mobile-course-context span { display: none; }
      .mobile-module-context select { color: var(--primary); font-size: 12px; font-weight: 750; }
      .search-area { display: none; }
      .toolbar-actions { display: none; }

      .chapter-nav {
        inset: auto 8px calc(8px + env(safe-area-inset-bottom)) 8px;
        width: auto;
        max-height: min(66vh, 560px);
        padding: 0 0 env(safe-area-inset-bottom);
        border: 1px solid var(--border);
        border-radius: 18px 18px 12px 12px;
        transform: translateY(calc(100% + 90px));
        box-shadow: 0 -16px 38px rgba(16, 24, 40, .2);
      }
      .study.mobile-nav-open .chapter-nav { transform: translateY(0); }
      .chapter-nav-head { min-height: 56px; border-radius: 18px 18px 0 0; }
      .chapter-links { max-height: calc(66vh - 58px); overflow: auto; }
      .chapter-link { min-height: 48px; }
      .nav-mask { z-index: 35; }

      .study-layout, .study.nav-collapsed .study-layout { display: block; }
      body.is-studying main { padding-top: calc(68px + env(safe-area-inset-top)); }
      .note { padding: 0 6px; border: 0; border-radius: 0; background: transparent; box-shadow: none; }
      body.is-studying .note h1 { display: none; }
      .chapter-section { display: none; margin-top: 6px; scroll-margin-top: 110px; }
      .chapter-section.mobile-active { display: block; }
      .chapter-section.mobile-active .chapter-body { display: block; }
      .lecture-page .chapter-section { display: block; margin-top: 18px; }
      .lecture-page .chapter-section .chapter-body { display: block; }
      .lecture-page .chapter-pager { display: none !important; }
      .chapter-toggle { min-height: auto; padding: 0 0 12px; border: 0; border-radius: 0; background: transparent; color: var(--text); pointer-events: none; }
      .exam-meta { gap: 5px; }

      .chapter-chevron { display: none; }

      .chapter-pager {
        display: none;
      }

      .recall-card-pager button {
        min-height: 46px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);

      }
      .chapter-pager button:disabled,
      .recall-card-pager button:disabled { color: #98a2b3; }

      .study.recall-mode .chapter-pager { display: none; }
      .study.recall-mode .chapter-body > :not(.recall-card) { display: none; }
      .study.recall-mode .recall-card { display: none; }
      .study.recall-mode .recall-card.mobile-active { display: block; }

      .study.recall-mode .recall-card-pager {

        gap: 6px;
        margin: 10px 0 2px;
      }
      .recall-card-pager .reveal-card { border-color: var(--primary); background: var(--primary); color: #fff; }
      .recall-rating { display: none; }
      .recall-card-pager.is-rating { grid-template-columns: 1fr; }
      .recall-card-pager.is-rating > #recall-prev,
      .recall-card-pager.is-rating > #reveal-card,

      .recall-rating button[data-recall-rating="again"] { border-color: #f0b4ae; color: var(--red); }
      .recall-rating button[data-recall-rating="known"] { border-color: #8fd0b2; color: #067647; }

      .study.color-notes-list .point { margin: 16px 0 8px; padding: 7px 0; border: 0; border-bottom: 1px solid var(--border); border-radius: 0; background: transparent; }

    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101828;
        --panel: #182230;
        --text: #f2f4f7;
        --muted: #98a2b3;
        --border: #344054;
        --primary-soft: #1c3157;
        --deep: #e8eef7;

      .recall-prompt { background: #1c3157; color: #bfdbfe; }

    }

    @media (max-width: 700px) and (prefers-color-scheme: dark) {

    @media (prefers-reduced-motion: reduce) {

    }

  <script>
    const items = __COURSE_DATA__;
    const colorMode = __COLOR_MODE__;
    const pageKind = "__PAGE_KIND__";
    const subjectAliases = {
      "Office软件操作": "办公软件",
      "信息技术与教学论": "教学论",
      "多媒体技术": "多媒体",
      "数据结构与算法": "算法与数据结构",
      "操作系统原理": "操作系统",
      "数据库技术": "数据库",
    };
    const recallToggle = document.getElementById("recall-toggle");
    const study = document.getElementById("study");
    const content = document.getElementById("content");
    const search = document.getElementById("search");
    const searchClear = document.getElementById("search-clear");
    const searchStatus = document.getElementById("search-status");
    const chapterNav = document.getElementById("chapter-nav");
    const chapterLinks = document.getElementById("chapter-links");
    const navCollapse = document.getElementById("nav-collapse");
    const mobileNavToggle = document.getElementById("mobile-nav-toggle");
    const mobileCourseSelect = document.getElementById("mobile-course-select");
    const mobileModuleSelect = document.getElementById("mobile-module-select");
    const mobileChapterProgress = document.getElementById("mobile-chapter-progress");
    const mobileCardProgress = document.getElementById("mobile-card-progress");
    const chapterPrev = document.getElementById("chapter-prev");
    const chapterNext = document.getElementById("chapter-next");
    const recallPrev = document.getElementById("recall-prev");
    const recallNext = document.getElementById("recall-next");
    const revealCard = document.getElementById("reveal-card");
    const recallPager = document.querySelector(".recall-card-pager");
    const recallRating = document.getElementById("recall-rating");
    const navMask = document.getElementById("nav-mask");
    const studyToolbar = document.querySelector(".study-toolbar");
    const studyContent = document.querySelector(".study-content");
    const siteHeader = document.querySelector(".site-header");
    const backButton = document.getElementById("back");
    const moduleLinks = [...document.querySelectorAll(".module-link")];
    const mobileMedia = window.matchMedia("(max-width: 700px)");
    let currentCourse = null;
    let activeObserver = null;
    let collapsedBeforeSearch = null;
    let activeChapterIndex = 0;
    let activeRecallIndex = 0;
    let recallRetryQueue = [];
    let recallRetryMode = false;
    let searchTimer = null;
    let mobileNavReturnFocus = null;
    const recallRatings = (() => {
      try {
        const stored = JSON.parse(localStorage.getItem("shaoyang-recall-ratings-v1") || "{}");
        return stored && typeof stored === "object" ? stored : {};
      } catch {
        return {};
      }
    })();

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[char]));
    }

    function syncRecallTargets() {
      const active = study.classList.contains("recall-mode");
      content.querySelectorAll(".red, .blue, .black").forEach((item) => {
        item.classList.remove("recall-revealed");
        if (active && !mobileMedia.matches) {
          item.setAttribute("role", "button");
          item.setAttribute("tabindex", "0");
          item.setAttribute("aria-label", `显示答案：${item.dataset.recallCue || "这条笔记"}`);
        } else {
          item.removeAttribute("role");
          item.removeAttribute("tabindex");
          item.removeAttribute("aria-label");
        }
      });
    }

    function recallRatingKey(chapterIndex = activeChapterIndex, cardIndex = activeRecallIndex) {
      return currentCourse ? `${currentCourse.name}::${chapterIndex + 1}::${cardIndex + 1}` : "";
    }

    function saveRecallRating(value) {
      const key = recallRatingKey();
      if (!key) return;
      recallRatings[key] = {value, savedAt: new Date().toISOString()};
      try {
        localStorage.setItem("shaoyang-recall-ratings-v1", JSON.stringify(recallRatings));
      } catch {}
    }

    function concealRecallCard(card) {
      card?.querySelectorAll(".red, .blue, .black").forEach((item) => {
        item.classList.remove("recall-revealed");
        item.removeAttribute("aria-label");
      });
    }

    function revealRecallItem(item) {
      if (!study.classList.contains("recall-mode") || !item || mobileMedia.matches) return;
      item.classList.add("recall-revealed");
      item.setAttribute("aria-label", `已显示答案：${item.dataset.recallCue || "这条笔记"}`);
    }

    function publicFacingText(value) {
      return String(value || "")
        .replace(/按高校程序设计基础常见期末范围/g, "按事业单位专业知识常见考查范围")
        .replace(/讲义按大学《([^》]+)》的典型期末结构组织/g, "讲义按《$1》的专业知识常见考查结构组织")
        .replace(/公开大学期末试卷显示/g, "常见专业知识试题显示")
        .replace(/公开考试大纲和期末试卷样例表明/g, "常见专业知识考查表明")
        .replace(/公开通信专业试卷还常考/g, "通信专业考查还可能涉及")
        .replace(/完整通信专业期末/g, "通信专业知识考查")
        .replace(/期末/g, "考试");
    }

    function publicMarkdownLines(markdown) {
      const visible = [];
      let hiddenSection = false;
      String(markdown || "").split(/\r?\n/).forEach((line) => {
        const trimmed = line.trim();
        const markdownH2 = trimmed.match(/^##\s+(.+)$/);
        const plainChapter = trimmed.match(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?.*$/);
        if (markdownH2 || plainChapter) {
          const title = markdownH2 ? markdownH2[1] : plainChapter[0];
          hiddenSection = /(?:公开课程|课程与扩展依据|课程依据|教材依据|资料来源|参考资料|参考链接|题型参考|改编说明|基础简答题答法|基础简答题答题框架)/.test(title);
        }
        if (!hiddenSection) visible.push(line);
      });
      // 学习页直接进入第一章：课程名后的定位、用法等说明不属于知识点。
      const firstChapter = visible.findIndex((line) => /^##\s+/.test(line.trim()) || /^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?/.test(line.trim()));
      if (firstChapter < 0) return visible;
      const title = visible.find((line) => /^#\s+/.test(line.trim()));
      return title ? [title, "", ...visible.slice(firstChapter)] : visible.slice(firstChapter);
    }

    function formatInline(value) {
      const source = publicFacingText(value);
      const marker = source.match(/^(🔴|🔵|⚫️?)\s*/u);
      const visibleSource = marker ? source.slice(marker[0].length) : source;
      let output = escapeHtml(visibleSource)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      if (colorMode && marker) {
        const className = marker[1] === "🔴" ? "red" : marker[1] === "🔵" ? "blue" : "black";
        const recallRole = className === "red" ? "结论" : className === "blue" ? "方法与得分点" : "条件与易错";
        output = `<span class="${className}" data-recall-cue="${recallRole}"><span class="recall-answer">${output}</span></span>`;
      }
      return output;
    }

    function tableCells(line) {
      let trimmed = line.trim();
      if (trimmed.startsWith("|")) trimmed = trimmed.slice(1);
      if (trimmed.endsWith("|")) trimmed = trimmed.slice(0, -1);
      const cells = [];
      let cell = "";
      for (let index = 0; index < trimmed.length; index += 1) {
        if (trimmed[index] === "\\" && trimmed[index + 1] === "|") {
          cell += "|";
          index += 1;
        } else if (trimmed[index] === "|") {
          cells.push(cell.trim());
          cell = "";
        } else {
          cell += trimmed[index];
        }
      }
      cells.push(cell.trim());
      return cells;
    }

    function isSeparatorRow(cells) {
      return cells.length > 0 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
    }

    function isTableStart(lines, index) {
      if (index + 1 >= lines.length || !lines[index].includes("|") || !lines[index + 1].includes("|")) return false;
      const first = tableCells(lines[index]);
      const second = tableCells(lines[index + 1]);
      return first.length >= 2 && second.length === first.length;
    }

    function renderTable(rows) {
      const parsed = rows.map(tableCells);
      const bodyRows = isSeparatorRow(parsed[1] || []) ? parsed.slice(2) : parsed.slice(1);
      const header = parsed[0];
      return `<div class="table-wrap" tabindex="0" aria-label="可横向滚动的表格"><table><thead><tr>${header.map((cell) => `<th scope="col">${formatInline(cell)}</th>`).join("")}</tr></thead><tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${formatInline(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div><p class="table-hint">↔ 左右滑动查看完整表格</p>`;
    }

    function renderMarkdown(markdown) {
      const lines = publicMarkdownLines(markdown);
      const output = ["<div class=\"preface\">"];
      let index = 0;
      let chapterOpen = false;
      let prefaceOpen = true;
      let listType = null;

      const closeList = () => {
        if (!listType) return;
        output.push(`</${listType}>`);
        listType = null;
      };
      const closePreface = () => {
        if (!prefaceOpen) return;
        closeList();
        output.push("</div>");
        prefaceOpen = false;
      };
      const closeChapter = () => {
        closeList();
        if (!chapterOpen) return;
        output.push("</div></section>");
        chapterOpen = false;
      };

      while (index < lines.length) {
        const trimmed = lines[index].trim();
        if (!trimmed) {
          closeList();
          index += 1;
          continue;
        }
        if (trimmed.startsWith("使用说明")) {
          index += 1;
          continue;
        }
        if (trimmed.startsWith("```")) {
          closeList();
          const language = trimmed.slice(3).trim().replace(/[^a-zA-Z0-9_-]/g, "");
          const code = [];
          index += 1;
          while (index < lines.length && !lines[index].trim().startsWith("```")) {
            code.push(lines[index]);
            index += 1;
          }
          if (index < lines.length) index += 1;
          output.push(`<pre><code${language ? ` class="language-${language}"` : ""}>${escapeHtml(code.join("\n"))}</code></pre>`);
          continue;
        }
        if (isTableStart(lines, index)) {
          closeList();
          const rows = [lines[index]];
          const columnCount = tableCells(lines[index]).length;
          index += 1;
          while (index < lines.length && lines[index].trim() && lines[index].includes("|") && tableCells(lines[index]).length === columnCount) {
            rows.push(lines[index]);
            index += 1;
          }
          output.push(renderTable(rows));
          continue;
        }

        const imageMatch = trimmed.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if (imageMatch) {
          closeList();
          const caption = imageMatch[1].trim();
          const rawSource = imageMatch[2].trim();
          const normalizedSource = rawSource.replace(/^\.\.\/media\//, "media/");
          if (/^media\/[a-zA-Z0-9_./-]+\.svg$/i.test(normalizedSource)) {
            output.push(`<figure class="note-figure"><img src="${escapeHtml(normalizedSource)}" alt="${escapeHtml(caption)}" loading="lazy" decoding="async">${caption ? `<figcaption>${formatInline(caption)}</figcaption>` : ""}</figure>`);
          }
          index += 1;
          continue;
        }

        const h1 = trimmed.match(/^#\s+(.+)$/);
        const markdownH2 = trimmed.match(/^##\s+(.+)$/);
        const markdownH3 = trimmed.match(/^###\s+(.+)$/);
        const plainChapter = trimmed.match(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?.*$/);
        const plainPoint = trimmed.match(/^(?:考点|专题|模块)\s*\d+[：:]?.*$/);
        const examMarker = trimmed.match(/^<!--\s*exam:\s*([ABC])\s*\|\s*(.+?)\s*-->$/i);

        if (markdownH2 || plainChapter) {
          closeChapter();
          closePreface();
          const title = markdownH2 ? markdownH2[1] : plainChapter[0];
          let marker = null;
          for (let lookahead = index + 1; lookahead < Math.min(lines.length, index + 4); lookahead += 1) {
            const candidate = lines[lookahead].trim();
            if (!candidate) continue;
            marker = candidate.match(/^<!--\s*exam:\s*([ABC])\s*\|\s*(.+?)\s*-->$/i);
            break;
          }
          const levelLabels = {A: "优先掌握", B: "常规掌握", C: "补充了解"};
          const examHtml = !colorMode && marker
            ? `<span class="exam-meta"><span class="exam-level level-${marker[1].toLowerCase()}">${levelLabels[marker[1].toUpperCase()]}</span><span class="exam-types">${formatInline(marker[2].replace(/[、，]/g, " · "))}</span></span>`
            : "";
          output.push(`<section class="chapter-section"><h2 class="chapter-heading"><button class="chapter-toggle" type="button" aria-expanded="true"><span class="chapter-heading-copy"><span class="chapter-title">${formatInline(title)}</span>${examHtml}</span><span class="chapter-chevron" aria-hidden="true">▾</span></button></h2><div class="chapter-body">`);
          chapterOpen = true;
        } else if (examMarker) {
          index += 1;
          continue;
        } else if (h1) {
          closeList();
          output.push(`<h1>${formatInline(h1[1])}</h1>`);
        } else if (markdownH3 || plainPoint) {
          closeList();
          const rawTitle = markdownH3 ? markdownH3[1] : plainPoint[0];
          const title = colorMode ? rawTitle.replace(/^回忆卡\s*\d+\s*[|｜:：—-]\s*/, "") : rawTitle;
          output.push(`<h3 class="point">${formatInline(title)}</h3>`);
        } else if (colorMode && /^先答[：:]/.test(trimmed)) {
          closeList();
          output.push(`<p class="recall-prompt">${formatInline(trimmed)}</p>`);
        } else if (/^>\s?/.test(trimmed)) {
          closeList();
          output.push(`<blockquote>${formatInline(trimmed.replace(/^>\s?/, ""))}</blockquote>`);
        } else if (/^[-*]\s+/.test(trimmed) || /^\d+[.)]\s+/.test(trimmed)) {
          const nextListType = /^\d+[.)]\s+/.test(trimmed) ? "ol" : "ul";
          if (listType !== nextListType) {
            closeList();
            output.push(`<${nextListType}>`);
            listType = nextListType;
          }
          output.push(`<li>${formatInline(trimmed.replace(/^(?:[-*]|\d+[.)])\s+/, ""))}</li>`);
        } else {
          closeList();
          output.push(`<p>${formatInline(trimmed)}</p>`);
        }
        index += 1;
      }
      closePreface();
      closeChapter();
      content.innerHTML = output.join("");
      bindChapters();
    }

    function cleanChapterLabel(label) {
      const cleaned = label.replace(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?\s*/, "").trim();
      return cleaned || label;
    }

    function updateStudyPosition({replaceRoute = true} = {}) {
      const sections = [...content.querySelectorAll(".chapter-section")];
      const section = sections[activeChapterIndex];
      const cards = section ? [...section.querySelectorAll(".recall-card")] : [];
      sections.forEach((item, index) => item.classList.toggle("mobile-active", index === activeChapterIndex));
      chapterLinks.querySelectorAll(".chapter-link").forEach((link, index) => {
        const active = index === activeChapterIndex;
        link.classList.toggle("active", active);
        if (active) link.setAttribute("aria-current", "location");
        else link.removeAttribute("aria-current");
      });
      mobileChapterProgress.textContent = sections.length ? `${activeChapterIndex + 1}/${sections.length}章` : "章节";
      chapterPrev.disabled = activeChapterIndex <= 0;
      chapterNext.disabled = activeChapterIndex >= sections.length - 1;

      if (colorMode) {
        activeRecallIndex = Math.max(0, Math.min(activeRecallIndex, Math.max(0, cards.length - 1)));
        cards.forEach((card, index) => card.classList.toggle("mobile-active", index === activeRecallIndex));
        mobileCardProgress.textContent = cards.length ? `笔记 ${activeRecallIndex + 1}/${cards.length}` : "";
        recallPrev.disabled = activeChapterIndex <= 0 && activeRecallIndex <= 0;
        recallNext.disabled = activeChapterIndex >= sections.length - 1 && activeRecallIndex >= cards.length - 1;
        const activeCard = cards[activeRecallIndex];
        const hiddenAnswer = activeCard && [...activeCard.querySelectorAll(".red, .blue, .black")].some((item) => !item.classList.contains("recall-revealed"));
        revealCard.textContent = hiddenAnswer ? "显示答案" : "答案已显示";
        revealCard.disabled = !activeCard || !hiddenAnswer;
        const awaitingRating = Boolean(activeCard && !hiddenAnswer && mobileMedia.matches);
        recallPager.classList.toggle("is-rating", awaitingRating);
        recallRating.classList.toggle("hidden", !awaitingRating);
      } else {
        mobileCardProgress.textContent = "";
      }

      if (currentCourse) {
        const position = new URLSearchParams();
        position.set("course", currentCourse.name);
        position.set("chapter", String(activeChapterIndex + 1));
        if (colorMode) position.set("card", String(activeRecallIndex + 1));
        moduleLinks.forEach((link) => {
          if (link.pathname.endsWith("/notes.html")) link.href = `./notes.html#${position.toString()}`;
          if (link.pathname.endsWith("/color-notes.html")) link.href = `./color-notes.html#${position.toString()}`;
        });
      }

      if (replaceRoute && currentCourse) {
        const params = new URLSearchParams();
        params.set("course", currentCourse.name);
        params.set("chapter", String(activeChapterIndex + 1));
        if (colorMode) params.set("card", String(activeRecallIndex + 1));
        history.replaceState(history.state, "", `#${params.toString()}`);
        try {
          localStorage.setItem("shaoyang-last-learning", JSON.stringify({
            course: currentCourse.name,
            module: pageKind,
            chapter: activeChapterIndex + 1,
            card: colorMode ? activeRecallIndex + 1 : undefined,
            savedAt: new Date().toISOString(),
          }));
        } catch {}
      }
    }

    function setActiveChapter(index, {replaceRoute = true, focus = false} = {}) {
      const sections = [...content.querySelectorAll(".chapter-section")];
      if (!sections.length) return;
      activeChapterIndex = Math.max(0, Math.min(index, sections.length - 1));
      activeRecallIndex = 0;
      recallRetryQueue = [];
      recallRetryMode = false;
      sections[activeChapterIndex].classList.remove("collapsed");
      sections[activeChapterIndex].querySelector(".chapter-toggle")?.setAttribute("aria-expanded", "true");
      updateStudyPosition({replaceRoute});
      if (focus) {
        window.scrollTo({top: 0, behavior: "smooth"});
        requestAnimationFrame(() => sections[activeChapterIndex].querySelector(".chapter-title")?.focus?.({preventScroll: true}));
      }
    }

    function setActiveRecallCard(index, {replaceRoute = true, focus = false, conceal = true} = {}) {
      const section = content.querySelectorAll(".chapter-section")[activeChapterIndex];
      const cards = section ? [...section.querySelectorAll(".recall-card")] : [];
      if (!cards.length) return;
      activeRecallIndex = Math.max(0, Math.min(index, cards.length - 1));
      if (conceal) concealRecallCard(cards[activeRecallIndex]);
      updateStudyPosition({replaceRoute});
      if (focus) {
        window.scrollTo({top: 0, behavior: "smooth"});
        requestAnimationFrame(() => cards[activeRecallIndex].querySelector(".point")?.scrollIntoView({block: "start"}));
      }
    }

    function moveRecallCard(direction, {focus = true} = {}) {
      const sections = [...content.querySelectorAll(".chapter-section")];
      const section = sections[activeChapterIndex];
      const cards = section ? [...section.querySelectorAll(".recall-card")] : [];
      if (!cards.length) return;
      const nextCard = activeRecallIndex + direction;
      if (nextCard >= 0 && nextCard < cards.length) {
        recallRetryMode = false;
        setActiveRecallCard(nextCard, {focus});
        return;
      }
      const nextChapter = activeChapterIndex + direction;
      if (nextChapter < 0 || nextChapter >= sections.length) return;
      activeChapterIndex = nextChapter;
      const nextCards = [...sections[nextChapter].querySelectorAll(".recall-card")];
      activeRecallIndex = direction > 0 ? 0 : Math.max(0, nextCards.length - 1);
      recallRetryQueue = [];
      recallRetryMode = false;
      concealRecallCard(nextCards[activeRecallIndex]);
      sections[nextChapter].classList.remove("collapsed");
      updateStudyPosition();
      if (focus) {
        window.scrollTo({top: 0, behavior: "smooth"});
        requestAnimationFrame(() => nextCards[activeRecallIndex]?.querySelector(".point")?.scrollIntoView({block: "start"}));
      }
    }

    function advanceAfterRecallRating(value) {
      const section = content.querySelectorAll(".chapter-section")[activeChapterIndex];
      const cards = section ? [...section.querySelectorAll(".recall-card")] : [];
      if (!cards.length) return;
      if (!recallRetryMode && value !== "known" && !recallRetryQueue.includes(activeRecallIndex)) {
        recallRetryQueue.push(activeRecallIndex);
      }
      if (!recallRetryMode && activeRecallIndex < cards.length - 1) {
        setActiveRecallCard(activeRecallIndex + 1, {focus: true});
        return;
      }
      if (recallRetryQueue.length) {
        recallRetryMode = true;
        setActiveRecallCard(recallRetryQueue.shift(), {focus: true});
        return;
      }
      if (recallRetryMode) {
        recallRetryMode = false;
        const sections = [...content.querySelectorAll(".chapter-section")];
        if (activeChapterIndex >= sections.length - 1) {
          updateStudyPosition({replaceRoute: false});
          return;
        }
        activeChapterIndex += 1;
        activeRecallIndex = 0;
        const nextCard = sections[activeChapterIndex].querySelector(".recall-card");
        concealRecallCard(nextCard);
        updateStudyPosition();
        window.scrollTo({top: 0, behavior: "smooth"});
        return;
      }
      recallRetryMode = false;
      moveRecallCard(1);
    }

    function bindChapters() {
      if (activeObserver) activeObserver.disconnect();
      chapterLinks.innerHTML = "";
      const sections = [...content.querySelectorAll(".chapter-section")];
      sections.forEach((section, index) => {
        section.id = `chapter-${index + 1}`;
        const toggle = section.querySelector(".chapter-toggle");
        const title = section.querySelector(".chapter-title").textContent.trim();
        toggle.setAttribute("aria-controls", `${section.id}-body`);
        section.querySelector(".chapter-body").id = `${section.id}-body`;
        toggle.addEventListener("click", () => {
          if (!colorMode) return;
          if (mobileMedia.matches) return;
          const collapsed = section.classList.toggle("collapsed");
          toggle.setAttribute("aria-expanded", String(!collapsed));
        });

        const link = document.createElement("button");
        link.type = "button";
        link.className = "chapter-link";
        link.textContent = cleanChapterLabel(title);
        link.addEventListener("click", () => {
          if (!colorMode) {
            activeChapterIndex = index;
            updateStudyPosition({replaceRoute: true});
            closeMobileNav({restoreFocus: false});
            section.scrollIntoView({behavior: "smooth", block: "start"});
            return;
          }
          if (mobileMedia.matches) {
            setActiveChapter(index, {focus: true});
            closeMobileNav({restoreFocus: false});
          } else {
            activeChapterIndex = index;
            updateStudyPosition({replaceRoute: true});
            section.classList.remove("collapsed");
            toggle.setAttribute("aria-expanded", "true");
            section.scrollIntoView({behavior: "smooth", block: "start"});
          }
        });
        chapterLinks.appendChild(link);
      });

      chapterNav.classList.toggle("hidden", sections.length === 0);
      mobileNavToggle.classList.toggle("hidden", sections.length === 0);
      if (!sections.length) return;
      if (!mobileMedia.matches) {
        activeObserver = new IntersectionObserver((entries) => {
          const visible = entries.filter((entry) => entry.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
          if (!visible) return;
          const index = sections.indexOf(visible.target);
          chapterLinks.querySelectorAll(".chapter-link").forEach((link, linkIndex) => {
            const active = linkIndex === index;
            link.classList.toggle("active", active);
            if (active) link.setAttribute("aria-current", "location");
            else link.removeAttribute("aria-current");
          });
        }, {rootMargin: "-135px 0px -62% 0px", threshold: 0});
        sections.forEach((section) => activeObserver.observe(section));
      }
      updateStudyPosition({replaceRoute: false});
    }

    function openCourse(course) {
      currentCourse = course;
      collapsedBeforeSearch = null;
      recallRetryQueue = [];
      recallRetryMode = false;
      const routeParams = new URLSearchParams(location.hash.replace(/^#/, ""));
      activeChapterIndex = Math.max(0, (Number(routeParams.get("chapter")) || 1) - 1);
      activeRecallIndex = Math.max(0, (Number(routeParams.get("card")) || 1) - 1);
      renderMarkdown(course.text);
      study.classList.remove("recall-mode");
      study.classList.toggle("color-notes-list", colorMode);
      syncRecallTargets();
      mobileCourseSelect.value = course.name;
      mobileModuleSelect.value = pageKind;
      const courseHash = `#course=${encodeURIComponent(course.name)}`;
      moduleLinks.forEach((link) => {
        if (link.getAttribute("href") === "./notes.html" || link.pathname.endsWith("/notes.html")) link.href = `./notes.html${courseHash}`;
        if (link.getAttribute("href") === "./color-notes.html" || link.pathname.endsWith("/color-notes.html")) link.href = `./color-notes.html${courseHash}`;
        if (link.getAttribute("href") === "./quiz.html" || link.pathname.endsWith("/quiz.html")) {
          link.href = `./quiz.html?subject=${encodeURIComponent(subjectAliases[course.name] || course.name)}&mode=home`;
        }
      });
      updateStudyPosition({replaceRoute: mobileMedia.matches});
      try {
        localStorage.setItem("shaoyang-selected-course-v1", course.name);
        localStorage.setItem("shaoyang-last-learning", JSON.stringify({
          course: course.name,
          module: pageKind,
          chapter: activeChapterIndex + 1,
          card: colorMode ? activeRecallIndex + 1 : undefined,
          savedAt: new Date().toISOString(),
        }));
      } catch {}
      study.classList.remove("hidden");
      document.body.classList.add("is-studying");
      search.value = "";
      searchClear.classList.add("hidden");
      searchStatus.textContent = "";
      window.scrollTo({top: 0, behavior: "auto"});
      content.focus({preventScroll: true});
    }

    function showDirectory() {
      location.href = "./index.html";
    }

    function courseHash(course) {
      return `#course=${encodeURIComponent(course.name)}`;
    }

    function navigateToCourse(course) {
      const target = courseHash(course);
      if (location.hash === target) {
        openCourse(course);
        return;
      }
      history.pushState({shaoyangCourse: true}, "", target);
      applyLocation();
    }

    function applyLocation() {
      const params = new URLSearchParams(location.hash.replace(/^#/, ""));
      const name = params.get("course");
      const course = name ? items.find((item) => item.name === name) : null;
      if (course) openCourse(course);
      else location.replace("./index.html");
    }

    function highlightMatches(root, query) {
      const nodes = [];
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.nodeValue.trim() || node.parentElement.closest("mark")) return NodeFilter.FILTER_REJECT;
          return node.nodeValue.toLowerCase().includes(query) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        },
      });
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach((node) => {
        const text = node.nodeValue;
        const lower = text.toLowerCase();
        const fragment = document.createDocumentFragment();
        let offset = 0;
        let found = lower.indexOf(query, offset);
        while (found !== -1) {
          fragment.append(document.createTextNode(text.slice(offset, found)));
          const mark = document.createElement("mark");
          mark.textContent = text.slice(found, found + query.length);
          fragment.append(mark);
          offset = found + query.length;
          found = lower.indexOf(query, offset);
        }
        fragment.append(document.createTextNode(text.slice(offset)));
        node.replaceWith(fragment);
      });
    }

    function filterContent() {
      const query = search.value.trim().toLowerCase();
      searchClear.classList.toggle("hidden", !query);
      if (!currentCourse) return;
      if (query && collapsedBeforeSearch === null) {
        collapsedBeforeSearch = new Set([...content.querySelectorAll(".chapter-section")]
          .map((section, index) => section.classList.contains("collapsed") ? index : -1)
          .filter((index) => index >= 0));
      }
      renderMarkdown(currentCourse.text);
      syncRecallTargets();
      const sections = [...content.querySelectorAll(".chapter-section")];
      const targets = [...content.querySelectorAll(".preface, .chapter-section")];
      let matches = 0;
      let firstMatch = null;
      targets.forEach((target) => {
        const show = !query || target.textContent.toLowerCase().includes(query);
        target.classList.toggle("hidden", !show);
        if (query && show) {
          matches += 1;
          firstMatch ||= target;
          target.classList.remove("collapsed");
          target.querySelector(".chapter-toggle")?.setAttribute("aria-expanded", "true");
          highlightMatches(target, query);
        }
      });
      if (!query && collapsedBeforeSearch) {
        sections.forEach((section, index) => {
          const collapsed = collapsedBeforeSearch.has(index);
          section.classList.toggle("collapsed", collapsed);
          section.querySelector(".chapter-toggle")?.setAttribute("aria-expanded", String(!collapsed));
        });
        collapsedBeforeSearch = null;
      }
      searchStatus.textContent = query ? (matches ? `找到 ${matches} 个相关内容区，已定位到首个结果` : "当前科目没有匹配内容") : "";
      chapterLinks.querySelectorAll(".chapter-link").forEach((link, index) => link.classList.toggle("hidden", Boolean(query) && sections[index]?.classList.contains("hidden")));
      if (mobileMedia.matches && firstMatch?.classList.contains("chapter-section")) {
        activeChapterIndex = Math.max(0, sections.indexOf(firstMatch));
        activeRecallIndex = 0;
        updateStudyPosition();
      }
      if (firstMatch) requestAnimationFrame(() => firstMatch.scrollIntoView({behavior: "smooth", block: "start"}));
    }

    function setDesktopNavCollapsed(collapsed) {
      study.classList.toggle("nav-collapsed", collapsed);
      navCollapse.setAttribute("aria-expanded", String(!collapsed));
      navCollapse.setAttribute("aria-label", collapsed ? "展开章节目录" : "收起章节目录");
      navCollapse.querySelector("span").textContent = collapsed ? "›" : "‹";
    }

    function openMobileNav() {
      mobileNavReturnFocus = document.activeElement;
      study.classList.add("mobile-nav-open");
      chapterNav.setAttribute("aria-hidden", "false");
      chapterNav.setAttribute("role", "dialog");
      chapterNav.setAttribute("aria-modal", "true");
      chapterNav.inert = false;
      studyToolbar.inert = true;
      studyContent.inert = true;
      siteHeader.inert = true;
      mobileNavToggle.setAttribute("aria-expanded", "true");
      mobileNavToggle.setAttribute("aria-label", "关闭章节目录");
      navCollapse.setAttribute("aria-label", "关闭章节目录");
      navCollapse.querySelector("span").textContent = "×";
      document.body.style.overflow = "hidden";
      navCollapse.focus();
    }

    function closeMobileNav({restoreFocus = true} = {}) {
      const wasOpen = study.classList.contains("mobile-nav-open");
      study.classList.remove("mobile-nav-open");
      chapterNav.setAttribute("aria-hidden", String(mobileMedia.matches));
      chapterNav.removeAttribute("role");
      chapterNav.removeAttribute("aria-modal");
      chapterNav.inert = mobileMedia.matches;
      studyToolbar.inert = false;
      studyContent.inert = false;
      siteHeader.inert = false;
      mobileNavToggle.setAttribute("aria-expanded", "false");
      mobileNavToggle.setAttribute("aria-label", "打开章节目录");
      document.body.style.overflow = "";
      if (wasOpen && restoreFocus && mobileNavReturnFocus && document.contains(mobileNavReturnFocus)) mobileNavReturnFocus.focus();
      mobileNavReturnFocus = null;
    }

    function trapMobileNavFocus(event) {
      const focusable = [...chapterNav.querySelectorAll("button:not([disabled]), [href], [tabindex]:not([tabindex='-1'])")]
        .filter((element) => !element.hidden && element.getClientRects().length);
      if (!focusable.length) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    search.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(filterContent, 160);
    });
    searchClear.addEventListener("click", () => {
      search.value = "";
      filterContent();
      search.focus();
    });
    mobileCourseSelect.innerHTML = items.map((course) => `<option value="${escapeHtml(course.name)}">${escapeHtml(course.name)}</option>`).join("");
    mobileCourseSelect.addEventListener("change", () => {
      const course = items.find((item) => item.name === mobileCourseSelect.value);
      if (course) navigateToCourse(course);
    });
    mobileModuleSelect.addEventListener("change", () => {
      if (!currentCourse || mobileModuleSelect.value === pageKind) return;
      closeMobileNav({restoreFocus: false});
      const courseHash = location.hash || `#course=${encodeURIComponent(currentCourse.name)}`;
      if (mobileModuleSelect.value === "lecture") location.href = `./notes.html${courseHash}`;
      else if (mobileModuleSelect.value === "color-notes") location.href = `./color-notes.html${courseHash}`;
      else location.href = `./quiz.html?subject=${encodeURIComponent(subjectAliases[currentCourse.name] || currentCourse.name)}&mode=home`;
    });
    chapterPrev.addEventListener("click", () => setActiveChapter(activeChapterIndex - 1, {focus: true}));
    chapterNext.addEventListener("click", () => setActiveChapter(activeChapterIndex + 1, {focus: true}));
    recallPrev.addEventListener("click", () => moveRecallCard(-1));
    recallNext.addEventListener("click", () => moveRecallCard(1));
    revealCard.addEventListener("click", () => {
      const section = content.querySelectorAll(".chapter-section")[activeChapterIndex];
      const card = section?.querySelectorAll(".recall-card")[activeRecallIndex];
      if (!card) return;
      card.querySelectorAll(".red, .blue, .black").forEach((item) => {
        item.classList.add("recall-revealed");
        item.removeAttribute("role");
        item.removeAttribute("tabindex");
        item.setAttribute("aria-label", `已显示答案：${item.dataset.recallCue || "这条笔记"}`);
      });
      updateStudyPosition({replaceRoute: false});
    });
    recallRating.addEventListener("click", (event) => {
      const button = event.target.closest("[data-recall-rating]");
      if (!button) return;
      saveRecallRating(button.dataset.recallRating);
      advanceAfterRecallRating(button.dataset.recallRating);
    });
    backButton.addEventListener("click", () => {
      showDirectory();
    });
    recallToggle.addEventListener("click", () => {
      const active = study.classList.toggle("recall-mode");
      recallToggle.setAttribute("aria-pressed", String(active));
      recallToggle.textContent = active ? "显示全文" : "回忆模式";
      syncRecallTargets();
    });
    content.addEventListener("click", (event) => revealRecallItem(event.target.closest(".red, .blue, .black")));
    content.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const item = event.target.closest(".red, .blue, .black");
      if (!item) return;
      event.preventDefault();
      revealRecallItem(item);
    });
    navCollapse.addEventListener("click", () => {
      if (mobileMedia.matches) closeMobileNav();
      else setDesktopNavCollapsed(!study.classList.contains("nav-collapsed"));
    });
    mobileNavToggle.addEventListener("click", () => {
      if (study.classList.contains("mobile-nav-open")) closeMobileNav();
      else openMobileNav();
    });
    navMask.addEventListener("click", closeMobileNav);
    document.addEventListener("keydown", (event) => {
      if (study.classList.contains("mobile-nav-open")) {
        if (event.key === "Escape") closeMobileNav();
        else if (event.key === "Tab") trapMobileNavFocus(event);
      }
    });
    mobileMedia.addEventListener("change", () => {
      closeMobileNav();
      if (!mobileMedia.matches) setDesktopNavCollapsed(study.classList.contains("nav-collapsed"));
      else updateStudyPosition({replaceRoute: false});
      backButton.textContent = mobileMedia.matches ? "课程" : "换科目";
      syncRecallTargets();
    });

    window.addEventListener("popstate", applyLocation);
    window.addEventListener("pageshow", () => closeMobileNav({restoreFocus: false}));
    closeMobileNav();
    backButton.textContent = mobileMedia.matches ? "课程" : "换科目";
    applyLocation();

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js", {updateViaCache: "none"}).catch(() => {});
      });
    }
  </script>
</body>
