<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>计算机刷题器</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="筛选和操作" aria-hidden="true" tabindex="-1" inert>
      <div class="drawer-head">
        <strong>计算机刷题器</strong>
        <button class="icon-btn" id="drawer-close" aria-label="关闭">×</button>
      </div>

      <section class="drawer-section">
        <div class="drawer-title">科目</div>
        <div class="drawer-list" id="drawer-subjects"></div>
      </section>

      <section class="drawer-section">
        <div class="drawer-title">题型</div>
        <div class="drawer-list" id="drawer-types"></div>
      </section>

      <section class="drawer-section">
        <div class="drawer-title">来源</div>
        <div class="drawer-list" id="drawer-sources"></div>
      </section>

      <section class="drawer-section">
        <div class="drawer-title">章节</div>
        <div class="drawer-list drawer-list-compact" id="drawer-chapters"></div>
      </section>

      <section class="drawer-section">
        <div class="drawer-title">数据</div>
        <div class="drawer-list">
          <button class="drawer-action" id="export-wrong">导出错题本</button>
          <button class="drawer-action" id="export-flags">导出纠错标记</button>
          <button class="drawer-action" id="export-progress">导出进度</button>
          <button class="drawer-action" id="import-progress">导入进度</button>
          <button class="drawer-action" id="restore-progress">恢复导入前进度</button>
          <button class="drawer-action danger" id="reset">重置进度</button>
        </div>
      </section>
    </aside>

    <div class="drawer-mask" id="drawer-mask" aria-hidden="true"></div>

    <main class="main" id="app-main">
      <header class="topbar" id="topbar">
        <div class="topbar-row">
          <button class="icon-btn" id="drawer-toggle" aria-label="打开筛选和操作菜单" aria-controls="drawer" aria-expanded="false">☰</button>
          <select id="subject-select" aria-label="科目"></select>
          <span class="mini-stat" id="mini-stat">0/0 · 0%</span>
          <button class="icon-btn" id="stats-toggle" aria-label="收起统计" aria-controls="stats" aria-expanded="true">▾</button>
        </div>
        <div class="stats" id="stats">
          <span>已做 <b id="stat-done">0</b></span>
          <span class="ok">对 <b id="stat-correct">0</b></span>
          <span class="ng">错 <b id="stat-wrong">0</b></span>
          <span>正确率 <b id="stat-rate">0%</b></span>
          <span class="ng">错题本 <b id="stat-wrongbook">0</b></span>
        </div>
        <div class="progress" id="progress" role="progressbar" aria-label="当前范围完成进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="progress-fill"></div></div>
      </header>

      <p style="margin:8px 14px"><a href="./notes.html" style="color:#2563eb">📚 打开讲义三色笔记</a></p>
      <nav class="mode-tabs" aria-label="刷题模式">
        <button class="mode active" data-mode="home" aria-pressed="true">总览</button>
        <button class="mode" data-mode="seq" aria-pressed="false">顺序</button>
        <button class="mode" data-mode="rnd" aria-pressed="false">随机</button>
        <button class="mode" data-mode="review" aria-pressed="false">复习</button>
        <button class="mode" data-mode="wrong" aria-pressed="false">错题本</button>
        <button class="mode" data-mode="fav" aria-pressed="false">收藏</button>
      </nav>

      <section class="quick-filters" aria-label="搜索">
        <input id="search-input" type="search" aria-label="搜索题干、选项和解析" placeholder="搜索题干、选项、解析..." autocomplete="off">
        <button id="clear-search" class="secondary-btn" type="button">清除</button>
      </section>
      <section class="active-filters hidden" id="active-filters" aria-label="当前筛选条件"></section>

      <section id="card-area"></section>
    </main>
  </div>

  <input id="progress-file" type="file" accept="application/json,.json" hidden>
  <div class="sr-only" id="answer-live" role="status" aria-live="assertive" aria-atomic="true"></div>
  <script src="./build-meta.js"></script>
  <script src="./questions.js"></script>
  <script src="./question-media.js"></script>
  <script src="./app.js"></script>
</body>
</html>
