:"超格","type":"单选","chapter":"第二篇 编程·单选0110","stem":"需求分析最终结果是产生（ ）。","options":{"A":"项目开发计划","B":"需求规格说明书","C":"设计说明书","D":"可行性分析报告"},"answer":"B","explanation":"","subject":"编程语言","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s1-q13","source":"超格","type":"单选","chapter":"第二篇 编程·单选0110","stem":"软件详细设计的主要任务是确定每个模块的（ ）。","options":{"A":"功能","B":"外部接口","C":"算法和使用的数据结构","D":"编程"},"answer":"C","explanation":"冯·诺依曼首次提出存储程序计算机体系结构，是计算机之父。","subject":"计算机基础","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s1-q14","source":"超格","type":"单选","chapter":"第二篇 编程·单选0110","stem":"软件文档是软件工程实施中的重要部分，它不仅是软件开发各阶段的重要依据，\n而且也影响软件的（ ）。","options":{"A":"可理解性","B":"可维护性","C":"可扩展性","D":"可移植性"},"answer":"A","explanation":"冯·诺依曼提出的体系结构（存储程序、二进制、五大部件）至今仍是主流。","subject":"计算机基础","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s1-q15","source":"超格","type":"单选","chapter":"第二篇 编程·单选0110","stem":"软件测试的目的是（ ）。","options":{"A":"评价软件的质量","B":"发现软件的错误","C":"找出软件的所有错误","D":"证明软件是正确的"},"answer":"B","explanation":"冯·诺依曼定义计算机由运算器、控制器、存储器、输入设备、输出设备五大部件组成。","subject":"计算机基础","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s1-q16","source":"超格","type":"单选","chapter":"第二篇 编程·单选0110","stem":"在集合（联合）测试中，测试的主要目的是发现（ ）阶段的错误。","options":{"A":"软件计划","B":"需求分析","C":"设计","D":"编码"},"answer":"D","explanation":"存储程序和程序控制：将程序存入内存，由控制器自动取指令逐条执行。","subject":"计算机基础","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s1-q17","source":"超格","type":"单选","chapter":"第二篇 编程·单选0110","stem":"在软件工程中，只根据程序的功能说明而不关心程序的内部逻辑的测试方法，\n称为（ ）。","options":{"A":"白盒法","B":"灰盒法","C":"黑盒法","D":"综合法"},"answer":"C","explanation":"存储程序控制是计算机自动执行的根本原因（冯·诺依曼原理）。","subject":"计算机基础","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s1-q18","source":"超格","type":"单选","chapter":"第二篇 编程·单选0110","stem":"（ ）阶段是软件生命期中花费最多，持续时间最长的阶段。","options":{"A":"需求分析","B":"维护","C":"设计","D":"测试"},"answer":"B","explanation":"控制器（CU）从内存取指令、解码、发出控制信号，是计算机的指挥中心。","subject":"计算机基础","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s2-q1","source":"超格","type":"多选","chapter":"第二篇 编程·单选0110","stem":"软件生存周期一般包括三个周期：软件定义期、软件开发期和软件运行期，下列\n不是软件开发期所应包含的活动的是（ ）。","options":{"A":"需求获取和需求建模","B":"软件维护","C":"可行性分析","D":"软件体系结构分析和数据设计"},"answer":"ABC","explanation":"ABC 都不是软件开发期活动：A 在需求分析期、B 在运行期、C 在定义期；D 才是开发期的设计活动。","subject":"计算机基础","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s2-q2","source":"超格","type":"多选","chapter":"第二篇 编程·单选0110","stem":"黑盒测试是根据软件的规格说明来设计测试。常用的黑盒测试方法有边界值分析、\n（ ）。","options":{"A":"等价类划分","B":"错误猜测","C":"因果图","D":"α 测试 E. β 测试"},"answer":"ABC","explanation":"内存相对外存：速度快、容量小、价格高、寻址受地址总线限制。","subject":"计算机基础","source_chapter":"第二篇 编程·单选0110"},{"id":"cg-06-s1-q1","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"第一台电子计算机的英文缩写名是（ ）。","options":{"A":"EDSAG","B":"ENIAC","C":"EDVAG","D":"UNIAC"},"answer":"B","explanation":"ENIAC（埃尼阿克）是 1946 年世界上第一台电子数字计算机。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q2","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"1946 年世界上有了第一台电子数字计算机，奠定了至今仍然在使用的计算机\n（ ）。","options":{"A":"外型结构","B":"总线结构","C":"存取结构","D":"体系结构"},"answer":"D","explanation":"1946 年 ENIAC 奠定了冯·诺依曼体系结构这一计算机基本架构。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q3","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"一般按照（ ），将计算机的发展划分为四代。","options":{"A":"体积的大小","B":"速度的快慢","C":"价格的高低","D":"使用元器件的不同"},"answer":"D","explanation":"计算机分代依据是采用的电子元器件：电子管→晶体管→集成电路→大规模集成电路。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q4","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"关于电子计算机的特点，以下论述错误的是（ ）。","options":{"A":"运算速度快","B":"具有记忆和逻辑判断能力","C":"运算精度高","D":"运行过程不能自动连续进行，需人工干预"},"answer":"D","explanation":"计算机能自动连续执行程序无需人工干预，这正是其特点之一。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q5","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机的发明和发展首先是为了（ ）。","options":{"A":"科学计算","B":"信息处理","C":"人工智能","D":"实时控制"},"answer":"A","explanation":"计算机最初为军用弹道计算（如 ENIAC），其首要应用领域是科学计算。","subject":"信息基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q6","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机应用领域里，（ ）是其最广泛的应用方面。","options":{"A":"过程控制","B":"科学计算","C":"数据处理","D":"计算机辅助系统"},"answer":"C","explanation":"需求分析的核心是搞清\"软件做什么\"，再展开输入、界面、规模等细节。","subject":"编程语言","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q7","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列关于个人计算机的叙述中，错误的是（ ）。","options":{"A":"个人计算机的英文缩写是PC","B":"个人计算机称为微机","C":"世界上第一台计算机是个人计算机","D":"个人计算机是以微处理器为核心的计算机"},"answer":"C","explanation":"世界第一台计算机 ENIAC 是巨型机，不是个人计算机；PC 是 1970 年代后才出现。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q8","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"气象部门利用计算机处理大量气象数据，属于计算机应用中的（ ）。","options":{"A":"虚拟现实","B":"科学计算","C":"自动控制","D":"辅助教学"},"answer":"B","explanation":"气象数据处理涉及大量数值计算，属于科学计算应用领域。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q9","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机根据运算速度，存储能力，功能强弱，配套设备等因素可划分为（ ）。","options":{"A":"台式计算机、便携式计算机、膝上型计算机","B":"电子管、晶体管、集成电路","C":"巨型机、大型机、中型机、小型机和微型机","D":"8 位机、16 位机、32 位机、64 位机"},"answer":"C","explanation":"按运算速度、存储容量、功能强弱划分为：巨型机、大型机、中型机、小型机、微型机。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q10","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"未来计算机的发展趋势是（ ）。","options":{"A":"巨型化、微型化、网络化、智能化、多媒体化","B":"巨型化、大型化、中型化、小型化、微型化","C":"巨型化、微型化、网络化、自动化、多功能化","D":"巨型化、大型化、网络化、智能化、自动化"},"answer":"A","explanation":"未来计算机发展五大方向：巨型化、微型化、网络化、智能化、多媒体化。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q11","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机系统中，硬件与软件的关系是（ ）。","options":{"A":"整体与部分的关系","B":"固定不变的关系","C":"逻辑功能等价的关系","D":"相辅相成、缺一不可的关系"},"answer":"D","explanation":"硬件是基础，软件指挥硬件，二者相辅相成、缺一不可。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q12","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"“神威·太湖之光”属于下列哪种类型计算机？（ ）","options":{"A":"微型","B":"小型","C":"中型","D":"巨型"},"answer":"D","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q13","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"世界上首次提出“存储程序”计算机体系结构的是（ ）。","options":{"A":"艾仑·图灵","B":"冯·诺依曼","C":"莫奇莱","D":"比尔·盖茨"},"answer":"B","explanation":"冯·诺依曼首次提出存储程序计算机体系结构，是计算机之父。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q14","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"电子计算机技术在半个世纪中虽有很大进步，但至今其运行仍遵循着一位科学家\n提出的基本原理，他就是（ ）。","options":{"A":"牛顿","B":"爱因斯坦","C":"爱迪生","D":"冯·诺依曼"},"answer":"D","explanation":"冯·诺依曼提出的体系结构（存储程序、二进制、五大部件）至今仍是主流。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q15","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"提出“计算机硬件由运算器、存储器、控制器、输入设备和输出设备等五大逻辑\n部件组成”的科学家是（ ）。","options":{"A":"牛顿","B":"摩尔","C":"比尔·盖茨","D":"冯·诺依曼"},"answer":"D","explanation":"冯·诺依曼定义计算机由运算器、控制器、存储器、输入设备、输出设备五大部件组成。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q16","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"“存储程序和程序控制”是指（ ）。","options":{"A":"事先编好程序","B":"把程序存储在计算机内存中","C":"事后编写程序","D":"将程序从存储位置自动取出并逐条执行"},"answer":"D","explanation":"存储程序和程序控制：将程序存入内存，由控制器自动取指令逐条执行。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q17","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机之所以能按人们的意图自动进行工作，最直接的原因是采用了（ ）。","options":{"A":"二进制","B":"高速电子元件","C":"程序设计语言","D":"存储程序控制"},"answer":"D","explanation":"存储程序控制是计算机自动执行的根本原因（冯·诺依曼原理）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q18","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机的硬件系统由五大部分组成，其中（ ）是整个计算机的指挥中心。","options":{"A":"运算器","B":"控制器","C":"接口电路","D":"系统总线"},"answer":"B","explanation":"控制器（CU）从内存取指令、解码、发出控制信号，是计算机的指挥中心。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q19","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机系统由（ ）组成。","options":{"A":"主机和系统软件","B":"硬件系统和软件系统","C":"CPU、存储器和 I/O 设备","D":"微处理器和软件系统"},"answer":"B","explanation":"完整计算机系统 = 硬件系统 + 软件系统。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q20","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"运算器的组成部分不包括（ ）。","options":{"A":"控制线路","B":"译码器","C":"加法器","D":"寄存器 B 运算器 算术逻辑单元（ALU）、累加寄存器、数据缓冲 寄存器、状态条件寄存器和控制线路 控制器 程序计数器、指令寄存器、指令译码器、时序 产生器和操作控制器"},"answer":"B","explanation":"运算器 算术逻辑单元（ALU）、累加寄存器、数据缓冲\n寄存器、状态条件寄存器和控制线路\n控制器 程序计数器、指令寄存器、指令译码器、时序\n产生器和操作控制器","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q21","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"通常所说的中央处理单元 CPU 是包括（ ）的部件。","options":{"A":"存储器和运算器","B":"控制器和运算器","C":"存储器和控制器","D":"主存储器和运算器"},"answer":"B","explanation":"CPU = 运算器（ALU）+ 控制器（CU）+ 寄存器组。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"dy-8289","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"高速缓冲存储器是为了解决（）。","options":{"A":"内存与辅助存储器之间速度不匹配问题","B":"CPU与辅助存储器之间速度不匹配间题","C":"CPU与内存储器之间速度不匹配问题","D":"主机与外设之间速度不匹配问题"},"answer":"C","explanation":"本题考查调整缓冲存储器的功能。高速缓冲存储器主要是用来在内存\n和CPU之间作数据缓冲的桥梁，解决CPU.与内存速度不匹配问题。故正确答案为 C。\n32.（答案A。解析：本题考查不同存储设备的存取周期。存取周期最短的是内存储器。B选项、\nC 选项和D选项都是外部存储器，所以存取周期相对较长。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"cg-06-s1-q23","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"平常所说的高速缓冲存储器是指（ ）。","options":{"A":"内存","B":"PC-133 内存","C":"Cache","D":"ROM"},"answer":"C","explanation":"Cache 即高速缓冲存储器，是 SRAM 制造的快速小容量存储器。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q24","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机的主机指的是（ ）。","options":{"A":"计算机的主机箱","B":"CPU 和内存储器","C":"运算器和控制器","D":"运算器和输入 / 输出设备"},"answer":"B","explanation":"计算机主机指 CPU + 内存（区别于外设）；主机箱是物理外壳。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q25","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"基本能决定整个计算机档次的是（ ）。","options":{"A":"网卡","B":"声卡","C":"硬盘","D":"CPU"},"answer":"D","explanation":"CPU 是计算机核心部件，决定计算机性能档次。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q26","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"对PC机，人们常提到的“Pentium IV”指的是（ ）。","options":{"A":"存储器","B":"内存品牌","C":"主板型号","D":"CPU类型"},"answer":"D","explanation":"Pentium IV 是 Intel 奔腾系列 CPU 的型号。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q27","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机将程序和数据同时存放在机器的（ ）中。","options":{"A":"存储器","B":"控制器","C":"输入 / 输出设备","D":"运算器"},"answer":"A","explanation":"存储程序原理：程序和数据都存放在存储器中，由 CPU 取出执行。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q28","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"RAM 和 ROM 分别是（ ）的英文缩写。","options":{"A":"外部存储器和内部存储器","B":"只读存储器和随机存储器","C":"内部存储器和外部存储器","D":"随机存储器和只读存储器"},"answer":"D","explanation":"RAM = Random Access Memory（随机存储器），ROM = Read Only Memory（只读存储器）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q29","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"ROM 中的信息（ ）。","options":{"A":"由生产厂家预先写入的","B":"在安装系统时写入的","C":"根据用户需求不同，有用户随时希望写入的","D":"有程序临时写入的"},"answer":"A","explanation":"ROM 中的程序由生产厂家在生产时一次性写入，用户无法修改。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q30","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在微机系统中，对输入输出设备进行管理的基本程序模块（BIOS）存放在\n（ ）。","options":{"A":"RAM 中","B":"ROM 中","C":"硬盘中","D":"寄存器中"},"answer":"B","explanation":"BIOS 是基本输入输出系统，固化在 ROM 中（断电不丢失），开机自检和引导。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q31","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"随机存储器的特点是（ ）。","options":{"A":"存储海量","B":"存储的信息，可以永久保存","C":"存储在其中的数据不能修改","D":"一旦断电，存储在其上的信息全部消失"},"answer":"D","explanation":"RAM 的特点是断电易失，存储的数据全部消失。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q33","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"近年来，固态硬盘 SSD 得到广泛应用，大有替代机械硬盘之势。下列属于固态\n硬盘的优点是（ ）。","options":{"A":"价格便宜","B":"容量大","C":"功耗低","D":"速度快"},"answer":"D","explanation":"SSD 相对机械硬盘最大优势是读写速度快、抗震、低功耗，但价格高、容量相对小。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q34","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机的内存储器比外存储器（ ）。","options":{"A":"便宜","B":"存储量大","C":"存取速度快","D":"虽然贵但能存储更多的信息"},"answer":"C","explanation":"内存（RAM）速度比外存（硬盘）快，但容量小、价高。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q35","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"（ ）只能从中读取代码，而不能以一般方式向其写入代码，但其中的内容在\n断电后仍然存在。","options":{"A":"只读存储器（ROM）","B":"软盘存储器","C":"随机读写存储器（RAM）","D":"硬盘存储器"},"answer":"A","explanation":"ROM 只读不写，断电不丢失，符合描述。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q36","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列关于存储器的说法，正确的是（ ）。","options":{"A":"存储器分为内存储器和外存储器","B":"存储器分为软盘和硬盘","C":"磁带与光盘不属于存储器","D":"数据只能存放在内存储器中"},"answer":"A","explanation":"存储器按位置分内存储器（RAM/ROM）和外存储器（硬盘、光盘等）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q37","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"某台计算机配置的 512MB 内存指的是（ ）。","options":{"A":"ROM","B":"RAM","C":"软盘","D":"硬盘"},"answer":"B","explanation":"电脑配置的 512MB 内存指的是 RAM（运行内存）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q38","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"硬盘在自检时出现“喀、喀、喀”周期性噪音，导致硬盘出现此故障的原因不可\n能是（ ）。","options":{"A":"硬盘未接上电源","B":"硬盘的机械控制部分有问题","C":"硬盘的传动臂有问题","D":"盘片有严重问题"},"answer":"A","explanation":"硬盘工作需要电源，未通电时不会出现机械噪音。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q39","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"通常所说 1.44M 软磁盘，1.44M 指的是（ ）。","options":{"A":"厂商代号","B":"商标号","C":"磁盘流水编号","D":"磁盘容量"},"answer":"D","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q40","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机的存储器系统采用层次结构，一般由（ ）组成。","options":{"A":"RAM、ROM、CD-ROM","B":"高速缓存、内存、外存","C":"软盘、硬盘、光盘","D":"高速缓存、寄存器、硬盘"},"answer":"B","explanation":"存储层次：高速缓存（Cache）→ 内存（RAM）→ 外存（硬盘），按速度递减、容量递增。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q41","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"微型计算机中，I/O设备的含义是（ ）。","options":{"A":"输入设备","B":"输出设备","C":"输入/输出设备","D":"控制设备"},"answer":"C","explanation":"I/O = Input/Output，输入/输出设备。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q42","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列设备不是计算机输出设备的是（ ）。","options":{"A":"打印机","B":"鼠标","C":"显示器","D":"绘图仪"},"answer":"B","explanation":"鼠标是输入设备；打印机/显示器/绘图仪都是输出设备。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q43","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"CPU 不能直接访问的存储器是（ ）。","options":{"A":"内存储器","B":"外存储器","C":"ROM","D":"RAM"},"answer":"B","explanation":"CPU 直接访问内存（RAM/ROM/Cache），外存需通过内存中转。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q44","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"相同容量的计算机的内存储器比外存储器（ ）。","options":{"A":"更便宜","B":"能存储更多的信息","C":"较贵，但速度快","D":"以上说法都不对"},"answer":"C","explanation":"内存比外存读写快很多，但容量小且单位价格高。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q45","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"如果电脑光驱正在读盘时，误操作被打开导致蓝屏故障，一般是由于（ ）\n引起的。","options":{"A":"电脑读取数据出错","B":"感染计算机病毒","C":"系统硬件冲突","D":"注册表被损坏"},"answer":"A","explanation":"","subject":"信息安全","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q46","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"BIOS 设置程序主要对计算机的（ ）进行管理和设置，使系统运行在最好的\n状态下，使用 BIOS 设置程序还可以排除系统故障或者诊断问题。","options":{"A":"基本输入输出系统","B":"硬件系统","C":"软件系统","D":"应用系统"},"answer":"A","explanation":"BIOS 是基本输入输出系统，存于 ROM，开机自检和管理硬件。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q47","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机中，条码阅读器属于（ ）。","options":{"A":"输入设备","B":"存储设备","C":"输出设备","D":"计算设备"},"answer":"A","explanation":"条码阅读器把条码图像转为电信号输入计算机，属于输入设备。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q48","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在下列设备中，属于输入设备的是（ ）。","options":{"A":"话筒","B":"打印机","C":"显示器","D":"音箱"},"answer":"A","explanation":"话筒采集声音信号输入电脑，属于输入设备。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q49","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列不属于人机交互输入设备的是（ ）。","options":{"A":"鼠标","B":"打印机","C":"键盘","D":"触摸屏"},"answer":"B","explanation":"打印机是输出设备，鼠标/键盘/触摸屏都是输入设备。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q50","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"若将纸质照片转化为电子照片，可使用的设备是（ ）。","options":{"A":"显示器","B":"扫描仪","C":"打印机","D":"投影仪"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q51","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"输入设备是从计算机外部向计算机内部传送信息的装置，下列属于常用的输入\n设备的是（ ）。","options":{"A":"键盘，鼠标，显示器和麦克风","B":"显示器，打印机，绘图仪和扫描仪","C":"键盘，鼠标，光笔和扫描仪","D":"显示器，打印机，投影仪和音箱"},"answer":"C","explanation":"C 项全是输入设备：键盘、鼠标、光笔、扫描仪。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q52","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列物质中不能存储信息的是（ ）。","options":{"A":"磁盘","B":"磁带","C":"录音机","D":"U 盘"},"answer":"C","explanation":"录音机是设备/工具，本身不是存储介质；磁盘、磁带、U盘都是存储介质。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q53","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"显示器最重要的性能指标是（ ）。","options":{"A":"点距","B":"像素","C":"分辨率","D":"显示屏大小"},"answer":"C","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q54","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"一台安装有 WIN7 系统的双核电脑，平时使用基本正常，看电影或处理照片时\n都没有出现过死机，但只要一玩 3D 游戏就容易死机，此时应重点检查（ ）。","options":{"A":"内存","B":"网卡","C":"显卡","D":"风扇"},"answer":"C","explanation":"玩 3D 游戏对显卡负载最大，3D 时死机重点排查显卡。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q55","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"出版社收到了某作家的一部唱片小说手稿，打算排版印刷。把手写稿转换成电\n子稿最合适的方法是（ ）。","options":{"A":"通过若干熟练打字员手工录入","B":"用扫描仪进行扫描后，再用光学字符识别软件进行识别","C":"采用激光照排","D":"用方正书版进行排版"},"answer":"B","explanation":"扫描成图像后用 OCR 识别成可编辑文字，是最常见的手稿数字化方法。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q56","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"衡量打印机的质量常用“DPI”来衡量，这里“DPI”的含义是（ ）。","options":{"A":"打印机的速度","B":"打印纸的宽度","C":"每英寸打印的点数","D":"打印机的类型"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q57","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"喷墨打印机使用的打印耗材是（ ）。","options":{"A":"硒鼓","B":"色带","C":"墨盒","D":"墨水"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q59","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机中，总线的英文术语是（ ）。","options":{"A":"BUS","B":"UBS","C":"UPS","D":"BBS"},"answer":"A","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q60","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"按照总线上传输信息的不同，总线可分为多种类型，不属于总线的是（ ）。","options":{"A":"交换总线","B":"数据总线","C":"地址总线","D":"控制总线"},"answer":"A","explanation":"总线按用途分数据总线、地址总线、控制总线三类，没有\"交换总线\"。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q61","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"（ ）决定了 CPU 与外部 Cache、主存及输入输出设备之间进行一次数据传\n输的信息量。","options":{"A":"地址总线宽度","B":"数据总线宽度","C":"工作电压","D":"外部工作频率"},"answer":"B","explanation":"数据总线宽度（位数）决定一次能传输多少比特，即每次传输的信息量。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q62","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"一台计算机的主存储器的大小，主要与下列（ ）有关。","options":{"A":"数据总线","B":"控制总线","C":"地址总线","D":"逻辑总线"},"answer":"C","explanation":"地址总线宽度决定可寻址的内存大小（n 位地址 = 2^n 字节最大）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"dy-23834","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列关于计算机系统的说法中，正确的是（）。","options":{"A":"在计算机系统中，不可缺少的是摄像头","B":"用户在使用CD-ROM时也能让其感染计算机病毒","C":"U盘在出厂已经固化，在使用过程中不会染上病毒","D":"以上都不对"},"answer":"D","explanation":"计算机系统由硬件系统和软件系统组成，摄像头属于硬件系统中输人\n设备中的一种，并不是不可缺少的，A选项错误；用户使用的只读光盘CD-ROM上的软件数据\n是光盘制造使用专用设备写到盘片上的，用户使用的时候只能读出光盘上的软件数据，不能向\n光盘存储新的数据和文件，所以CD-ROM在使用过程中不会被病毒传染，B选项错误；病毒可以\n通过U盘等移动存储设备进行传染，C选项错误。故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"cg-06-s1-q64","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列关于计算机的叙述，不正确的是（ ）。","options":{"A":"运算器主要由一个加法器、若干个寄存器和一些控制线路组成","B":"一个字节等于八个二进制位","C":"CPU 是计算机的核心部件","D":"磁盘存储器只是一种输出设备"},"answer":"D","explanation":"磁盘存储器既能存又能读，是存储设备而非单纯输出设备。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q65","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"微型计算机与外部设备之间的信息传输方式有（ ）。","options":{"A":"仅串行方式","B":"串行方式或并行方式","C":"连接方式","D":"仅并行方式"},"answer":"B","explanation":"微机与外设可串行（一位一位传）也可并行（多位同时传）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"dy-35245","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"在系统软件中，操作系统是最核心的系统软件，它是（）。","options":{"A":"软件和硬件的接口","B":"源程序和目标程序之间的接口","C":"用户和计算机的接口","D":"外设和主机之间的接口"},"answer":"C","explanation":"操作系统（OperatingSystem，简称OS）是管理和控制计算机硬件与软\n作系统的支持下才能运行。操作系统具有处理机管理，存储器管理，设备管理和文件管理的功能；\n此外，操作系统也是用户和计算机的接口。故正确答案为C。\n当多个程序同时运行时，解决处理器（CPU）时间的分配问题。（2）作业管理。完成某个独立\n任务的程序及其所需的数据组成一个作业。作业管理的任务主要是为用户提供一个使用计算机的\n界面，使其方便地运行自已的作业，并对所有进人系统的作业进行调度和控制，尽可能高效地利\n用整个系统的资源。（3）存储器管理。为各个程序及其使用的数据分配存储空间，并保证它们\n互不干扰。（4）设备管理。根据用户提出使用设备的请求进行设备分配，同时还能随时接收设\n备的请求（称为中断），如要求输人信息。（5）文件管理。主要负责文件的存储、检索、共享\n和保护，为用户提供文件操作的方便。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"cg-06-s1-q67","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列常用手机软件中，属于系统软件的是（ ）。","options":{"A":"QQ","B":"Android","C":"支付宝","D":"微信"},"answer":"B","explanation":"Android 是手机系统软件（操作系统）；其他都是应用软件。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q68","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机软件可分为系统软件和应用软件，按此分类方式，下列与其他三项不属\n于同一软件类型的是（ ）。","options":{"A":"暴风影音","B":"美图秀秀","C":"声卡驱动","D":"会声会影"},"answer":"C","explanation":"声卡驱动是系统软件（驱动程序），其余三个是应用软件（多媒体类）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q69","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"某学校的学生档案管理程序属于（ ）。","options":{"A":"图形处理软件","B":"字处理软件","C":"系统软件","D":"应用软件"},"answer":"D","explanation":"学生档案管理程序是为特定业务开发的应用软件。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q70","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"组成计算机系统的元素中，（ ）是指描绘系统的使用或操作的描述性信息。","options":{"A":"硬件","B":"文档","C":"数据库","D":"规程"},"answer":"B","explanation":"文档是描述系统使用/操作的描述性信息，区别于硬件、数据和规程。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q71","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列软件可用于下载的是（ ）。","options":{"A":"Flash","B":"ACDsee","C":"WinZip","D":"Thunder"},"answer":"D","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q72","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列描述中，正确的是（ ）。","options":{"A":"软件是程序、数据与相关文档的集合","B":"软件开发不受计算机系统的限制","C":"软件既是逻辑实体，又是物理实体","D":"程序就是软件"},"answer":"A","explanation":"软件 = 程序 + 数据 + 文档，缺一不可。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q73","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列有关软件的描述，不正确的是（ ）。","options":{"A":"软件就是为方便使用计算机和提高使用效率而组织的程序以及有关文档","B":"所谓“裸机”，就是没有安装软件的计算机","C":"FoxPro 和 Oracle 属于数据库管理系统，从某种意义上讲也是编程语言","D":"软件安装的越多，计算机的性能就越好"},"answer":"D","explanation":"软件并非装得越多越好，反而可能拖慢系统、占用资源、增加冲突。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q74","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"常用软件Excel属于（ ）。","options":{"A":"应用软件","B":"系统软件","C":"管理软件","D":"网络软件"},"answer":"A","explanation":"Excel 是 Office 套件中的应用软件。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q75","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"所谓“裸机”是指（ ）。","options":{"A":"单片机","B":"单板机","C":"不装备任何软件的计算机","D":"只装备操作系统的计算机"},"answer":"C","explanation":"裸机指未安装任何软件的计算机硬件本身。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q76","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列关于操作系统的叙述，正确的是（ ）。","options":{"A":"操作系统是可有可无的","B":"应用软件是操作系统的基础","C":"操作系统是一种系统软件","D":"操作系统上能控制软件"},"answer":"C","explanation":"操作系统是必不可少的核心系统软件，应用软件都建在 OS 之上。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q77","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机内部用来传送、存储，加工处理的数据或指令使用的是（ ）。","options":{"A":"八进制","B":"十六进制","C":"十进制","D":"二进制"},"answer":"D","explanation":"计算机内部所有信息都以二进制（0/1）方式表示和处理。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q78","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"现代计算机采用二进制数是因为（ ）。","options":{"A":"二进制数代码表示简短、易读","B":"进制数物理上容易实现且简单可靠，运算规则简单，适合逻辑运算","C":"二进制数容易阅读，不易出错","D":"二进制数只有 0、1 两个符号，容易书写"},"answer":"B","explanation":"二进制只有 0/1 两态，可用电压高低/有无表示，物理实现简单可靠，且符合逻辑代数。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q79","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机领域，常用“主频”来描述计算机的（ ）。","options":{"A":"运算速度","B":"可靠性","C":"可运行性","D":"可扩充性"},"answer":"A","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q80","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机进行数值运算时的高精确度主要取决于下列哪个指标？（ ）","options":{"A":"计算速度","B":"内存容量","C":"外存容量","D":"基本字长"},"answer":"D","explanation":"字长决定一次能处理的二进制位数，是计算精度的关键指标。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q81","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"设任意一个十进制整数 D 转换成对应的无符号二进制整数 B，那么就这两个数\n字的长度（即位数）而言，B 与 D 相比（ ）。","options":{"A":"B 的数字位数一定小于 D 的数字位数","B":"B 的数字位数一定大于 D 的数字位数","C":"B 的数字位数小于或等于 D 的数字位数","D":"B 的数字位数大于或等于 D 的数字位数"},"answer":"D","explanation":"二进制位数 ≥ 十进制位数（如 9 → 1001，9 是 1 位，1001 是 4 位）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q82","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"101101B 表示一个（ ）进制数。","options":{"A":"二","B":"十","C":"八","D":"任意"},"answer":"A","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q83","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"十进制数 100 转换成二进制数是（ ）。","options":{"A":"01101001","B":"01100101","C":"01100111","D":"01100100"},"answer":"D","explanation":"100 = 64+32+4 = 1100100B = 01100100B（8 位补 0）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"dy-57183","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"用8位无符号二进制数能表示的最大十进制数整数为（）。","options":{"A":"127","B":"128","C":"255","D":"256"},"answer":"C","explanation":"在计算机数值表示中，用8个二进制位表示整数，通常用最高位表示\n符号位。题干说明“无符号”，因此8个二进制位能表示的最大整数为11111111，转换成十进制\n后即为255。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"cg-06-s1-q85","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机的存储单元中存储的（ ）。","options":{"A":"只能是数据","B":"可以是数据或指令","C":"只能是指令","D":"只能是字符"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q86","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"每秒钟完成基本加法指令的数目用来表示计算机的（ ）。","options":{"A":"运算速度","B":"内存的多少","C":"CPU的主频","D":"数值计算"},"answer":"A","explanation":"MIPS（每秒百万指令数）衡量运算速度。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q87","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机进行数据存储的基本单位是（ ）。","options":{"A":"二进制位","B":"字节","C":"字","D":"字长"},"answer":"B","explanation":"字节（Byte）是计算机存储的基本单位，1 字节 = 8 位。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q88","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"通常用 TB、GB、KB、MB 作为存储容量单位，它们之间的大小关系是（ ）。","options":{"A":"KB< MB< GB<TB","B":"KB<GB <MB<TB","C":"TB<MB <KB<GB","D":"TB<MB <GB<KB"},"answer":"A","explanation":"存储单位换算：1KB < 1MB < 1GB < 1TB（每级 2^10 倍）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q89","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"一张存储卡剩余容量为 4.7G，最多还能存储大小为 480M 的视频数是（ ）。","options":{"A":"8","B":"9","C":"10","D":"11"},"answer":"C","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q90","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机中表示存储容量时，1 兆（M）是（ ）。","options":{"A":"1000KB","B":"1024KB","C":"1024B","D":"1024000"},"answer":"B","explanation":"计算机中 1MB = 2^10 KB = 1024KB。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q91","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"如果一个存储单元格能存放一个字节，那么一个32KB的存储器共有（ ）个存\n储单元。","options":{"A":"32000","B":"32768","C":"32767","D":"65536"},"answer":"B","explanation":"32KB = 32 × 1024 = 32768 字节，每字节一个存储单元。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q92","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列诸因素中，对微型计算机工作影响最小的是（ ）。","options":{"A":"尘土","B":"噪声","C":"温度","D":"湿度"},"answer":"B","explanation":"对计算机正常运行影响最大的是温度、湿度、灰尘；噪声对硬件影响最小。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q93","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"若十进制数据为137.625，则其二进制数为（ ）。","options":{"A":"10001001.11","B":"10001001.101","C":"10001011.101","D":"1011111.101"},"answer":"B","explanation":"137 = 10001001B；0.625 = 0.5+0.125 = 0.101B → 10001001.101B。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q94","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"小王同学学习了十六进制，十进制和八进制后写了一个等式：72-50=20。要使这\n等式成立，则72、50、20有可能分别为（ ）。","options":{"A":"十进制、十进制、十六进制","B":"十进制、十六进制、八进制","C":"十六进制、八进制、十进制","D":"十进制、八进制、十六进制"},"answer":"D","explanation":"72(D)=72，50(O)=40，72-40=32，32 ≠ 20(H)=32。72-50=22? 试 D-O-H：72-50=72-40=32，32(D)=20(H)。✓","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q95","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"十进制数 215 用二进制数表示是（ ）。","options":{"A":"1100001","B":"11010111","C":"1101001","D":"0011001"},"answer":"B","explanation":"215 = 128+64+16+4+2+1 = 11010111B。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q96","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下面几个不同进制的数中，最小的数是（ ）。","options":{"A":"二进制数 1011100","B":"十进制数 35","C":"八进制数 47","D":"十六进制数 2E"},"answer":"B","explanation":"换十进制：A=92, B=35, C=39, D=46。最小是 35（B）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q97","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"十进制数 15.25 转换为二进制数为（ ）。","options":{"A":"1111.11","B":"1011.11","C":"1011.01","D":"1111.01"},"answer":"D","explanation":"15 = 1111B；0.25 = 0.01B → 1111.01B。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q98","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"与二进制数 11111110 值的十进制数是（ ）。","options":{"A":"251","B":"252","C":"253","D":"254"},"answer":"D","explanation":"11111110B = 128+64+32+16+8+4+2 = 254。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q99","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"与十进制数 30 等值的二进制数是（ ）。","options":{"A":"10111","B":"10101","C":"11110","D":"10011"},"answer":"C","explanation":"30 = 16+8+4+2 = 11110B。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q100","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"十进制数 13 转化成二进制数是（ ）。","options":{"A":"1101","B":"1011","C":"1001","D":"1100"},"answer":"A","explanation":"13 = 8+4+1 = 1101B。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q101","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"与十进制数 20 等值的二进制数是（ ）。","options":{"A":"10110","B":"10100","C":"11110","D":"10010"},"answer":"B","explanation":"20 = 16+4 = 10100B。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q102","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"十进制数 101 转换成二进制数是（ ）。","options":{"A":"01101001","B":"01100101","C":"01100111","D":"01100110"},"answer":"B","explanation":"101 = 64+32+4+1 = 01100101B。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q103","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"二进制数 1111011111 换成十进制数为（ ）。","options":{"A":"900","B":"991","C":"990","D":"999"},"answer":"B","explanation":"1111011111B = 512+256+128+64+16+8+4+2+1 = 991。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q104","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"十进制数 21 转化为等值的八进制数是（ ）。","options":{"A":"21","B":"23","C":"25","D":"27"},"answer":"C","explanation":"21÷8 = 2余5, 2÷8 = 0余2 → 25Q（八进制）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q105","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"十进制数 45 转换成二进制数是（ ）。","options":{"A":"100101","B":"101101","C":"1111111","D":"11111111"},"answer":"B","explanation":"45 = 32+8+4+1 = 101101B。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q106","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"二进制数 11101111 对应的十六进制数为（ ）。","options":{"A":"EF","B":"ED","C":"AC","D":"BE"},"answer":"A","explanation":"11101111B 分两组：1110=E, 1111=F → EF。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q107","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"英文字符在微型机中存储时用（ ）位二进制数编码。","options":{"A":"2","B":"4","C":"6","D":"8"},"answer":"D","explanation":"ASCII 用 7 位编码，存储时通常用 1 字节即 8 位。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q108","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"计算机中广泛使用的信息交换符号编码是（ ）。","options":{"A":"机器码","B":"汉字编码","C":"ASCII 码","D":"BCD 码"},"answer":"C","explanation":"ASCII（美国信息交换标准代码）是计算机最广泛使用的字符编码。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q109","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"按 16×16 点阵存放 4000 个汉字，所需存储空间最接近的是（ ）。","options":{"A":"128KB","B":"256KB","C":"512KB","D":"1MB"},"answer":"A","explanation":"16×16 点阵 = 32 字节/汉字 × 4000 = 128000 字节 ≈ 125KB ≈ 128KB。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q110","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"输出汉字字形的清晰度与（ ）有关。","options":{"A":"不同的字体","B":"汉字的笔画","C":"汉字点阵的规模","D":"汉字的大小"},"answer":"C","explanation":"","subject":"办公软件","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q111","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机中，字符一般是按其对应的 ASCII 码值进行大小比较的，下列字符\n按 ASCII码大小顺序排列正确的是（ ）。","options":{"A":"“A”>“a”>“1”","B":"“a”>“1”>“A”","C":"“a”>“A”>“1”","D":"“1”>“a”>“A”"},"answer":"C","explanation":"ASCII 中 \"a\"=97 > \"A\"=65 > \"1\"=49。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q112","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下面 ASCII 码值的比较，正确的是（ ）。","options":{"A":"“a”比“h”大","B":"“a”比“A”大","C":"“9”比“D”大","D":"“1”比“a”大"},"answer":"B","explanation":"ASCII：\"a\"=97 > \"A\"=65。其余比较均不成立。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q113","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"用于输出汉字的编码一般用点阵实现。如果用 24×24 点阵表示一个汉字，则\n计算机中存储该汉字字型需要使用（ ）字节。","options":{"A":"36","B":"48","C":"72","D":"576"},"answer":"C","explanation":"24×24 点阵 = 576 位 = 576/8 = 72 字节。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q114","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"用计算机输入汉字“中”，则“中”的汉字机内码占（ ）个字节。","options":{"A":"1","B":"2","C":"3","D":"4"},"answer":"B","explanation":"汉字机内码每个汉字占 2 字节（双字节编码）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q115","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"一个汉字的机内码与它的国标码之间的差是（ ）。","options":{"A":"2020H","B":"4040H","C":"8080H","D":"A0AOH"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q116","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"大写字母 A 的 ASCII 为 1000001，则大写字母 C 的编码是（ ）。","options":{"A":"1000010","B":"1000011","C":"1000100","D":"1000101"},"answer":"B","explanation":"ASCII 中字母连续：A=1000001, B=1000010, C=1000011。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q117","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下面哪一个不是计算机上使用的汉字编码？（ ）","options":{"A":"字形码","B":"外码","C":"内码","D":"条码"},"answer":"D","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q118","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"2KB容量的存储空间，最多可以存储（ ）个汉字。","options":{"A":"1","B":"2","C":"1024","D":"2048"},"answer":"C","explanation":"汉字占 2 字节，2KB = 2048 字节，可存 2048÷2 = 1024 个汉字。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q119","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"标准 ASCII 码字符集共有编码（ ）个。","options":{"A":"128","B":"48","C":"64","D":"32"},"answer":"A","explanation":"标准 ASCII 用 7 位二进制，共 2^7 = 128 个字符。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q120","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"在计算机中，对汉字进行传输、处理和存储时使用汉字的（ ）。","options":{"A":"字形码","B":"国标码","C":"输入码","D":"机内码"},"answer":"D","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q121","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"五笔汉字属于（ ）。","options":{"A":"汉字输入码","B":"汉字机内码","C":"ASCII码","D":"汉字国标码"},"answer":"A","explanation":"五笔字型是常用的汉字输入码（敲键盘输入用），不是机内存储编码。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q122","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"用户可以通过电子公告系统（ ）同未曾谋面的朋友聊天、讨论问题、洽谈\n商务，获得帮助或者向其他人提供信息。","options":{"A":"QQ","B":"Email","C":"BBS","D":"WWW"},"answer":"C","explanation":"BBS 是电子公告系统的英文缩写，可让陌生人发帖讨论。QQ/Email 是聊天/邮件，WWW 是万维网。","subject":"信息基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q123","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"某学校的计算机的配置为\n“Intel Pentium E5400S 2.7G/2048M/1000G/DVD±RW/20”，其中通常用来表示内\n存大小的是（ ）。","options":{"A":"Intel Pentium E5400S 2.7G","B":"2048M","C":"1000G","D":"20”"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q124","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"笔记本电脑连接投影仪时，笔记本电脑显示正常，大屏幕不显示内容，原因是\n（ ）。","options":{"A":"笔记本电脑感染病毒","B":"没有接下笔记本电脑上的切换键","C":"投影仪分辨率过高","D":"笔记本电脑配置过低"},"answer":"B","explanation":"","subject":"信息安全","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q125","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"云盘具有安全稳定等特点，它是互联网上的（ ）。","options":{"A":"计算工具","B":"存储工具","C":"交流工具","D":"购物工具"},"answer":"B","explanation":"云盘是基于互联网的存储服务（如百度网盘）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q126","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"（ ）院士主持的计算机汉字激光照排系统迎来了中国印刷业“告别铅与火，\n迈入光与电”的时代。","options":{"A":"求伯君","B":"袁隆平","C":"王选","D":"王永民"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q127","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"下列不可能是多媒体计算机出现无声现象的原因是（ ）。","options":{"A":"声卡损坏","B":"扬声器损坏","C":"显示器处于屏保状态","D":"音量控制处于静音状态"},"answer":"C","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s1-q128","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0110","stem":"关于计算机保护的常识，不正确的是（ ）。","options":{"A":"计算机在运行过程中，不能任意搬动，以避免伤害硬盘和光盘驱动器","B":"有灰尘或粗劣的光盘不应放在光驱内使用，否则会影响光驱的使用年限","C":"键盘内进水，只要将键盘擦干就可以继续使用，不会造成键盘损坏","D":"显示器在高温下使用或在太阳下晒，会影响显示器的使用寿命"},"answer":"C","explanation":"键盘进水后必须断电拆开晾干清洗，否则会短路损坏。C 错。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q1","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"关于世界上公认的第一台电子计算机的说法，正确的有（ ）。","options":{"A":"世界上公认的第一台电子计算机诞生于 1946 年","B":"世界上公认的第一台电子计算机是由德国研制的","C":"世界上公认的第一台电子计算机使用的是晶体管","D":"世界上公认的第一台电子计算机的名字叫埃尼阿克（ENIAC）"},"answer":"AD","explanation":"ABC 都不是软件开发期活动：A 在需求分析期、B 在运行期、C 在定义期；D 才是开发期的设计活动。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q2","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"与外存相比，计算机内存的特点有（ ）。","options":{"A":"速度快","B":"容量小","C":"价格高","D":"受地址总线限制"},"answer":"ABCD","explanation":"内存相对外存：速度快、容量小、价格高、寻址受地址总线限制。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q4","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"属于 CAD 的应用领域有（ ）。","options":{"A":"辅助机械设计","B":"辅助建筑设计","C":"辅助教学设计","D":"辅助平面布景设计"},"answer":"ABD","explanation":"","subject":"教学论","source_chapter":"第三篇 数据库网络·0110"},{"id":"dy-53653","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"根据计算机的性能划分，可以将计算机分为（）等几类。","options":{"A":"巨型机","B":"大型机","C":"小型机","D":"微型机"},"answer":"ABCD","explanation":"计算机根据运算速度、存储能力、功能强弱、配套设备等因素（即\n计算机性能）可划分为：巨型机、大型机、中型机、小型机和微型机。A选项，巨型机其特点是最强、\n最快、最贵，适用在“高、精、尖”领域（科学研究和武器研究）；B选项，大型机运算速度快、\n存储容量大，允许多用户同时使用；C选项，小型机支持十几个用户使用，简单实用，适用于中\n小规模企业使用；D选项，微型机是20世纪70年代新机种，即我们熟悉的PC（个人计算机）。\n故正确答案为ABCD。","subject":"其他","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"cg-06-s2-q6","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"关于当今计算机的发展趋势，下面叙述正确的是（ ）。","options":{"A":"当今计算机正朝着单极化的方向发展，即巨型化","B":"智能计算机是未来计算机发展的总趋势","C":"非冯·诺依曼体系结构是提高计算机性能的另一研究焦点","D":"计算机与通信相结合的网络技术是今后计算机应用的主流"},"answer":"BCD","explanation":"计算机正向\"巨、微、网、智、多\"五个方向多极发展，A 单极说法错。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q7","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"计算机体系由（ ）两大部分组成。","options":{"A":"系统软件","B":"应用软件","C":"硬件系统","D":"软件系统"},"answer":"CD","explanation":"计算机系统 = 硬件系统 + 软件系统。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q8","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"1946 年问世的首台计算机至现代的微机型均属于冯·诺依曼体系结构，该体系\n结构的计算机引进的重要概念是（ ）。","options":{"A":"采用二进制","B":"存储程序","C":"指令系统","D":"ASCII 编码"},"answer":"ABC","explanation":"冯·诺依曼体系核心：二进制、存储程序、指令系统。ASCII 是后来的字符编码标准。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q9","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"关于“指令”“指令系统”的说法，正确的有（ ）。","options":{"A":"指令等同于计算机语言","B":"指令通常由操作码和操作数组成","C":"操作码规定计算机进行何种操作","D":"基本指令的集合就是指令系统"},"answer":"BCD","explanation":"","subject":"编程语言","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q10","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"CPU 可以进行的主要运算包括（ ）。","options":{"A":"文本运算","B":"算术运算","C":"逻辑运算","D":"物理运算"},"answer":"BC","explanation":"CPU 主要执行算术运算和逻辑运算（ALU 即算术逻辑单元）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q11","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"按存储介质分类，存储器可分为（ ）。","options":{"A":"半导体存储器","B":"随机存储器","C":"顺序存储器","D":"磁表面存储器"},"answer":"AD","explanation":"按存储介质分：半导体存储器、磁表面存储器、光存储器。B/C 是按访问方式分类。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q12","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"下列属于内存储器的是（ ）。","options":{"A":"ROM","B":"RAM","C":"HOD （部门经理）","D":"Cache"},"answer":"ABD","explanation":"内存包括 ROM、RAM、Cache。HOD 不是存储术语。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q13","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"系统总线按其传输信息的不同可分为（ ）。","options":{"A":"数据总线","B":"资源总线","C":"地址总线","D":"控制总线"},"answer":"ACD","explanation":"系统总线按功能分数据总线、地址总线、控制总线三类。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q14","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"在下列输入方式中，属于模式识别输入方式的是（ ）。","options":{"A":"手写输入","B":"键盘输入","C":"扫描仪输入","D":"语音输入"},"answer":"ACD","explanation":"模式识别输入需要计算机对图形/语音进行识别：手写、扫描、语音都属于；键盘输入是直接编码不属于。","subject":"信息基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"dy-55192","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列计算机术语中，显示系统的主要性能指标有（）。","options":{"A":"内存容量","B":"显示分辨率","C":"颜色质量","D":"刷新速度"},"answer":"BCD","explanation":"A选项，内存容量属于内存储器的性能指标。B选项，显示分辨率\n指屏幕像素的点阵，像素越多，画面就越精细。C选项，颜色质量一般分为16位与32位，表示\n颜色的渐变度；位数越高，拥有的颜色就越多。D选项，刷新速度是指每分钟内屏幕画面更新的\n次数，刷新频率越高，屏幕上图像闪烁感就越小，稳定性也就越高。故正确答案为BCD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"cg-06-s2-q16","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"以下哪些是激光打印机的优点？（ ）","options":{"A":"打印速度快","B":"工作噪声低","C":"打印成本低","D":"打印分辨率高"},"answer":"ABCD","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q17","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"关于计算机系统的说法，正确的有（ ）。","options":{"A":"计算机硬件系统由主机、键盘、显示器组成","B":"计算机软件系统由系统软件和应用软件组成","C":"硬件系统在程序控制下，只负责实现数据输入、处理与输出任务","D":"软件系统除了保证硬件功能的发挥之外，还为用户提供一个宽松的工作环境"},"answer":"BD","explanation":"BD 正确：硬件系统 = 主机+外设（不止键盘显示器）；C 错（硬件还要做存储等）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q18","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"关于计算机的硬件组成，下列说法正确的是（ ）。","options":{"A":"键盘是输入设备，打印机是输出设备，它们都是计算机的外部设备","B":"显示器既是输入设备，又是输出设备，如自动取款机的应用","C":"ROM BIOS 中的程序是计算机制造商写入的，用户一般不能更改其中内容","D":"打印机是输出设备，扫描仪是输入设备"},"answer":"ACD","explanation":"ACD 正确：B 错，普通显示器只是输出设备（带触摸屏才双向）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-06-s2-q19","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"以光盘的形式发行的电子图书集文字、图像、声音、动画和视频于一身，具有\n（ ）等特点。","options":{"A":"容量大","B":"体积小","C":"成本低","D":"色彩单一"},"answer":"ABC","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0110"},{"id":"dy-22418","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列数字中，可能是八进制数的是（）。","options":{"A":"136","B":"B23","C":"310","D":"268"},"answer":"AC","explanation":"八进制数的数码包括0、1、2、3、4、5、6、7，不会出现比7大的数码，\n排除BD。故正确答案为AC。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"cg-06-s2-q22","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0110","stem":"计算机内部直接表示和使用的数据有（ ）。","options":{"A":"数值数据","B":"字符数据","C":"逻辑数据","D":"模拟信号"},"answer":"AC","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0110"},{"id":"cg-08-s1-q1","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"学校网站上有很多教师制作的微视频，供同学们下载学习，这主要体现了网络的\n（ ）功能。","options":{"A":"数据通信","B":"资源共享","C":"自动控制","D":"分布处理"},"answer":"B","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q2","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"计算机网络的传输介质中性能最好、应用最广泛的一种是（ ）。","options":{"A":"无线电波","B":"光纤","C":"同轴电缆","D":"双绞线"},"answer":"B","explanation":"光纤具有带宽大、抗干扰强、误码低、距离远等优势，是当前主流。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q3","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下面哪个网络是Internet的最早雏形？（ ）","options":{"A":"NSFNET","B":"CERNET","C":"ARPANET","D":"CSTNET"},"answer":"C","explanation":"ARPANET（1969）是 Internet 的前身，由美国国防部高级研究计划局建立。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q4","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下述哪一个电缆类型支持最大的电缆长度？（ ）","options":{"A":"无屏蔽双绞线 ——100m","B":"屏蔽双绞线 ——100m","C":"粗同轴电缆 ——500m","D":"细同轴电缆——185m"},"answer":"C","explanation":"粗同轴电缆最大段长 500m，最长。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q5","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"与导线相比，不属于光纤优点的是（ ）。","options":{"A":"光纤不会引起电磁干扰也不会被干扰","B":"光纤的价格比较便宜，使用寿命比较长","C":"光纤传输信号的误码率低","D":"光纤可在单位时间内传输比导线更多的信息"},"answer":"B","explanation":"光纤价格相对较高（特别是早期），不是它的优点。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q6","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"以下关于四个图标描述正确的是（ ）。","options":{"A":"无线局域网、有线、蓝牙、红外线","B":"红外线、有线、蓝牙、无线局域网","C":"有线、无线局域网、红外线、蓝牙","D":"无线局域网、有线、红外线、蓝牙"},"answer":"D","explanation":"图标顺序辨认：D 选项排列正确（无线/有线/红外/蓝牙）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q7","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"有关集线器说法不正确的是（ ）。","options":{"A":"集线器只能提供信号的放大功能，不能中转信号","B":"集线器可以堆叠级联使用，线路总长度不能超过以太网最大网段长度","C":"集线器只包含物理层协议","D":"使用集线器的计算机网络中，当一方在发送时，其他机器不能发送"},"answer":"A","explanation":"集线器是一个中继器，会放大并广播信号到所有端口，不仅放大还转发。A 错。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q8","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"计算机网络中，可以共享的资源是（ ）。","options":{"A":"硬件和软件","B":"软件和数据","C":"外设和数据","D":"硬件、软件和数据"},"answer":"D","explanation":"计算机网络可共享硬件、软件和数据三大类资源。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q9","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在网络连接设备中，（ ）的主要用途是接收网络传输介质中的数据信号，复\n制再生这些信号，确保这些信号能正常的继续传输。","options":{"A":"集线器","B":"中继器","C":"路由器","D":"交换机"},"answer":"B","explanation":"中继器（Repeater）放大再生信号，延长传输距离。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q10","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"计算机网络从逻辑上可分为通信子网和资源子网两大部分。以下属于资源子网\n的是（ ）。","options":{"A":"转发器","B":"交换机","C":"主机","D":"集中器"},"answer":"C","explanation":"资源子网包括各种主机和终端，提供数据资源。通信子网含交换机、路由器等。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q11","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"局域网与广域网是通过以下哪种网络设备实现的？（ ）","options":{"A":"网络交换机","B":"网卡","C":"路由器","D":"服务器"},"answer":"C","explanation":"路由器连接不同网络（如局域网与广域网），是网间互联的核心设备。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q12","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"路由器用于连接异构的网络，它收到一个 IP 数据报后要进行许多操作，这些\n操作不包含（ ）。","options":{"A":"域名解析","B":"路由选择","C":"帧格式转换","D":"IP 数据报的转发"},"answer":"C","explanation":"路由器工作在网络层（IP），不做帧格式转换；帧由数据链路层处理。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q13","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"（ ）是工作在链路层的网络组件，是局域网中连接计算机和传输介质的接口，\n不仅能实现与局域网传输介质之间的物理连接和电信号匹配，还涉及帧的发送与接收，\n帧的封装与拆装，介质之间控制数据的编码与解码以及数据缓存的功能等。","options":{"A":"设备控制器","B":"网络适配器","C":"中继器","D":"转发器"},"answer":"B","explanation":"网络适配器（网卡）工作在数据链路层，处理帧的封装/拆装、收发。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q14","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"可以跨网络交流的网络设备是（ ）。","options":{"A":"集线器","B":"中继器","C":"路由器","D":"交换器"},"answer":"C","explanation":"路由器跨网络转发数据，集线器/中继器只在同一网络内工作。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q15","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"目前网络应用系统采用主要模型是（ ）。","options":{"A":"个人计算型","B":"主机计算模型","C":"客户机 / 服务器计算模型","D":"网络 / 文件服务器计算模型"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q16","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下列关于局域网特点的说法中不正确的是（ ）。","options":{"A":"传输速率高，1MB/s~1GB/s","B":"局域网不会被病毒感染","C":"常用的拓扑结构有：总线型、星型、环型","D":"局域网通常归属一个单一的组织所管理"},"answer":"B","explanation":"局域网也会被病毒感染，B 错。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q17","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"按照网络的拓扑结构划分，Internet 属于（ ）。","options":{"A":"总线型网络结构","B":"树型网络结构","C":"星型网络结构","D":"网状网络结构"},"answer":"D","explanation":"Internet 是网状结构（多路径互连），冗余高、可靠。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q18","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"网络的物理拓扑结构可分为（ ）。","options":{"A":"星型、环型、树型和路径型","B":"星型、环型、路径型和总线型","C":"星型、环型、局域型和广域型","D":"星型、环型、树型和总线型"},"answer":"D","explanation":"物理拓扑：星型、环型、树型、总线型、网状型等。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q19","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"按照通信距离划分，我国的电话交换网属于（ ）。","options":{"A":"广域网","B":"局域网","C":"城域网","D":"区域网"},"answer":"A","explanation":"电话交换网覆盖全国，属广域网。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q20","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"OSI 参考模型中的网络层的功能主要是由网络设备（ ）来实现的。","options":{"A":"网关","B":"网卡","C":"网桥","D":"路由器"},"answer":"D","explanation":"OSI 网络层主要由路由器实现（IP 转发）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q21","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"关于 TCP/IP 参考模型的描述中，正确的是（ ）。","options":{"A":"采用七层网络体系结构","B":"传输层只提供 TCP 服务","C":"物理层是参考模型的最高层","D":"网络层的核心协议是 IP 协议"},"answer":"D","explanation":"TCP/IP 参考模型 4 层，物理层最底层，传输层有 TCP/UDP，网络层核心是 IP。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"dy-61448","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"TCP/IP模型中，网络层的功能不包括（）。","options":{"A":"负责计算机之间的通信","B":"处理来自传输层的分组发送请求","C":"将数据根据报文发给适合的网络接口","D":"提供一一些常用的应用程序"},"answer":"A","explanation":"WAV波形文件，特点是可以很逼真地再现原始声源的效果，它常常\n用于音乐、歌曲等自然声的录制。MIDI也称为乐器数字接口，只能记录乐器的声音；MP3格式\n能够以高音质、低采样率对数字音频文件进行压缩；AIF是音频互交换文件格式。故正确答案为A。\n27.【答案A。解析：音频的数字化过程包括采样、量化和编码三个步骤。故正确答案为A。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"cg-08-s1-q23","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"以太网物理地址长度是（ ）位。","options":{"A":"32","B":"48","C":"64","D":"128"},"answer":"B","explanation":"以太网 MAC 地址 6 字节 = 48 位。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q24","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"当数据由计算机 A 传送至计算机 B 时，不参与数据封装工作的是（ ）。","options":{"A":"物理层","B":"数据链路层","C":"应用层","D":"网络层"},"answer":"A","explanation":"数据封装由各层添加自己的头：应用→传输→网络→链路。物理层负责传输比特流，不参与封装。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q25","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"网络协议是（ ）之间进行通信的规则或约定。","options":{"A":"同一结点上下层","B":"不同结点","C":"相邻实体","D":"不同结点对等实体"},"answer":"D","explanation":"","subject":"算法与数据结构","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q26","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在 Internet 上浏览器和 WWW 服务器之间传输网页使用协议是（ ）。","options":{"A":"DNS","B":"HTTP","C":"FTP","D":"Telnet"},"answer":"B","explanation":"HTTP（超文本传输协议）是浏览器与 Web 服务器之间的协议。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q27","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"TCP 协议的主要功能是（ ）。","options":{"A":"数据交换","B":"分配 IP 地址","C":"路由控制","D":"实现应用程序之间的可靠通信"},"answer":"D","explanation":"TCP 提供可靠、面向连接的字节流通信，应用程序之间的可靠传输。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q28","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下列安全协议中，（ ）能保证交易双方无法抵赖。","options":{"A":"SET","B":"HTTPS","C":"PGP","D":"MOSS"},"answer":"A","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q29","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"卫星通信是（ ）向空间的扩展。","options":{"A":"中波通信","B":"短波通信","C":"微波接力通信","D":"红外线通信"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q30","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"网络中发生了拥塞，根据是（ ）。","options":{"A":"随着通信子网的负载的增加，吞吐量也增加","B":"网络结点接收和发出的分组越来越少","C":"网络结点接收和发出的分组越来越多","D":"随着通信子网的负载的增加，吞吐量反而降低"},"answer":"D","explanation":"","subject":"算法与数据结构","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q31","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"Internet 采用的协议是（ ）。","options":{"A":"HTTP","B":"TCP/IP","C":"HTML","D":"FTP"},"answer":"B","explanation":"TCP/IP 是 Internet 通用协议。HTTP/FTP 是应用层协议，HTML 是标记语言。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"zg-52300","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"下列选项中不属于计算机网络通信协议的是（ ）。","options":{"A":"TCP/IP","B":"ROM/RAM","C":"IPX/SPX","D":"NETBEUI"},"answer":"B","explanation":"常用的网络协议有：\nTCP/IP：传输控制协议/互联网络协议，作为互联网的基础协议；\nIPX/SPX：Internet 分组交换/顺序分组交换协议；\nNETBEUI：NetBIOS 用户扩展接口协议，它是 NetBIOS 协议的增强版本，曾被许多操作系统采用，\n例如 Windows for Workgroup、Win 9x 系列、Windows NT 等。\n选项 B 不属于计算机网络通信协议，ROM 指的是只读存储器，RAM 是随机存取存储器。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"cg-08-s1-q33","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在协议分层实现中，当数据分组从设备 A 传输到设备 B 时，在设备 A 的第 3\n层加上首部分会在设备 B 的（ ）层被读出。","options":{"A":"2","B":"3","C":"4","D":"5"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q34","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在物理层接口特性中用于描述完成每种功能的事件发生顺序的是（ ）。","options":{"A":"机械特性","B":"功能特性","C":"过程特性","D":"电气特性"},"answer":"C","explanation":"过程特性描述时序，即每种功能完成的事件发生顺序。","subject":"编程语言","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q35","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在使用家用电话拨号上网的数据通信过程中，将模拟信号还原成数字信号的过程\n为（ ）。","options":{"A":"调制","B":"解调","C":"流量控制","D":"差错控制"},"answer":"B","explanation":"","subject":"编程语言","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q36","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在 Internet 上进行文件上传和下载服务的协议是文件传输协议，英文缩写是\n（ ）。","options":{"A":"TCP","B":"IP","C":"FTP","D":"HTTP"},"answer":"C","explanation":"FTP = File Transfer Protocol 文件传输协议。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q37","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"若要将计算机与局域网连接，至少需要具有的硬件是（ ）。","options":{"A":"集线器","B":"网关","C":"网卡","D":"路由器"},"answer":"C","explanation":"网卡（网络适配器）是接入局域网最基本的硬件。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"dy-94481","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"FTP、HTTP、URL、HTML对应的中文术语是：（）。","options":{"A":"JavaScript既能应用于客户端，也可用于服务器端","B":"JavaScript在不同操作系统中的移植性较差，主要在Windows、Linux平台下运行","C":"JavaScript是一种脚本语言，可以与HTML结合使用，通过在网页上添加各种动态效果、 交互功能和实时更新，提供更好的用户体验","D":"JavaScript弥补了HTML无法实现动态交互效果的缺点。 二、 多选器"},"answer":"D","explanation":"扩展名为.mpg，.rmvb，.avi，.flv，mov，.wmv等文件都是视频文件。\nTIF是一种比较灵活的图像格式。故正确答案为D。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"cg-08-s1-q39","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"某协议的主要功能是完成对数据包的确认、流量控制和网络拥塞；自动检测数\n据包，并提供错误重发的功能，该协议的简称是（ ）。","options":{"A":"HTTP","B":"SMTP","C":"TCP","D":"POP"},"answer":"C","explanation":"TCP 提供确认、流控、拥塞控制、重传等可靠传输机制。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q40","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"有关网络常见术语的描述正确的是（ ）。","options":{"A":"SMTP 协议用于发送邮件到收件人的电脑","B":"HTTPS 是一种加密的超文本传输协议","C":"网页内容经常用 URL 来描述","D":"浏览网页经常使用 ftp 协议"},"answer":"B","explanation":"HTTPS 是加密的 HTTP（基于 SSL/TLS）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q41","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下列有关浏览器与网页、网络协议的说法，正确的是（ ）。","options":{"A":"SMTP 协议可以实现将发件人的邮件直接发送到收件人的计算机中","B":"通过“Web 档案，单个文件（*.mht）”方式保存网页，可以同时保存网页中的 图片","C":"Microsoft Edge 浏览器功能强大，可以使用该浏览器来制作网页","D":"HTML 协议是用于浏览器与 Web 服务器之间的信息传输"},"answer":"B","explanation":"*.mht 是 Web 单文件存档格式，可保存网页连同图片到一个文件。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q42","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"波特率等于（ ）。","options":{"A":"每秒传输的比特数","B":"每秒钟可能发生的信号变化的次数","C":"每秒传输的周期数","D":"每秒传输的字节数"},"answer":"B","explanation":"波特率（Baud）= 每秒信号变化次数（符号数），与每秒比特数（bps）不一定相等。","subject":"多媒体","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q43","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"校园内的各台计算机连接起来组成的计算机网络属于（ ）。","options":{"A":"广域网","B":"局域网","C":"宽带网","D":"小型网"},"answer":"B","explanation":"校园网是局限在一定地理范围（校园内）的局域网。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q44","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"计算机网络中，数据的传输速度常用的单位（ ）。","options":{"A":"bps","B":"MHZ","C":"Byte","D":"字符 / 秒"},"answer":"A","explanation":"网络速度常用单位 bps（bit per second），即每秒比特数。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q45","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"人们往往会用“我用的是 10M 宽带上网”来说明自己使用计算机连网的性能，\n这里“10M”指的是（ ）。","options":{"A":"最高数据传输速率","B":"实际数据传输速率","C":"误码率","D":"端到端延迟时间"},"answer":"A","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q46","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"衡量计算机网络中数据链路性能的重要指标之一是“带宽”，下面有关带宽的\n叙述中错误的是（ ）。","options":{"A":"数据链路的带宽是该链路的平均数据传输速率","B":"电信局声称 ADSL 下行速率为 2Mb/s，其实指的是带宽为 2Mb/s","C":"千兆校园网的含义是学校中大楼与大楼之间的主干通信线路带宽为 1Gb/s","D":"通信链路的带宽与采用的传输介质、传输技术和通信控制设备等密切相关"},"answer":"A","explanation":"带宽是数据链路的最大传输速率（峰值），不是平均值。A 错。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q47","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"目前在计算机广域网中主要采用（ ）技术。","options":{"A":"编码解码","B":"电路交换","C":"报文分组交换","D":"令牌总线"},"answer":"C","explanation":"广域网普遍采用报文/分组交换技术（如 TCP/IP），效率高于电路交换。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q48","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"一旦中心节点出现故障则整个网络瘫痪的局域网的拓扑结构是（ ）。","options":{"A":"星型结构","B":"树型结构","C":"总线型结构","D":"环型结构"},"answer":"A","explanation":"星型结构所有节点连到中心节点（如交换机），中心故障则全网瘫痪。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q49","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在 Internet 上，每一个结点都依靠唯一的（ ）相互区分和相互联系。","options":{"A":"IP 地址","B":"物理地址","C":"域名","D":"网关"},"answer":"A","explanation":"Internet 上每个节点用唯一 IP 地址区分。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q50","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"为了解决 IP 协议的地址紧缺、服务质量和安全性等问题，因特网工程任务组\n于 1990年着手研究 IP 协议升级问题，到 1995 年，通过了 IP 协议的第六版，简称\nIPv6，它的 IP 地址扩展到 128 个二进制位，总数达（ ）个。","options":{"A":"2 的 126 次方","B":"2 的 127 次方","C":"2 的 128 次方","D":"2 的 129 次方"},"answer":"C","explanation":"IPv6 地址 128 位，总数 2^128 个。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q51","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"为了解决全球网络中现有 IP 地址用尽的问题，科学家们提出了 IPv6 地址协\n议，规定一个 IPv6 地址由（ ）个字节表示。","options":{"A":"4","B":"6","C":"8","D":"16"},"answer":"D","explanation":"IPv6 地址 128 位 = 16 字节。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q52","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下列 IP 地址哪个是不合法的？（ ）","options":{"A":"192.168.10.1","B":"288.68.16.10","C":"61.142.192.68","D":"208.0.0.41"},"answer":"B","explanation":"IP 每段 0-255，288 超出范围非法。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q53","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"IP 地址中第一字节最高位为 0，则表示为（ ）。","options":{"A":"D 类地址","B":"A 类地址","C":"B 类地址","D":"C 类地址"},"answer":"B","explanation":"IP 第一字节最高位为 0 是 A 类（0xxxxxxx，1-126）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q54","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"一个网络的地址为 172.16.7.128/26，则该网络的广播地址是（ ）。","options":{"A":"172.16.7.255","B":"172.16.7.129","C":"172.16.7.191","D":"172.16.7.252"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q55","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"某学校网络中一台计算机的 IP 地址为：202.112.81.34，对应的子网掩码是\n255.255.255.0，该 IP 地址属于（ ）。","options":{"A":"A 类","B":"B 类","C":"C 类","D":"D 类"},"answer":"C","explanation":"202 在 192-223 范围，属 C 类地址（C 类首字节 192-223）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q56","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"信息技术老师给小明一个IP地址192.168.9.*56，其中“*”位置的数字有些模糊，\n你认为“*”位置的数字应该是（ ）。","options":{"A":"1","B":"2","C":"3","D":"4"},"answer":"A","explanation":"192.168.0.0/16 是私有网段，第三段 0-255 都合法但题目说\"模糊\"，从给定选项推应为 1。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q57","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在给主机设置 IP 地址时，哪一个能使用？（ ）","options":{"A":"29.9.255.15","B":"127.21.19.109","C":"192.5.91.255","D":"220.103.256.56"},"answer":"A","explanation":"127 是回环；192.5.91.255 是子网广播；220.103.256.56 中 256 非法。29.9.255.15 合法。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q58","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"IP地址分类中，B类网络最多只有（ ）网络号。","options":{"A":"126","B":"127","C":"256","D":"16383"},"answer":"D","explanation":"B 类网络号高 2 位 10，剩 14 位 → 2^14=16384，可用 16383 个网络号。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q59","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"192.168.0.12 属于（ ）。","options":{"A":"A 类地址","B":"B 类地址","C":"C 类地址","D":"D 类地址"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q60","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在 IP 地址中用来进行组播的 IP 地址是哪一类地址？（ ）","options":{"A":"A","B":"C","C":"D","D":"E"},"answer":"C","explanation":"D 类地址（224.0.0.0~239.255.255.255）专用于组播。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q61","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"为了便于寻址以及层次化构造网络，IP地址根据网络ID的不同分为5种类型。下\n列IP地址中不属于C类地址的是（ ）。","options":{"A":"192.168.1.10","B":"222.30.63.15","C":"127.0.0.1","D":"223.113.29.15"},"answer":"C","explanation":"127.0.0.1 是 A 类回环地址，不属 C 类。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q62","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"Internet 使用 TCP/IP 协议实现了全球范围的计算机网络的互连，连接在\nInternet 上的每一台主机都有一个 IP 地址，下面不能作为互联网上可用的 IP 地址\n的是（ ）。","options":{"A":"120.34.0.18","B":"21.18.33.48","C":"127.0.0.1","D":"201.109.39.68"},"answer":"C","explanation":"127.0.0.1 是本地回环地址，不能作为可对外使用的 IP。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q63","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"若两台主机在同一子网中，则两台主机IP地址分别与它们子网掩码相“与”的\n结果（ ）。","options":{"A":"为全0","B":"为全1","C":"相同","D":"不同"},"answer":"C","explanation":"同一子网中，IP 与子网掩码 \"与\" 后得到相同的网络号。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q64","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"主机 A 的 IP 为 202.96.128.130 子网掩码为 255.255.255.128，则该 IP 地\n址网络号为（ ）。","options":{"A":"202.96.128.130","B":"202.96.128.1","C":"202.96.128.255","D":"202.96.128.128"},"answer":"D","explanation":"202.96.128.130 与 255.255.255.128 按位与 = 202.96.128.128。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q65","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"以下地址中不可能是某台电脑主机 IP 地址中子网掩码的是（ ）。","options":{"A":"255.255.255.0","B":"255.255.0.0","C":"255.241.0.0","D":"255.255.254.0 C 二进制 十进制 00000000 0 00000001 1 00000010 2 00000100 4 00001000 8 00010000 16 00100000 32 01000000 64 10000000 128"},"answer":"C","explanation":"二进制 十进制\n00000000 0\n00000001 1\n00000010 2\n00000100 4\n00001000 8\n00010000 16\n00100000 32\n01000000 64\n10000000 128","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q66","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"负责中国地区域名分配与管理的机构是（ ）。","options":{"A":"ICANN","B":"IANA","C":"CERNET","D":"CNNIC"},"answer":"D","explanation":"CNNIC（中国互联网络信息中心）负责中国域名管理。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q67","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"浏览网页时，以“.gov”结束的网址，表示该网站属于（ ）。","options":{"A":"军方网站","B":"政府网站","C":"教育网站","D":"商业网站"},"answer":"B","explanation":".gov 表示政府机构（government）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q68","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"因特网中域名解析依赖于一棵由域名服务器组成的逻辑树。请问在域名解析过\n程中，请求域名解析的客户不需要知道以下（ ）信息。\nI. 本地域名服务器的名字\nII. 本地域名服务器父结点的名字\nIII. 域名服务器树根结点的名字","options":{"A":"I 和 II","B":"I 和 III","C":"II 和 III","D":"I、II 和 III"},"answer":"C","explanation":"客户端只需知道本地 DNS 服务器地址，不需要知道父节点和根节点名字。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q69","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"关于 Internet 域名系统的描述中，错误的是（ ）。","options":{"A":"域名解析需要一组既独立又协作的域名服务器","B":"域名服务器在逻辑上构成一定的层次结构","C":"域名解析总是从根域名服务器开始","D":"递归解析是域名解析的一种方式"},"answer":"C","explanation":"域名解析通常先查本地 DNS 缓存，再向上层请求；不一定从根开始。C 错。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q70","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"B 类地址172.1.0.0 使用子网掩码255.255.255.192 来划分子网，则理论上可\n以使用的网络数目和主机数分别为（ ）。","options":{"A":"512.126","B":"1000.62","C":"1024.62","D":"2.62"},"answer":"C","explanation":"B 类 172.1.0.0 主机号 16 位，掩码扩展到 26 位（255.255.255.192），子网号 10 位，主机号 6 位。子网数 2^10=1024，每子网主机 2^6-2=62。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q71","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在 IE 地址栏中输入人民网的 IP 地址“58.68.146.208”，可浏览该网站，但\n是当输入该网站的直接网址时，发现无法访问，造成这种现象最可能的原因是某一参数\n设置错误，该参数为（ ）。","options":{"A":"子网掩码","B":"默认网关","C":"IP 地址","D":"DNS 服务器"},"answer":"D","explanation":"IP 能通但域名不通 → DNS 服务器配置错误。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q72","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在 IE 浏览器中输入 IP 地址 202.196.200.23，可以浏览到某网站，但是当输\n入该网站的域名地址 www.CZIND. COM 却发现无法访问，可能的原因是（ ）。\n①该网络未能提供域名服务管理\n②该网络在物理层有问题\n③本机的 IP 设置有问题\n④本网段交换机的设置有问题","options":{"A":"①","B":"①②③","C":"①③","D":"①③④"},"answer":"A","explanation":"IP 通而域名不通，最可能是网络的 DNS 服务出问题或本机 DNS 设置不对。仅①符合。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q73","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"http：//www.China edu.cn 中代表国家的顶级域名是（ ）。","options":{"A":"WWW","B":"China","C":"edu","D":"cn"},"answer":"D","explanation":".cn 是中国的国家顶级域名。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q74","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"IP 地址是一串很难记忆的数字，于是人们开发了（ ），该系统给主机赋予\n一个用字母代表的名字，并负责 IP 地址名字之间的转化。","options":{"A":"DNS 域名系统","B":"Windows NT 系统","C":"UNIX 系统","D":"FTP 系统"},"answer":"A","explanation":"DNS 域名系统把字母域名转换为 IP 地址。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q75","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"使用 FTP 服务下载文件时，不需要知道的是（ ）。","options":{"A":"文件所在服务器的距离","B":"文件名称","C":"文件存放的服务器名称","D":"文件存放的目录路径"},"answer":"A","explanation":"FTP 下载只需知道服务器地址、目录、文件名，不需要知道距离。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q76","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下面（ ）不是当前主流的动态网页技术。","options":{"A":"JSP","B":"HTML","C":"ASP.NET","D":"PHP"},"answer":"B","explanation":"HTML 是静态标记语言；JSP/ASP.NET/PHP 都是动态网页技术。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q77","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"“http://www.baidu.com”中的 www 通常是指（ ）。","options":{"A":"域名服务器","B":"云服务器","C":"Web 服务器","D":"邮件服务器"},"answer":"C","explanation":"www 通常代表 Web 服务器（万维网）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q78","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"（ ）的投递与距离的远近没有关系，几乎是即发即收。","options":{"A":"普通邮件","B":"EMS","C":"电子邮件","D":"航空邮件"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q79","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"李老师制作自己个人主页并且加上他学校网址（www.tzschool.net）的超链接，\n在创建超链接对话框中他要输入 URL 应该是（ ）。","options":{"A":"http：//www.tzschool.net","B":"tzschool.net","C":"www.tzschool.net","D":"tzschool"},"answer":"A","explanation":"完整 URL 应包含协议（http://）+ 域名。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q80","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"以下操作，不一定能连接到因特网的是（ ）。","options":{"A":"使用 ADSL Modem 用正确账号拨号成功","B":"使用正确的密码加入本地 WIFI 热点","C":"连接已经联网的本地局域网","D":"连接本地局域网，设置网络中的有效代理服务器"},"answer":"B","explanation":"B 选项加入 WiFi 不一定能上网（路由器可能未联网）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q81","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"有关 FTP 的操作，以下哪个使用情境是不可能出现的？（ ）","options":{"A":"可以下载文件，但不能上传文件","B":"可以下载文件，也可以上传文件","C":"登录了 FTP 服务器，客户端显示一段问候的文字","D":"选择 FTP 中的某个文件，可以查看文档之前的版本"},"answer":"D","explanation":"FTP 不内置版本管理，无法查文档历史版本（需专门版本控制系统）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q82","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"E-mail 地址的格式由“用户名”和“域名”两部分组成，中间以（ ）分隔。","options":{"A":"@","B":"#","C":"$","D":"*"},"answer":"A","explanation":"邮箱地址格式：用户名@域名（如 abc@126.com）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q83","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"ISP 是网络服务供应商，个人用户向某 ISP 申请注册后，ISP（ ）。","options":{"A":"ISP 会向你提供上网账号、上网口令和域名服务器（DNS）地址","B":"ISP 只向你提供上网账号","C":"ISP 会向你提供上网的计算机","D":"ISP 只向你提供上网所需的域名服务器（DNS）地址"},"answer":"A","explanation":"ISP 提供上网账号、口令和 DNS 地址，使用户能拨号或宽带接入。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q84","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"电子邮件收件箱内带有回形针标志的邮件表示（ ）。","options":{"A":"该邮件已回复","B":"该邮件有附件","C":"该邮件未读","D":"该邮件为垃圾邮件"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q85","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"有一地址显示为http//www.yee21.cn/news/index.aspx，其中的：（1）http；\n（2）www. yee21.cn；（3）news；（4）index.aspx 是（ ）。","options":{"A":"（1）主机域名；（2）服务标志；（3）目录名；（4）文件名","B":"（1）服务标志；（2）目录名；（3）主机域名；（4）文件名","C":"（1）服务标志；（2）主机域名；（3）目录名；（4）文件名","D":"（1）目录名；（2）主机域名；（3）服务标志；（4）文件名"},"answer":"C","explanation":"URL 解析：http=服务标志，www.xxx.cn=主机域名，news=目录，index.aspx=文件名。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q86","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"如果申请了一个免费的电子信箱为 qwer@163.com，则该电子信箱的账号是\n（ ）。","options":{"A":"@qwer163.com","B":"qwer","C":"@qwer","D":"qwer.com"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q87","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"电子邮件服务的功能不包括（ ）。","options":{"A":"发邮件","B":"收邮件","C":"制作动画","D":"删除邮箱中的邮件"},"answer":"C","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q88","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"浏览 Web 网站必须使用浏览器，目前常用的浏览器是（ ）。","options":{"A":"Hotmail","B":"Outlook Express","C":"Inter Exchange","D":"Internet Explorer"},"answer":"D","explanation":"Internet Explorer（IE）是 Windows 自带浏览器。其他选项是邮件客户端。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q89","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"关于收发电子邮件，以下叙述正确的是（ ）。","options":{"A":"必须在固定的计算机上收发邮件","B":"向对方发送邮件时，不要求对方开机","C":"一次只能发给一个接收者","D":"发送邮件无需填写对方邮件地址"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q90","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"有关电子邮件的说法不正确的是（ ）。","options":{"A":"在发送电子邮件时，抄送、密送、分别发送都可以将一个邮件同时发送到多个不 同的邮箱","B":"在收件人框，抄送框和密送框中，都可以输入多个地址，多个地址用逗号来分隔","C":"电子邮件是一种即时通讯工具","D":"我们可以利用电子邮箱发送信件、图片、音乐等不同内容"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q91","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"电子邮件的发送需要（ ）协议实现局域间邮件传输，而（ ）协议实现\n邮局到用户之间数据传输。","options":{"A":"TCP/IP、SMTP","B":"POP3、SMTP","C":"SMTP、POP3","D":"SMTP、TCP/IP"},"answer":"C","explanation":"SMTP 用于客户机→邮件服务器（发送），POP3 用于服务器→客户机（接收）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q92","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"小娜的父母都因公在国外，她的班主任张老师非常想跟她的父母就像家长会那\n样实时交流小娜的学习情况，张老师知道可以借助网络来实现，又可避免昂贵的电话费\n用，您以为下列哪种工具不适合他们在线实时交流用？（ ）","options":{"A":"腾讯 QQ","B":"网易泡泡 ——绿色多媒体即时通讯工具","C":"E-mail","D":"MSN ——即时通讯软件"},"answer":"C","explanation":"","subject":"多媒体","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q93","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下列命令中，用于确定本地主机是否能与另一台主机成功交换数据报的是\n（ ）命令。","options":{"A":"ping","B":"ipconfig","C":"tracert","D":"netstat"},"answer":"A","explanation":"ping 通过 ICMP 测试目标主机是否可达。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q94","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"若在一个空旷区域内无法使用任何GSM手机进行通信，其原因最有可能是\n（ ）。","options":{"A":"该区域的地理特征使手机不能正常使用","B":"该区域没有建立GSM基站，或基站发生故障","C":"该区域没有建立移动电话交换中心","D":"该区域的信号被屏蔽"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q95","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"以下是组建计算机网络的一些基本步骤，请选出顺序排列（ ）。\n①安装计算机操作系统 ②准备和安装网络设备\n③授权网络资源共享 ④确定网络组建方案，绘制网络拓扑图\n⑤网络协议的选择与安装","options":{"A":"④②⑤①③","B":"④①②⑤③","C":"④③①②⑤","D":"④①③⑤②"},"answer":"B","explanation":"组网顺序：方案设计 → 装系统 → 装设备 → 装协议 → 共享资源。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q96","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"一个家庭为解决一台台式 PC 机和一台笔记本电脑同时上网问题，既方便又节\n省上网费用的方法是（ ）。","options":{"A":"申请两门电话，采用拨号上网","B":"申请两门电话，通过 ADSL 上网","C":"申请一门电话，再购置一台支持路由功能的交换机，交换机接入 ADSL，通过交 换机同时上网","D":"申请一门电话，一台通过 ADSL 上网，一台拨号上网"},"answer":"C","explanation":"买带路由器功能的设备分享一条 ADSL 给多设备使用，最划算。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q97","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"智能手机上“万能 WiFi 密匙”之类 APP 有一定规模的用户群，方便“蹭网”，\n它获取 WiFi 密码最方便的方式是（ ）。","options":{"A":"此类 APP 智能化程度比较高，可以容易地“算出”WiFi 密码","B":"“暴力”破解出 WiFi 密码","C":"秘密搜集可能的 WiFi 密码，“共享”给使用相同 APP 的其他人","D":"利用路由器漏洞进入管理后台，找出 WiFi 密码"},"answer":"C","explanation":"万能钥匙类 APP 收集用户分享的 WiFi 密码后供其他用户用，是\"众包共享\"。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q98","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"无线网络作为有线网络的补充，得到了广泛的应用。下列描述错误的是\n（ ）。","options":{"A":"目前主流无线路由器采用的是协议主要是 802.11 系列","B":"智能手机可以开启热点，供其他手机或笔记本上网","C":"为防止蹭网，可以设定无线路由器，只供特定的设备上网","D":"无线路由器天线越多，性能一定越好"},"answer":"D","explanation":"无线路由器性能不只看天线数，还看芯片、协议、信道，D 错。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q99","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下列关于网络和网页的说法，不正确的是（ ）。","options":{"A":"计算机网络技术是实现资源共享和信息交换的重要技术","B":"HTML 语言编写的文件可以通过浏览器解释执行","C":"超链接可能会链接到不安全的网站","D":"搜索引擎中输入的关键字越少，搜索到的信息条目越少"},"answer":"D","explanation":"搜索关键字越精确（多）搜得越准；少则越泛。D 表述错。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q100","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下列有关计算机网络和安全的说法中，正确的是（ ）。","options":{"A":"发现电脑感染了计算机病毒，立即删除可疑文件以清除病毒","B":"电子邮件中“密送”的目的是为了防止邮件在发送过程中丢失","C":"HTML 是超文本标记语言的简称，网页文件可以用记事本进行编辑","D":"只要密码长度足够且复杂程度高，就没有必要定期更改系统的密码"},"answer":"C","explanation":"","subject":"信息安全","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q101","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"<body> 标签中，（ ）属性规定了文档中活动的链接的颜色。","options":{"A":"alink","B":"Background","C":"Link","D":"Vlink"},"answer":"A","explanation":"","subject":"编程语言","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q102","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"HTML 文档头标签中，用于直接在 HTML 页面中为网页定义样式信息的是\n（ ）。","options":{"A":"<base>","B":"<script>","C":"<style>","D":"<title>"},"answer":"C","explanation":"<style> 标签在 HTML 头部内嵌 CSS 样式。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q103","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"网页中为实现特效，需要引入已有特效 JS 代码，下列选项用于引入特效代码\n文件“move.js”的 HTML 标签是（ ）。","options":{"A":"<embed src=“move.js”>","B":"<img src=“move.js”>","C":"<script src=“move.js”>","D":"<video src=“move.js”>"},"answer":"C","explanation":"<script src=\"...\"> 用于引入外部 JS 文件。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q104","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"下列网页代码必须运行在服务器端的是（ ）。","options":{"A":"CSS","B":"ASP","C":"JavaScript","D":"DHTML"},"answer":"B","explanation":"ASP（Active Server Pages）必须在服务器端运行，CSS/JS/DHTML 在客户端。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q105","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"以网页形式存储信息资源的WWW服务器又称为（ ）。","options":{"A":"主页","B":"底页","C":"网站","D":"IP"},"answer":"C","explanation":"提供 Web 服务的服务器或其上的网页集合称为网站。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q106","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在网站中实现网页之间的链接一般使用（ ）。","options":{"A":"动画效果","B":"反野功能","C":"超链接","D":"播放器"},"answer":"C","explanation":"超链接（hyperlink）实现网页之间跳转。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q107","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"某单位现需要为本单位建立一个主题网站，下面较为合理的信息集成过程是\n（ ）。\n①规划内容结构，收集加工素材\n②确定主题，设计目标\n③选择适当工具，实际制作\n④收集反馈，评价修正","options":{"A":"②①③④","B":"③②①④","C":"②①④③","D":"①③②④"},"answer":"A","explanation":"信息集成顺序：定主题→规划收集→工具制作→反馈修正。②①③④。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q108","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"使用 FrontPage 制作网页，想要了解浏览者的个人兴趣爱好，比如书法、写\n作、音乐等，通常采用表单中的（ ）。","options":{"A":"单选按钮","B":"复选框","C":"下拉菜单","D":"滚动文本框"},"
