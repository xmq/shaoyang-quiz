rce_chapter":"第七章 数据库技术"},{"id":"zg-53427","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"DB、DBMS 和 DBS 三者之间的关系是（ ）。","options":{"A":"DB 包括 DBMS 和 DBS","B":"DBS 包括 DB 和 DBMS","C":"DBMS 包括 DB 和 DBS","D":"不能相互包括"},"answer":"B","explanation":"数据库系统（DBS）是指在计算机系统中引入数据库后的系统。它由数据库\n（DB、数据）、数据库管理系统（DBMS、软件）、数据库管理员（DBA 人员）、应用系统、硬件平台等\n构成了一个完整的运行实体。所以 DBS 包括 DB 和 DBMS。数据库系统的核心是数据库管理系统，数\n据库管理系统的核心是数据库（数据）。数据库技术的根本目的是要解决数据共享问题。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-23130","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"工资在 600 元以上并且职称为工程师的纪录，逻辑表达式为（ ）。","options":{"A":"“工资”>600 OR 职称=“工程师”","B":"工资>600 AND 职称=工程师","C":"“工资”>600 AND “职称”=“工程师”","D":"工资>600AN D 职称=\"工程师\""},"answer":"D","explanation":"根据语法，AND 查询是：条件一 AND 条件二，字段名不用带引号，数据项\n除数值外需带单引号或双引号。工资、职称是字段名，不用带引号，工程师是数据项，需要带引号。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-19496","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"SQL 语言允许使用通配符进行字符串匹配的操作，其中‘%’可以表示（ ）。","options":{"A":"零个字符","B":"1 个字符","C":"多个字符","D":"以上都可以"},"answer":"B","explanation":"在 SQL 中‘%’通配符表示任意个字符，‘_’表示一个字符。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-21071","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"数据库系统的控制中枢是（ ）。","options":{"A":"数据库","B":"数据库管理系统","C":"数据库管理员","D":"数据库应用系统"},"answer":"B","explanation":"数据库系统一般由数据库、数据库管理系统（DBMS）、应用系统、数据库管\n理员和用户构成。数据库管理系统是一种操纵和管理数据库的大型软件，用于建立、使用和维护数据库，\n是数据库系统的基础和核心。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-17437","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"下列选项中，不属于三种常见的信息资源管理方法的是（ ）。","options":{"A":"人工管理","B":"文件管理","C":"数据库管理","D":"目录管理"},"answer":"D","explanation":"信息资源管理常见的 3 种方法是：手工管理、计算机文件系统管理和数据库\n管理，而目录管理是将文件的目录进行复制、备份等操作，不是常见的信息资源管理方法。","subject":"操作系统","source_chapter":"第七章 数据库技术"},{"id":"zg-87140","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"数据库系统是由（ ）组成的。","options":{"A":"数据库、数据库管理系统和用户","B":"数据文件、命令文件和报表","C":"数据库文件结构和数据","D":"常量、变量和函数"},"answer":"A","explanation":"数据库系统一般由数据库、数据库管理系统（DBMS）、应用系统、数据库管\n理员和用户构成，用来存储、管理、处理和维护数据的系统。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-11285","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"在 E-R 图中，用来表示实体关系的是（ ）。","options":{"A":"椭圆","B":"矩形","C":"菱形","D":"三角形"},"answer":"C","explanation":"在数据库的 E-R 图中，矩形框表示实体；用菱形框表示实体之间的联系；用\n椭圆形框表示属性。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-85081","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"用二维表结构表示实体以及实体间联系的数据模型称为（ ）。","options":{"A":"网状模型","B":"层次模型","C":"关系模型","D":"面向对象模型"},"answer":"C","explanation":"基本数据模型有层次模型､网状模型､关系模型。层次模型用树型（层次）结\n构表示实体类型以及实体间的联系；网状模型是用网状结构来表示；关系模型用表格形式结构来表示；\n面向对象模型用类及继承来表示实体及实体间的联系。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-13344","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"数据的逻辑独立性是指（ ）。","options":{"A":"数据与存储结构的逻辑独立性","B":"数据元素之间的逻辑独立性","C":"存储结构与物理结构的逻辑独立性","D":"数据与程序的逻辑独立性"},"answer":"D","explanation":"数据的逻辑独立性是指用户的应用程序与数据库的逻辑结构是相互独立的，\n是指当数据库的模式发生改变时，只需要改变存在于外模式和概念模式之间的映射转换，无需改变外模\n式或应用程序。即改变外模式/模式映像，即，当数据的逻辑结构改变时，用户程序也可以不变。因此 D\n正确。数据独立性包括数据的物理独立性和逻辑独立性。物理独立性是指用户的应用程序与存储在磁盘\n上的数据库中数据是相互独立的。即，数据在磁盘上怎样存储由 DBMS 管理，用户程序不需要了解，\n应用程序要处理的只是数据的逻辑结构，这样当数据的物理存储改变了，应用程序不用改变。A 是物理\n独立性。","subject":"算法与数据结构","source_chapter":"第七章 数据库技术"},{"id":"zg-51150","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"下列不属于数据库管理软件的是（ ）。","options":{"A":"Access","B":"Foxpro","C":"Oracle","D":"Excel"},"answer":"D","explanation":"A、B、C 均属于数据库管理软件，而 Excel 是电子表格软件。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-47275","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"下列二维表中有（ ）条记录。","options":{"A":"3","B":"4","C":"5","D":"6\n考号 姓名 性别\n001 李飞 女\n002 孙俪 男\n003 吴磊 男"},"answer":"A","explanation":"二维表中每一列称为一个字段，字段就是诸如姓名、学号、性别、成绩之类\n的，每一行数据叫一个元组（或记录）包含一个学生的全部字段信息，该表格有 3 条学生信息记录。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-49091","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"在关系模型中，下列说法正确的是（ ）。","options":{"A":"关系中存在可分解的属性值","B":"关系中允许出现相同的元组","C":"关系中，考虑元组的顺序","D":"元组中，理论上属性是无序的，但使用时按习惯考虑列的顺序"},"answer":"D","explanation":"关系模型由一组关系组成；每个关系的数据结构是一张规范化的二维表，选项 A，\n关系中的属性值是不可分解的。选项 B，二维表中的一行数据称为一条记录，也称为元组，关系中不允\n许出现相同的元组，选项 C，关系中，可以不考虑元组的顺序，选项 D，元组中，理论上属性是无序的，\n但使用时按习惯考虑列的顺序。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-49334","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"下列实体类型的联系中，属于一对多联系的是（ ）。","options":{"A":"学生对课程的所属联系","B":"父亲对孩子的亲生联系","C":"省对省会的所属联系","D":"商店对顾客的联系"},"answer":"B","explanation":"一对多联系是实体集 A 中的一个实体与实体集 B 中的多个实体相对应，反之，\n实体集 B 中的一个实体至多与实体集 A 中的一个实体相对应，选项 A，学生对课程的所属联系是多对\n多，一个学生可以选择多个课程，一个课程可以被多个学生选择，选项 B，一个父亲有多个孩子，一个\n孩子只有一个亲生父亲，所以选项 B 是一对多联系，选项 B 正确，选项 C，一个省只有一个省会，一个\n省会也对应一个省，是一对一联系。选项 D，一个商店有多个顾客，一个顾客可以去多个商店，是多对\n多联系。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-47759","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"下图是一个使用 Access 软件创建的数据表：\n下列有关该数据表的说法正确的是（ ）。","options":{"A":"表中共有 5 个字段","B":"表中共有 156 条记录","C":"若在①处输入 15，按回车键后当前记录为第 15 条记录","D":"“单价”的字段类型为数值型"},"answer":"C","explanation":"数据库表中每一列都是一个字段，则上表中共有 6 个字段，分别为：序号、\n课程类别、编号、书名、单价和订货量，选项 A 错误。从图中的最下方可以看见表中共有记录数 552\n条，选项 B 错误。“单价”字段里的内容都加上了货币符号，所以应该为货币型，选项 D 错误，而在记\n录的空白条里输入相应的数字，则按回车后会跳转到相应的记录数里，选项 C 正确。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-16735","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"下列不属于 SQL 数据操纵功能范围的语句是（ ）。","options":{"A":"SELECT","B":"CREATE TABLE","C":"DELETE","D":"INSERT"},"answer":"B","explanation":"数据操纵功能包括数据查询和数据更新两大操作，其中数据更新又包括插入、\n删除和修改三种操作；SELECT 属于数据查询操作；DELETE 属于数据删除操作；INSERT 属于数据更\n新操作；而 CREATE TABLE 属于数据定义操作。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-81690","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"表达实体之间逻辑联系的 E-R 模型，是数据库的（ ）。","options":{"A":"概念模型","B":"逻辑模型","C":"外部模型","D":"物理模型"},"answer":"A","explanation":"概念模型这是一种独立于任何计算机系统的模型，完全不涉及信息在计算机\n系统中的表示，用于建立信息世界的数据模型，是现实世界的第一层抽象，是用户和数据库设计人员进\n行交流的工具，其中最著名的模型是“实体联系模型”（E—R 模型）。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-85324","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"如图所示，选课表与学生基本情况表之间的联系是（ ）。","options":{"A":"多对多","B":"多对一","C":"一对多","D":"一对一"},"answer":"C","explanation":"表间的关系分为一对一、一对多和多对多三种。首先排除 B 选项，没有此种\n说法。再看图中所示状态，两表之间的连线，一端是 1，另一端是无穷大符号，这表示的是一对多的关\n系，故选择 C。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-83749","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"下列叙述正确的为（ ）。","options":{"A":"主码是一个属性，它能唯一表识一列","B":"主码是一个属性，它能唯一表识一行","C":"主码是一个属性或属性集，它能唯一表识一列","D":"主码是一个属性或属性集，它能唯一表识一行"},"answer":"D","explanation":"如果一个关系中有多个候选码，可以从中选择一个作为主码，每个关系只能\n有一个主码。主码也称为主键或主关键字，是表中的属性或属性集，用于唯一地确定一个元组；所以二\n维表中主码只有一个，可以是一个属性也可以由多个属性共同组成，可以唯一表示二维表中的一行记录。\n22【答案】B。解析：如果一个属性或属性集的值能够唯一标识一个关系的元组而又不包含多余的\n属性，则该属性或属性集为候选码。也称为候选键或候选关键字。候选关键字是在关系中能唯一标识元\n组的属性或属性集，可以存在多个。如果一个关系中有多个候选键，可以从中选择一个作为查询、插入\n或删除元组的操作变量，被选用的候选键称为主码，而主码只能有一个。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-17680","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"对于学生选课实体，含有：学号，姓名，课程编号，课程名，选课时间等属性，该实体主码是（ ）。","options":{"A":"学号","B":"课程编号","C":"学号+课程编号","D":"学号+选课时间"},"answer":"C","explanation":"此为选课表，该表中含有学号和课程编号等，存在一个学号对应多个课程的\n情况，故而要学号和课程编号同为主码。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-35511","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"在“唱片收藏”表中，有关下图表中描述正确的是（ ）。","options":{"A":"该数据表中有 7 条记录","B":"该数据表中有 2 条记录","C":"该数据表中有 7 个字段","D":"该数据表中有 2 条字段"},"answer":"C","explanation":"字段是记录的属性，图中有 7 个字段，由图中信息只可确定字段的数目，确\n定不了记录的数目。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-19739","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"为了及时更新、维护学校的学籍管理系统，减少无关数据冗余，管理员在学籍数据库中清除了已\n经毕业的高三学生的信息，他采用的方法是（ ）。","options":{"A":"删除单元格","B":"删除字段","C":"删除数据库","D":"删除记录"},"answer":"D","explanation":"高三毕业生的信息存储在记录中，通过删除记录就可以删除毕业生的相关信\n息，选项 D 正确，选项 B 删除字段不能达到此效果，因为数据表中一列就是一个字段，选项 C 删除数\n据库就会将学生信息都删除，选项 A 单元格不存在于数据表中。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-34318","source":"中公","type":"多选","chapter":"第七章 数据库技术","stem":"使用数据库应用系统的优势有（ ）。","options":{"A":"能够存储大量数据","B":"数据应用共享性能好","C":"管理操作困难","D":"数据维护复杂"},"answer":"AB","explanation":"使用数据库应用系统，归纳起来有如下几方面的优势：\n（1）能够存储大量数据，且占用空间少\n（2）管理操作方便、快捷、高效。数据维护简单、安全\n（3）检索统计准确、迅速、高效\n（4）数据应用共享性好","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-52804","source":"中公","type":"多选","chapter":"第七章 数据库技术","stem":"下列关于 E-R 图的叙述中，哪些是正确的（ ）。","options":{"A":"E-R 图用于描述数据的逻辑模型","B":"E-R 图提供了表示实体型、属性和联系的方法","C":"属性用菱形表示，并用无向边将其与相应的实体连接起来","D":"联系也可以有属性\nE.实体型用矩形表示，矩形框内写明实体名"},"answer":"BD","explanation":"BDE。解析：E—R 模型直接从现实世界中抽取出实体类型及实体间联系图（E—R 图）\n表示数据模型，故 A 错，B 正确，用矩形表示实体，用菱形框表示实体之间的联系，用椭圆形框表示属\n性，故 C 错误，D、E 正确。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-387","source":"中公","type":"多选","chapter":"第七章 数据库技术","stem":"组成数据模型的三要素是（ ）。","options":{"A":"数据对象","B":"完整性规则","C":"数据模型","D":"数据操作"},"answer":"BCD","explanation":"数据库模型的三要素：完整性规则、数据模型、数据操作。其中完整性规\n则包括：实体完整性、参照完整性、自定义完整性。数据模型包括：层次模型、网状模型、关系模型。\n数据操作包括：关系代数语言、关系演算语言。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-98038","source":"中公","type":"多选","chapter":"第七章 数据库技术","stem":"在 SELECT 语句的一般格式中，以下（ ）部分是可选的。","options":{"A":"FROM 子句","B":"ORDER BY 子句","C":"WHERE 子句","D":"GROUP BY 子句"},"answer":"BCD","explanation":"选项 A，查询必须指定要查找的表、视图、索引，因此 FROM 必须存在。\n选项 B，ORDER BY 对列进行排序。选项 C，WHERE 是指定查询的条件。选项 D，GROUP BY 对列进\n行分组。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-2513","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"SQL 语言中，删除一个表的命令是________。","options":{},"answer":"DROP","explanation":"DROP\n解析：Drop 是彻底删除表（表结构，表名）创建表：CREATE；修改：ALTER","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-50678","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"数据模型通常由：________、________和________三部分组成。","options":{},"answer":"数据结构、数据操作、完整性约束","explanation":"数据结构、数据操作、完整性约束。解析：数据模型是数据特征的抽象。数据是描述事\n物的符号记录，模型是现实世界的抽象。数据模型从抽象层次上描述了系统的静态特征、动态行为和约\n束条件，为数据库系统的信息表示与操作提供了一个抽象的框架。数据模型所描述的内容有三部分：数\n据结构、数据操作和数据约束。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-4572","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"________是现实世界到机器世界的中间桥梁。","options":{},"answer":"概念模型","explanation":"概念模型。解析：概念模型是一种独立于任何计算机系统的模型，完全不涉及信息在计\n算机系统中的表示，用于建立信息世界的数据模型，是现实世界的第一层抽象，是用户和数据库设计人\n员进行交流的工具，其中最著名的模型是“实体联系模型”（E-R 模型）。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-34869","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"E-R 模型的组成包括________，________，________元素。","options":{},"answer":"实体、属性、联系","explanation":"实体、属性、联系。解析：实体是概念世界的基本单位。现实世界中的人、事、物，也\n可以是抽象的概念或联系。实体所具有的某一特性。实体内部和实体之间的关系。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-18322","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"数据库系统的核心是________。","options":{},"answer":"数据库管理系统或 DBMS","explanation":"数据库管理系统或 DBMS。解析：数据库系统的核心为数据库管理系统，数据库管理系\n统的核心为数据库（或数据），数据库技术的根本目的是要解决数据共享问题。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-36928","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"关系模型的数据操纵即是建立在关系上的数据操纵，一般有________、增加、删除和修改四种操\n作。","options":{},"answer":"查询","explanation":"查询。解析：数据操纵语言（DML）负责数据的操纵，包括查询、插入、删除和修改等。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-16263","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"在关系型数据库中，二维表的一行叫做一条________。表中的一列叫做一个________也成为一个\n属性。","options":{},"answer":"记录（或元组）、字段","explanation":"记录（或元组）、字段。解析：二维表中行称为记录或元组，可以用关键字来标识（从第\n二行开始），二维表中的列称为字段。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-12629","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"数据库的完整性是指数据的________，________，________。","options":{},"answer":"实体完整性、参照完整性、用户定义完整性。实体完整性是指关系数据库中所有的表都","explanation":"实体完整性、参照完整性、用户定义完整性。实体完整性是指关系数据库中所有的表都\n必须有主码，而且表中不允许存在主码值为空、主码值相同的记录。参照完整性也称为引用完整性。现\n实世界中的实体之间往往存在某种关系，在关系模型中实体及实体间的联系都是用关系来描述的，这样\n就自然存在着关系（表）与关系（表）之间的引用关系。它不允许关系引用不存在的元组。限制一个表\n中某列的取值受另一个表的某列的取值范围约束的特点就称为参照完整性。在关系数据库中用外码（外\n键或外部关键字）来实现参照完整性。用户定义的完整性也称为域完整性。它是针对某一具体应用领域\n定义的数据约束条件。反映某一具体应用涉及的数据必须满足应用语义的要求。实际上是指关系中属性\n的取值范围。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-82332","source":"中公","type":"填空","chapter":"第七章 数据库技术","stem":"关系中主码的取值必须唯一且非空，这是由________完整性规则决定的。","options":{},"answer":"实体","explanation":"实体。解析：关系的完整性：在关系模型中，数据的约束条件通过三类完整性约束条件\n来描述。即：（1）实体完整性：要求关系中的元组的主键值不能是空值。（2）参照完整性：要求在关系\n中不允许引用不存在的实体。（3）用户定义的完整性：这是针对某一具体数据的约束条件，由应用环境\n决定，例如属性的值限制。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-20514","source":"中公","type":"判断","chapter":"第七章 数据库技术","stem":"在数据库的数据表中，一行对应一个实体，一列对应实体的一个属性。（ ）","options":{},"answer":"错误","explanation":"在数据库关系模型中，实体通常是以表的形式来表现的，表的每一行描述\n实体的一个实例，表的每列描述实体的一个特性或属性。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-32677","source":"中公","type":"判断","chapter":"第七章 数据库技术","stem":"数据库的最小存储单位是记录。（ ）","options":{},"answer":"错误","explanation":"二维表中的行称为记录，可以用关键字来标识（从第二行开始）。值是二维\n表中的一个具体数据项，是数据库中最小的数据单位。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-29043","source":"中公","type":"判断","chapter":"第七章 数据库技术","stem":"在 SQL Server 中，对数据的修改是通过 modify 语句实现的。（ ）","options":{},"answer":"错误","explanation":"在 SQL Server 中对数据的修改使用的是 UPDATE。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-30618","source":"中公","type":"判断","chapter":"第七章 数据库技术","stem":"关系模型中的关系模式至少应该满足 1NF 的要求。（ ）","options":{},"answer":"正确","explanation":"1NF 第一范式是关系模式（表）中每一个属性（列）都是不可再分的。几\n乎所有的关系模式都符合第一范式。\n2NF 在满足第一范式的前提下，还需要求表中每一个非主键所在的列都必须完全函数依赖于主键\n（关键字）。\n3NF 在满足第二范式的基础上，表中每一个非主键所在的列对主键都不存在传递依赖，而应是直接\n依赖。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-27116","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"程序的三种基本控制结构的共同特点是（ ）。","options":{"A":"不能嵌套使用","B":"只能用来写简单程序","C":"已经用硬件实现","D":"只有一个入口和一个出口"},"answer":"D","explanation":"程序的三种基本控制结构是顺序、选择和循环（重复）。程序的特点就是从一\n个入口开始，最终以一个出口结束，其间可以用顺序，选择和循环方式对程序的流向进行控制。三种结\n构可以写出非常复杂的程序，而且选择和循环都可以嵌套设计。","subject":"计算机基础","source_chapter":"第八章 算法与程序设计"},{"id":"zg-30750","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"以下数据结构中，（ ）是非线性结构。","options":{"A":"线性链表","B":"队列","C":"栈","D":"二叉树"},"answer":"D","explanation":"数据的逻辑结构有线性和非线性之分。树、二叉树、图是非线性结构，线性\n表、栈、队列是线性结构。","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-32809","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"下列属于程序设计语言的是（ ）。","options":{"A":"PS","B":"Outlook","C":"VB","D":"ACDSee"},"answer":"C","explanation":"PS 是一种编辑图像的软件；Outlook 是用来管理电子邮件的软件；ACDSee 是\n管理、编辑和展示大量数字图片的软件。","subject":"多媒体","source_chapter":"第八章 算法与程序设计"},{"id":"zg-63106","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"栈底至栈顶依次存放元素 A、B、C、D，在第五个元素 E 入栈前，栈中元素可以出栈，则出栈序\n列可能是（ ）。","options":{"A":"ABCED","B":"DCBEA","C":"DBCEA","D":"CDABE"},"answer":"B","explanation":"栈遵循先进后出原则，栈底是第一个进栈的数据，栈顶是最后一个进栈的数\n据。ABCD 四元素已存放于栈中，且由栈底至栈顶，ABCD 四元素在出栈时，必须按 DCBA 顺序出栈。\n但 E 还未入栈，则可能出栈的顺序有五种，分别为 EDCBA、DECBA、DCEBA、DCBEA、DCBAE。B\n选项与可能出栈顺序相符。","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-90085","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"某程序流程图如图所示，当执行至“结束”时，变量 C 的值是（ ）。","options":{"A":"6","B":"7","C":"8","D":"9"},"answer":"C","explanation":"S 初值为 1，C 的初值为 0。每执行一次循环体 S=S*2，C 的值就增加 1，28=256，\n要执行 8 次循环体中的语句，S 才能满足条件 S>=256，所以 C 的值等于 8。\nS 的值 C 的值\n初始状态 1 0\n第一次循环结束 2 1\n第二次循环结束 4 2\n………… …… ……\n第 n 次循环结束 2n n","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-65165","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"下列名称符号，名称依次是（ ）。","options":{"A":"开始标志、活动标志、判断标志、流线标志","B":"开始与结束标志、判断标志、流线标志、输入输出标志","C":"结束标志、活动标志、流线标志、输入输出标志","D":"开始与结束标志、处理框、判断标志、输入输出标志"},"answer":"D","explanation":"流程图是由一些图框和流程线组成的，其中图框表示各种操作的类型，图框\n中的文字和符号表示操作的内容，流程线表示操作的先后次序。也称为程序框图，它是算法的一种图形\n化表示方法。优点：形象、直观、容易理解。\n图形 名称 功能\n开始/结束框 表示算法的开始或结束\n输入/输出框 表示算法中变量的输入或输出\n处理框 表示算法中变量的计算与赋值\n判断框 表示算法中的条件判断\n流程线 表示算法中的流向\n连接点 表示算法中的连接","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-88026","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"数据的（ ）包括集合、线性结构、树型结构和图状结构四种基本类型。","options":{"A":"算法描述","B":"基本运算","C":"逻辑结构","D":"存储结构"},"answer":"C","explanation":"数据结构是数据元素之间逻辑关系的整体。根据数据元素之间关系的不同特\n性，数据的逻辑结构通常包括集合、线性结构、树型结构和图状结构四种基本类型。","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-84392","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"关于算法的描述，正确的是（ ）。","options":{"A":"同一种算法只能用一种程序语言实现","B":"算法就是数值计算的方法","C":"描述算法的方法只有流程图","D":"算法是描述解决问题的方法和步骤"},"answer":"D","explanation":"算法是指解题方案的准确而完整的描述，是一系列解决问题的清晰指令，算\n法代表着用系统的方法描述解决问题的策略机制。算法是程序设计的灵魂，算法独立于任何一种程序设\n计语言，一个算法可以用多种程序设计语言来实现，也可以用多种不同的方法来描述。一般用自然语言、\n流程图、伪代码描述。","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-54095","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"如下图所示流程图实现的函数是（ ）。","options":{"A":"y =\nx2,x ≤ 3\n2x + 4,3 < x ≤ 7\n1\nx ,x > 7","B":"y =\n1\nx ,x ≤ 3\n2x + 4,3 < x ≤ 7\nx2,x > 7","C":"y =\nx2,x ≤ 3\n2x + 4,3 ≤ x ≤ 7\n1\nx ,x > 7","D":"y =\nx2,x ≤ 3\n2x + 4,3 ≤ x < 7\n1\nx ,x > 7"},"answer":"A","explanation":"根据第一个判断条件“x≤3”可得，满足条件时 y=x2，因此排除 B。第二个\n判断条件“x≤7”是在前一个条件不满足的前提下进行的，因此如果满足第二个条件，则此时 x 的区间\n应该为“3< x≤7”，因此排除 C 和 D。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-55670","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"有：int w=11,x=12,y=3,m;执行下面语句后 m 的结果是（ ）。\nm=(w<x)?w:x;\nm=(m<y)?m:y;","options":{"A":"1","B":"2","C":"3","D":"以上结果都不对"},"answer":"C","explanation":"该语句为顺序结构，先执行第一条语句，先判断 w<x 为真，将 w 的值赋给 m，\nm 的值为 11，再执行第二条语句，先判断 m<y 为假，将 y 的值赋给 m，m 的值为 3，故 m 最终的值为\n3。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-52036","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"int k=10;\nwhile (k=0)\nk=k-1;\n则下列描述中正确的是（ ）。","options":{"A":"while 循环执行 10 次","B":"循环是无限循环","C":"循环体语句一次也不执行","D":"循环体语句执行一次"},"answer":"C","explanation":"while 循环条件是 k=0，将 0 赋值给 k，条件的结结果为 0，循环条件不成立，\n因此循环体一次也不执行。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-46389","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"对于下列程序结果是（ ）。\nint main()\n{\nint i=10;\nswitch(i)\n{\ncase 9:i+=1;\ncase 10:i+=1;\ncase 11:i+=1;\ncase 12:i+=1;\n}\nprintf(\"%d\",i);\n}","options":{"A":"11","B":"12","C":"13","D":"14"},"answer":"C","explanation":"初始值 i=10，执行语句 case 10，得到 i=11，由于 case 后没有 break 语句，所\n以程序继续执行 case 11 和 case 12 得到 i 的值为 13。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-16046","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"面向对象的程序设计的基本特征不包括下列哪项？（ ）","options":{"A":"封装","B":"继承","C":"重载","D":"多态"},"answer":"C","explanation":"面向对象的程序设计基本特征包括封装、继承和多态。\n封装\n把对象的属性和方法结合成一个独立的\n单元，并尽可能隐蔽对象的内部细节。\n封装使数据具有独立性、隐藏性、安全\n性。\n1.数据独立\n2.隐藏性、安全性、易于维护。\n3.但需要更多的输入输出函数。\n继承 继承是采用在已有的类定义基础上建立 1.传递性\n新类定义的技术手段。允许在已有类的\n基础上通过增加新特征而派生出新的\n类，这称为继承。\n2.共享性\n3.层次性\n多态\n对象根据所接收的消息而做出动作，同\n样的消息被不同的对象接收时可导致完\n全不同的行动，该现象称为多态性。\n用户不必知道某个对象所属的类\n就可以执行多态行为，从而为程序\n设计带来更大方便。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-12676","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"VB 常用于函数中，ROUND(-6.7)的值是（ ）。","options":{"A":"-6","B":"6","C":"-7","D":"7"},"answer":"C","explanation":"ROUND 函数的作用是对 x 四舍五入，保留的小数位数由 n 指定，当 n 缺省\n的时候，不保留小数位数。因此本题的答案是 C。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-83690","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"关于二叉树的特点，下列说法不正确的是（ ）。","options":{"A":"二叉树不能为空","B":"每个节点至多只能有二棵子树","C":"不存在大于二的节结点","D":"二叉树的分左右子树"},"answer":"A","explanation":"二叉树的特点是每个结点至多只有两棵子树，并且二叉树的子树有左右之分，\n其次序不能任意颠倒。逻辑上，二叉树有五种基本形态：空二叉树、只有根节点、只有左子树、只有右\n子树、完全二叉树。故二叉树可以为空。","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-48666","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"观察如图所示“计算圆面积”的程序代码，该程序采用的算法为（ ）。","options":{"A":"穷举法","B":"解析法","C":"查找法 Ｄ.递归法"},"answer":"B","explanation":"A 选项，穷举法也叫枚举法或列举法。在研究对象是由有限个元素构成的集\n合时，把所有对象一一列举出来，再对其一一进行研究；带入实际，一个个检验是否符合，穷举完所有\n对象问题将最终得以解决。B 选项，解析法是指用解析的方法找出表示问题的前提条件与结果之间关系\n的数学表达式，并通过表达式的计算来实现问题求解。用解析法解决问题的关键就是找到求解问题的解\n析表达式，题中程序计算圆面积时，采用的是通过变量得到解析表达式。C 选项，查找法是在序列中查\n找跟关键字相同的数据。D 选项，递归法又称为迭代法，其基本思想是把一个复杂的计算过程转化为简\n单过程的多次重复。每次重复都从旧值的基础上递推出新值，并由新值代替旧值。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-47700","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"在下列关于计算机算法的说法中，不正确的是（ ）。","options":{"A":"一个正确的算法至少要有一个输入","B":"算法的改进，在很大程度上推动了计算机科学与技术的进步","C":"判断一个算法的好坏的主要标准是算法的时间复杂性和空间复杂性","D":"目前仍然存在许多涉及到国计民生的重大课题，还没有找到能够在计算机上实施的有效算法"},"answer":"A","explanation":"B、D 选项说法正确，C 选项，一个算法的评价主要从时间复杂度和空间复\n杂度来考虑，时间复杂度：是指执行算法所需要的计算工作量；空间复杂度：指算法需要消耗的内存空\n间。一个算法有零个或多个输入，以描述运算对象的初始情况。故此题的答案为 A 选项。","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-50725","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"如下图 VB 应用程序界面所示，下列关于类与对象的说法正确的是（ ）。","options":{"A":"图中有 5 个对象，分别属于 3 个不同的类","B":"图中计算 1、Text1 等字符为类的名称","C":"图中有 6 个对象，分别属于 4 个不同的类","D":"图中计算 1、Text1 等字符为对象的名称"},"answer":"C","explanation":"窗体、标签、命令按钮、图形总共四个不同的类，4 个不同的类中有 6 个对\n象，分别为两个命令按钮、两个图形、一个文本框、一个窗体。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-49150","source":"中公","type":"单选","chapter":"第八章 算法与程序设计","stem":"下列表达式中值最大的是（ ）。","options":{"A":"Abs(-5)+Len(\"ABCDE\")","B":"val((Mid(\"SHANG2016HAI\",6,2))","C":"Int(2*sqr(36)+0.5)/3","D":"5^2Mod25\\2^2"},"answer":"B","explanation":"A 选项，Abs 函数的作用是求绝对值，Len 函数是字符串函数，作用是求字\n符串的长度，所以得出的结果是 5+5=10，B 选项，mid 字符串函数，从字符串中第几个开始去几个字符，\nMid(\"SHANG2016HAI\",6,2)，是从字符串\"SHANG2016HAI\"，第 6 个字符开始取 2 个字符，得出的结果\n是字符串\"20\"，val 函数是将数字字符串转换为数值，val(\"20\")=20，C 选项，Int(2*sqr(36)+0.5)/3 得出的\n结果是 4，选项 D，5^2Mod25\\2^2 的优先级从高到低是^，\\，Mod，得出的结果是 1。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-31924","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"任何复杂的算法都可以用________基本结构组合而成的程序来实现。","options":{},"answer":"顺序结构、选择结构和循环结构","explanation":"顺序结构、选择结构和循环结构。解析：1996 年，计算机科学家 Bohm 和 Jacopini 证明：\n任何简单或复杂的算法都可以由顺序结构、选择结构和循环结构这三种结构组合而成。所以，这三种结\n构就被称为程序设计的三种基本结构，也是结构化程序设计建议采用的结构。\n（1）顺序结构，按照书写顺序逐条执行该结构中的各个语句。\n（2）选择结构，也叫分支结构，根据给定的条件成立与否，从该结构中所给的两个（或多个）语\n句序列中选择一个执行。\n（3）循环结构，根据给定的条件，使结构中的语句序列重复执行若干次。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-35558","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"如下图是一个程序框图，小扬同学考了 92 分，他将被评为________级别，该程序将完成________\n任务。","options":{},"answer":"B、根据分值划分等级","explanation":"B、根据分值划分等级。解析：92 分介于 80-95 之间，所以属于 B 级。该流程图属于一\n个多分支判断语句，根据分值的不同，判断学生的成绩等级。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-33983","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"高级语言编写的源程序通过________后能转换成机器语言目标程序。","options":{},"answer":"编译","explanation":"编译。解析：编译程序是将用户编写的高级语言程序（源程序）的全部语句一次全部翻\n译成机器语言目标程序。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-37617","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"计算机能直接识别和执行的语言是________。","options":{},"answer":"机器语言","explanation":"机器语言。解析：机器语言是用二进制代码表示的计算机能直接识别和执行的一种机器\n指令的集合。它是计算机的设计者通过计算机的硬件结构赋予计算机的操作功能。机器语言是计算机硬\n件能够识别的，不用翻译直接供机器使用的程序设计语言，也被称为手编语言。","subject":"计算机基础","source_chapter":"第八章 算法与程序设计"},{"id":"zg-67914","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"栈的特点是________，队列的特点是先进先出。","options":{},"answer":"后进先出","explanation":"后进先出。解析：栈是一种运算受限的线性表，其限制是仅允许在表的一端进行插入和\n删除运算，这一端被称为栈顶，把另一端称为栈底。特点是后进先出。","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-71548","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"VB 函数返回值为数值的是________。","options":{},"answer":"Val（x）","explanation":"Val（x）。解析：Val（x）是将数字字符转换为数值。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-69973","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"输入 a=1，b=2，输出结果：________。","options":{},"answer":"2.5 解析：","explanation":"2.5 解析：\n（a+b）<>0，为真，执行 a=b-a/b+a，2-1/2+1=2.5，所以 a=2.5。","subject":"其他","source_chapter":"第八章 算法与程序设计"},{"id":"zg-83218","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"在 C 语言中，当 a=3，b=5 时，表达式 a>b?a:b 的值为________。","options":{},"answer":"5","explanation":"5。解析：条件表达式的语法格式：表达式 1?表达 2:表达式 3，判断表达式 1 的值，若为\n真执行表达式 2 且表达式 2 的值为该条件表达式的值，若为假，执行表达式 3，表达式 3 得值为该条件\n表达式的值。有题干可得 a>b 为假，所以执行结果为 b，即整个表达式的值为 5。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-3904","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"当 a=8，在 VB 执行，if a>2 then b=a/2 Else b=a*2,程序段后，变量 b 的值为________。","options":{},"answer":"4","explanation":"4。解析：已知 a=8，执行语句即如果 a>2，执行 b=a/2，若 a<=2 执行 b=a*2，因 a=8，\n故而执行 b=a/2，即 b=4。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-49287","source":"中公","type":"填空","chapter":"第八章 算法与程序设计","stem":"若用冒泡法将数据 4，9，2，7 按升序排列，则需要进行数据交换的次数是________次。","options":{},"answer":"3","explanation":"3。解析：第一趟排序的过程中 9 和 2 交换，9 和 7 交换。所以第 1 趟排序后结果为：4，\n2，7，9。\n第二趟排序的过程中 2 和 4 交换。所以第 2 趟排序后的结果为：2，4，7，9。\n第三趟排序的过程中 7 和 9 进行了比较，但因为 7<9，所以没有发生交换。第三趟排序后结果为：2，\n4，7，9，也就是最终排好的升序序列。\n综上所述，整个排序过程中进行了 3 次数据交换。","subject":"算法与数据结构","source_chapter":"第八章 算法与程序设计"},{"id":"zg-44866","source":"中公","type":"判断","chapter":"第八章 算法与程序设计","stem":"C 语言中，数据有两种表现形式：常量和变量。（ ）","options":{},"answer":"正确","explanation":"C 语言的数据类型包括基本类型、构造类型、指针类型和空类型，而数据\n分为常量和变量，在程序运行过程中，其值不能被改变的量称为常量；其值可以改变的量称为变量。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-53559","source":"中公","type":"判断","chapter":"第八章 算法与程序设计","stem":"在 C 语言中，变量可以分为全局变量和局部变量。（ ）","options":{},"answer":"正确","explanation":"从变量的作用域（即从空间）角度来分，可以分为全局变量和局部变量。\n局部变量：函数内部的变量称为局部变量，它的作用域仅限于函数内部，离开该函数后就是无效的，\n再使用就会报错。\n全局变量：在所有函数外部定义的变量称为全局变量，它的作用域默认是整个程序，也就是所有的\n源文件，包括.c 和.h 文件。它的作用域是从声明时刻开始，到程序结束。","subject":"编程语言","source_chapter":"第八章 算法与程序设计"},{"id":"zg-57193","source":"中公","type":"判断","chapter":"第八章 算法与程序设计","stem":"汇编语言和机器语言都属于低级语言，之所以称为低级语言是因为用他们编写的程序可以被计算\n机直接识别执行。（ ）","options":{},"answer":"错误","explanation":"汇编语言不可以被计算机直接识别。机器语言是计算机可以识别并运行的\n二进制代码，汇编语言是将二进制的机器码，通过助记符的方式让人可以更方便的编写并检查的。低级\n语言汇编语言接近机器语言，可以看做是机器语言的另一种形式，计算机在运行时也需要将其变为机器\n语言的二进制才可运行。高级语言最接近人类语言，但机器是无法执行的，需要最终编译连接成二进制\n的机器代码才可被计算机执行。","subject":"计算机基础","source_chapter":"第八章 算法与程序设计"},{"id":"zg-19281","source":"中公","type":"单选","chapter":"第一章 信息技术课程知识","stem":"信息技术课程教学要落实“面向全体学生，为了每一位学生的发展”的育人理念，首先要坚持的\n是（ ）。","options":{"A":"基础性","B":"工具性","C":"综合性","D":"层次性"},"answer":"D","explanation":"“为了每一位学生的发展”是新课程的最高宗旨和核心理念。“每一位学生”\n突出的是要关注全体学生，特别是教育教学中被轻视被忽视乃至被漠视的边缘人，因此要坚持“以人为\n本”，而 A 选项，它违背“教师主导，学生主体”的教学理念，说法错误；B 选项钻研教材只是教师需\n要的基本专业素养；C 选项任务驱动法是信息技术课程中主要的教学方法。","subject":"教学论","source_chapter":"第一章 信息技术课程知识"},{"id":"zg-38330","source":"中公","type":"多选","chapter":"第一章 信息技术课程知识","stem":"小学信息技术课程的基本理念包括（ ）。","options":{"A":"面向全体学生","B":"立足于学生的发展","C":"倡导独立的学习方式","D":"注重学科渗透"},"answer":"ABCD","explanation":"基本理念包括以下 5 条：\n（1）提升信息素养，培养信息时代的合格公民。\n（2）营造良好的信息环境，打造终身学习的平台。\n（3）关照全体学生，建设有特色的信息技术课程。\n（4）强调问题解决，倡导运用信息技术进行创新实践。\n（5）注重交流与合作，共同建构健康的信息文化。","subject":"教学论","source_chapter":"第一章 信息技术课程知识"},{"id":"zg-60095","source":"中公","type":"多选","chapter":"第一章 信息技术课程知识","stem":"信息技术课程具有较为突出的（ ），旨在使学生掌握常用的信息技术工具。","options":{"A":"实用性","B":"操作性","C":"逻辑性","D":"工具性"},"answer":"BD","explanation":"义务教育阶段信息技术课程具有较为突出的操作性和工具性，旨在使学生掌\n握常用的信息技术工具，在体验的基础上提高对不同操作系统及应用系统的适应性，适当关注前沿技术，\n如机器人技术及物联网技术，提升技术应用的能力和利用信息技术解决实际问题的能力。","subject":"教学论","source_chapter":"第一章 信息技术课程知识"},{"id":"zg-21169","source":"中公","type":"单选","chapter":"第二章 教学设计","stem":"教师在讲授知识或技能的时候可以通过展示实物、直观教具、进行示范等方式进行，从而指导学\n生获取知识或技能，那么此方法是（ ）。","options":{"A":"练习法","B":"演示法","C":"实验法","D":"发现法"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第二章 教学设计"},{"id":"zg-2295","source":"中公","type":"填空","chapter":"第三章 教学评价","stem":"课堂教学评价方法有多种，常用的有分析法、调查法、________。","options":{},"answer":"量表评价法","explanation":"量表评价法。解析：课堂教学评价的方式方法多种多样，比较常用的有量表评价法、分\n析法、调查法等。（1）量表评价法。这是一种定量评价。它的基本程序是：先编排专门的评价表，确定\n评价指标（项目）、权重、评分标准；再在听课的基础上进行评定；最后进行数据处理，汇总所有的评\n价表，运用一定的统计方法对所得数据进行分析处理，得出每个评价对象的总得分或等级。（2）分析法。\n这是一种通过对教师教学工作的有关方面进行定性分析进而评定其质量优劣的方法。一般没有专门的评\n价指标和评等标准，主要取决于评价人员的学识和经验。评价结果以定性描述为主。分析法可他人评，\n也可以自评。（3）调查法。主要有问卷与座谈两种方式。调查法兼有量表评价法与分析法的有关要素，\n适合于专门了解某个教师较长时间内的教学情况，一般在专门鉴定某教师的综合教学水平的管理性评价\n中运用。","subject":"教学论","source_chapter":"第三章 教学评价"},{"id":"zg-50896","source":"中公","type":"填空","chapter":"第三章 教学评价","stem":"王老师在上《补间动画制作》课程之前先对学生做了一个测验，从评价的角度来说这属于________，\n相对而言，学期末，对这学期信息技术课程进行的考试应该属于________。","options":{},"answer":"诊断性评价、总结性评价","explanation":"诊断性评价、总结性评价。解析：诊断性评价是指在教育教学活动实施之前，为计划更\n有效地实施而进行的预测性、摸底性评价。其目的是了解评价对象的基础和情况，分析存在的问题，为\n解决问题搜集必要的资料，以找到解决问题的方法。\n总结性评价又称为终结性评价，是指某一教育、教学活动项目告一段落或实施结束后，为了确定工\n作成效而进行的评价。其目的是了解目标的达成情况、对评价对象的整体效益做出价值判断或甄别优劣、\n评定等级。\n题干当中的王老师在上《补间动画制作》课程之前先对学生做了一个测验是摸底性评价，属于诊断\n性评价；学期末进行的考试属于总结性评价。","subject":"教学论","source_chapter":"第三章 教学评价"},{"id":"zg-19807","source":"中公","type":"单选","chapter":"第四章 教学新资料","stem":"微课已成为信息技术课堂中一种常见教学方式，关于微课，以下说法不正确的是（ ）。","options":{"A":"通常针对某一知识点或某一具体教学环节","B":"时间段，通常为 5-8 分钟","C":"以视频为主要载体","D":"不包括学习资源和教学指导"},"answer":"D","explanation":"“微课”的核心组成内容是课堂教学视频（一般为 5-8 分钟针对某一知识或某\n一教学环节的视频片段），同时还包含与该教学主题相关的教学设计、素材课件、教学反思、练习测试\n及学生反馈、教师点评等辅助性教学资源，它们以一定的组织关系和呈现方式共同“营造”了一个半结\n构化、主题式的资源单元应用“小环境”。因此 D 不正确。","subject":"教学论","source_chapter":"第四章 教学新资料"},{"id":"zg-18232","source":"中公","type":"单选","chapter":"第四章 教学新资料","stem":"在计算机管理教学中，CAI 是哪种教学模式（ ）","options":{"A":"计算机管理教学","B":"计算机辅助教学","C":"计算机网络教育","D":"计算机远程教学"},"answer":"B","explanation":"CAI（Computer Aided Instruction）是计算机辅助教学，它是利用计算机向学\n习者提供图文并茂、生动形象的图像的方式进行教学，提高学习兴趣和效果。计算机管理教学是 CMI\n（Computer Managed Instruction），计算机网络教育是 CNE（Computer Network Education），计算机远\n程教学没有英文简称，因此本题选择 B。","subject":"教学论","source_chapter":"第四章 教学新资料"},{"id":"web-1","source":"网络","type":"单选","chapter":"网络爬取","stem":"网页都是按照一种描述文档的标记规则编写而成的，这套标记规则叫做：","options":{"A":"URL","B":"HTTP","C":"HTML","D":"FTP"},"answer":"C","explanation":"HTML 是超文本标记语言，用于编写网页的标记规则。","subject":"计算机网络","source_chapter":"网络爬取"},{"id":"web-2","source":"网络","type":"单选","chapter":"网络爬取","stem":"Basic 语言属于：","options":{"A":"机器语言","B":"汇编语言","C":"高级语言","D":"低级语言"},"answer":"C","explanation":"Basic、C、Java、Python 等都是高级语言。","subject":"编程语言","source_chapter":"网络爬取"},{"id":"web-3","source":"网络","type":"单选","chapter":"网络爬取","stem":"下列哪一个控件没有 Caption 属性：","options":{"A":"TextBox","B":"Label","C":"Frame","D":"CommandButton"},"answer":"A","explanation":"TextBox 用 Text 属性显示内容，没有 Caption 属性。","subject":"数据库","source_chapter":"网络爬取"},{"id":"web-4","source":"网络","type":"单选","chapter":"网络爬取","stem":"在 VB 中，要想单击按钮 \"结束\" 时结束程序，可在该按钮的（）事件过程中输入代码 \"End\"：","options":{"A":"Change","B":"KeyPress","C":"DblClick","D":"Click"},"answer":"D","explanation":"按钮的单击事件是 Click。","subject":"编程语言","source_chapter":"网络爬取"},{"id":"web-5","source":"网络","type":"单选","chapter":"网络爬取","stem":"断电会使原存信息丢失的存储器是：","options":{"A":"RAM","B":"硬盘","C":"ROM","D":"软盘"},"answer":"A","explanation":"RAM 是易失性存储器，断电信息丢失。ROM 和外存不会。","subject":"计算机基础","source_chapter":"网络爬取"},{"id":"web-6","source":"网络","type":"单选","chapter":"网络爬取","stem":"与 10 进制数 20 等值的二进制数是：","options":{"A":"10110","B":"10100","C":"11110","D":"10010"},"answer":"B","explanation":"20 = 16+4 = 10100B。","subject":"计算机基础","source_chapter":"网络爬取"},{"id":"web-7","source":"网络","type":"单选","chapter":"网络爬取","stem":"五笔字型属于：","options":{"A":"汉字输入码","B":"汉字机内码","C":"ASCII 码","D":"汉字国标码"},"answer":"A","explanation":"五笔、拼音都是输入码。","subject":"计算机基础","source_chapter":"网络爬取"},{"id":"web-8","source":"网络","type":"单选","chapter":"网络爬取","stem":"计算机中常用的英文单词 Byte，其中文意思是：","options":{"A":"位","B":"字","C":"字长","D":"字节"},"answer":"D","explanation":"Byte = 字节 = 8 bit。","subject":"计算机基础","source_chapter":"网络爬取"},{"id":"web-9","source":"网络","type":"单选","chapter":"网络爬取","stem":"下列字符能包含在 Windows 文件名中的是：","options":{"A":"*","B":"-","C":"|","D":"/"},"answer":"B","explanation":"Windows 文件名禁止使用 \\ / : * ? \" < > |。","subject":"其他","source_chapter":"网络爬取"},{"id":"web-10","source":"网络","type":"单选","chapter":"网络爬取","stem":"在 Excel 2000 中，（）函数是计算工作表一串数据的总和：","options":{"A":"COUNT","B":"AVERAGE","C":"MIN","D":"SUM"},"answer":"D","explanation":"SUM 求和、COUNT 计数、AVERAGE 平均、MIN 最小。","subject":"办公软件","source_chapter":"网络爬取"},{"id":"web-11","source":"网络","type":"单选","chapter":"网络爬取","stem":"复制和粘贴对应的快捷键分别是：","options":{"A":"Ctrl+V，Ctrl+C","B":"Ctrl+C，Ctrl+V","C":"Ctrl+C，Ctrl+X","D":"Ctrl+V，Ctrl+X"},"answer":"B","explanation":"复制 Ctrl+C；粘贴 Ctrl+V；剪切 Ctrl+X。","subject":"操作系统","source_chapter":"网络爬取"},{"id":"web-12","source":"网络","type":"单选","chapter":"网络爬取","stem":"电子邮件地址的一般格式为：","options":{"A":"用户名@域名","B":"域名@用户名","C":"IP地址@域名","D":"域名@IP地址"},"answer":"A","explanation":"如 abc@126.com，前面是用户名后面是域名。","subject":"计算机网络","source_chapter":"网络爬取"},{"id":"web-13","source":"网络","type":"单选","chapter":"网络爬取","stem":"入 Internet 网，必须安装的网络通讯协议是：","options":{"A":"TCP/IP","B":"ATM","C":"SPX/IPX","D":"NetBEUI"},"answer":"A","explanation":"TCP/IP 是互联网的基础协议。","subject":"计算机网络","source_chapter":"网络爬取"},{"id":"web-14","source":"网络","type":"单选","chapter":"网络爬取","stem":"下列 IP 地址哪个是不合法的：","options":{"A":"192.168.10.1","B":"288.68.16.10","C":"61.142.192.68","D":"208.0.0.41"},"answer":"B","explanation":"IP 地址每段范围 0-255，288 超出范围。","subject":"计算机网络","source_chapter":"网络爬取"},{"id":"web-15","source":"网络","type":"单选","chapter":"网络爬取","stem":"利用 \"百度\" 搜索黄山的雪景图片，最准确的关键字是：","options":{"A":"黄山","B":"雪","C":"黄山雪","D":"黄山 雪"},"answer":"D","explanation":"用空格分隔多个关键词为 \"与\" 关系，更精确。","subject":"其他","source_chapter":"网络爬取"},{"id":"web-16","source":"网络","type":"单选","chapter":"网络爬取","stem":"在 Windows 中，需要查找以 n 开头且扩展名为 .com 的所有文件，在查找对话框内的名称框中应输入：","options":{"A":"*.com","B":"?.com","C":"com.n*","D":"n*.com"},"answer":"D","explanation":"* 匹配任意字符。","subject":"算法与数据结构","source_chapter":"网络爬取"},{"id":"web-17","source":"网络","type":"单选","chapter":"网络爬取","stem":"Flash 动画的源文件扩展名是：","options":{"A":".doc",".gif":".gif","B":".gif","C":".fla","D":".jpg"},"answer":"C","explanation":".fla 是 Flash 源文件，.swf 是发布文件。","subject":"多媒体","source_chapter":"网络爬取"},{"id":"web-18","source":"网络","type":"单选","chapter":"网络爬取","stem":"FLASH 制作中，如果把动画中的每一帧都设置为关键帧，这种动画是：","options":{"A":"变形动画","B":"过程动画","C":"逐帧动画","D":"运动动画"},"answer":"C","explanation":"逐帧动画每一帧都是关键帧，灵活性最大。","subject":"多媒体","source_chapter":"网络爬取"},{"id":"web-19","source":"网络","type":"单选","chapter":"网络爬取","stem":"对于计算机，以下叙述正确的是：","options":{"A":"外存储器的容量大，数据可以长期保存，但存取速度慢","B":"防止软盘感染病毒的方法是经常对软盘格式化","C":"微型计算机就是我们经常使用的计算器，它体积微小，功能有限","D":"计算机的 CPU 中主要包含了运算器、控制器和内存储器三个部件"},"answer":"A","explanation":"CPU 由运算器和控制器组成（不含内存）；微机不是计算器；格式化会丢失数据但不能预防病毒。","subject":"计算机基础","source_chapter":"网络爬取"},{"id":"web-20","source":"网络","type":"单选","chapter":"网络爬取","stem":"在一个计算机网络中，\"防火墙\" 是指：","options":{"A":"为防止火灾而在网络设备和其他设备之间加设的隔离墙","B":"局域网上安装的电压过压监控与保护系统","C":"连接不同类型的网络时增设的双向信息转换系统","D":"为网络安全在内部网络和外部网络之间建立的信息通信监控系统"},"answer":"D","explanation":"防火墙是网络安全设备，监控内外网通信。","subject":"信息安全","source_chapter":"网络爬取"},{"id":"web-21","source":"网络","type":"单选","chapter":"网络爬取","stem":"Windows 中，在已经打开的应用程序之间交换数据最方便的方法是使用：","options":{"A":"文件","B":"窗口","C":"变量","D":"剪贴板"},"answer":"D","explanation":"剪贴板是 Windows 程序间数据交换的标准方式。","subject":"编程语言","source_chapter":"网络爬取"},{"id":"web-22","source":"网络","type":"单选","chapter":"网络爬取","stem":"查询信息在信息处理中所属的阶段是：","options":{"A":"输入","B":"加工","C":"输出","D":"输入或输出"},"answer":"C","explanation":"查询信息是把信息呈现给用户，属于输出阶段。","subject":"数据库","source_chapter":"网络爬取"},{"id":"web-23","source":"网络","type":"单选","chapter":"网络爬取","stem":"在编辑 Word 文档中，\"Ctrl+A\" 表示：","options":{"A":"选定多行文字","B":"选定整个文档","C":"选定一个句子","D":"选定一段文字"},"answer":"B","explanation":"Ctrl+A = Select All。","subject":"办公软件","source_chapter":"网络爬取"},{"id":"web-24","source":"网络","type":"单选","chapter":"网络爬取","stem":"在因特网上许多计算机和网络之间能够进行互相交流的基础是：","options":{"A":"Novell","B":"ATM","C":"TCP/IP","D":"X.25"},"answer":"C","explanation":"TCP/IP 是因特网的核心协议族。","subject":"计算机网络","source_chapter":"网络爬取"},{"id":"web-25","source":"网络","type":"单选","chapter":"网络爬取","stem":"信息技术发展的趋势是：","options":{"A":"易操作化、普遍化","B":"中文化、通用化","C":"网络化、高速化和多媒体化","D":"多用途化"},"answer":"C","explanation":"网络化、高速化和多媒体化是信息技术的发展趋势。","subject":"信息基础","source_chapter":"网络爬取"},{"id":"web-26","source":"网络","type":"单选","chapter":"网络爬取","stem":"FTP 代表的是：","options":{"A":"远程登录","B":"电子邮件","C":"文件传输","D":"网络会议"},"answer":"C","explanation":"FTP = File Transfer Protocol 文件传输协议。","subject":"计算机网络","source_chapter":"网络爬取"},{"id":"web-27","source":"网络","type":"单选","chapter":"网络爬取","stem":"互联网就是由许多计算机网络通过（  ）互连接而成的网络：","options":{"A":"集线器","B":"路由器","C":"网卡","D":"网桥"},"answer":"B","explanation":"路由器连接不同网络，是互联网的核心设备。","subject":"计算机网络","source_chapter":"网络爬取"},{"id":"web-28","source":"网络","type":"单选","chapter":"网络爬取","stem":"要取消分栏，设置分栏的数目为：","options":{"A":"0","B":"1","C":"2","D":"12"},"answer":"B","explanation":"1 栏 = 不分栏。","subject":"办公软件","source_chapter":"网络爬取"},{"id":"web-29","source":"网络","type":"单选","chapter":"网络爬取","stem":"下列哪种媒体最适合用于讲课提纲、说明性文字等的呈现：","options":{"A":"视频","B":"图像","C":"文本","D":"动画"},"answer":"C","explanation":"提纲和说明性文字以文本最直接清晰。","subject":"多媒体","source_chapter":"网络爬取"},{"id":"web-30","source":"网络","type":"单选","chapter":"网络爬取","stem":"下列哪种说法是错误的：","options":{"A":"RealMedia 文件优点是流媒体文件，音质较好。缺点是占用带宽大，不能用于网络广播","B":"Windows Media 文件基于网络流媒体技术的音频格式","C":"WAV 文件是较通用的音频格式","D":"MP3 文件是压缩比例较高，声音质量较好的音频格式"},"answer":"A","explanation":"RealMedia 正是流媒体技术，可以用于网络广播。","subject":"多媒体","source_chapter":"网络爬取"},{"id":"web-31","source":"网络","type":"单选","chapter":"网络爬取","stem":"关于操作系统的叙述（  ）是不正确的：","options":{"A":"管理资源的程序","B":"管理用户程序执行的程序","C":"能使系统资源提高效率的程序","D":"能方便用户编程的程序"},"answer":"D","explanation":"操作系统不直接帮助编程，编程需要编译器/IDE。","subject":"操作系统","source_chapter":"网络爬取"},{"id":"web-32","source":"网络","type":"单选","chapter":"网络爬取","stem":"用户程序中的输入、输出操作实际上是由（  ）完成：","options":{"A":"程序设计语言","B":"编译系统","C":"操作系统","D":"标准库程序"},"answer":"C","explanation":"I/O 由操作系统通过系统调用提供。","subject":"操作系统","source_chapter":"网络爬取"},{"id":"web-33","source":"网络","type":"单选","chapter":"网络爬取","stem":"计算机系统中判别是否有中断事件发生应是在（  ）：","options":{"A":"进程切换时","B":"执行完一条指令后","C":"执行 P 操作后","D":"由用户态转入核心态时"},"answer":"B","explanation":"CPU 在每条指令执行结束后检查中断。","subject":"计算机基础","source_chapter":"网络爬取"},{"id":"web-34","source":"网络","type":"单选","chapter":"网络爬取","stem":"设计批处理多道系统时，首先要考虑的是（  ）：","options":{"A":"灵活性和可适应性","B":"系统效率和吞吐量","C":"交互性和响应时间","D":"实时性和可靠性"},"answer":"B","explanation":"批处理系统重在效率和吞吐量。","subject":"其他","source_chapter":"网络爬取"},{"id":"web-35","source":"网络","type":"单选","chapter":"网络爬取","stem":"若当前进程因时间片用完而让出处理机时，该进程应转变为（  ）状态：","options":{"A":"就绪","B":"等待","C":"运行","D":"完成"},"answer":"A","explanation":"时间片到期，进程仍可执行，进入就绪态。","subject":"操作系统","source_chapter":"网络爬取"},{"id":"web-36","source":"网络","type":"单选","chapter":"网络爬取","stem":"支持程序浮动的地址转换机制是（  ）：","options":{"A":"页式地址转换","B":"段式地址转换","C":"静态重定位","D":"动态重定位"},"answer":"D","explanation":"动态重定位允许程序在内存中随时移动。","subject":"计算机基础","source_chapter":"网络爬取"},{"id":"web-37","source":"网络","type":"单选","chapter":"网络爬取","stem":"在可变分区存储管理中，最优适应分配算法要求对空闲区表项按（  ）进行排列：","options":{"A":"地址从大到小","B":"地址从小到大","C":"尺寸从大到小","D":"尺寸从小到大"},"answer":"D","explanation":"最优适应找最小够用的空闲区，需按尺寸从小到大排序。","subject":"算法与数据结构","source_chapter":"网络爬取"},{"id":"web-38","source":"网络","type":"单选","chapter":"网络爬取","stem":"在客户机/服务器结构模式中，若服务器的处理能力弱而客户机的处理能力强，则称为：","options":{"A":"强服务器/弱客户机","B":"强客户机/弱服务器","C":"胖服务器/瘦客户机","D":"胖客户机/瘦服务器"},"answer":"D","explanation":"胖客户机即客户端处理能力强。","subject":"计算机网络","source_chapter":"网络爬取"},{"id":"web-39","source":"网络","type":"单选","chapter":"网络爬取","stem":"在一款概念汽车的设计、测试、生产过程中，最不可能用到的是：","options":{"A":"CAD","B":"CAT","C":"CAM","D":"CAI"},"answer":"D","explanation":"CAI 是计算机辅助教学，不会用于汽车设计/制造。","subject":"信息基础","source_chapter":"网络爬取"},{"id":"dy-64799","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"关于信息的说法，以下叙述中正确的是（","options":{"A":"只有以文字的形式才能长期保存信息","B":"数字信号比模拟信号易受干扰而导致失真","C":"计算机以数字的方式对各种信息进行处理","D":"信息的数字化技术已逐步被模拟化技术所取代"},"answer":"C","explanation":"音频或视频也可以长期保存信息，因此A选项不正确；计算机当中都\n是以一二进制方式存储和处理各种信息，所以C选项正确。模拟信号比数字信号易受干扰而导致失\n真，因此B选项不正确；模拟化技术已逐步被信息的数字化技术所取代，因此D选项不正确。故\n正确答案为 C。","subject":"多媒体","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-16099","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"一维码是一种用若干个与二进制相对应的几何图形来表示数据信息的编码，可使用在线二\n维码生成器生成“四川省德阳市”的二维码，这一生成过程属于（）。","options":{"A":"文字识别","B":"信息编码","C":"图像处理","D":"信息扫描"},"answer":"B","explanation":"信息编码是信息从一种形式或格式转换为另一种形式的过程，在此过\n程中规定了表示信息的信号，这个过程就是编码。由题意可知通过二维码在线生成器生成“四川\n省德阳市”二维码就是实现信息编码过程。所以选项B正确。A选项：文字识别是利用计算机自\n动识别字符的技术，是模式识别应用的一个重要领域。C选项：图像处理（image processing），\n用计算机对图像进行分析，以达到所需结果的技术，又称影像处理。故正确答案为B。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-40512","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"电子警察采用拍照的方式来约束车辆的行为，其拍照的过程属于（）。","options":{"A":"信息储存","B":"信息采集","C":"信息处理","D":"信息加工"},"answer":"B","explanation":"选项A：信息存储是将获得的信息或加工后的信息保存起来，以备将\n来应用。信息储存不是一个孤立的环节，它始终贯穿于信息处理工作的全过程。选项C：信息处\n理的过程主要包括信息的输入、储存、加工、输出。选项D：信息加工是对收集来的信息进行去\n伪存真、去粗取精、由表及里、由此及彼的加工过程。它是在原始信息的基础上，生产出价值含\n量高、方便用户利用的二次信息的活动过程。选项B：信息采集是指通过各种途径对相关信息进\n行搜索、归纳、整理并最终形成所需有效信息的过程。电子警察采用拍照的过程属于信息采集过程\n故正确答案为B。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-11392","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"交警部门利用雷达测速仪可以准确地判断车辆行驶速度，这主要是应用了信息技术中的\n）。","options":{"A":"语音技术","B":"传感技术","C":"多媒体技术","D":"虚拟现实技术"},"answer":"B","explanation":"A选项语音技术让计算机能听、能说，是人机交互的发展方向。B选项\n传感技术是利用各种信息传感器获取物理信息，然后利用计算机处理系统对获取的信号信息进行\n处理的一一种技术。C选项多媒体技术是指通过计算机对文字、数据、图形、图像、动画、声音等\n多种媒体信息进行综合处理和管理，使用户可以通过多种感官与计算机进行实时信息交互的技术，\n又称为计算机多媒体技术。D选项虚拟现实技术是一一种可以创建和体验虚拟世界的计算机仿真系\n统，它利用计算机生成一种模拟环境，是一种多源信息融合的、交互式的三维动态视景和实体行\n为的系统仿真使用户沉浸到该环境中。故正确答案为B。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-96143","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列不属于信息资源管理的是（","options":{"A":"用数码相机拍照","B":"使用学籍管理系统管理学生的学籍信息","C":"将下载的电影、歌曲归类放在不同的文件夹中","D":"使用Excel统计学生的考试成绩"},"answer":"A","explanation":"信息资源管理是指对信息本身即信息内容实施管理的过程，即采用各\n种技术方法和手段（如分类、主题、代码、计算机处理等）对信息进行组织、控制、存储、检索\n和规划等，并将其引向预定自标。而用数码相机拍照属于采集信息，所以不属于信息资源管理，\n故正确答案为A。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-40230","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机中的图像，归根结底是用（）方式存储的。","options":{"A":"二进制数","B":"高数据压缩","C":"位图","D":"数据"},"answer":"A","explanation":"计算机中所有的信息都是以二进制方式存储的。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-55127","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机之所以能够实现连续运算，是由于采用了（）的工作原理","options":{"A":"布尔逻辑","B":"存储程序","C":"电子管","D":"集成电路"},"answer":"B","explanation":"由于采用了存储程序工作原理，所以计算机能够实现连续运算。A选\n项布尔逻辑是TRUE和FALSE逻辑值。C和D选项为计算机在发展中的电子元器件。故正确答\n全金标尺教育\n案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-72621","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机硬件能够直接识别的程序是（","options":{"A":"C语言程序","B":"机器语言程序","C":"高级语言程序","D":"低级语言程序 三金标尺教育"},"answer":"B","explanation":"机器语言是计算机系统唯一能识别的，不需要翻译直接供机器使用的程序设\n计语言，机器语言程序是计算机能直接识别的程序。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-86882","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"英文简写\n“CAD”在计算机应用领域是指（）。","options":{"A":"计算机辅助学习","B":"计算机辅助制造","C":"计算机辅助设计","D":"计算机辅助仿真模拟"},"answer":"C","explanation":"计算机的辅助应用主要包括以下几方面的内容：1.计算机辅助工程\n（CAE）；2.计算机辅助测试（CAT）；3.计算机辅助制造（CAM）；4.计算机辅助教学（CAI）；\n5.计算机辅助设计（CAD）。故本题答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-19783","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"机器人是自动执行工作的机器装置，它的任务是协助或取代人类的工作，例如生产业、\n建筑业，或是危险的工作。按计算机应用的类型划分，它属于（）。","options":{"A":"科学计算","B":"数据处理","C":"辅助设计","D":"人工智能"},"answer":"D","explanation":"此题在考查计算机的应用的知识，其中机器人属于人工智能的应用领\n域。A选项科学计算是计算机最早的应用领域：B选项数据处理是计算机最广泛最重要的应用领域\nC选项辅助设计是计算机应用领域之一。故本题答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-28545","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"以下（）属于人工智能技术的应用。（2017年公开招聘工作人员考试试卷）","options":{"A":"鼠标／图形用户界面","B":"语音输人法 语音识别技术","C":"用画笔进行画画","D":"“Office 助手”"},"answer":"B","explanation":"人工智能（Artificial Intelligence）简称AI，是指用计算机来模拟人类\n的思维或行为。包括有机器人、机器翻译、机器博奔、模式识别、专家系统等。其中常见的模式\n识别主要有：文字识别、语音识别、指纹识别等。B选项是计算机的人工智能在“语音识别”方\n面的应用。A选项图形用户界面是一种人与计算机通信的界面显示格式，允许用户使用鼠标等输\n人设备操纵屏幕上的图标或菜单选项，以选择命令、调用文件、启动程序或执行其它一些日常任\n务。C选项用画笔进行画画是用指用计算机绘画。D选项Office助手可以帮助您查找“帮助”主题、\n显示提示并针对您正在使用的程序的各种特定功能提供帮助信息。故正确答案为B。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-42792","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"气象部门利用计算机处理大量气象数据，属于计算机应用中的（","options":{"A":"虚拟现实","B":"科学计算","C":"自动控制","D":"辅助教学"},"answer":"B","explanation":"科学计算即是数值计算，科学计算是指应用计算机处理科学研究和工\n程技术中所遇到的数学计算。在现代科学和工程技术中，经常会遇到大量复杂的数学计算问题\n这些问题用一般的计算工具来解决非常困难，而用计算机来处理却非常容易。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-39314","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"分辨率是显示器的主要指标之一，其含义是（）。","options":{"A":"可显示不同颜色的总数","B":"显示屏幕上的像素的列数和行数","C":"同一幅画面充许显示不同颜色的最大数目","D":"显示屏幕的水平和垂直扫描频率"},"answer":"B","explanation":"分辨率就是屏幕图像的精密度，是指显示器所能显示的像素的多少。\n分辨率的表示方式就是所有经线和纬线交叉点的数目。故正确答案为B。\n14.答案.A。寄存器属于CPU部件，速度最快；Cache存储器位于CPU和内存之间，缓\n解二者速度不匹配的问题，速度不如CPU，但比内存快；内存也叫主存储器，外存也叫存储器，\n内存比外存快；后备存储器，如U盘、光盘等，速度相对最慢。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-23841","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"开机时，显示器短暂显示并伴随1长1短报警声后死机，造成这样的可能原因（）。","options":{"A":"主板故障","B":"显示器故障","C":"电源故障","D":"内存条松动"},"answer":"A","explanation":"1长1短：RAM或主板出错；1长2短：显示器或显示卡错误；重复短响：\n电源故障；重复长响：内存条未插紧。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-80454","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"针式打印机属于（","options":{"A":"非击打式打印机","B":"感应式打印机","C":"击打式打印机","D":"摩擦式打印机"},"answer":"C","explanation":"打印机氛围击打式和非击打式，其中击打式包括针式打印机，非击打\n式包括喷墨、激光、热敏等形式打印机。故本题答案为C。\n储程序与程序控制”的设计思想。现今的计算机依旧是以其提出的体系结构进行设计的。EDVAC\n是第一台现代意义的通用计算机。ENIAC是世界上第一台电子计算机，EDVAC首次使用二进制\n并实现了“存储设备”方案，所以A选项错误，D选项正确。把计算机的发展过程分4个时代是\n按照计算机的电子元器件进行的，分别是电子管、晶体管、中小规模集成电路、大规模和超大规\n模集成电路，B选项错误。微型计算机主要以CPU为核心部件，第一块微处理器是1971年研制\n成功的，属于计算机发展的第四代，C选项错误。故正确答案为择D。\n金际R教育","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-16220","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列对计算机的分类，不正确的是（）。","options":{"A":"按用途可以分为通用计算机和专用计算机等","B":"按性能可以分为巨型计算机、大/中型计算机、小型计算机、微型计算机和单片机","C":"按CPU芯片可分为单片机、中板机、多芯片及和多板机","D":"按字长可分为8位机、16位机、32位机和64位机"},"answer":"C","explanation":"按计算机结构可分为单片机、中板机、多芯片及和多板机。故正确答\n案为 C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-7851","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列关于常见接口的描述错误的是（）。","options":{"A":"HDMI接口只能传输视频信号","B":"VGA接口只能传输视频信号","C":"显示器黑屏可能与接口故障有关","D":"投影仪一般接HDMI接口"},"answer":"A","explanation":"HDMI接口为高清多媒体接口，是一种全数字化视频和声音发送接口，\n可以发送未压缩的音频及视频信号，常用语投影仪、机顶盒等设备。A选项错误，D选项错误。\nVGA接口为视频图形阵列，是传输模拟信号的个接口标准，只能支持视频传输，B选项正确。\n显示器黑屏故障原因有多种，若接口出现故障，信号并不能正确输送，也会发生黑屏，C选项正确，\n故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-86593","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"运算器的主要功能是（）。","options":{"A":"进行算术运算","B":"进行逻辑运算","C":"分析指令并进行译码","D":"实现算术运算和逻辑运算"},"answer":"D","explanation":"运算器是计算机中处理数据的核心部件，主要执行算术运算和逻辑运\n算。控制器的主要功能就是按取指令、分析指令、执行指令这样的步骤进行周而复始的控制过程，\n直到完成程序所规定的任务并停机为止。故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-67342","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"台式计算机中的部件，有些直接插到主板的插槽或插座上，有些通过数据线与主板相连\n下列部件中需通过数据线与主板连接的是（）。","options":{"A":"显卡","B":"SATA固态硬盘","C":"CPU","D":"内存"},"answer":"B","explanation":"SATA固态硬盘属于计算机的硬件设备中的外部存储器，不能直接进\n行访问，需要SATA供电口与SATA数据线，并将数据线的另一端插到主板的SATA口上。而内存、\n显卡CPU都可直接插到主板上相对应的插槽中进行使用。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-73692","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"2024年上新的HUAWEI MatebookD16笔记本计算机，其配置参数为：core i9\n13900H/16GB/1TB SSD/16’/IEEE802.11a。下列关于参数描述错误的是（）。","options":{"A":"该计算机具有WLAN标准","B":"处理器是Intel公司的产品","C":"该计算机内存容量为16GB","D":"该计算机采用的机械硬盘容量为1TB"},"answer":"D","explanation":"参数的含义分别为，处理器型号／内存容量／硬盘容量／屏幕尺寸／网\n络标准。该产品的处理器为酷睿（core）i913900H，内存容量16GB，外存采用的为固态硬盘，\n容量1TB，屏幕尺寸16寸，网络标准为无线网络IEEE802.11a标准，即WLAN网络标准。故正\n确答案为 D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-59572","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机存储设备中，（）是存放程序和数据的仓库，可以长期大量地保存信息。","options":{"A":"内存","B":"外存","C":"缓存","D":"闪存"},"answer":"B","explanation":"存储器是用来存储数据和程序的部件，分为内存储器和外存储器。内\n存储器又称主存储器，简称内存或主存，用来存放正在运行的程序和数据，可以直接与CPU进\n行信息交换，它具有速度较快，容量相对较小。外存储器又称辅助存储器，简称外存。CPU不能\n直接访问。主要用于存放等待运行或处理的程序文件，它具有存储容量大，存取速度相对内存要\n慢得多。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-662","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"2023年8月我国发布的麒麟9000S芯片对于5G发展具有重要意义，是中国科技领域取得\n的重要突破，显示了中国在（）领域的独立性。","options":{"A":"CPU","B":"RAM","C":"SSD","D":"IOT"},"answer":"A","explanation":"麒麟9000S是HUAWEIMate60系列搭载的CPU核心处理器，主要体\n现在CPU领域的发展。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-66820","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"（）是计算机的心脏，其设计、制造技术的不断提高和更新换代，推动了计算机系统\n的迅猛发展","options":{"A":"内存","B":"主板","C":"CPU","D":"硬盘"},"answer":"C","explanation":"CPU是一台计算机的核心部件，相当于人的大脑；内存是计算机存储\n器的一部分，用来存储当前正在运行的程序和数据；硬盘是计算机的外存；主板是连接计算机各\n个硬件的一个部件，是计算机内部的桥梁。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-83396","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"不同的存储器运行速度是不同的，以下存储器中访问最快的是（）。","options":{"A":"硬盘存储器","B":"软盘存储器","C":"磁带存储器","D":"内存储器 二金标R教育"},"answer":"D","explanation":"硬盘存储器又叫磁盘存储器，属于外存。软盘和磁带也都属于外存。\n访问速度依照 CPU缓存内存外存的顺序依次变小。故正确答案为 D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-84424","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机的主机主要由（）部件组成。","options":{"A":"CPU、外存储器、外部设备","B":"CPU和内存储器","C":"CPU和存储器系统","D":"主机箱、键盘、显示器"},"answer":"B","explanation":"本题考查主机的组成。计算机的主机是由CPU和内存储器组成，存储\n器系统包括内存和外存，键盘、显示器属于输人输出部分，外部设备又包括输入输出部分。故正\n确答案为 B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-52736","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"完整的冯·诺依曼结构的计算机硬件系统包括（：）。","options":{"A":"CPU、内存、键盘、显示器","B":"运算器、控制器、键盘、显示器","C":"CPU、存储器、I/O 设备","D":"CPU、存储器、键盘、鼠标、显示器"},"answer":"C","explanation":"本题考查的是冯·诺依曼结构的计算机硬件系统，主要包括五大部件\n人和输出设备统称为I/O设备。故正确答案为C。\n29.（答案B。解析：本题考查的是计算机硬件系统的知识，条形码阅读器通过扫描二维码、\n条形码等图像并编码存入计算机中，属于输入设备。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-58410","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"断电会使存储数据丢失的存储器是（）。","options":{"A":"RAM","B":"硬盘","C":"ROM","D":"软盘"},"answer":"A","explanation":"本题考查不同存储设备的特点。随机存储器（RAM），断电丢失数据，\n存储当前运行的程序信息；只读存储器（ROM），永久保存数据，存储微型机的重要信息。硬盘\n软盘中存储的数据，断电后也不会丢失。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-60721","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"关于软件，下列说法不正确的是（）。","options":{"A":"在设计计算机系统时，软件与硬件是相互独立的","B":"软件是用户与硬件之间的接口界面","C":"用户主要是通过软件与计算机进行交流","D":"软件是计算机系统设计的重要依据"},"answer":"A","explanation":"软件是在硬件的基础上进行设计的，需要硬件的支持，因此两者之间\n不是相互独立的；软件是用户和计算机硬件之间的接口，用户主要是通过软件和计算机进行交流。\n故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-34575","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"制作电子报刊需用到字处理软件制作，可用下列（）国产软件制作。","options":{"A":"360安全卫士","B":"WPS","C":"百度","D":"Microsoft Office 三金标尺教育"},"answer":"B","explanation":"360安全卫士是杀毒软件，用于病毒的防护和查杀；WPS是国产的\n办公软件，用于文字处理；百度是国产功能最强的搜索弓引擎，用于信息检索；MicrosoftOffice即\n微软Ofice办公软件，不是国产。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-37924","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"以下哪个不正确（）。","options":{"A":"Word文档可保存纯文本文件","B":"Excel 可以在 Word 中使用","C":"Windows系统自带“画图”工具中可输人文字","D":"记事本编辑文本可插图"},"answer":"D","explanation":"Word文档在保存时，将保存类型选为纯文本（*.txt），如果是已经保\n存过的.doc文件，选另存为命令，再将保存类型选为纯文本（*.txt）即可保存为纯文本文件。Word中，\n选择插人选项卡中文本功能区，对象按钮，选择由文件创建即可插入Excel表格。Windows系统\n自带“画图”工具中选中文本图标‘A’；即可在画布中输入文字。Windows 系统本身自带的记\n事本是无法插人图像的。记事本的特点是只支持纯文本，只能处理纯文本文件，它只具备最基本\n的编辑功能，所以体积小巧，启动快，占用内存低，容易使用。故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-36910","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"某学校的图书馆管理软件是属于（","options":{"A":"字处理软件","B":"电子表格软件","C":"系统软件","D":"应用软件"},"answer":"D","explanation":"计算机的软件系统包括系统软件和应用软件，其中系统软件包括：操\n作系统、程序设计语言、数据库管理系统；应用软件是为完成特定任务而设定的计算机程序，是\n在系统软件的基础上为解决用户的具体问题而设计的软件。A选项为处理文字的软件，如Word;\nB选项为处理数据的软件，如Excel。故正确答案为 D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-57708","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"主要用来衡量计算机运行速度的是（）。","options":{"A":"字长","B":"存储容量","C":"可靠性","D":"主频"},"answer":"D","explanation":"主频是指计算机的时钟频率，即CPU在单位时间内发出的脉冲数，\n单位为MHz。它在很大程度上决定计算机的运算速度，主频越高，计算机的运算速度越快。A选项，\n字长是指计算机可以直接处理的二进制数据的位数，它直接影响的是计算机的计算精度；B选项，\n存储容量越大，所能存储的数据和运行的程序就越多；C选项，可靠性是衡量计算机运算结果是\n否准确，数据是否可靠的指标。故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-94565","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机的技术指标有多种，但最主要的应该是（）。","options":{"A":"语言、外设和速度","B":"主频、字长和内存容量","C":"外设、内存容量和体积","D":"软件、速度和重量"},"answer":"B","explanation":"计算机的主要性能指标包括：字长、主频、运算速度、存取周期、存\n储容量。\n字长：指计算机一次所能处理数据的实际位数。它决定了计算机数据处理的速度，字长越长，\n计算机的运算精度越高，计算机的处理能力越强。\n主频：计算机的时钟频率，即 CPU在单位时间内发出的脉冲数，单位为 MHz。它在很大程\n度上决定计算机的运算速度。主频越高，计算机的运算速度越快。\n存储容量：衡量存储器存储能力的性能指标。存储容量越大，所能存储的数据和程序就越多。\n存储周期：对存储器进行连续存取所允许的最短时间间隔。存取周期越短，存取速度越快。\n故正确答案为 B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-368","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"将16进制2AF转换成十进制数是（）。","options":{"A":"786","B":"689","C":"382","D":"687"},"answer":"D","explanation":"本题主要考查的是非十进制数与十进制数之间的转换，应采用位权展\n开法，即（2AF）16=2*16+10*16°+15*16（687）10。故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-56209","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"与十六进制数0.2等值的十进制数是（）。","options":{"A":"0.2","B":"0.4","C":"0.125","D":"0.25"},"answer":"C","explanation":"十六进制数转换成十进制数的方法为位权展开求和法，2×16\n=0.125。故正确答案为 C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-44374","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"用三位二进制数计数，最大能表达的进制数是（）。","options":{"A":"1","B":"3","C":"7","D":"8"},"answer":"C","explanation":"二进制数的数码为0和1，三位二进制数最大，即为三位均为1即（111）\n2。根据二进制转十进制的算法“按位展开求和原则”可知：（111）2=1*22+1*21+1*2~0=（7）\n10。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-66060","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"二进制111000转换成十进制数为（）。","options":{"A":"55","B":"56","C":"57","D":"58"},"answer":"B","explanation":"此题考查进制之间的转换，从二进制转成十进制的方法是“按权展开\n再相加”，即25+24+23=56。故正确答案为B。\n45.答案】B。解析：1GB=1024MB，1MB=1024KB，1KB=1024B，1B=8b。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-94773","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"用一个字节最多能编出（）不同的码。","options":{"A":"8 个","B":"16个","C":"128 个","D":"256 个 二金标R教育"},"answer":"D","explanation":"个字节由8位二进制数组成，所以共可编出28=256个码。故正确\n答案为 D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-24587","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"在国标码中，要存储一部1000万字的中文电子书所需要的存储空间约为（）。","options":{"A":"10MB","B":"20MB","C":"100MB","D":"200MB"},"answer":"C","explanation":"一个字占两个字节，故而存储容量为1000万*2字节。又因\n1MB=1024KB，1KB=1024B，2000万／（1024*1024）=19.07MB，约为20MB。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-75893","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"一张存储卡剩余容量为4.7G，最多还能存储大小为480M的视频数是（","options":{"A":"9","B":"9","C":"10","D":"11"},"answer":"C","explanation":"4.7G=4.7×1024MB=4812.8MB，4812.8MB480MB～10个视频（向\n下取整）。故正确答案为C。\n49【答案）A。解析：计算机的三类总线包括：地址总线、数据总线、控制总线。故正确答\n案为 A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-95035","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"电脑在开机时提示：CMOSBatteryLowPressF1toResume可能是什么原因（","options":{"A":"内存坏了","B":"CMOS芯片坏了","C":"系统坏了","D":"主板电池没电了"},"answer":"D","explanation":"出现 CMOS Battery Low Press F1to Resume 提醒的原因可能是主板\n电池没电，因为CMOS Battery Low Press F1to Resume 翻译过来就是“CMOS电池低压，按F1继\n续”。A选项，内存坏了可能出现的情况：在开机后出现000x000000蓝屏的类似情况等。B选项，\nCMOS芯片坏了可能会出现系统时间混乱等问题。C选项，系统坏了可能出现的情况，开不了机。\n故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-90408","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"一台安装有WIN7系统的双核电脑，平时使用基本正常，看电影或处理照片时都没有出\n现过死机，但只要一玩3D游戏就容易死机，此时应重点检查（）。","options":{"A":"内存","B":"网卡","C":"显卡","D":"风扇"},"answer":"C","explanation":"由题干可得，看电影或处理照片没出现过死机，说明内存和风扇工\n作正常，排除AD；题中并未提及网络连接，因此与网卡无关，排除B。显卡又称显示适配器，\n是电脑进行数模信号转换的设备，承担输出显示图形的任务。3D游戏对显卡的运算速度有较高\n的要求，如果显卡不能达到要求，玩游戏时就会运行缓慢甚至是死机。故正确答案为C。\n52.【答案A。解析：机械硬盘即是传统普通硬盘，主要由：盘片，磁头，盘片转轴及控制\n电机，磁头控制器，数据转换器，接口，缓存等几个部分组成。如果硬盘由于电压变化等原因弓引\n起硬盘转速的突然改变，就容易出现磁臂定位不准或错误，以及机械控制部件故障，造成无法正\n常读取数据或硬盘盘片的坏道增加，从而导致硬盘出现异响。硬盘如果处于未接电源状态，就不\n会进行自检，更不会发出噪音。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-12586","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"BIOS设置程序主要对计算机的（）进行管理和设置，使系统运行在最好的状态下，使\n用BIOS设置程序还可以排除系统故障或者诊断问题，","options":{"A":"基本输人输出系统","B":"硬件系统","C":"软件系统","D":"应用系统"},"answer":"A","explanation":"BIOS是英文“Basic Input Output System”的缩略词，直译过来后中文\n名称就是“基本输人输出系统”。BIOS设置程序是储存在BIOS芯片中的，只有在开机时才可以\n进行设置。CMOS主要用于存储BIOS设置程序所设置的参数与数据，而BIOS设置程序主要对计\n算机的基本输人输出系统进行管理和设置，使系统运行在最好状态下，使用BIOS设置程序还可\n以排除系统故障或者诊断系统问题。故正确答案为A。\n54．【答案C。解析：A选项，明斯基是人工智能框架理论的创立者；B选项，扎德在控制\n理论方面有重要贡献；C选项，人工智能的含义最早是由图灵于1950年提出，并且同时提出一\n个机器智能的测试模型，图灵又被称为“人工智能之父”；D选项，冯.诺依曼是“计算机之父”，\n提出了“存储程序与程序控制”原理。故正确答案为C。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-51987","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"利用计算机来模拟人类思维活动，如医疗诊断，定理证明等，这一应用属于（）","options":{"A":"数值计算","B":"辅助教育","C":"自动控制","D":"人工智能"},"answer":"D","explanation":"利用计算机来模拟人类思维活动，这是人工智能的广义定义。故正确\n答案为 D。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-46908","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"（）是利用计算机对物体、图像、语音、字符等进行自动识别的技术，它的一般过程包括：\n样本采集、信息的数字化、预处理、数据特征的提取、与标准模式进行比较、分类识别等。","options":{"A":"网络识别","B":"模式识别","C":"生物识别","D":"自然语言理解"},"answer":"B","explanation":"模式识别就是通过计算机用数学技术方法来研究模式的自动处理和\n判读，把环境与客体统称为“模式”。随着计算机技术的发展，人类有可能研究复杂的信息处理\n过程，其过程的一个重要形式是生命体对环境及客体的识别。故正确答案为B。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-75966","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"光照的强弱可以觉得屏幕的亮度和键盘灯的开关，手机可以跟随放置角度在横竖屏之间\n三金标尺教育\n切换。对应的传感器是（）。","options":{"A":"光线传感器，重力传感器","B":"红外传感器，接近传感器","C":"光线传感器，感光传感器","D":"红外传感器，加速度传感器"},"answer":"A","explanation":"屏幕亮度可以根据光照强度改变，这利用了光线传感器技术，可以根\n据手机所处环境的光线来调节手机屏幕的亮度和键盘灯，手机领域常用；手机可以根据角度横竖\n屏幕切换，利用了重力传感器技术，重力传感器采用弹性敏感元件制成悬臂式位移器，与采用弹\n性敏感元件制成的储能弹簧来驱动电触点，完成从重力变化到电信号的转换，广泛应用在中高端\n智能手机和平板电脑内。故正确答案为A。","subject":"办公软件","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-43831","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列选项中，设备与设备控制器（1/0接口）之间互连的接口标准是（）。","options":{"A":"USB","B":"PCI","C":"AGP","D":"PCI-EXPREE"},"answer":"A","explanation":"A选项，USB是通用串行总线的缩写，是一个外部总线标准，用于规\n范电脑与外部设备的连接和通讯。随着时间的推移，它已经成为工业与基础设施应用的常用接口。\n诸如键盘、鼠标以及示波器等人机接口设备（HID）一般都采用USB接口。B选项，PCI是外设\n部件互连标准，它是目前个人电脑中使用最为广泛的接口，几乎所有的主板产品上都带有这种插\n槽。C 选项，AGP，全称AcceleratedGraphicPorts，PC 的图形系统接口的一种，目前已经被淘汰的\n图形系统接口。D选项，PCI Express 是新一代的总线接口。它采用了目前业内流行的点对点串行\n连接，比起PCI以及更早期的计算机总线的共享并行架构，每个设备都有自已的专用连接，不需\n要向整个总线请求带宽，而且可以把数据传输率提高到一个很高的频率，达到PCI所不能提供的\n高带宽。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-59523","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"某十进制正整数n转化为二进制数，该二进制末位是“0”。下列说法正确的是（）。","options":{"A":"n有可能是奇数也有可能是偶数","B":"若该二进制数的位数为4，则n的最大值是15","C":"n与n+1分别转换为二进制数，这两个二进制数的位数一定不同","D":"该二进制数末位的“o”去掉后，再转换为十进制数，所得的值是n/2"},"answer":"D","explanation":"十进制数转换为二进制数，通过“除2取余”法可得出，当二进制末\n位为0时，对应的十进制数一定为偶数，A选项错误。若该二进制数长度为4，且满足末位为0，\n最大为1110，对应的十进制数为14，B选项错误。结合上述分析，该十进制数n为偶数，例如n\n为4，则n+1为5，转换为对应的二进制数位数都为3，C选项错误。对于任意偶数十进制转换为\n二进制，若将二进制末位的0去掉，其对应的十进制数都会减少一半。故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-62502","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机的主要特点有（）","options":{"A":"速度快，精度低","B":"具有记忆和逻辑判断能力","C":"能自动运行，支持人机交互","D":"适合科学计算，不适合数据处理"},"answer":"BC","explanation":"计算机的主要特点有：\n（1）运算速度快、精度高。\n（2）具有存储与记忆能力。\n（3）具有逻辑判断能力。\n（4）自动化程度高。\n因此选B、C正确，A错误。数据处理是计算机最重要的应用领域，80%的计算机都用于数\n据处理，此外科学计算和数据处理均属于计算机应用领域，不属于计算机特点。故正确答案为\nBC。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-50629","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机的特点是（）。","options":{"A":"工作自动化","B":"精确性高","C":"储存容量大","D":"运算速度快"},"answer":"ABCD","explanation":"计算机的特点主要包括运算速度快、计算精度高、复杂的逻辑判\n断能力、具有自动执行功能、存储容量大、通用性强等。除此之外，计算机还有一些其他的特性，\n如通用性、高可靠性、易用性等。故正确答案为ABCD。","subject":"其他","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-71297","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"电子商场与传统意义上的商场有本质的不同，具体表现在（）。","options":{"A":"不需要修建商场建筑，经营规模不受场地限制","B":"商家可以不用交税","C":"营销成本较低","D":"便于与顾客保持更直接而密切的联系 三金标尺教育"},"answer":"ACD","explanation":"电子商场不需要有实体店，这样经营场地就不会有限制，同时相比\n传统意义上的商场，电子商场省去了分销商的环节，营销成本较低，另外电子商务可以借助网络\n通讯工具，实现与客户在网络上随时保持联系，便于沟通和交流。不管是电子商场还是实体店都\n需要交税，B不正确。故正确答案为ACD。","subject":"数据库","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-1980","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机工作原理是“存储程序和程序控制”原理，以下属于计算机执行程序指令的过程是","options":{"A":"取指令","B":"分析指令","C":"执行指令","D":"输出结果"},"answer":"ABC","explanation":"计算机的工作过程可归结为：取指令→分析指令一→执行指令一→再取\n下一条指令，直到程序结束的反复循环过程；D选项是输出设备的功能。故正确答案为ABC。","subject":"编程语言","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-17654","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下面是关于高速缓存Cache 的几个描述，正确的是（）。","options":{"A":"Cache运算速度高于内存而低于CPU","B":"Cache 的内容是RAM中的部分内容的副本","C":"Cache是内存储器的一部分，能暂时存放程序和数据","D":"CPU读写程序和数据时先访间Cache，若Cache中没有时，再访问RAM"},"answer":"ABD","explanation":"本题考查高速缓冲存储器Cache 的知识。Cache 即高速缓冲存储器，\n是位于CPU与主内存间的一种容量较小但速度很高的存储器。由于 CPU的速度远高于主内存，\nCPU直接从内存中存取数据要等待一定时间周期，Cache中保存着CPU刚用过或循环使用的一一部\n分。大致来说数据是通过内存Cache寄存器；Cache缓存则是为了弥补CPU与内存之间运算速度\n的差异而设置的的部件。故正确答案为ABD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-68121","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"关于CPU下面哪些说法是正确的（）。","options":{"A":"CPU全称为中央处理器（或中央处理单元）","B":"CPU能直接运行机器语言","C":"CPU最早是由Intel公司发明的","D":"同样主频下，32位CPU比16位的CPU运行速度快一倍"},"answer":"AB","explanation":"本题考查CPU相关知识。CPU成为中央处理器，也称中央处理单元\n是由运算器和控制器组成的；机器语言是计算机能够直接识别的语言；CPU最早是由巴丁提出的发\n明的晶体管和后来杰克·基尔比集成的“微芯片”发明的，Intel公司的霍夫改良的Intel4004；同\n样主频下，32位比16位CPU运行速度快，但是没有明显的倍数关系。故正确答案为AB。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-84202","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"以下哪些是激光打印机的优点（）。","options":{"A":"打印速度快","B":"工作噪声低","C":"打印成本低","D":"打印分辨率高"},"answer":"ABD","explanation":"与针式打印机和喷墨式打印机相比激光打印机的优点：（1）高\n密度；（2）高速度；（3）噪音低；（4）处理能力强。但相对于传统的打印机来说，激光打印\n机的打印成本较高。故正确答案为ABD。","subject":"多媒体","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-91667","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"中央处理器主要包括（）。","options":{"A":"运算器","B":"存储器","C":"控制器","D":"计算器"},"answer":"AC","explanation":"中央处理器（Central Processing Unit，简称CPU）又称为微处理器，\n是一块超大规模的集成电路，是一台计算机的核心部件，由控制器和运算器组成。控制器是计算\n机中控制管理的核心部件，运算器是计算机中处理数据的核心部件。故正确答案为AC。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-75669","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机软件是指计算机运行所需的（）。","options":{"A":"文件","B":"数据","C":"程序","D":"算法流程图"},"answer":"ABC","explanation":"计算机软件是指计算机系统中控制硬件完成预定任务的程序、表达\n系统内信息组织方式的数据结构以及有关软件开发、测试、维护、使用的所有文档的总和。故正\n确答案为ABC。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-46068","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"关于汉字字符码，下列说法正确的有（）。","options":{"A":"字形码是汉字的输出码","B":"汉字字形通常分为通用型和精密型","C":"汉字字形通常用点阵或矢量（轮廓）表示","D":"无论汉字的笔画多少，每个汉字都可以写在同样大小的方块中"},"answer":"ABCD","explanation":"输出汉字时，根据内码在字库中查到其字形描述信息，然后显示\n和打印输出，即字形码。描述汉字字形的方法主要有点阵字形和轮廓字形两种。汉字字形通常分\n为通用型和精密型。通用型汉字字形点阵分成3种：简易型16×16点阵；普通型24×24点阵；\n提高型32×32点阵。精密型汉字字形用于常规的印刷排版，通常采用信息压缩存储技术。不管\n汉字笔画多少，每个汉字占用的存储空间都是2字节，因此点阵方块的大小也相同。故正确答案\n为 ABCD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-26354","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"总线按照传输信息的种类，可以分为（）。","options":{"A":"信号总线","B":"地址总线","C":"数据总线","D":"控制总线"},"answer":"BCD","explanation":"总线（Bus）是计算机各种功能部件之间传送信息的公共通信干线，\n它是由导线组成的传输线束，按照计算机所传输的信息种类，计算机的总线可以划分为数据总线、\n地址总线和控制总线，分别用来传输数据、数据地址和控制信号。故正确答案为BCD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-90160","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"二维码是一种比一维码更高级的条码格式，二维码能存储的信息包括（）等。","options":{"A":"汉字","B":"数字","C":"图片","D":"字母"},"answer":"ABCD","explanation":"二维码又称QR Code，是一种编码方式，能存储很多信息，也能\n表示很多数据类型。它可以信息获取、网站跳转、广告推送、手机支付等功能：能存储的信息包\n括网址、名片、文本信息、特定代码和图片等。故正确答案为ABCD。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-8473","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"关于计算机总线的说明正确的是（）。","options":{"A":"计算机的五大部件通过总线连接形成一个整体","B":"总线是计算机客个部件之间进行信息传递的一组公共通道","C":"根据总线中流动的信息不同分为地址总线、数据总线、控制总线","D":"数据总线是单向的，地址总线是双向的"},"answer":"ABC","explanation":"总线（Bus）是计算机各种功能部件之间传送信息的公共通信干线，\n它是由导线组成的传输线束，按照计算机所传输的信息种类，计算机的总线可以划分为数据总\n线、地址总线和控制总线，分别用来传输数据、数据地址和控制信号。总线是一种内部结构，它\n是cpu、内存、输人、输出设备传递信息的公用通道，主机的各个部件通过总线相连接，外部设\n备通过相应的接口电路再与总线相连接，从而形成了计算机硬件系统。在计算机系统中，各个部\n件之间传送信息的公共通路叫总线，微型计算机是以总线结构来连接各个功能部件的。地址总线\n上的信息是单向传输的，数据总线上的信息是双向传输的，D项错误。故正确答案为ABC。\n19.答案）ABC。解析：ABC选项中的按键需要与其他按键结合使用，单独使用时，一般\n情况下没有作用。D选项Numlock是数字控制键，是指锁住数字。（锁定／解锁小键盘）如果在\n键盘上取消Numlock键，那么无法使用小键盘上面的数字。Numlock按键灯亮时，可以使用小键\n盘上的数字，如果熄灭时则不能使用。故正确答案为ABC","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-85609","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"芯片是PC机各组成部分相互连接和通信的枢纽，下列属于超大规模集成电路芯片组的有\n（）。","options":{"A":"南桥芯片","B":"CPU 芯片","C":"北桥芯片","D":"CMOS芯片"},"answer":"ABCD","explanation":"芯片组是构成主板电路的核心。-定意义上讲，它决定了主板的\n级别和档次。它就是”南桥”和”北桥”的统称，就是把以前复杂的电路和元件最大限度地集成\n电路，称为超大规模集成电路。现在的南桥、北桥、CMOS和 CPU芯片都能达到这个标准。故正\n确答案为ABCD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-6403","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"与八进制数（35）：是同一数的有（）。","options":{"A":"（11011）2","B":"（11101）2","C":"（29）10","D":"（1C）16"},"answer":"BC","explanation":"（35）8转换成对应的十进制数是29，A选项转换成对应的十进制\n数是27，B转换为对应的十进制数是29，D选项对应的十进制数是28。故正确答案为BC。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-93650","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"只有在高分辨率下达到高刷新频率，这样的显示器才能称之为性能优秀，刷新频率可分\n为（）。","options":{"A":"垂直刷新频率","B":"水平刷新频率","C":"平面刷新频率","D":"立体刷新频率"},"answer":"AB","explanation":"刷新频率可以分为水平刷新频率和垂直刷新频率。刷新率分为垂直\n刷新率和水平刷新率，一般提到的刷新率通常指垂直刷新率。垂直刷新率表示屏幕的图像每秒钟\n重绘多少次，也就是每秒钟屏幕刷新的次数，以Hz（赫兹）为单位。刷新率越高越好，图像就\n越稳定，图像显示就越自然清晰，对眼睛的影响也越小。刷新频率越低，图像闪烁和抖动的就越\n厉害，眼睛疲劳得就越快。故正确答案为AB。","subject":"多媒体","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-25370","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"电子商务模式是指在网络环境中基于一定技术基础的商务运作方式和盈利模式。淘宝网\n现在主要的电子商务模式包括（）两大部分。","options":{"A":"A2B","B":"C2C","C":"B2C","D":"P2P"},"answer":"BC","explanation":"A、B和C分别是Agency、Business 和 Customer 的缩写，A2B是代理\n服务商对企业，B2C是企业对个人，C2C是个人对个人，淘宝网现在主要的电子商务模式是C2C\n和B2C，故本题的答案为BC。P2P是英文 person-to-person（或 peer-to-peer）的缩写，意即个人\n对个人。又称点对点网络借款，是一种将小额资金聚集起来借贷给有资金需求人群的一种民间小\n额借贷模式。故正确答案为BC。","subject":"其他","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-6854","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"关于计算机硬件系统，哪些说法是正确的？","options":{"A":"软盘驱动器属于主机，软磁盘本身属于外部设备","B":"硬盘和显示器都是计算机的外部设备","C":"键盘和鼠标均为输人设备 三金标尺教育","D":"“裸机”指不含外部设备的主机，若不安装软件系统则无法运行"},"answer":"BC","explanation":"软盘驱动器是一种接口电路，它是连接主机与外设的桥梁，不属\n于主机，故A项错误。外部设备是指连在计算机主机以外的设备，它一般分为输人设备、输出\n设备和外存储器，硬盘属于外存储器，显示器为输出设备，故B选项说法正确。输人设备包括键\n盘、鼠标、扫描仪等，故C项正确。裸机是指没有预装任何软件的计算机，故D项描述错误。故\n正确答案为BC。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-11701","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列选项中，哪些属于计算机主机的组成部分（）。","options":{"A":"随机存储器","B":"只读存储器","C":"运算器","D":"控制器"},"answer":"ABCD","explanation":"：主机由CPU、内存储器构成。CPU又由运算器、控制器等组成。\n内存储器包括随机存储器（RAM）和只读存储器（ROM）。故正确答案为ABCD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-88491","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"信息技术的三大支柱是（）。","options":{"A":"传感技术","B":"通信技术","C":"计算机技术","D":"多媒体技术"},"answer":"ABC","explanation":"信息技术包括传感技术、通信技术、计算机技术和控制技术四个方\n面技术，传感技术是获取信息的技术，通信技术就是传递信息的技术，计算机技术就是处理信息\n的技术，而控制技术就是利用信息的技术。其中传感技术、通信技术、计算机技术等是现代信息\n技术的三大支柱。故正确答案为ABC。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-13692","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"小张准备写一期关于“四川小熊猫去哈尔滨炖大鹅”的探访文章，他可以获得相关素材\n的途径有（）。","options":{"A":"咨询相关专家","B":"上互联网","C":"查阅相关报刊杂志","D":"参观航天展"},"answer":"ABCD","explanation":"获取信息的常见方法如下：\n（1）阅读法：通过阅读报纸、杂志、图书、资料获取信息。\n（2）文献法：通过查阅专业文献获取信息。\n（3）访谈法：通过与人沟通获取信息\n（4）视听法：通过广播、电视、影视资料获取信息。\n（5）问卷法：通过调查问卷获取信息\n（6）网络检索法：通过计算机网络检索获取信息。因此A、B、C、D选项都是获得相关素\n材的途径。\n故正确答案为ABCD。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-14548","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"信息资源安全管理的主要任务（）。","options":{"A":"信息系统安全保护","B":"实体安全保护","C":"数据加密。","D":"有效责任机制。"},"answer":"ABCD","explanation":"本题考查信息资管安全管理采取有效的管理方式。A选项：信息\n系统安全包括硬件、软件维护等；B选项：实体包括房屋、设施等安全保护；C选项：采用数据\n加密技术、使信息在其处理过程（存储或传递）中，内容不被非法者获得，即在没有密钥的情况下，\n得到加密的信息无法被破译；D选项：建立有效的责任机制，防止用户否认其行为。如通过数字\n签名等手段，实现信息源（身份）和信息内容正确（一致性）认证，即抗抵赖性。本题选项都符\n合题意，主要应对由于突发事件、人为攻击等导致信息系统瘫痪和信息不可用的问题。故正确答\n案为 ABCD。","subject":"信息安全","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-51906","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"信息资源管理的目的是（）。","options":{"A":"传感技术","B":"通信技术","C":"计算机技术","D":"多媒体技术"},"answer":"ABCD","explanation":"信息管理的目标是：保证社会信息流在不同渠道中有序流动，信\n息的开发和利用在有领导、有组织的统一规划和管理下，协调一致、有条不紊地进行，使各类信\n息以更高的效率与效能、更低的成本，在国家与社会进步、经济发展、人民物质文化生活水平提\n高中充分发挥作用。故正确答案为ABCD。","subject":"多媒体","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-72205","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"在互联网上发布信息时要注意保护个人隐私，不仅包括自已的，还有他人的，以防备不法\n分子利用。","options":{},"answer":"正确","explanation":"正确的使用网络发布信息，","subject":"计算机网络","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-58340","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"系统软件是最靠近硬件的软件。","options":{},"answer":"正确","explanation":"计算机软件系统分为系统软件和应用软件，其中系统软件中包含操\n作系统，在计算机系统中，最贴近硬件的系统软件是操作系统。操作系统是用户与硬件交互的第\n一层系统软件，一切其他软件都要运行于操作系统之上。所以本题的说法是正确的。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-42982","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"微型计算机的显示系统指的就是显示器","options":{},"answer":"错误","explanation":"微型计算机的显示系统是由显示器和显卡、显示器数据线组成的，\n所以题目的说法是错误的。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-33293","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"文字、图形、视频、书本等都是信息","options":{},"answer":"错误","explanation":"信息是通过语言、文字、图形、图像等信号传送的音信、消息，它\n反映一一切事物的属性、状态及动态。书本是信息传播的途径，文字、图形和视频是信息传播的载体，\n都不是信息。\n6．【答案正确。解析：进制也就是进位计数制，是人为定义的带进位的计数方法。","subject":"多媒体","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-31467","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"信息技术是指与获取、加工、存储、传输、表示和应用信息有关的技术。","options":{},"answer":"正确","explanation":"信息技术借助以微电子学为基础的计算机技术和电信技术的结合而\n形成的手段，对声音的、图像的、文字的、数字的和各种传感信号的信息进行获取、加工、处理、\n储存、传播和使用的能动技术。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-48049","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"汉字交换码是真正的计算机内部用来存储和处理汉字信息的代码","options":{},"answer":"错误","explanation":"机内码是真正的计算机内部用来存储和处理汉字信息的代码，所以\n题干中所描述的说法是错误的。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-98799","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"回收站中的文件或文件夹不可以再进行还原。","options":{},"answer":"错误","explanation":"回收站中存放的是被删除的文件或者文件夹，在我们没有清空回收\n站之前，当我们想要恢复的时候是可以将其还原的，所以题干中描述的说法是错误的。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-48968","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"对文件重命名时，如果没有显示其扩展名，则只能修改主文件名。","options":{},"answer":"正确","explanation":"在只显示主文件名的情况下，用户只能修改文件的主文件名，不\n能对文件后缀名进行修改。","subject":"其他","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-98773","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"某学校的学籍管理软件属于系统软件。","options":{},"answer":"错误","explanation":"系统软件用来管理和维护计算机的程序，通常包括操作系统、程\n序设计语言和数据库管理系统等；应用软件也称应用程序，为完成特定任务而设定的计算机程序，\n是在系统软件的基础上为解决用户的具体问题而设计的软件，由此可以判断某学籍管理软件应该\n是属于应用软件，而不是系统软件。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-18945","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"微处理器指的是内存。","options":{},"answer":"错误","explanation":"微处理器是指中央处理器，是CPU，不是内存，所以微处理器是\n内存的说法是错误的。\n三金标R教育","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-11820","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"我们今天使用的电脑键盘的发明者是比尔盖茨。","options":{},"answer":"错误","explanation":"键盘的发明者叫克里斯托夫·肖尔斯。\n14．【答案错误。解析：计算机能直接识别的是机器语言，故题干中描述是错误的。","subject":"其他","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-82269","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机掉电后，ROM中的信息会丢失。","options":{},"answer":"错误","explanation":"ROM是只读存储器，只读存储器中的信息断电不会丢失，故题目\n中的描述是错误的。\n16.答案】错误。解析：硬盘数属于外存储器，故题目说法是错误的。\n17.（答案错误。解析：字长是指计算机一次能够处理的二进制的位数，所以十六位字长\n的计算机不是题目中描述的含义，另外计算机内部处理的是二进制的数据和指令，故题干中的描\n述是错误的。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-77232","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"1个字节是由8个二进制数位组成。","options":{},"answer":"正确","explanation":"1B=8b，故题目的描述是正确的。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-60442","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"外存中的数据可以直接进入CPU被处理","options":{},"answer":"错误","explanation":"外存储器又称辅助存储器，简称外存，CPU不能直接访问，故题\n自描述的说法是错误的。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-55522","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"文字信息处理时，各种文字符号都是以一二进制数的形式存储在计算机中","options":{},"answer":"正确","explanation":"计算机内部采用二进制来处理和表示数据和指令。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-99678","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"电子计算机的计算速度快但计算精度不高。","options":{},"answer":"错误","explanation":"电子计算机的计算精度高。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-77408","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"十进制数的11在十六进制中仍可写成11。","options":{},"answer":"错误","explanation":"十进制转换成十六进制的原则是：除十六取余倒着写，虽然十进\n制的11除以16的余数是仍然是11，但是要注意的是在十六进制中我们是没有11这种表示形式的，\n应该用B表示，故题目的说法是错误的。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-52836","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机处理信息的过程是收集信息，处理与存储信息，输出信息。","options":{},"answer":"正确","explanation":"信息处理的过程主要包括信息的输人、储存、加工、输出。","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-28375","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"键盘和投影仪是外部设备，它们属于输出设备。","options":{},"answer":"错误","explanation":"键盘是输入设备，投影仪数输出设备，故说法是错误的。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-83118","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"灰色命令项表示当前条件下改命令不能被执行。","options":{},"answer":"正确","explanation":"灰色的命令是不能用的，故题目的说法是正确的。","subject":"其他","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-24501","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"快捷方式就是原对象，删除它，就删除了原文件。","options":{},"answer":"错误","explanation":"快捷方式是一种特殊的类型，为用户提供了一个快速访问常用文\n件和应用程序的手段。用户可以自已创建快捷方式，同时册删除快捷方式并不影响程序的正常运行，\n故题目的说法是错误的。","subject":"编程语言","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-4918","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"文件起名时，主名可以使用任意字符，而扩展名不能，","options":{},"answer":"错误","explanation":"文件中不能使用的字符有“”、“}”\n等，所以在文件命名时主文件名并不是可以使用任意字符，故题目说法是错误的。","subject":"其他","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-99306","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机中数据是以文件为单位进行存储的，文件名由主文件名和扩展名组成。","options":{},"answer":"正确","explanation":"在Windows XP中所有的任务和资源都是以文件的形式存在，\nWindowsXP通过文件的管理达到控制和管理整个计算机的目的。每一个文件都有一个文件名作\n为标志，文件名一般由主文件名和扩展名组成，故题干中的说法是正确的。\n29.答案】错误。解析：计算机系统包括硬件系统和软件系统，题目中所说的是具体的硬\n件设备，故说法是错误的。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-50103","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机可以没有系统软件，但必须要有应用软件。\n全金标R教育\n操作系统原理","options":{},"answer":"错误","explanation":"计算机必须要有系统软件，系统软件是应用软件的基础，故题干\n中的说法是正确的。\n第二章\n操作系统原理","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-13352","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"一个计算机操作系统通常应具有（）。","options":{"A":"CPU的管理、显示器管理、键盘管理、打印机和鼠标管理等五大功能","B":"硬盘管理、全盘驱动器管理、CPU的管理、显示器管理和键盘管理等五大功能","C":"处理器（CPU）的管理、存储管理、文件管理、输人输出管理和作业管理五大功能","D":"计算机启动、打印、显示、文件存取和关机等五大功能"},"answer":"C","explanation":"本题在考查操作系统的功能，操作系统的功能是进程管理，处理机管理\n设备管理，文件管理，存储器管理和作业管理。故正确答案为C。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-85194","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"使用计算机能一边输文字一边听音乐，这主要体现了Windows的（）。","options":{"A":"单用户单任务技术","B":"多媒体技术","C":"文字处理技术","D":"多任务技术"},"answer":"D","explanation":"A选项单用户单任务技术是指在一个计算机系统中，一次只能运行一\n个用户任务，此用户独占计算机的全部软硬件资源：B选项多媒体技术就是计算机综合处理文本、\n图形图像、声音视频等媒体信息，使他们之间建立连接，从而集成一个具有良好交互功能的整体\n技术。C选项文字处理技术一般是指对文字进行格式化和排版。D选项多任务技术是指允许多个\n程序同时进入一个计算机系统的主存储器并运行这些程序。依据题意，计算机能同时输人文字和\n听音乐，属于多任务技术。故正确答案为D。","subject":"多媒体","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-53126","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"在系统和硬件中，操作系统是最核心的系统软件，它是（）。","options":{"A":"软件和硬件之间的接口","B":"源程序和自标程序之间的接口","C":"用户和计算机之间的接口","D":"外设和主机之间的接口"},"answer":"C","explanation":"操作系统有三大功能：首先，它是计算机系统软硬件资源的管理者;；\n二是计算机与用户之间的接口：三是提供软件的开发与运行环境。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-63472","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"在计算机系统中，操作系统的功能是（）。","options":{"A":"文字处理和表格制作","B":"辅助设计和实时控制。","C":"管理和控制系统资源","D":"信息处理和数值计算。"},"answer":"C","explanation":"操作系统（Operating System，简称 OS）是管理和控制计算机硬件与软\n件资源的计算机程序，任何其他软件都必须在操作系统的支持下才能运行，同时操作系统是用户\n和计算机的接口，也是计算机硬件和其他软件的接口。故而本道题目正确答案为C项。A项的文\n字处理和表格制作分别是Word和Excel、B项的辅助设计和实时控制属于计算机的应用领域、D\n项的信息处理和数值计算也属于计算机的应用，均不是计算机操作系统的功能。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-92150","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"计算机操作系统具有存储管理功能，可以自主的“扩大”存储空间，使得用户可以使用比\n实际内存大的多存储空间，这项技术称之为（）。","options":{"A":"虚拟存储技术","B":"高速缓存技术","C":"排队技术","D":"自动扩展技术"},"answer":"A","explanation":"所谓虚拟存储技术，就是把内存与外存有机的结合起来使用，从而得\n到一个容量很大的“内存”；这就称之为虚拟存储。高速缓冲技术，Cache 技术是一种高速缓冲\n存储器，是为了解决 CPU和主存之间速度不匹配而采用的一项重要技术。C、D选项的描述与本\n题无关。故正确答案为A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-89717","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"未装人（）软件的计算机是无法工作的。","options":{"A":"汉字系统","B":"操作系统","C":"数据库管理系统","D":"Word 2010"},"answer":"B","explanation":"操作系统是覆盖在计算机硬件上的第一层软件系统，是管理和控制计\n算机硬件与软件资源的计算机程序，是直接运行在“裸机”上的最基本的系统软件，任何其他软\n件都必须在操作系统的支持下才能运行。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-19943","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"操作系统的作用是（","options":{"A":"将源程程序编译成自标程序","B":"负责诊断机器的故障","C":"控制和管理计算机系统的各种硬软件资源的使用","D":"负责外设与主机的信息交换"},"answer":"C","explanation":"操作系统（OperatingSystem，简称OS）是管理和控制计算机硬件与软\n作系统的支持下才能运行。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-72861","source":"德阳","type":"单选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"（）算法导致长作业有可能会出现俄死的现象。","options":{"A":"程序性中断","B":"外部中断","C":"非屏蔽中断","D":"屏蔽中断"},"answer":"B","explanation":"A选项FCFS（First-Come-First-Serve）即先到先服务算法，其基本思\n想是按照作业到达的顺序进行调度，先到达的作业先进行处理。这种算法可能会导致等待时间长\n的作业饿死，因为等待时间短的作业会优先得到处理\nB选项SJF（ShortestJobFirst）即最短作业优先算法，其基本思想是系统对到达的作业按照\n其需要的服务时间进行排序，从短到长，当短作业到达时，如果系统未处于忙碌状态，则立即进\n行处理；如果系统处于忙碌状态，则将该作业放人待处理队列中等待处理。因此，最短作业优先\n算法可能会导致长作业饿死。\nC选项HRRN（Highest Response RatioNext）即最高响应比优先算法，其基本思想是综合考\n虑作业的等待时间和运行时间，选择响应比最高的作业进行处理。这种算法能够避免饥饿现象，\n因为等待时间长的作业会有更高的响应比，从而得到更多的处理机会。\nD选项RR（RoundRobin）即循环轮转算法，其基本思想是将时间划分为固定长度的小段，\n每个小段称为一个时间片。在每个时间片内选择一个作业进行处理，然后进人下一个时间片选择\n下一个作业进行处理，以此类推。这种算法能够保证每个作业都有机会得到处理，从而避免了饥\n饿现象。\n故正确答案为 B。","subject":"算法与数据结构","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-44528","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"操作系统的主要特性不包括（）。","options":{"A":"并发性","B":"共享性","C":"控制性","D":"同步性"},"answer":"CD","explanation":"操作系统的主要特性包括：并发性、共享性、虚拟性、异步性。故正\n确答案为 CD。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-24395","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列关于操作系统的叙述中，正确的有（）。","options":{"A":"操作系统是系统软件的核心","B":"操作系统是计算机硬件的第一级扩充","C":"操作系统是计算机和用户之间的接口和桥梁","D":"通过操作系统控制和管理计算机的全部软件资源和硬件资源"},"answer":"ABCD","explanation":"操作系统（Operating System，简称OS）是管理和控制计算机硬件\n与软件资源的计算机程序，是直接运行在“裸机”上的最基本的系统软件，任何其他软件都必须\n在操作系统的支持下才能运行。操作系统是用户和计算机的接口，同时也是计算机硬件和其他软\n件的接口。操作系统管理着计算机硬件资源，同时按照应用程序的资源请求，分配资源。故正确\n答案为 ABCD。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-82672","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"根据系统对用户要求的响应时间的长短，信息处理方式可分为批处理方式和实时处理方式\n下列系统要求采用实时处理方式的有（）
