"本题考查虚拟存储技术。操作系统的一个特征为“虚拟”：指的是通\n过某种技术把一个物理实体变为若干个逻辑上的对应物。常见的技术有时分复用技术和空分复用\n技术。时分复用：利用某设备在为某一用户服务的空闲时间，又转去为其他用户服务，使设备得\n到最充分的利用，例如处理器的分时共享。空分复用：可以通过虚拟存储器技术，将一台机器的\n物理存储器变为虚拟存储器，以便从逻辑上来扩充存储器的容量，例如虚拟存储器。依据题意，\n考查空分复用技术概念。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机真题"},{"id":"dy-20206","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"因为操作系统具有（）这一特点，所以才能极大地提高系统资源利用率并增大系统的\n吞吐量。","options":{"A":"共享性","B":"并发性","C":"虚拟性","D":"异步性"},"answer":"B","explanation":"本题考查操作系统特征。操作系统主要特征如下：\n（1）并发：指两个或多个事件在同一时间间隔内发生；\n（2）共享：指系统中的资源可供内存中多个并发执行的进程共同使用；\n（3）虚拟：指通过某种技术把一个物理实体变为若干个逻辑上的对应物；\n（4）异步：指进程的执行以不可预知的方式和速度向前推进。\n其中，通过多进程并发执行，能极大地提高系统资源的利用率，增加系统的吞吐量。故正确\n答案为 B。","subject":"操作系统","source_chapter":"德阳计算机真题"},{"id":"dy-29229","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在分布式系统中，可方便地添加若干台计算机，而不需对系统的软硬件进行修改。这体\n现了分布式系统（）的优点。","options":{"A":"方便通信","B":"可靠性高","C":"可扩充性好","D":"计算能力强"},"answer":"C","explanation":"本题考查分布式系统。分布式系统有以下优点：\n(1)经济：分布式系统通常就是在一个系统中使用集中在一起的大量廉价CPU，可以得到比\n单个大型集中式系统好的多的性能价格比；\n(2)快速：分布式系统由于使用了并行处理技术，因此它总的计算能力比单个的大型集中式\n系统强很多。\n(3)可靠：分布式系统中工作负载都是分散在多台机器上，单个机器故障只会使一台机器停机，\n而不会影响其他机器，从而获得很高的可靠性；\n(4)易扩充：分布式系统允许系统在需求增长时逐渐进行扩充。因此在分布式系统组成后，\n可以方便地添加若干台计算机，既不用修改软件，也不用另行设计硬件：\n(5)数据共享：允许多个用户访问一个公共的数据库;\n(6)设备共享：共享并不局限于数据，外围设备也允许多个用户共享。\n依据题意，方便计算机添加而不需要更改修改软硬件，属于以扩充性。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机真题"},{"id":"dy-55555","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在Windows 系统中，下列选项中的（）不能作为文件名。","options":{"A":"数字","B":"字母","C":"等号","D":"问号（英文输人法状态）"},"answer":"D","explanation":"本题考查文件命名规则。文件命名规则中对于不能用的字符如下：\n*、:、1、/、l、<、>、”、？。故正确答案为 D。","subject":"其他","source_chapter":"德阳计算机真题"},{"id":"dy-42909","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"可执行文件是指把编译后所产生的目标代码经过链接程序链接后所形成的文件，其后缀\n名是（）。","options":{"A":".txt","B":".rar","C":".obj","D":".exe"},"answer":"D","explanation":"本题考查文件管理。按文件中数据的形式分类，把文件分为三类：\n：（1）源文件：由源程序和数据构成的文件，由终端或输人设备输人的源程序和数据所形成\n的文件都属于源文件：\n（2）目标文件：把源程序经过编译程序编译过，但尚未经过链接程序链接的目标代码所构\n成的文件，后缀名是“obi”；\n（3）可执行文件：把编译后所产生的目标代码经过链接程序链接后所形成的文件，后缀名\n是“.exe”\n本题考查可执行文件，故正确答案为D。","subject":"编程语言","source_chapter":"德阳计算机真题"},{"id":"dy-82518","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"假设某台计算机的IP地址为192.168.1.1，子网掩码为255.255.255.0，该计算机正在网络\n监听局域网内的其他计算机，那么该局域网内的（）计算机不能被监听。","options":{"A":"192.168.2.1","B":"192.168.1.2","C":"192.168.1.168","D":"192.168.1.254"},"answer":"A","explanation":"本题考查子网掩码。依据题意，局域网中的计算机能否被监听，\n言下之意是选项中的IP地址和题干中的IP地址是否在同一个划分的子网中。判断IP地址是否在\n对比是否相同，若相同则在同一个子网，否则不是。题干中IP地址为192.168.1.1，子网掩码为\n255.255.255.0。转换为二进制再相“与”后结果：192.168.1.0。A选项相与的结果为192.168.2.0，\n与题干中相“与”的结果不一致，因此不在同一个子网中。故正确答案为 A。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-66587","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"（）适用于完全相同的两类网络的互联，主要功能是通过对数据信号的接收、放大、\n整形与转发，来扩大网络传输的距离。","options":{"A":"中继器","B":"交换机","C":"集线器","D":"路由器 全金标R教育"},"answer":"C","explanation":"本题考查网络设备。在网络连接中，延长线距，扩大传输距离的设备\n是中继器。在科技的发展中，逐渐诞生了集线器，功能更完善，包含了中继器的功能，此外，还\n能对数据信号的接收、放大、整形与转发。故正确答案为C。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-2838","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"不同的域名后缀对应不同的含义，下列对应有误的是（）。\n-政府机构","options":{"B":"edu教育机构","A":"gov","D":"org.. 盈利组织","C":"com商业组织"},"answer":"D","explanation":"本题考查域名结构。D选项org为非盈利机构，其余选项正确。\n故正确答案为D。\n49.事考帮答案A。解析：本题考查OSI参考模型。OSI模型分为七层，分别为：物理层、\n数据链路层、网络层、传输层、表示层、会话层和应用层。其中物理层位于第一层，是最基础的\n一层。故正确答案为 A。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-18470","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在普通视图和页面视图下，Word窗口可以显示一水平标尺，使用鼠标拖动标尺上方的滑\n块可以对选定的段落设置首行缩进的格式，如果在拖动的同时按住（）键，在标尺上会显示出\n具体缩进的数值。","options":{"A":"Tab","B":"Ctrl","C":"Enter","D":"Alt"},"answer":"D","explanation":"本题考查Word标尺功能。通过标尺可以调整段落缩进。当按\n住Alt键拖动时，会显示缩进的具体数值。故正确答案为D。","subject":"数据库","source_chapter":"德阳计算机真题"},{"id":"dy-24153","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"Word 的（）包含剪贴板、字体、段落、样式等功能区，其主要作田是帮助我们在文档\n中进行文字编辑和格式设置","options":{"A":"“开始”菜单选项卡","B":"“插人”菜单选项卡","D":"“布局”菜单选项卡","C":"“设计”菜单选项卡"},"answer":"A","explanation":"本题考查“开始”选项卡。“开始”选项卡，顾名思义，即打\n开Word文件后，开始对文档进行编辑，最基础的操作为文字、段落、样式等操作。故正确答案为A。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-83546","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"（）一般出现在文档中每页的底部，用于注释说明文档内容。","options":{"A":"题注","B":"备注","C":"尾注","D":"脚注"},"answer":"D","explanation":"本题考查尾注。依据题意，在每页的底部，且用于注释说明，\n描述的为脚注的功能。A选项题注是表格、图片的标题设置。B选项备注一一般无实际意义，与之\n最接近的为批注，主要是对文档中的内容进行注释说明，但通常显示在文档的右侧。C选项尾注\n是在整篇文档的末尾处的解释说明。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-55797","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"关于Word文档的水印效果，下列说法错误的是（）。","options":{"A":"水印效果可以是文字","B":"水印效果不可以是图片","C":"水印效果用于文档内容的底层显示虚影效果","D":"当文档有保密、版权保护等特殊要求时，可添加水印效果"},"answer":"B","explanation":"本题考查Word水印。水印效果用于文档内容的底层显示虚影效果，\n以满足对文档版权、保密等要求。C、D选项正确。水印的操作如下：\n水印\nO无水印(N)\n图片水印O\n选择图片(P)...\n缩放(L):\n）文字水印：\n培（国家／地区（L）：\n文字(T):\n字号(5):\n取消\n由图中可知，水印中可以插人文字或者图片，B选项错误。故正确答案为B。","subject":"信息安全","source_chapter":"德阳计算机真题"},{"id":"dy-30289","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"（）是编辑长文档时不可或缺的对象，是对文档主要内容的概括，通过它可以快速切\n换到需要的内容页，常用于公司制度或培训文档中。","options":{"A":"样式","B":"目录","C":"字体","D":"模板"},"answer":"B","explanation":"本题考查Word目录。A选项样式主要设置文档标题格式。B\n选项目录是对文档内容的概述，通过按住Ctrl键鼠标单击，可以快速跳转到目录对应的内容处。\nC选项字体主要对文档的字号、字体、颜色等设置。D选项模板是包含固定格式设置和版式设置\n的模板文件，用于帮助用户快速生成特定类型的Word文档。依据题意，描述的为目录。故正确\n答案为 B。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-76578","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在Word中，若对文档1进行修改后另存为文档2，则文档1将（","options":{"A":"被文档2覆盖","B":"保持修改后的状态","C":"以修改后的状态被自动保存","D":"保持修改前的状态"},"answer":"D","explanation":"本题考查Word另存为操作。对文档1进行修改后另存为文档2，\n会生成两个文件。且修改的内容体现在文档2中，而文档1内容仍然保持之前的状态。故正确答\n案为 D。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-24540","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在Excel工作表中，（C3：E5）区域单元格的个数为（）个。","options":{"A":"6","B":"8","C":"9","D":"10"},"answer":"C","explanation":"本题考查Excel区域运算符。C3:E5表示C3、C4、C5、D3、\nD4、D5、E3、E4、E5 单元格，合计9个。故正确答案为 C。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-1745","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"工作人员小张在Excel中输人公式时误将一个不包含任何值的单元格作为除数，此时，\n系统会显示（）以提示错误。\n三金标R教育","options":{"A":"#N/A","B":"#DIV/O !","C":"#NULL !","D":"#VALUE !"},"answer":"B","explanation":"本题考查Excel公式错处检查。A选项由于没有找打单元格对\n三金标尺教育\n应的内容，常在VLOOKUP函数中出现。B选项由于除数为O时会导致，如题所示，把不包含任\n何值的单元格作为除数，在计算时，会将该单元格数值按0处理，会出现该提示。C选项由于输\n人函数出错造成。D选项由于参与运算的数值为文本类型导致。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-5101","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在Excel工作表中，若A2、B2、C2、D2、E2单元格中分别为 5，10，15，20，30，则在\nF2单元格中输人“=SUM（A2：C2）”（引号不是输人的内容），则F2单元格的值为（）。","options":{"A":"20","B":"60","C":"50","D":"30"},"answer":"D","explanation":"本题考查 SUM 函数。依据题意，=SUM(A2:C2)，即求 A2、B2\n和C2三个单元格的和，结果为30。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-96830","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在职工工资统计表中，用筛选条件“职称津贴>490与奖金>3700”对工资数据进行筛选，\n则筛选结果为（）。","options":{"A":"职称津贴>490","B":"奖金>3700","C":"职称津贴>490且奖金>3700","D":"职称津贴>490或奖金>3700"},"answer":"C","explanation":"本题考查筛选。筛选条件为“职称津贴>490与奖金>3700”\n则筛选出的结果会同时满足这两个条件。故正确答案为C。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-32257","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"用户启动了Excel软件后，可使用（）组合键切换到“文件”一“打开”对话框中。","options":{"A":"Ctrl+E","B":"Ctrl+R","C":"Ctrl+D","D":"Ctrl+0"},"answer":"D","explanation":"本题考查“打开”快捷键。A选项为快速填充。B选项为向右填充。\nC选项为向下填充。D选项为打开文件快捷键。故正确答案为D。","subject":"操作系统","source_chapter":"德阳计算机真题"},{"id":"dy-54089","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"引用的作用在于标识工作表上的单元格或单元格区域，并告知Excel在何处查找公式中\n所使用的数值或数据，以下相关描述不正确的是（）。","options":{"A":"可以引用其他工作簿中的数据","B":"不可以在一个公式中使用同一工作表不同单元格区域的数据","C":"可以在多个公式中使用同一个单元格的数据","D":"可以引用同一个工作簿中不同工作表的数据"},"answer":"B","explanation":"本题考查Excel引用。对于引用，分为相对引用、绝对引用、\n混合引用和三维引用。在使用引用时，引用的数据可以是本工作簿文件的，也可以跨文件。B选\n项描述明显错误。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-96098","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"用户可以按自已的需求打印演示文稿，如要按编号打印特定幻灯片，选择“自定义范围\n选项，然后输人各幻灯片的列表或范围，其中使用（）将各个编号隔开。","options":{"A":"间号","B":"省略号","C":"逗号","D":"双引号"},"answer":"C","explanation":"本题考查打印。在设置打印时，若要按自定义范围打印，则可\n以通过英文状态下的逗号将各编号隔开以完成操作。故正确答案为C。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-24271","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在PowerPoint中，利用（）选项卡下的“形状”命令，可以绘制各种形状。","options":{"A":"“设计”","B":"“插人”","C":"“切换”","D":"“审阅”"},"answer":"B","explanation":"本题考查“插人”选项卡。A选项主要用来设计演示文稿的格式。\nB选项用来插人图片、形状、表格等对象。C选项主要用于幻灯片之间的切换动画设置。D选项\n用于对内容的检查和审阅。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-50138","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"PowerPoint演示文稿创建完毕之后，可以在屏幕上演示输出，下列相关说法中错误的是","options":{"A":"打开演示文稿后，按下“F5”键，则从第一张幻灯片开始以全屏方式在屏幕上播放","B":"在演示输出中，按下空格键可以切换到下一张幻灯片","C":"按“Esc”键可中断放映并返回到PowerPoint 窗口","D":"在演示输出中，单击鼠标右键可切换到上一张幻灯片"},"answer":"D","explanation":"本题考查PowerPoint放映操作。按F5可让演示文稿从首页开\n始全屏放映，A选项正确。在播放时，可通过空格键实现翻页，B选项正确。若要停止播放，可\n按Esc键实现操作，C选项正确。若要切换幻灯片，可鼠标邮件，在弹出的快捷菜单中操作，而\n不是直接鼠标右键就能切换，D选项错误。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-88291","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在PowerPoint中，若想让矩形框沿着椭圆曲线运动，则可设置（）。","options":{"A":"擦除动画","B":"淡出旋转动画","C":"页面卷曲动画","D":"路径动画"},"answer":"D","explanation":"本题考查PowerPoint动画。依据题意，让对象沿着椭圆曲线运动，\n该运动轨迹为用户自定义的，因此可在路径动画中设置。故正确答案为D。","subject":"多媒体","source_chapter":"德阳计算机真题"},{"id":"dy-56555","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"获取表单数据的方式取决于表单数据返回服务器端的方式。如果将HTML中Form控件的\nMethod属性设置为“Get”，表单数据将以（）的形式附加在网址的后面返回服务器端","options":{"A":"字符串","B":"二进制","C":"https 网页","D":"http标头"},"answer":"A","explanation":"本题考查HTML中 Form 控件。提交表单的方式有两种，一种\n是GET方式，一种是POST方式，分别调用的是doGetO方法和doPostO方法。以GET方式提交\n数据时，浏览器把表单内容组织成一个查询字符串，各变量之间以＆来链接。故正确答案为A。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-33530","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在表达式中，若运算符不止一种时，系统会按预定的顺序进行计算，这个顺序就是运算\n符的优先级，下面描述中正确的是（）。","options":{"A":"逻辑运算符的优先级最高","B":"算术运算符的优先级最低","C":"所有关系运算符的优先级是不同的","D":"优先级别相同时，按照在表达式中的先后顺序进行运算"},"answer":"D","explanation":"本题考查程序设计运算符。运算符中优先级从高往低依次为：\n算术运算符关系运算符逻辑运算符>赋值运算符。此外，对于同一优先级的运算符，运算次\n序由结合方向所决定。故正确答案为D。","subject":"编程语言","source_chapter":"德阳计算机真题"},{"id":"dy-63737","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"网络的快速发展，使静态网页已经无法满足人们的需要，更多的是需要和网络进行交互，\n进行网上电子商务等，因此就出现了动态网页。关于静态网页和动态网页，下列说法不正确的是\n（）。","options":{"A":"静态网页就是用纯HTML代码编写的网页","B":"静态网页的代码可以用任何一种文本编辑器输人，以扩展名html或htm保存","C":"动态网页-一般采用客户端程序和服务器端编程两种程序设计方法","D":"动态网页无法为用户显示一些个性化的信息"},"answer":"D","explanation":"本题考查静态网页和动态网页。在网站设计中，HTML代码编\n写的网页通常被称为“静态网页”，静态网页是标准的 HTML文件，它的文件扩展名是.htm、：\nhiml。可通过客户端程序和服务器端编程两种方式进行设计。静态网页是相对于动态网页而言，\n没有后台数据库、不含程序和不可交互的网页。综上，D 选项错误。故正确答案为 D。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-19721","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"下列有关HTML基本标记的说法，错误的是（）","options":{"A":"<head ≥元素的作用范围是整个文档","B":"<head>元素中可以有<meta>元信息定义","C":"HTML页面的标题一般用来说明页面的用途","D":"注释语句元素由前后两部分组成，其中后半部分由两个尖括号和两个连字符组成"},"answer":"D","explanation":"本题考查HTML语言。<head>元素包含了所有的头部标签元素。\n在元素中你可以插人脚本（scripts），样式文件（CSS），及各种 meta 信息。A、B选项正确。页\n面标题元素<title>一般用来说明页面用途，它显示在浏览器的标题栏中，C选项正确。HTML中\n注释语句格式为“<!一一一一>”，C 选项错误。故正确答案为 D。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-47938","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"下列关于投影仪的说法错误的是（）。","options":{"A":"投影仪停止使用后应立即断开电源","B":"投影仪在使用过程中应注意散热","C":"投影仪在使用过程中应防止强烈的挤压","D":"投影仪在开机状态下应严禁震动"},"answer":"A","explanation":"本题考查办公设备维护。投影仪在用完后执行关机操作，其内部的散\n热部件仍然需要工作一段时间，如果立即断开电源，有可能导致热量没有散发掉，影响投影仪的\n使用。故正确答案为 A。","subject":"编程语言","source_chapter":"德阳计算机真题"},{"id":"dy-15321","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"就色彩而言，图像分为单色图像、灰度图像和彩色图像三类，单色图像最简单的形式是\n只有（）两色。","options":{"A":"黑、灰","B":"黑、白","C":"灰、白","D":"黑、棕"},"answer":"B","explanation":"本题考查颜色模式。单色图像即位图模式，只包括黑色和白色。\n故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机真题"},{"id":"dy-95365","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"（）的单位是DPI，DPI的数值越大，扫描的清晰度越高。","options":{"A":"色彩精度","B":"扫描分辨率 全金标教育","C":"内置图像处理能力","D":"扫描速度"},"answer":"B","explanation":"本题考查打印机分辨率。打印时的分辨率是指在打印输出时横\n向和纵向两个方向上每英寸最多能够打印的点数，其计算单位是DPI（DotPerInch），即每英寸\n介质上能打印出的点数。\n当DPI值越大，扫描的清晰度越高，打印质量更好。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机真题"},{"id":"dy-86914","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"小刘在浏览视频网站时弹出“观看最新最全视频，就在xx网”的弹窗，小刘点了之后提\n示“本视频在下载插件后才能播放”。这种情况下小刘应该（）。","options":{"A":"为了观看最新最全视频，下载插件","B":"果断关闭网页，因为视频网站一般是不需要安装插件的，这种情况是骗局的可能性非常大","C":"百度搜索遇到类似问题该怎么办，如果网上说没有问题，下载插件","D":"先用杀毒软件杀毒，如果杀毒软件不报告异常，下载插件"},"answer":"B","explanation":"本题考查信息安全知识。一般情况下视频网站可直接在线观看，\n无需下载和安装单独的插件，出现这种情况，更大的可能是一个非法网站。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机真题"},{"id":"dy-24647","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"具有高可用性的系统应该具有较强的容错能力，在提供容错的途径中，两个部件执行完\n全相同的工作，当其中的一个出现故障时，另一个继续工作的途径是（）。","options":{"A":"使用空闲设备","B":"镜像","C":"复现","D":"负载平衡"},"answer":"B","explanation":"本题考查信息安全知识（注：本题为信息系统工程师考试试题）。\n数据完整性保障技术的途径有：\n(1)使用空闲备件，配置一个备用部件，平时处于空闲状态，当原部件出现错误时则取代原\n部件的功能；\n(2)负载平衡，使两个部件共同承担一项任务，当其中一个出现故障时，另一个部件就承担\n两个部件的全部负载；\n(4)复现，也称为延迟镜像，即辅助系统从原系统接受数据时存在着延时，原系统出现故障时，\n辅助系统就接替原系统的工作，但也存在着延时；\n(5)热可更换，某一个部件出现故障时，可以立即拆除该部件并换上一个好的部件，这样就\n不会导致系统瘫痪。故正确答案为B。","subject":"信息安全","source_chapter":"德阳计算机真题"},{"id":"dy-16966","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"根据《网络安全法》，网络运营者为用户办理网络接人、域名注册服务，办理固定电话、\n移动电话等人网手续，或者为用户提供信息发布、即时通讯等服务，在与用户签订协议或者确认\n提供服务时，应当要求用户提供（）。","options":{"A":"详细家庭住址","B":"无犯罪记录证明","C":"银行征信报告","D":"真实身份信息"},"answer":"D","explanation":"本题考查计算机安全法律法规。根据《网络安全法》，网络运\n营者为用户办理网络接入、域名注册服务，办理固定电话、移动电话等人网手续，或者为用户提\n供信息发布、即时通讯等服务，在与用户签订协议或者确认提供服务时，应当要求用户提供真实\n身份信息。故正确答案为D。","subject":"信息安全","source_chapter":"德阳计算机真题"},{"id":"dy-24832","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"为了便于管理和控制文件，将文件分成若干种类型。根据文件的性质和用途的不同，可\n以分为（）。","options":{"A":"库文件","B":"系统文件","C":"用户文件","D":"辅助文件"},"answer":"ABC","explanation":"本题考查文件管理。按照文件的性质和用途，可以将文件分\n为库文件、系统文件和用户文件三类。故正确答案为ABC。","subject":"操作系统","source_chapter":"德阳计算机真题"},{"id":"dy-34580","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"若计算机系统出现断电情况，则（）存储的信息不再存在。","options":{"A":"寄存器","B":"高速缓存","C":"主存储器","D":"固定磁盘"},"answer":"ABC","explanation":"本题考查存储器。寄存器、高速缓存（Cache）以及主存\n（运行内存）有一个共同的特点：即临时存储数据，或存储当前正在运行的数据。当计算机断电\n后，这些内容都会随之丢失。需要注意的是：C选项主存储器包含RAM和ROM，其中ROM断\n电不丢失数据，会引起误导。但当我们通常提到主存时，一般只强调其中的RAM。故正确答案\n为 ABC。","subject":"计算机基础","source_chapter":"德阳计算机真题"},{"id":"dy-55896","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"将连续的模拟信号变成离散的数字信号就是数字化，主要包括（）三个过程。","options":{"A":"采样","B":"量化","C":"编码","D":"滤波"},"answer":"ABC","explanation":"本题考查多媒体数字化过程。多媒体（图片、音频、视频）\n数字化过程包括：采样、量化和编码三个过程。故正确答案为ABC","subject":"多媒体","source_chapter":"德阳计算机真题"},{"id":"dy-65548","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"Nat是一种将私有（保留）地址转化为合法IP地址的转换技术。下列有关Nat的说法，正\n确的有（）。","options":{"A":"Nat可以有效避免来自网络外部的攻击","B":"通过静态转换将私有IP地址转换为公用IP地址时，IP地址是一对一且一成不变的","C":"通过动态转换将私有IP地址转换为公用IP地址时，IP地址是不确定且随机的","D":"通过端口多路复用方式将私有IP地址转换为公用IP地址时，内部网络的所有主机均可共 享一个合法外部IP地址实现对 Iniermet的访问"},"answer":"ABCD","explanation":"本题考查TCP/IP模型中Net协议。Nat属于一种网络通信\n协议，用于将私有IP地址转换为公共IP地址，从而实现多台计算机共享一个公网IP地址的功能。\nNat有三种实现方式：\n（1）静态转换：将内部网络的私有IP地址转换为公有IP地址,IP地址对是一对一的，是-\n成不变的，某个私有 IP地址只转换为某个公有 IP地址。（对应B 选项）\n（2）动态转换将内部网络的私有IP地址转换为公用IP地址时,IP地址是不确定的，是随机的，\n所有被授权访问上互联网的私有IP地址可随机转换为任何指定的合法IP地址。（对应C选项）\n（3）端口多路复用技术：改变外出数据包的源端口并进行端口转换，即端口地址转换采用\n端口多路复用方式。内部网络的所有主机均可共享一个合法外部IP地址实现对互联网的访问，从\n而可以最大限度地节约IP地址资源，同时，又可隐藏网络内部的所有主机，有效避免来自外部网\n络的攻击。（对应A、D选项）\n故正确答案为ABCD。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-675","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"邮件服务器是根据邮箱地址将每封电子邮件传送到各个用户的信箱中，在书写邮箱地址\n时，需要注意（）。","options":{"A":"不要遗漏域名地址中的圆点分隔符","B":"地址中不能输人空格","C":"要注意区分大小写","D":"地址最后要加上句号"},"answer":"AB","explanation":"本题考查邮箱地址格式。邮箱地址格式为：用户名@域名。其中，\n在地址中需用到英文圆点分隔，A选项正确。邮箱地址不能有空格，B选项正确。邮箱地址不区\n分大小写，C选项错误。邮箱地址后无需加标点符号，D选项错误。故正确答案为AB。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-55849","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"工作人员小李想要将当前的Word文档关闭，可以采取的做法有（）。","options":{"A":"单击标题栏最右侧的关闭按钮","B":"单击标题栏下方的文件菜单栏，选择退出按钮","C":"按快捷键Alt+F4","D":"单击标题栏最右侧的最小化按钮"},"answer":"ABC","explanation":"本题考查Word窗口关闭操作。通常我们所说的关闭Word\n文档指的是关闭文件，但不关闭软件，但在本题给的选项中，目的在于考查关闭窗口，考点需参\n照Windows窗口关闭。常见的窗口关闭如下：\n（1）单击标题栏最右侧关闭按钮；\n（2）单击标题栏下方的文件菜单栏，选择退出按钮；\n（3）按快捷键Alt+F4;\n（4）双击窗口左上角；\n（5）鼠标右键标题栏，在快捷菜单中选择关闭。\nD选项单击最小化按钮，会让窗口以最小化的方式在后台运行，并不能关闭窗口。故正确答\n案为 ABC。","subject":"编程语言","source_chapter":"德阳计算机真题"},{"id":"dy-73796","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"在Word中对表格进行拆分与合并操作时，（）。","options":{"A":"一个表格单元格可拆分成上下两个或左右两个","B":"一个表格单元格只能拆分成左右两个","C":"对表格单元格的合并，可以上下或左右进行","D":"对表格单元格的拆分要上下进行，合并要左右进行 拆分单元格 列数(C): 行数(R): 拆分前合并单元格（M) 确定 取消"},"answer":"AC","explanation":"本题考查Word表格拆分与合并。Word表格中的单元格，可\n以按照上下或者左右方向进行拆分与合并。上下或者左右单元格合并操作只需要选定对应单元格\n即可：拆分单元格如下图所示：\n拆分单元格\n行数R:\n网拆分前合并单元格（M\n确定\n段消\n故正确答案为AC。\n94．【事考帮答案BD。解析：本题考查Excel函数。TRUNC 函数用于截取小数部分，保留\n整数部分。B选项正确。INT函数用于向下取整，D选项正确。故正确答案为 BD。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-62852","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"利用工作表保护可以对Excel单元格进行锁定，下列操作，不能在锁定的单元格中进行\n的有（）。","options":{"A":"插人数据","B":"修改数据","C":"删除数据","D":"设置数据格式"},"answer":"ABCD","explanation":"本题考查Excel保护工作表。依次点击“开始”“格式”“保\n护工作表”，可执行单元格锁定操作。在该种情况下，单元格处于保护状态，被锁定，无法对其\n进行修改。故正确答案为ABCD。\n96.【事考帮答案BC。解析：本题考查文本框。Word中默认没有文本框，若需要，可在依\n次点击“插人”“文本框”进行插人操作。而在PowerPoint 中，默认有占位符，即题干中描述的\n文本框。因此C选项正确，D选项错误。无论是Word还是PowerPoint，文本框都是可以移动，A\n选项错误，B选项正确。故正确答案为BC。\n三个部分组成：\n（1）ECMAScript，描述了该语言的语法和基本对象，如类型、运算、流程控制、面向对象、\n异常等;\n（2）文档对象模型（DOM），描述处理网页内容的方法和接口；\n（3）浏览器对象模型（BOM），描述与浏览器进行交互的方法和接口。\n故正确答案为ABC。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-33290","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"下列选项中，常用于存储数字音频的文件格式有（）。","options":{"A":"MP3文件格式","B":"WAV文件格式","C":"WMA文件格式","D":"GIF文件格式"},"answer":"ABC","explanation":"本题考查音频格式。A、B、C 选项均为音频文件格式，D选\n项为图像格式。故正确答案为ABC。","subject":"多媒体","source_chapter":"德阳计算机真题"},{"id":"dy-36798","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"恶意代码攻击技术包括以下的（）。","options":{"A":"三线程技术","B":"端口复用技术.","C":"模糊变换技术","D":"缓冲区溢出攻击技术"},"answer":"ABD","explanation":"本题考查恶意代码攻击技术。恶意代码主要关键技术有生存\n技术、攻击技术和隐藏技术，其中：\n（1）生存技术：主要包括4个方面：反跟踪技术、加密技术、模糊变换技术和自动生产技术；\n（2）恶意代码攻击技术：主要包括进程注入技术、三线程技术、端口复用技术、对抗检测技术、\n端口反向连接技术和缓冲区溢出攻击技术等；\n（3）隐藏技术：主要包括本地隐藏和通信隐藏，本地隐藏主要有文件隐藏、进程隐藏、网\n络连接隐藏和内核模块隐藏等：通信隐藏包括通信内容隐藏和传输通道隐藏，\n依据题意，A、B、D选项为恶意代码攻击技术，C 选项为生存技术。故正确答案为 ABD。","subject":"信息安全","source_chapter":"德阳计算机真题"},{"id":"dy-74835","source":"德阳","type":"多选","chapter":"德阳计算机真题","stem":"制定《网络安全法》的缘由包括（）。","options":{"A":"保障网络安全","B":"维护网络空间主权和国家安全、社会公共利益","C":"保护公民、法人和其他组织的合法权益","D":"促进经济社会信息化健康发展"},"answer":"ABCD","explanation":"本题考查计算机安全法律法规。《网络安全法》的配套\n法律主要包括《国家安全法》，《保密法》，《反恐怖主义法》，《反间谍法》，《刑法修正案》（九）等。\n其目的涵盖 A、B、C、D 选项描述。故正确答案为 ABCD。","subject":"信息安全","source_chapter":"德阳计算机真题"},{"id":"dy-40944","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"Windows系统的用户目录和系统目录是彼此独立的，即使系统崩溃后，C盘的内容也很\n容易找回。","options":{},"answer":"正确","explanation":"本题考查Windows 目录。系统目录是由操作系统创建的，\n它包含了操作系统所需的文件和程序，它们是用来保存系统文件和程序的，它们不能被用户修改\n或删除。而用户目录是用户自已创建的，它们用来保存用户自已的文件和程序，用户可以随意修\n改和删除它们。二者相互独立，当系统崩溃时，系统目录中的数据会受到影响，但用户目录中的\n数据则不会轻易遭到破坏，或受到影响后能轻松找回。故正确答案为正确。","subject":"操作系统","source_chapter":"德阳计算机真题"},{"id":"dy-30040","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"网关可以支持不同协议之同的转换，实现不同协议网络之间的通信和信息共享。（）","options":{},"answer":"正确","explanation":"本题考查网关。网关在网络层以上实现网络互连，是复杂\n的网络互连设备，用于两个不同网络间的互连。故正确答案为正确。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-57600","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"凡是需要将局域网接人因特网，又想保持局域网独立性的场合都可使用光电转换器","options":{},"answer":"错误","explanation":"本题考查光电转换器。光电转换器一般指多模光纤收发器\n具备地址过滤、网络分段及智能报警等功能，可提高网络工作效率及网络运行可靠性。但并不是\n所有的局域网接入因特网都必须通过光纤通信，例如通过拨号方式上网，题干描述过于绝对。故\n正确答案为错误。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-83112","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"在文档制作中，分栏通常体现某一种段落设计风格，以增加可读性，而表格则可以使数\n据排列得更加整齐。","options":{},"answer":"正确","explanation":"本题考查Word分栏与表格。分栏指将文档中的文本或段\n落分成两栏或多栏，是文档编辑中的一个基本方法，一般用于排版。而表格则可以更形象直观显\n示数据，使其排列更加整齐，便于观看。故正确答案为正确。\n113.事考帮答案】错误。解析：本题考查Word替换操作。可对文字、符号等对象进行\n替换操作。具体可在Word中按Ctrl+H打开替换窗口，在“格式”和”特殊格式”菜单中可找\n到更多的替换操作。故正确答案为错误。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-2405","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"对Excel工作表进行列排序时，隐藏的列将不参与排序。","options":{},"answer":"正确","explanation":"本题考查Excel排序操作。隐藏是隐蔽不想显示的数据，\n执行隐藏操作后，数据不参与排序，可通过操作演示验证。故正确答案为正确。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-16602","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"在Excel中，无论选定了什么样的区域，只要用鼠标单击任意一个单元格，就可以取消\n选择。","options":{},"answer":"正确","explanation":"本题考查区域的选择和取消。在Excel中取消选定，可在\n其他任意单元格位置单击即可取消选定。此外，在Windows中，取消区域的选定，可点击任意空\n白处即可。故正确答案为正确，","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-97123","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"在PowerPoint中插入动作按钮超级链接只能链接到音频或者视频的播放页面。","options":{},"answer":"错误","explanation":"本题考查PowerPoint超链接。在PowerPoint中，“动作设置”\n和“超链接”都可以为对象设置链接。链接方式很多，除了题干中的音频或视频播放页，还可以\n链接到其他幻灯片中，也可以链接到一个网页等等。故正确答案为错误。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-25457","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"在PowerPoint中，在占位符中输人文本是最常用的文本输入方法。","options":{},"answer":"正确","explanation":"本题考查PowerPoint占位符。在默认的幻灯片中，存在\n着文本框，从术语定义上，被称为占位符。通常在占位符中直接输人文本。故正确答案为正确。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-75775","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"在网页布局中，框架和框架集是些独立的HTML文档。","options":{},"answer":"错误","explanation":"本题考查HTML网页布局。框架指的是将浏览器窗口划分为若于\n个区域，通过框架可以在同一个浏览器中同时显示多个网页。而框架集由多个框架嵌套组合而成\n框架集和框架属于包含关系，不是独立。故正确答案为错误。","subject":"计算机网络","source_chapter":"德阳计算机真题"},{"id":"dy-95482","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"计算机周围环境的温度对机器的运转没有任何影响。","options":{},"answer":"错误","explanation":"本题考查计算机维护。在计算机运行中一定要做好散热\n的处理，如果散热性能差，导致温度过高，会影响到机器的运行性能。故正确答案为错误。","subject":"其他","source_chapter":"德阳计算机真题"},{"id":"dy-35533","source":"德阳","type":"判断","chapter":"德阳计算机真题","stem":"国家实施网络可信身份战略，支持研究开发安全、方便的电子身份认证技术，推动不同\n电子身份认证之间的互认。\n全金标尺教育\n2023年4月15日德阳事业单位公开招聘工作人员\n（精选版）","options":{},"answer":"正确","explanation":"本题考查信息安全。在2016年公布的《网络安全法》中提到，\n国家实施网络可信身份战略，支持研究开发安全、方便的电子身份认证技术，推动不同电子身份\n认证之间的互认。本题作为常识性题目，需通读题干，一般情况下出现有违常识或者道德法律的\n一律错误。故正确答案为正确。\n三金标尺教育\n2018年6月30日德阳事业单位公开招聘工作人员\n《专项岗位知识》历年真题（精选版）\n重要提示：\n为了保护个人权益，确保考试的公平公正，请您协助我们监督考试实施工作。\n本场考试规定：监考老师要向本考场全体考生展示题本密封情况，并邀请\n2名考生代表验封签字后，方能开启试卷袋。\n三金标R教育\n一、单项选择题（每题0.8分，共60分。下列备选答案中，只有个符合题意的答案\n请将正确答案的代码填涂在答题卡相应的题号里。）\n1.公文确定密级后，应当按照所定密级严格管理。而确定密级前，则应当按照（）先行采\n取保密措施。\nA.绝密级\nB.拟定的密级\nC.文秘部门统一管理原则\nD.专人统一管理原则\n2.《党政机关公文处理工作条例》自（）起施行，其规定公文的种类共（）种。\nA.2012年7月1日：15\nB.2012年5月1日；13\nC.2012年5月1日；15\nD.2012年7月1日；13\n3.当下级机关的报告对全局有指导意义，上级机关决定转发该报告时，应使用（）行文。\nA.情况性通知\nB.转发性通知\nC.发布性通知\nD.批转性通知\n4.下列批复正文的引述语，写作规范的是（）。\nA.你省《关于XXX的请示》（XX（2018）8号）收悉\nB.你省2018年《关于XXX的请示》8号文收悉\nC.你省《关于XXX的请示》（XX【2018】8号）收悉\nD.你省关于XXX的请示（XX[20188号）收悉\n5.公文处理工作是指公文（）等一系列相互关联、衔接有序的工作\nA.拟写、制作、管理\nB.拟制、办理、管理\nC.拟写、审理、办理\nD.拟制、处理、审理\n6.（）是公文中唯一的平行文，可以在不相隶属机关之间行文。\nA.纪要\nB.议案\nC.意见\nD.函\n．7.下列关于公报的说法，错误的是（）。\nA.公报也称新闻公报\nB.公报适用于公布重要决定或者重大事项\nC.公报是公之于众的文件，无需保密\nD.公报的发文机关可以是各级党政机关\n8.因对市区道路改造，需断道施工，应使用（\n、）行文向市民告知。\nA.通告\nB.通知\nC.公告\nD.决定\n9.按照《党政机关公文格式》（GBT97042012）规范，公文用纸采用A4型纸（210mmx297mm）\n公文格式中的“紧急程度”使用（）字。\nA.3号仿宋体\nB.3号黑体\n三金标R教育\nC.2号黑体\nD.2号仿未体\n10.下列关于命令（令）说法，错误的是（\n）。\nA.命令（令）可用于批准授予和晋升衔级\nB.命令（令）是最具有强制性的公文\nC.如果别的公文内容与命令（令）的有关精神相抵触，一律以命令（令）为准\nD.命令（令）的写作一定要有主送机关\n11。为了阅读和使用的方便，2012版公文格式国家标准中将一篇完整的公文分为版头、主体、\n（）三大部分。\nA.主题词\nB.版尾\nC.版记\nD.落款及印章\n12.由会议审议批准某项议案，重要报告、法规，应使用（）行文。\nA.命令（令）\nB.决定\nC.决议\nD.公报\n13.公文写作的语言应准确、简要、（）、规范。\nA.形象\nB.典雅\nC.创新\nD.平实\n14.议案的制发机关应是（\nA.各级人民政府\nB，各级人民代表大会\nC.各级人民代表大会常务委员会\nD.各级人民政府的职能都门\n15.下列关于签发人的说法，正确的是（）。\nA.签发人指批准发出公文的机关\nB.上行文应有签发人\nC.签发人应平行排列于发文字号左侧\nD.签发人只有一个\n16.使用最具灵活性，既可作上行文，亦可作下行文，平行文的公文是（）。\nA.公告\nB.意见\nC.通知\nD.通告\n17.在公文写作中，常涉及到数字的使用。下列选项中，数字写作不规范的是（）。\nA.二万五千里长征\nB.63.05%\nC.20世纪八十年代\nD.在校学生1480人\n18.下列关于公文份号的说法，错误的是（）。\nA.公文都有份号\nB.份号编码一般用六位数，如：000001\nC.份号是指公文印刷份数的顺序号\nD.份号顶格编排在版心左上角第一行\n19.公文一般不得越级行文，特殊情况需要越级行文的，应当同时（）被越过的机关。\nA.抄送\nB.报送\nC.主送\nD.报告\n20.根据《党政机关公文处理工作条例》规定，向国内外宣布重要事项成者法定事项时应使\n用（）行文。\nA.决议\nB.公告\nC.决定\nD.通告\n21.主持、指导重要公文起草工作的应是（）。\nA.机关文秘部门负责人\nB.机关负责人\nC.机关领导指定的负责人员\nD.上级机关负责人\n22.下列关于主送机关的说法，正确的是（）。\nA.公文都有主送机关\nB.主送机关可以使用同类型机关的统称\nC。主送机关编排于公文标题下空一行，居左顶格，回行时不能顶格\nD.主送机关即收文机关\n23.经查实，某机关违规配备和使用公务用车。其上级机关将对此情况予以批评，并以此来\n教育和引导他人。下列选项中，最适用的公文是（）。\nA.通报\nB.通知\nC.公告\nD.报告\n24.下列选项中，相互之间适合使用上行文、下行文的是（）。\nA.“某省教育厅”与“某省公安厅”\nB.“某市教育局”与“某省交通厅\nC。“国务院”与“某省人民政府\nD。“某市农业局”与“某省中国人民银行”\n25.根据《党政机关公文处理工作条例》规定，公文发文办理的主要程序是（）。\nB.印制复核核发登记\nA.登记印制复核核发\nD.核发—印制登记复核\nC.复核登记印制核发\n26.某县水质污染严重，该县人民政府收到其上机关某市人民政府对水质污染原因及治理情\n况的询问。该县人民政府对此进行答复，应使用（）。\nB.纪要\nA. 函\nC.报告\nD.请示\n27.在写作中严格要求一文一事的公文是（）。\nA.请示\nB.报告\nC.意见\nD.纪要\n28.下列关于联合行文的说法，正确的是（\nA.同级不相隶属的机关之间不可联合行文\nB.一个机关职权范内可以解决的问题，不必要求其他机关联合行文\nC.政府办公室与同级政府各部门可联合行文\nD.相隶属的机关之间可联合行文\n29.下列关于请示主送机关的说法，错误的是（）。\nA.请示的主送机关只有一个\nB.请示的主送机关应是直接上级机关\nC.特殊情况下请示可有两个主送机关，如：受双重领导的机关报送请示时\nD.请示的主送机关不应是上级机关负责人\n30.下列关于公文印章的说法，错误的是（）\nA.印章是公文最后生效标志\nB.印章用红色\nC.有特定发文机关标志的普发性公文和电报可以不加盖印章\nD.因纸张受限，印章可与正文不在同一页\n31.下列选项中，具有请求性的公文是（）。\nA.报告\nB.批复\nC.请示\nD.议案\n32.公文的成文日期指公文发出或生效的时间，其规范的写法是（\nA.2018年06月30日\nB.2018.6.30\nC.2018.06.30\nD.2018年6月30日\n33.世界上第一台数字式电子计算机ENIAC研制成功的年份是（）。\nA.1945年\nB.1946年\nC.1947年\nD.1916年\n34.采用超大规模集成电路为主要元件的是（\n）代计算机。\nA. \nB.二\nC. 三\nD.四\n35.CAD的中文全称是（）。\nA.计算机辅助设计\nB.计算机辅助制造\nC.计算机辅助教学\nD.计算机集成制造系统\n36.计算机中最基本的信息单位是（）。\nA.bit\nB.Byte\nC.KB\nD.MB\n37.下列不属于应用软件的是（）。\nA.AutoCAD\nB.Photoshop\nC.Oracle\nD.WPS\n38.将十进制数158转换为十六进制数是（）。\nA.9E\nB.9B\n三金标R教育\nD.E9\nC.F9\n39.八位二进制带符号数最大可表示的十进制数是（）。\nA.+256\nB.+255\nD.+127\nC.+128\n40.将八进制15734转换为二进制数是（）。\nB.110111001101\nA.11010111001101\nD.1101111011100\nC.110101110111\n41。已知大写字母A的ASCI码为（41）H，那么大写字母W的ASCI码是（）。\nB. (59) H\nA.(57)H\nD. (63) H\nC. (61)H\n42.20个48×48点阵的汉字字稿所占用的字节数是（）。\nB.5760B\nA.46080B\nC.288B\nD.45B\n43.计算机的中央处理单元包括（）。\nB.主板和控制器\nA.内存和运算器\nD.内存和主板\nC.运算器和控制器\n44.下列关于RAM和ROM的描述不正确的是（）。\nA.RAM的数据在电脑断电台后会消失\nB.ROM的数据在电脑断电后会消失\nC.RAM和ROM都属于内存\nD.CPU可直接访问RAM和ROM\n45.下列属于音频文件的扩展名是（）。\nA.JPG\nB.OBJ\nD.WMV\nC.MID\n46.下列关于Windows7中键盘操作的描 海训练·第二章","stem":"多媒体作品通过设置超链接实现人对信息的主动选择与控制，这就是多媒体作品（\n特点的体现","options":{"A":"集成性","B":"思想性","C":"交互性","D":"多样性"},"answer":"B","explanation":"本题考查计算机网络的传输介质。光纤特点是速度快，传输距离远，\n抗干扰能力强等，在平时使用的过程中有很多的应用。故本题答案为B。","subject":"计算机网络","source_chapter":"题海训练·第二章"},{"id":"th-34098","source":"题海训练","type":"单选","chapter":"题海训练·第二章","stem":"在制作多媒体作品的基本过程中，（\n）是根据主题确定作品要达到的目标并分析其\n必要性和可行性的过程","options":{"A":"需求分析","B":"规划与设计","C":"作品集成","D":"发布与评价"},"answer":"C","explanation":"本题考查计算机网络的诞生。Intermet 最初是阿帕网，即 ARPANET,\n是由美国国防部在1969 年创建的。故本题答案为 C。","subject":"编程语言","source_chapter":"题海训练·第二章"},{"id":"th-72545","source":"题海训练","type":"单选","chapter":"题海训练·第二章","stem":"下面对矢量图和位图描述正确的是（","options":{"A":"矢量图的基本组成单元是像素","B":"位图的基本组成单元是锚点和路径","C":"Flash软件能够生成矢量图","D":"Photoshop软件能够生成矢量图"},"answer":"C","explanation":"本题考查计算机网络的传输介质。粗缆传输的最大距离是500米，\n双绞线传输的最大距离是100米，细缆传输的最大距离是185米。故本题答案为C。","subject":"多媒体","source_chapter":"题海训练·第二章"},{"id":"th-33031","source":"题海训练","type":"单选","chapter":"题海训练·第二章","stem":"图像分辨率是指（","options":{"A":"使用专用软件下载","B":"使用摄像机拍摄","C":"使用屏幕录制软件录制","D":"使用 PrintScreen 键截屏"},"answer":"B","explanation":"本题考查计算机网络的传输介质。光纤的价格比较贵，但适应性强，\n使用寿命比较长。故本题答案为B。","subject":"计算机网络","source_chapter":"题海训练·第二章"},{"id":"th-95144","source":"题海训练","type":"多选","chapter":"题海训练·第二章","stem":"在多媒体技术中所说的媒体一般是指感觉媒体，感觉媒体通常分为（","options":{"A":"存储媒体","B":"视觉类媒体","C":"听觉类媒体","D":"触觉类媒体"},"answer":"BCD","explanation":"本题考查感觉媒体的分类。感觉媒体指直接作用于人的感觉器官，\n使人产生直接感觉的媒体。如引起听觉反应的声音，弓引起视觉反应的图像等。A项中存储媒体\n是与感觉媒体是并列的概念，媒体分：感觉媒体、传输媒体、存储媒体、表现媒体、表示媒体，\n所以 A项不符合题意。故本题答案为 BCD。\n2.【答案ABD。解析：本题考查声音数字化的过程。声音数字化的过程为采样、量化、\n编码。故本题答案为 ABD。\nC项是网页文件\nB项是声音文件\n『欲安BCD\n解析：本题老杏文件格式\nＤ项是","subject":"编程语言","source_chapter":"题海训练·第二章"},{"id":"th-87852","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"在IE浏览器中，要打开上次关机之前浏览过的网站，可通过（","options":{"A":"收藏夹","B":"地址栏","C":"历史记录","D":"前进和后退按键"},"answer":"D","explanation":"本题考查Photoshop中的图层。在 PS 中，图层就像是含有文字或图\n形等元素的胶片，一张张按顺序叠放在一起，组合起来形成页面的最终效果，修改某一图层的\n样式，不会影响其他图层的效果，图像保存为.PSD格式，后续还可以编辑图像的各个图层\n故本题答案为 D。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-80117","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"浏览网页时，“收藏夹”的作用是（","options":{"A":"保存网页内容","B":"保存网页地址","C":"保存网页图片","D":"只能保存文字信息 ）。它们从互联网提取各个网站的信息，建立数"},"answer":"C","explanation":"本题考查容差。容差是在选取颜色时所设置的选取范围，容差越大，\n选择的精度越低，选取的范围也越大，其数值是在0～255之间。故本题答案为 C。","subject":"计算机网络","source_chapter":"题海训练·第三章"},{"id":"th-58560","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"百度和谷歌使用的搜索引擎都是（\n据库，并能检索与用户查询条件相匹配的记录，按一定的排列顺序返回结果。","options":{"A":"“扫描一→倾斜校正一→识别”是完成OCR识别必不可少的步骤.","B":"可以识别 jpg、psd、bmp 等图象中的文字","C":"OCR软件识别出的结果文件一般比未识别前的原文件大","D":"对图文混排较多的文章进行手动的识别区域的划分有助于提高识别准确率"},"answer":"C","explanation":"本题考查Photoshop。Photoshop是图像处理软件，可以调整图像亮度、\n对比度，也可以添加文字，设置文字样式，C选项属于Excel 的功能。故本题答案为C。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-84578","source":"题海训练","type":"判断","chapter":"题海训练","stem":"将本地电脑收藏夹中的文件复制到其他电脑，不能实现收藏夹内网址的快速迁移。（","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-98669","source":"题海训练","type":"判断","chapter":"题海训练","stem":"搜索引擎按其工作方式主要分为全文搜索引擎和目录搜索引擎。（","options":{},"answer":"正确","explanation":"Photoshop可以支持的模式见下图。故本题表述正确。\n颜色模式（M）：RGB颜色\n位图\n背景内容（C)：\n灰度\nRGB颜色\nCMYK颜色\nLab颜色","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-51078","source":"题海训练","type":"判断","chapter":"题海训练","stem":"公安机关利用指纹识别系统鉴定人的身份属于人工智能的一一个应用。（","options":{},"answer":"正确","explanation":"","subject":"信息基础","source_chapter":"题海训练"},{"id":"th-34319","source":"题海训练","type":"判断","chapter":"题海训练","stem":"二维码本身无毒，但是二维码所指向的网站链接等可能被提前植入了木马或病毒，因此\n要注意防范扫描二维码时产生的安全风险。（","options":{},"answer":"正确","explanation":"本题考查母版。通过修改幻灯片母版，可以统一修改文稿中所有\n幻灯片的文本外观，若要统一修改多张幻灯片的外观，只需在母版上做一次修改即可。故本题\n签安头正确\n／软件操作篇\n文本框页眉和顶脚艺术字日期\n横排文本框H\n文本\n重直文本框","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-43166","source":"题海训练","type":"判断","chapter":"题海训练","stem":"模式识别和自然语言理解是人工智能的两个研究领域。（","options":{},"answer":"错误","explanation":"本题考查 Excel 操作。Excel 的操作是基于单元格的，所以操作都\n是对单元格的操作，无法直接通过拖动指针移动单元格内的内容。故本题答案为错误。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-39696","source":"题海训练","type":"判断","chapter":"题海训练","stem":"“天宫一号”航空站的操作员，使用计算机模拟系统进行太空作业训练，这一系统主要\n采用的是虚拟现实技术。（\n！信息科技－题海训练","options":{},"answer":"错误","explanation":"本题考查Excel清除命令。清除可以清除内容、格式、批注。故\n本题答案为错误。","subject":"信息基础","source_chapter":"题海训练"},{"id":"th-39975","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"下列属于计算机网络安全技术的是（","options":{"A":"访问控制域口令技术","B":"防火墙技术","C":"数字签名技术","D":"以上都是"},"answer":"B","explanation":"本题考查操作系统的概念。操作系统是现代计算机系统中最基本和\n最重要的系统软件，所以 B项符合题意。故本题答案为B。\n2．【答案D。解析：本题考查操作系统关心的主要问题。操作系统主要关心的是处理机\n管理、存储器管理、设备管理、文件管理、提供用户接口等功能，而编译器不属于这些功能里\n面的任何一种，不是操作系统关心的问题，所以D项正确。从计算机资源的角度来看，OS的\n作用是管理计算机的硬件和软件等各种系统资源，所以A、C是操作系统关心的问题。从用户\n的角度来看，OS的作用是提供用户和计算机硬件之间的接口，所以B是操作系统关心的问题\n故本题答案为D。","subject":"操作系统","source_chapter":"题海训练·第四章"},{"id":"th-6933","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"在信息系统安全维护措施中，计算机机房配备接地系统的作用为（","options":{"C":"防盗","B":"防电磁泄露","A":"防静电","D":"防火"},"answer":"C","explanation":"本题考查逐帧动画。逐顿动画是在时间轴的每一帧都设成关键顿，\n每个关键顿上绘制不同的内容，使其连续播放而成动画，所以C项符合题意。变形动画（形状\n补间动画）：应用于基本形状的变化，它是某一个对象在一定时间内形状发生过渡渐变的动画，\n所以A项不符合题意。过程动画（运动补间动画）：应用于把对象由一个地方移动到另一个\n地方的情况，也可应用与物体的缩放、倾斜或者旋转，还可用于元件颜色和透明度的变化，所\n以 B、D项不符合题意。故本题答案为 C。","subject":"多媒体","source_chapter":"题海训练·第四章"},{"id":"th-58510","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"实施计算机信息安全保护措施包括：安全法规、安全技术和（","options":{"C":"设备管理","A":"按口管理","B":"安全管理","D":"网络管理"},"answer":"B","explanation":"本题考查元件的概念及类型。元件与图形对象的区别是元件外面有\n一个框，而图形对象没有。故本题答案为 B。","subject":"编程语言","source_chapter":"题海训练·第四章"},{"id":"th-9103","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"关于计算机病毒的描述中，正确的是（","options":{"A":"计算机病毒只感染可执行文件","B":"计算机病毒可能会传染给人类","C":"计算机病毒只能通过网络传播","D":"计算机病毒是人为编制的一段恶意程序"},"answer":"B","explanation":"本题考查动作补间动画。动作动画的对象必须是元件，而用Flash 画\n的篮球是图形而不是元件，因此必须首先将其转换为图形元件，才可以成功的制作出动作动画，\n故本题答案为 B。","subject":"多媒体","source_chapter":"题海训练·第四章"},{"id":"th-38405","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"老王担心计算机感染病毒，小李给出了以下几点建议来进行防范：\n①安装正版的操作系统和杀毒软件并定期升级\n②经常备份计算机上的重要资料\n③当不需要接人互联网时，最好断开连接\n④为保险起见，可安装多种杀毒软件以互补不足\n7.计算机病毒破坏的主要对象是（","options":{"A":"点击链接，如果有病毒事后再处理","B":"点击链接，按照提示完成相关操作","C":"不要点击链接，否则可能下载木马病毒","D":"手机有杀毒软件，点击链接不用担心病毒 35.以下（ ）不会导致网络安全漏洞。"},"answer":"C","explanation":"本题考查Flash。Alpha属性是元件的透明度，取值范围为0%-100%，","subject":"信息安全","source_chapter":"题海训练·第四章"},{"id":"th-2175","source":"题海训练","type":"多选","chapter":"题海训练","stem":"人类已经离不开网络，而网络普及的同时也必须更加注意隐私安全。维护信息安全，主\n要是保持信息的（","options":{"C":"可用性","B":"完整性","D":"真实性","A":"保密性"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"信息安全","source_chapter":"题海训练"},{"id":"th-96545","source":"题海训练","type":"多选","chapter":"题海训练","stem":"下列选项中，属于信息安全技术的有（","options":{"C":"数据加密技术","B":"虚拟光驱技术","D":"身份验证技术","A":"访问控制技术"},"answer":"AC","explanation":"本题考查 Photoshop。用鼠标点击一次，再点击一次就可以形成直\n线型的多边形选择区域，A项正确。多边形套索属于套索工具，B项错误。鼠标拖拽出来的区\n域形成的轨迹就是选择区域。C项正确。多边形套索工具由于区域不规则，·所以不是规则选框\n工具。D项错误。故正确答案为 AC。","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-87971","source":"题海训练","type":"多选","chapter":"题海训练","stem":"1983年11月，美国学者科恩第一次明确提出计算机病毒的概念。计算机病毒发展至今，\n其表现出的特性包括（","options":{"C":"潜伏性","B":"隐蔽性","A":"传染性","D":"不可激发性"},"answer":"AB","explanation":"本题考查 Photoshop。魔棒工具是 Photoshop 中提供的一种比较快捷\n的抠图工具，对于一些分界线比较明显的图像，通过魔棒工具可以很快速地将图像抠出。容差\n也就是说容美越卡\n图像颜色的接近度也就越小\n选的区城","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-9552","source":"题海训练","type":"多选","chapter":"题海训练","stem":"下列可用于传播病毒的载体是（","options":{"C":"硬盘","B":"U 盘","D":"网络","A":"显示器"},"answer":"ABC","explanation":"E。解析：本题考查快捷方式。选项 A，快捷方式是一种特殊的类型，代表\n快捷方式的图标称为快捷图标，在其左下角有一个小箭头，通过双击快捷图标来执行快捷程序\n．的方式称为用快捷方式打开；选项B，快捷方式可以在不同的位置进行创建，文件本身并不放\n在桌面上；选项C，快捷方式文件中存放的是一个指向另一个文件的指针，对于源文件本身是\n没有影响的；选项E，删除快捷方式，源文件不会被删除。故本题答案为 ABCE。","subject":"计算机基础","source_chapter":"题海训练"},{"id":"th-92328","source":"题海训练","type":"判断","chapter":"题海训练","stem":"大多数病毒在发作之前一般潜伏在计算机内并不断繁殖自身，当病毒的触发条件满足时\n病毒就开始其破坏行为\n！信息科技－题海训练\n8.因特网是近代文明社会高科技的产物，所以因特网上的所有一切都是高度文明和真实的。\n9.在网络上，言论是自由的，所以任何信息都可以发布到因特网中，不受任何约束。（\n10.我们上网看到自已需要的文件（如：音乐、程序软件、·试题等），都应该下载到自己\n的计算机里保存好，而且不需要理会文件的知识产权以及合法性问题。（\n11.计算机杀毒软件和防火墙必须经常性的升级。.（\n12.防火墙是一种软件，与硬件无关。’（\n13.防火墙对流经它的网络通信进行扫描，可以过滤掉一切攻击，避免病毒人侵计算机。\n五、名词解释","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"信息安全","source_chapter":"题海训练"},{"id":"th-56148","source":"题海训练","type":"判断","chapter":"题海训练","stem":"信息炸弹\n5.数字签名","options":{},"answer":"正确","explanation":"","subject":"信息安全","source_chapter":"题海训练"},{"id":"th-12179","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"LOGO 中的基本画笔是（","options":{"A":"铅笔","B":"小海龟","C":"蜡笔","D":"小乌龟"},"answer":"C","explanation":"本题考查Word 2007的界面组成部分。Word 2007窗口界面包含标\n题栏，快速访问栏，功能区，文档编辑区域，状态栏以及Microsoft Office等部分，但是不包含\n菜单栏。如下图所示：\n功能区\n标题栏\nMicrosoft\nOffice按钮\n快速访问工\n文档编辑区\nI信息科技－题海训练答案及解析","subject":"办公软件","source_chapter":"题海训练·第一章·第一节"},{"id":"th-67599","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"启动LOGO系统后，小海龟自动显示在（","options":{"A":"绘图窗口中","B":"命令窗口中","C":"工具栏中","D":"菜单栏中"},"answer":"A","explanation":"本题考查LOGO语言基础知识。LOGO语言启动后，小海龟会自动\n显示在绘图的窗口中。故本题答案为 A。","subject":"编程语言","source_chapter":"题海训练·第一章·第一节"},{"id":"th-28484","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"执行 REPEAT2[FD 50 RT90 FD 80 RT90]命令，能画出-个（","options":{"A":"正方形","C":"梯形","B":"长方形","D":"风车"},"answer":"A","explanation":"本题考查快速访问工具栏中按钮的功能。在Word 2007的快速访问\n工具栏中，\n按钮的功能是撤销上次操作。B按钮的功能是加粗。U按钮的功能是设置下\n划线。按钮的功能是改变所选内容的字体颜色。故本题答案为 A。\n4.（答案D。解析：本题考查Word文件扩展名。A选项是电子表格文件，适合用Excle\n打开，B选项是图像文件，可用画图工具等打开，C选项是动画文件适合用flash软件打开，\nD选项是文本文件，四个选项中文本文件最适合用Word 打开。故本题答案为 D。","subject":"编程语言","source_chapter":"题海训练·第一章·第一节"},{"id":"th-19826","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"执行REPEAT36[FD80*3.14/18RT360/36]命令，画出-一个（","options":{"A":"圆弧","B":"圆","C":"半圆","D":"三十六角星"},"answer":"B","explanation":"本题考查LOGO语言命令。LOGO语言中，REPEAT是重复命令，\n这里代表括号内容重复36次，FD是前进命令，RT是右转命令，3.14一般为 T的值，这里前\n进80T/18，为弧形轨迹；再右转360/36=10度，一共36*10=360度。最后画出的是一个圆形。\n故本题答案为B。","subject":"编程语言","source_chapter":"题海训练·第一章·第一节"},{"id":"th-95287","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"在LOGO语言中，设置线的粗细的命令是（","options":{"A":"SETPC","B":"SETW","C":"FILL","D":"SETBG"},"answer":"C","explanation":"本题考查文本编辑类软件。A项，Excel 和 Word 都属于 Office 旗下\n的软件，Excel中编辑的表格可以在Word中使用。B项，Word 可以把正在编辑的Word文档保\n存为纯文本文件。C 项，记事本是Windows 操作系统中一个简单的文本编辑器，只能进行文本\n信息的编辑，不支持图文混排。D项，使用画笔工具绘图时，仍然可以输人文字。故本题答案\n为。","subject":"计算机基础","source_chapter":"题海训练·第一章·第一节"},{"id":"th-2678","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"执行命令CSREPEAT4[RT90FD20LT90FD 20LT90FD201HT画的图形是（","options":{"A":"","B":"","D":""},"answer":"C","explanation":"本题考查word视图。大纲视图是树形结构，页面视图可以得到与打\n印效果完全一致的文档Web版式视图会根据计算机窗口限制每行文字字数。故本题答案为C。\n7.【答案1.C。解析：本题考查Word分栏。在Word 2003 中，分栏最多可以设置11栏,\n所以A项错误。分成的两栏之间的分割线是实线，不是虚线，所以B项错误。对于分栏的设\n置可以应用于所选文字，也可以应用于整篇文档，所以C项正确。此图中两栏宽度不相等是因\n为手动调节了宽度，图上并没有选中偏左设置，所以D项错误。故本题答案为C。\n8．（答案A。解析：本题考查Word 2007中的快捷键。Ctrl+A的功能是全选，Shift+A 的\n功能是书写写字母 A。故本题答案为 A。","subject":"办公软件","source_chapter":"题海训练·第一章·第一节"},{"id":"th-60260","source":"题海训练","type":"判断","chapter":"题海训练·第三节","stem":"VB 变量名由字母和数字组成，但其第一个字符必须是数字。","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"多媒体","source_chapter":"题海训练·第三节"},{"id":"th-81529 ":"办公软件","source_chapter":"题海训练·第三节"},{"id":"th-52862","source":"题海训练","type":"判断","chapter":"题海训练·第三节","stem":"条件语句在执行过程中将由计算机随机选择执行哪部分语句。（","options":{},"answer":"错误","explanation":"本题考查 PowerPoint 中配色方案的使用。在PowerPoint 中，应用\n配色方案时，不仅可以应用于全部幻灯片，也可以只应用于某张幻灯片。故本题答案为错误。","subject":"办公软件","source_chapter":"题海训练·第三节"},{"id":"th-85915","source":"题海训练","type":"判断","chapter":"题海训练·第三节","stem":"在一个循环语句的循环体中含有另一个循环语句，肯定出现死循环。","options":{},"answer":"正确","explanation":"本题考查幻灯片。用户可以对某张幻灯片的背景进行设置而不\n影响其他幻灯片。故本题答题为正确。\n1信息科技－题海训练答案及解析","subject":"办公软件","source_chapter":"题海训练·第三节"},{"id":"th-45626","source":"题海训练","type":"判断","chapter":"题海训练·第三节","stem":"如果变量 a=7、b=6、c=4、d=5，则表达式 a<d OR b>c AND c<>d 的值为","options":{},"answer":"错误","explanation":"本题考查计算机常识。计算机正在读写数据时突然关机，很可\n能会损坏驱动器（硬盘、软驱等），更不能在计算机工作时搬到计算机。故本题答案为错误。\n14.答案错误。解析：本题考查灰尘对于显示器的影响。对于由十分精密的电子器件\n构成并对使用环境有较高要求的电脑来说，灰尘无疑是它的大敌，尤其是对显示器、磁盘驱动\n器、电路板等元器件。专用的防尘罩能有效预防灰尘危害，确保显示器在相对干净的环境中使\n用。故本题答案为错误\n15【签案】正确。解析：本题查人工智能,\n禁系统是在智能建筑领城\n简称ACS\n超格教育\n1信息科技－题海训练答案及解析\n境一般，可以实时、无限制地观察三维空间里的事物，通过虚拟现实技术，航空站的操作员可\n以模拟太空作业的训练。故本题答案为正确。","subject":"信息基础","source_chapter":"题海训练·第三节"},{"id":"th-86976","source":"题海训练","type":"判断","chapter":"题海训练·第三节","stem":"某 VB 程序段如下:","options":{},"answer":"错误","explanation":"本题考查Excel的数据显示。在Excel单元格中，当数据的长度\n大于单元格的长度时，则显示一组“#”。故本题答案为错误","subject":"办公软件","source_chapter":"题海训练·第三节"},{"id":"th-20129","source":"题海训练","type":"判断","chapter":"题海训练·第三节","stem":"信息科技－题海训练\n四、程序填空题","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"多媒体","source_chapter":"题海训练·第三节"},{"id":"th-77976","source":"题海训练","type":"判断","chapter":"题海训练·第三节","stem":"问题：求s=1*2-2*3+3*4-4*5+-98*99+99*100的值。\n算法描述如下图所示，请将下列程序补充完整\n开始\nk<=99\nK是奇数\ns - s+k*(k+1)ll\ns  s-k*(k+1)\nk←k+1\n输出结果\n结束\nPrivate Sub Form\nClick（\nDim k 都被禁止。窗体的Height、Width 属性分别用于设\n置窗体的高度和宽度，这两个属性在程序设计和运行时都可以进行设置。故本题答案为A。","subject":"编程语言","source_chapter":"题海训练·第四节"},{"id":"th-64972","source":"题海训练","type":"单选","chapter":"题海训练·第四节","stem":"在以下C 语言的 for 循环中，执行次数一共是（\nfor（x=0，y=0；（y！ =1234）&&（x<5）； x++)","options":{"C":"6 次","B":"5 次","A":"4 次","D":"无限循环"},"answer":"B","explanation":"本题考查 for循环。&&＆表示“与”的意思，在使用上是a&&b：a和\nb同时为 true 才返回 true，否则返回 false。题目中 x=0，y=0，所以 y！=1234为真，进行x的\n自增运算，从 0到 4共执行了五次，在x=5是循环结束。故本题答案为 B。","subject":"编程语言","source_chapter":"题海训练·第四节"},{"id":"th-91110","source":"题海训练","type":"单选","chapter":"题海训练·第四节","stem":"已知inti=1；执行语句“j=－i++”后，i和i的值分别为（","options":{"C":"2， -1","B":"1，-1","A":"1, 1","D":"2, -2"},"answer":"C","explanation":"本题考查自加运算。负号的优先级比自加运算符的高，因此先将一i\n的值赋给j，j=-1，然后i进行+1 运算，i=2。故本题答案为 C。\nI信息科技－题海训练答案及解析\n10.（答案D。解析：本题考查C语言的表达式。在C语言中，逗号表达式的取值为最后\n一个表达式的值，语句从左至右执行，9赋值给 x，表达式 x%=x+3等价于 x=x%（x+3），即\n把右边表达式的值赋值给 x，x=9%12，结果是9。故本题答案为 D。","subject":"编程语言","source_chapter":"题海训练·第四节"},{"id":"th-8166","source":"题海训练","type":"单选","chapter":"题海训练·第四节","stem":"逗号表达式“a2*6，a*3，a+5”的值是（\n11.以下程序的输出结果是（\nmain（)\nint a=3;\nprintf（“%d/n”，（a+a-=a*a））","options":{"A":"sum=sum+a%10;","B":"sum=-sum+a/10;","C":"sum=sum+a%10","D":"sum=sum+a/10 15.设有一个递归算法如下： int x (int n) if （n<=3） return 1; else return x（n-2） +x（n-4） +1;"},"answer":"A","explanation":"本题考查VB程序设计语言。VB中工程文件的扩展名是.vbp，B项frm\n是窗体文件的扩展名，C项.bas 是标准模块的扩展名，D项.vbw是VB工作区文件，保存窗体\n启动状态与大小。故本题答案为 A。","subject":"编程语言","source_chapter":"题海训练·第四节"},{"id":"th-48767","source":"题海训练","type":"单选","chapter":"题海训练·第五节","stem":"以下关于Python 语言技术特点的描述中，错误的是（","options":{"A":"对于需要更高执行速度的功能，例如数值计算和动画，Python语言可以调用C语言编 写的底层代码","B":"Python比大部分编程语言具有更高的软件开发产量和简洁性","C":"Python语言是解释执行的，因此执行速度比编译型语言慢","D":"Python是脚本语言，主要用作系统编程和Web 访问的开发语言"},"answer":"C","explanation":"本题考查VB程序设计语言。Visual Basic（简称VB）是Microsoft公\n司开发的一种通用的基于对象的程序设计语言，为结构化的、模块化的、面向对象的、包含协\n助开发环境的事件驱动为机制的可视化程序设计语言。与传统程序设计语言相比，共有的是结\n构化程序设计、开发环境以及调试技术，而其独有的是事件驱动编程机制。故本题答案为C。","subject":"编程语言","source_chapter":"题海训练·第五节"},{"id":"th-55687","source":"题海训练","type":"单选","chapter":"题海训练·第五节","stem":"以下代码的输出结果是（\nx=12+3*（（5*8）-14）//6\nprint (x)","options":{"C":"25","B":"65","D":"24","A":"25.0"},"answer":"C","explanation":"本题考查VB程序设计语言。打开工程文件之后，系统会自动装人\n工程窗口、窗体、工具箱、属性窗口、窗体布局窗口等，所以A项不符合题意。保存Visual\nBasic 程序时，会默认保存窗体和工程两个文件，所以B项不符合题意。事件驱动程序的基本\n结构是由一个事件收集器、一个事件发送器和一个事件处理器组成。事件收集器专门负责收集\n所有事件，包括来自用户的（如鼠标、键盘事件等）、来自硬件的（如时钟事件等）和来自软\n中以编译方式执行，编译后生成exe 程序，所以 C 项符合题意。故本题答案为 C。","subject":"编程语言","source_chapter":"题海训练·第五节"},{"id":"th-83179","source":"题海训练","type":"单选","chapter":"题海训练·第五节","stem":"以下关于 Python 循环结构的描述中，错误的是（","options":{"A":"break用来结束当前循环语句，但不跳出当前的循环体 ）函数等","B":"遍历循环中的遍历结构可以是字符串、文件、组合数据类型和range（","C":"Python 通过 for、while 等保留字构建循环结构","D":"continue 只结束本次循环"},"answer":"C","explanation":"本题考查VB程序设计语言。Visual Basic 工具箱中，并不是所有控\n件都具有宽度（Width）和高度（Height）属性。比如计时器，它只能在设计时显示，运行时不\n显示，所以 C项符合题意。A项与B项均表明Visual Basic 是一个事件驱动的可视化编程工具，\n这是Visual Basic 的一个重要特征。D项，大部分控件可以在设计时设置，也可以在运行时通\n过程序代码设置。但有些只能在运行时设置，比如列表框Text 属性。故本题答案为 C。","subject":"编程语言","source_chapter":"题海训练·第五节"},{"id":"th-14546","source":"题海训练","type":"判断","chapter":"题海训练","stem":"Python中，列表中的元素可以是不同数据类型。","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-37642","source":"题海训练","type":"判断","chapter":"题海训练","stem":"a=[1，2，3]；A.append（2019）；前者a 的地址与后者a的地址不同。（","options":{},"answer":"正确","explanation":"Photoshop可以支持的模式见下图。故本题表述正确。\n颜色模式（M）：RGB颜色\n位图\n背景内容（C)：\n灰度\nRGB颜色\nCMYK颜色\nLab颜色","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-62113","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在Windows 平台上编写的 Python 程序无法在 Linux 平台运行。（","options":{},"answer":"正确","explanation":"","subject":"编程语言","source_chapter":"题海训练"},{"id":"th-60757","source":"题海训练","type":"判断","chapter":"题海训练","stem":"已知 x=1.5，那么赋值语句x=’china’运行时会报错。（","options":{},"answer":"正确","explanation":"本题考查母版。通过修改幻灯片母版，可以统一修改文稿中所有\n幻灯片的文本外观，若要统一修改多张幻灯片的外观，只需在母版上做一次修改即可。故本题\n签安头正确\n／软件操作篇\n文本框页眉和顶脚艺术字日期\n横排文本框H\n文本\n重直文本框","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-74700","source":"题海训练","type":"单选","chapter":"题海训练·第二章","stem":"应用计算机程序解决数学问题求“一元二次方程”实数解的步骤通常是（","options":{"A":"设计算法","B":"编写程序一→调试程序一→调试程序一→检测结果","C":"分析问题一→设计算法→编写程序一→调试运行一→检测结果","D":"编写程序一→调试运行"},"answer":"B","explanation":"本题考查计算机网络的传输介质。光纤特点是速度快，传输距离远，\n抗干扰能力强等，在平时使用的过程中有很多的应用。故本题答案为B。","subject":"编程语言","source_chapter":"题海训练·第二章"},{"id":"th-96368","source":"题海训练","type":"单选","chapter":"题海训练·第二章","stem":"以下关于简单程序设计的步骤和顺序的说法正确的是（","options":{"A":"确定算法后，整理并写出文档，最后进行编码和上机调试","B":"首先确定数据结构，然后确定算法，再编码，并上机调试，最后整理文档","C":"先编码和上机调试，在编码过程中确定算法和数据结构，最后整理文档","D":"先写好文档，再根据文档进行编码和上机调试，最后确定算法和数据结构"},"answer":"C","explanation":"本题考查计算机网络的诞生。Intermet 最初是阿帕网，即 ARPANET,\n是由美国国防部在1969 年创建的。故本题答案为 C。","subject":"算法与数据结构","source_chapter":"题海训练·第二章"},{"id":"th-59105","source":"题海训练","type":"单选","chapter":"题海训练·第二章","stem":"在设计程序时，应采纳的原则之一是（","options":{"A":"1","B":"-3","C":"9","D":"3 20.以下是“求实数a的绝对值”的算法流程图，虚线框中应填充的图形是（ 开始"},"answer":"C","explanation":"本题考查计算机网络的传输介质。粗缆传输的最大距离是500米，\n双绞线传输的最大距离是100米，细缆传输的最大距离是185米。故本题答案为C。","subject":"计算机网络","source_chapter":"题海训练·第二章"},{"id":"th-19902","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"数据的最小单位是（","options":{"C":"数据元素","B":"数据类型","A":"数据项","D":"数据变量"},"answer":"A","explanation":"本题考查图层的相关知识。对文字图层应用“外发光”效果后能改\n变图层样式，也能改变文字内容。默认的外发光颜色是淡黄色，外发光的混合模式是“滤色”，\n按此默认设置在浅色背景下就看不出外发光效果了。故本题答案为A。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-59444","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"数据结构是一门研究非数值计算的程序设计问题中计算机的数据元素以及它们之间的\n）和运算等的学科。","options":{"C":"运算","B":"关系","A":"结构","D":"算法"},"answer":"D","explanation":"本题考查Photoshop中的图层。在 PS 中，图层就像是含有文字或图\n形等元素的胶片，一张张按顺序叠放在一起，组合起来形成页面的最终效果，修改某一图层的\n样式，不会影响其他图层的效果，图像保存为.PSD格式，后续还可以编辑图像的各个图层\n故本题答案为 D。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-2213","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"对于n个元素组成的线性表，建立一个有序单链表的时间复杂度是（","options":{"B":"O(n)","C":"O (n2)","A":"0(1)","D":"O （nlog2n )"},"answer":"C","explanation":"本题考查容差。容差是在选取颜色时所设置的选取范围，容差越大，\n选择的精度越低，选取的范围也越大，其数值是在0～255之间。故本题答案为 C。","subject":"算法与数据结构","source_chapter":"题海训练·第三章"},{"id":"th-2299","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"数据的逻辑结构分为（","options":{"A":"线性结构和非线性结构","B":"顺序结构和非顺序结构","C":"树型结构和图型结构","D":"链式结构和顺序结构"},"answer":"C","explanation":"本题考查Photoshop。Photoshop是图像处理软件，可以调整图像亮度、\n对比度，也可以添加文字，设置文字样式，C选项属于Excel 的功能。故本题答案为C。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-82131","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"通常要求同一一逻辑结构中的所有数据元素具有相同的特性，这意味着（","options":{"A":"数据元素具有同一特点","B":"不仅数据元素所包含的数据项的个数要相同，而且对应数据项的类型要一致","C":"每个数据元素都一样","D":"数据元素所包含的数据项的个数要相等"},"answer":"B","explanation":"本题考查 Photoshop。在“历史记录”面板中点击“清除历史记录”\n命令只能清除当前图片的历史记录，不需要配合Ctrl、Alt键使用，这个操作可以撤消；而在\n菜单选项中清理历史记录则为清除所有打开图像的历史记录，而且这个操作不能还原。故本题\n答案为 B。\nI信息科技－题海训练答案及解析\n则选区，但是不能将紫色背景扣出；D选项，磁性套索会吸附在图形边缘，但是控制不精准，\n容易失误。故本题答案为 C。","subject":"算法与数据结构","source_chapter":"题海训练·第三章"},{"id":"th-177","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"软件危机表现在多个方面，以下不属于这些表现的是（","options":{"A":"软件可维护性差","B":"软件生产成本高","C":"软件质量不易保证","D":"软件依赖于硬件"},"answer":"B","explanation":"本题考查操作系统的概念。操作系统是现代计算机系统中最基本和\n最重要的系统软件，所以 B项符合题意。故本题答案为B。\n2．【答案D。解析：本题考查操作系统关心的主要问题。操作系统主要关心的是处理机\n管理、存储器管理、设备管理、文件管理、提供用户接口等功能，而编译器不属于这些功能里\n面的任何一种，不是操作系统关心的问题，所以D项正确。从计算机资源的角度来看，OS的\n作用是管理计算机的硬件和软件等各种系统资源，所以A、C是操作系统关心的问题。从用户\n的角度来看，OS的作用是提供用户和计算机硬件之间的接口，所以B是操作系统关心的问题\n故本题答案为D。","subject":"计算机基础","source_chapter":"题海训练·第四章"},{"id":"th-47583","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"要减少两模块之间的联系，则（","options":{"A":"两模块之间的调用次数要尽量少","B":"两模块之间直接传递的信息要尽量少","C":"两模块应使用尽可能相同的全局变量","D":"两模块应尽量共享相同的数据结构"},"answer":"C","explanation":"本题考查逐帧动画。逐顿动画是在时间轴的每一帧都设成关键顿，\n每个关键顿上绘制不同的内容，使其连续播放而成动画，所以C项符合题意。变形动画（形状\n补间动画）：应用于基本形状的变化，它是某一个对象在一定时间内形状发生过渡渐变的动画，\n所以A项不符合题意。过程动画（运动补间动画）：应用于把对象由一个地方移动到另一个\n地方的情况，也可应用与物体的缩放、倾斜或者旋转，还可用于元件颜色和透明度的变化，所\n以 B、D项不符合题意。故本题答案为 C。","subject":"多媒体","source_chapter":"题海训练·第四章"},{"id":"th-65356","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"数据耦合、公共耦合、标记耦合、控制耦合的耦合性从低到高的顺序是（","options":{"A":"数据、公共、标记、控制","B":"数据、标记、控制、公共","C":"控制、数据、标记、公共","D":"控制、数据、公共、标记"},"answer":"B","explanation":"本题考查元件的概念及类型。元件与图形对象的区别是元件外面有\n一个框，而图形对象没有。故本题答案为 B。","subject":"编程语言","source_chapter":"题海训练·第四章"},{"id":"th-11825","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"软件开发过程中抽取和整理用户需求并建立问题域精确模型的过程叫（","options":{"A":"可理解性 15.软件测试的目的是（","B":"可维护性","C":"可扩展性","D":"可移植性"},"answer":"B","explanation":"本题考查动作补间动画。动作动画的对象必须是元件，而用Flash 画\n的篮球是图形而不是元件，因此必须首先将其转换为图形元件，才可以成功的制作出动作动画，\n故本题答案为 B。","subject":"多媒体","source_chapter":"题海训练·第四章"},{"id":"th-31301","source":"题海训练","type":"多选","chapter":"题海训练","stem":"软件生存周期一一般包括三个周期：软件定义期、软件开发期和软件运行期，下列不是软\n件开发期所应包含的活动的是（","options":{"A":"需求获取和需求建模","B":"软件维护","C":"可行性分析","D":"软件体系结构分析和数据设计"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"计算机基础","source_chapter":"题海训练"},{"id":"th-92970","source":"题海训练","type":"多选","chapter":"题海训练","stem":"黑盒测试是根据软件的规格说明来设计测试。常用的黑盒测试方法有边界值分析、","options":{"A":"等价类划分","B":"错误猜测","C":"因果图","D":"α 测试 E.β测试"},"answer":"AC","explanation":"本题考查 Photoshop。用鼠标点击一次，再点击一次就可以形成直\n线型的多边形选择区域，A项正确。多边形套索属于套索工具，B项错误。鼠标拖拽出来的区\n域形成的轨迹就是选择区域。C项正确。多边形套索工具由于区域不规则，·所以不是规则选框\n工具。D项错误。故正确答案为 AC。","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-31209","source":"题海训练","type":"判断","chapter":"题海训练","stem":"软件是指用程序设计语言（如C、VB等）编写的程序，软件开发实际上就是编写程序\n代码。（","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\ },"answer":"D","explanation":"本题考查体系结构。计算机诞生至今，一直沿用冯·诺依曼提出的“存\n储程序、程序控制”计算机原理。故本题答案为 D。","subject":"计算机基础","source_chapter":"题海训练·第一章"},{"id":"th-1738","source":"题海训练","type":"单选","chapter":"题海训练·第一章","stem":"关于电子计算机的特点，以下论述错误的是（","options":{"A":"运算速度快","B":"具有记忆和逻辑判断能力","C":"运算精度高","D":"运行过程不能自动连续进行，需人工干预"},"answer":"D","explanation":"本题考查计算机的特点。计算机的特点有：（1）能自动连续地高速\n运算；（2）运算速度快；（3）运算精度高；（4）具有记忆能力和逻辑判断能力；（5）通用\n性强。所以D选项运行过程中是可以自动连续进行的，D选项错误。故本题答案为D。","subject":"编程语言","source_chapter":"题海训练·第一章"},{"id":"th-23696","source":"题海训练","type":"单选","chapter":"题海训练·第一章","stem":"计算机的发明和发展首先是为了（\n)。","options":{"A":"科学计算","B":"信息处理","C":"人工智能","D":"实时控制"},"answer":"A","explanation":"本题考查计算机的应用。科学计算是计算机应用的最早领域，也是\n计算机的发明和发展首先解决的问题。故本题答案为A。","subject":"信息基础","source_chapter":"题海训练·第一章"},{"id":"th-56716","source":"题海训练","type":"单选","chapter":"题海训练·第一章","stem":"在计算机应用领域里，（\n）是其最广泛的应用方面。\n·1信息科技－题海训练\n8.气象部门利用计算机处理大量气象数据，属于计算机应用中的（","options":{"C":"莫奇莱","B":"冯·诺依曼","D":"比尔·盖茨","A":"艾仑·图灵 14.电子计算机技术在半个世纪中虽有很大进步，但至今其运行仍遵循着一位科学家提出 的基本原理，他就是（"},"answer":"C","explanation":"本题考查计算机的应用领域。计算机应用可分为：科学计算、实时\n控制、数据处理（或叫信息管理）、辅助系统、人工智能、语言翻译等。数据处理是目前计算\n机应用最广泛的一个领域，是指利用计算机来加工、管理与操作任何形式的数据资料，如企业\n管理、物资管理、报表统计、账目计算、信息情报检索等。所以C项符合题意。早期的计算机\n超格教育\n」信息科技－题海训练答案及解析\n8.（答案B。解析：本题考查计算机的应用。计算机的应用包括科学计算、辅助技术、\n过程控制、人工智能和网络应用等。其中，对于数据的处理属于科学计算应用。故本题答案\n为 B。","subject":"计算机基础","source_chapter":"题海训练·第一章"},{"id":"th-33850","source":"题海训练","type":"多选","chapter":"题海训练","stem":"关于世界上公认的第一台电子计算机的说法，正确的有（","options":{"A":"世界上公认的第一台电子计算机诞生于1946年","B":"世界上公认的第一台电子计算机是由德国研制的","C":"世界上公认的第一台电子计算机使用的是晶体管","D":"世界上公认的第一台电子计算机的名字叫埃尼阿克（ENIAC）"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"计算机基础","source_chapter":"题海训练"},{"id":"th-49329","source":"题海训练","type":"多选","chapter":"题海训练","stem":"与外存相比，计算机内存的特点有（","options":{"C":"价格高","B":"容量小","A":"速度快","D":"受地址总线限制"},"answer":
