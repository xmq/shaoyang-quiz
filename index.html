和控制器组成。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-75563","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"下列关于数制的说法错误的是（ ）。","options":{"A":"常用的数制都采用位计数值","B":"进位计算制涉及数码和位权","C":"任意一个二进制数可以用 0，1 共两个数字组合的数字字符串来表示","D":"十六进制数 83 采用字码表达法表示为 83B"},"answer":"D","explanation":"十六进制数采用字码表达通常以大写字母 H 结尾，即 83H；一般数制都采用\n位计数值，进位计算涉及数码和位权，二进制数都是用 0 和 1 两个数字来表示。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-22862","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"关于 ASCII 码的大小，下列比较错误的是（ ）。","options":{"A":"1<8","B":"a<A","C":"h<z","D":"9<B"},"answer":"B","explanation":"在 ASCII 码表中，ASCII 值的大小有如下规则：数字＜大写字母＜小写字母；\n因此 a＞A。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-30329","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"计算机根据运算速度、存储能力、功能强弱、配套设备等因素可划分为（ ）。","options":{"A":"台式计算机、便携式计算机、膝上型计算机","B":"电子管、晶体管、集成电路","C":"巨型机、大型机、中型机、小型机和微型机","D":"8 位机、16 位机、32 位机、64 位机"},"answer":"C","explanation":"根据计算机所采用的电子元器件的不同，可将计算机划分为：电子管计算机、\n晶体管计算机和集成电路计算机。随着超大规模集成电路技术的发展，微型计算机进入快速发展时期。\n微型计算机按字长划分，可分为：8 位机、16 位机、32 位机、64 位机；而微型计算机按体积大小划分，\n又可分为：台式计算机、便携式计算机、膝上型计算机。计算机根据运算速度、存储能力、功能强弱、\n配套设备等因素可划分为：巨型机、大型机、中型机、小型机和微型机。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-24921","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"二进制中的 3 位可以表示（ ）。","options":{"A":"两种状态","B":"四种状态","C":"八种状态","D":"九种状态"},"answer":"C","explanation":"二进制用 0，1 这两个数码来表示数，用 3 位二进制表示数则表示 23=8 种状\n态。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-55218","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"下列几个不同数制的整数中，最大的一个是（ ）。","options":{"A":"(1001001)2","B":"(77)8","C":"(70)10","D":"(5A)16"},"answer":"D","explanation":"(1001001)2=(73)10，(77)8=(63)10，(5A)16=(90)10，所以 D 最大。","subject":"其他","source_chapter":"第二章 计算机基础知识"},{"id":"zg-58852","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"电子计算机存储器可以分为（ ）和辅助存储器。","options":{"A":"外存储器","B":"C 盘","C":"大容量存储器","D":"主存储器"},"answer":"D","explanation":"计算机中的存储器按用途存储器可分为主存储器（内存）和辅助存储器（外\n存），也有分为外部存储器和内部存储器的分类方法。外存通常是磁性介质或光盘等，能长期保存信息。\n内存指主板上的存储部件，用来存放当前正在执行的数据和程序，但仅用于暂时存放程序和数据，关闭\n电源或断电，数据会丢失。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-60911","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"通常所说的 RAM 指（ ）。","options":{"A":"U 盘","B":"内存","C":"硬盘","D":"光盘"},"answer":"B","explanation":"内存储器又称主存储器，简称内存，分为以下两种。只读存储器 ROM：永\n久保存数据，存储微型机的重要信息。随机存储器 RAM：断电丢失数据，存储当前运行的程序信息（SRAM、\nDRAM）。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-91208","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"以晶体管为主要逻辑器件的计算机属于（ ）计算机。","options":{"A":"第一代","B":"第二代","C":"第四代"},"answer":"B","explanation":"计算机的发展以使用不同的电子元器件为依据进行划分，共分为四个时代：\n阶段 时间 电子元器件\n第一代 1946 年-1957 年 电子管\n第二代 1958 年-1964 年 晶体管\n第三代 1965 年-1970 年 中小规模集成电路\n第四代 1970-至今 大规模或超大规模集成电路","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-61983","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"能被计算机直接识别和执行的语言是（ ）。","options":{"A":"汇编语言","B":"高级程序设计语言","C":"机器语言","D":"自然语言"},"answer":"C","explanation":"计算机程序设计的语言经历了三代。\n（1）机器语言\n由 0、1 代码组成，能被机器直接理解、执行的指令集合。这种语言编程质量高，占空间小，执行\n速度快，是机器唯一能够直接识别和执行的语言。\n（2）汇编语言\n又称符号语言，一定程度上克服了机器语言难学难改的缺点，同时保持其优点，目前在实时控制等\n方面仍有不少应用。汇编语言程序必须翻译成机器语言的目标程序后再执行。\n（3）高级语言\n是一种完全符号化的语言，采用自然语言中的词汇和语法习惯，易于人们理解和掌握。它完全独立\n于具体的计算机，具有很强的移植性。用高级语言编写的程序称为源程序，源程序不能在计算机中直接\n执行，必须将其翻译或解释成目标程序后，才能被计算机理解和执行。\n自然语言通常是指一种自然地随文化演化的语言。比如汉语、英语、德语等，计算机无法识别。\n因此本题的答案是 C。","subject":"编程语言","source_chapter":"第二章 计算机基础知识"},{"id":"zg-93267","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"运算速度是指计算机每秒执行的指令数，其计量单位为（ ），即每秒百万条指令。","options":{"A":"NTFS","B":"ERP","C":"MIPS","D":"IBM"},"answer":"C","explanation":"MIPS（Million Instructions PerSecond），又称单字长定点指令平均执行速度，\n表示计算机每秒钟执行的百万指令数。这是衡量 CPU 速度的一个指标。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-59924","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"二进制数 1101010 转换为十进制数为（ ）。","options":{"A":"98","B":"101","C":"103","D":"106"},"answer":"D","explanation":"(1101010)2=1×26+1×25+1×23+1×21=106，故答案为 106。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-56290","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"ASCII 码是基于拉丁字母的一套电脑编码系统。其中，“A”--“Z”的编码范围是（ ）。","options":{"A":"1100001--1111010","B":"1000001--1011010","C":"0010001--0111010","D":"0110000—0111011"},"answer":"B","explanation":"ASCII 码中，“A”~“Z”的编号为 65-90，故编号对应的二进制为 1000001~1011010。\n补充一下，ASCII 码信息与信息技术中，“a”~“z”的编号为 97-122，对应的二进制编码范围为\n1100001~1111010。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-25993","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"在计算机中，（ ）个字节称为 1MB。","options":{"A":"10K","B":"100K","C":"1024K","D":"1000K"},"answer":"C","explanation":"计算机常用的单位换算如下所示：\n1KB=1024B、1MB=1024KB、1GB=1024MB、1TB=1024GB。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-29257","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"关于 CPU，下列说法不正确的是（ ）。","options":{"A":"CPU 是中央处理器的简称","B":"CPU 可以代替存储器","C":"PC 机的 CPU 也称为微处理器","D":"CPU 是计算机的核心部件"},"answer":"B","explanation":"CPU 中文名称中央处理器，是一块超大规模的集成电路，由运算器和控制器\n组成。它的功能主要是解释计算机指令以及处理计算机软件中的数据。ACD 对于 CPU 说法正确。B 不\n正确，CPU 不可以代替存储器，不具备存储器功能。故选：B。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-23934","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"2018 年 4 月 27 日人机大战中，围棋选手柯洁不敌 AI 星阵中盘告负，说明（ ）。","options":{"A":"电脑已经像人脑一样思考","B":"围棋博弈是人工智能的主要应用","C":"人工智能已远远超过了人的智能","D":"人工智能近几年突飞猛进，较之前有了很大进步"},"answer":"D","explanation":"人机大战中主要使用的技术是人工智能，人工智能是指用计算机来模拟人类\n的思维、感觉和行为，是研究、开发用于模拟、延伸和扩展人的智能的理论、方法、技术及应用系统的\n一门新的技术科学，因此可知电脑是不能像人脑一样思考的，因此排除选项 A；人工智能的应用有很多，\n比如机器识别、虚拟现实等，主要目的是为了服务人类，因此排除 B 选项；机器能够战胜人机器的运算\n速度要比人快，因此排除 C 选项。综上所述本题的答案是 D。","subject":"信息基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-74491","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"ASCII 码中，大写字母 A 对应的十进制数是 65，对应的二进制数是 01000001，大写字母 B 对应\n的十进制数是 66，对应的二进制数是（ ）。","options":{"A":"01000011","B":"01000010","C":"01000100","D":"01000101"},"answer":"B","explanation":"大写字母 B 在 A 的后面，用 A 所对应的 ASCII 码二进制形式加 1，即为 B\n所对应 ASCII 码二进制。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-90003","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"二进制数 11 与十进制数 12 相加的结果是（ ）。","options":{"A":"(1100)2","B":"(0101)2","C":"(1010)2","D":"(1111)2"},"answer":"D","explanation":"本题考查的重点在于将十进制 12 转换为二进制。十进制转换为二进制的原\n则是：整数部分（倒读法）：“逐次除以基数取余”法，直到商为 0。\n12/2=6 余 0\n6/2=3 余 0\n3/2=1 余 1\n1/2=0 余 1\n因此(12)10=(1100)2。最后做加法，因此本题的答案是 D。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-91578","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"用 ASCII 码表示下列字符：a，A，5，空格，若按从大到小的顺序排列，应为（ ）。","options":{"A":"空格，A，a，5","B":"5，a，A，空格","C":"A，a，5，空格","D":"a，A，5，空格"},"answer":"D","explanation":"a 的 ASCII 码是 97，A 的 ASCII 码是 65，空格的 ASCII 码是 32，字符 5 的\nASCII 码是 53。因此本题的答案是 D。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-87944","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"人工智能是研究、设计和应用智能机器或系统来模拟人类活动的能力，以延伸人类智能的科学，\n获得“人工智能之父”的称号的是（ ）。","options":{"A":"冯·诺依曼","B":"阿伦·图灵","C":"查理斯·巴贝奇","D":"阿达·奥古斯塔"},"answer":"B","explanation":"A 选项冯•诺依曼提出了“存储程序与程序控制”的设计思想，被后人称为\n“计算机之父。”B 选项图灵，提出了图灵测试，即：如果一台机器能够与人类开展对话而不能被辨别\n出机器身份，那么这台机器就具有智能。图灵由此被称为“人工智能之父”与计算机科学的奠基人。所\n以正确答案选择 B 选项，C 选项查尔斯•巴贝奇是一名英国发明家，科学管理的先驱者。选项 D 阿达•\n奥古斯塔，计算机程序创始人，建立了循环和子程序概念。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-10481","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"现在的聊天软件有一种这样的功能：当对方发来语音消息，我们不方便听的时候，可以将其转化\n为文字来看，这是因为应用了（ ）。","options":{"A":"指纹识别技术","B":"语音识别技术","C":"图像识别技术","D":"字符识别技术"},"answer":"B","explanation":"指纹识别即指通过比较不同指纹的细节特征点来进行鉴别；语音识别技术就\n是让机器通过识别和理解过程把语音信号转变为相应的文本或命令的高技术；图像识别，是指利用计算\n机对图像进行处理、分析和理解，以识别各种不同模式的目标和对像的技术；字符识别技术是利用计算\n机自动的识别文字。因此本题的答案是 B。","subject":"编程语言","source_chapter":"第二章 计算机基础知识"},{"id":"zg-40778","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"小明准备将杂志上的精美图画输入到计算机中，下列哪种设备不能完成这一任务（ ）。","options":{"A":"数码照相机","B":"数码摄像机","C":"扫描仪","D":"绘图仪"},"answer":"D","explanation":"A、B、C 选项都是输入设备，可以把获取的数据信息传送到计算机当中，而\nD 选项属于输出设备，是接受计算机发送的数据信息的，所以答案为 D 选项。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-55588","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"下列哪种软件可以协助计算机完成特定工作（ ）。","options":{"A":"应用软件","B":"设备驱动软件","C":"编辑语言","D":"操作系统软件"},"answer":"A","explanation":"计算机中完成特定工作的叫做应用软件，可解决某一领域的某种问题。而 B、\nC、D 选项属于系统软件，故选择 A。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-42837","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"汉字是以特定的图形存储在计算机中的，这种图形是用点阵方式来表示的，16*16 点阵的一个汉\n字字形需要用（ ）个字节来存放。","options":{"A":"8","B":"16","C":"32","D":"48"},"answer":"C","explanation":"16*16 的点阵存储空间字节数为 16*16/8=32 字节。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-53529","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"将十进制数 13 转化为二进制数是（ ）。","options":{"A":"1011","B":"1101","C":"1110","D":"1111"},"answer":"B","explanation":"十进制转换为二进制采用的是除以基数取余，直到商为 0，余数倒写。13 除\n以 2，商为 6 余数 1；6 除以 2；商为 3 余数为 0；3 除以 2，商为 1 余数为 1；1 除以 2，商为 0，余数为\n1。将余数倒着写，为 1101，故选择 B 选项。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-76768","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"计算机辅助教学简称（ ）。","options":{"A":"CAD","B":"CAM","C":"CMI","D":"CAI"},"answer":"D","explanation":"计算机辅助制造（CAM）；计算机辅助教学（CAI）；计算机辅助设计（CAD）；\nCMI 计算机管理教学，故本题答案是 D。","subject":"信息基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-19598","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"下列哪项不属于计算机应用中人工智能的内容（ ）。","options":{"A":"辅助制造","B":"专家系统","C":"机器翻译","D":"模式识别"},"answer":"A","explanation":"人工智能的应用方面包括机器人、机器翻译、机器博弈、模式识别、专家系\n统。辅助制造属于计算机辅助应用领域。故本题答案是 A。","subject":"信息基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-78827","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"CF 游戏趣味性、交互性强，视觉、听觉效果好，使玩家体验到“身临其境”的感觉，这种电脑\n游戏主要用到的技术是（ ）。","options":{"A":"字符识别","B":"网格计算","C":"虚拟现实","D":"机器翻译"},"answer":"C","explanation":"根据虚拟现实技术基础知识，CF 游戏使玩家体验到“身临其境”的感觉，\n主要用到虚拟现实技术。故选：C。","subject":"信息基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-74364","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"字符“A”比“a”的 ASCII 码值小 32（十进制），已知字符“n”的二进制 ASCII 码值为(1101110)2，\n则字符“P”的十进制 ASCII 码值是（ ）。","options":{"A":"80","B":"90","C":"77","D":"74"},"answer":"A","explanation":"字符“A”比“a”的 ASCII 码值小 32（十进制），则字符“N”比字符“n”\n也小 32，已知字符“n”的二进制 ASCII 码值为(1101110)2，也就是十进制的 110，则字符“N”的 ASCII\n码值为 110﹣32＝78，字符“P”的 ASCII 码值为 78+2＝80。故选：A。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-12758","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"（ ）不是基本的操作系统。","options":{"A":"批处理操作系统","B":"分时操作系统","C":"实时操作系统","D":"网络操作系统"},"answer":"D","explanation":"操作系统的基本类型有批处理操作系统、分时操作系统、实时操作系统、分\n布式操作系统等。\n实时操作系统能够在指定或者确定的时间内，完成系统功能以及对外部或内部事件在同步或异步时\n间内做出响应。\n批处理操作系统中，用户提交作业后不再和系统交互，作业成批处理，多道程序运行。\n分时操作系统通常用于多用户操作系统。同时在一台计算机上连接多个终端，操作系统按预先分配\n给各个终端的时间片段轮流为各个用户终端服务，使各个终端用户分时共享计算机系统的资源。\n网络操作系统只是在传统操作系统的基础上，在网络功能和配置方面做了有针对性的改进和优化，\n并不是操作系统的基本类型。因此本题选 D。","subject":"操作系统","source_chapter":"第二章 计算机基础知识"},{"id":"zg-11183","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"计算机内部采用的进制是（ ）。","options":{"A":"二进制","B":"八进制","C":"十进制","D":"十六进制"},"answer":"A","explanation":"计算机目前仍然沿用“冯诺依曼”结构，内部采用二进制来进行相应的数据\n处理。人类最熟悉的是十进制。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-47173","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"在资源管理器上，用鼠标左键将应用程序文件拖曳到桌面的结果是（ ）到桌面。","options":{"A":"复制该程序文件","B":"移动该程序文件","C":"生成快捷方式","D":"没任何内容"},"answer":"C","explanation":"快捷方式是 Windows 应用程序的快捷启动方法。在程序安装的时候可以看到\n创建快捷方式，也可以通过使用创建快捷方式向导、鼠标左键拖动、右键单击应用程序选择“发送”—\n“桌面快捷方式”完成快捷方式的创建。因此本题的答案是 C。","subject":"操作系统","source_chapter":"第二章 计算机基础知识"},{"id":"zg-97902","source":"中公","type":"多选","chapter":"第二章 计算机基础知识","stem":"下列选项中，必须借助人工智能才能实现的是（ ）。","options":{"A":"机器人翻译","B":"与同学下棋","C":"智能机器人","D":"语音识别"},"answer":"ACD","explanation":"人工智能是使用各种自动化机器或智能机器模仿、延伸和扩展人的智能。\n机器翻译是利用计算机把一种自然语言转变成另一种自然语言的过程，用以完成这一过程的软件系统叫\n做机器翻译系统。机器人（Robot）是靠自身动力和控制能力来实现各种功能的一种机器装置。常见的\n模式识别主要有：文字识别、语音识别、指纹识别等。语音识别技术就是让机器通过识别和理解过程把\n语音信号转变为相应的文本或命令的高技术。B 选项中，与同学下棋是人与人之间的进行的，没有用到\n智能机器模仿人类的智能，因此不符合题意。","subject":"编程语言","source_chapter":"第二章 计算机基础知识"},{"id":"zg-1536","source":"中公","type":"多选","chapter":"第二章 计算机基础知识","stem":"在使用计算机的过程中，进行信息的输入与输出是我们最常使用的操作。下列属于输入设备的有\n（ ）。","options":{"A":"麦克风","B":"音箱","C":"键盘","D":"显示器"},"answer":"AC","explanation":"输入设备：将计算机的程序、文本、图形、图像、声音以及现场采集的各种\n数据转换为计算机能处理的数据形式并输送到计算机内部。输出设备：将计算机处理结果和信息输出。\nB 和 D 选项是输出设备。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-31833","source":"中公","type":"多选","chapter":"第二章 计算机基础知识","stem":"计算机存储器容量常用 KB、MB、GB 表示。下列关系正确的有（ ）。","options":{"A":"1KB=1024B","B":"1KB=1000MB","C":"1GB=1024MB","D":"1G=1024KB"},"answer":"AC","explanation":"1KB=210B=1024B1MB=210KB=220B。\n1GB=210MB=230B1TB=210GB=220MB=240B。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-21358","source":"中公","type":"多选","chapter":"第二章 计算机基础知识","stem":"下列属于人工智能中模式识别的是（ ）。","options":{"A":"OCR","B":"飞机导航","C":"机器翻译","D":"指纹考勤机"},"answer":"AD","explanation":"常见的模式识别主要有：文字识别、语音识别、指纹识别等。OCR（Optical\nCharacter Recognition，光学字符识别）是指电子设备（例如扫描仪或数码相机）检查纸上打印的字符，\n通过检测暗、亮的模式确定其形状，然后用字符识别方法将形状翻译成计算机文字的过程。飞机导航没\n有用到模式识别。机器翻译是利用计算机把一种自然语言转变成另一种自然语言的过程，没有涉及到模\n式识别。指纹考勤机利用了指纹识别。","subject":"信息基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-33892","source":"中公","type":"多选","chapter":"第二章 计算机基础知识","stem":"下列有关在 Windows 操作中删除文件的描述不正确的是（ ）。","options":{"A":"利用剪贴板可实现删除操作","B":"按住 Shift 键再删除，则文件将直接删除而不进入回收站","C":"在回收站中删除某些文件，可以通过“还原”将文件恢复","D":"计算机重新启动后回收站中的文件将不复存在"},"answer":"CD","explanation":"C 选项，在回收站中删除文件，则该文件被彻底删除，不能再通过“还原”\n将其恢复；D 选项，回收站是计算机硬盘上的一块区域，计算机重新启动后硬盘上存储内容不会丢失。","subject":"操作系统","source_chapter":"第二章 计算机基础知识"},{"id":"zg-19299","source":"中公","type":"多选","chapter":"第二章 计算机基础知识","stem":"下列属于通配符的是（ ）。","options":{"A":"？","B":"/","C":"\\","D":"*"},"answer":"AD","explanation":"在 Windows 系统中，用户可以在查找文件和排列文件时使用通配符，通配\n符有两种：“*”和“?”。“*”通配符可以代表所在位置上任意长字符。“?”通配符代表所在位置上\n的一个任意字符。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-53456","source":"中公","type":"判断","chapter":"第二章 计算机基础知识","stem":"“bit”是数据的最小单位，即二进制的 1 位。（ ）","options":{},"answer":"正确","explanation":"bit 中文简称为“位”，由 0 和 1 组成。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-44969","source":"中公","type":"判断","chapter":"第二章 计算机基础知识","stem":"运算器的主要功能是算术和逻辑运算。（ ）","options":{},"answer":"正确","explanation":"CPU 由运算器和控制器组成，运算器的主要功能是算术和逻辑运算，控制\n器的主要功能是控制管理的核心部件，功能是从内存中一次取出指令，产生控制信号，向其他部件发出\n命令指挥整个计算过程；输入设备将计算机的程序、文本、图形、图像、声音以及现场采集的各种数据\n转换为计算机能处理的数据形式并输送到计算机内部；输出设备将计算机处理结果和信息输出。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-19525","source":"中公","type":"判断","chapter":"第二章 计算机基础知识","stem":"计算机“死机”现象是计算机处于暂停状态。（ ）","options":{},"answer":"错误","explanation":"计算机死机是由于无法启动系统，画面“定格”无反应，鼠标、键盘无法\n输入，软件运行非正常中断等，而非电脑处于暂停状态。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-21100","source":"中公","type":"判断","chapter":"第二章 计算机基础知识","stem":"在 Windows 中，“剪贴板”是内存的一块区域。（ ）","options":{},"answer":"正确","explanation":"剪贴板是内存上的一块空间，断电后信息丢失。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-17466","source":"中公","type":"判断","chapter":"第二章 计算机基础知识","stem":"与内存储器相比，外存储器具有的特点是存取速度慢，存储容量大。（ ）","options":{},"answer":"正确","explanation":"内存器的特点是速度快，容量小，而外存储器的特点是容量大，速度慢。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-16883","source":"中公","type":"填空","chapter":"第二章 计算机基础知识","stem":"CPU 主要由运算器和控制器组成，其中运算器用来对数据进行各种算术运算和________运算。","options":{},"answer":"逻辑","explanation":"逻辑。解析：CPU 主要由运算器和控制器组成，其中运算器用来对数据进行各种算术运\n算和逻辑运算。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-18458","source":"中公","type":"填空","chapter":"第二章 计算机基础知识","stem":"操作系统的特征是________，_______和随机性。","options":{},"answer":"并发性、共享性","explanation":"并发性、共享性。解析：操作系统的基本特征是：\n（1）并发性：\n是在计算机系统中同时存在多个程序，宏观上看，这些程序是同时向前推进的。 在单 CPU 上，这\n些并发执行的程序是交替在 CPU 上运行的。\n程序并发性体现在两个方面： 用户程序与用户程序之间的并发执行。 用户程序与操作系统程序之\n间的并发。\n（2）共享性：\n资源共享是操作系统程序和多个用户程序共用系统中的资源。\n（3）随机性：\n随机性指：操作系统的运行是在一个随机的环境中，一个设备可能在任何时间向处理机发出中断请\n求，系统无法知道运行着的程序会在什么时候做什么事情。","subject":"操作系统","source_chapter":"第二章 计算机基础知识"},{"id":"zg-14824","source":"中公","type":"填空","chapter":"第二章 计算机基础知识","stem":"各种应用软件都必须在________的支持下运行。","options":{},"answer":"操作系统","explanation":"操作系统。解析：解析：操作系统（Operating System，OS）是控制和管理计算机系统内\n各种软、硬件资源，合理组织计算机工作流程，为用户提供一个使用方便、可扩展的工作环境，方便用\n户使用的计算机系统。内容包括：操作系统是计算机与用户之间的接口；操作系统是对硬件的第一次扩\n充；操作系统管理的资源包括硬件资源与软件资源；操作系统是计算机运行的平台，其他应用软件运行\n的基础。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-83601","source":"中公","type":"填空","chapter":"第二章 计算机基础知识","stem":"通常所说的微型计算机的主机主要包括________。","options":{},"answer":"CPU 和内存","explanation":"CPU 和内存。解析：内存又称为主存。CPU 与内存合在一起一般称为主机。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-80893","source":"中公","type":"填空","chapter":"第二章 计算机基础知识","stem":"现今无论是台式电脑还是笔记本电脑，硬盘成为制约速度的瓶颈，目前高端个人电脑中为提高速\n度都使用了________硬盘。","options":{},"answer":"SSD","explanation":"SSD。解析：SSD 读写速度快，性能稳定，发热低，电耗低，无噪音。因为没有机械部\n分，所以长时间使用也出现故障几率也较小。缺点显而易见，价格高、容量小，在普通硬盘前毫无性价\n比优势。目前主流 SSD 都很少超过 1000GB。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-82468","source":"中公","type":"填空","chapter":"第二章 计算机基础知识","stem":"汉字国标码中，一个汉字用________个字节表示。","options":{},"answer":"2","explanation":"2。解析：一个汉字由 2 个字节表示。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-50297","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"编辑文本时，直接回车换行，行与行之间是单行，如果想让行紧挨着，则按（ ）。","options":{"A":"Ctrl+回车 BAlt+回车","C":"Shift+回车","D":"Ctrl+Alt+回车"},"answer":"C","explanation":"Ctrl+回车是分页符；B 选项没有实际效果；Word 中如果想让行与行之间紧挨\n着，则需要按下 Shift+回车键；Ctrl+Alt+回车键是合并段落符号，就是强制把两个段落拼接在一起。","subject":"编程语言","source_chapter":"第三章 办公软件"},{"id":"zg-2894","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"Excel 中运用公式的一般形式为（ ）。","options":{"A":"=算式","B":"：算式","C":"<=算式","D":"=>算式"},"answer":"A","explanation":"Excel 中的公式是以等号开头，使用运算符号将各种数据、函数、区域、地址\n连接起来的，是用于对工作表中的数据进行计算或文本进行比较操作的表达式。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-95531","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"新建 Word 文件时，默认字体和字号是（ ）。","options":{"A":"黑体，三号","B":"楷体，四号","C":"宋体，五号","D":"仿宋，六号"},"answer":"C","explanation":"新建的 Word 文档默认的字体和字号分别是宋体、五号。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-68963","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Word 中下列属于段落格式设置的是（ ）。","options":{"A":"设置为四号字","B":"设置为楷体字","C":"1.5 倍行距","D":"4 磅字间距"},"answer":"C","explanation":"执行“格式”|“段落”命令，或单击鼠标右键在弹出的快捷菜单中选择“段\n落”选项，显示“段落”对话框。\n由上图可知，可以设置行间距、对齐方式等。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-29462","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Excel 中，在 A1 单元格中输入=SUM(8,7,8,7)则其值为（ ）。","options":{"A":"15","B":"30","C":"7","D":"8"},"answer":"B","explanation":"SUM 是求和函数，求其对应的参数的和，由题意可得为 30。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-66904","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Word 中替换操作的快捷键是（ ）。","options":{"A":"Ctrl+F","B":"Ctrl+H","C":"Ctrl+S","D":"Ctrl+Q"},"answer":"B","explanation":"查找快捷键是 Ctrl+F；替换快捷键是 Ctrl+H；定位快捷键是 Ctrl+G；保存快\n捷键是 Ctrl+S。","subject":"操作系统","source_chapter":"第三章 办公软件"},{"id":"zg-31521","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"下列常用文件类型对应有误的是（ ）。","options":{"A":"doc_演示文稿","B":"wav_声音文件","C":"avi_视频文件","D":"swf_动画文件"},"answer":"A","explanation":".doc 属于文本文档；.ppt 属于演示文稿；其他选项对应均正确。","subject":"多媒体","source_chapter":"第三章 办公软件"},{"id":"zg-32973","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在（ ）中，同时使用数值与数据标识，可以使数据之间的比例关系更为清晰。","options":{"A":"柱形图","B":"条形图","C":"线形图","D":"饼图"},"answer":"D","explanation":"在 Excel 中图表类型包括柱形图、条形图、饼图、雷达图、散点图、折线图等，\n没有线形图，其中柱形图一般是指一段时间内数据的变化或者不同项目之间的对比；条形图一般是指显\n示各个数据系列的对比；饼图显示个体与整体的比例关系，数据系列相对于总量的百分比，同时使用数\n值与数据可以更加清晰的表示数据之间的比例。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-34548","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"要使幻灯片在放映时能够自动播放，需要为其设置（ ）。","options":{"A":"预设动画","B":"排练计时","C":"动作按钮","D":"录制旁白"},"answer":"B","explanation":"B 选项为在每张幻灯片所用的时间都被记录下来，供自行播放时使用。要为\n演示文稿设置排练计时，可执行“幻灯片放映”|“设置”|“排练计时”命令激活排练方式，演示文稿\n将进入录制状态，打开“录制”工具栏。当幻灯片放映时，同时计时系统启动，用户可以按需要对每张\n幻灯片设置放映时间，到达幻灯片末尾时，单击“是”按钮接受排练时间，或单击“否”按钮重新开始\n计时。A 为幻灯片设置动画效果，不能实现自动播放。C 项需要单击动作按钮进行交互不能实现自动播\n放；D 为使用计算机自带的麦克风录制旁白音轨，成功录制后会在播放幻灯片时同步播放。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-63877","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"朱老师在制作好多媒体演示文稿“背影.ppt”之后，在讲课时双击该课件系统提示“不能打开此\n文件......”或出现“打开方式”对话框，可能的原因是（ ）。","options":{"A":"没有将有关的音频文件复制到讲课用的电脑中","B":"Windows 系统版本低","C":"该电脑没有安装 PowerPoint 软件","D":"电脑显示器有问题，出现故障"},"answer":"C","explanation":"电脑没有安装 PowerPoint 软件，就会出现题目描述情况。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-67511","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在幻灯片放映过程中，能正确切换到下一张幻灯片的操作是（ ）。","options":{"A":"单击鼠标左键","B":"按 F5 键","C":"按 PageUP 键","D":"以上的都不正确"},"answer":"A","explanation":"放映演示文稿时，可以通过鼠标滚轮、右键快捷菜单中的“上一张”/“下一\n张”命令、“PgUp”/“PgDn”键或方向键等向前或向后放映幻灯片。A 选项单击鼠标左键能切换到下一\n张幻灯片；B 选项为从第一张幻灯片开始放映；C 选项为切换到上一张幻灯片。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-97808","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"如果希望将幻灯片由横排变为竖排，需要更换（ ）。","options":{"A":"版式","B":"设计模板","C":"背景","D":"幻灯片切换"},"answer":"A","explanation":"版式即版面格式，具体指的是开本、版心和周围空白的尺寸，正文的字体、\n字号、排版形式、字数、排列地位，还有目录和标题、注释、表格、图名、图注、标点符号、书眉、页\n码以及版面装饰等项的排法。如果希望将幻灯片由横排变为竖排，需要更换的就是版式。B 选项是包含\n样式文稿的文件，包括项目符号和字体的类型和大小、占位符大小和位置、背景设计等；C 选项为设置\n幻灯片的背景；D 选项为设置幻灯片之间的切换效果。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-98558","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Word 2010 文档中，小花选中一个单元格，点击 Backspace 键能（ ）。","options":{"A":"删除表格的行","B":"删除表格的列","C":"删除表格的单元格及内容","D":"删除单元格内的内容"},"answer":"C","explanation":"Backspace 键能删除单元格及内容；而 Delete 键只能够删除单元格内的内容。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-99867","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"扩展名为（ ）的文件，在没有安装 PowerPoint 2010 的系统中可直接放映。","options":{"A":"popx","B":"ppzx","C":"ppsx","D":"pptx"},"answer":"C","explanation":".ppt 和.pptx 文件为演示文稿，文件打开后可以编辑修改，而.pps 和.ppsx 文件\n为幻灯片放映文件，是打包后的演示文稿文件，所谓打包，指的是将独立的已综合起来共同使用的单个\n或多个文件，集成在一起，生成一种独立于运行环境的文件。将演示文稿打包能解决运行环境的限制和\n文件损坏或无法调用的不可预料的问题，比如，打包文件能在没有安装 PowerPoint、Flash 等环境下运\n行，目前主流的各种操作系统下运行。A 和 B 选项为干扰选项。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-53324","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 PowerPoint 2010 中，“审阅”选项卡可以检查（ ）。","options":{"A":"文件","B":"动画","C":"拼写","D":"切换"},"answer":"C","explanation":"在审阅选项卡中的校对组，单击拼写检查按钮，即可对幻灯片中的内容进行\n拼写检查。动画选项卡可以编辑幻灯片对象的动画效果，切换选项卡可以设置幻灯片之间的切换效果。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-33798","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"林老师在制作 PPT 时，希望调整两页 PPT 之间切换效果的持续时间，他应该通过（ ）进行\n设置。","options":{"A":"幻灯片放映—计时","B":"动画—计时","C":"设计—计时","D":"切换—计时"},"answer":"D","explanation":"切换效果就是用在换片过程中的特殊效果，它将决定以什么效果从一张幻灯\n片换到另一张幻灯片。而切换声音、切换速度、换片方式均通过“切换”下的选项进行设置。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-32223","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Excel 的 D1 单元格中输入下列内容，会出错的是（ ）。","options":{"A":"=SUM(A1:D1)","B":"=A1+B1+C1","C":"=AVERAGE(A1:C1)","D":"=A1+B1-C1"},"answer":"A","explanation":"A 选项公式中出现循环公式，无法正确计算。循环引用是指某个公式内依赖\n同一公式结果的任何引用。例如，引用其自身值的单元格以及引用依赖原始单元格值的其他单元格的单\n元格都包含循环引用。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-35857","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"新建工作簿的快捷键是（ ）。","options":{"A":"Shift+N","B":"Ctrl+N","C":"Alt+N","D":"Ctrl+Alt+N"},"answer":"B","explanation":"此题在考查常见的快捷键的知识，新建工作簿的快捷键是 Ctrl+N，C 选项\nAlt+N 为切换到“插入”选项卡，AD 选项无意义。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-17334","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"打印页码 2-5、10、12 表示打印的是（ ）。","options":{"A":"第 2 页，第 5 页，第 10 页，第 12 页","B":"第 2 页至 5 页，第 10 页至 12 页","C":"第 2 页至 5 页，第 10 页，第 12 页","D":"第 2 页，第 5 页，第 10 页至 12 页"},"answer":"C","explanation":"页码用-或是、隔开，当“-”隔开表示打印的页码是范围，而用、隔开表示\n是单页。因此本题的答案是 C。","subject":"其他","source_chapter":"第三章 办公软件"},{"id":"zg-69788","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"语文老师在 Word 中批改学生的作文时，如果遇到有错别字需要纠正，想要保留错别字和正确的\n字，需要启用（ ）功能。","options":{"A":"查找和替换","B":"修订功能","C":"批注","D":"目录和索引"},"answer":"B","explanation":"A 选项的功能是找出和替换掉符合条件的文字，不会保留错别字，因此 A 不\n正确；C 选项的结果是正确的字不会出现在正文中，而是在批注框里面，因此排除 C 选项；D 选项是为\n整篇文档创建目录，因此本题的答案是 B。","subject":"操作系统","source_chapter":"第三章 办公软件"},{"id":"zg-68213","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"要设置幻灯片中对象的动画效果及动画的出现方式时，应在（ ）选项卡中操作。","options":{"A":"切换","B":"动画","C":"设计","D":"审阅"},"answer":"B","explanation":"由题意要设置幻灯片中对象的动画效果及动画的出现方式时，应在“动画”\n选项卡中操作，如下图所示。A 选项在“切换”选项卡中，可以设置切换的方向，切换的方式等操作；\nC 选项在“设计”选项卡中设计幻灯片的方向、页面设置等操作；D 选项在“审阅”选项卡中，进行批\n改、拼音检查、信息检索等操作。","subject":"多媒体","source_chapter":"第三章 办公软件"},{"id":"zg-84978","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Excel 中，有时候单元格中输入的文字没有全部显示出来，以####显示，其原因是（ ）。","options":{"A":"单元格列宽太小","B":"单元格行高太小","C":"数据输入错误","D":"Excel 软件错误"},"answer":"A","explanation":"出现出错值####的原因主要有以下几种：\n（1）单元格所在的列不够宽。\n（2）使用了负的日期。\n（3）使用了负的时间。而题干中输入的是文字，因此本题的答案是 A。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-70272","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"利用 Excel 软件对数据进行加工时，下列哪个函数可以对数据进行求和（ ）。","options":{"A":"SUM","B":"MAX","C":"AVERAGE","D":"COUNT"},"answer":"A","explanation":"A 选项用于求和；B 选项求最大值；C 选项求平均数；D 选项是计数函数，\n计算单元格内容是数值的单元格的个数，故答案为 A 选项。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-51047","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Word 中，若想进行替换操作，需使用的快捷键是（ ）。","options":{"A":"Ctrl+A","B":"Ctrl+F","C":"Ctrl+H","D":"Ctrl+P"},"answer":"C","explanation":"在 Word 中，Ctrl+A 表示全选；Ctrl+F 表示查找；Ctrl+H 表示替换；Ctrl+P\n表示打印。所以选择 C 选项。","subject":"算法与数据结构","source_chapter":"第三章 办公软件"},{"id":"zg-4203","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Excel 中，饼图主要用来反映（ ）。","options":{"A":"每个项目的具体数目","B":"各部分在总体中所占的百分比","C":"事物随时间变化的情况","D":"两个数据间的相互比较"},"answer":"B","explanation":"在 Excel 中，饼图用于反映各部分在整体中所占的百分比，故本题答案是 B。","subject":"其他","source_chapter":"第三章 办公软件"},{"id":"zg-48988","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Excel 中要实现分类汇总，应先对分类项实行（ ）操作。","options":{"A":"筛选","B":"排序","C":"合并","D":"计数"},"answer":"B","explanation":"在 Excel 中要实现分类汇总，应先对分类项实行“排序”操作。汇总前必须\n对主分类的字段进行排序后再进行分类汇总，否则同类就不可能汇总在一起了，系统会把主分类字段数\n据相同的连续的记录进行分类汇总。故本题答案选 B。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-6262","source":"中公","type":"单选","chapter":"第三章 办公软件","stem":"在 Excel 中，单元格 A1,A2,A3 中的内容为数值 1，2，3，单元格 A4 中的内容为文本字符“3”，\n在单元格 A5 的编辑栏输入公式“=COUNT(A1:A4)+12”并单击回车键，A5 单元格的内容为（ ）。","options":{"A":"最小值 10%，最大值 500%","B":"最小值 5%，最大值 500%","C":"最小值 10%，最大值 400%","D":"最小值 5%，最大值 400%"},"answer":"A","explanation":"COUNT 函数用于计算单元格中是数值的单元格的格式，从题干描述 A1:A4\n这 4 个单元格中，有三个为数字，一个为文本，故 COUNT(A1:A4)的结果是 3，再加上 12，结果为 15。\n故本题答案是 A。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-92769","source":"中公","type":"多选","chapter":"第三章 办公软件","stem":"在 PowerPoint 中，段落的对齐方式包括（ ）。","options":{"A":"顶端对齐","B":"居中对齐","C":"两端对齐","D":"底端对齐"},"answer":"BC","explanation":"段落对齐方式有左对齐、右对齐、两端对齐、居中对齐、分散对齐。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-94353","source":"中公","type":"多选","chapter":"第三章 办公软件","stem":"在 Word 2010 中，段落格式设置包括（ ）。","options":{"A":"缩进","B":"行间距","C":"字间距","D":"段前段后间距"},"answer":"ABD","explanation":"在段落格式中可以设置缩进、行间距、段前段后间距，字间距在字体对话\n框中设置。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-58838","source":"中公","type":"多选","chapter":"第三章 办公软件","stem":"Excel 2010 中单元格地址的引用有哪几种（ ）。","options":{"A":"相对引用","B":"绝对引用","C":"混合引用","D":"任意引用"},"answer":"ABC","explanation":"Excel 2010 中单元格地址的引用有：相对引用、绝对引用、相对引用和绝\n对引用结合的混合引用。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-7489","source":"中公","type":"判断","chapter":"第三章 办公软件","stem":"Word 2010 可以同时打开多个文档窗口，但是文档窗口打开的越多，占用内存会越多，因而速度\n会更慢。（ ）","options":{},"answer":"正确","explanation":"Word 打开窗口越多占的内存会越多（大）。","subject":"计算机基础","source_chapter":"第三章 办公软件"},{"id":"zg-57005","source":"中公","type":"判断","chapter":"第三章 办公软件","stem":"在 Word 2010 中选定某句话后，连击两次“字体”组中的“B”按钮后，这句话格式不变。（ ）","options":{},"answer":"正确","explanation":"单击一次“B”按钮，会加粗。连续单击两次，恢复原格式，即格式不变。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-41420","source":"中公","type":"判断","chapter":"第三章 办公软件","stem":"在 Word 2010 表格中，对当前单元格右边的所有单元格中的数值求和，应使用=SUM（ABOVE）\n公式。（ ）","options":{},"answer":"错误","explanation":"应使用=SUM（RIGHT）。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-39845","source":"中公","type":"判断","chapter":"第三章 办公软件","stem":"在 Excel 2010 中，创建图表可通过 F11 快捷键。（ ）","options":{},"answer":"正确","explanation":"创建图表可以更加直观的显示数据的特征，除了通过“插入”选项卡来插\n入图表外，也可以通过 F11 快捷键创建图表。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-43479","source":"中公","type":"判断","chapter":"第三章 办公软件","stem":"在 Excel 中，符号“&”是文本运算符。（ ）","options":{},"answer":"正确","explanation":"“&”为连接运算符，连接一个或者更多字符串，产生一个长文本。","subject":"编程语言","source_chapter":"第三章 办公软件"},{"id":"zg-73776","source":"中公","type":"判断","chapter":"第三章 办公软件","stem":"在 PowerPoint 2010 中，制作好的幻灯片可直接放映，也可以用打印机打印。（ ）","options":{},"answer":"正确","explanation":"在 PowerPoint 2010 中，制作好的幻灯片可直接放映，也可以用打印机打印。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-77410","source":"中公","type":"判断","chapter":"第三章 办公软件","stem":"在 PowerPoint 2010 中，插入幻灯片中的多媒体对象，不可对其设置、控制播放方式。（ ）","options":{},"answer":"错误","explanation":"在 PowerPoint 2010 中，插入幻灯片中的多媒体对象，可对其设置、控制播\n放方式。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-55105","source":"中公","type":"填空","chapter":"第三章 办公软件","stem":"使用 Excel 2010 的自动筛选功能查找数据时，应单击“数据”选项卡→________命令。","options":{},"answer":"筛选","explanation":"筛选。解析：筛选是 Excel 中的功能，分为自动删选和高级筛选。单击“筛选”按钮后，\n数据清单的字段名会出现下拉框。点击“高级”按钮，可打开“高级筛选”对话框。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-98086","source":"中公","type":"填空","chapter":"第三章 办公软件","stem":"要在 PowerPoint 2010 中显示标尺、网络线、参考线，以及对幻灯片母版进行修改，应在________\n选项卡中进行操作。","options":{},"answer":"视图","explanation":"视图。解析：在 PowerPoint 2010 的“视图”选项卡中“显示”组可以实现对标尺、网格\n线、参考线的设置。如下图所示。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-89036","source":"中公","type":"填空","chapter":"第三章 办公软件","stem":"Word 2010 中，将剪贴板中的内容插入到文档中的指定位置，叫做________。","options":{},"answer":"粘贴","explanation":"粘贴。解析：将一个文本或一段文字复制或剪切后移动到另一个位置或另一个文本中，\n这个过程叫做粘贴。","subject":"计算机基础","source_chapter":"第三章 办公软件"},{"id":"zg-64155","source":"中公","type":"填空","chapter":"第三章 办公软件","stem":"在 Word 2010 文档编辑中，光标处在段落内，要选择光标所在段落，可________该段落。","options":{},"answer":"三击","explanation":"三击。解析：光标在文档内时，单击定位，双击选中一词，三击选中该段落；光标在文\n档选定区时（当鼠标指针移入此区时，指针将变成向右上倾斜的空心箭头，此区域称选定区），单击选\n一行，双击选一段，三击选全文。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-65730","source":"中公","type":"填空","chapter":"第三章 办公软件","stem":"在 Word 2010 编辑状态下，若要设置左右边界，利用________更直接、快捷。","options":{},"answer":"标尺","explanation":"标尺。解析：利用标尺可以直接对左右边界进行调整，也可以利用页面布局菜单中的页\n边距命令进行设置。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-62096","source":"中公","type":"填空","chapter":"第三章 办公软件","stem":"单击“开始”选项卡→“单元格”组中________命令，可以打开“行高”对话框设置行高。","options":{},"answer":"格式","explanation":"格式。解析：在单元格组中，可以对单元格进行设置，包括插入、删除以及格式的设置，\n在“格式”菜单中更可以设置行高列宽以及隐藏等操作。","subject":"办公软件","source_chapter":"第三章 办公软件"},{"id":"zg-8998","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"（ ）模拟事物运动过程，突出事物本质。","options":{"A":"图片","B":"声音","C":"动画","D":"文本"},"answer":"C","explanation":"图片能够反映静止的信息；声音是由物质的振动引起的，反映事物频率；动\n画能够模拟事物运动的过程。","subject":"编程语言","source_chapter":"第四章 多媒体技术"},{"id":"zg-44193","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"用 Photoshop 软件加工图像时，以下（ ）图像格式能保存所有的编辑信息。","options":{"A":"BMP","B":"JPG","C":"GIF","D":"PSD"},"answer":"D","explanation":"PSD 保存的是图层文件，用户后期可以对图像进行编辑和修改，其他图像格\n式的特点如下表所示：\n扩展名 特点\n.bmp Windows 自带画图软件，不适于网络传送，不适于提供印刷文件\n.gif\n256 索引色，无损压缩；用于屏幕显示图像和电脑动画，用于网络传送，\n不适于保存高质量印刷文件\n.jpg/.jpeg\n有损压缩，数据量小，真彩色；用于保存表现自然景观的图像；用于网络\n传送，不适于表现有明显边界的图形，不适用于高质量印刷文件\n.tif\n支持多平台，可采用多种压缩数据格式，平面设计作品的最佳表现形式，\n用于提供印刷文件，不适于网络传送\n.png\n新兴的网络图像格式，无损压缩，平台无关性，它汲取了 GIF 和 JPG 的优\n点，能把图像文件压缩到极限以利于网络传输，显示速度很快，只需下载\n1/64 的图像信息就可以显示出低分辨率的预览图像；支持透明图像的制作\n.psd Photoshop 图层文件\n.wmf Windows 剪贴画文件","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-11057","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"图像数据压缩的目的是（ ）。","options":{"A":"为符合 ISO 标准","B":"符合全国的电视制式","C":"减少数据信号利于传输","D":"为了图像编辑的方便"},"answer":"C","explanation":"图像压缩是数据压缩技术在数字图像上的应用，它的目的是减少图像数据中\n的冗余信息从而用更加高效的格式存储和传输数据。","subject":"数据库","source_chapter":"第四章 多媒体技术"},{"id":"zg-41354","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"Flash 制作动画过程中，如果把动画的每一帧都设置为关键帧，这种动画是（ ）。","options":{"A":"变形动画","B":"过程动画","C":"逐帧动画 D 运动动画"},"answer":"C","explanation":"逐帧动画是将时间轴的每一帧都设成关键帧，在每个关键帧上绘制不同的内\n容，使其连续播放而成动画。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-11837","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"下列软件中，不具备声音编辑的是（ ）。","options":{"A":"CoolEdit","B":"WaveEdit","C":"PowerPoint","D":"GoldWave"},"answer":"C","explanation":"CoolEdit 即 Adobe Audition 是美国 Adobe Systems 公司开发的一款功能强大、\n效果出色的多轨录音和音频处理软件；WaveEdit 一个音频处理程序，可以实现音频录制、快进、倒放、\n淡入、淡出、混音，回声是一个集声音编辑、播放、录制和转换的音频工具，体积小巧，功能却不弱。\n可打开的音频文件相当多，包括 WAV、OGG、VOC、IFF、AIF、AFC、AU、SND、MP3、MAT、DWD、\nSMP、VOX、SDS、AVI、MOV、APE 等音频文件格式；GoldWave 是数码录音及编辑软件，一个集声\n音编辑、播放、录制和转换的音频工具，体积小巧，无须安装，对硬件要求低，操作简单，速度快；而\nPowerPoint 是演示文稿软件，用于幻灯片的制作和播放，不能进行声音的编辑。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-8203","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"Flash 动画设计的基本功能不包括（ ）。","options":{"A":"遮罩","B":"补间动画","C":"绘画和编辑图形","D":"四维动画"},"answer":"D","explanation":"Flash 动画属于二维动画，其基本功能包括：绘画和编辑图形，设计逐帧动画\n和补间动画，其中补间动画包括：运动补间动画、形状补间动画、引导层动画和遮罩层动画。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-9778","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"下列哪种媒体可以模拟运动过程，突出事物的本质（ ）。","options":{"A":"图像","B":"音频","C":"动画","D":"图形"},"answer":"C","explanation":"动画就是利用人的视觉暂留，采用连续播放静止图像的方法产生景物运动的\n效果。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-79403","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"制作 Flash 动画时，按住组合键（ ），可以将图像打散。","options":{"A":"Ctrl+V","B":"Ctrl+B","C":"Ctrl+C","D":"Ctrl+X"},"answer":"B","explanation":"A 选项的功能是粘贴；C 选项的功能是复制；D 选项的功能是剪切。因此本\n题的答案是 B。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-73788","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"此为运动补间动画，当创建补间动画后，出现如图所示虚线的原因是（ ）。","options":{"A":"转换为元件","B":"分离","C":"组合","D":"打散"},"answer":"A","explanation":"虚线表示所做的补间动画是无效的，原因是按钮元件或是影片剪辑元件的时\n候才能做动作补间动画，这时需要选择转换为元件，选择“转换为”命令选择按钮元件或是影片剪辑，\n接下来就可以做补间动画了。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-43491","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"关于 Flash 软件，下列说法正确的是（ ）。","options":{"A":"应用 Flash 软件制作形状渐变动画时，须把相应的图形转换为“元件”","B":"要制作一个沿复杂路径运动的 Flash 动画，宜采用运动引导层动画技术","C":"Flash 制作动画时，时间轴上的 5、10、15……等表示的是时间，单位为秒","D":"Flash 动画中不能添加 MP3 音乐"},"answer":"B","explanation":"制作形状渐变动画时，对象是打散的图形；时间轴上的 5、10 和 15 代表的\n是帧；Flash 动画中既能添加音乐也可以添加视频。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-39857","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"下列文件可用 Cool Edit Pro 进行编辑的是（ ）。","options":{"A":"信息与信息的特征.ppt","B":"花好月圆.mp3","C":"Office.zip","D":"10 月月考成绩.xls."},"answer":"B","explanation":"Cool Edit Pro 软件是音频软件软件。A 选项是 PowerPoint 文件；B 选项是音\n频文件；C 选项是压缩文件；D 选项是 Excel 文件。","subject":"办公软件","source_chapter":"第四章 多媒体技术"},{"id":"zg-58568","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"张明外出考察归来，需要向学校提交一份考察报告，下列哪种工具软件最适合帮助张老师完成此\n项工作（ ）。","options":{"A":"CAD","B":"Word","C":"Photoshop","D":"FrontPage"},"answer":"B","explanation":"A 选项 CAD 是计算机制图软件，属于计算机辅助设计的应用；Word 是文字\n编辑处理软件，可以对文本就行录入和排版；Photoshop 是图像处理软件；FrontPage 是网页制作软件，\n故适合制作考察报告的是 Word。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-37798","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"下列都属于文本信息加工软件的一组的是（ ）。","options":{"A":"WPS/PHOTOSHOP","B":"PHOTOSHOP/EXCEL","C":"WORD/WPS","D":"IMAGEREADY/WORD"},"answer":"C","explanation":"Photoshop 软件属于图片处理软件；IMAGEREADY 也是图片处理软件，故\n只有 C 选项的两个软件是文本信息处理软件，选择 C 选项。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-60627","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"《满城尽带黄金甲》是一部古装武侠电影，这部电影不可能的存储格式是（ ）。","options":{"A":"qj.avi","B":"qj.rm","C":"qj.rmvb","D":"qj.jpg"},"answer":"D","explanation":"avi、rm、rmvb 是视频格式，能够存储电影；jpg 是图片格式，不能存储电影\n文件，故选择 D 选项。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-3867","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"显示器显示图像的清晰程度，主要取决于显示器的（ ）。","options":{"A":"对比度","B":"亮度","C":"尺寸","D":"分辨率"},"answer":"D","explanation":"对比度和亮度是描述图像色彩相关的参数；尺寸是指的显示器的屏幕的大小；\n分辨率是图像的一个重要属性，分辨率越大，图像就会越清晰。故本题答案是 D。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-5442","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"所谓媒体是指（ ）。","options":{"A":"表示和传播信息的载体","B":"各种信息的编码","C":"计算机输入与输出的信息","D":"计算机屏幕显示的信息"},"answer":"A","explanation":"媒体在计算机领域中主要有两种含义：一是指用以存储信息的实体，如磁带、\n磁盘、光盘等；二是指用以承载信息的载体，如数字、文字、声音、图形、图像、动画等。故本题答案\n是 A。","subject":"信息基础","source_chapter":"第四章 多媒体技术"},{"id":"zg-92983","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"小华收集了很多歌曲，存储在不同的设备或存储介质中，其中不属于数字化声音的是（ ）。","options":{"A":"存储在计算机中的歌曲","B":"存储在录音机磁带上的歌曲","C":"存储在 CD 光盘上的歌曲","D":"存储在 MP3 播放器中的歌曲"},"answer":"B","explanation":"数字化就是将许多复杂多变的信息转变为可以度量的数字、数据，再以这些\n数字、数据建立起适当的数字化模型，把它们转变为一系列二进制代码，引入计算机内部，进行统一处\n理，这就是数字化的基本过程。光盘是以光信息做为存储的载体并用来存储数据的一种物品。MP3 播放\n器其实就是一个功能特定的小型电脑。录音机，把声音记录下来以便重放的机器，它以硬磁性材料为载\n体，利用磁性材料的硬磁特性将声音信号记录在载体，一般都具有重放功能。家用录音机大多为盒式磁\n带录音机，因此录音机没有涉及数字化的过程。","subject":"计算机基础","source_chapter":"第四章 多媒体技术"},{"id":"zg-26914","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"对多媒体的特性判断时，以下（ ）属于多媒体的范畴。","options":{"A":"立体声音乐","B":"彩画画报","C":"文本文件","D":"有声图书"},"answer":"D","explanation":"多媒体是融合两种或者两种以上媒体的一种人机交互式信息交流和传播媒体。\n使用的媒体包括文字、图形、图像、声音、动画和视频等。A 选项只有声音；B 选项只有图画；C 选项\n只有文本。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-69452","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"以下（ ）不是常用的声音文件格式。","options":{"A":"JPEG 文件","B":"WAV 文件","C":"MIDI 文件","D":"VOC 文件"},"answer":"A","explanation":"WAV、MIDI、VOC 是声音文件格式；JPEG 是图像文件格式。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-28973","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"专门的图形图像设计软件是（ ）。","options":{"A":"HyperSnap-DX","B":"ACDSee","C":"WinZip","D":"Photoshop"},"answer":"D","explanation":"HyperSnap-DX 是截图软件；ACDSee 是看图片的软件，能够对图片做简单编\n辑；WinZip 属于压缩软件；Photoshop 是专门的图形图像处理软件。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-67393","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"在使用 Flash 软件制作动画过程中，小刘要绘制下面图形，最不适合的工具是（ ）。","options":{"A":"铅笔","B":"钢笔","C":"直线","D":"矩形"},"answer":"D","explanation":"矩形可绘制四边形，不可绘制曲线图形。而铅笔、钢笔和直线皆可绘制曲线\n图形。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-62904","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"下列设备中，多媒体计算机常用的图像处理设备不包括（ ）。","options":{"A":"数码照相机","B":"触摸屏","C":"扫描仪","D":"摄像机"},"answer":"B","explanation":"触摸屏作为一种最新的电脑输入设备，它是目前最简单、方便、自然的一种\n人机交互方式。不是图形图像处理设备。B 正确。数码照相机简称相机，是一种利用光学成像原理形成\n影像并使用底片记录影像的设备。扫描仪是利用光电技术和数字处理技术，以扫描方式将图形或图像信\n息转换为数字信号的装置。摄像机其工作的基本原理都是一样的：把光学图像信号转变为电信号，以便\n于存储或者传输。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-61329","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"小李在设计元件时，导入一张 gif 格式的位图，如下图所示，创建的动画类型是（ ）。","options":{"A":"逐帧动画","B":"形状补间动画","C":"遮罩动画","D":"动作补间动画"},"answer":"A","explanation":"A 选项逐帧动画是时间轴上的每一帧都是关键帧，并且每一帧绘制不同的内\n容；B 选项形状补间动画是某一个对象在一定时间内形状发生过渡渐变的动画，时间轴的背景颜色为淡\n绿色；C 遮罩动画是指至少有两个图层，一个为遮罩层，另一个为被遮罩层；D 选项运动补间动画是把\n对象从一个位置移动到另一个位置的变化，首尾帧间会有一个实线箭头，时间轴的背景颜色为蓝紫色。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-64963","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"下列可以把 WAVE 格式的音频文件转换为 MP3 格式的软件是（ ）。","options":{"A":"Photoshop","B":"GoldWave","C":"PowerPoint","D":"Excel"},"answer":"B","explanation":"Photoshop 是图像处理软件，GoldWave 是音频处理软件，能将 WAVE 格式的\n音频转换为 MP3 格式，PowerPoint、Excel 是办公软件。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-88228","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"多媒体技术的集成性是指（ ）。","options":{"A":"改变人们传统循序性的读写模式","B":"能够对信息进行多通道统一获取、存储、组织与合成","C":"当用户给出操作命令时，相应的多媒体信息都能够得到实时控制","D":"三者都不是"},"answer":"B","explanation":"多媒体技术就是计算机综合处理文本、图形图像、声音视频等媒体信息，使\n它们之间建立连接，从而集成一个具有良好交互功能的整体技术。多媒体技术主要有如下特征。数字化：\n多媒体技术的本质特征。集成性：能够对信息进行多通道统一获取、存储、组织与合成。所以选择 B。\n交互性：交互性是多媒体应用有别于传统信息交流媒体的主要特点之一。传统信息交流媒体只能单向地、\n被动地传播信息，而多媒体技术则可以实现人对信息的主动选择和控制。实时性：当用户给出操作命令\n时，相应的多媒体信息都能够得到实时控制。非线性：多媒体信息是以非线性（树形或网状）的方式呈\n现的。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-98894","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"一幅 1024×768 像素、24 位的彩色图片，经压缩为 JPG 格式文件，文件容量大小为 460KB，则\n该图像容量的压缩比大约是（ ）。","options":{"A":"5:1","B":"40:1","C":"50:1","D":"100:1"},"answer":"A","explanation":"1024*768*24/8/1024:460=5:1。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-97319","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"图像数据压缩的主要目的是（ ）。","options":{"A":"提高图像的清晰度","B":"提高图像的对比度","C":"使图像更逼真","D":"减少存储空间"},"answer":"D","explanation":"压缩就是去除掉信息中的冗余，即去除掉确定的或可推知的信息，而保留不\n确定的信息，也就是用一种更接近信息本质的描述来代替原有的冗余的描述。所以 D 正确。","subject":"数据库","source_chapter":"第四章 多媒体技术"},{"id":"zg-55872","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"衡量数据压缩性能（ ）。","options":{"A":"只要考虑实现压缩的算法是否简单","B":"只要考虑恢复原始效果","C":"既要考虑算法是否简单，又要考虑数据恢复效果","D":"只要考虑压缩比"},"answer":"C","explanation":"数据压缩技术有三个主要指标。\n一是压缩比要大；\n二是实现压缩的算法要简单，就是速度快；\n三是恢复效果要好，要尽可能地完全恢复原始数据。","subject":"算法与数据结构","source_chapter":"第四章 多媒体技术"},{"id":"zg-99378","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"多媒体计算机的主要特点是（ ）。","options":{"A":"较大的体积","B":"较强的联网功能和数据库能力","C":"大多数基于 Client/Server 模型","D":"较强的音视频处理能力"},"answer":"D","explanation":"多媒体系统具有强大的数据处理能力与数字化媒体整合能力，能处理文本、\n图形、图像、声音和视频等多种媒体信息，并提供多种媒体信息的输入、编辑、存储和播放等功能的综\n合系统。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-21941","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"用计算机制作多媒体作品所使用的素材都必须（ ）。","options":{"A":"进行压缩","B":"刻录成光盘","C":"经过数字化处理","D":"集成声音和图像信息"},"answer":"C","explanation":"多媒体系统加工的信息都是数字化的信息，所以在计算机制作多媒体作品时\n用到的素材必须经过数字化处理。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-33309","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"下列不能作为电子板报作品评价参考标准的是（ ）。","options":{"A":"主题是否明确","B":"结构设计是否合理","C":"作品是否原创","D":"制作工具是否先进"},"answer":"D","explanation":"鉴赏和评价多媒体作品时可以从以下几个方面：思想性、创造性、艺术性、\n技术性、科学性、整体效果。其中技术性强调选用制作工具和制作技巧恰当而不是说先进的工具就可以\n做出好的作品。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-19882","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"某未经压缩 BMP 图像文件的参数如下图所示：\n则下列叙述正确的是（ ）。","options":{"A":"图像的分辨率为每英寸 800×600 像素","B":"该图像文件包含 24 帧的图像序列","C":"图像的尺寸大小为 71×71 像素","D":"存储每个像素大约需要 3 个字节"},"answer":"D","explanation":"图像的分辨率为 71×71，图像的大小为 800×600，该图像包含 1 帧的图像\n序列，存储的像素为 24/8=3 字节。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-35368","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"小李要将运动员的照片合成到校运会的视频中，他可以选择的软件是（ ）。","options":{"A":"写字板","B":"Access","C":"绘声绘影","D":"GoldWave"},"answer":"C","explanation":"会声会影是视频处理软件。“写字板”是指一个 Windows 自带的附件，写字\n板具有 Word 的最初形态，有格式控制等等，而且保存的的文件格式默认是.rtf，是 Word 的雏形。Access\n是由微软发布的关系数据库管理系统。GoldWave 是音频处理软件。\n37. 【 答 案 】 B 。 解 析 ： 图 像 数 据 量 ＝ 图 像 的 总 像 素 × 图 像 深 度 /8 （ Byte ） =1024 × 768 ×\n24/8/1024/1024=2.25MB，640MB÷2.25=284。","subject":"计算机基础","source_chapter":"第四章 多媒体技术"},{"id":"zg-87526","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"一幅 320*240 的真色彩图像，未压缩的图像数据量是（ ）。","options":{"A":"225KB","B":"230.4KB","C":"900KB","D":"921.6KB"},"answer":"A","explanation":"图像的总像素＝水平方向像素数×垂直方向像素数，图像数据量＝图像的总\n像素×图像深度/8（Byte）。真色彩图像深度为 24，未压缩的数据量=320×240×24/8/1024=225KB。","subject":"计算机基础","source_chapter":"第四章 多媒体技术"},{"id":"zg-83892","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"从人的视觉系统看，以下不属于色彩三要素的是（ ）。","options":{"A":"色相","B":"饱和度","C":"灰度","D":"亮度"},"answer":"C","explanation":"色彩三要素：色相、饱和度、亮度。\n参数 特征\n色相 即色彩的相貌和特征。如：红、橙、黄、绿、青、蓝、紫等颜色的种类变化。\n明度 指色彩的亮度或明度。\n纯度\n指色彩的鲜艳程度，也叫饱和度。原色是纯度最高的色彩。颜色混合的次数越多，纯\n度越低，反之，纯度则高。","subject":"编程语言","source_chapter":"第四章 多媒体技术"},{"id":"zg-85467","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"有 3 个数据文件未压缩时数据量分别为 128KB、256KB 和 512KB，用 WINRAR 压缩后得到一个\n压缩文件的数据量为 128KB，则该压缩方法和压缩比分别为（ ）。","options":{"A":"有损压缩，压缩比为 7:1","B":"有损压缩，压缩比为 4:1","C":"无损压缩，压缩比为 7:1","D":"无损压缩，压缩比为 4:1"},"answer":"C","explanation":"WINRAR 压缩属于无损压缩，未压缩时总的数据量为：\n128KB+256KB+512KB=896KB，896:128=7:1。","subject":"计算机基础","source_chapter":"第四章 多媒体技术"},{"id":"zg-81833","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"在 Photoshop 中，当图像偏蓝时，使用“调整”菜单下的“变化…”命令给图像增加（ ）可\n以改善色偏。","options":{"A":"蓝色","B":"绿色","C":"黄色","D":"洋红"},"answer":"C","explanation":"蓝色对比色是橙色在 Photoshop 中，当图像偏蓝时，使用“调整”菜单下的\n“变化…”命令给图像增加黄色即可。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-51536","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"下列数字视频质量最好的是（ ）。","options":{"A":"160×120 分辨率、24 位颜色、15 帧/秒的帧率","B":"352×240 分辨率、30 位颜色、30 帧/秒的帧率","C":"352×240 分辨率、30 位颜色、25 帧/秒的帧率","D":"640×480 分辨率、16 位颜色、15 帧/秒的帧率"},"answer":"B","explanation":"根据公式数据量（位/秒）=（画面尺寸*彩色位数（bit）*帧数），数据量*时\n间/8＝文件总字节。分辨率越高，颜色位数越多，帧率越快，视频质量越好。","subject":"计算机基础","source_chapter":"第四章 多媒体技术"},{"id":"zg-47902","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"如要选择图像的某一区域，下列 Photoshop 中的（ ）操作能够实现。\n①选择框工具 ②魔术棒 ③套索工具 ④钢笔工具","options":{"A":"②④","B":"①②③","C":"①③","D":"全部"},"answer":"D","explanation":"以上①②③④都是常见的建立选区的工具，也就是说都能够选择某一区域。\n所以选择 D。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-49477","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"目前多媒体计算机中对动态图像数据压缩常采用（ ）。","options":{"A":"JPEG","B":"GIF","C":"MPEG","D":"BMP"},"answer":"C","explanation":"MPEG 是多媒体计算机中对动态图像数据压缩常采用的压缩方式。C 正确。\nJPEG（Joint Photographic Experts Group）又称为联合摄像专家组。JPEG 是 1986 年制定的主要针对静止\n图像的第一个图像压缩国标标准。GIF、BMP 是常见的图形图像文件格式。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-48948","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"信息技术课上，张杰同学指出任何格式的图像都是静止的，李杰反驳道“其实也有动态的图像”，\n李杰所指图像的文件格式是（ ）。","options":{"A":"png 格式","B":"jpg 格式","C":"gif 格式","D":"bmp 格式"},"answer":"C","explanation":"GIF，256 索引色，无损压缩；用于网络传送选项，用于屏幕显示图像，GIF\n格式可以存多幅彩色图像，如果把存于一个文件中的多幅图像数据逐幅读出并显示到屏幕上，就可构成\n一种最简单的动画。png 格式、jpg 格式、bmp 格式都是静态的。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-82879","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"想把下图作成效果图中的铅笔画的效果，最易实现的操作是（ ）。\n原图 效果图","options":{"A":"使用 Photoshop 的图层样式","B":"使用 Photoshop 的滤镜效果","C":"使用 Photoshop 的铅笔工具","D":"使用 Photoshop 的油漆桶工具"},"answer":"B","explanation":"图层样式是 Photoshop 的特色功能之一，利用该功能可以制作很多图层特效，\n比如阴影、发光、浮雕等。想要将图片制作成铅笔画效果，最方便的方法是使用滤镜库中的彩色铅笔滤\n镜。铅笔工具制作起来比较复杂，而油漆桶工具则是用来填充封闭区域颜色的，不能用来制作此效果。\n故答案选 B。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-13487","source":"中公","type":"单选","chapter":"第四章 多媒体技术","stem":"如图所示，所画的蜗牛图像中没有进行羽化处理的是哪一个（ ）。\n图 1 图 2 图 3 图 4","options":{"A":"图 1","B":"图 2","C":"图 3","D":"图 4"},"answer":"B","explanation":"对图像进行羽化处理后，图像会有模糊的效果，图中没有模糊效果的是图 2，\n故答案选 B。","subject":"其他","source_chapter":"第四章 多媒体技术"},{"id":"zg-91153","source":"中公","type":"多选","chapter":"第四章 多媒体技术","stem":"下列关于逐帧动画的说法正确是（ ）。","options":{"A":"逐帧动画是把一系列的图形或文字放置在一系列关键帧中形成的动画","B":"逐帧动画制作比较简单和省时\nC 逐帧动画最大的特点是动画的每一个帧都是关键帧","D":"逐帧动画对动画中图形、对象的控制功能是最强大最有效的"},"answer":"ACD","explanation":"逐帧动画是在时间轴的每一帧都设成关键帧，每个关键帧上绘制不同的内\n容，使其连续播放而成动画。逐帧动画的优点：具有非常大的灵活性，几乎可以表现任何想表现的内容，\n而它类似与电影的播放模式，很适合于表演细腻的动画。例如：人物或动物急剧转身、头发及衣服的飘\n动、走路、说话以及精致的 3D 效果等等。逐帧动画的缺点：动画制作的负担重，文件大。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-64097","source":"中公","type":"多选","chapter":"第四章 多媒体技术","stem":"下列选项中属于多媒体计算机应用实例的有（ ）。","options":{"A":"资料检索和多媒体教学","B":"辅助制造与系统仿真","C":"交互式电视与视频点播","D":"远程医疗与视频会议"},"answer":"ACD","explanation":"多媒体计算机技术应用是当今信息技术领域发展最快、最活跃的技术，即\n多媒体技术融计算机、声音、文本、图像、动画、视频和通信等多种功能于一体，常见的有资料检索和\n多媒体教学、交互式电视与视频点播、远程医疗与视频会议。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-89094","source":"中公","type":"多选","chapter":"第四章 多媒体技术","stem":"下列说法中，正确的有（ ）。","options":{"A":"WAV 文件保真度高，适用于音频原始素材的保存","B":"MP3 的数据量较小，携带方便，易于传输，适用性较强","C":"Real Media 格式音质不太好，不适于编辑，支持的处理器软件不多","D":"Windows Media 格式文件必须在 Windows 平台下才能使用"},"answer":"ABD","explanation":"WAV 是波形声音文件，文件保真度高。MP3 采用感官编码技术，数据量\n较小，携带方便，易于传输，适用性较强。Real Media 是网络流媒体，能够提供足够好的音质。Windows\nMedia 也是一种网络流媒体技术，本质上跟 Real Media 是相同的，但是必须在 Windows 平台下才能使\n用。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-85460","source":"中公","type":"多选","chapter":"第四章 多媒体技术","stem":"下列媒体中，不属于视觉媒体的是（ ）。","options":{"A":"幻灯片","B":"录音机","C":"CD 机","D":"投影仪"},"answer":"BC","explanation":"A 选项，亦称演示文稿、简报，是一种由文字、图片等，制作出来加上一些\n特效动态显示效果的可播放文件。B 选项，录音机，把声音记录下来以便重放的机器，它以硬磁性材料\n为载体，利用磁性材料的硬磁特性将声音信号记录在载体，一般都具有重放功能。C 选项 CD 机就是我\n们在日常生活中常说的 CD 播放器，它是一种用微电脑控制的智能化高保真立体声音响设备。D 选项，\n又称投影机，是一种可以将图像或视频投射到幕布上的设备，可以通过不同的接口同计算机、VCD、\nDVD、BD、游戏机、DV 等相连接播放相应的视频信号。","subject":"数据库","source_chapter":"第四章 多媒体技术"},{"id":"zg-55163","source":"中公","type":"多选","chapter":"第四章 多媒体技术","stem":"在 Windows 画图软件中直接将打开的 BMP 图像另存为 JPG 图像，发现后者占用的存储空间明显\n小于前者，下列说法正确的是（ ）。","options":{"A":"这个另存为的过程其实质是图片压缩","B":"原图中可能存在空间冗杂","C":"原图中可能存在时间冗杂","D":"BMP 图像的存储空间大小与内容无关"},"answer":"AB","explanation":"作为图像资源使用的文件，BMP 一般是不压缩的，JPG 是比较常用的一种\n有损压缩图像。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-31807","source":"中公","type":"判断","chapter":"第四章 多媒体技术","stem":"矢量图可以任意放大不失真，可用 Windows 系统自带画图软件编辑。（ ）","options":{},"answer":"错误","explanation":"Windows 系统自带画图软件是位图，位图放大会失真。","subject":"计算机基础","source_chapter":"第四章 多媒体技术"},{"id":"zg-35441","source":"中公","type":"判断","chapter":"第四章 多媒体技术","stem":"Flash 中，元件可以在动画中反复使用，但是需要注意的是，随着调用次数的增加，文件占用空间\n也会增大。（ ）","options":{},"answer":"正确","explanation":"相对于每次调用原图片的动画文件来说，使用元件使得动画制作更为简单，\n动画文件尺寸会减小，播放速度显著提高。但是随着对元件调用次数的增加，文件本身也会增大。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-17750","source":"中公","type":"判断","chapter":"第四章 多媒体技术","stem":"Photoshop 中，RGB 的颜色模式是“红”、“黄”、“蓝”三种颜色。（ ）","options":{},"answer":"错误","explanation":"R：Red（红色）；G：Green（绿色）；B：Blue（蓝色）。这三种色光是自然\n界中所有颜色存在的基础，通常称为三原色或三基色。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-87453","source":"中公","type":"判断","chapter":"第四章 多媒体技术","stem":"在 Photoshop 中，羽化命令是使选区边缘柔和及平滑，将图像边缘柔和的过渡到图像背景颜色中。\n（ ）","options":{},"answer":"正确","explanation":"羽化的取值范围为 0-255 像素，数值越大，像素化的过渡边界越宽，柔化\n效果也就越明显。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-67797","source":"中公","type":"判断","chapter":"第四章 多媒体技术","stem":"矢量图形和位置图形相比，其色彩丰富，最接近自然色。（ ）","options":{},"answer":"错误","explanation":"位图能够能较好表现色彩浓度与层次，放大会失真；矢量图可展现清楚线\n条或文字，放大不会失真。","subject":"多媒体","source_chapter":"第四章 多媒体技术"},{"id":"zg-98130","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"计算机网络功能有很多种，其中（ ）功能是计算机网络实现其他功能的基础。","options":{"A":"实现分布式处理","B":"提高系统可靠性","C":"数据通信","D":"资源共享"},"answer":"C","explanation":"计算机网络功能的三大功能是数据通信、资源共享、分布处理。除了这三大\n功能外，网络还具有快速传输信息和提高系统可靠性的功能。A 选项，分布式处理：在网络操作系统的\n控制下，网络中的计算机可以协同工作，完成仅靠单机无法完成的大型任务，即一项复杂的任务可以划\n分成许多部分，由网络内各计算机分别完成有关部分，从而大大增强了整个系统的性能。B 选项，系统\n的可靠性是指系统在规定的条件下和规定的时间内完成规定功能的能力。C 选项，数据通信：计算机网\n络上的每台计算机都可以进行信息交换。可以利用网络收发电子邮件、发布信息、电子商务、远程教育\n等。利用这一特点，可实现将分散在各个地区的单位或部门用计算机网络联系起来，进行统一的调配、\n控制和管理，是网络中不同计算机之间进行资源共享和分布式处理的基础，是计算机网络的基本功能。\nD 选项，资源共享：资源包括计算机的软件、硬件和数据。网络中各地资源互相通用，网络上各用户不\n受地理位置的限制，在自己的位置上可以部分或全部使用网络上的资源。","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"zg-96555","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"下列对于主干网的描述，不正确的有（ ）。","options":{"A":"主干网是一种大型的传输网络，它用于连接小型传输网络，并传送数据","B":"主干网是构建企业网的一个重要的体系结构元素","C":"通常情况下，主干网的容量小于与之相连的网络的容量","D":"主干网有两种类型，一种是分布式主干网，另一种是紧缩主干网"},"answer":"C","explanation":"主干网是一种大型的传输网路，它用于连接小型传输网络，并传送数据。主\n干网是构建企业网的一个重要的体系结构元素。它为不同局域网或子网间的信息交换提供了路径。主干\n网可将同一座建筑物、校园环境中的不同建筑物或不同网络连接在一起。通常情况下，主干网的容量要\n大于与之相连的网络的容量。主干网有两种类型:一种是分布式主干网，它贯穿于建筑物或校园，为局域\n网提供连接点；另一种是紧缩主干网，它以网络集线器和交换机的形式存在。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-56636","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"网上共享的资源有（ ）。","options":{"A":"硬件、软件和数据","B":"软件、数据和信道","C":"通信子网、资源子网和信道","D":"硬件、软件和服务"},"answer":"A","explanation":"计算机网络的功能中的资源共享是指：硬件、软件和数据资源均可以进行共\n享。通信子网和资源子网属于网络；信道属于物理通路或逻辑通路；服务指在电脑中，需要各种服务以\n支持各种功能，也可以手动开启或关闭某些服务以达到管理相应的功能的目的。因此排除 BCD 选项","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"zg-98614","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"宇宙飞船在执行飞行任务的过程中，需要发射、测控等部门的计算机互相协作，共同完成数据处\n理任务，这主要体现的网络功能是（ ）。","options":{"A":"分布处理","B":"资源共享","C":"数据通信","D":"文件传输"},"answer":"A","explanation":"解析：A 选项，分布式处理，在网络操作系统的控制下，网络中的计算机可\n以协同工作，完成仅靠单机无法完成的大型任务，即一项复杂的任务可以划分成许多部分，由网络内各\n计算机分别完成有关部分，从而大大增强了整个系统的性能。\nB 选项，资源共享：资源包括计算机的软件、硬件和数据。网络中各地资源互相通用，网络上各用\n户不受地理位置的限制，在自己的位置上可以部分或全部使用网络上的资源。\nC 选项，数据通信：计算机网络上的每台计算机都可以进行信息交换。可以利用网络收发电子邮件、\n发布信息、电子商务、远程教育及远程医疗等。\nD 选项，文件传输是指将一个文件或其中的一部分从一个计算机系统传到另一个计算机系统。\n本题题意为宇宙飞船发射，是一个大任务，需要很多台计算机协作共同完成，符合分布处理的概念","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"zg-22705","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"下列属于无线传输介质的是（ ）。","options":{"A":"双绞线","B":"光纤","C":"红外线","D":"同轴电缆"},"answer":"C","explanation":"常用的传输介质分为有线介质和无线介质两种。无线介质有：无线电波、红\n外线、微波、激光、蓝牙等。有线介质有：双绞线、同轴电缆、光纤等。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-32545","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"光纤通信的优点不包括（ ）。","options":{"A":"传输损耗大","B":"抗干扰性能好","C":"保密性好","D":"体积小、重量轻"},"answer":"A","explanation":"光纤通信的优点：频带宽、损耗低、体积小重量轻、抗干扰能力强、保密性\n好、保真度高、工作性能可靠、成本不断下降等。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-20646","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"以太网卡物理地址长度是（ ）位。","options":{"A":"32","B":"48","C":"64","D":"128"},"answer":"B","explanation":"以太网卡的物理地址，又称 MAC 地址，长度为 48 位，前 24 位是由 IEEE 的\n注册管理机构给不同厂家分配的代码，后 24 位由厂家自己分配。","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"zg-34604","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"（ ）是一种信号转换装置，它可以将计算机中传输的数字信号转换成通信线路中传输的模拟\n信号。","options":{"A":"网桥","B":"集线器","C":"路由器","D":"调制解调器"},"answer":"D","explanation":"调制解调器（MODEM），集合了调制与解调的功能设备，使数据在数字信号\n和模拟信号之间转换。所谓调制，是把数字信号转换成电话线上传输的模拟信息；所谓解调，即把模拟\n信号转换成数字信号。A 选项，网桥用来连接两个或多个网段的网络互连设备，根据物理地址来过滤、\n存储和转发数据帧。工作在数据链路层。B 选项，集线器英文为 HUB，又称为多端口中继器，可连接多\n台计算机，工作在物理层，是局域网的星型连接点。C 选项，路由器在网络中多条路径中寻找出一条最\n佳的网络路径用于数据转发。主要用于连接局域网和广域网。工作在网络层。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-86715","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"按地理范围大小划分，学校计算机教室的网络，属于（ ）。","options":{"A":"LAN","B":"MAN","C":"WAN","D":"WLAN"},"answer":"A","explanation":"按地理范围大小，将网络主要分为局域网 LAN，城域网 MAN，广域网 WAN。\n（1）局域网（LAN）：又称局部网，一般在几千米的范围内，以一个单位或一个部门的小范围为限（如\n一个学校、一个建筑物内），由这些单位或部门单独组建。（2）城域网（MAN）：又称远程网，是远距\n离、大范围的计算机网络。城域网一般覆盖一个城市或地区，地理范围在几十千米的范围内。（3）广域\n网（WAN）：广域网的覆盖范围很广，如可以是一个洲、一个国家，甚至全世界。广域网一般由多个国\n家或多个部门联合组建，能实现大范围内的资源共享。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-88290","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"若要将计算机与局域网连接，则至少需要的硬件是（ ）。","options":{"A":"集线器","B":"网关","C":"网卡","D":"路由器"},"answer":"C","explanation":"集线器的主要功能是对接收到的信号进行再生、整形、放大，以扩大网络的\n传输距离，同时把所有节点集中在以它为中心的节点上；网关就是一个网络连接到另一个网络的“关口”，\n是一种充当转换重任的计算机的设备；计算机与外界局域网的连接是通过主机箱内插入的一块网络接口\n板，网络接口板又称为网络适配器，又称为网卡，是终端接入计算机网络必不可少的设备；路由器是连\n接因特网中各局域网、广域网的设备。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-84656","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"网络层的 PDU 是（ ）。","options":{"A":"位","B":"字节","C":"帧","D":"分组"},"answer":"D","explanation":"PDU 是协议数据单元的缩写，网络层的数据单元是数据包或分组；位是信息\n的最小单位，用 b 来表示，英文全称 bit；字节是基本的存储单位，用大写字母 B 表示，英文全称 Byte；\n帧是数据链路层的传输单位。","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"zg-86231","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"OSI 七层参考模型中，位于会话层的上层是（ ）。","options":{"A":"网络层","B":"应用层","C":"传输层","D":"表示层"},"answer":"D","explanation":"OSI 的七层结构从下到上分别是物理层、数据链路层、网络层、传输层、会\n话层、表示层、应用层，因此位于会话层的上层是表示层。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-891","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"为了解决不同网络之间的通信问题，国际标准组织提出了开放系统互联参考模型，简称：（ ）。","options":{"A":"OSI 层次模型","B":"IOS 层次模型","C":"ISO 层次模型","D":"SOI 层次模型"},"answer":"A","explanation":"开放式通信系统互联参考模型，简称 OSI 参考模型，它将整个网络通信的功\n能划分成了 7 个层次，它们从低到高分别是物理层、数据链路层、网络层、传输层、会话层、表示层和\n应用层，它是由 ISO 国际标准化组织提出的，目的是为了使不同厂家的网络产品实现互联和通信，特点\n是开放性。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-48666","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"在 TCP/IP 协议体系中将网络结构自上而下划分为四层：①应用层，②传输层，③网际层，④网\n络接口层，工作时（ ）。","options":{"A":"接收方从下层向上层传输数据，每经过一层去掉协议控制信息","B":"发送方从上层向下层传输数据，每经过一层去掉协议控制信息","C":"接收方从下层向上层传输数据，每经过一层附加协议控制信息","D":"发送方从下层向上层传输数据，每经过一层附加协议控制信息"},"answer":"A","explanation":"在网络结构中，发送方由上至下，每经过一层增加协议控制信息；接收方由\n下至上，每经过一层去掉协议控制信息。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-50241","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"在 TCP/IP 参考模型中，TCP 协议工作在（ ）。","options":{"A":"应用层","B":"传输层","C":"互联层","D":"主机-网络层"},"answer":"B","explanation":"TCP 是传输控制协议，工作在传输层。主要特点是提供面向连接的，可靠的\n数据传输。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-48184","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"加入 Internet 网，必须安装的网络通讯协议是（ ）。","options":{"A":"SPX/IPX","B":"ATM","C":"TCP/IP","D":"NetBEUI"},"answer":"C","explanation":"SPX/IPX：（网际包交换/序列包交换）协议，主要应用于基于 NetWare 操作\n系统的 Novell 局域网中；ATM 是异步传输模式的缩写，是以信元为基础的一种分组交换和复用技术。\n它是一种为了多种业务设计的通用的面向连接的传输模式，适用于局域网和广域网。TCP/IP（传输控制\n协议/网际协议）是一种网络通信协议，它规范了网络上的所有通信设备，尤其是一个主机与另一个主机\n之间的数据往来格式以及传送方式，是当前国际互联网广泛采用的协议标准；NetBEUI 协议：主要用于\n本地局域网中，一般不能与其他网络的计算机进行沟通。\nTCP/IP：传输控制协议/互联网络协议，作为互联网的基础协议。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-16310","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"计算机局域网络拓扑结构中，（ ）的特点是具有一个控制中心，采用集中点到点的链路与中\n心站相连。","options":{"A":"网状型结构","B":"总线型结构","C":"环型结构","D":"星型结构"},"answer":"D","explanation":"A 选项可靠性较高，每台计算机之间均有连接，任一节点至少有两条通信线\n路与其他节点相连。\nB 选项总线结构中，所有的节点都通过相应的硬件接口连接到一根中心传输线上，这根中心传输线\n被称为总线；\nC 选项计算机连接到封闭的环上，任何一台计算机出现故障，全网瘫痪；\nD 选项星型拓扑结构的特点是结构简单，易维护，网络中的各节点通过点到点的方式连接到一个中\n央节点（又称中央转接站，一般是集线器或交换机）上，由该中央节点向目的节点传送信息。在星型网\n中任何两个节点要进行通信都必须经过中央节点控制。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-82115","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"下列不属于计算机网络协议的是（ ）。","options":{"A":"NetBEUI","B":"TCP/IP","C":"IPX/SPX","D":"Windows NT"},"answer":"D","explanation":"常用的网络协议有：TCP/IP 协议毫无疑问是这三大协议中最重要的一个，作\n为互联网的基础协议。NetBEUI 即 NetBios Enhanced User Interface，或 NetBios 增强用户接口。它是\nNetBIOS 协议的增强版本，曾被许多操作系统采用，例如 Windows for Workgroup、Win 9x 系列、Windows\nNT 等。IPX/SPX 协议本来就是 Novell 开发的专用于 NetWare 网络中的协议，大部分可以联机的游戏都\n支持 IPX/SPX 协议，比如星际争霸，反恐精英等等。Windows NT 是操作系统的名称，不属于网络协议。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-14251","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"网络协议主要要素为（ ）。","options":{"A":"数据格式、编码、信号电平","B":"数据格式、控制信息、速度匹配","C":"语法、语义、时序","D":"编码、控制信息、时序"},"answer":"C","explanation":"网络中数据交换的规则、标准或约定称为网络协议。网络协议的三要素：语\n法、语义和时序。语法：确定通信双方“如何讲”，定义了数据格式、编码和信号电平等。语义：确定\n通信双方“讲什么”，定义了用于协调同步和差错处理等控制信息。时序：确定通信双方“讲话的次序”，\n定义了速度匹配和排序等。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-84174","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"下列（ ）是超文本传输协议。","options":{"A":"FTP","B":"HTTP","C":"TELNET","D":"UDP"},"answer":"B","explanation":"FTP 是文件传输协议，是因特网上的重要服务之一，是 TCP/IP 协议中的一\n种，使用 TCP 协议，FTP 一般采用 C/S 工作模式；HTTP 是超文本传输协议，也是 TCP/IP 协议中的一\n种，使用 TCP 协议，故本题 B 选项为正确答案；TELNET 是指本地计算机通过 Internet 访问远程计算机\n上的硬件资源、软件资源和信息资源的过程；UDP 是用户数据报协议，是 OSI（Open System Interconnection，\n开放式系统互联）参考模型中一种无连接的传输层协议，提供面向事务的简单不可靠信息传送服务，在\n网络中它与 TCP 协议一样用于处理数据包。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-14471","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"TCP/IP 协议参考模型的四个层中，越往上的相关协议越接近用户，其中 SMTP 的协议应该属于\n（ ）。","options":{"A":"物理层","B":"网络层","C":"传输层","D":"应用层"},"answer":"D","explanation":"SMTP 是简单邮件传输协议，位于 TCP/IP 的应用层，主要负责邮件的发送。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-18105","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"IPv4 中，IP 地址可分为两部分，分别为（ ）地址。","options":{"A":"网络和子网","B":"国名和域名","C":"网络和主机","D":"主机名和商标"},"answer":"C","explanation":"可以将 IP 地址划分为若干个固定的类，每一类地址都由两个固定长度的字段\n组成，其中第一个字段是网络号，第二个字段是主机号。网络号确定了该主机所在的物理网络，主机号\n确定了在某一物理地址上的一台主机。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-16530","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"在 IE 浏览器的地址栏中填入（ ）肯定是无效的。","options":{"A":"192.168.0.102","B":"202.36.78.9","C":"http://www.sjtu.sh.cn","D":"202.278.104.101"},"answer":"D","explanation":"IE 地址可以填入的内容包括域名或 IP 地址。IP 地址一般用“点分十进制”\n表示，共有 4 个十进制数，每个数的范围为 0~255。选项 C 是域名地址；选项 D 中第二个字节的数值超\n过了 255，属于非法 IP 地址。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-20164","source":"中公","type":"单选","chapter":"第五章 计算机网络","stem":"在 Internet 中的 IP 地址由（ ）位二进制数组成。","options":{"A":"8","B":"16","C":"32","D":"64"},"answer":"C","explanation":"IPv4 中由 32 位二进制数组成，IPv6 中由 128 位二进制数组成。当没有给出\n说明时，默认是 IPv4。","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"zg-88111","source":"中公","type":"多选","chapter":"第五章 计算机网络","stem":"光纤通信的优点包括（ ）。","options":{"A":"传输损耗小","B":"抗干扰性能好","C":"保密性好","D":"体积小、重量轻"},"answer":"ABCD","explanation":"光纤通信的优点：频带宽、损耗低、体积小重量轻、抗干扰能力强、保\n密性好、保真度高、工作性能可靠、成本不断下降等。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-10314","source":"中公","type":"多选","chapter":"第五章 计算机网络","stem":"下列属于网络传输介质的有（ ）。","options":{"A":"无线电波","B":"集成线路","C":"同轴电缆","D":"光纤"},"answer":"ACD","explanation":"常见的有线网络传输介质有同轴电缆、光纤、双绞线；常见的无线网络传\n输介质有无线电波、红外线、蓝牙、微波和激光；集成线路是一种微型电子器件或部件，不符合题意。\n所以选择 ACD。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-55755","source":"中公","type":"多选","chapter":"第五章 计算机网络","stem":"下列关于 HTML 语言的描述中，正确的有（ ）","options":{"A":"HTML 文档本身就是文本格式的文件","B":"HTML 语言中不同的标记表示的意义和作用不同","C":"可以直接用 HTML 语言编制网页","D":"FrontPage 是制作网页的软件，它和 HTML 无关"},"answer":"ABC","explanation":"D 选项中“FrontPage 是制作网页的软件”这句话正确，它和“HTML 无关”\n这句话不正确，网页文件就是 HTML 语言编写的，所以 FrontPage 不可能和 HTML 无关。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-42670","source":"中公","type":"多选","chapter":"第五章 计算机网络","stem":"下列关于网络协议的叙述正确的是（ ）。","options":{"A":"网络协议是计算机网络中通信双方必须共同遵守的约定与规则","B":"网络协议属于计算机网络软件系统","C":"网络协议主要由语义、语法、语句三要素构成","D":"TCP/IP 互联网协议是上网必备的协议，在 Internet 上广泛应用"},"answer":"ABD","explanation":"网络中数据交换的规则、标准或约定称为网络协议。从本质上讲，网络协\n议也是一种程序，运行在计算机或网络设备上，以实现相应的功能。TCP/IP 协议是（传输控制协议/网\n间协议）是 Internet 最基本的协议、Internet 国际互联网络的基础，由网络层的 IP 协议和传输层的 TCP\n协议组成。网络协议的三要素：语法、语义和时序。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-44678","source":"中公","type":"判断","chapter":"第五章 计算机网络","stem":"集线器（HUB）是一种共享介质的网络设备，它的作用可以简单的理解为将一些机器连接起来组\n成一个局域网，HUB 本身可以识别目的地址。（ ）","options":{},"answer":"错误","explanation":"集线器工作在 OSI 参考模型的物理层，它的作用是可以用来连接多台计算\n机组成一个局域网。但是 HUB 本身不能识别目的地址，交换机才可以识别目的地址。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-41044","source":"中公","type":"判断","chapter":"第五章 计算机网络","stem":"数据链路层的传输单位是帧，封装时增加了帧头和帧尾。（ ）","options":{},"answer":"正确","explanation":"数据链路层的功能之一就是封装成帧，封装成帧也就是帧的定界，是在一\n段数据的前后分别添加首部和尾部，然后就构成了一个帧。告知接收方帧的开始位置和结束位置，确定\n帧中数据的位置。在封装成帧时，不考虑帧的长短等问题。","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"zg-42619","source":"中公","type":"判断","chapter":"第五章 计算机网络","stem":"不使用面向连接传输服务的应用层协议是 SNMP。（ ）","options":{},"answer":"正确","explanation":"SNMP 即简单网络管理协议，仅仅用于网络管理，可靠性需求较低。所以\n使用的是面向无连接的 UDP 协议。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-44503","source":"中公","type":"判断","chapter":"第五章 计算机网络","stem":"222.263.133.12 是个有效的 IP 地址。（ ）","options":{},"answer":"错误","explanation":"合法的 IP 地址需要满足以下三点。（1）由四个字节组成；（2）每个字节在\n0~255 之间；（3）用英文圆点分隔。263>255，所以这个 IP 地址是不合法的。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-97062","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"万维网使用协议________。","options":{},"answer":"超文本传输协议或 Http","explanation":"超文本传输协议或 Http。解析：万维网：World Wide Web（WWW），通常由三部分组成：\n浏览器（Browser）、Web 服务器（Web Server）和超文本传送协议（HTTP Protocol）。浏览器向 Web 服\n务器发出请求，Web 服务器向浏览器返回其所需的万维网文档，然后浏览器解释该文档并按照一定的格\n式将其显示在屏幕上。浏览器与 Web 服务器使用 HTTP 协议进行互相通信。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-1363","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"在中国物联网校企联盟的“科技融合体”模型中，“三网融合”是当下科技和标准逐渐融合的一个\n典型表现形式，“三网融合”意指________、有线电视网络和________的互相渗透、互相兼容，并逐步\n整合为全世界同意的信息通信网络。","options":{},"answer":"电信网、计算机网络","explanation":"电信网、计算机网络。解析：三网融合是指电信网、广播电视网、互联网在演进过程中，\n三大网络通过技术改造，其技术功能趋于一致，业务范围趋于相同，网络互联互通、资源共享，能为用\n户提供语音、数据和广播电视等多种服务。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-4997","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"小明搬进新家后电脑不能上网，他需要先在________处开通上网服务，并准备一些网络设备，搭\n建网络结构。如图所示，请填出对应网络设备名称①是________，②是________。","options":{},"answer":"网络服务提供商、调制解调器、无线路由器","explanation":"网络服务提供商、调制解调器、无线路由器。解析：网络服务提供商，简称 ISP，指的\n是面向公众提供接入服务的经营者，帮助用户接入 Internet，所以小明若想开通上网，必须在网络服务\n提供商处开通上网服务。电脑利用电话线上网必不可少的设备是调制解调器。连接局域网（LAN）和广\n域网（WAN）的网络设备是路由器。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-3422","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"现代化家庭大都拥有一台以上计算机、智能手机、智能电视等设备，这些设备都连接到无线路由\n器上，该家庭的网络拓朴结构属于________。","options":{},"answer":"星型","explanation":"星型。解析：星型结构以中央结点为中心，并用单独的线路使中央节点与其他各节点相\n连，相邻节点之间的通信都要通过中心节点，一般这个节点的设备是集线器或交换机。家庭中的所有电\n子设备都连接到无线路由器上，它相当于星型结构中的中心节点，所以，属于星型拓扑结构。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-17897","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"在计算机网络中，所有的计算机均连接到一条通信传输线路上，在线路两端有防止信号反射的装\n置，这种连接结构被称为________。","options":{},"answer":"总线型结构","explanation":"总线型结构。解析：总线型结构是指采用单根传输线作为总线，文件服务器和所有工作\n站都连在一条公共的电缆上。总线型拓扑结构如下图所示：","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"zg-37353","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"________也叫远程登录，就是本地计算机通过 Internet 使用远程计算机。","options":{},"answer":"Telnet","explanation":"Telnet。解析：Telnet 是指本地计算机通过 Internet 访问远程计算机上的硬件资源、软件\n资源和信息资源的过程。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-15838","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"在网络通信系统中，双方共同遵循的规则，标准或者约定称为________。","options":{},"answer":"网络协议","explanation":"网络协议。解析：网络中数据交换的规则、标准或约定称为网络协议。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-39412","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"在 Internet 中，________协议用于文件传输。","options":{},"answer":"FTP","explanation":"FTP。解析：FTP（文件传输协议）是因特网上重要的服务之一，其利用 Internet 实现互\n联网中交互式文件传输功能。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-69709","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"顶级域名“.gov”代表________，“.edu”代表________。","options":{},"answer":"政府机构、教育机构","explanation":"政府机构、教育机构。解析：.gov 是政府机构的域名，.edu 是教育机构的域名。","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-73343","source":"中公","type":"填空","chapter":"第五章 计算机网络","stem":"因为数字型的________地址不易为因特网用户记忆，人们研究出能代表实际意义的字符型标识，\n称为________，如中央电视台的网址为：http://www.cctv.com.cn，其中 http 是________协议，www 是\n________网，标识该服务器是 web 服务器，cctv.com.cn 是中央电视台注册的域名，该域名中 cctv 代表\n________，com 代表商业机构，cn 代表________，作为网址中的国家顶级域名。","options":{},"answer":"IP、域名、超文本传输、万维、网络名（域）、中国","explanation":"IP、域名、超文本传输、万维、网络名（域）、中国。解析：IP 地址是一种数字型网络\n标识和主机标识。数字型标识对计算机网络系统来说自然是最有效的，但是对使用网络的人来说却有使\n用不便的缺点。为此，人们又研究出一种字符型标识，这就是域名。超文本传输协议（HTTP）是互联\n网上应用最为广泛的一种网络协议。所有的 WWW 文件都必须遵守这个标准。万维网（WWW，英文全\n称为“World Wide Web”），是一个由许多互相链接的超文本组成的系统，通过互联网访问。常见的域名\n如下表所示：\n以国区别分的域名的例子 以机构区分的域名的例子\n域名 含义 域名 含义\nca 加拿大（Canada） com 商业机构\nau 澳大利亚（Australia） edu 教育机构\ncn 中国（China） int 国际组织\nfr 法国（France） gov 政府部门\njp 日本（Japan） mil 军事机构\nuk 英国（United\nKingdom）\nnet 网络机构\nus 美国（United States） org 非盈利机构","subject":"计算机网络","source_chapter":"第五章 计算机网络"},{"id":"zg-41573","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"会计小刘按照公司王总通过手机 QQ 发来的信息，将 96 万元项目款打入指定账号，事后经过两人\n的交流，小刘得知王总并没有发送该消息，自己很可能遭遇诈骗，便立即报警。对于上述情况，下列说\n法正确的是（ ）。","options":{"A":"如果安装了高版本的杀毒软件，就不会上当受骗","B":"如果安装了高版本的操作系统，就不会上当受骗","C":"不用 QQ 与别人交流聊天，否则容易上当受骗","D":"应通过打电话确认对方身份后再行动，避免上当受骗"},"answer":"D","explanation":"这道题考察考生的信息安全意识。杀毒软件、操作系统和 QQ 软件都不可能\n完全的确认对方的真实身份，只有自身的防范意识提高了，才能避免上当受骗。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-11618","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"网络安全防护技术主要有防火墙技术，数据备份与灾难恢复技术以及（ ）。","options":{"A":"数据加密","B":"数字调控","C":"差错控制","D":"无线接入"},"answer":"A","explanation":"当前采用的网络信息安全保护技术主要有两种：主动防御技术和被动防御技\n术。主动防御保护技术一般包括：数据加密、身份鉴别、存取控制、权限设置和虚拟专用网。被动防御\n保护技术主要有防火墙技术、入侵检测技术、安全扫描器、口令验证、审计跟踪、物理保护及安全管理。\nB 选项数字调控是一种借助数字、字符或者其他符号对某一工作过程进行编程控制的自动化方法；C 选\n项差错控制是在数字通信中利用编码方法对传输中产生的差错进行控制，以提高数字消息传输的准确性；\nD 选项无线接入是指从交换节点到用户终端之间，部分或全部采用了无线手段。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-43632","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"计算机安全范围主要包括（ ）。","options":{"A":"数据安全","B":"硬件安全","C":"病毒防护","D":"人身安全"},"answer":"D","explanation":"A 项：计算机安全中心最重要的是存储数据的安全，其面临的威胁主要包括：\n计算机病毒、非法访问、计算机电磁辐射、硬件损坏等；B 项：计算机在使用过程中，对外部环境有一\n定的要求，即计算机周围的环境应尽量保持清洁、温度和湿度应该合适、电压稳定，以保证计算机硬件\n可靠的运行；C 项：对于一般计算机用户而言，在计算机安装一套杀毒软件，并定期升级所安装的杀毒\n软件，是最常用、最基本的病毒防护手段，除此之外还可以安装个人防火墙、分类设置密码并使密码设\n置尽可能复杂、不下载不明软件及程序、防范流氓软件、尽在必要时共享和定期备份；D 项：计算机安\n全只涉及软件和硬件方面安全，个人人身安全与计算机安全不属于同一个概念层次，并不包含于计算机\n安全范围内。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-73929","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"网络设备､程序､线路等方面的安全是指（ ）。","options":{"A":"信息安全","B":"物理安全","C":"硬件安全","D":"程序安全"},"answer":"B","explanation":"B｡解析：计算机网络安全包括物理安全和信息安全｡物理安全是指网络设备､程序､线路\n等方面的安全；信息安全则是防止在网络中存储或传送的信息受到破坏｡","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-75628","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"下列属于加强网络安全的最重要的基本措施有（ ）。","options":{"A":"设计有效的网络安全策略","B":"选择更安全的操作系统","C":"安装杀毒软件","D":"加强安全教育"},"answer":"A","explanation":"加强网络安全防范措施的方法有：安装杀毒软件并经常升级；选用合适的防\n火墙系统；设置电脑和网络口令；用安全类软件打补丁、更新漏洞；移动设备使用前先杀毒；不要打开\n来历不明的邮件、文件、链接和弹窗；备份文件；输入账号和密码时使用软键盘。而设计有效的网络安\n全策略是加强网络安全性的最重要的基础措施。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-79622","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"下列属于遵守《全国青少年网络文明公约》的行为是：（ ）。","options":{"A":"浏览不健康网络","B":"上网查搜学习资料","C":"随意约会网友","D":"沉溺于网络"},"answer":"B","explanation":"《全国青少年网络文明公约》内容：要善于网上学习，不浏览不良信息。要诚\n实友好交流，不辱骂欺诈他人。要增强自护意识，不随意约会网友。要维护网络安全，不破坏网络秩序。\n要有益身心健康，不沉溺虚拟时空。要树立良好榜样，不违反行为准则。","subject":"算法与数据结构","source_chapter":"第六章 信息安全与社会"},{"id":"zg-9919","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"张小薇给自己设置的支付宝登录密码中，安全性最高的是（ ）。","options":{"A":"19950528","B":"anhuizxw","C":"zxw1995","D":"Zxw* *01"},"answer":"D","explanation":"设置密码和口令时，要尽量选择一些复杂密码，如混合字母和数字、区分英\n文字母大小写、添加特殊符号等方式。选项 D 的复杂度最高，因此，安全性也最高。","subject":"其他","source_chapter":"第六章 信息安全与社会"},{"id":"zg-43272","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"对于一般计算机用户来说，维护信息安全最重要的是养成良好的使用习惯。以下可能威胁信息安\n全的是（ ）。","options":{"A":"随意安装软件","B":"进行系统更新","C":"经常备份数据","D":"设置开机密码"},"answer":"A","explanation":"A 选项有些软件来源并不是很可靠，可能含有病毒或木马，因此随意安装软\n件很有可能感染病毒，从而威胁信息安全。B 选项系统更新最大的好处就是修补系统漏洞和后门（端口），\n以避免给病毒和木马以可乘之机，破坏系统稳定。理论上说，更新系统以后，系统会更安全，也更加稳\n定可靠，同样也会优化和提升系统体验。C 选项经常备份数据，能避免文件丢失或者被破坏后难以恢复\n的问题。D 选项设置开机密码可以防止别人轻易访问自己电脑上的资料及电脑设置，也可以防止网络上\n的远程控制攻击。所以 B、C、D 都能使信息安全得到保障。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-11978","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"下列属于信息安全产品的是（ ）。","options":{"A":"网络文明公约","B":"无线网卡","C":"软件防火墙","D":"电子办公软件"},"answer":"C","explanation":"A 选项，网络文明公约是较为完备的网络行为道德规范。B 选项，无线网卡\n是采用无线信号进行数据传输的设备，用于实现与互联网的连接。C 选项，防火墙指的是一个有软件和\n硬件设备组合而成、在内部网和外部网之间、专用网与公共网之间的界面上构造的保护屏障。软件防火\n墙单独使用软件系统来完成防火墙功能，将软件部署在系统主机上，属于信息安全产品。D 选项，电子\n办公软件可以进行文字的处理、表格的制作、幻灯片制作、简单数据库的处理等方面工作的软件。","subject":"计算机网络","source_chapter":"第六章 信息安全与社会"},{"id":"zg-41213","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"信息安全需求不包括（ ）。","options":{"A":"保密性、完整性 B 可用性、可控性.","C":"不可否认性","D":"语义正确性"},"answer":"D","explanation":"信息安全的任务是保证信息功能的实现。保护信息安全的主要目标是机密性\n（保密性）、完整性、可用性、可控性和可审查性（不可否认性）。将这 5 个目标可以分为两类，消息层\n上包括完整性、机密性（保密性）和可审查性（不可否认性）；网络层次上包括可用性和可控性。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-5223","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"通常人们使用下列的哪个设备来抵御黑客攻击（ ）。","options":{"A":"AC 控制器","B":"POE 交换机","C":"防火墙","D":"超级服务器"},"answer":"C","explanation":"黑客，是指对计算机信息系统进行非授权访问的人员，通过端口扫描、口令\n破解、网络监听等方式窃取信息、获取口令，甚至扰乱和破坏系统。防火墙强制所有的访问和连接都必\n须经过这个保护层，并在此进行连接和安全检查。只有合法的数据包才能通过此保护层，从而保护内部\n网资源免遭黑客非法入侵。本题答案为 C。A 选项 AC 控制器全称是无线控制器，是一种网络设备，负\n责管理无线网络中的所有无线 AP；B 选项 POE 交换机是网络连接设备，支持以太网供电；D 选项超级\n服务器指一个管理资源并为用户提供服务的计算机。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-71292","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"新型病毒传播中不被反病毒程序发现的特性，是指其具有（ ）。","options":{"A":"强壮性","B":"潜伏性","C":"变种性","D":"繁殖性"},"answer":"B","explanation":"计算机病毒具有传染性、寄生性、潜伏性、隐蔽性、可触发性、破坏性、不\n可预见性等特点，其中，计算机病毒的潜伏性是指病毒进入到系统后一般不会马上发作，可以长时间隐\n藏在文件中，而不会表现出任何症状，只有在特定触发条件下病毒才开始发作，可以躲避反病毒程序的\n扫描，病毒不”具备“强壮性”、“变种性”、“繁殖性”所以正确选项为 B。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-72867","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"计算机病毒可以在一个系统中存在很长时间而不被发现，在发作时会使人们猝不及防，造成重大\n损失，这主要体现了计算机病毒具有（ ）。","options":{"A":"破坏性","B":"隐蔽性","C":"传染性","D":"可执行性"},"answer":"B","explanation":"A 选项，破坏性指病毒侵入系统，会对系统及应用程序产生程序产生影响。\nB 选项，隐蔽性指病毒附在正常程序中或磁盘较隐蔽的地方，不被电脑的守护者发现。\nC 选项，传染性指计算机病毒随着正常程序的执行而繁殖，随着数据或程序代码的传送而传播。\nD 选项，可执行性指计算机病毒与其他合法程序一样，是一段可执行程序。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-69233","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"下列哪一项不是计算机病毒的特点（ ）。","options":{"A":"传染性","B":"寄生性","C":"开放性","D":"隐蔽性"},"answer":"C","explanation":"计算机病毒具有传染性、寄生性、潜伏性、隐蔽性、可触发性、破坏性、不\n可预见性等特点，不包括开放性。传染性：计算机病毒随着正常程序的执行而繁殖，随着数据或程序代\n码的传送而传播。因此它可以迅速地在程序之间、计算机之间、计算机网络之间传播。寄生性：计算机\n病毒寄生在其他程序之中，当执行这个程序时，病毒就起破坏作用，而在未启动这个程序之前，它是不\n容易被发现的。隐蔽性：病毒程序一般很短小，在发作之前人们很难发现它的存在。\n21【答案】B。解析：计算机病毒是编制者在计算机程序中插入的破坏计算机功能或者数据的代码，\n能影响计算机使用，能自我复制的一组计算机指令或者程序代码。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-35302","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"以下有关计算机病毒的说法，哪一项是错误的（ ）。","options":{"A":"使用盗版软件光盘，有可能会感染病毒","B":"病毒在本质上是一种会消耗或损害计算机软硬件资源的程序或脚本\nC 感染了病毒之后，计算机马上就会出现运行缓慢等症状","D":"使用杀毒软件不一定能杀灭计算机中的所有病毒"},"answer":"C","explanation":"A 选项，使用盗版软件有可能会感染病毒，因此在使用的时候要先进行杀毒。\nB 选项，病毒会破坏计算机中的程序或脚本，导致计算机中的数据和功能被破坏。C 选项，程序感染了\n病毒之后，计算机不会马上出现运行缓慢等症状，因为病毒具有潜伏性，有一定的潜伏期。D 选项，杀\n毒软件中的一些漏洞补丁都是针对已有的某些病毒更新的，因此使用杀毒软件不一定能杀灭计算机中的\n所有病毒。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-61548","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"2017 年 5 月 12 日，勒索病毒在全球爆发，联网计算机的硬盘文件被病毒加密，对学习资料和个\n人数据造成严重损失，被攻击者只能支付高额赎金。关于这次事件的说法错误的是（ ）。","options":{"A":"勒索病毒本质上是一种特殊的程序","B":"为了防止病毒的攻击，个人电脑不应该联网","C":"互联网的发展加快了病毒的传播速度，造成了勒索病毒全球性爆发的局面","D":"随着发展，新的病毒会不断出现，破坏方式也在不断变化"},"answer":"B","explanation":"计算机病毒是人为故意在计算机程序中插入的破坏计算机功能或者毁坏数据，\n影响计算机使用，并能自我复制的一组计算机指令或者程序代码，所以选项 A 正确。互联网的发展不仅\n加快了信息传播的速度，同时也带来了一些负面影响，例如加快了病毒的传播速度，造成病毒全球性爆\n发。病毒相对于病毒查杀软件永远是超前的，随着发展，新的病毒会不断出现，破坏方式也在不断变化，\n所以选项 C、D 正确。病毒的传播方式不只通过网络，还有移动设备，常见的的移动设备包括 U 盘、移\n动硬盘，而单纯的个人电脑不联网并不能防止病毒的攻击。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-34818","source":"中公","type":"单选","chapter":"第六章 信息安全与社会","stem":"计算机病毒主要破坏数据的（ ）。","options":{"A":"可审性","B":"及时性","C":"完整性","D":"保密性"},"answer":"C","explanation":"完整性是信息在传输、交换、存储和处理过程保持非修改、非破坏和非丢失\n的特性，即保持信息的原样性，使信息能正确生成、存储和传输，这是最基本的安全特征。计算机中毒\n后，可能会导致正常的程序无法运行，对计算机内的文件的操作通常表现为：增、删、改、移，破坏数\n据的完整性。可审核性也称为不可否认性，指参与信息通信的双方在信息交换过程都不可能否认或抵赖\n本人的真实身份，以及提供信息的原样性和完成的操作与承诺。保密性是指信息没有通过任何途径泄露\n给非授权用户。及时性不属于信息安全的特征。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-43093","source":"中公","type":"多选","chapter":"第六章 信息安全与社会","stem":"下列属于计算机安全问题的是（ ）。","options":{"A":"计算机的程序数据非法修改","B":"计算机数据遭受病毒破坏","C":"通信线路被破坏","D":"停电了，没存盘的资料找不回\nE.登录非法的网站，硬盘的资料打不开"},"answer":"ABC","explanation":"ABCE。解析：信息安全包括操作系统安全、数据库安全、网络安全、防病毒、访问控\n制、加密、认证，它用来保障信息不会被非法阅读、修改和泄露。D 选项不属于计算机安全范畴的内容。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-53757","source":"中公","type":"多选","chapter":"第六章 信息安全与社会","stem":"计算机病毒的特征包括（ ）。","options":{"A":"兼容性","B":"破坏性","C":"传染性","D":"隐蔽性"},"answer":"BCD","explanation":"计算机病毒的特征包括寄生性、传染性、潜伏性、隐蔽性、可触发性、破\n坏性、不可预见性。因此 A 选项是错误的。传染性：计算机病毒随着正常程序的执行而繁殖，随着数据\n或程序代码的传送而传播。因此它可以迅速地在程序之间、计算机之间、计算机网络之间传播。隐蔽性：\n病毒程序一般很短小，在发作之前人们很难发现它的存在。破坏性：病毒侵入系统，会对系统及应用程\n序产生程序不同的影响。轻者会降低计算机工作效率，占用系统资源，重者可导致系统崩溃。它的破坏\n目的非常明确，如破坏数据、删除文件、加密磁盘、格式化磁盘或破坏主板等。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-52044","source":"中公","type":"填空","chapter":"第六章 信息安全与社会","stem":"通常人们把计算机信息系统的非法入侵者称为________。","options":{},"answer":"黑客","explanation":"黑客。解析：黑客，英文名为 Hacker，是指对计算机信息系统进行非授权访问的人员。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-46381","source":"中公","type":"填空","chapter":"第六章 信息安全与社会","stem":"Internet 防火墙一般由以下两部分组成：分组过滤路由器与________。","options":{},"answer":"应用网关","explanation":"应用网关。解析：防火墙一般由分组过滤路由器与应用网关组成。分组过滤路由器是一\n种具有分组过滤功能的路由器，它根据过滤规则对进出内部网络的分组执行转发或者丢弃（即过滤）。\n应用网关是将一个网络与另一个网络进行相互连通，提供特定应用的网络间设备。","subject":"计算机网络","source_chapter":"第六章 信息安全与社会"},{"id":"zg-49985","source":"中公","type":"填空","chapter":"第六章 信息安全与社会","stem":"对数据加密是将被保密的数据按一定规律进行重新编码，变成难以读懂的乱码字符，使非授权用\n户无法获得真实内容，假设明文仅由英文字母组成，加密规则：①将明文中出现的字符 A 替换为 E，B\n替换为 F，C 替换为 G，...，W 替换为 A，X 替换为 B，...；②将明文中出现的字符进行大小写转换。那\n么密文 xLIwYRmWwLMRMRK 解密后的明文应该是________。4.Melissa 病毒通过邮件进行传播，通常\n以“Important Message From...”为主题。从表面上看，像是熟人或朋友发来的。邮件正文上写道：“Here\nis the message you asked for...don’t tell anyone else;——)”。邮件的附件是一个 Word 文档。如果收到邮件\n的人打开了这个文档，病毒就会窜入他的电子通讯薄中，选择最前面的 50 人，将染有病毒的邮件发出。\n从病毒的基本类型来看，Melissa 属于________。\n5.________属于计算机病毒典型特征。\n6.维护信息安全，主要是保护信息的机密性、________、可用性、可控性、可审查性，防止非法修\n改、删除、使用和窃取数据信息。\n7.________指的是一个由软件和硬件设备组合而成，在内部网和外部网之间，专用网和公用网之间\n构造的保护屏障。\n8.在计算机密码技术中，通信双方使用一对密钥，即一个私人密钥和一个公开密钥，密钥对中的一\n个必须保持保密状态，而另一个则被广泛发布，这种密码技术是________算法。\n9.DES 算法属于加密技术中的________。\n10.Word 宏病毒是一些制作病毒的专业人员利用 Microsoft Word 的开放性专门制作的一个或多个具\n有病毒特点的宏的集合，这种宏病毒的集合影响到计算机的使用，并能通过________和________进行自\n我复制及传播。","options":{},"answer":"TheSunIsShining","explanation":"TheSunIsShining。解析：用某种方法伪装数据以隐藏它原貌的过程称为加密，之称为解\n密，也就是说，解密是加密的逆运算。因此本题解题步骤为：①将密文中原来为大写的部分转换为小写，\n原来为小写的部分转换为大写，结果为 XliWyrMwWlmrmrk；②将每个字母依次向前推四个，得出结果\n为 TheSunIsShining。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-99660","source":"中公","type":"判断","chapter":"第六章 信息安全与社会","stem":"对称密钥又称公开密钥，加密和解密时使用不同的密钥，即不同的算法。（ ）","options":{},"answer":"错误","explanation":"所谓对称密钥密码体制，即加密密钥与解密密钥是相同的密码体制。这种\n加密方法的双方使用相同的密钥进行加密和解密。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-55590","source":"中公","type":"判断","chapter":"第六章 信息安全与社会","stem":"单机病毒的载体是磁盘，U 盘，移动硬盘等移动存储设备，常见的病毒从移动存储设备传入硬盘，\n感染系统，然后再传染其他移动存储设备，移动存储设备又传染其他系统。（ ）","options":{},"answer":"正确","explanation":"计算机病毒按照传输媒介分为单机病毒和网络病毒。其中单机病毒的载体\n是磁盘、移动硬盘、U 盘等移动存储设备，常见的是病毒从 U 盘等移动设备传入硬盘，感染系统，然后\n再传染其他移动设备，移动设备又传染其他系统。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-97601","source":"中公","type":"判断","chapter":"第六章 信息安全与社会","stem":"防火墙对流经它的网络通信进行扫描，可以过滤掉一切攻击，避免病毒入侵计算机。（ ）","options":{},"answer":"错误","explanation":"网络防火墙是指在两个网络之间加强访问控制的一整套装置，即防火墙是\n构造在一个可信网络（一般指内部网）和不可信网络（一般指外部网）之间的保护装置，强制所有的访\n问和连接都必须经过这个保护层，并在此进行连接和安全检查。只有合法的数据包才能通过此保护层，\n从而保护内部网资源免遭非法入侵。但是防火墙本身也会出现问题和受到攻击，并且防火墙一般不处理\n病毒，不能抵抗最新的未设置策略的攻击漏洞，对服务器合法开放的端口的攻击大多无法阻止，对待内\n部主动发起连接的攻击一般无法阻止。","subject":"信息安全","source_chapter":"第六章 信息安全与社会"},{"id":"zg-89521","source":"中公","type":"判断","chapter":"第六章 信息安全与社会","stem":"通过互联网举报伪劣产品及虚假广告属于违法行为。（ ）","options":{},"answer":"错误","explanation":"制造伪劣产品或者发布虚假广浩是违法的，通过互联网举报伪劣产品及虚\n假广告是值得提倡的，符合国家法律法规标准，所以不属于违法行为。","subject":"计算机网络","source_chapter":"第六章 信息安全与社会"},{"id":"zg-97705","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"管理的三个阶段中，由应用程序管理数据的阶段是（ ）。","options":{"A":"数据库系统阶段","B":"人工管理阶段、文件系统阶段和数据库系统阶段","C":"人工管理阶段和文件系统阶段","D":"人工管理阶段"},"answer":"A","explanation":"在应用需求的推动下，在计算机硬件、软件发展的基础上，数据管理技术经\n历了人工管理、文件系统、数据库系统三个发展阶段：\n发展阶段 应用范围 软硬件背景 特点\n人工管理阶段 科学计算\n硬件：无直接存取存储设备，\n只有磁带、卡片和纸带\n软件：没有操作系统\n计算机系统不提供对用户数据的管\n理功能，数据面向应用程序，一组\n数据只能对应一个程序。数据不能\n共享、不具备独立性。\n文件系统阶段\n科学计算\n数据管理\n硬件：出现了磁盘、磁鼓等\n直接存取存储设备\n软件：出现了文件系统\n数据可以长期保存、有文件系统管\n理数据、共享性差、数据独立性差。\n数据库系统阶段\n大规模数据\n管理\n硬件：出现了大容量磁盘、\n磁盘阵列\n软件：出现了数据库管理系\n统（DBMS）\n采用复杂的结构化的数据模型、较\n高的数据独立性、最低的冗余度、\n数据共享性高，数据控制方面由数\n据库管理系统提供数据安全性、完\n整性、并发控制和恢复能力。\n本题也可以采用排除法，人工管理阶段还没有软件系统对数据进行管理，所以可以排除 BCD，选择\n选项 A。人工管理阶段的特点是计算机系统不提供对用户数据的管理功能、数据不能共享、不单独保存\n数据，文件管理数据可以长期保存、由文件系统管理数据、共享性差、数据独立性差，数据库系统阶段\n的特点是采用复杂的结构化的数据模型、较高的数据独立性、最低的冗余度、数据控制功能。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-55486","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"关于冗余数据的叙述中，不正确的是（ ）。","options":{"A":"冗余的存在容易破坏数据库的完整性","B":"冗余的存在给数据库的维护增加困难","C":"不应该在数据库中存储任何冗余数据","D":"冗余数据是指可由基本数据导出的数据"},"answer":"C","explanation":"数据冗余是指数据之间的重复，也可以说是同一数据存储在不同数据文件中\n的现象，选项 A，二维表中存在冗余的话，如果更改其中一个值，其它二维表中的相应的值也需要进行\n修改，否则信息就会处于不一致状态，这样数据的完整性就受到了影响。选项 B，冗余存在的话，修改\n数据相关的值都需要进行修改，所以增加了维护的困难性。选项 C，冗余是重复的数据，是必然存在的。\n合理的冗余可以减少二维表间的连接，让数据库执行性能更高更快。选项 D，冗余数据是指可由基本数\n据导出的数据，冗余的联系是指可由其它联系导出的联系。","subject":"数据库","source_chapter":"第七章 数据库技术"},{"id":"zg-57061","source":"中公","type":"单选","chapter":"第七章 数据库技术","stem":"在学籍管理系统中，检索出某一个学生的学籍信息，需要对数据库进行（ ）操作。","options":{"A":"分类","B":"查询","C":"筛选","D":"排序"},"answer":"B","explanation":"A 选项，题干要求的是检索某个学生的学机信息，并不需要进行分类，因此\n排除 A 选项。B、C 选项，ACCESS 中的筛选是一个对资料表临时的查询，它不会保存筛选的结果（关\n闭资料表后即消失），并且它只能作一些简单的筛选，远远没有查询的功能强；而查询是一个对资料表\n的筛选可进行永久保存（将它保存为查询文件）。并且它可以依据任何条件（单一的或者是组合的都行）\n对资料表进行准确的筛选。因此要检索某一个学生的学籍信息，只需要按照所给的学生条件对数据库进\n行查询操作即可。D 选项，在对数据进行分类汇总之前，首先要进行的操作是排序，排序的目的是使相\n同字段的记录（数据行）排列在一起，以便进行分类汇总。","subject":"数据库","sou
