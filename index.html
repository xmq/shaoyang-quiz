。","options":{"A":"ATM系统","B":"证券交易系统","C":"航天飞机导航系统","D":"电子邮件系统"},"answer":"ABC","explanation":"在电子邮件系统中，发送者并不等待发送工作完成，而是仅仅将要\n发送的内容发送出去。故正确答案为ABC","subject":"信息基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-1831","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"关于进程的说法正确的是（）。","options":{"A":"进程是程序的次执行过程","B":"进程是系统调度和资源分配的个独立单位","C":"进程是个正在执行的程序","D":"进程的存在不一定需要程序的存在"},"answer":"ABC","explanation":"进程（Process）是计算机中的程序关于某数据集合上的一次运行活动，\n是系统进行资源分配和调度的基本单位，是操作系统结构的基础。所以选项A和选项B是正确的。\n进程就是一个程序的执行实例，也就是正在执行的程序。所以选项C是正确的。进程是程序的实\n体，所以选项D是错误的。故正确答案为ABC。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-48676","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"主要的存储管理方案有（）。","options":{"A":"分页存储管理方式","B":"分段存储管理方式","C":"段页存储管理方式","D":"云管理"},"answer":"ABC","explanation":"存储管理方案的主要目的是解决多个用户使用主存的问题，其存储\n管理方案主要包括分区存储管理、分页存储管理、分段存储管理、段页式存储管理以及虚拟存储\n管理。故正确答案为ABC。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-47891","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"下列关于页式储存管理方案优缺点的说法正确的有（）。","options":{"A":"没有外碎片，且内碎片的大小不会超过页面的大小","B":"一个程序不必连续存放","C":"即使程序没有全部装人内存也可以运行","D":"操作系统必须为每一个进程维护一张页表"},"answer":"AB","explanation":"windows 内存管理方式主要分为：页式管理，段式管理，段页式管理。\n页式管理：基本原理是将各进程的虚拟空间划分为若干个长度相等的页；页式管理把内存空间按\n照页的大小划分成片或者页面，然后把页式虚拟地址与内存地址建立一一对应的页表；并用相应\n的硬件地址变换机构来解决离散地址变换问题。页式管理采用请求调页或预调页技术来实现内外\n存存储器的统一管理。优点是没有外碎片，每个内碎片不超过页的大小。缺点是程序全部装人内存，\n要求有相应的硬件支持。段页式管理，为每一个进程维护一张页表是段页式管理的特点，系统必\n须为每个作业或进程建立一张段表以管理内存分配与释放、缺段处理等，故正确答案为AB。","subject":"计算机基础","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-60371","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"死锁产生的必要条件主要有（）。","options":{"A":"互斥条件","B":"请求和保持条件","C":"不剥夺条件","D":"环路等待条件"},"answer":"ABCD","explanation":"死锁的发生必须具备下列四个必要条件。只要系统发生死锁，这\n些条件必然成立：\n（1）互斥条件\n指一个资源每次只能被一个进程使用，如果此时还有其它进程请求该资源，则请求者只能等\n待，直至占有该资源的进程用毕释放。\n（2）请求和保持条件\n指一个进程因请求资源而阻塞时，对已获得的资源保持不放。\n（3）不剥夺条件\n指进程已获得的资源，在未使用完之前，不能被剥夺，只能在使用完时由自已释放。\n（4）环路等待条件\n指若干进程之间形成一种头尾相接的循环等待资源关系。故正确答案为 ABCD。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-20125","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"进程所具有的基本状态包括（）。","options":{"A":"后备状态","B":"执行状态","C":"就绪状态","D":"等待状态"},"answer":"BCD","explanation":"进程是操作系统中的一个最基本、最重要的概念，所谓进程是具有\n一定独立功能的程序关于某个数据集合上的一次运行活动。它实际上是对“程序”在系统中运行\n活动的描述。进程在它存在过程中，其状态处于不断地变化中，通常一个进程至少有三种不同的\n状态：运行状态、就绪状态、等待状态，并且在这三种状态下不断地变化。故正确答案为 BCD。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-91424","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"按文件中数据的形式分类将文件分为（）。","options":{"A":"源文件","B":"目标文件","C":"库文件","D":"可执行文件"},"answer":"ABD","explanation":"按文件中数据的形式分类，也可把文件分为三类：\n（1）源文件\n通常是指由高级语言或汇编语言所编写的程序，由源程序和数据构成的文件。\n（2）目标文件\n是指把源程序经过相应语言的编译程序编译过，但尚未经过链接程序链接的目标代码所构成\n的文件。它属于二进制文件，通常后缀名是“obj”。\n（3）可执行文件\n是指把编译后所产生的目标代码再经过链接程序链接后所形成的文件。故正确答案为ABD。","subject":"编程语言","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-59955","source":"德阳","type":"多选","chapter":"德阳计算机题本·第一章 计算机基础","stem":"造成死锁的原因是（","options":{"A":"内存容量太小","B":"系统进程数量太多，系统资源分配不当","C":"CPU速度太慢","D":"进程推进顺序不合适"},"answer":"BD","explanation":"所谓死锁是指计算机系统和进程所处的一种状态，在系统中，两个\n或多个进程无限期地等待永远不会发生的条件，我们称此系统处于死锁状态。产生死锁的原因一\n是系统进程数量太多，系统资源分配不当；二是进程推进顺序不合适。死锁的发生与内存容量、\nCPU速度无关。故正确答案为 BD。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-29502","source":"德阳","type":"判断","chapter":"德阳计算机题本·第一章 计算机基础","stem":"操作系统是系统软件和应用软件的接口。\n2操作系统的主要功能是控制和管理计算机的硬件和软件系统资源。\n3.操作系统是系统软件中的一一种，在进行系统安装时可以先安装其软件，然后再装操作系统。\n4.操作系统不会存在任何安全隐患\n5.一般的分时操作系统无法作实时控制用。\n6.进程和程序的一个本质区别是前者为动态的，后者为静态的。\n7.银行家算法是操作系统中设计中避免死锁的方法之一\n8.实时操作系统的主要特点是响应及时和可靠性低\n9.操作系统的功能之一是提高计算机的运行速度。\n10.当进程完成I/0后，进程的状态由等待变为运行。\n全金标R教育","options":{},"answer":"错误","explanation":"操作系统（Operating System，简称OS）是管理和控制计算机硬件与\n软件资源的计算机程序，是直接运行在“裸机”上的最基本的系统软件，任何其他软件都必须在\n操作系统的支持下才能运行。操作系统是用户和计算机的接口，同时也是计算机硬件和其他软件\n的接口，是系统软件和应用软件的接口。而本题只设计软件，未含硬件，表述不完全，故正确答\n案为错误。","subject":"操作系统","source_chapter":"德阳计算机题本·第一章 计算机基础"},{"id":"dy-58308","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"在Windows 7系统中，下列属于系统图标的是（）。","options":{"A":"“计算机”","B":"“回收站","C":"“控制面板”","D":"“快捷方式”图标"},"answer":"CD","explanation":"操作系统的主要特性包括：并发性、共享性、虚拟性、异步性。故正\n确答案为 CD。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-55945","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"对于快捷方式的说法，正确的是（）。","options":{"A":"快捷方式就是文件本身","B":"快捷方式只是一个图标，没有实际意义","C":"快捷方式指向了对应文件的位置等信息","D":"快捷方式可以像文件一样进行复制、剪贴等操作"},"answer":"ABCD","explanation":"操作系统（Operating System，简称OS）是管理和控制计算机硬件\n与软件资源的计算机程序，是直接运行在“裸机”上的最基本的系统软件，任何其他软件都必须\n在操作系统的支持下才能运行。操作系统是用户和计算机的接口，同时也是计算机硬件和其他软\n件的接口。操作系统管理着计算机硬件资源，同时按照应用程序的资源请求，分配资源。故正确\n答案为 ABCD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-71769","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"下面关于Windows 7桌面上的快捷方式的描述，说法正确的有（）。","options":{"A":"移动快捷方式位置，所对应的原文件不能被打开","B":"移动原文件位置，对应快捷方式不能被打开","C":"删除快捷方式，对应的原文件不受影响，能正常打开","D":"删除原文件，对应的快捷方式不受影响，能正常打开"},"answer":"ABC","explanation":"在电子邮件系统中，发送者并不等待发送工作完成，而是仅仅将要\n发送的内容发送出去。故正确答案为ABC","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-55264","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"Win7系统中提供的切换窗口的方法有（）。","options":{"A":"Alt+Tab","B":"Win+Tab","C":"单击要切换窗口的任何部位","D":"单击任务栏上要切换的程序按钮"},"answer":"ABC","explanation":"进程（Process）是计算机中的程序关于某数据集合上的一次运行活动，\n是系统进行资源分配和调度的基本单位，是操作系统结构的基础。所以选项A和选项B是正确的。\n进程就是一个程序的执行实例，也就是正在执行的程序。所以选项C是正确的。进程是程序的实\n体，所以选项D是错误的。故正确答案为ABC。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-8093","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"在Windows 7系统中，可以关闭计算机窗口的操作有（）。","options":{"A":"单击标题栏右上角的“关闭”按钮","B":"右击“计算机”窗口标题栏，在快捷菜单中点击“关闭”","C":"按Alt+F4组合键","D":"双击标题栏左上角"},"answer":"ABC","explanation":"存储管理方案的主要目的是解决多个用户使用主存的问题，其存储\n管理方案主要包括分区存储管理、分页存储管理、分段存储管理、段页式存储管理以及虚拟存储\n管理。故正确答案为ABC。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-76671","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"下列关于Win 7系统中的快捷键功能，描述不正确的是（","options":{"A":"Shift+Delete可永久删除计算机中的文件，不可恢复","B":"直接按PrintScreen键，可截取当前窗口图片","C":"在文档窗口中，将鼠标定位到某-位置，按Delete 键，可删除光标之后的内容","D":"组合键Ctrl+PrintScreen，截取的是当前活动窗口"},"answer":"AB","explanation":"windows 内存管理方式主要分为：页式管理，段式管理，段页式管理。\n页式管理：基本原理是将各进程的虚拟空间划分为若干个长度相等的页；页式管理把内存空间按\n照页的大小划分成片或者页面，然后把页式虚拟地址与内存地址建立一一对应的页表；并用相应\n的硬件地址变换机构来解决离散地址变换问题。页式管理采用请求调页或预调页技术来实现内外\n存存储器的统一管理。优点是没有外碎片，每个内碎片不超过页的大小。缺点是程序全部装人内存，\n要求有相应的硬件支持。段页式管理，为每一个进程维护一张页表是段页式管理的特点，系统必\n须为每个作业或进程建立一张段表以管理内存分配与释放、缺段处理等，故正确答案为AB。","subject":"计算机基础","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-37372","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"切换窗口的方法有（）。","options":{"A":"\"Alt\" +“Tab\"","B":"“Win”+ “Tab\"","C":"单击任务栏上要切换的应用程序按钮","D":"Ctrl+ESC"},"answer":"ABCD","explanation":"死锁的发生必须具备下列四个必要条件。只要系统发生死锁，这\n些条件必然成立：\n（1）互斥条件\n指一个资源每次只能被一个进程使用，如果此时还有其它进程请求该资源，则请求者只能等\n待，直至占有该资源的进程用毕释放。\n（2）请求和保持条件\n指一个进程因请求资源而阻塞时，对已获得的资源保持不放。\n（3）不剥夺条件\n指进程已获得的资源，在未使用完之前，不能被剥夺，只能在使用完时由自已释放。\n（4）环路等待条件\n指若干进程之间形成一种头尾相接的循环等待资源关系。故正确答案为 ABCD。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-9330","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"小吴在对计算机进行操作时，想对打开的某个窗口进行大小调整，那么他可以（）","options":{"A":"利用窗口右上角的控制按钮","B":"双击标题栏调整","C":"在窗口边缘手动拖拽","D":"在任务栏空白处单击鼠标左键"},"answer":"BCD","explanation":"进程是操作系统中的一个最基本、最重要的概念，所谓进程是具有\n一定独立功能的程序关于某个数据集合上的一次运行活动。它实际上是对“程序”在系统中运行\n活动的描述。进程在它存在过程中，其状态处于不断地变化中，通常一个进程至少有三种不同的\n状态：运行状态、就绪状态、等待状态，并且在这三种状态下不断地变化。故正确答案为 BCD。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-76893","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"以下文件命名格式正确的是（）","options":{"A":"B.DOC","B":"C","C":"123.音乐","D":"*B.C"},"answer":"ABD","explanation":"按文件中数据的形式分类，也可把文件分为三类：\n（1）源文件\n通常是指由高级语言或汇编语言所编写的程序，由源程序和数据构成的文件。\n（2）目标文件\n是指把源程序经过相应语言的编译程序编译过，但尚未经过链接程序链接的目标代码所构成\n的文件。它属于二进制文件，通常后缀名是“obj”。\n（3）可执行文件\n是指把编译后所产生的目标代码再经过链接程序链接后所形成的文件。故正确答案为ABD。","subject":"编程语言","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-95219","source":"德阳","type":"多选","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"在Windows 7系统中，关于文件和文件夹，下列说法正确的是（","options":{"A":"在同一文件夹下，可以有两个不同名称的文件 三金标尺教育","B":"在不同文件夹下，可以有两个相同名称的文件","C":"在同一文件夹下，可以有两个相同名称的文件","D":"在不同文件夹下，可以有两个不同名称的文件"},"answer":"BD","explanation":"所谓死锁是指计算机系统和进程所处的一种状态，在系统中，两个\n或多个进程无限期地等待永远不会发生的条件，我们称此系统处于死锁状态。产生死锁的原因一\n是系统进程数量太多，系统资源分配不当；二是进程推进顺序不合适。死锁的发生与内存容量、\nCPU速度无关。故正确答案为 BD。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-83450","source":"德阳","type":"判断","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"当计算机处于休眠状态时，显示器和硬件处于关闭状态，处理机功率极低。用户可以快速\n唤醒计算机。","options":{},"answer":"错误","explanation":"操作系统（Operating System，简称OS）是管理和控制计算机硬件与\n软件资源的计算机程序，是直接运行在“裸机”上的最基本的系统软件，任何其他软件都必须在\n操作系统的支持下才能运行。操作系统是用户和计算机的接口，同时也是计算机硬件和其他软件\n的接口，是系统软件和应用软件的接口。而本题只设计软件，未含硬件，表述不完全，故正确答\n案为错误。","subject":"计算机基础","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-63346","source":"德阳","type":"判断","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"任务栏可以拖动到桌面上的任意位置。","options":{},"answer":"正确","explanation":"操作系统的功能是控制和管理计算机系统的各种硬件和软件资源的\n计算机程序。\n3.【答案错误。操作系统是对硬件的第一一次扩充，是其他软件运行的平台。在进行系统安\n装时必须先安装操作系统，然后再装其它软件。\n4（答案】错误。解析：操作系统软件自身具有不安全性，系统开发设计的不周而留下的破绽，\n都给网络安全留下隐患，所以操作系统本身存在安全隐患。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-4351","source":"德阳","type":"判断","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"对话框窗口可以最小化。","options":{},"answer":"正确","explanation":"分时操作系统是使一台计算机采用时间片轮转的方式同时为几个、\n几十个甚至几百个用户服务的一一种操作系统。把计算机与许多终端用户连接起来，分时操作系统\n将系统处理机时间与内存空间按一定的时间间隔，轮流地切换给各终端用户的程序使用。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-79420","source":"德阳","type":"判断","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"切换窗口的快捷键是Win+D。","options":{},"answer":"正确","explanation":"进程与程序的区别在于：进程是动态的，而程序是静态的；进程有\n一定的生命周期，而程序是指令的集合，本身无“运动”的含义，没有建立进程的程序不能作为\n其本质区别是进程是动态的，而程序是静态的。","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-9906","source":"德阳","type":"判断","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"在使用Windwos 系统时，若同时打开过多的窗口，会影响到系统运行的速度。","options":{},"answer":"正确","explanation":"银行家算法是一种可以用来预防死锁的检测算法，正像这种算法的\n名字一样，系统在分配资源情况就和银行家管理银行资金的情况是相似的。银行家要在贷款的时\n候协调各个客户之间的业务，最好的情况就是就是把当前的资金合理的分配出去，让余下来的资\n金依然足够应付近期的其他业务，而且能够确保在有新客户要贷款时之前贷出去的资金已经被收\n回。操作系统在协调各个进程之间的资源占用关系时也可以套用这种方法","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-22354","source":"德阳","type":"判断","chapter":"德阳计算机题本·第三章 Windows 7系统","stem":"在Windows 7中，需要查找以a开头的所有文件，应该在查找对话框中输人*.n。","options":{},"answer":"错误","explanation":"实时操作系统是指计算机能及时响应外部事件的请求，在规定的时\n间内完成对外部事件的处理，并控制所有实时设备和实时任务协调一致。它的主要特点是响应及\n时、可靠性高。\n设备管理、操作系统与用户之间的接口，提高计算机的运行速度不是操作系统的功能。\n10.【答案错误。解析：当进程完成I/0后，进程的状态变为就绪，何时运行由进程调度程\n序决定。\n车金标R教育\n第三章\nWindows 7系统","subject":"操作系统","source_chapter":"德阳计算机题本·第三章 Windows 7系统"},{"id":"dy-98993","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"如果文档很长，使用（）技术，同时在两个窗口中滚动查看同一一文档的不同部分。","options":{"A":"滚动条","B":"拆分窗口","C":"排列窗口","D":"帮助"},"answer":"B","explanation":"当用户设置登录用户名和相应的密码后，登录时必须输入密码，如果\n用户没有为用户名设置密码，在登录时不需要输人密码。故正确答案为B。\n3.【答案B。解析：本题考查Windows 7系统的关闭方法。关闭Windows7将关闭所有运行\n着的应用程序，用户在关机前一定要保存所有应用程序中处理的结果。A选项会造成文件的丢失，\n从而产生一定损失。C选项：通过电源按钮直接断电，计算机不能及时保存数据，造成数据丢失；\n同时会对电脑各部件以及硬盘造成损害。D选项：直接拔掉电源与按住电源按钮关闭会产生相同\n的后果，突然断电可能或烧坏电脑主板或电源。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-33726","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word2010中可以通过文件选项卡下面的（）来将Word2010即docx文档存为\nWord97-2003即doc 文档。","options":{"A":"保存","B":"另存为","C":"打开","D":"另存为网页"},"answer":"D","explanation":"使用Windows 7时，不设置开机密码也可使用，A选项错误；B选项注\n销指的是关闭当前用户，非系统，B选项错误；当出现白屏、死机的情况，通常通过启动任务管\n理器关闭未响应程序，C选项错误；锁屏快捷键是Win+L。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-95141","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在打开的Word 2010文档中，按“Ctrl+S”拿\n能够实现（）。","options":{"A":"创建新文档","B":"打开自已已保存的文档","C":"保存当前文档","D":"全屏显示文档"},"answer":"D","explanation":"任务栏中的“应用程序”栏用于放置已经打开窗口的最小化图标，其中，\n深色代表当前窗口。如果用户要激活其他的窗口，只需用鼠标单击代表相应窗口的图标即可。用\n户可以将常用程序“锁定”到“任务栏”上，以方便访问，还可以根据需要通过单击和拖拽操作\n重新排列任务栏上的图标。故正确答案为D。","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-97213","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word下列视图中，最能体现“所见即所得”的视图方式是（","options":{"A":"普通视图","B":"页面视图","C":"Web版式视图","D":"阅读版式视图"},"answer":"D","explanation":"搜索框中输文件名或命令，Windows 7系统就会快速搜索列出符合条件\n的程序文件，是一个非常方便的功能，但是它不能搜索计算机中关于硬件的信息。故正确答案为D。","subject":"数据库","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-35460","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"对已经保存过的文档，再次编辑后保存，选择（）命令，不再会弹出对话框。","options":{"A":"保存","B":"关闭","C":"退出","D":"另存为"},"answer":"C","explanation":"快捷方式是Windows应用程序的快捷启动方法。在程序安装的时候可\n以看到创建快捷方式，也可以通过使用创建快捷方式向导、鼠标左键拖动、右键单击应用程序选\n择“发送”“桌面快捷方式”完成快捷方式的创建。故正确答案为C。","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-67331","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word中编辑一篇文稿时，纵向选择一块文本区域的最快捷操作方法是（）。","options":{"A":"按下Ctrl键不放，拖动鼠标分别选择所需的文本","B":"按下Alt键不放，拖动鼠标选择所需的文本","C":"按下Shift键不放，拖动鼠标选择所需的文本","D":"按下Ctrl+Shift+F8组合键不放，拖动鼠标选择所需的文本"},"answer":"B","explanation":"将某一个程序的快捷方式图标删除，只是将该图标放人到了回收站中，\n程序的使用并不受影响。如需要删除程序，需要从资源管理器或程序卸载软件中卸载该程序。故\n正确答案为B。","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-55670","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word编辑状态下，操作的对象经常是被选择的内容，若鼠标在某行行首的左边，下列\n哪一项操作可以仅选择光标所在的行（）。","options":{"A":"单击鼠标左键","B":"将鼠标左键击三下","C":"双击鼠标左键","D":"单击鼠标右键"},"answer":"A","explanation":"A选项的作用是显示桌面。B选项是最小化所有窗口。C选项是将当前\n活动窗口上的内容全部选中。D选项是撤销上一步操作。故正确答案为A。","subject":"编程语言","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-57504","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"小刚在Word文档中完成了期末作业。提交前需要按作业要求调整文段格式。现需要将某\n一段落的字体改为宋体小四，下列操作可以选中该段落的是（）。","options":{"A":"在行首单击鼠标左键","B":"在行首单击鼠标右键","C":"在行内双击鼠标左键","D":"在行首三击鼠标左键"},"answer":"A","explanation":"Windows桌面是用户打开计算机、启动Windows7操作系统进人的界面，\n它是组织和管理资源的一种有效方式。桌面主要由桌面图标、桌面背景和任务栏组成。故正确答\n案为 A。\n三金标R教育","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-61955","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word文档里某行的中间要换行但又不想此段落结束，可使用的组合键是（）。","options":{"A":"Ctrl+Enter","B":"Shift-+Enter","C":"Alt+Enter","D":"Ctrl+Alt+Enter"},"answer":"C","explanation":"MP3文件的后缀名为。mp3，按照文件类型搜索时，可使用通配符＋文\n“*”和“？”。\n件后缀名。Windows 7中的通配符有\n表示所在位置上任意长度字符，“？\n表示所在位置上的一个任意字符、本题需要搜索所有mp3文件，应该输入的搜索词为\n“*.mp3”\n故正确答案为C。","subject":"多媒体","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-42","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word2010中，对某段落进行首字下沉操作时，“首字下沉”按钮是灰色无效状态，.\n其原因是（）。","options":{"A":"没有定义首行缩进","B":"计算机病毒","C":"该段落第一个字符是空格","D":"软件兼容性问题"},"answer":"D","explanation":"任务栏通常位于桌面底部。正在运行的每个应用程序或打开的每个窗\n口，在任务栏上都会有个相应的按钮。在任务栏上可以看到所有已打开应用程序和窗口的名字。\n也可以在日期区域查看日期时间，系统的通知则在通知区域显示。当前所有进程是在任务管理器\n中查看。故正确答案为D。\n13【答案】B。解析：用户拖动当前窗口至屏幕最上方，窗口将自动最大化；将最大化窗口\n向下拖拽一些，即可还原。故正确答案为B。","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-12085","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"下图中Word2010文稿的文字环绕方式是（）。\n两游客在北京野生动物园游览\n时发生纠纷，进而互相骂、斯打、\n并引起大量游客和附近动物们\n的围观。t\n两名游客后经调节后和解。但\n据北京野生动物园内部人士透露，\n由于双方厮打地点附近的动物\n是第一次看到人类打斗场面，令其\n印象深刻，当晚部分动物家庭\n在兽社内纷纷效仿，场面一一度失控。\n经过饲养员的耐心教育，动物\n们才重归于好，并知道了打架不对\n的道理。“","options":{"A":"衬于文字下方","B":"嵌人型","C":"浮于文字上方","D":"四周型"},"answer":"D","explanation":"A选项需要通过双击鼠标左键来实现；B选项通过单击鼠标左键\n来实现；C选项通过快捷键Ctrl+C来实现。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-85147","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word2010中，删除单元格的正确操作是（）。","options":{"A":"按Delete 键","B":"选择“开始”一→“删除表格”命令","C":"选择“布局”→“拆分单元格”命令 “片幽，个幽，个一，\""},"answer":"B","explanation":"A选项：在所有的窗口之间进行循环切换；B选项：实现全角和半\n角的切换；C选项：可以关闭应用程序；D选项：打开或关闭输人法。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-48248","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word2010中，输人“旺旺队”后自动改成“汪汪队”主要利用的是（）。","options":{"A":"“修正”功能","B":"“修订”功能","C":"“自动更正”功能","D":"“替换”功能"},"answer":"C","explanation":"窗口排列分为：层叠窗口、堆叠显示窗口、并排显示窗口、显示桌面。\n右击任务栏上的空白处，弹出快捷菜单。从中选择对应的命令选项即可设置窗口的排列方式。故\n正确答案为C。","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-69475","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"默认情况下，在Word2010文档里的文本下方有时会自动出现绿色波浪线，表示（）。","options":{"A":"可能的拼写错误","B":"可能的语法错误","C":"文本自带的下划线","D":"必须改正的错误"},"answer":"B","explanation":"Win7操作系统使用时，其并发性决定用户可以同时打开多个程序窗口，\n但活动窗口只能有一个。因此用户在打开多个窗口时，在某一时刻只能对一个窗口进行操作。故A、\nC、D选项说法错误。故正确答案为 B。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-90925","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"Word在编辑文档时，所见即所得的视图为（）。","options":{"A":"普通视图","B":"页面视图","C":"大纲视图","D":"分布视图"},"answer":"B","explanation":"A选项：F2用于文件或文件夹的重命名。C选项：F5的作用是刷新\n当前窗口。D选项：F1是打开帮助功能。故正确答案为B。","subject":"数据库","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-43741","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word编辑状态，打开文档“ABC”修改后另存为“ABD”则文档“ABC”","options":{"A":"被文档ABD覆盖","B":"未修改被关闭","C":"被修改未关闭","D":"被修改并关闭"},"answer":"D","explanation":"每个窗口的右上角都有“最小化”、“最大化／还原”、“关闭”按钮，\n通过它们可迅速放大或缩小窗口。窗口最小化后，它仍然在后台运行，也要占用内存资源的。故\n正确答案为 D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-58321","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"关于Word目录，下列说法正确的是（）。","options":{"A":"自录中的文字只能自动生成，不能修改","B":"目录样式只有这一种，不能自定义","C":"文章中不设置标题样式，也能自动生成相应的目录","D":"目录中的页码能自动生成，也能手动修改或刷新"},"answer":"A","explanation":"用户拖动当前窗口至屏幕最上方，窗口将自动最大化；将最大化窗口\n向下拖拽一些，即可还原。故正确答案为A。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-59776","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word中，将鼠标指针移动到所选段落的任意位置处后，连击鼠标左键3下，可以实现\n（）。","options":{"A":"选定一行","B":"选定一段","C":"选定页","D":"选定整个文档"},"answer":"B","explanation":"文件命名主要有7条规则如下：\n（1）主文件名不能省略，由一个或多个字符组成，最多可以包含255个字符。\n（2）文件使用的字母可以保留指定的大小格式，但不能用大小写区分文件名，例如：ABC\nDOC和abc.doc被认为是同一个文件。\n（3）文件名开头不可以使用空格。\n（4）文件扩展名可以使用多个字符，使用多分隔符，但只有最后一个分隔符后的部分能做\n文件的扩展名。\n（5）文件中不能使用的字符有“”、“\n等。\n（6）不允许同一个路径有两个相同文件名。\n（7）查找文件和排列文件时使用通配符，通配符有两种：\n“*”和“？”\n通配符可\n以代表所在位置上任意长字符。“？”通配符代表所在位置上的一个任意字符。\n故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-7909","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"将网页中一段文字保存到Word文档中，要复制该段文字，应该先（）。","options":{"A":"粘贴文字","B":"选中文字","C":"保存文件","D":"打开文件"},"answer":"D","explanation":"文件类型很多，不同类型的文件具有不同的用途，一般文件的类型可\n以用其扩展名来区分。故正确答案为D。","subject":"计算机网络","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-99806","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"报社编辑在编文档时把所有“符号”改成“富豪”，可以采用（）实现。","options":{"A":"批注","B":"自动更正","C":"查找和替换","D":"格式刷"},"answer":"A","explanation":"把文件从一个磁盘拖到另一个磁盘，属于复制操作。同一磁盘拖动是\n移动操作。故正确答案为A。","subject":"算法与数据结构","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-56963","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word编辑状态下，选中行文字后，按Delete 删除，该行文字（）。","options":{"A":"不能被删除","B":"被删除不能恢复","C":"被删除到回收站","D":"被删除且可以恢复"},"answer":"C","explanation":"因为进行的是剪切操作，在D：ltest 中粘贴之后，D：lstudent中的\nname.txt 文件将会不存在。故正确答案为 C。","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-14354","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Excel2010输人学生信息时，最好先输入（）字符，可以使系统将身份证号码当作\n字符处理。","options":{"A":"' B\"","C":"!","D":""},"answer":"C","explanation":"文件设置为隐藏属性后，若没有设置“不显示隐藏文件”时，文件为\n灰色图标，不能进行查看和操作，设置“不显示隐藏文件”时，设置此属性的文件不在文件列表\n中显示。只读状态是可以读，但不能编辑。故正确答案为C。","subject":"数据库","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-2902","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Excel2010中包括工作簿、工作表和单元格3个元素，这3个元素并不是独立存在的，\n而是相互关联的。据此，下列说法不正确的是（）。","options":{"A":"工作表由多个单元格组成，是构成工作簿的主要元素","B":"工作簿中可以包含多张工作表 车金标R教育","C":"单元格是存储数据的最小单元","D":"所有单元格组合在一起就构成了一个工作簿"},"answer":"B","explanation":"被删除的文件或文件夹存放在回收站这个特殊的地方。但这些文件没\n有真正从计算机硬盘上删除，只是暂时移到回收站中。用户可以将其恢复，也可以将其删除。回\n收站中的内容将保留直到清空回收站。当回收站装满后，Windows系统将自动腾出存放空间来存\n放最近删除的文件或文件夹。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-13283","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Excel中，选择一个含有数字内容的活动单元格，按住（\n)键，向右或向下拖动填充柄\n所拖过的单元格被填人的是按1递增数列。","options":{"A":"Ctr!","B":"Alt","C":"Shift","D":"Esc"},"answer":"D","explanation":"控制面板主要用来修改系统相关配置，诸如设置打印机、账户安全、\n外观和个性化设计等，但不能打开应用软件，可以卸载。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-13235","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Excel中要求将符合条件的记录按预先设定好的格式突出显示出来，使用（）可以\n实现此项功能。","options":{"A":"条件格式","B":"自动套用格式","C":"单元格格式","D":"自定义筛选"},"answer":"D","explanation":"Adiministrator是管理员账户，享有对计算机系统的最大管理管理权。\n故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-84934","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"小明在Excel2010的单元格中输人“国无防不立，民无军不安”：如果小明没有调整系\n统默认的对齐方式，那么该输入文本的对齐方式为（）。","options":{"A":"左对齐","B":"右对齐","C":"居中","D":"分散对齐"},"answer":"D","explanation":"库与传统的文件夹比较相似，两者都可以保存文件或子文件夹，\n但是“库”本质上与传统文件夹有一定的差别。传统文件夹所的文件或子文件夹都是在同一位置，\n而“库”可以将不同位置的文件或文件夹集中到一起，通过单击库中的超链接，就能够快速打开\n库的文件或文件夹，它存储的文件或文件夹位置可以是本地磁盘上也可以是移动磁盘，还可以是\n局域网中。原始文件更改库会自动更新。故正确答案为D。、","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-48506","source":"德阳","type":"单选","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Excel 2010中，某公司引用了一组单元格，它们是（C3：D7，A1：F1），该公式引用\n的单元格总数为（）。","options":{"A":"Word2010自动恢复功能的默认存盘时间是固定的，用户不可更改","B":"利用“打印预览”功能预览文档时若发现内容有误，可同时编辑内容","C":"Word2010提供密码保护文档，设置密码后须存盘后方可起效","D":"按Ctrl+F2执行打印预览，按Ctrl+P执行打印"},"answer":"D","explanation":"选项A，移动文件后，文件会从原位置消失，在目标位置出现；选项B，\n的文件都保留在磁盘上，因为只是选中操作，并没有剪切粘贴。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-88031","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"Word2010中可以将当前文档另存为PDF格式的文件。","options":{},"answer":"错误","explanation":"休眠状态属于关闭计算机的方式之-一。休眠状态下，计算机电源是\n完全关闭的，风扇停止转动。二次唤醒时，需要按下Power键开机。题干所描述的是睡眠状态的\n特点，故本题错误。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-3002","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"使用Word设置文档的纸张大小只能针对整篇文档进行设置","options":{},"answer":"错误","explanation":"在Windows 7中，系统默认情况下任务栏出现在桌面底部。我们\n可以根据需求将其拖动到桌面的上方、下方、左边或右边。","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-47715","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在对Word文档进行编辑时，如果新输人的文本会覆盖光标后面的文本，按一下键盘上的\nInsert键就可以避免这情况。\n(（)","options":{},"answer":"错误","explanation":"鼠标的双击，和两次单击是不同的概念，会实现不同的功能，双击\n是打开操作，两次单击一般是重命名操作。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-63216","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word 2010文档中，若想使一些文章的第1个字比其他字大很多，并且沉于首行下方，\n可设置首字上浮。","options":{},"answer":"错误","explanation":"任务栏最右边是显示桌面，在它的左边是系统时间区域。","subject":"操作系统","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-2592","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word表格中鼠标左键拖动单元格右下角填充柄可自动填充数据。","options":{},"answer":"错误","explanation":"对话框是Windows 7和用户进行信息交流的一个界面。对话框根据\n功能不同由不同功能框、选项卡或按钮组成。对话框的大小不能改变，标题栏没有最大化和最小\n化按钮，通常会增加“？”按钮，使用这个按钮，用户可以很方便地获得所需的求助信息。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-69600","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word中，大纲视图方式使得显示效果与打印效果相同。","options":{},"answer":"错误","explanation":"快捷键Win+D的功能是最小化或者还原窗口。","subject":"数据库","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-12362","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Word中，段落的首行缩进是指段落的第一行向里缩进一定的距离。","options":{},"answer":"正确","explanation":"打开的窗口数目过多，会占大量内存，导致计算机运行速度减慢\n8.（答案错误。解析：查找以a开头，但不知道a后面有多少个字符，也不知道扩展名长\n度是多少，因此用到的通配符*，最终结果应为a*.*","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-98664","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"新建的Excel2010工作簿默认包含3张工作表。","options":{},"answer":"正确","explanation":"文件扩展名也称为文件的后缀名，是操作系统用来标记文件类型的\n一种机制。\n10.【答案错误。解析：剪贴板是内存中的一块区域，用来临时存人入交换信息。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-53959","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"默认情况下，如果在Excel2010工作表中执行打印操作的话，会打印当前工作表格单元\n格的内容。","options":{},"answer":"错误","explanation":"直接删除的文件都会存入回收站，但通过Shift+Delete彻底删除的\n文件不会存人回收站，而是直接从硬盘上清除、删除，不可恢复。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-55904","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"在Excel中合并单元格只能合并横向的单元格。","options":{},"answer":"错误","explanation":"默认情况下USB闪存驱动器中没有回收空间。删除U盘的文件不\n能进回收站。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-95917","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"工作表中，每个单元格都有唯一的行号与列号定义的地址，如“D4”\n“A5\"","options":{},"answer":"正确","explanation":"回收站是硬盘上的一块区域，硬盘属于外部存储器，断电后信息\n不丢失；剪贴板是Windows系统内置在windows并且使用系统的内部资源RAM，或虚拟内存来\n临时保存剪切和复制的信息，断电后信息丢失。","subject":"计算机基础","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-34526","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"单元格是Excel中最小的操作单位，用户可以在单元格中输入任何数据，例如字符串、\n公式和函数等。","options":{},"answer":"正确","explanation":"控制面板是用户对计算机系统进行基本配置的重要工具，可以用\n来修改系统设置。在控制面板中，用户可以通过“添加／删除程序”打开显示所有已安装程序的\n界面，可以根据需要去选择相应的程序进行卸载或更改。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-58309","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"Excel中，用一个函数区域A4：A100和D4：D100中数值平均值的计算公式是“=AVERAGE\n(A4: D100 and D4: D100)\" .","options":{},"answer":"错误","explanation":"文件和文件夹设置为隐藏，只是设为不显示状态，并不是将其从\n计算机上彻底删除。若用户有需要，可以通过设置文件夹选项切换为显示状态。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-84943","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"Excel中，假如A2、B2单元格中的数据为1，2，C2中公式为“=A2+B2”，其他单元格均为空，\n若把C2中的公式复制到C3，则C3显示为3。","options":{},"answer":"错误","explanation":"通过“计算机”（“此电脑”），可以对文件或者文件夹进行新建、\n打开、查找、复制、删除等操作实现管理计算机的软件资源。\n17.（答案错误。解析：并不是每个窗口都有滚动条。当窗口区域显示的内容高度大于显\n示窗口的高度时，将在右侧自动出现垂直滚动条；当窗口内容的宽度大于显示窗口的宽度时，在\n底部自动出现水平滚动条。\n18.【答案正确。解析：】活动窗口是指该窗口可以接收用户鼠标和键盘输人等操作。\nWindows7是多任务操作系统，允许多个程序同时进行，但是在某一时刻，只能有一个窗口处于\n活动状态。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-84727","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"幻灯片观众自行浏览放映方式将以全屏幕方式显示。","options":{},"answer":"错误","explanation":"扩展名相当于文件类型标记，用于被对应的软件识别并打开，而\n文件夹是由资源管理器直接打开和浏览，没有指定的文件类型，因此本身没有扩展名。但要注意，\n文件和文件夹的命名规则相同，即都是可以用“文件（夹）名，扩展名”的方式命名，意为着可\n以给文件夹添加扩展名，但没有实际意义。","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-40721","source":"德阳","type":"判断","chapter":"德阳计算机题本·第四章 办公软件2010","stem":"PPT制作时，可以适当设置超级链接，用以实现幻灯片之间的轻松跳转\n车金标R教育","options":{},"answer":"正确","explanation":"文件夹扩展名没有实际意义，因此在一般情况下使用文件夹时，\n不需添加扩展名。\n第四章\n办公软件2010","subject":"办公软件","source_chapter":"德阳计算机题本·第四章 办公软件2010"},{"id":"dy-270","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"下列不属于感觉媒体的是（）。","options":{"A":"电波","B":"声音","C":"图形","D":"图像"},"answer":"A","explanation":"“状态栏”位于窗口底端，左侧用于显示当前文档页数／总页数、字数、\n输人语言等信息，右侧有视图切换按钮、比例调节等工具。故正确答案为A。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-98315","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"用于传递连续数据信息的媒体，如电缆、光缆等都属于（","options":{"A":"感觉媒体","B":"传输媒体","C":"表示媒体","D":"存储媒体"},"answer":"B","explanation":"A选项滚动条只能通过拖动来查看一个窗口中的不同部分；B选项可将\n当前窗口拆分为两个子窗口使同一篇文档在两个子窗口中显示；C选项排列窗口可将所有文档窗\n口排列在屏幕上；D 选项帮助用于Office 的更新、激活等等。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-76629","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"以下关于流媒体的说法中，正确的是（）。","options":{"A":"流媒体形式的视频可以在网络上边下载边播放","B":"流媒体不包括在线视频","C":"播放流媒体时不可以任意选择播放段落","D":"流媒体包括多媒体"},"answer":"C","explanation":"文档经修改后，在关闭文档前，会弹出对话框，询问是否对修改的文\n档进行保存。若选择“是”，则保存已修改的文档，并关闭文档；若选择“不是”，则直接关闭\n文档，修改的内容不会被保存。故正确答案为C。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-95250","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"下列选项中，对多媒体技术正确的描述是（：）。","options":{"A":"只能够展示一种类型信息媒体或处理两个不同类型信息媒体的技术","B":"能够同时获取、处理、编辑、存储和展示两个以上不同类型信息媒体的技术","C":"不能够同时获取、处理、编辑、存储和展示两个以上不同类型信息媒体的技术","D":"只能够同时获取、处理、编辑、存储和展示两个不同类型信息媒体的技术"},"answer":"B","explanation":"A选项保存时直接保存为默认的文档格式，即.docx格式；选项B另存\n为可以选择文件类型Word972003文档：选项C是打开本地现存的文件：选项D是另存为网页\n而不是文档。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-89486","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"多媒体作品通过设置超链接实现人对信息的主动选择与控制，这就是多媒体作品（）特\n点的体现。","options":{"A":"集成性","B":"思想性","C":"交互性","D":"多样性"},"answer":"C","explanation":"A选项的快捷键是Ctrl+N；B选项的快捷键是Ctrl+O；C选项Ctrl+S保\n存当前文档；D选项的快捷键是Alt+V+U。故正确答案为C。","subject":"操作系统","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-47117","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"多媒体技术基本特性中的“多样性”是指（）。","options":{"A":"信息媒体的多样化、多维化","B":"用户群体来自不同的行业","C":"存储介质的多样化","D":"多种信息处理设备的集成"},"answer":"B","explanation":"本题考查办公软件中的Word中的视图。页面视图是Word的基本\n视图方式，也是Word的默认视图，在页面视图下其显示效果与实际打印效果一致，能够进行分\n页预览，有“所见即所得”的效果。页面视图下可以进行页眉、页脚、图形和图片以及艺术字的\n编辑。故正确答案为 B。","subject":"数据库","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-25285","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"多媒体的主要关键特性不包括（","options":{"A":"信息载体的多样性","B":"交互性","C":"实时性","D":"集成性"},"answer":"B","explanation":"再次编辑的文档，若不保存，直接点击关闭，会弹出是否保存的对话框。\n若点击保存，则不弹出对话框，直接关闭文件。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-68381","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"由于数字化多媒体信息量大，多媒体系统必须对数据信息进行处理减少存储和传输压力，\n因此多媒体（）成了多媒体技术的关键技术之一。","options":{"A":"信息存储技术","B":"编码压缩技术","C":"数据库技术","D":"协同技术 三金标R教育"},"answer":"B","explanation":"选择矩形区域的方式是按住Alt键，然后拖动鼠标。选项A，可以实现\n选中多个不连续的文本：选项C，可以实现选择连续的文本；选项D，Ctrl+Shift+F8组合键打开\n扩展选区功能，打开后，按上、下、左、右方向键任意调整。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-49534","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"下列文件使用无损压缩的是（）。","options":{"A":"飞驰人生 2.rar","B":"功夫熊猫4.mpg","C":"年会不能停.mp3","D":"繁花.jpg"},"answer":"A","explanation":"本题考查Word的基本操作。在Word中若想选择光标所在行有以下几\n种方法：（1）将鼠标移到该行行首的左边（选定区）点击鼠标左键；（2）将鼠标移到该行行首（编\n辑区）按Shit+End键；（3）将鼠标移到该行行尾（编辑区）按Shift+Home键。故正确答案为A。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-12810","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"下列行为中，不属于信息集成的是（）。","options":{"A":"制作一一段带有字幕、背景音乐的视频","B":"制作一个含有文字、图片、动画的主题网站","C":"将财政局年终财务报表数据输人电子表格中","D":"使用PowerPoint将文字、图片、视频等素材加工制作成教学课件"},"answer":"D","explanation":"在选定区，单击是选中一行，双击是选中一段，三击是选定全文。在\n文档内部，单击是定位、双击是选定一一个词语，三击是选定一段。故正确答案为D。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-85244","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"多媒体作品中采用超文本形式对信息进行管理，它是一种（）的信息组织形式。","options":{"A":"抽象性","B":"线性","C":"非线性","D":"曲线性"},"answer":"B","explanation":"A、C为干扰项，Ctrl+Alt+Enter键人的是合并段落符号，就是强制把\n两个段落拼接在一起，可以实现行与行之间紧换着。故正确答案为B。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-17610","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"制作多媒体作品过程中，第一步应该做的是（）。","options":{"A":"规划与设计","B":"需求分析","C":"素材采集","D":"素材加工"},"answer":"C","explanation":"设置首字下沉的时候需要文字顶格，若段落第一个字符是空格或者没\n有选中段落，“首字下沉”按钮是灰色无效状态。故正确答案为C。\n13.答案】B。解析：A选项，开始／字体可以设置字体的字号、字形、颜色、字符间距等；\nB选项，开始／段落可以设置段落对齐方式、行间距、段落的缩进方式等；C选项，开始／样式可\n以将文字或段落按照设定好的格式进行设置；D选项，开始/编辑可以进行查找、替换、选择等操作。\n故正确答案为B。\n14.【答案D。解析：四周型环绕方式为图片再文字在四周，可以跨多行，但是是以图片为\n矩形对齐的。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-30139","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"一幅400×600像素的黑白两色图像与幅同样大小像素的16色彩图相比，所需存储空\n间（）。","options":{"A":"后者肯定大于前者","B":"无法判定其大小关系","C":"完全相同","D":"前者背定大于后者"},"answer":"D","explanation":"A选项，按Delete键后操作的结果是清空单元格的内容；B选项，“开始”\n选项卡中没有“删除表格”命令；C选项，执行的结果是将1个单元格拆分成多个单元格；D选项，\n执行的结果是删除单元格。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-54382","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"小程从网上下载了-～幅24位的分辨率1024*768的图像，那么这幅图像的大小为（","options":{"A":"2359byte","B":"2304KB","C":"18432KB","D":"1.8M"},"answer":"C","explanation":"自动更正是Word中一个自动化的功能，它能够自动修正文稿中的一\n些错误。A选项无此功能，B选项是对Word文档进行插人、删除时，可以查看插入或删除的内容，\nD选项可以对文档中需要替换的内容一次性全部替换。故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-63987","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"在RGB模式中，表示白色的是（）。","options":{"A":"RGB (0, 0, 0)","B":"RGB (255, 0, 0)","C":"RGB (0, 255, 255)","D":"RGB (255, 255, 255)"},"answer":"B","explanation":"“拼写和语法”检查工具能根据Word2010的内置字典标识出可能含\n有拼写或语法错误的单词或短语，其中红色波浪线表示单词或短语可能含有拼写错误，而绿色波\n浪线表示可能含有语法错误。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-74687","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"关于矢量图和位图图像，下面说法正确的是（）。\n三金标R教育","options":{"A":"位图图像通过图形的轮廓及内部区域的形状和颜色信息来描述图形对象","B":"矢量图形比位图图像优越","C":"矢量图适合表达具有丰富细节的内容","D":"矢量图具有放大仍然保持清晰的特征，但位图图像却不具备这样的特性"},"answer":"B","explanation":"A选项，普通视图：该视图模式下，不显示页眉、页脚、非嵌人图片\n等特殊内容，文档中可显示更多的文本信息，工作效率较高，不足之处是其显示形式无法反映出\n排版的实际效果；B选项，页面视图：可以看到页眉、页脚、图片、分栏等各种编辑、排版情况，\n与实际打印结果完全相同，即具有“所见即所得”的显示效果；C选项，大纲视图：该模式用于\n建立文档轮廓、观察文档结构及重新组织文本，一般用来显示长文档。D选项，Word中无分布\n视图的概念。故正确答案为B。\n9.【答案B。解析：打开文件编辑，在原有的文档上修改后，若选择“另存为”，将会新\n关闭；若直接点击“保存”将会覆盖原有的文档。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-95758","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"数据压缩分别为无损压缩和有损压缩，下列操作属于无损压缩的是（）。","options":{"A":"“照片.bmp” 压缩成“照片 jpg","B":"“图片-psd”压缩成“图片.rar\"”","C":"“歌曲.wav”压缩成“歌曲.mp3\"","D":"“电影.av” 压缩成“电影.mp4\""},"answer":"D","explanation":"选项A，目录中的文字在生成后也可以通过手动的方式修改目录中\n的文字。\n选项B，目录样式可以根据需要进行选择，或者自定义样式。选项C，只设置正文中的文字\n大小是无法生成目录的，还需要设置对应的大纲级别，或者直接用Word中提供好的样式进行标\n题设置。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-85668","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"微信聊天时常见的动画表情包图片格式为（）。","options":{"A":"JPG","B":"MPEG","C":"BMP","D":"GIF"},"answer":"B","explanation":"鼠标放到该段落的任意位置，三击鼠标，可以选择一个段落。当光标\n在文档内时，单击定位；双击选中词语；三击选中一段。当鼠标移动到文档左侧空白选定区时\n光标变为右上箭头。此时单击选中箭头所指一行；双击选中箭头所指一段；三击选中整个文档。\n故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-40716","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"既可以存储静态图像，又可以存储动画的图像文件格式是（","options":{"A":"gif","B":"bmp","C":"tiff","D":"jpeg"},"answer":"B","explanation":"要将网页中的文字保存到Word中，就需要先“选中”文字，然后“复\n制”，最后到Word文档中“粘贴”。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-60198","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"常用的音频采样频率是44.1kHz，它的意思是（）。","options":{"A":"每1/44.1秒采样一次","B":"每秒采样44100次","C":"每次采样的脉冲数为44100个","D":"每次采样的频段为0～44.1kHz"},"answer":"C","explanation":"执行“编辑”一→“替换”命令或者快捷键Ctrl+H，可以将查找到的内\n容按照指定的内容和格式进行替换，并且可以选择只替换某处或者全部进行替换；A选项，批注：\n阅读时在文中空白处对文章进行批语和注解：B选项，自动更正可用自动检测并更正键人错误、\n误拼的单词、语法错误和错误的大小写，是在用户输人文档内容过程中进行更正；D选项，格式刷\n快速复制文字格式、段落格式等，但不更改文字内容。故正确答案为C。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-75330","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"分钟声音，双声道、8位采样、原始声音频率为11.025kHz，数据量为（）。","options":{"A":"0.66MB","B":"2.6MB","C":"1.32KB","D":"20.7MB"},"answer":"D","explanation":"选中文字后按Delete键删除，该行文字会被删除，按Ctrl+Z键可撤销\n刚才的操作并恢复被删除的文字。C回收站是微软Windows操作系统里的其中一个系统文件夹，\n主要用来存放用户临时删除的文件、文件夹、图片、快捷方式和Web页等资料，存放在回收站\n的文件可以恢复。故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-56383","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"下列不属于音频格式的是（）","options":{"A":"wma","B":"wav","C":"midi","D":"wmv"},"answer":"A","explanation":"在Excel中，输人文本型数据时，文本可以是数字、空格和非数字字\n符及它们的组合。对于数字形式的文本型数据，如学号、身份证号等，数字前加单引号（英文半\n角），用于区分纯数值型数据。故正确答案为A。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-62100","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"（）文件称为波形文件，是微软公司的音频文件格式来源于对声音模拟波形的模样。","options":{"A":"WAV","B":"MIDI","C":"MP3","D":"AIF"},"answer":"D","explanation":"所谓工作簿是指Excel环境中用来储存并处理工作数据的文件。也就\n是说Excel文档就是工作簿。它是Excel工作区中一个或多个工作表的集合。工作表是显示在工\n作簿窗口中的表格Excel默认有三张工作表，用户可以根据需要添加工作表。工作簿是由工作表\n组成，工作表由单元格组成，并且单元格是存储数据的最小单元。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-80954","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"在音频数字化的过程中，对模拟语音信号处理的步骤依次为（）。","options":{"A":"采样、量化、编码","B":"量化、采样、编码","C":"采样、编码、量化","D":"编码、量化、采样"},"answer":"A","explanation":"本题考查Excel数据填充的操作。单击一个含有数字的单元格，当鼠\n标变成实心十字填充柄时，同时按住Ctrl键下拉，即可填充递增数列。B选项“Alt”快速填空相\n同内容。故正确答案为A。","subject":"编程语言","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-76992","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"下列哪些文件是属于同一类型的（）。\n①峨眉山.mid；②九华山.tiff；③黄山.avi；④井冈山·psd；赵本山.rmvb","options":{"A":"①和③②和④","B":"②和④ D和5","C":"②和③ ④和5","D":"②和4 ③和5"},"answer":"A","explanation":"本题考查Excel中辅助功能的使用方法的使用方法。A选项条件格式\n是指突出显示符合条件的记录，使用方法：单击“开始”选项卡一→“样式”组一→“条件格式”下\n方的三角形按钮，可以进行相应的条件格式的设置，选择“突出显示单元格规则”；B选项自动\n套用格式是指使用自动套用格式可以快速设置单元格和数据清单的格式：C选项单元格格式指可\n以在设置单元格格式对话框中设置数据的格式；D选项数据筛选指对数据清单中满足条件的数据\n筛选出来，不满足条件的数据暂时隐藏起来，·但没有被删除。当筛选条件被删除时，隐藏的数据\n便恢复显示。故正确答案为A。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-11309","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"如果不进行数据压缩，直接将分辨率为640*480的彩色图像（每像素用24bit表示），以\n每秒25顿显示，那么它需要占用的通信带宽为多少（）。","options":{"A":"46Mbps","B":"92Mbps","C":"184Mbps","D":"368Mbps"},"answer":"A","explanation":"若单元格中输人的内容为文字，则为左对齐；若单元格中输入的内容\n为数字，则为右对齐。故正确答案为 A。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-60779","source":"德阳","type":"单选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"下列文件中，不属于视频文件的是（）。","options":{"A":"sound.mpg","B":"sound.rmvb","C":"sound.avi","D":"sound.tif"},"answer":"C","explanation":"冒号“：”连接区域运算符，对两个引用之间包括两个引用在内的所\n有单元格进行引用（由单元格组成的区域）。逗号“，”联合操作符，可将多个引用合并为一个\n引用（单元格的并集）。C3：D7的单元格数目为2*5=10，A1：F1的单元格数目为6，而“，\n表示计算单元格的并集，因此该公式引用的单元格总数为10+616。故正确答案为C。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-51309","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"以下关于流媒体说法错误的是（","options":{"A":"只有视频才有流媒体","B":"流媒体的特点是沉浸感、交互性 二金标R教育","C":"多媒体就是流媒体","D":"流媒体指在因特网或者局域网中使用流式传输技术，由媒体服务器向用户实时传送音频、 视频或多媒体技术"},"answer":"AD","explanation":"B选项的功能是将文档保存；C选项的功能是全选。故正确答案为\nAD.","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-37321","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"下列关于“像素”的描述，错误的是（）。","options":{"A":"像素是图像的最基本单位","B":"像素点显示颜色的数量与图片的色彩位数无关","C":"色彩位数为1，表示像素点的颜色只能是黑色","D":"色彩位数为4，表示像素点可显示4种颜色"},"answer":"CD","explanation":"剪贴板是内存中的一块区域，是Windows 内置的一个非常有用的工具\n通过小小的剪贴板，架起了一座桥，使得在各种应用程序之间，传递和共享信息成为可能。剪贴\n板可以保留24份数据。当保留24份数据之后，每当新的数据传人，旧的便会被覆盖。故正确答\n案为 CD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-71008","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"日常会议中需要一些图片资源来辅助参会人员理解，那么下列可用的是（）。","options":{"A":"MPG","B":"JPG","C":"BMP","D":"GIF"},"answer":"ABD","explanation":"在段落格式中可以设置缩进、行间距、段前段后间距和对齐方式\n字间距在字体对话框中设置。故正确答案为ABD。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-93772","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"“画图”程序中不能保存的文件类型有（）。","options":{"A":"bmp","B":"png","C":"gif","D":"txt"},"answer":"ABCD","explanation":"页眉和页脚是指在文档每一页的顶部和底部加人信息。这些信\n息可以是文字和图形等。内容可以是文件名、标题名、日期、页码、单位名等。故正确答案为\nABCD.","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-35094","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"不同的图片格式特点不一样，下列属于常用图片格式的是（）","options":{"A":"wav","B":"png","C":"jpg","D":"tif"},"answer":"AB","explanation":"脚注位于页面的底部，可以作为文档某处内容的注释。尾注位于文档\n的结尾处，说明引用的文献。故正确答案为AB。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-79305","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"计算机中存储了各种类型的文件，以下文件的扩展名和类型相符的是（","options":{"A":"文档：txt、doc、wps、html","B":"视频文件：avi、mpeg、rm、wmv","C":"图形图像：jpg、bmp、gif、pptx","D":"音频文件：mp3、wav、midi、wma"},"answer":"AC","explanation":"Word中默认的字体是宋体五号，四号>五号。Word中字符大小有两\n种表示方式，磅值和字号。磅值越大，字符越大；字号越小，字符越大。故正确答案为AC。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-97385","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"点阵（位）图的图像质量主要由图像的（）决定。","options":{"A":"分辨率","B":"色彩位数","C":"内存","D":"亮度"},"answer":"AD","explanation":"可以通过单击“自定义水印”命令，打开“水印”对话框，在“水印\n对话框中，选择“文字水印”，在“文字”选项卡中可以选择所提供的文字也可以任意输人自已\n想要输人的内容。可以在“颜色”选项卡中任意设置水印文字颜色，还可以在“字体”选项卡和“字\n号”选项卡中任意设置水印文字的字体和字号。故正确答案为AD。","subject":"计算机基础","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-67225","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"进行声音采集的时候，为了提高录音的效果下列哪些做法是正确的（）。","options":{"A":"录音环境要安静，避免录制过多的噪音","B":"录音时，距离话筒不能太远，否则可能录制的声音音量太小","C":"录音时尽可能的贴近话筒获得更好的音质，以能清晰听到呼吸声为佳","D":"在录制开始后，应先录制一段空白，用于降噪时的噪音采样"},"answer":"AD","explanation":"Shift+Enter组合键的作用是向上移动单元格；Alt+Enter组合键的作用\n是重复上一操作或在单元格内换行。两者均没有关闭工作簿的功能。故正确答案为AD。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-45715","source":"德阳","type":"多选","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"声音的三要素包括（）。","options":{"A":"音质","B":"音色","C":"音强","D":"音调"},"answer":"ABCD","explanation":"通过数据有效性的设置可以设置以下内容：\n数据有效性\n设置\n输入信息\n出错警告输入法模式\n有效性条件\n允许：\n任何值\n忽略空值（B）\n任何值\n故正确答案为ABCD。\n11.【答案ABD。解析：本题考查Excel的求和公式。C项中表示区域的分隔符不对；D项\n中带双引号的数值为文本型数值，在Excel2010中，可以将字符串数值自动转换为数值，参与到\n函数运算中。故正确答案为 ABD。\n.12.【答案】CD。解析：选项A，COUNTBLANK统计的是指定单元格区域中空白单元格的个\n数；选项B，COUNT统计的是指定区域中包含数字的单元格个数；选项C，SUMIF是对满足条件\n的单元格求和；选项 D，RANK 是一个排名函数。故正确答案为 CD。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-34629","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"多媒体就是各种信息媒体的简单复合。","options":{},"answer":"正确","explanation":"在Word2010中可以通过“文件一另存为”操作，在对话框中选择\n保存类型为PDF格式，即可以把当前文档转为PDF格式的文件。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-96045","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"超文本是用超链接的方法，将各种不同空间的文字信息组织在一一起的网状文本。","options":{},"answer":"错误","explanation":"默认情况下，设置文档纸张大小将用于整篇文档，如果一个文档中，\n一部分页要求用A4纸，另一部分页要求用A3纸，也就是同一文档要求设置不同的纸张大小，\n在自定义纸张大小时，有一个选项是“应用于”，它默认选择“整篇文档”，还有一个选项“插\n人点之后”，用它就可以实现将同一文档设置为不同的纸张大小。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-10375","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"网络上的在线视频主要是以流媒体方式从视频服务器传送到用户计算机上进行播放的。","options":{},"answer":"正确","explanation":"Word文本输入过程中存在两种输入状态，即插人状态和改写状态，\n通过键盘上的Insert键实现在两种状态之间的切换。插入状态也就是常用的模式，改写模式就是\n在输入时后把后面的覆盖改写掉。\n4.【答案错误。解析：设置首字下沉，是指把文档中某段落的第一行的第一个字或前几个\n字的字体变大，吸引注意。所以应该设置“首字下沉”。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-53644","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"矢量图的特点是放大后图像不会失真，和分辨率无关，适用于图形设计、文字设计和一些\n标志设计、版式设计等。","options":{},"answer":"错误","explanation":"Word表格支持文字处理、排版、制作报纸等等。但是不具有自动更\n新数据以及填充数据的功能。Excel电子表格软件它由强大的表格功能，可以自动更新表格数据，\n也可以在单元格右下角利用填充柄，填充数据。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-39116","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"存储某1024色位图的一个像素需要10个二进制位。","options":{},"answer":"错误","explanation":"页面视图：可以看到页眉、页脚、图片、分栏等各种编辑、排版情况，\n与实际打印结果完全相同，即具有“所见即所得”的显示效果；大纲视图：该模式用于建立文档\n轮廓、观察文档结构及重新组织文本，一般用来显示长文档。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-56972","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"将一幅BMP格式图片转换成JPG格式，图片质量会变得更高。","options":{},"answer":"正确","explanation":"首行缩进是控制段落中的第一行第一个字符的起始位置。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-77523","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"MP3是一种压缩比较低，声音质量较好的音频格式","options":{},"answer":"正确","explanation":"在Word中，默认的图片环绕方式是嵌人型，除此之外还有四周型、\n紧密型、衬于文字下方、浮于文字上方。\n.9.【答案】正确。解析：Excel 2010中新建的工作簿中默认有三张工作表，分别为 Sheet1、\nSheet2、 Sheet3。\n10答案】错误。解析：在Excel2010中设置高级筛选时，条件区域中同一行的表达式表示“并\n且”的逻辑关系，不同行的表达式表示“或者”的逻辑关系。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-84761","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"RGB是彩色印刷时采用的一种套色模式，利用色料的三原色混色原理，加上黑色油墨，\n共计四种颜色混合叠加，形成所谓“全彩印刷”。","options":{},"answer":"错误","explanation":"在Excel2010工作表中设置打印区域，默认情况下，如果用户在\nExcel2010工作表中执行打印操作的话，会打印当前工作表中所有非空单元格中的内容。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-95349","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"图形和图像是一样的。","options":{},"answer":"错误","explanation":"合并单元格可以横向和纵向合并。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-82689","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"彩色图像中的每个像素，可以使用3个字节来表示，每个字节分别表示此像素中的红、绿、\n蓝成分，每个字节用来储存该成分在256个等级中的某一量值。","options":{},"answer":"正确","explanation":"Excel工作表中，单元格的地址使用它所在的列标和行号表示。列\n标用英文大写字母表示，行号用阿拉伯数字表示，例如A3表示第三行第一列所处的单元格。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-66670","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"超文本结构就是文本的构成不仅有文字文本，而且有声音文本、图像文本、动画文本甚\n至影视文本。","options":{},"answer":"正确","explanation":"单元格是Excel的最小组成单位，由行和列交叉构成。单元格中可\n以输人文本、数值、日期、公式、函数等。","subject":"办公软件","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-42689","source":"德阳","type":"判断","chapter":"德阳计算机题本·第五章 多媒体技术","stem":"为了提高视频类文件的储存和传输效率，般要对数字化了的视频信息进行压缩处理，\n通常使用 Winrar、WinZip 等压缩软件。\n三金标R教育","options":{},"answer":"错误","explanation":"在Excel中，引用运算符“，”是联合操作符，可将多个引用合\n并为一个弓I用（单元格的并集），AVERAGE（A4：A100，D4：D100）表示计算A4：A100和\nD4：D100中数值平均值。","subject":"多媒体","source_chapter":"德阳计算机题本·第五章 多媒体技术"},{"id":"dy-29733","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"交换机是工作在（）的网络设备。","options":{"A":"应用层","B":"网络层","C":"数据链路层","D":"物理层"},"answer":"A","explanation":"感觉媒体是指能直接作用于人的感官让人产生感觉的媒体。选项B作\n用于听觉，选项C和D作用于视觉。电波属于传输媒体。故正确答案为A。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-3458","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"网络技术的核心是（","options":{"A":"计算机与多媒体技术","B":"多媒体技术与现代通信技术","C":"计算机与现代通信技术","D":"数据库网络技术与多媒体技术"},"answer":"B","explanation":"感觉媒体是指能直接作用于人的感官让人产生感觉的媒体，如图文声\n像等；传输媒体是指将表示媒体从一处传送到另一处的物理载体，包括导线、电缆、电磁波等；\n表示媒体指的是对感觉媒体的各种编码，包括语言编码、文本编码和图像编码等；存储媒体是指\n用于存储表示媒体的介质，包括内存、硬盘、软盘、磁带和光盘等。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-27632","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"下列有关计算机网络叙述错误的是（）。","options":{"A":"利用Internet网可以使用远程的超级计算中心的计算机资源","B":"以接入的计算机多少可以将网络划分为广域网","C":"建立计算机网络的主要目的是实现资源共享","D":"计算机网络是在通信协议控制下实现计算机互联"},"answer":"A","explanation":"B选项，流式传输方式可以使用户边下载、边播放，而不是等到所有\n数据下载完后才能播放，比如爱奇艺、腾讯视频等在线视频网站中的媒体。C选项，流媒体传输\n具有实时性和连续性的特点，可以任意选择视频中的段落进行播放。D选项，流媒体技术是一种\n新的媒体传送方式，而非一一种新的媒体，是指以流式传输方式在因特网中传输音频、视频等媒体\n文件的形式。故正确答案为A。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-5272","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"计算机网络的主要应用有情报、资料检索、远程教育、金融系统、军事应用等。因特网在\n发展过程中最初的应用是（）。","options":{"A":"情报资料检索","B":"远程教育","C":"金融系统","D":"军事应用"},"answer":"B","explanation":"多媒体技术就是计算机综合处理文本、图形图像、声音视频等媒体信息，\n使它们之间建立连接，从而集成一个具有良好交互功能的整体技术，故多媒体技术能够同时获取、\n处理、编辑、存储和展示两个以上不同类型信息媒体的核术。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-36895","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"宇宙飞船在执行飞行任务的过程中，需要发射、测控等部门的计算机互相协作，共同完成\n数据处理任务，这主要体现的网络功能是（）。","options":{"A":"分布处理","B":"资源共享","C":"数据通信","D":"文件传输"},"answer":"C","explanation":"A选项集成性：能够对信息进行多通道统一获取、存储、组织与合成。\nB选项思想性：主题明确，内容积极、健康向上，与时代主题相呼应，表现流畅；作品能科学、\n完整地表达主题思想。C选项交互性：是多媒体应用有别于传统信息交流媒体的主要特点之一一。\n传统信息交流媒体只能单向地、被动地传播信息，而多媒体技术则可以实现人对信息的主动选择\n和控制。D选项多样性：是指文字、文本。图形、视频、语音等多种媒体信息于一体。故正确答\n案为 C。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-69188","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"网上共享的资源有（","options":{"A":"硬件、软件和数据","B":"软件、数据和信道","C":"通信子网、资源子网和信道","D":"硬件、软件和服务"},"answer":"A","explanation":"简单地说，多媒体技术就是计算机综合处理文本、图形图像、声音视\n频等多种媒体信息，使它们之间建立连接，从而集成一个具有良好交互功能的整体技术。故正确\n答案为 A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-54","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"计算机网络最突出的优点是（）。","options":{"A":"精度高","B":"共享资源","C":"运算速度快","D":"容量大"},"answer":"A","explanation":"本题考查多媒体技术的特征。多媒体技术的特征有：数字化、集成性、\n交互性、非线性、实时性。故正确答案为 A。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-56785","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"三网融合是一种广义的、社会化的说法，广泛来说是指电信网、计算机网和（）三大网\n络的物理合一，但就具体而言，主要是指高层业务应用的融合。","options":{"A":"有线电视网","B":"移动网","C":"联通网","D":"互联网"},"answer":"B","explanation":"编码压缩技术采用编码技术来压缩数据信息量，是多媒体的关键技术\n之一。因此答案为B。信息存储技术：跨越时间保存信息的技术，主要包括数据压缩技术、缩微\n存储技术、光盘存储技术等；数据库技术：研究如何组织和存储数据，如何高效地获取和处理数\n据的技术；协同技术：各种媒体之间必须有机地配合才能协调一致，协同技术用于协调多媒体之\n间的时间、空间等因素。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-68249","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"计算机网络从逻辑上可分为通信子网和资源子网两大部分，以下属于资源子网的是（）。","options":{"A":"转发器","B":"交换机","C":"主机","D":"集中器"},"answer":"A","explanation":".mpg为视频文件格式，属于有损压缩。mp3为音频文件格式，属于有\n损压缩。.jpg为图片文件格式，属于有损压缩。.rar为压缩格式，属于无损压缩。故正确答案为A。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-57685","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"计算机网络的拓扑结构主要取决于（）。","options":{"A":"资源子网","B":"通信子网","C":"路由器","D":"FDDI 网"},"answer":"C","explanation":"信息集成性是多媒体的典型特征，包括两个方面的含义，一是多种媒\n体信息的集成，包括信息的多方式获取、信息表现的合成等多个方面。二是处理多媒体信息系统\n的集成，包括硬件设备的集成和软件设备的集成。\n选项A、B、D综合了文字、声音、图像、视频、动画等形式，体现了信息表现形式合成这一特点。\n故正确答案为C。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-79501","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"学校小型局域网属于哪种网络拓扑（）。","options":{"A":"环型拓扑","B":"星型拓扑","C":"树型拓扑","D":"网状拓扑"},"answer":"B","explanation":"多媒体作品开发的一般过程依次是：需求分析、规划设计、素材采集\n和加工、作品集成与测试、发布与评价。故正确答案为B。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-84405","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"地理范围覆盖一个城市，个国家，甚至全球的网络叫做（","options":{"A":"局域网","B":"广域网","C":"城域网","D":"Internet"},"answer":"A","explanation":"使用扫描仪扫描的图像、普通数码相机拍摄的照片、Photoshop处理的\n图片都是由外界获取的，属于位图：而Flash中绘制的图形，是由线条和色块组成，属于矢量图。\n故正确答案为A。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-61674","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"按地理范围大小划分。学校计算机教室的网络，属于（","options":{"A":"LAN","B":"MAN","C":"WAN","D":"WLAN"},"answer":"B","explanation":"图像分辨率是指单位英寸中所包含的像素点数，是衡量图像好坏\n的指标。在尺寸一样的情况下，图像的分辨率越高，所包含的像素就越多，图像就越清晰，存储\n空间越大。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-21311","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"下图所示的拓扑结构图所属类型是（）。","options":{"A":"混合型","B":"环型","C":"星型","D":"总线型 交换机 工作站 工作站 工作站 工作站 正作站"},"answer":"A","explanation":"图像数据量=图像的总像素×颜色深度/8（Byte），两图的像素大\n小相同，颜色深度是指图像中每个像素的颜色信息所占二进制位数，一位可以表示两种颜色，因\n此，黑白两色的颜色深度为1，16色彩图颜色深度为4，所以后者所需存储空间大于前者。故正\n确答案为 A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-79218","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"下列4种表示方式中，（）用来表示计算机局域网。","options":{"A":"LAN","B":"MAN","C":"www","D":"WAN"},"answer":"D","explanation":"本题考查的是位图和矢量图的区别，最主要的区别在于位图放大后会\n失真，而矢量图不会。其中A选项位图是由像素块组成的；B选项相比之下位图的图像色彩丰富\n比较优越；C选项位图常用来表达丰富细节的内容，而矢量图用来表达文字或商标等简单的图形。\n故正确答案为D。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-22208","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"覆盖范围小，传输速率较高的是（","options":{"A":"局域网","B":"广域网","C":"城域网","D":"国际互联网"},"answer":"B","explanation":"本题考查的是图形图像文件大小的计算，图形图像文件大小的计算方\n式为像素总量*颜色深度，根据图片可知，照片大小为：1024*1024*24/8=3MB，故10MB的U盘\n能够存储3张这样的照片。故正确答案为B。\n全金标尺教育\n20.【答案B。解析：有损压缩是指利用了人类对图像或声波中的某些频率成分不敏感的\n特性，允许压缩过程中损失一定的信息。有损压缩广泛应用于动画、声音和图像文件中，包括\n影音文件格式 mpg、mp4、音乐文件格式 mp3和图像文件格式 jpg等。\n无损压缩格式，是指利用数据的统计穴余进行压缩，可完全恢复原始数据而不引起任何失真\n常见的有 zip格式、rar 格式、tiff 格式、gif 格式、png格式等。故正确答案为 B。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-3737","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"关于OSI参考模型的描述中，正确的是（）。","options":{"A":"高层为低层提供所需的服务","B":"高层需要知道低层的实现方法","C":"不同节点的同等层有相同的功能","D":"不同节点需要相同的操作系统"},"answer":"D","explanation":"GIF格式图片的特点是文件小，是网络上常见的动画图片格式。JPG\n是静态图像格式，MPEG是视频格式。BMP是Windows用位图，不适于网络传送，不适于提供印\n刷文件。故正确答案为D。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-56173","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"OSI模型即开放式通信系统互联参考模型，是国际标准化组织（ISO）提出的一个试图使\n各种计算机在世界范围内互联为网络的标准框架，它自下而上有（）个层次。","options":{"A":"4","B":"5","C":"6","D":"7"},"answer":"A","explanation":"gif是一种无损压缩的图像格式，既可以存储静态图像，又可以存储动\n态图像；bmp是一种不压缩的静态图像格式，文件比较大，不适合网络传输；tiff是静态图像格式，\n图像格式复杂，存储信息多，支持压缩、非压缩和无损压缩格式，支持多平台应用；ipeg是静态\n图像的存储格式，有损压缩，压缩比高，图像质量高，文件存储量小。故正确答案为A。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-1995","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"对OSI模型的数据链路层描述正确的是（，）。","options":{"A":"保证数据正确的顺序，无错和完整","B":"处理数据信号通过链路的传输","C":"提供网络转接接口","D":"控制报文通过网络的路由选择："},"answer":"B","explanation":"采样频率是指1s内采样的次数，单位Hz。故正确答案为B。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-81960","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"TCP/IP是（）。","options":{"A":"一一种网络操作系统","B":"-个网络地址","C":"一种网络通信协议","D":"个网络部件"},"answer":"B","explanation":"音频文件大小=（采样频率×采样精度×声道数）×时间/8（字节）。\n原始声音频率为11.025kHz，根据奈奎斯特理论：采样频率不应低于模拟音频信号最高频率的两倍。\n即11.025*2=22.05kHz。将数据代人公式可得：22.05*1000*8*2*60/（8*1024*1024）～2.52MB。\n故正确答案为 B。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-49473","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"ARP协议通过广播方式完成的映射是（）。","options":{"A":"从网卡地址到IP地址","B":"从IP地址到网卡地址","C":"从域名到IP地址","D":"从IP地址到域名"},"answer":"C","explanation":"分辨率为640*480的真彩色图像的大小为：640*480*24=7372800b，\n以每秒25顿的速度显示，则带宽为：7372800b*25=184320000bps，大约为184Mbps。故正确答案\n为 C。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-19686","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"计算机网络三要素（","options":{"A":"交换机和路由器","B":"网络协议","C":"通信线路和连接设备","D":"计算机设备"},"answer":"A","explanation":"感觉媒体是指能直接作用于人的感官让人产生感觉的媒体。选项B作\n用于听觉，选项C和D作用于视觉。电波属于传输媒体。故正确答案为A。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-68844","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"计算机网络按照功能分为（）。","options":{"A":"逻辑子网","B":"数据子网","C":"资源子网","D":"通信子网"},"answer":"B","explanation":"感觉媒体是指能直接作用于人的感官让人产生感觉的媒体，如图文声\n像等；传输媒体是指将表示媒体从一处传送到另一处的物理载体，包括导线、电缆、电磁波等；\n表示媒体指的是对感觉媒体的各种编码，包括语言编码、文本编码和图像编码等；存储媒体是指\n用于存储表示媒体的介质，包括内存、硬盘、软盘、磁带和光盘等。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-48218","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"如下结构中两个较常见的计算机局域网络的拓扑结构是（","options":{"A":"星型结构","B":"交叉结构","C":"关系结构","D":"总线结构"},"answer":"A","explanation":"B选项，流式传输方式可以使用户边下载、边播放，而不是等到所有\n数据下载完后才能播放，比如爱奇艺、腾讯视频等在线视频网站中的媒体。C选项，流媒体传输\n具有实时性和连续性的特点，可以任意选择视频中的段落进行播放。D选项，流媒体技术是一种\n新的媒体传送方式，而非一一种新的媒体，是指以流式传输方式在因特网中传输音频、视频等媒体\n文件的形式。故正确答案为A。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-46694","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"传输层的协议有（）","options":{"A":"IP","B":"TCP","C":"RARP","D":"UDP"},"answer":"B","explanation":"多媒体技术就是计算机综合处理文本、图形图像、声音视频等媒体信息，\n使它们之间建立连接，从而集成一个具有良好交互功能的整体技术，故多媒体技术能够同时获取、\n处理、编辑、存储和展示两个以上不同类型信息媒体的核术。故正确答案为B。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-57513","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"关于计算机网络协议，下面说法正确的是（）。","options":{"A":"网络协议就是网络通信的内容","B":"制定网络协议是为了保证数据通信的正确、可靠 全金标R教育","C":"计算机网络的各层结构模型及其协议的集合，称为计算机网络的体系结构","D":"网络协议通常由语义、语法、变换规则3部分组成"},"answer":"A","explanation":"简单地说，多媒体技术就是计算机综合处理文本、图形图像、声音视\n频等多种媒体信息，使它们之间建立连接，从而集成一个具有良好交互功能的整体技术。故正确\n答案为 A。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-19709","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"根据传输媒介的不同，信道可分为有线信道和无线信道两类，常见的有线信道包括（\n)等。","options":{"A":"双绞线","B":"同轴电缆","C":"光缆","D":"短波"},"answer":"A","explanation":"本题考查多媒体技术的特征。多媒体技术的特征有：数字化、集成性、\n交互性、非线性、实时性。故正确答案为 A。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-10868","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"光纤通信的优点包括（）","options":{"A":"传输损耗小","B":"抗干扰性能好","C":"保密性好","D":"体积小、重量轻"},"answer":"B","explanation":"编码压缩技术采用编码技术来压缩数据信息量，是多媒体的关键技术\n之一。因此答案为B。信息存储技术：跨越时间保存信息的技术，主要包括数据压缩技术、缩微\n存储技术、光盘存储技术等；数据库技术：研究如何组织和存储数据，如何高效地获取和处理数\n据的技术；协同技术：各种媒体之间必须有机地配合才能协调一致，协同技术用于协调多媒体之\n间的时间、空间等因素。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-70068","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"以下属于数据链路设备的是（）","options":{"A":"集线器","B":"交换机","C":"路由器","D":"网桥"},"answer":"C","explanation":"信息集成性是多媒体的典型特征，包括两个方面的含义，一是多种媒\n体信息的集成，包括信息的多方式获取、信息表现的合成等多个方面。二是处理多媒体信息系统\n的集成，包括硬件设备的集成和软件设备的集成。\n选项A、B、D综合了文字、声音、图像、视频、动画等形式，体现了信息表现形式合成这一特点。\n故正确答案为C。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-46414","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"有效的IP地址是（","options":{"A":"208.25.81","B":"203.8.12.45","C":"57.1.254.89","D":"108.18.256.90"},"answer":"C","explanation":"超文本（Hypertext）是用超链接的方法，将各种不同空间的文字信息\n组织在一起的非线性文本。非线性：是指文本中遇到的一些相关内容通过链接组织在一起，用户\n可以很方便地浏览这些相关内容。这种文本的组织方式与人们的思维方式和工作方式比较接近\n其要点为：文本十超链接。故正确答案为C。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-30984","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"下列哪些域名正确（）。","options":{"A":"www.shice.edu.cn","B":"www.cfan.com.cn","C":"www, cernet, edu.cn","D":"www.shiss, net, cn"},"answer":"B","explanation":"多媒体作品开发的一般过程依次是：需求分析、规划设计、素材采集\n和加工、作品集成与测试、发布与评价。故正确答案为B。","subject":"编程语言","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-82427","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"下面关于URL的叙述错误的是（）。","options":{"A":"URL 是 E--mail 地址","B":"URL由协议名称，主机名和路径组成","C":"网址就是URL","D":"URL是主机名称"},"answer":"A","explanation":"使用扫描仪扫描的图像、普通数码相机拍摄的照片、Photoshop处理的\n图片都是由外界获取的，属于位图：而Flash中绘制的图形，是由线条和色块组成，属于矢量图。\n故正确答案为A。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-78981","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"下列关于电子邮件的说法，描述正确的是（）。","options":{"A":"电子邮件只能发文字信息","B":"电子邮件只能一对一一发送，不能一对多发送","C":"电子邮件的地址是唯一的","D":"只要知道对方的邮件地址，可以给世界上任意用户发送邮件"},"answer":"B","explanation":"图像分辨率是指单位英寸中所包含的像素点数，是衡量图像好坏\n的指标。在尺寸一样的情况下，图像的分辨率越高，所包含的像素就越多，图像就越清晰，存储\n空间越大。故正确答案为B。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-8869","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"想要设计出好的网页，应遵循三条原则，包括（）。","options":{"A":"色彩丰富","B":"有创意，新颖，有特殊","C":"有充实的内容和浏览价值","D":"布局应具有艺术性"},"answer":"B","explanation":"图像文件的大小=像素总量×颜色深度/8（字节），图像大小\n=1024 × 768 ×24（bit）=1024× 768 ×24 8（Byte）=768×248（KB）=2304KB。故正确答案为 B。\n17【答案】D。解析：RGB颜色模式包含三个颜色通道，每个通道用8位二进制数表示，RGB（0\n0，0）表示黑色，RGB（255，255，255）白色，RGB（255，0，0）表示红色，RGB（0，255，\n255）表示青色。故正确答案为D。","subject":"计算机基础","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-50175","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"小程做了一个“桉树岑山”的网站，应从（）方面进行网站评价。","options":{"A":"主题明确、突出，内容健康、新颖","B":"布局合理，结构明确","C":"交互性良好，超链接无断连","D":"素材丰富，色彩搭配协调"},"answer":"D","explanation":"本题考查的是位图和矢量图的区别，最主要的区别在于位图放大后会\n失真，而矢量图不会。其中A选项位图是由像素块组成的；B选项相比之下位图的图像色彩丰富\n比较优越；C选项位图常用来表达丰富细节的内容，而矢量图用来表达文字或商标等简单的图形。\n故正确答案为D。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-29511","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"一个HTML文件的元素体是由（）三部分组成的。","options":{"A":"head元素","B":"font 元素","C":"html元素","D":"body元素"},"answer":"B","explanation":"本题考查的是图形图像文件大小的计算，图形图像文件大小的计算方\n式为像素总量*颜色深度，根据图片可知，照片大小为：1024*1024*24/8=3MB，故10MB的U盘\n能够存储3张这样的照片。故正确答案为B。\n全金标尺教育\n20.【答案B。解析：有损压缩是指利用了人类对图像或声波中的某些频率成分不敏感的\n特性，允许压缩过程中损失一定的信息。有损压缩广泛应用于动画、声音和图像文件中，包括\n影音文件格式 mpg、mp4、音乐文件格式 mp3和图像文件格式 jpg等。\n无损压缩格式，是指利用数据的统计穴余进行压缩，可完全恢复原始数据而不引起任何失真\n常见的有 zip格式、rar 格式、tiff 格式、gif 格式、png格式等。故正确答案为 B。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-91107","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"从物理连接上讲，计算机网络由计算机系统、通信链路和网络节点组成","options":{},"answer":"正确","explanation":"超文本（Hypertext）是用超链接的方法，将各种不同空间的文字信\n息组织在一起的非线性文本。非线性：是指文本中遇到的一些相关内容通过链接组织在一起，用\n三金标尺教育\n户可以很方便地浏览这些相关内容。这种文本的组织方式与人们的思维方式和工作方式比较接近。","subject":"编程语言","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-38276","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"互联网中基于TCP/IP协议的电子邮件系统采用的是客户机/服务器工作模式，整个系统的\n核心是客户机。\n()","options":{},"answer":"正确","explanation":"流媒体是指以流的方式在网络中传输音频、视频等媒体文件的技\n术形式，可以使用户边下载边播放。具有实时性和连续性的特点，网络上的视频大多数是以流媒\n体方式进行播放，\n4.【答案正确。解析：多媒体技术是利用计算机对文字、图形、图像、动画、音频、视频\n等多种媒体信息进行综合处理的计算机应用技术。\n5．【答案正确。解析：量图的特点是放大后图像不会失真，一般适用于文字、商标等相\n对规则的图形等。而位图是由像素点构成的图，特点是放大后失真，一般用于表示照片或者复杂\n的图像等。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-82330","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"表示层是OSI参考模型的最高层，是用户与网络的接口，该层通过应用程序来完成网络用\n户的应用需求。如文件传输、收发电子邮件等。","options":{},"answer":"正确","explanation":"本题考查图像图形的基本属性。存储色位都需要用2的整次幂来表示，\n1024色位就是2的10次幂。因此本题正确。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-63415","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"发送电子邮件时，由网站的POP3服务器把邮件发送到收件人的邮箱里。\n()","options":{},"answer":"错误","explanation":"BMP是Bitmap（位图）简写，Windows标准文件格式，图像内容丰\n富，几乎不进行压缩，占用磁盘空间大。JPG文件是有损压缩文件，由BMP格式转换成JPG格式，\n图片质量会降低。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-67958","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"物理层是OSI参考模型的最底层，它主要关心的是通过物理链路从一个节点向另一个节点\n传递比特流，物理链路可以是铜线、卫星、微波或者其他通讯媒介。","options":{},"answer":"错误","explanation":"MP3是一种高效的计算机音频编码方案，它以较高的压缩比，将音\n频文件转换成较小的文件，并基本保持原文件的音质。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-81991","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"假设家庭宽带接入速率是2Mbps（位每秒），那么理论上下载速率可以达到256Kbyte/s。","options":{},"answer":"错误","explanation":"本题考查音频格式类型。Microsoft公司开发的声音文件格式，用于\n保存Windows平台的音频信息资源，但文件尺寸较大，多用于存储简短的声音片段。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-35114","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"无线网是用超声波作为载体来传输数据的，联网方式灵活方便。","options":{},"answer":"错误","explanation":"每一幅GIF格式图像最大颜色数不能超过256。","subject":"多媒体","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-84420","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"网关工作在应用层，其具有实现IP分配和寻址的功能。","options":{},"answer":"错误","explanation":"CMYK是印刷四色模式是彩色印刷时采用的一种套色模式，利用\n色料的三原色混色原理，加上黑色油墨，共计四种颜色混合叠加，形成所谓“全彩印刷”。四种\n标准颜色是：C：Cyan=青色，又称为天蓝色或是湛蓝；M：Magenta=品红色，又称为洋红色；Y：\nYellow=黄色：K：blacK=黑色。RGB是真彩色，是显示器显示颜色的色彩模式。\n12【答案】错误。解析：在信息技术领域，图形主要是指用计算机绘制的，由直线、圆、矩形、\n网络等组成的画面。图像主要指用扫描仪、数码相机等设备捕捉实际场景而获得的画面。\n13.【答案正确。解析：一幅彩色图像每个像素用R，G，B三个分量表示，每个分量用8位，\n共3个字节，每个字节能表示的颜色数量最多为28=256。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-31289","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"主机的IP地址是唯一一的，对应的域名也是唯一一的。","options":{},"answer":"错误","explanation":"超文本（Hypertext）是用超链接的方法，将各种不同空间的文字信\n息组织在一起的非线性文本。","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-43860","source":"德阳","type":"判断","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"没有IP地址的主机不能上网，IP地址在整个因特网上是唯一的，一台主机在不同时刻可\n以使用不同的IP地址。","options":{},"answer":"错误","explanation":"Winrar、WinZip是典型的通用的无损压缩软件，常用于对文件进\n行压缩处理。MPEG是压缩动画视频的一种标准方法，采用有损压缩的方式、平均压缩比可达\n50：1，其储存方式多样，可以适应不同的应用环境，是目前广泛采用的视频信息压缩处理标准。\n第六章\n计算机网络基础","subject":"计算机网络","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"dy-65541","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"信息安全的目标中，（）是指保证信息不泄漏给未经授权的人。","options":{"A":"真实性","B":"保密性","C":"完整性","D":"可用性"},"answer":"BCD","explanation":"计算机设备、通讯线路和连接设备组成硬件部分，网络协议是网络\n通讯中的通用语言，为通讯的顺利进行提供保证，这两部分组成了计算机网络的硬件和软件。故\n正确答案为BCD。","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-99443","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"某小区的物业管理员将业主的信息拷贝给其它地产公司，造成业主经常收到购房的扰信\n息。该案例中信息安全威胁来自于（）。","options":{"A":"操作失误","B":"黑客攻击","C":"感染病毒","D":"信息泄露"},"answer":"CD","explanation":"计算机网络按功能可以分为资源子网和通信子网。资源子网即我们所\n用的终端或服务器，负责数据的处理。通信子网由网络连接设备和通信线路组成，负责数据传输。\n故正确答案为CD。","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-93813","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"以下关于信息安全的叙述中，正确的是（）。","options":{"A":"破坏信息的传送过程不会威胁信息安全，因为信息传播途径多种多样","B":"计算机病毒与医学上的病毒一样，是天然存在的","C":"人为无意识失误不是计算机网络安全面临的威胁之一","D":"人为恶意攻击是计算机网络安全面临的威胁之一"},"answer":"AD","explanation":"网络拓扑结构分类有总线型结构、环形结构、星型结构、树型结构、\n网型结构。在计算机局域网络中常用的是总线型结构、环形结构、星型结构和树型结构。网型结\n构是广域网里面应用广泛的拓扑结构。故正确答案为AD。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-72909","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"信息在存储或传输过程中保持不被修改、不被破坏和丢失的特性属于信息的（）。","options":{"A":"保密性","B":"可用性","C":"可控性","D":"完整性"},"answer":"BD","explanation":"TCP和 UDP 属于传输层协议，IP和RARP属于网络层协议。故正确\n答案为 BD。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-21212","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"保护信息安全的措施主要从两个方面进行考虑：一是物理安全，二是（）。","options":{"A":"系统安全","B":"逻辑安全","C":"产品安全","D":"功能安全"},"answer":"ABD","explanation":"网络中数据交换的规则、标准或约定称为网络协议。从本质上讲，\n网络协议也是一种程序，运行在计算机或网络设备上，以实现相应的功能。TCP/IP协议是（传输\n控制协议／网间协议）是Internet最基本的协议、Internet国际互联网络的基础，由网络层的 IP协\n议和传输层的TCP协议组成。网络协议的三要素：语法、语义和时序。故正确答案为 ABD。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-89957","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"新型病毒传播中不被反病毒程序发现的特性，是指其具有（","options":{"A":"强壮性","B":"潜伏性","C":"变种性","D":"繁殖性"},"answer":"ABC","explanation":"D选项短波是属于无线信道，无线信道主要包括微波、红外线、短波。\n故正确答案为ABC。","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-23592","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"计算机病毒可以在一个系统中存在很长时间而不被发现，在发作时才会使人们猝不及防，\n造成重大损失，这主要体现了计算机病毒具有（）。","options":{"A":"破坏性","B":"隐蔽性","C":"传染性","D":"可执行性"},"answer":"ABCD","explanation":"光纤通信的优点：频带宽、损耗低、体积小重量轻、抗干扰能力强、\n保密性好、保真度高、工作性能可靠、成本不断下降等。故正确答案为ABCD。","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-65101","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"《中华人民共和国网络安全法》施行时间为（）。","options":{"A":"2025年11月7日","B":"2017年6月1日 金际R教育","C":"2022年12月31日","D":"2024年2月 1日"},"answer":"ACD","explanation":"常见的有线网络传输介质有同轴电缆、光纤、双绞线；常见的无线\n网络传输介质有无线电波、红外线、蓝牙、微波和激光；集成线路是一种微型电子器件或部件，\n不符合题意。故正确答案为 ACD。\n10.答案】BD。解析：A选项工作在物理层；C选项工作在网络层；只有BD选项是数据链\n路层的设备。故正确答案为BD。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-47201","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"“B100dy”是一种新的使用双重勒索技术针对大型的组织勒索病毒。该勒索软件对受害者\n机器上的文件进行加密，并将加密文件的扩展名附加为“bl00dy”。之后，在系统上创建一个赎\n金通知来要求支付。关于这次事件的说法错误的是（）。","options":{"A":"勒索病毒本质上是一种特殊的程序","B":"为了防止病毒的攻击，个人电脑不应该联网","C":"互联网的发展加快了病毒的传播速度，造成了勒索病毒全球性爆发的局面","D":"随着发展，新的病毒会不断出现，破坏方式也在不断变化"},"answer":"AB","explanation":"（1）域名中包含的字符：26个英文字母；10个阿拉伯数字；\n（英文中的连字符）；（2）域名中字符的组合规则：在域名中，不区分英文字母的大小写；对\n于一个域名的长度是有一定限制的。例如，注册CN下域名，三级域名的长度不能超过20个字符。\nCD两项连字符为“，”错误。故正确答案为AB。\n13.【答案AD。解析：在WWW中，每一信息资源都有唯一的地址，该地址就叫统一资\n源定位符。统一资源定位符（URL），表明某网页在网络中的位置。URL是用来为Internet 网上\n的某个网页或某个文件定位的一串字符，完整的格式为：协议名称：Ⅱ主机名／目录名／文件名。\n统一资源定位符（URL）也被称为“网页地址”，是因特网上标准的资源的地址。URL由三部分\n组成：协议类型，主机名和路径及文件名。故正确答案为AD。\n14.【答案CD。解析：A选项，电子邮件可以是文字、图像、声音等多种形式；B选项，\n电子邮件既可以一对一发送，也可以一对多发送，即可以同时发送给多个人；C选项，电子邮件\n的地址是唯一的；D选项，知道对方的邮件地址，就可以给世界上任意用户发送邮件。故正确答\n案为 CD。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-5434","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"通常所说的“宏病毒”主要是一种感染（）类型文件的病毒","options":{"A":"TXT","B":"DOC","C":"EXE","D":"JXT"},"answer":"B","explanation":"广域网（Wide Area Network），也称远程网。通常是指跨越很大地理\n范围的网络。一般从几十公里到几千公里。它能连接多个城市或国家，甚至横跨几大洲，并提供\n远距离通信。城域网（Metropolitan Area Network）是在一个城市范围内所建立的计算机通信网，\n简称MAN。局域网（Local Area Network，LAN）是指在某一区域内由多台计算机互联成的计算机组。\n一般是方圆几千米以内。互联网，英文是internet，又称国际网络，属于传媒领域。指的是是网络\n与网络之间所串连成的庞大网络，这些网络以一组通用的协议相连，形成逻辑上的单一巨大国际\n网络。故正确答案为B。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-77872","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"网络运营者应当为（）、国家安全机关依法维护国家安全和侦查犯罪的活动提供技术\n支持和协助。","options":{"A":"公安机关","B":"网信部门","C":"工信部门","D":"检察院"},"answer":"A","explanation":"按地理范围大小，将网络主要分为局域网LAN，城域网MAN，广域\n网WAN。\n（1）局域网（LAN）：又称局部网，一般在几千米的范围内，以个单位或一个部门的小\n范围为限（如一个学校、一个建筑物内），由这些单位或部门单独组建\n（2）城域网（MAN）：又称远程网，是远距离、大范围的计算机网络。城域网一般覆盖一\n个城市或地区，地理范围在几十千米的范围内。\n（3）广域网（WAN）：广域网的覆盖范围很广，如可以是一个洲、一个国家，甚至全世界。\n广域网一般由多个国家或多个部门联合组建，能实现大范围内的资源共享。\n故正确答案为A。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-86005","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"网络已经成为我们获取和交流信息的重要手段。下列说法正确的是（）。","options":{"A":"用手机上网比用电脑上网安全","B":"黑客能够通过网络人侵电脑","C":"可以随意转发微信朋友圈里的文章","D":"可以转卖在淘宝店里买的破解软件"},"answer":"ACD","explanation":"动态网站开发语言包括ASP、PHP、JSP等。ASP是 Microsoft开\n发的动态网页技术，主要应用于Windows NT+IIS或Windows9x+PWS平台。JSP是Sun公司推\n出的新一代Web开发技术。它几乎可以运行在所有的操作系统平台和Web服务器上，因此JSP\n的运行平台更为广泛。PHP是Rasmus Lerdorf推出的一种跨平台的嵌人式脚本语言，可以在\nWindows、UNIX、Linux 等流行的操作系统和IIS、Apache、Netscape 等Web 服务器上运行，用户\n更换平台时，无需变换PHP代码。Dreamweaver只是一个网站开发工具。故正确答案为ACD。","subject":"操作系统","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-36678","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"信息安全危害的两大源头是病毒跟黑客，因为黑客是（）。","options":{"A":"计算机编程高手","B":"Cookies 的发布者","C":"网络的非法入侵者","D":"信息垃圾的制造者"},"answer":"ABC","explanation":"静态网页：指没有后台数据库、不含程序和不可交互的HTML格\n式的网页。静态网页可简单地根据用户的请求传送已有的页面，无法实现各种个性化的交互功能。\n动态网页：指包括动态HTML效果、ASP、PHP、CGI和 JSP等网页技术在内的能提供个性\n化信息服务的页面。动态网页由计算机实时生成，具有日常维护简单，更改结构方便，交互功能\n强大等优点。故正确答案为ABC。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-22905","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"甲正在用A计算机和乙的B计算机进行数据交流，但是甲使用一种网络攻击手段让乙认\n为自已在和C计算机交流，则甲使用的网络攻击手段是（）。","options":{"A":"口令猜测攻击","B":"ARP 欺骗 全金标R教育","C":"信息收集型攻击","D":"IP地址欺骗"},"answer":"ABCD","explanation":"在进行网站规划的时候主要考虑以下内容：\n（1）网站定位，包括网站的功能、用户群体等；\n（2）网站内容，包括网站名称、功能模块、网站结构等；\n（3）设计要求，包括网站风格、网站美工等；\n（4）技术方案，包括网站运行方式、开发平台、后台数据库等。\n我们评价网站可以从这几个方面进行全面的评价。综上所述，A、B、C、D选项都符合评价\n的内容。故正确答案为 ABCD。","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-90156","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"下列选项中，防范网络监听最有效的方法是（）。","options":{"A":"数据加密","B":"系统杀毒","C":"安装防火墙","D":"采用无线网络传输"},"answer":"ACD","explanation":"<font>规定文本的字体、字体尺寸、字体颜色。\nHTML文件的基本结构如下：\n<html>\n<head>\n</head>\n<body>\n</body>\n</html>。故正确答案为 ACD。","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-9101","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"到银行去取款，计算机要求你输人密码，这属于网络技术中的（）。","options":{"A":"网络安全技术","B":"防火墙技术","C":"加密传输技术","D":"身份认证技术"},"answer":"C","explanation":"OSI参考模型划分原则：①网中各节点都有相同的层次。②不同节点\n的同等层具有相同的功能。③同一节点内相邻层之间通过接口通信。④每一一层使用下层提供的服\n务，并向其上层提供服务。③不同节点的同等层按照协议实现对等层之间的通信。A选项，OSI\n模型中低层为高层提供服务；B选项，OSI模型中各层之间实现方法是独立的，即下层对上层来\n说是透明的，也就是说高层不需要知道低层的实现方法；D选项，不同节点的操作系统可以不同，\n采用相同的网络协议既可以相互通信。故正确答案为C。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-16488","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"在防火墙系统中，防火墙解决不了网络（\n、）的安全问题","options":{"A":"外部","B":"DMZ","C":"内部","D":"中间件"},"answer":"D","explanation":"OSI参考模型共分为7层，从低到高依次是物理层、数据链路层、\n网络层、传输层、会话层、表示层和应用层。故正确答案为D。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-30571","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"在入侵检测中，若对检测的数据没有匹配成功，则默认该行为是正常行为。这是属于（","options":{"A":"误用入侵检测","B":"异常人侵检测","C":"常态人侵检测","D":"非常态入侵检测"},"answer":"A","explanation":"数据链路是将本质上不可靠的传输媒体变成可靠的传输通路提供给网\n络层，每次通信都要经过建立通信联络和拆除通信联络两个过程，这种建立起来的数据收发关系\n就叫做数据链路。保证数据的可靠传输，则必须对数据进行相应的校验机制，保证接收到的数据\n是可靠的，有效的，正确的。故正确答案为 A。","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-29702","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"下列不属于恶意代码攻击的核心技术是（：）。","options":{"A":"生存技术","B":"攻击技术","C":"隐藏技术","D":"监听技术"},"answer":"C","explanation":"TCP/IP协议是传输控制协议／网际协议，它定义了电子设备如何连入\n因特网以及数据如何在他们之间传输的标准，是Internet最基本的协议。故正确答案为C。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-29741","source":"德阳","type":"单选","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"保障信息安全是我们在使用计算机过程中要注意的问题，下列做法错误的是（）。","options":{"A":"使用非法复制的软件","B":"不打开来历不明的电子邮件","C":"在计算机中设置用户密码","D":"在计算机中安装病毒防治软件"},"answer":"A","explanation":"在网络结构中，发送方由上至下，每经过一层增加协议控制信息；接\n收方由下至上，每经过一层去掉协议控制信息。故正确答案为A。","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-5569","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"单机病毒的载体是磁盘，U盘，移动硬盘等移动存储设备，常见的病毒从移动存储设备传\n人硬盘，感染系统，然后再传染其他移动存储设备，移动存储设备又传染其他系统","options":{},"answer":"正确","explanation":"计算机网络是指将分布在不同地理位置具有独立功能的多个计算机\n系统，通过通信设备和通信线路连接起来，在网络软件系统的控制下，实现数据通信和资源共享\n等功能。\n从物理连接上讲，计算机网络由计算机系统、通信链路和网络节点组成。计算机系统进行各\n种数据处理，通信链路和网络节点提供通信功能。","subject":"计算机基础","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-36169","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"电脑感染病毒后通过重新格式化硬盘可以消除所有病毒，","options":{},"answer":"错误","explanation":"互联网中基于TCP/IP协议的电子邮件系统采用的是客户机／服务器\n工作模式，整个系统的核心是电子邮件服务器，","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-33934","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"对称密钥又称公开密钥，加密和解密时使用不同的密钥，即不同的算法。","options":{},"answer":"正确","explanation":"OSI（开放系统互连）参考模型将整个网络通信的功能划分成了7\n个层次，它们从低到高分别是物理层、数据链路层、网络层、传输层、会话层、表示层和应用层。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-64623","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"防火墙对流经它的网络通信进行扫描，可以过滤掉一切攻击，避免病毒人侵计算机。","options":{},"answer":"正确","explanation":"数据链路层的功能之一就是封装成顿，封装成帧也就是帧的定界，\n是在一段数据的前后分别添加首部和尾部，然后就构成了一个顺。告知接收方帧的开始位置和结\n束位置，确定帧中数据的位置。在封装成顺时，不考虑顿的长短等问题，","subject":"信息安全","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-8827","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"防火墙指的是一个由软件和硬件设备组合而成，在内部网和外部网之间，专用网和公共网\n之间构造的保护屏障","options":{},"answer":"错误","explanation":"应用层是OSI参考模型的最高层，负责向用户提供各种网络应用服务，\n如文件传输、电子邮件、远程访问等。\n应用层的下层是表示层，表示层是OSI参考模型的次高层，用于解决在两个通信系统中交换\n信息时，不同数据格式编码之间的转换","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-67296","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"二维码本身无毒，但是二维码的所指向的网站，下列链接等可能被提前植人了木马或病毒，\n因此要注意防范扫描二维码时的安全风险","options":{},"answer":"错误","explanation":"POP3（邮局协议）负责邮件的接收。SMTP（SimpleMail.Transfer\nProtocol）即简单邮件传输协议，负责邮件的发送。","subject":"信息基础","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-31847","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"用大小写字母，标点和数学以及控制符组成的密码更安全。","options":{},"answer":"正确","explanation":"利用物理传输介质为数据链路层提供物理连接，以便透明地传传送“比\n特”流。传输介质分为有线介质和无线介质。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-69655","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"为了预防计算机病毒对计算机系统的破坏，在打开不明身份的人发来的邮件时应使用杀毒\n软件进行病毒查杀，","options":{},"answer":"正确","explanation":"宽带速率指的技术上所能达到的最大理论速率值，一般是上传和下\n载的速度，2Mbps=2048kbps=256Kbyte/s（1bps=1bit每秒，8bit=1byte，bps是速度单位，bit是大\n小单位，byte 也是大小单位，）故正确。","subject":"计算机基础","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-6515","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"计算机病毒是指编制或者在计算机程序中插入的破坏计算机功能或数据的一组计算机指\n令或程序代码，使用杀毒软件进行全盘杀毒，可以杀掉计算机里面的所有病毒。","options":{},"answer":"错误","explanation":"无线网的传输介质有：无线电波、红外线、微波和红外线，蓝牙等，\n没有超声波。无线传输介质根据电磁波频谱不同分为无线电波、红外线、微波、蓝牙激光等，信\n息被加载在电磁波上进行传输。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-39112","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"防火墙是一种主动式安全模式。","options":{},"answer":"错误","explanation":"网关（Gateway）又称网间连接器、协议转换器，在网络层以上实现网络\n互连，是最复杂的网络互连设备。网关实质上是一个网络通向其他网络的IP地址。网关的IP地\n址是具有路由功能的设备的IP地址，具有路由功能的设备有路由器、启用了路由协议的服务器、\n代理服务器等。\nIP分配通常有静态分配和动态分配两种形式。静态分配是通过手工的方式为每一台接人网络\n的电脑配置其相应的IP地址；动态分配是通过DHCP等动态地址分配协议完成网络中各主机的\nIP地址分配，一般利用DHCP服务器来自动给网络中的电脑分配IP地址、子网掩码和默认网关。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-93026","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"钓鱼网站实际是一种网络欺诈行为，国内现有处理机制难以有效制止钓鱼网站的诈骗行\n为。","options":{},"answer":"正确","explanation":"网络接口控制器（英语：network interface controller，NIC），又称\n网络接口控制器，网络适配器（network adapter），网卡（network interface card）。网卡是一块被\n设计用来允许计算机在计算机网络上进行通讯的计算机硬件。由于其拥有MAC地址，因此属于\nOSI模型的第1层。","subject":"计算机基础","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-72432","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"当网络运营者发生网络安全事件时应立即启动应急预案，采取相应的补救措施，如未能\n补救，则应立即向有关部门报告。","options":{},"answer":"错误","explanation":"合法的IP地址需要满足以下三点。1、由四个字节组成；2、每个\n字节在0~255之间；3、用英文圆点分隔。263>255，所以这个IP地址是不合法的。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-32778","source":"德阳","type":"判断","chapter":"德阳计算机题本·第七章 信息安全维护","stem":"防火墙可以将来自网络的计算机病毒在进入个人主机之前杀掉。","options":{},"answer":"错误","explanation":"全世界没有重复的域名。但主机的IP地址对应的域名不是唯一的。\n域名与 IP 地址的对应关系有两种：-一对一，Internet上 IP 地址是唯一的，个 IP 地址对应着唯\n一的一台主机。给定一个域名地址能找到一个唯一对应的IP地址。一对多，一台计算机提供多\n个服务，既作WWW服务器又作邮件服务器。IP地址还是唯一，但可根据计算机提供的多个服务\n给予不同域名。一个IP地址对应多个域名。\n15【答案】正确。解析：网络之间实现计算机的相互通信，必须有IP地址。IP地址是唯一\n标识出主机所在的网络及网络中位置的编号，在整个因特网内是唯一的。由于IP地址资源很宝\n贵，因此大部分用户上网都是使用动态P地址的，比如通过拨号、小区宽频等方式上网的计算机，\n都是在每次上网的时候临时分配一个IP地址，每次分配的地址有可能不同。","subject":"计算机网络","source_chapter":"德阳计算机题本·第七章 信息安全维护"},{"id":"dy-69569","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"二进制的每一位是组成二进制信息的最小单位，一般用（）表示。","options":{"B":"b","A":"B","C":"T","D":"t"},"answer":"B","explanation":"本题考查数据存储单位。位是数据存储中最小的单位，即由二\n进制组成，应为位bit，简称b。A选项为字节（Byte），简称 B。C、D选项无实际意义。故正确\n答案为 B。","subject":"计算机基础","source_chapter":"德阳计算机真题"},{"id":"dy-85831","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"计算机软件系统包括系统软件和应用软件，下列属于应用软件的是（","options":{"A":"操作系统","B":"用户程序","C":"语言处理程序","D":"系统服务程序"},"answer":"B","explanation":"本题考查软件分类。软件分为系统软件和应用软件。系统软件\n包括操作系统、数据库管理系统、语言处理程序以及服务支撑软件。而用户程序则属于应用程序。\n故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机真题"},{"id":"dy-25707","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"王蒙正在整理计算机中的照片，若她想选择多张不连续的照片进行删除，则她可以按住\n（）键，再单击要删除的照片。","options":{"A":"Alt","B":"Ctrl","C":"Shift","D":"Tab"},"answer":"B","explanation":"本题考查对象选定。选择不连续的对象应按Ctrl键盘，选择连\n续的则用 Shift。故正确答案为 B。","subject":"编程语言","source_chapter":"德阳计算机真题"},{"id":"dy-58361","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"在安装、连接计算机各个部件的过程中，应（）。","options":{"B":"先洗手","A":"接通电源","C":"戴手套","D":"切断电源"},"answer":"D","explanation":"本题考查计算机维护。为确保人身安全及计算机硬件安全，在\n使用前务必切断电源。故正确答案为D。","subject":"编程语言","source_chapter":"德阳计算机真题"},{"id":"dy-12596","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"以最小系统为基础，，每次只向系统添加一个设备或软件，检查故障现象是否消失或发生\n变化，以此判断并定位故障部位。这种计算机维修方法是（）。","options":{"A":"观察法","B":"逐步添加法","C":"替换法","D":"敲打法"},"answer":"B","explanation":"本题查考计算机维护。硬件故障有哪些常见的检测方法主要有：\n(1)原理分析法;\n(2)直接观察法;\n(3)拔插法;\n(4)替换法;\n(5)比较法；\n(6)敲打法;\n(7)清洁法。\n其中，逐步添加指的是在最小系统的基础上，每次只向系统添加一个设备或软件，以此检查\n故障现象是否消失或发生变化，从而判断并定位故障部位。故正确答案为B。","subject":"计算机基础","source_chapter":"德阳计算机真题"},{"id":"dy-74934","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"根据电子商务发生的对象，可以将电子商务分为4种类型，其中B2C指的是（","options":{"A":"商业机构对消费者的电子商务","B":"商业机构对行政机构的电子商务","C":"商业机构对商业机构的电子商务","D":"消费者对行政机构的电子商务"},"answer":"A","explanation":"本题考查电子商务。B2C为商业机构对消费者的电子商务。B\n选项为 B2G；C选项为B2B；D选项为 C2G。故正确答案为A。","subject":"编程语言","source_chapter":"德阳计算机真题"},{"id":"dy-69648","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"下列不属于数据库安全保密定义范畴的是（）。","options":{"A":"用户密码","B":"用户级别","C":"存取权限","D":"数据库完整性"},"answer":"B","explanation":"本题考查信息安全。数据库安全保密就是保证数据库中数据的\n完整性、可用性、保密性、可审计性。主要包括以下内容：\n（1）完整性。数据不被非法篡改；\n（2）可用性。控制授权用户的权限，只能访问权限内的数据，也被称为存取控制技术；\n（3）保密性：可以对数据进行加密，通过密码以防止非法用户窃取明文信息；\n（4）可审计性。记录运行期间的访问记录，分析是否受到非法人侵。\n故正确答案为 B。","subject":"信息安全","source_chapter":"德阳计算机真题"},{"id":"dy-76735","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"（）是信息得以利用的第一步，也是关键的一步，该过程的好坏直接关系到整个信息\n管理工作的质量。","options":{"A":"信息表示","B":"信息收集","C":"信息存储 ：D.信息处理"},"answer":"B","explanation":"本题考查信息管理。信息管理流程就是人对信息资源和信息活\n动的管理流程。信息管理的一般过程包括信息收集、信息传输、信息加工和信息储存。其中，信\n息收集是指通过各种方式获取所需要的信息。信息收集是信息得以利用的第一步，也是关键的一\n步。信息收集工作的好坏，直接关系到整个信息管理工作的质量。故正确答案为B。","subject":"信息基础","source_chapter":"德阳计算机真题"},{"id":"dy-50592","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"打印机按工作方式可以分为击打式和非击打式两大类。下列属于击打式打印机的是（","options":{"B":"喷墨打印机","A":"热敏打印机","C":"激光打印机","D":"点阵式打印机"},"answer":"D","explanation":"本题考查办公设备维护。打印机分为击打式和非击打式。其中\n击打式打印机是点阵打印机，打印头由若干针组成，常用于打印发票类文件，也成为点阵式打印。\n非击打式打印机是靠电磁作用实现印字的，它没有机械动作，因此打印速度较快，而且打印时一\n般没有工作噪音。非击打式打印机有喷墨打印机、激光打印机及热敏打印机。故正确答案为D。","subject":"办公软件","source_chapter":"德阳计算机真题"},{"id":"dy-76716","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"小张觉得自已的笔记本显示屏太小了，想外接一台带VGA接口的显示器，则该显示器应\n连接的位置是（）。\n全金标R教育","options":{"A":"@","B":"② c. 3","D":"④"},"answer":"C","explanation":"本题考查办公设备维护。VGA是使用模拟信号的电脑显示标准，\nVGA接口共有15针，分成3排，每排5个孔。此外，常见的视频接口还有DVI、HDMI和DP等。\n各个接口如下图所示：\nVGA\nDVI\nHDMI\nDP\n故正确答案为C。","subject":"计算机基础","source_chapter":"德阳计算机真题"},{"id":"dy-33007","source":"德阳","type":"单选","chapter":"德阳计算机真题","stem":"通常情况下可以通过虚拟存储器技术，将台机器的物理存储器变为虚拟存储器，从而\n）。","options":{"A":"管理计算机裸机","B":"从逻辑上扩充存储器的容量","C":"提供方便的可视化编辑程序","D":"从物理上扩充存储器的容量"},"answer":"B","explanation":
