置文字样式，C选项属于Excel 的功能。故本题答案为C。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-58707","source":"题海训练","type":"判断","chapter":"题海训练","stem":"数据库和数据库的应用系统并不能直接的相互作用，它们是由数据库管理系统来连接的。","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-41142","source":"题海训练","type":"判断","chapter":"题海训练","stem":"Microsoft Access 是一种数据库应用系统。（","options":{},"answer":"正确","explanation":"Photoshop可以支持的模式见下图。故本题表述正确。\n颜色模式（M）：RGB颜色\n位图\n背景内容（C)：\n灰度\nRGB颜色\nCMYK颜色\nLab颜色","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-26233","source":"题海训练","type":"判断","chapter":"题海训练","stem":"数据库的数据模型有3种，它们是层次模型、网状模型和关系模型，其中关系模型是目\n前最常用的。（","options":{},"answer":"正确","explanation":"","subject":"数据库","source_chapter":"题海训练"},{"id":"th-58428","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在 SQL Server 中，数据存储在一个个的关系表格中，这些关系表格也叫数据表，或基本\n表。（","options":{},"answer":"正确","explanation":"本题考查母版。通过修改幻灯片母版，可以统一修改文稿中所有\n幻灯片的文本外观，若要统一修改多张幻灯片的外观，只需在母版上做一次修改即可。故本题\n签安头正确\n／软件操作篇\n文本框页眉和顶脚艺术字日期\n横排文本框H\n文本\n重直文本框","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-3932","source":"题海训练","type":"判断","chapter":"题海训练","stem":"数据库的最小存储单位是记录。\n／专业理论篇／。\n12.属于BCNF的关系模式必属于3NF。（\n13.数据库的操作具有单一性，同一时间只允许一个用户存取数据库中的数据。，（\n14.在数据库中实施参照完整性约束，是为了保证一个表格中字段之间取值的相互约束。\n15.一个关系（relation）就是一个二维表，二维表的表名就是关系名，一个数据库只包含\n一张表。（","options":{},"answer":"错误","explanation":"本题考查 Excel 操作。Excel 的操作是基于单元格的，所以操作都\n是对单元格的操作，无法直接通过拖动指针移动单元格内的内容。故本题答案为错误。","subject":"数据库","source_chapter":"题海训练"},{"id":"th-51500","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"在计算机系统中，操作系统是（","options":{"A":"一般应用软件","B":"核心系统软件","C":"用户应用软件","D":"系统支撑软件"},"answer":"B","explanation":"本题考查操作系统的概念。操作系统是现代计算机系统中最基本和\n最重要的系统软件，所以 B项符合题意。故本题答案为B。\n2．【答案D。解析：本题考查操作系统关心的主要问题。操作系统主要关心的是处理机\n管理、存储器管理、设备管理、文件管理、提供用户接口等功能，而编译器不属于这些功能里\n面的任何一种，不是操作系统关心的问题，所以D项正确。从计算机资源的角度来看，OS的\n作用是管理计算机的硬件和软件等各种系统资源，所以A、C是操作系统关心的问题。从用户\n的角度来看，OS的作用是提供用户和计算机硬件之间的接口，所以B是操作系统关心的问题\n故本题答案为D。","subject":"计算机基础","source_chapter":"题海训练·第四章"},{"id":"th-12002","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"下面哪一种描述不是操作系统的主要自标？","options":{"A":"有效性","B":"方便性","C":"可扩充性","D":"多路复用"},"answer":"B","explanation":"本题考查元件的概念及类型。元件与图形对象的区别是元件外面有\n一个框，而图形对象没有。故本题答案为 B。","subject":"编程语言","source_chapter":"题海训练·第四章"},{"id":"th-2853","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"操作系统的主要功能有（","options":{"A":"进程管理、存储器管理、设备管理、处理机管理","B":"虚拟存储管理、处理机管理、进程调度、文件系统","C":"处理机管理、存储器管理、设备管理、文件系统","D":"进程管理、中断管理、设备管理、文件系统"},"answer":"B","explanation":"本题考查动作补间动画。动作动画的对象必须是元件，而用Flash 画\n的篮球是图形而不是元件，因此必须首先将其转换为图形元件，才可以成功的制作出动作动画，\n故本题答案为 B。","subject":"操作系统","source_chapter":"题海训练·第四章"},{"id":"th-36481","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"设计批处理多道系统时，首先要考虑的是（\n丨信息科技－题海训练\n8.多个进程的实体存在于同一一内存中，在一段时间内都得到运行，这种性质称作（","options":{"B":"9","C":"10","A":"1","D":"11"},"answer":"C","explanation":"本题考查Flash。Alpha属性是元件的透明度，取值范围为0%-100%，","subject":"数据库","source_chapter":"题海训练·第四章"},{"id":"th-52129","source":"题海训练","type":"判断","chapter":"题海训练","stem":"实时系统的输出结果的正确性仅仅依赖于结果的正确性。（","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-89896","source":"题海训练","type":"判断","chapter":"题海训练","stem":"操作系统的一个重要概念是进程，不同进程所执行的代码也不同。（","options":{},"answer":"正确","explanation":"Photoshop可以支持的模式见下图。故本题表述正确。\n颜色模式（M）：RGB颜色\n位图\n背景内容（C)：\n灰度\nRGB颜色\nCMYK颜色\nLab颜色","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-69611","source":"题海训练","type":"判断","chapter":"题海训练","stem":"当进程申请CPU 得不到满足时，它将处于阻塞状态。（","options":{},"answer":"正确","explanation":"","subject":"操作系统","source_chapter":"题海训练"},{"id":"th-31777","source":"题海训练","type":"判断","chapter":"题海训练","stem":"当进程由执行状态变为就绪状态时，CPU现场信息必须被保存在 PCB 中。（","options":{},"answer":"正确","explanation":"本题考查母版。通过修改幻灯片母版，可以统一修改文稿中所有\n幻灯片的文本外观，若要统一修改多张幻灯片的外观，只需在母版上做一次修改即可。故本题\n签安头正确\n／软件操作篇\n文本框页眉和顶脚艺术字日期\n横排文本框H\n文本\n重直文本框","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-88529","source":"题海训练","type":"判断","chapter":"题海训练","stem":"预防死锁设置的限制条件比避免死锁严格，不利于进程的并发执行。（","options":{},"answer":"错误","explanation":"本题考查 Excel 操作。Excel 的操作是基于单元格的，所以操作都\n是对单元格的操作，无法直接通过拖动指针移动单元格内的内容。故本题答案为错误。","subject":"操作系统","source_chapter":"题海训练"},{"id":"th-59748","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在分配共享设备和独占设备时，都可能弓引起进程死锁。（","options":{},"answer":"错误","explanation":"本题考查Excel清除命令。清除可以清除内容、格式、批注。故\n本题答案为错误。","subject":"操作系统","source_chapter":"题海训练"},{"id":"th-34041","source":"题海训练","type":"判断","chapter":"题海训练","stem":"响应比是等待时间与要求服务的时间之比。（","options":{},"answer":"正确","explanation":"本题考查幻灯片的内容。每张幻灯片可以包含文字和图表，还可\n以包含声音、视频和图像。故本题答案为正确。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-89805","source":"题海训练","type":"判断","chapter":"题海训练","stem":"同一用户所使用的I/0设备也可以并行工作。（","options":{},"answer":"错误","explanation":"本题考查 PowerPoint 的操作。创建空白演示文稿时，幻灯片的颜\n色统一为白色，通过设置可以设置成任何颜色。故本题答案为错误。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-50849","source":"题海训练","type":"判断","chapter":"题海训练","stem":"系统处于不安全状态必然会导致死锁。（","options":{},"answer":"正确","explanation":"本题考查幻灯片的切换效果。幻灯片在切换时可以设置相应的切\n换效果。故本题答案为正确。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-49182","source":"题海训练","type":"判断","chapter":"题海训练","stem":"计算作业的优先权应高于I/0型作业的优先权。（","options":{},"answer":"错误","explanation":"本题考查 PowerPoint 中配色方案的使用。在PowerPoint 中，应用\n配色方案时，不仅可以应用于全部幻灯片，也可以只应用于某张幻灯片。故本题答案为错误。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-52940","source":"题海训练","type":"判断","chapter":"题海训练","stem":"资源要求多的作业，其优先权应高于资源要求少的作业。（","options":{},"answer":"正确","explanation":"本题考查幻灯片。用户可以对某张幻灯片的背景进行设置而不\n影响其他幻灯片。故本题答题为正确。\n1信息科技－题海训练答案及解析","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-44036","source":"题海训练","type":"判断","chapter":"题海训练","stem":"顺序文件适合于建立在顺序存储设备上，而不适合于建立在磁盘上。（\n顺序文件必须采用续分配方式，而链接文件和索引文件则可采用离散分配方式\n件操作篇\n1000 10010100010010\n1000000\n1000100101000000\n100010010100010010\n110010100010010\n100010010\n0001\n0001000\n0001\n0000010\n00000\n00000\n101000","options":{},"answer":"错误","explanation":"本题考查计算机常识。计算机正在读写数据时突然关机，很可\n能会损坏驱动器（硬盘、软驱等），更不能在计算机工作时搬到计算机。故本题答案为错误。\n14.答案错误。解析：本题考查灰尘对于显示器的影响。对于由十分精密的电子器件\n构成并对使用环境有较高要求的电脑来说，灰尘无疑是它的大敌，尤其是对显示器、磁盘驱动\n器、电路板等元器件。专用的防尘罩能有效预防灰尘危害，确保显示器在相对干净的环境中使\n用。故本题答案为错误\n15【签案】正确。解析：本题查人工智能,\n禁系统是在智能建筑领城\n简称ACS\n超格教育\n1信息科技－题海训练答案及解析\n境一般，可以实时、无限制地观察三维空间里的事物，通过虚拟现实技术，航空站的操作员可\n以模拟太空作业的训练。故本题答案为正确。","subject":"信息基础","source_chapter":"题海训练"},{"id":"th-75954","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"在下面的选项中，不包含在Word2007界面中的部分是（","options":{"A":"标题栏","B":"快速访问工具栏","C":"菜单栏","D":"功能区"},"answer":"C","explanation":"本题考查Word 2007的界面组成部分。Word 2007窗口界面包含标\n题栏，快速访问栏，功能区，文档编辑区域，状态栏以及Microsoft Office等部分，但是不包含\n菜单栏。如下图所示：\n功能区\n标题栏\nMicrosoft\nOffice按钮\n快速访问工\n文档编辑区\nI信息科技－题海训练答案及解析","subject":"办公软件","source_chapter":"题海训练·第一章·第一节"},{"id":"th-23348","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"在Word 2007的编辑状态下，若要调整左右边界，比较直接、快捷的方法是（","options":{"A":"工具栏","B":"格式栏","C":"菜单","D":"标尺"},"answer":"A","explanation":"本题考查LOGO语言基础知识。LOGO语言启动后，小海龟会自动\n显示在绘图的窗口中。故本题答案为 A。","subject":"编程语言","source_chapter":"题海训练·第一章·第一节"},{"id":"th-23187","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"在快速访问工具栏中按钮\n的功能是（","options":{"A":"撤消上次操作","B":"加粗","C":"设置下划线","D":"改变所选择内容的字体颜色"},"answer":"A","explanation":"本题考查快速访问工具栏中按钮的功能。在Word 2007的快速访问\n工具栏中，\n按钮的功能是撤销上次操作。B按钮的功能是加粗。U按钮的功能是设置下\n划线。按钮的功能是改变所选内容的字体颜色。故本题答案为 A。\n4.（答案D。解析：本题考查Word文件扩展名。A选项是电子表格文件，适合用Excle\n打开，B选项是图像文件，可用画图工具等打开，C选项是动画文件适合用flash软件打开，\nD选项是文本文件，四个选项中文本文件最适合用Word 打开。故本题答案为 D。","subject":"办公软件","source_chapter":"题海训练·第一章·第一节"},{"id":"th-60099","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"小李采集到下列有关零用钱调查的素材，最适合用Word打开与处理的是（","options":{"A":"零用钱调查.xls","B":"零用钱调查.bmp","C":"零用钱调查.swf","D":"零用钱调查.txt"},"answer":"B","explanation":"本题考查LOGO语言命令。LOGO语言中，REPEAT是重复命令，\n这里代表括号内容重复36次，FD是前进命令，RT是右转命令，3.14一般为 T的值，这里前\n进80T/18，为弧形轨迹；再右转360/36=10度，一共36*10=360度。最后画出的是一个圆形。\n故本题答案为B。","subject":"编程语言","source_chapter":"题海训练·第一章·第一节"},{"id":"th-781","source":"题海训练","type":"单选","chapter":"题海训练·第一章·第一节","stem":"下列叙述错误的是（\n1信息科技－题海训练\n7.某Word文件的分栏设置如图所示，下列选项中说法正确的是（\n预设\n三栏0\n偏左（L\n两栏W)\n栏(0)\n偏右（B)\n兰数(N)\n分隔线（0)\n宽度和间距\n预览\n宽度（\n39.55字符\n栏宽相等（0）\n整篇文档\n应用于(A)\n开始新栏（0）\n确定\n取消","options":{"A":"单击鼠标左键","B":"双击鼠标左镶","C":"三击鼠标左键","D":"单击鼠标右键 10.在Word 2007的编辑状态下，选中某一段文本，再单击剪贴板中的“复制”按钮后 可（"},"answer":"C","explanation":"本题考查文本编辑类软件。A项，Excel 和 Word 都属于 Office 旗下\n的软件，Excel中编辑的表格可以在Word中使用。B项，Word 可以把正在编辑的Word文档保\n存为纯文本文件。C 项，记事本是Windows 操作系统中一个简单的文本编辑器，只能进行文本\n信息的编辑，不支持图文混排。D项，使用画笔工具绘图时，仍然可以输人文字。故本题答案\n为。","subject":"办公软件","source_chapter":"题海训练·第一章·第一节"},{"id":"th-6880","source":"题海训练","type":"多选","chapter":"题海训练","stem":"下列关于保存Word文档的操作，正确的是（","options":{"A":"单击按钮","B":"单击“文件／保存”命令","C":"单击“文件／另存为”命令","D":"单击“文件／打印”命令"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"操作系统","source_chapter":"题海训练"},{"id":"th-7738","source":"题海训练","type":"多选","chapter":"题海训练","stem":"下列关于Word 软件功能的叙述，正确的是（","options":{"A":"Word属于字处理软件","B":"在Word 中可以编辑音频文件","C":"在Word 中可以实现图文混排","D":"在 Word 中可以插入艺术字"},"answer":"AC","explanation":"本题考查 Photoshop。用鼠标点击一次，再点击一次就可以形成直\n线型的多边形选择区域，A项正确。多边形套索属于套索工具，B项错误。鼠标拖拽出来的区\n域形成的轨迹就是选择区域。C项正确。多边形套索工具由于区域不规则，·所以不是规则选框\n工具。D项错误。故正确答案为 AC。","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-21066","source":"题海训练","type":"多选","chapter":"题海训练","stem":"下列关于字体字号的描述，正确的是（","options":{"A":"号字大于三号字","B":"宋体是中文字体","C":"楷体是英文字体","D":"12磅字比10磅字小"},"answer":"AB","explanation":"本题考查 Photoshop。魔棒工具是 Photoshop 中提供的一种比较快捷\n的抠图工具，对于一些分界线比较明显的图像，通过魔棒工具可以很快速地将图像抠出。容差\n也就是说容美越卡\n图像颜色的接近度也就越小\n选的区城","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-25617","source":"题海训练","type":"多选","chapter":"题海训练","stem":"在修改图形的大小时，若想保持其长宽比例不变，应该怎样操作？（","options":{"A":"用鼠标拖动四角上的控制点","B":"按住Shift键，同时用鼠标拖动四角上的控制点","C":"按住Ctrl键，同时用鼠标拖动四角上的控制点","D":"在“设置图片格式”中锁定纵横比"},"answer":"ABC","explanation":"E。解析：本题考查快捷方式。选项 A，快捷方式是一种特殊的类型，代表\n快捷方式的图标称为快捷图标，在其左下角有一个小箭头，通过双击快捷图标来执行快捷程序\n．的方式称为用快捷方式打开；选项B，快捷方式可以在不同的位置进行创建，文件本身并不放\n在桌面上；选项C，快捷方式文件中存放的是一个指向另一个文件的指针，对于源文件本身是\n没有影响的；选项E，删除快捷方式，源文件不会被删除。故本题答案为 ABCE。","subject":"编程语言","source_chapter":"题海训练"},{"id":"th-18027","source":"题海训练","type":"判断","chapter":"题海训练","stem":"Word 是文字处理软件。（","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-67224","source":"题海训练","type":"判断","chapter":"题海训练","stem":"通过系统菜单里“程序”命令项下的\n“Microsoft Word”启动Word，能够创建一个新文档","options":{},"answer":"正确","explanation":"Photoshop可以支持的模式见下图。故本题表述正确。\n颜色模式（M）：RGB颜色\n位图\n背景内容（C)：\n灰度\nRGB颜色\nCMYK颜色\nLab颜色","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-75172","source":"题海训练","type":"单选","chapter":"题海训练·第二节","stem":"41763E+17","options":{"A":"电子表格","B":"文字输入","C":"公式计算","D":"公式输入"},"answer":"C","explanation":"本题考查VB程序设计语言。打开工程文件之后，系统会自动装人\n工程窗口、窗体、工具箱、属性窗口、窗体布局窗口等，所以A项不符合题意。保存Visual\nBasic 程序时，会默认保存窗体和工程两个文件，所以B项不符合题意。事件驱动程序的基本\n结构是由一个事件收集器、一个事件发送器和一个事件处理器组成。事件收集器专门负责收集\n所有事件，包括来自用户的（如鼠标、键盘事件等）、来自硬件的（如时钟事件等）和来自软\n中以编译方式执行，编译后生成exe 程序，所以 C 项符合题意。故本题答案为 C。","subject":"编程语言","source_chapter":"题海训练·第二节"},{"id":"th-48468","source":"题海训练","type":"多选","chapter":"题海训练","stem":"在Excel中，移动和复制工作表的操作中，下面正确的是（","options":{"A":"工作表能移动到其他工作簿中","B":"工作表不能复制到其他工作簿中","C":"工作表不能移动到其他工作簿中","D":"工作表能复制到其他工作簿中"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-67958","source":"题海训练","type":"多选","chapter":"题海训练","stem":"以下关于管理Excel表格正确的表述是（","options":{"A":"可以给工作表插入行","B":"可以给工作表插入列","C":"可以插入行，但不可以插入列","D":"可以插入列，但不可以插入行"},"answer":"AC","explanation":"本题考查 Photoshop。用鼠标点击一次，再点击一次就可以形成直\n线型的多边形选择区域，A项正确。多边形套索属于套索工具，B项错误。鼠标拖拽出来的区\n域形成的轨迹就是选择区域。C项正确。多边形套索工具由于区域不规则，·所以不是规则选框\n工具。D项错误。故正确答案为 AC。","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-30217","source":"题海训练","type":"多选","chapter":"题海训练","stem":"Excel 所拥有的视图方式有（","options":{"A":"普通视图","B":"分页预览视图","C":"大纲视图","D":"页面视图"},"answer":"AB","explanation":"本题考查 Photoshop。魔棒工具是 Photoshop 中提供的一种比较快捷\n的抠图工具，对于一些分界线比较明显的图像，通过魔棒工具可以很快速地将图像抠出。容差\n也就是说容美越卡\n图像颜色的接近度也就越小\n选的区城","subject":"数据库","source_chapter":"题海训练"},{"id":"th-89045","source":"题海训练","type":"多选","chapter":"题海训练","stem":"Excel中，要想选中当前单元格下边的单元格，可以（","options":{"A":"按“Tab”键","B":"按“Enter”键","C":"按“↓”键","D":"按“shift+Enter键"},"answer":"ABC","explanation":"E。解析：本题考查快捷方式。选项 A，快捷方式是一种特殊的类型，代表\n快捷方式的图标称为快捷图标，在其左下角有一个小箭头，通过双击快捷图标来执行快捷程序\n．的方式称为用快捷方式打开；选项B，快捷方式可以在不同的位置进行创建，文件本身并不放\n在桌面上；选项C，快捷方式文件中存放的是一个指向另一个文件的指针，对于源文件本身是\n没有影响的；选项E，删除快捷方式，源文件不会被删除。故本题答案为 ABCE。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-2243","source":"题海训练","type":"多选","chapter":"题海训练","stem":"一般情况下，Excel 默认的显示格式为左对齐的是（","options":{"A":"自动筛选","B":"自定义筛选 14.Excel中，如果对已有的图表不满意，可以更改图表类型，正确的方法是（ 分／软件操作篇／","C":"高级筛选","D":"条件格式"},"answer":"ABD","explanation":"复制或剪切需要的内容后，执行粘贴命令，其内容将被粘贴到当\n前光标处。在执行了复制或者剪切命令后，粘贴板上已经有了内容，粘贴命令才可以使用，只\n是选中是不可以的。所以ABD选项都正确，C 选项不正确。故本题答案为 ABD。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-97441","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在Excel 工作表中，活动单元格的数目只能有一个。（","options":{},"answer":"正确","explanation":"新建文件时设置图像的分辨率单位有（像素／英寸和【像素／厘米】\n两个选项。故本题表述正确。\n名称（N）：未标题-2\n预设(P）剪贴板\n存储项设S\n宽度(W)：：601\n高度(H):25\n分拼率(B)：72\n像素/英寸\n颜色摄式(M)：-RG8颜色\n像素/嘎米\n背内容（C)：白色\n因常大小：\n（肉）高级\n44.0K\n颜色配摄文件（Q）：工作中的RGB：SRGBIEC6196.\n像素长宽比(区）\n方形像素","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-34229","source":"题海训练","type":"判断","chapter":"题海训练","stem":"单元格的地址是用“列号＋行号”表示的。（","options":{},"answer":"正确","explanation":"Photoshop可以支持的模式见下图。故本题表述正确。\n颜色模式（M）：RGB颜色\n位图\n背景内容（C)：\n灰度\nRGB颜色\nCMYK颜色\nLab颜色","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-31968","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在Excel中，选取连续的单元格，需要用Alt 键配合。（","options":{},"answer":"正确","explanation":"","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-32293","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在Excel中，可以在页眉页脚中插人图片，并且可以设置图片的格式。（","options":{},"answer":"正确","explanation":"本题考查母版。通过修改幻灯片母版，可以统一修改文稿中所有\n幻灯片的文本外观，若要统一修改多张幻灯片的外观，只需在母版上做一次修改即可。故本题\n签安头正确\n／软件操作篇\n文本框页眉和顶脚艺术字日期\n横排文本框H\n文本\n重直文本框","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-18755","source":"题海训练","type":"判断","chapter":"题海训练","stem":"移动Excel中数据也可以像在Word中一样，将鼠标指针放在选定的内容上拖动即可","options":{},"answer":"错误","explanation":"本题考查 Excel 操作。Excel 的操作是基于单元格的，所以操作都\n是对单元格的操作，无法直接通过拖动指针移动单元格内的内容。故本题答案为错误。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-5656","source":"题海训练","type":"判断","chapter":"题海训练","stem":"Excel 中清除命令不能删除所选单元格的批注。","options":{},"answer":"错误","explanation":"本题考查Excel清除命令。清除可以清除内容、格式、批注。故\n本题答案为错误。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-10289","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在Excel 中，数字默认的对齐方式是右对齐。（","options":{},"answer":"正确","explanation":"本题考查幻灯片的内容。每张幻灯片可以包含文字和图表，还可\n以包含声音、视频和图像。故本题答案为正确。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-79353","source":"题海训练","type":"判断","chapter":"题海训练","stem":"为了既保护单元格内容，又保护整个工作表，可以既作工作表保护又作工作薄保护","options":{},"answer":"错误","explanation":"本题考查 PowerPoint 的操作。创建空白演示文稿时，幻灯片的颜\n色统一为白色，通过设置可以设置成任何颜色。故本题答案为错误。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-16384","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在Excel 中，单元格中只能显示公式计算结果，而不能显示输人的公式。·（","options":{},"answer":"正确","explanation":"本题考查幻灯片的切换效果。幻灯片在切换时可以设置相应的切\n换效果。故本题答案为正确。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-10438","source":"题海训练","type":"判断","chapter":"题海训练","stem":"利用IF 函数可以实现条件判断。（","options":{},"answer":"错误","explanation":"本题考查 PowerPoint 中配色方案的使用。在PowerPoint 中，应用\n配色方案时，不仅可以应用于全部幻灯片，也可以只应用于某张幻灯片。故本题答案为错误。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-7385","source":"题海训练","type":"判断","chapter":"题海训练","stem":"Excel中删除单元格是将单元格从工作表上完全移去，并移动相邻的单元格来填充空格，\n若对已经删除的单元格进行过引用，将导致出错，显示出错信息是#ERROR。","options":{},"answer":"正确","explanation":"本题考查幻灯片。用户可以对某张幻灯片的背景进行设置而不\n影响其他幻灯片。故本题答题为正确。\n1信息科技－题海训练答案及解析","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-46436","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在Excel单元格中的数据显示为“######”\n是由于该单元格中输人的公式或函数错误。","options":{},"answer":"错误","explanation":"本题考查计算机常识。计算机正在读写数据时突然关机，很可\n能会损坏驱动器（硬盘、软驱等），更不能在计算机工作时搬到计算机。故本题答案为错误。\n14.答案错误。解析：本题考查灰尘对于显示器的影响。对于由十分精密的电子器件\n构成并对使用环境有较高要求的电脑来说，灰尘无疑是它的大敌，尤其是对显示器、磁盘驱动\n器、电路板等元器件。专用的防尘罩能有效预防灰尘危害，确保显示器在相对干净的环境中使\n用。故本题答案为错误\n15【签案】正确。解析：本题查人工智能,\n禁系统是在智能建筑领城\n简称ACS\n超格教育\n1信息科技－题海训练答案及解析\n境一般，可以实时、无限制地观察三维空间里的事物，通过虚拟现实技术，航空站的操作员可\n以模拟太空作业的训练。故本题答案为正确。","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-70977","source":"题海训练","type":"判断","chapter":"题海训练","stem":"在Excel 的单元格中，当数据太长显示不下时，则显示一组“？”。","options":{},"answer":"错误","explanation":"本题考查Excel的数据显示。在Excel单元格中，当数据的长度\n大于单元格的长度时，则显示一组“#”。故本题答案为错误","subject":"办公软件","source_chapter":"题海训练"},{"id":"th-8157","source":"题海训练","type":"判断","chapter":"题海训练","stem":"快捷键Ctrl+V可以剪切被选中的文本。\n「信息科技－题海训练","options":{},"answer":"错误","explanation":"本题考查快捷键。Ctrl+V是粘贴的快捷键。故本题答案为错误。","subject":"操作系统","source_chapter":"题海训练"},{"id":"th-93367","source":"题海训练","type":"单选","chapter":"题海训练·第三节","stem":"如图所示为制作PPT课件的截图，下列说法正确的是（\n你好祖国\n中华人名共和国于1949年成立。","options":{"A":"PPT是一种演示文稿图形程序，是功能强大的演示文稿制作软件","B":"图中序号①处是文稿的编辑窗格，可以输入文字，但不能插入图片","C":"图中序号②处幻灯片放映菜单只提供放映幻灯片功能","D":"上图所示的课件名称为你好祖国"},"answer":"C","explanation":"本题考查VB程序设计语言。Visual Basic（简称VB）是Microsoft公\n司开发的一种通用的基于对象的程序设计语言，为结构化的、模块化的、面向对象的、包含协\n助开发环境的事件驱动为机制的可视化程序设计语言。与传统程序设计语言相比，共有的是结\n构化程序设计、开发环境以及调试技术，而其独有的是事件驱动编程机制。故本题答案为C。","subject":"编程语言","source_chapter":"题海训练·第三节"},{"id":"th-63619","source":"题海训练","type":"单选","chapter":"题海训练·第三节","stem":"选择全部幻灯片时，可用快捷键（","options":{"C":"F3","D":"F4","A":"Shift+A","B":"Ctrl+A ）”键。"},"answer":"C","explanation":"本题考查VB程序设计语言。打开工程文件之后，系统会自动装人\n工程窗口、窗体、工具箱、属性窗口、窗体布局窗口等，所以A项不符合题意。保存Visual\nBasic 程序时，会默认保存窗体和工程两个文件，所以B项不符合题意。事件驱动程序的基本\n结构是由一个事件收集器、一个事件发送器和一个事件处理器组成。事件收集器专门负责收集\n所有事件，包括来自用户的（如鼠标、键盘事件等）、来自硬件的（如时钟事件等）和来自软\n中以编译方式执行，编译后生成exe 程序，所以 C 项符合题意。故本题答案为 C。","subject":"编程语言","source_chapter":"题海训练·第三节"},{"id":"th-58786","source":"题海训练","type":"单选","chapter":"题海训练·第三节","stem":"在 PowerPoint 中，要退出正在播放的幻灯片，可以按“（","options":{"C":"在幻灯片中也可以插入自己录制的声音文件","D":"在播放幻灯片的同时，也可以播放CD唱片 38.PowerPoint 中，下列说法中错误的是（","A":"将图片插入到幻灯片中后，用户可以对这些图片进行必要的操作 “图片”","B":"利用 “工具栏”.中的工具可裁剪图片添加边框和调整图片亮度及对比度"},"answer":"C","explanation":"本题考查VB程序设计语言。Visual Basic 工具箱中，并不是所有控\n件都具有宽度（Width）和高度（Height）属性。比如计时器，它只能在设计时显示，运行时不\n显示，所以 C项符合题意。A项与B项均表明Visual Basic 是一个事件驱动的可视化编程工具，\n这是Visual Basic 的一个重要特征。D项，大部分控件可以在设计时设置，也可以在运行时通\n过程序代码设置。但有些只能在运行时设置，比如列表框Text 属性。故本题答案为 C。","subject":"办公软件","source_chapter":"题海训练·第三节"},{"id":"th-5051","source":"题海训练","type":"多选","chapter":"题海训练·第三节","stem":"在“幻灯片放映”选项卡中，可以进行的操作有（","options":{"A":"选择幻灯片的放映方式","B":"设置幻灯片的放映方式","C":"设置幻灯片放映时的分辨率","D":"设置幻灯片的背景样式"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"办公软件","source_chapter":"题海训练·第三节"},{"id":"th-28583","source":"题海训练","type":"多选","chapter":"题海训练·第三节","stem":"在“切换”选项卡中，可以进行的操作有（","options":{"A":"设置幻灯片的切换效果","B":"设置幻灯片的换片方式","C":"设置幻灯片切换效果的持续时间","D":"设置幻灯片的版式"},"answer":"AC","explanation":"本题考查 Photoshop。用鼠标点击一次，再点击一次就可以形成直\n线型的多边形选择区域，A项正确。多边形套索属于套索工具，B项错误。鼠标拖拽出来的区\n域形成的轨迹就是选择区域。C项正确。多边形套索工具由于区域不规则，·所以不是规则选框\n工具。D项错误。故正确答案为 AC。","subject":"办公软件","source_chapter":"题海训练·第三节"},{"id":"th-17427","source":"题海训练","type":"多选","chapter":"题海训练·第三节","stem":"下列属于“插入”选项卡工具命令的是（","options":{"A":"表格、公式、符号","B":"图片、剪贴画、形状","C":"图表、文本框、艺术字","D":"视频、音频"},"answer":"AB","explanation":"本题考查 Photoshop。魔棒工具是 Photoshop 中提供的一种比较快捷\n的抠图工具，对于一些分界线比较明显的图像，通过魔棒工具可以很快速地将图像抠出。容差\n也就是说容美越卡\n图像颜色的接近度也就越小\n选的区城","subject":"多媒体","source_chapter":"题海训练·第三节"},{"id":"th-1582","source":"题海训练","type":"多选","chapter":"题海训练·第三节","stem":"下列说法哪种是正确的？","options":{"A":"幻灯片中的每一个对象都只能使用相同的动画效果","B":"各个对象的动画的出现顺序可以随便调整","C":"任何一个对象都可以使用不同的动画效果","D":"上面三种说法都不正确"},"answer":"ABC","explanation":"E。解析：本题考查快捷方式。选项 A，快捷方式是一种特殊的类型，代表\n快捷方式的图标称为快捷图标，在其左下角有一个小箭头，通过双击快捷图标来执行快捷程序\n．的方式称为用快捷方式打开；选项B，快捷方式可以在不同的位置进行创建，文件本身并不放\n在桌面上；选项C，快捷方式文件中存放的是一个指向另一个文件的指针，对于源文件本身是\n没有影响的；选项E，删除快捷方式，源文件不会被删除。故本题答案为 ABCE。","subject":"多媒体","source_chapter":"题海训练·第三节"},{"id":"th-82347","source":"题海训练","type":"多选","chapter":"题海训练·第三节","stem":"PowerPoint的视图有（","options":{"B":"幻灯片浏览视图","A":"页面视图","C":"幻灯片视图","D":"大纲视图"},"answer":"ABD","explanation":"复制或剪切需要的内容后，执行粘贴命令，其内容将被粘贴到当\n前光标处。在执行了复制或者剪切命令后，粘贴板上已经有了内容，粘贴命令才可以使用，只\n是选中是不可以的。所以ABD选项都正确，C 选项不正确。故本题答案为 ABD。","subject":"数据库","source_chapter":"题海训练·第三节"},{"id":"th-39812","source":"题海训练","type":"多选","chapter":"题海训练·第三节","stem":"如果只想放映其中一部分幻灯片，下列哪些做法正确？（","options":{"A":"页面设置、幻灯片方向","B":"主题样式、主题颜色、主题字体、主题效果","C":"空格向下翻页","D":"回车向下翻页 11.下列属于“设计”选项卡工具命令的是（"},"answer":"AD","explanation":"本题考查文件属性。常见的文件属性有系统属性、隐藏属性、只读\n属性和归档属性。故本题答案为 AD。","subject":"数据库","source_chapter":"题海训练·第三节"},{"id":"th-2826","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"在Photoshop中编辑有多个图层，其中文字图层应用了“外发光”样式效果后，则下列\n说法正确的是（","options":{"A":"可以更改文字内容和图层样式","B":"只能改变图层样式","C":"只能更改文学内容","D":"文字内容和图层样式都不能更改"},"answer":"A","explanation":"本题考查图层的相关知识。对文字图层应用“外发光”效果后能改\n变图层样式，也能改变文字内容。默认的外发光颜色是淡黄色，外发光的混合模式是“滤色”，\n按此默认设置在浅色背景下就看不出外发光效果了。故本题答案为A。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-65694","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"使用PS处理图像时，经常用到图层。关于图层，下列说法不正确的是（","options":{"A":"将图像中的不同内容放置在不同图层中，便于编辑","B":"修改某一图层内容时，不影响其他图层","C":"使用图层样式，可以创建特殊的图像效果","D":"将图像保存为JPG格式，以后还可以编辑各图层"},"answer":"D","explanation":"本题考查Photoshop中的图层。在 PS 中，图层就像是含有文字或图\n形等元素的胶片，一张张按顺序叠放在一起，组合起来形成页面的最终效果，修改某一图层的\n样式，不会影响其他图层的效果，图像保存为.PSD格式，后续还可以编辑图像的各个图层\n故本题答案为 D。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-32078","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"在Photoshop 中，使用魔棒工具容差越大，选择的精度越（\n），选择的范围相对\n越（","options":{"A":"高，大","B":"高，小","C":"低，大","D":"低，小"},"answer":"C","explanation":"本题考查容差。容差是在选取颜色时所设置的选取范围，容差越大，\n选择的精度越低，选取的范围也越大，其数值是在0～255之间。故本题答案为 C。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-80591","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"下列不属于Photoshop软件功能的是（","options":{"A":"调整图像亮度","B":"调整图像对比度","C":"表格处理","D":"添加文字"},"answer":"C","explanation":"本题考查Photoshop。Photoshop是图像处理软件，可以调整图像亮度、\n对比度，也可以添加文字，设置文字样式，C选项属于Excel 的功能。故本题答案为C。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-57568","source":"题海训练","type":"单选","chapter":"题海训练·第三章","stem":"在Photoshop 中，要删除所有打开的图像文件的历史记录，应采用下列（\n）命令。\n7.如想要抠取图中的浅紫色背景，最恰当的选择工具是（\nEXPO","options":{"C":"多边形套索工具","B":"磁性套索工具","A":"魔术棒工具","D":"钢笔工具"},"answer":"B","explanation":"本题考查 Photoshop。在“历史记录”面板中点击“清除历史记录”\n命令只能清除当前图片的历史记录，不需要配合Ctrl、Alt键使用，这个操作可以撤消；而在\n菜单选项中清理历史记录则为清除所有打开图像的历史记录，而且这个操作不能还原。故本题\n答案为 B。\nI信息科技－题海训练答案及解析\n则选区，但是不能将紫色背景扣出；D选项，磁性套索会吸附在图形边缘，但是控制不精准，\n容易失误。故本题答案为 C。","subject":"多媒体","source_chapter":"题海训练·第三章"},{"id":"th-83208","source":"题海训练","type":"多选","chapter":"题海训练","stem":"Photoshop 不能（","options":{"A":"播放声音","B":"播放动画","C":"打开一个栅格图像文件","D":"打开一个试算表"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-64708","source":"题海训练","type":"多选","chapter":"题海训练","stem":"下列对多边形套索工具的描述，正确的是（","options":{"A":"可以形成直线型的多边形选择区域","B":"多边形套索工具属于绘图工具","C":"按住鼠标键进行拖曳，形成的轨迹就是形成的选择区域","D":"多边形套索工具属于规则选框工具"},"answer":"AC","explanation":"本题考查 Photoshop。用鼠标点击一次，再点击一次就可以形成直\n线型的多边形选择区域，A项正确。多边形套索属于套索工具，B项错误。鼠标拖拽出来的区\n域形成的轨迹就是选择区域。C项正确。多边形套索工具由于区域不规则，·所以不是规则选框\n工具。D项错误。故正确答案为 AC。","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-89405","source":"题海训练","type":"多选","chapter":"题海训练","stem":"对魔棒工具描述正确的是（","options":{"A":"在魔棒选项调板中可通过改变容差数值来控制选择范围","B":"在魔棒选项调板中容差数值越大选择颜色范围也越大","C":"在魔棒选项调板中容差数值越大选择颜色范围也越小","D":"魔棒只能作用于当前图层"},"answer":"AB","explanation":"本题考查 Photoshop。魔棒工具是 Photoshop 中提供的一种比较快捷\n的抠图工具，对于一些分界线比较明显的图像，通过魔棒工具可以很快速地将图像抠出。容差\n也就是说容美越卡\n图像颜色的接近度也就越小\n选的区城","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-20627","source":"题海训练","type":"多选","chapter":"题海训练","stem":"对裁切工具的描述正确的是（","options":{"A":"裁切工具可将所选区域裁掉，而保留裁切框以外的区域","B":"裁切后的图像大小改变了，分辨率也会随之改变","C":"裁切时可随意旋转裁切框","D":"要取消裁切操作可按【Esc】键"},"answer":"ABC","explanation":"E。解析：本题考查快捷方式。选项 A，快捷方式是一种特殊的类型，代表\n快捷方式的图标称为快捷图标，在其左下角有一个小箭头，通过双击快捷图标来执行快捷程序\n．的方式称为用快捷方式打开；选项B，快捷方式可以在不同的位置进行创建，文件本身并不放\n在桌面上；选项C，快捷方式文件中存放的是一个指向另一个文件的指针，对于源文件本身是\n没有影响的；选项E，删除快捷方式，源文件不会被删除。故本题答案为 ABCE。","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-85277","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"Flash动画是以（\n）为基础的顿动画。","options":{"A":"图层","B":"场景","C":"时间线","D":"关键帧"},"answer":"B","explanation":"本题考查操作系统的概念。操作系统是现代计算机系统中最基本和\n最重要的系统软件，所以 B项符合题意。故本题答案为B。\n2．【答案D。解析：本题考查操作系统关心的主要问题。操作系统主要关心的是处理机\n管理、存储器管理、设备管理、文件管理、提供用户接口等功能，而编译器不属于这些功能里\n面的任何一种，不是操作系统关心的问题，所以D项正确。从计算机资源的角度来看，OS的\n作用是管理计算机的硬件和软件等各种系统资源，所以A、C是操作系统关心的问题。从用户\n的角度来看，OS的作用是提供用户和计算机硬件之间的接口，所以B是操作系统关心的问题\n故本题答案为D。","subject":"操作系统","source_chapter":"题海训练·第四章"},{"id":"th-45382","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"Flash 制作中，如果把动画中的每一顿都设置为关键顿，这种动画是（","options":{"A":"变形动画","B":"过程动画","C":"逐顿动画","D":"运动动画"},"answer":"C","explanation":"本题考查逐帧动画。逐顿动画是在时间轴的每一帧都设成关键顿，\n每个关键顿上绘制不同的内容，使其连续播放而成动画，所以C项符合题意。变形动画（形状\n补间动画）：应用于基本形状的变化，它是某一个对象在一定时间内形状发生过渡渐变的动画，\n所以A项不符合题意。过程动画（运动补间动画）：应用于把对象由一个地方移动到另一个\n地方的情况，也可应用与物体的缩放、倾斜或者旋转，还可用于元件颜色和透明度的变化，所\n以 B、D项不符合题意。故本题答案为 C。","subject":"多媒体","source_chapter":"题海训练·第四章"},{"id":"th-67663","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"在 Flash 舞台中，两对象被选中后样式如图，则对象类型分别为（","options":{"A":"组合对象、元件","B":"元件、图形对象","C":"元件、组合对象","D":"组合对象、图形对象"},"answer":"B","explanation":"本题考查元件的概念及类型。元件与图形对象的区别是元件外面有\n一个框，而图形对象没有。故本题答案为 B。","subject":"编程语言","source_chapter":"题海训练·第四章"},{"id":"th-47338","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"小明用 Flash 画了一个篮球，现要将其制作成动作动画，首先要将其（","options":{"A":"复制","B":"转换为元件","C":"遮罩","D":"打散"},"answer":"B","explanation":"本题考查动作补间动画。动作动画的对象必须是元件，而用Flash 画\n的篮球是图形而不是元件，因此必须首先将其转换为图形元件，才可以成功的制作出动作动画，\n故本题答案为 B。","subject":"多媒体","source_chapter":"题海训练·第四章"},{"id":"th-33836","source":"题海训练","type":"单选","chapter":"题海训练·第四章","stem":"在Flash属性面板中更改元件的Alpha 的值，则该元件的（\n）会发生改变。\nAlpha:97%","options":{"A":"透明","B":"图形轮廓","C":"线条颜色","D":"填充颜色"},"answer":"C","explanation":"本题考查Flash。Alpha属性是元件的透明度，取值范围为0%-100%，","subject":"多媒体","source_chapter":"题海训练·第四章"},{"id":"th-23588","source":"题海训练","type":"单选","chapter":"题海训练·第五章","stem":"从计算机应用角度来看，操作系统的主要作用是提供（","options":{"A":"人机交互接口","B":"软件开发基础","C":"第一道安全防线","D":"虚拟机和扩展机"},"answer":"A","explanation":"本题考查操作系统的主要作用。操作系统的主要作用是：（1）操作\n系统是计算机与用户之间的接口；（2）操作系统是对硬件的第一次扩充；（3）操作系统管理\n的资源包括硬件资源与软件资源；（4）操作系统是计算机运行的平台、其他软件应用的基础。\n故本题答案为 A。","subject":"计算机基础","source_chapter":"题海训练·第五章"},{"id":"th-2190","source":"题海训练","type":"单选","chapter":"题海训练·第五章","stem":"苹果公司 Macintosh 系列计算机上的操作系统是（","options":{"A":"UNIX","B":"Mac OS","C":"LINUX","D":"NOVELL Netware"},"answer":"B","explanation":"本题考查 Mac OS 操作系统。UNIX 是多用户、多任务操作系统，属\n于分时操作系统；Mac OS 是一套运行于苹果 Macintosh 系列电脑上的操作系统；LINUX来源于\nUNIX，是一个开放源码的操作系统；Netware 是NOVELL公司的网络操作系统，也是一个开放\n的网络服务平台。故本题答案为B。","subject":"操作系统","source_chapter":"题海训练·第五章"},{"id":"th-30791","source":"题海训练","type":"单选","chapter":"题海训练·第五章","stem":"下列不是操作系统的是（","options":{"B":"Linux","C":"Mac Os","A":"Windows","D":"Oracle"},"answer":"D","explanation":"本题考查常见操作系统。Oracle 为数据库软件。故本题答案为 D。","subject":"数据库","source_chapter":"题海训练·第五章"},{"id":"th-32111","source":"题海训练","type":"多选","chapter":"题海训练","stem":"操作系统的功能有（","options":{"C":"信息管理","B":"内存管理","D":"设备管理","A":"处理器管理"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"操作系统","source_chapter":"题海训练"},{"id":"th-57543","source":"题海训练","type":"多选","chapter":"题海训练","stem":"关于操作系统，下列说法正确的有（","options":{"A":"操作系统是用户和计算机的接口","B":"操作系统是计算机硬件和其他软件的接口","C":"操作系统管理着计算机硬件资源","D":"任何其他软件都必须在操作系统的支持下才能运行"},"answer":"AC","explanation":"本题考查 Photoshop。用鼠标点击一次，再点击一次就可以形成直\n线型的多边形选择区域，A项正确。多边形套索属于套索工具，B项错误。鼠标拖拽出来的区\n域形成的轨迹就是选择区域。C项正确。多边形套索工具由于区域不规则，·所以不是规则选框\n工具。D项错误。故正确答案为 AC。","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-48248","source":"题海训练","type":"多选","chapter":"题海训练","stem":"下列关于操作系统的叙述正确的是（","options":{"A":"“Alt”+“Tab\"","B":"“Win” +“Tab","C":"单击要切换窗口的任何可见部位","D":"单击任务栏上要切换的应用程序按钮"},"answer":"AB","explanation":"本题考查 Photoshop。魔棒工具是 Photoshop 中提供的一种比较快捷\n的抠图工具，对于一些分界线比较明显的图像，通过魔棒工具可以很快速地将图像抠出。容差\n也就是说容美越卡\n图像颜色的接近度也就越小\n选的区城","subject":"多媒体","source_chapter":"题海训练"},{"id":"th-73003","source":"题海训练","type":"单选","chapter":"题海训练","stem":"小学中高年级开设的课程有品德与社会、语文、数学、科学、外语、体育和（","options":{"A":"信息技术","B":"综合实践活动","C":"美术","D":"音乐"},"answer":"B","explanation":"本题考查课程内容。2001年6月，教育部颁布的《基础教育课程改\n革纲要（试行）》明确提出设置综合课程，从小学到高中设置综合实践活动课并作为必修课程，\n其内容主要包括：信息技术教育、研究性学习、社区服务与社会实践以及劳动与技术教育。小\n学低年级开设品德与生活、语文、数学、体育、艺术（或音乐、美术）等课程；小学中高年级\n开设品德与社会、语文、数学、科学、外语、综合实践活动、体育、历史。故本题答案为B。","subject":"信息基础","source_chapter":"题海训练"},{"id":"th-24528","source":"题海训练","type":"单选","chapter":"题海训练","stem":"高中信息技术课程的性质有三个，下面哪一个不是正确的？","options":{"A":"基础性","B":"综合性","C":"人文性","D":"科学性"},"answer":"D","explanation":"本题考查高中信息技术课程性质。高中信息技术课程的性质：基础性，\n决问题的基础，是学生在未来学习型社会中自我发展、持续发展的基础\n综合性，其内容既包括信息技术的基础知识，信息技术的基本操作等技能性知识，也包括\n应用信息技术解决实际问题的方法，对信息技术过程、方法与结果评价的方法，信息技术在学\n习和生活中的应用，以及相关权利义务、伦理道德、法律法规等。\n人文性，课程为实现人的全面发展而设置，既表现出基本的工具价值又表现出丰富的文化\n价值，即既有恰当而充实的技术内涵，又体现科学精神，强化人文精神\n科学性，是判断事物是否符合客观事实的标准，富有科学依据，不是高中信息技术课程的\n超格教育\nI信息科技－题海训练答案及解析\n作体验，进而获得情感态度、价值观以及能力的发展。在课程中，依据信息技术学科理论性、\n工具性和实践性并重的特征，设计活动情境，注重学生在项目中学习，依托快速发展与日益更\n新的信息技术工具，保持对新技术成果的开放性，鼓励师生共同学习。故本题答案为D。","subject":"信息基础","source_chapter":"题海训练"},{"id":"th-26385","source":"题海训练","type":"单选","chapter":"题海训练","stem":"信息技术课程结构遵循高中学生的认知特征和个性化学习需要，体现信息技术课程\n的（","options":{"A":"实际性、相关性、互补性","B":"有效性、高效性、启发性","C":"层次性、多样性、选择性","D":"自主性、趣味性、合作性"},"answer":"A","explanation":"本题考查VB程序设计语言。A项Caption用于显示控件上的文本\nI信息科技－题海训练答案及解析\n内存中彻底清除。所以 A项符合题意。窗体的 Load 事件用来在启动程序时对对象属性和变量\n进行初始化。程序运行时，将自动触发窗体的 Load 事件。窗体的Enabled 属性为 False时，该\n窗体上所有控件，甚至包括窗体本身的操作都被禁止。窗体的Height、Width 属性分别用于设\n置窗体的高度和宽度，这两个属性在程序设计和运行时都可以进行设置。故本题答案为A。","subject":"数据库","source_chapter":"题海训练"},{"id":"th-11961","source":"题海训练","type":"单选","chapter":"题海训练","stem":"课程评价以（\n）的分级体系为依据，利用多元方式跟踪学生的学习过程，采集学习\n数据，及时反馈学生的学习状况，改进学习，优化教学，评估学业成就。\n|信息科技－题海训练\n10.（\n）是指个体运用计算机科学领域的思想方法，在形成问题解决方案的过程中产\n生的一系列思维活动。","options":{"A":"信息技术知识技能","B":"信息技术人文观","C":"信息技术价值观","D":"信息技术问题的解决"},"answer":"A","explanation":"本题考查VB程序设计语言。VB中工程文件的扩展名是.vbp，B项frm\n是窗体文件的扩展名，C项.bas 是标准模块的扩展名，D项.vbw是VB工作区文件，保存窗体\n启动状态与大小。故本题答案为 A。","subject":"信息基础","source_chapter":"题海训练"},{"id":"th-79251","source":"题海训练","type":"多选","chapter":"题海训练","stem":"关于教育技术与信息技术的关系，你认为错误的说法是（","options":{"A":"教育技术从属于信息技术","B":"具备信息技术素养是教师掌握教育技术的基础","C":"信息技术水平高的老师没必要加教育技术的培训","D":"教育技术的核心是信息技术"},"answer":"ABD","explanation":"本题考查操作系统的功能。操作系统的功能有：处理器管理、\n」信息科技－题海训练答案及解析\n应用软件提供支持，让计算机系统所有资源最大限度地发挥作用，提供各种形式的用户界面，\n使用户有一一个好的工作环境。所以选项C是错误的，操作系统主要起到用户和计算机的接口作\n用，不适用于数据处理。故本题答案为 ABD。","subject":"信息基础","source_chapter":"题海训练"}];

const STORE_KEY = 'shaoyang-quiz-v2';
// 应急：URL 含 ?reset=1 时清空 localStorage
if (new URLSearchParams(location.search).get('reset') === '1') {
  localStorage.removeItem(STORE_KEY);
  localStorage.removeItem('shaoyang-quiz-v1');
  history.replaceState(null, '', location.pathname);
}
const MASTER_THRESHOLD = 2;  // 错题需连续答对 N 次才移出错题本
let state = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
state.done = state.done || {};        // qid -> 最近一次选择的字母
state.wrong = state.wrong || {};       // qid -> 累计答错次数
state.streak = state.streak || {};     // qid -> 连续答对次数（错题本中）
state.fav = state.fav || {};           // qid -> true
state.history = state.history || {};   // qid -> [选项序列]
state.mode = state.mode || 'seq';
state.subject = state.subject || '';
state.typeFilter = state.typeFilter || '';
state.cursor = state.cursor || 0;

// 兼容 v1
const v1 = JSON.parse(localStorage.getItem('shaoyang-quiz-v1') || 'null');
if (v1 && !state.done) {
  Object.assign(state, v1);
}

function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

// 错题自动收集核心：
//   答错 → 加入错题本（wrong[qid]++），重置 streak
//   答对 → 若在错题本中：streak++；连续答对 MASTER_THRESHOLD 次后移出
//   首次答对（不在错题本）→ 不动
function handleAnswer(q, given) {
  state.done[q.id] = given;
  if (!state.history[q.id]) state.history[q.id] = [];
  state.history[q.id].push(given);
  state._stickyId = q.id;       // 保留当前题显示，让用户看解析
  state.currentId = q.id;
  const ok = isAnswerCorrect(q, given);
  if (!ok) {
    // 答错 → 自动进错题本
    state.wrong[q.id] = (state.wrong[q.id] || 0) + 1;
    state.streak[q.id] = 0;
  } else {
    if (state.wrong[q.id]) {
      state.streak[q.id] = (state.streak[q.id] || 0) + 1;
      if (state.streak[q.id] >= MASTER_THRESHOLD) {
        delete state.wrong[q.id];
        delete state.streak[q.id];
      }
    }
  }
}

function exportWrong() {
  const ids = Object.keys(state.wrong);
  if (!ids.length) { alert('错题本是空的'); return; }
  const idMap = Object.fromEntries(QUESTIONS.map(q => [q.id, q]));
  const groups = {};
  ids.forEach(id => {
    const q = idMap[id]; if (!q) return;
    (groups[q.chapter] = groups[q.chapter] || []).push({q, count: state.wrong[id]});
  });
  let txt = `错题本导出 · ${new Date().toLocaleString('zh-CN')}\n共 ${ids.length} 道错题\n\n`;
  for (const ch of Object.keys(groups).sort()) {
    txt += `\n========== ${ch} (${groups[ch].length} 题) ==========\n\n`;
    groups[ch].forEach(({q, count}, i) => {
      txt += `${i+1}. [错${count}次] ${q.stem}\n`;
      for (const L of ['A','B','C','D']) {
        if (q.options[L]) txt += `   ${L}. ${q.options[L]}\n`;
      }
      txt += `   【答案】${q.answer}\n`;
      if (q.explanation) txt += `   【解析】${q.explanation}\n`;
      txt += '\n';
    });
  }
  const blob = new Blob([txt], {type: 'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `错题本_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}

function getPool() {
  let pool = QUESTIONS;
  if (state.subject) pool = pool.filter(q => q.subject === state.subject);
  if (state.typeFilter) pool = pool.filter(q => q.type === state.typeFilter);
  // 模式过滤
  if (state.mode === 'wrong') {
    pool = pool.filter(q => state.wrong[q.id] || state._stickyId === q.id);
  } else if (state.mode === 'fav') {
    pool = pool.filter(q => state.fav[q.id]);
  } else {
    // seq/rnd：排除已答（除非"粘滞"显示中或正在重答）
    pool = pool.filter(q => !state.done[q.id] || state._stickyId === q.id);
  }
  if (state.mode === 'rnd' && !state._shuffled) {
    pool = [...pool].sort(() => Math.random() - 0.5);
    state._shuffleIds = pool.map(q => q.id);
    state._shuffled = true;
  } else if (state._shuffleIds && state.mode === 'rnd') {
    const idMap = Object.fromEntries(pool.map(q => [q.id, q]));
    pool = state._shuffleIds.map(id => idMap[id]).filter(Boolean);
  }
  return pool;
}

function updateStats() {
  if (window._refreshSubjectOptions) window._refreshSubjectOptions();
  // 统计基于科目+题型筛选范围，不受模式过滤影响（避免"已答的题被过滤后已做归零"）
  let scope = QUESTIONS;
  if (state.subject) scope = scope.filter(q => q.subject === state.subject);
  if (state.typeFilter) scope = scope.filter(q => q.type === state.typeFilter);
  const totalScope = scope.length;
  const doneInScope = scope.filter(q => state.done[q.id]).length;
  const correctInScope = scope.filter(q => state.done[q.id] && isAnswerCorrect(q, state.done[q.id])).length;
  const wrongInScope = doneInScope - correctInScope;
  // 错题本只统计当前 scope 中处于错题本的题
  const wrongbookInScope = scope.filter(q => state.wrong[q.id]).length;
  const setText = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  setText('stat-done', doneInScope);
  setText('stat-correct', correctInScope);
  setText('stat-wrong', wrongInScope);
  setText('stat-rate', doneInScope ? Math.round(correctInScope * 100 / doneInScope) + '%' : '0%');
  setText('stat-wrongbook', wrongbookInScope);
  const pct = totalScope ? Math.round(doneInScope * 100 / totalScope) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('total').textContent = totalScope;
  // 折叠时显示的简短统计
  const rate = doneInScope ? Math.round(correctInScope * 100 / doneInScope) : 0;
  setText('mini-stat', `${doneInScope}/${totalScope} · ${rate}%${wrongbookInScope ? ' · 错' + wrongbookInScope : ''}`);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function normalizeAnswer(s) {
  return String(s || '').replace(/\s+/g, '').toLowerCase()
    .replace(/[，、；,;]/g, '|').replace(/[(（].*?[)）]/g, '');
}

function isAnswerCorrect(q, given) {
  if (q.type === '多选') {
    // given 是数组；规范化成字母排序字符串
    const a = [...given].sort().join('');
    const b = [...(q.answer || '')].sort().join('');
    return a === b;
  }
  if (q.type === '填空') {
    return normalizeAnswer(given) === normalizeAnswer(q.answer);
  }
  return given === q.answer;
}

function renderQuestion(q, pool) {
  // 错题模式：让用户重答，隐藏旧答案；只有刚答完（sticky）时显示反馈
  const inWrongFresh = state.mode === 'wrong' && state._stickyId !== q.id;
  const chosen = inWrongFresh ? null : state.done[q.id];
  const isFav = state.fav[q.id];
  let bodyHtml = '';

  if (q.type === '单选' || q.type === '多选') {
    const isMulti = q.type === '多选';
    let pending = state._pending && state._pending.qid === q.id ? state._pending.set : new Set();
    let optsHtml = '';
    for (const L of ['A','B','C','D']) {
      if (!q.options[L]) continue;
      let cls = 'opt';
      if (chosen) {
        const ansSet = new Set(q.answer.split(''));
        const userSet = new Set(chosen.split(''));
        if (ansSet.has(L)) cls += ' correct';
        else if (userSet.has(L)) cls += ' wrong';
      } else if (isMulti && pending.has(L)) {
        cls += ' selected';
      }
      optsHtml += `<div class="${cls}" data-letter="${L}">
        <div class="letter">${L}</div>
        <div class="text">${escapeHtml(q.options[L])}</div>
      </div>`;
    }
    bodyHtml = `<div class="options">${optsHtml}</div>`;
    if (isMulti && !chosen) {
      bodyHtml += `<div class="multi-actions"><button id="submit-multi" class="primary-btn">提交多选答案 (已选 ${pending.size} 个)</button></div>`;
    }
  } else if (q.type === '判断') {
    let optsHtml = '';
    for (const v of ['正确', '错误']) {
      let cls = 'opt judge';
      if (chosen) {
        if (v === q.answer) cls += ' correct';
        else if (v === chosen) cls += ' wrong';
      }
      const icon = v === '正确' ? '✓' : '✗';
      optsHtml += `<div class="${cls}" data-judge="${v}">
        <div class="letter">${icon}</div>
        <div class="text">${v}</div>
      </div>`;
    }
    bodyHtml = `<div class="options">${optsHtml}</div>`;
  } else if (q.type === '填空') {
    const val = chosen || (state._pending && state._pending.qid === q.id ? state._pending.text : '');
    let cls = '';
    if (chosen) {
      cls = isAnswerCorrect(q, chosen) ? 'correct' : 'wrong';
    }
    bodyHtml = `<div class="fill-blank">
      <input type="text" id="fill-input" class="${cls}" placeholder="输入答案..." value="${escapeHtml(val)}" ${chosen ? 'disabled' : ''}>
      ${!chosen ? '<button id="submit-fill" class="primary-btn">提交</button><button id="show-fill" class="secondary">查看答案</button>' : ''}
    </div>`;
  }

  let feedbackHtml = '';
  if (chosen) {
    const ok = isAnswerCorrect(q, chosen);
    const wrongCount = state.wrong[q.id] || 0;
    const streak = state.streak[q.id] || 0;
    let badge = '';
    if (wrongCount > 0) {
      const remain = Math.max(0, MASTER_THRESHOLD - streak);
      badge = ` · 已错 ${wrongCount} 次` + (remain > 0 && ok ? ` · 还需连续答对 ${remain} 次出本` : '');
    }
    let expHtml;
    if (q.explanation && q.explanation.trim()) {
      expHtml = `<div class="explanation"><div class="exp-title">📖 解析</div>${escapeHtml(q.explanation)}</div>`;
    } else {
      expHtml = `<div class="explanation no-exp">（本题暂无文字解析${q.source === '超格' ? '，超格 PPT 课件由老师口讲' : ''}）</div>`;
    }
    const showAns = q.type === '填空' ? '答案：' + q.answer : (q.type === '判断' ? '答案：' + q.answer : '答案：' + q.answer);
    feedbackHtml = `<div class="feedback show">
      <div class="label ${ok?'ok':'ng'}">${ok ? '✓ 正确' : '✗ 错误，' + showAns}${badge}</div>
      ${expHtml}
    </div>`;
  }

  document.getElementById('card-area').innerHTML = `
    <div class="card">
      <div class="meta">
        <span class="source ${q.source==='中公'?'src-zhonggong':''}">${q.source}</span>
        <span class="type-tag type-${q.type}">${q.type}</span>
        <span class="subject-tag">${escapeHtml(q.subject)}</span>
        <span class="src-chap">${escapeHtml(q.source_chapter || '')}</span>
        <span style="float:right">${state.cursor + 1} / ${pool.length}</span>
      </div>
      <div class="stem">${escapeHtml(q.stem)}</div>
      ${bodyHtml}
      ${feedbackHtml}
      <div class="nav">
        <button class="icon-only" id="prev" aria-label="上一题">←</button>
        <button class="icon-only fav ${isFav?'active':''}" id="fav" aria-label="收藏">${isFav?'★':'☆'}</button>
        ${state.done[q.id] ? '<button class="icon-only" id="redo" aria-label="重答">↻</button>' : ''}
        <button class="primary-next ${state.done[q.id] ? 'ready' : ''}" id="next">${state.done[q.id] ? '下一题 →' : '跳过 →'}</button>
      </div>
    </div>`;

  // 绑定事件
  if (q.type === '单选') {
    document.querySelectorAll('.opt').forEach(el => {
      el.onclick = () => {
        if (state.done[q.id] && !inWrongFresh) return;
        handleAnswer(q, el.dataset.letter); save(); render();
      };
    });
  } else if (q.type === '多选') {
    document.querySelectorAll('.opt').forEach(el => {
      el.onclick = () => {
        if (state.done[q.id] && !inWrongFresh) return;
        const L = el.dataset.letter;
        if (!state._pending || state._pending.qid !== q.id) {
          state._pending = { qid: q.id, set: new Set() };
        }
        if (state._pending.set.has(L)) state._pending.set.delete(L);
        else state._pending.set.add(L);
        render();
      };
    });
    const sub = document.getElementById('submit-multi');
    if (sub) sub.onclick = () => {
      if (!state._pending || state._pending.set.size === 0) { alert('请至少选一项'); return; }
      const ans = [...state._pending.set].sort().join('');
      state._pending = null;
      handleAnswer(q, ans); save(); render();
    };
  } else if (q.type === '判断') {
    document.querySelectorAll('.opt').forEach(el => {
      el.onclick = () => {
        if (state.done[q.id] && !inWrongFresh) return;
        handleAnswer(q, el.dataset.judge); save(); render();
      };
    });
  } else if (q.type === '填空') {
    const input = document.getElementById('fill-input');
    const sub = document.getElementById('submit-fill');
    const show = document.getElementById('show-fill');
    if (sub) sub.onclick = () => {
      const v = input.value.trim();
      if (!v) { alert('请输入答案'); return; }
      handleAnswer(q, v); save(); render();
    };
    if (show) show.onclick = () => {
      // 直接显示答案，记为"放弃"，不计错
      state.done[q.id] = '【放弃】';
      save(); render();
    };
    if (input) {
      input.oninput = () => {
        state._pending = { qid: q.id, text: input.value };
      };
      input.onkeydown = (e) => {
        if (e.key === 'Enter' && sub) sub.click();
      };
    }
  }

  document.getElementById('prev').onclick = () => prevQuestion();
  document.getElementById('next').onclick = () => nextQuestion();
  document.getElementById('fav').onclick = () => {
    if (state.fav[q.id]) delete state.fav[q.id];
    else state.fav[q.id] = true;
    save(); render();
  };
  const redoBtn = document.getElementById('redo');
  if (redoBtn) redoBtn.onclick = () => {
    delete state.done[q.id];
    state._pending = null;
    save(); render();
  };
}

function render() {
  updateStats();
  const pool = getPool();
  if (!pool.length) {
    let msg = '🎉 当前条件下题目已全部刷完！';
    if (state.mode === 'seq' || state.mode === 'rnd') {
      msg += '<div style="margin-top:12px;font-size:14px;color:var(--muted)">切换到"错题本"继续刷错题，或换个科目/题型筛选</div>';
    } else if (state.mode === 'wrong') {
      msg = '🎯 错题本已清空！所有错题都已掌握';
    } else if (state.mode === 'fav') {
      msg = '收藏夹是空的，去刷题时点 ☆ 收藏感兴趣的题';
    }
    document.getElementById('card-area').innerHTML = `<div class="card empty">${msg}</div>`;
    return;
  }
  // 通过 currentId 定位
  let q = state.currentId ? pool.find(qq => qq.id === state.currentId) : null;
  if (!q) {
    q = pool[0];
    state.currentId = q.id;
  }
  state.cursor = pool.indexOf(q);
  renderQuestion(q, pool);
}

function nextQuestion() {
  state._stickyId = null;
  state._pending = null;
  const pool = getPool();
  if (pool.length === 0) { state.currentId = null; save(); render(); return; }
  let idx = pool.findIndex(qq => qq.id === state.currentId);
  if (idx >= 0) {
    idx = (idx + 1) % pool.length;
  } else {
    // 当前题已被过滤（答对后），cursor 自然指向下一题
    idx = Math.min(state.cursor, pool.length - 1);
    if (idx < 0) idx = 0;
  }
  state.currentId = pool[idx].id;
  save(); render();
}

function prevQuestion() {
  state._stickyId = null;
  state._pending = null;
  const pool = getPool();
  if (pool.length === 0) { state.currentId = null; save(); render(); return; }
  let idx = pool.findIndex(qq => qq.id === state.currentId);
  if (idx >= 0) idx = (idx - 1 + pool.length) % pool.length;
  else idx = 0;
  state.currentId = pool[idx].id;
  save(); render();
}

function buildSubjectStat(subject) {
  const subset = subject ? QUESTIONS.filter(q => q.subject === subject) : QUESTIONS;
  const total = subset.length;
  const done = subset.filter(q => state.done[q.id]).length;
  const correct = subset.filter(q => state.done[q.id] && isAnswerCorrect(q, state.done[q.id])).length;
  const rate = done ? Math.round(correct * 100 / done) : 0;
  return { total, done, correct, rate };
}

function setupChapters() {
  const sel = document.getElementById('subject');
  const counts = {};
  QUESTIONS.forEach(q => { counts[q.subject] = (counts[q.subject] || 0) + 1; });
  const prefer = ['信息基础','计算机基础','操作系统','计算机网络','数据库','办公软件','多媒体','编程语言','算法与数据结构','信息安全','教学论','其他'];
  const subjects = prefer.filter(s => counts[s]);
  Object.keys(counts).filter(s => !prefer.includes(s)).forEach(s => subjects.push(s));

  function refreshSubjectOptions() {
    sel.innerHTML = '';
    const allOpt = document.createElement('option');
    allOpt.value = '';
    const allStat = buildSubjectStat('');
    allOpt.textContent = `全部科目 (${allStat.done}/${allStat.total} · ${allStat.rate}%)`;
    sel.appendChild(allOpt);
    for (const s of subjects) {
      const opt = document.createElement('option');
      opt.value = s;
      const st = buildSubjectStat(s);
      opt.textContent = `${s}  ${st.done}/${st.total} · ${st.rate}%`;
      sel.appendChild(opt);
    }
    sel.value = state.subject || '';
  }
  refreshSubjectOptions();
  // 暴露给 render 用
  window._refreshSubjectOptions = refreshSubjectOptions;
  sel.onchange = () => { state.subject = sel.value; state.cursor = 0; state._shuffled = false; state._stickyId = null; state.currentId = null; save(); render(); };

  const tsel = document.getElementById('type-filter');
  tsel.value = state.typeFilter || '';
  tsel.onchange = () => { state.typeFilter = tsel.value; state.cursor = 0; state._shuffled = false; state._stickyId = null; state.currentId = null; save(); render(); };
  // 标注每个题型的数量
  const typeCounts = {};
  QUESTIONS.forEach(q => { typeCounts[q.type] = (typeCounts[q.type] || 0) + 1; });
  for (const opt of tsel.options) {
    if (opt.value && typeCounts[opt.value]) {
      opt.textContent = opt.value + ' (' + typeCounts[opt.value] + ')';
    }
  }
}

function setupModes() {
  document.querySelectorAll('.chip[data-mode]').forEach(chip => {
    if (state.mode === chip.dataset.mode) chip.classList.add('active');
    chip.onclick = () => {
      const m = chip.dataset.mode;
      state.mode = m;
      state.cursor = 0;
      state._shuffled = false;
      state._stickyId = null;
      state.currentId = null;
      state._pending = null;
      document.querySelectorAll('.chip[data-mode]').forEach(c => c.classList.toggle('active', c.dataset.mode === m));
      save(); render();
    };
  });
  document.getElementById('reset').onclick = () => {
    document.getElementById('menu-popup').classList.remove('show');
    if (confirm('确定重置所有进度？错题、收藏将一并清除。')) {
      localStorage.removeItem(STORE_KEY);
      localStorage.removeItem('shaoyang-quiz-v1');
      location.reload();
    }
  };
  document.getElementById('export-wrong').onclick = () => {
    document.getElementById('menu-popup').classList.remove('show');
    exportWrong();
  };

  // 菜单展开/关闭
  const menuBtn = document.getElementById('menu-toggle');
  const menuPopup = document.getElementById('menu-popup');
  menuBtn.onclick = (e) => {
    e.stopPropagation();
    menuPopup.classList.toggle('show');
  };

  // 折叠开关（默认折叠）
  const header = document.getElementById('header');
  const collapseBtn = document.getElementById('collapse-toggle');
  const applyCollapsed = (collapsed) => {
    header.classList.toggle('collapsed', collapsed);
    collapseBtn.textContent = collapsed ? '📊' : '▼';
    document.getElementById('mini-stat').style.display = collapsed ? '' : 'none';
    state._statsCollapsed = collapsed;
  };
  applyCollapsed(state._statsCollapsed !== false); // 默认 true（折叠）
  collapseBtn.onclick = () => {
    applyCollapsed(!header.classList.contains('collapsed'));
    save();
  };
  document.addEventListener('click', (e) => {
    if (!menuPopup.contains(e.target) && e.target !== menuBtn) {
      menuPopup.classList.remove('show');
    }
  });
}

document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  const pool = getPool();
  if (!pool.length) return;
  const q = pool[state.cursor];
  if (!q) return;
  const isLetter = e.key.length === 1 && 'abcdABCD'.includes(e.key);
  const isNum14 = e.key >= '1' && e.key <= '4';
  const inWrongFresh = state.mode === 'wrong' && state._stickyId !== q.id;
  const canAnswer = !state.done[q.id] || inWrongFresh;

  if (q.type === '判断' && canAnswer) {
    if (e.key === 't' || e.key === 'T' || e.key === '1' || e.key === '√') {
      handleAnswer(q, '正确'); save(); render(); return;
    }
    if (e.key === '0' || e.key === '×' ||
        ((e.key === 'f' || e.key === 'F') && !e.shiftKey)) {
      handleAnswer(q, '错误'); save(); render(); return;
    }
  }

  if ((isLetter || isNum14) && canAnswer) {
    const L = isNum14 ? ['A','B','C','D'][parseInt(e.key) - 1] : e.key.toUpperCase();
    if (q.type === '单选' && q.options[L]) {
      handleAnswer(q, L); save(); render(); return;
    }
    if (q.type === '多选' && q.options[L]) {
      if (!state._pending || state._pending.qid !== q.id) state._pending = { qid: q.id, set: new Set() };
      if (state._pending.set.has(L)) state._pending.set.delete(L);
      else state._pending.set.add(L);
      render(); return;
    }
  }

  if (q.type === '多选' && e.key === 'Enter' && canAnswer
      && state._pending && state._pending.qid === q.id && state._pending.set.size > 0) {
    const ans = [...state._pending.set].sort().join('');
    state._pending = null;
    handleAnswer(q, ans); save(); render(); return;
  }

  if (e.key === 'ArrowLeft') {
    prevQuestion();
  } else if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
    nextQuestion();
    e.preventDefault();
  } else if (e.shiftKey && (e.key === 'F' || e.key === 'f')) {
    if (state.fav[q.id]) delete state.fav[q.id];
    else state.fav[q.id] = true;
    save(); render();
  }
});

// 手势滑动切换题目（仅手机端）
(function setupSwipe() {
  let startX = 0, startY = 0, startT = 0, tracking = false;
  const card = document.getElementById('card-area');
  function onStart(e) {
    if (e.target.closest('.opt, .nav, button, input, select, .feedback')) return;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY; startT = Date.now(); tracking = true;
  }
  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    const t = (e.changedTouches && e.changedTouches[0]) || e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.5 || dt > 600) return;
    if (dx < 0) nextQuestion();
    else prevQuestion();
  }
  document.addEventListener('touchstart', onStart, { passive: true });
  document.addEventListener('touchend', onEnd, { passive: true });
})();

setupChapters();
setupModes();
render();
</script>
