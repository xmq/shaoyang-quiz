answer":"B","explanation":"","subject":"办公软件","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q109","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"小明准备为班级制作班级网页，你认为他应该选择哪个工具最合适？（ ）","options":{"A":"PowerPoint","B":"Excel","C":"Word","D":"Frontpage"},"answer":"D","explanation":"","subject":"办公软件","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q110","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"在网络上交流信息需要遵循一定的标准，目的是为了信息表达（ ）。","options":{"A":"数字化","B":"自由化","C":"通俗化","D":"规范化"},"answer":"D","explanation":"网络通信遵循协议正是为了让信息表达统一规范，体现规范化。","subject":"信息基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s1-q111","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0115","stem":"移动信息运营商正在大力宣传 4G 手机，这里的 4G 是指（ ）。","options":{"A":"手机中的存储容量为 4GB","B":"手机能够收发的短信容量为 4GB","C":"第四代手机制造技术","D":"第四代移动通信技术"},"answer":"D","explanation":"4G = Fourth Generation 第四代移动通信技术（LTE）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s2-q1","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0115","stem":"计算机网络分为（ ）。","options":{"A":"逻辑子网","B":"数据子网","C":"资源子网","D":"通信子网"},"answer":"CD","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s2-q2","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0115","stem":"按计算机网络连接区域的大小可以把计算机网络分为（ ）。","options":{"A":"大域网","B":"城域网","C":"局域网","D":"广域网"},"answer":"BCD","explanation":"按地理范围分：局域网（LAN）、城域网（MAN）、广域网（WAN）。\"大域网\"无此说法。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s2-q3","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0115","stem":"无线网络的传输媒体包括（ ）。","options":{"A":"无线网络","B":"微波","C":"红外线","D":"电磁波"},"answer":"BCD","explanation":"无线传输媒体：微波、红外线、电磁波（含无线电）。","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s2-q4","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0115","stem":"以下关于MAC地址的说法中正确的是（ ）。","options":{"A":"MAC地址的一部分字节是各个厂家从IEEE得来的","B":"MAC地址一共有6个字节，他们从出厂时就被固化在网卡中","C":"MAC地址也称作物理地址，或通常所说的计算机的硬件地址","D":"局域网中的计算机在判断所收到的广播帧是否为自己应该接收的方法是，判断帧 的MAC地址是否与本机的硬件地址相同 单播帧"},"answer":"ABC","explanation":"MAC 地址 6 字节固化在网卡中，又叫物理地址/硬件地址，前 3 字节是 IEEE 分配的 OUI。D 错（MAC 比对是单播帧，不是广播）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s2-q5","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0115","stem":"以下属于数据链路设备的是（ ）。","options":{"A":"集线器","B":"交换机","C":"路由器","D":"网桥"},"answer":"BD","explanation":"","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s2-q6","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0115","stem":"总线型结构的网络特点包括（ ）。","options":{"A":"结构简单，可扩充性好","B":"使用的设备相对简单，可靠性高","C":"维护简单，分支结点故障查找容易","D":"使用的电缆少，安装容易"},"answer":"ABD","explanation":"","subject":"算法与数据结构","source_chapter":"第三篇 数据库网络·0115"},{"id":"cg-08-s2-q7","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0115","stem":"传输层的协议有（ ）。","options":{"A":"IP","B":"TCP","C":"RARP","D":"UDP"},"answer":"BD","explanation":"","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"zg-8739","source":"中公","type":"多选","chapter":"第五章 计算机网络","stem":"有效的 IP 地址是（ ）。","options":{"A":"208.25.81","B":"203.8.12.45","C":"57.1.254.89","D":"108.18.256.90"},"answer":"BC","explanation":"IP 地址是由 32 个二进制位组成，IP 地址采用“点分十进制”进行表示。即\n将 IP 地址分成四个字节，每个字节十进制的范围是 0~255，并且数值之间用英文圆点“.”隔开。A 选\n项，只有三个数字，不合法。D 选项，第三个字节的数值大于 255，不合法。","subject":"计算机基础","source_chapter":"第五章 计算机网络"},{"id":"cg-08-s2-q9","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0115","stem":"每个 IP 地址由（ ）组成。","options":{"A":"地址类型","B":"网络号","C":"主机号","D":"服务号"},"answer":"BC","explanation":"","subject":"计算机网络","source_chapter":"第三篇 数据库网络·0115"},{"id":"dy-65032","source":"德阳","type":"单选","chapter":"德阳计算机题本·第六章 计算机网络基础","stem":"下列（）属于网站开发语言。","options":{"A":"ASP","B":"Dreamweaver","C":"PHP","D":"JSP 全金标尺教育"},"answer":"A","explanation":"图像数据量=图像的总像素×颜色深度/8（Byte），两图的像素大\n小相同，颜色深度是指图像中每个像素的颜色信息所占二进制位数，一位可以表示两种颜色，因\n此，黑白两色的颜色深度为1，16色彩图颜色深度为4，所以后者所需存储空间大于前者。故正\n确答案为 A。","subject":"计算机基础","source_chapter":"德阳计算机题本·第六章 计算机网络基础"},{"id":"cg-09-s1-q1","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"在下面给出 source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q46","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"在 SELECT 语句中，下列子句用于将查询结果存储在一个新表中（ ）。","options":{"A":"FROM 子句","B":"INTO 子句","C":"SELECT 子句","D":"WHERE 子句"},"answer":"B","explanation":"SELECT...INTO 子句把查询结果存入新表（如 SELECT * INTO new_table FROM old_table）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q47","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"执行以下 SQL，下面哪个名字会被查询出来（ ）。\nSELECT FirstName FROM StaffList WHERE FirstName LIKE‘_A%’","options":{"A":"Allen","B":"CLARK","C":"JACKSON","D":"David"},"answer":"C","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q48","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"在 mysql 中，与语句 SELECT * FROM book b WHERE B. book num NOT\nBETWEEN 200 AND 300；等价的有（ ）。","options":{"A":"SELECT * FROM book b WHERE B. book num < 200 OR B. book num >= 300","B":"SELECT * FROM book b WHERE B. book num <= 200 OR B. book num > 300","C":"SELECT * FROM book b WHERE B. book num <= 200 OR B. book num >= 300","D":"SELECT * FROM book b WHERE B. book num < 200 OR B. book num > 300"},"answer":"D","explanation":"NOT BETWEEN 200 AND 300 等价于 < 200 OR > 300（端点都排除）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q49","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"关于更新表查询，以下说法正确的是（ ）。","options":{"A":"使用更新查询可以将已有的表中满足条件的记录进行更新","B":"使用更新查询一次只能对一条记录进行更改","C":"使用更新查询后随时可以根据需要恢复数据","D":"使用更新查询效率和在数据表中更新数据效率相同"},"answer":"A","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q50","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"从参赛选手表中删去“林琳”同学的记录，正确的 SQL 语句是（ ）。","options":{"A":"DELETE * B. DELETE FROM 姓名 =‘林琳’ FROM 参赛选手表 WHERE 参赛选手表 WHERE 姓名 =‘林琳’","C":"UPDATE D. UPDATE FROM 姓名 =‘林琳’ FROM 参赛选手表 WHERE 参赛选手表 WHERE 姓名 =‘林琳’ B"},"answer":"B","explanation":"DELETE FROM 表 WHERE 条件 是 SQL 删除记录的标准语法。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q51","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"假设 Students 表中有主键 Scode，Score 表中有外键 stuNo 列，stuNo 引入\nScode 列来实施引用完整性约束，此时如果使用 SQL：\nUpdate Students set Scode = ‘001’ where Scode = ‘002’（ ）。","options":{"A":"肯定会产生更新错误","B":"可能会更新 Students 表中的两行数据","C":"可能会更新 Score 表中的一行数据","D":"可能会更新 Students 表中的一行数据"},"answer":"A","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q52","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"将查询关系 S 的权限授予用户 WANG，并允许该用户将此权限授予其他用户。\n实现此功能的 SQL 语句是（ ）。","options":{"A":"GRANT SELECT TO S ON WANG WITH PUBLIC","B":"GRANT SELECT ON S TO WANG WITH PUBLIC","C":"GRANT SELECT TO S TO WANG WITH GRANT OPTION","D":"GRANT SELECT ON S TO WANG WITH GRANT OPTION"},"answer":"D","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q53","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"要删除 Student 表的 Birthyear 列，同时删除所有引用该列的视图和约束。\n下列哪一个SQL 语句正确表达了这一删除要求（ ）。","options":{"A":"ALTER TABLE Student DROP Birthyear RESTRICT","B":"ALTER TABLE Student DELETE Birthyear CASCADE","C":"ALTER TABLE Student DROP Birthyear CASCADE——删除约束","D":"ALTER TABLE Student DELETE Birthyear RESTRICT——保护机制"},"answer":"C","explanation":"ALTER TABLE...DROP 列名 CASCADE 表示级联删除依赖该列的视图和约束；RESTRICT 是阻止删除有依赖的对象。SQL 中删除列用 DROP 不用 DELETE。","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q54","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"对所有的视图都可以进行下面哪一个操作？（ ）","options":{"A":"插入","B":"选择","C":"更新","D":"删除"},"answer":"B","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q55","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"集合 R 与 S 的交可以用关系代数的基本运算表示为（ ）。","options":{"A":"R-（R-S）","B":"R+（R-S）","C":"R-（S-R）","D":"S-（R-S）"},"answer":"A","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s1-q56","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0117","stem":"对关系 R 进行投影运算后 117","stem":"以下（ ）选项是 DBMS 的基本单位，是构成单一逻辑工作单元的操作集合。","options":{"A":"进程","B":"SQL","C":"事务","D":"文件"},"answer":"C","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s2-q1","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0117","stem":"SQL语言的功能包括（ ）。","options":{"A":"数据定义功能","B":"数据操作功能","C":"数据查询功能","D":"数据控制功能"},"answer":"ABCD","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s2-q2","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0117","stem":"下列选项中，（ ）属于数据库管理系统软件。","options":{"A":"Visual FoxPro","B":"Access","C":"SQL Server","D":"Oracle"},"answer":"ABCD","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s2-q3","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0117","stem":"在Access数据库管理系统中，下列4个表达式运算结果为数值型的是（ ）。","options":{"A":"300+700=1000","B":"LEN(“HAPPY BIRTHDAY”)","C":"STR(90)","D":"DATE( )-#1998-5-28#"},"answer":"BD","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-09-s2-q4","source":"超格","type":"多选","chapter":"第三篇 数据库网络·0117","stem":"对于下列语句TeacherNO INT NOT NULL UNIQUE，正确的描述是（ ）。","options":{"A":"TeacherNO是主码","B":"TeacherNO不能为空","C":"TeacherNO的值可以是“王力”","D":"每一个TeacherNO必须是唯一的"},"answer":"BD","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0117"},{"id":"cg-10-s1-q1","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在计算机系统中，操作系统是（ ）。","options":{"A":"一般应用软件","B":"核心系统软件","C":"用户应用软件","D":"系统支撑软件"},"answer":"B","explanation":"操作系统是核心系统软件，直接管理硬件资源。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q2","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"（ ）不是操作系统关心的主要问题。","options":{"A":"管理计算机裸机","B":"设计、提供用户程序与计算机硬件系统的界面","C":"管理计算机系统资源","D":"高级程序设计语言的编译器"},"answer":"D","explanation":"高级语言编译器是开发工具/系统软件，不是 OS 的核心职能。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q3","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"下面哪一种描述不是操作系统的主要目标？（ ）","options":{"A":"有效性","B":"方便性","C":"可扩充性","D":"多路复用——一个信道同时传输多路信号"},"answer":"D","explanation":"OS 主要目标：方便性、有效性、可扩充性、开放性。多路复用是计算机网络概念。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q4","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"操作系统的主要功能有（ ）。","options":{"A":"进程管理、存储器管理、设备管理、处理机管理","B":"虚拟存储管理、处理机管理、进程调度、文件系统","C":"处理机管理、存储器管理、设备管理、文件系统","D":"进程管理、中断管理、设备管理、文件系统"},"answer":"C","explanation":"操作系统五大功能：处理机管理、存储器管理、设备管理、文件系统、用户接口。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q5","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"设计批处理多道系统时，首先要考虑的是（ ）。","options":{"A":"灵活性和可适应性","B":"资源利用率和吞吐量","C":"交互性和响应时间","D":"实时性和可靠性"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q6","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"引入多道程序的目的是（ ）。","options":{"A":"为了充分利用主存储器","B":"增强系统的交互能力","C":"提高实时响应速度","D":"充分利用 CPU，减少 CPU 的等待时间"},"answer":"D","explanation":"多道程序的核心目的：提高 CPU 利用率，让 CPU 在某进程等待 I/O 时切换到其他进程。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q7","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"下列哪项不是分时操作系统的特点？（ ）","options":{"A":"交互性","B":"多路性","C":"独占性","D":"自治性"},"answer":"D","explanation":"分时系统四特点：交互性、多路性、独立性（不是独占）、及时性。独占是单道批处理特点。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q8","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"多个进程的实体存在于同一内存中，在一段时间内都得到运行，这种性质称作\n（ ）。","options":{"A":"进程的动态性","B":"进程的并发性","C":"进程的调度性","D":"进程的异步性"},"answer":"B","explanation":"多个进程在同一时间段内并发执行（虽然某一时刻只一个在跑），称并发性。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q9","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在下面关于并发性的叙述中正确的是（ ）。","options":{"A":"并发性是指若干事件在同一时刻发生","B":"并发性是指若干事件在不同时刻发生","C":"并发性是指若干事件在同一时间间隔发生","D":"并发性是指若干事件在不同时间间隔发生"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q10","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"为了描述进程的动态变化过程，采用了一个与进程相联系的（ ）系统，根\n据它而感知进程的存在。","options":{"A":"进程状态字","B":"进程优先数","C":"进程控制块","D":"进程起始地址"},"answer":"C","explanation":"进程控制块 PCB 描述进程的所有信息，OS 通过 PCB 感知进程存在。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q11","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"共享性是操作系统的特征之一，下列共享设备中，哪种设备可以共享但是不能被\n抢占使用？（ ）","options":{"A":"CPU","B":"打印机","C":"硬盘","D":"内存"},"answer":"B","explanation":"打印机可共享但不能被多个进程同时抢占（否则打印混乱），需排队。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q12","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"单核计算机上的操作系统为了实现多任务“同时”执行的假象，采用的机制是\n（ ）。","options":{"A":"时间片","B":"并发","C":"共享","D":"竞争"},"answer":"A","explanation":"时间片轮转让多任务\"看似同时\"在单核上运行。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q13","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"当（ ）时，进程从执行状态变为就绪状态。","options":{"A":"进程被进程调度程序选中","B":"时间片用完","C":"等待某一事件","D":"等待的事件发生"},"answer":"B","explanation":"时间片用完，进程从执行→就绪，等待下次调度。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q14","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在单处理器系统中，如果同时存在有 12 个进程，则处于就绪队列中的进程数\n量最多为（ ）。","options":{"A":"1","B":"9","C":"10","D":"11"},"answer":"D","explanation":"12 个进程中至少 1 个在执行，其余 ≤ 11 个在就绪队列。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q15","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"进程是操作系统中的一个重要概念，进程是一个具有一定独立功能的程序在某\n个数据集合上的一次（ ）。","options":{"A":"单独操作","B":"关联操作","C":"执行活动","D":"并发活动"},"answer":"C","explanation":"进程是程序在数据集合上的一次执行活动（动态）。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q16","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"我们把在一段时间内，只允许一个进程访问的资源，称为临界资源，因此，我\n们可以得出下列论述，正确的论述为（ ）。","options":{"A":"对临界资源是不能实现资源共享的","B":"只要能使程序并发执行，这些并发执行的程序便可对临界资源实现共享","C":"为临界资源配上相应的设备控制块后，便能被共享","D":"对临界资源，应采取互斥访问方式，来实现共享"},"answer":"D","explanation":"临界资源需互斥访问，但仍可被多进程通过同步机制共享。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q17","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"下列各项步骤中，哪一个不是创建进程所必须的步骤（ ）。","options":{"A":"建立一个进程控制块PCB","B":"由CPU调度程序为进程调度CPU","C":"为进程分配内存等必要的资源","D":"将PCB链入进程就绪队列"},"answer":"B","explanation":"创建进程：建 PCB → 分配资源 → 链入就绪队列。CPU 调度发生在创建后。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q18","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"假设系统中有三类互斥资源 Rl、R2 和 R3，可用资源数分别为 9、8 和 5。在\nT0 时刻系统中有 Pl、P2、P3、P4 和 P5 五个进程，这些进程对资源的最大需求量和\n已分配资源数如表所示。如果进程按（ ）序列执行，那么系统状态是安全的。","options":{"A":"Pl → P2 → P4 → P5 → P3","B":"P2 → Pl → P4 → P5 → P3","C":"P2 → P4 → P5 → Pl → P3","D":"P5 → P2 → P4 → P1 → P3"},"answer":"C","explanation":"用银行家算法验证：C 序列 P2→P4→P5→P1→P3 是安全序列。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q19","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"死锁的预防方法中，不太可能的一种方法是（ ）。","options":{"A":"摒弃互斥条件","B":"摒弃请求和保持条件","C":"摒弃不剥夺条件","D":"摒弃环路等待条件"},"answer":"A","explanation":"互斥是死锁四条件之一，但很多资源（如打印机）天然要互斥，无法摒弃，只能改其他条件。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q20","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在各种作业调度算法中，若所有作业同时到达，则平均周转时间最短的算法是\n（ ）。","options":{"A":"先来先服务调度算法","B":"高优先级优先调度算法","C":"多级反馈队列调度算法","D":"短作业优先调度算法"},"answer":"D","explanation":"短作业优先（SJF）能使平均周转时间最短。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q21","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"有三个作业\nA（到达时间 8 ∶ 50，执行时间 1.5 小时）、\nB（到达时间 9 ∶ 00，执行时间 0.4 小时）、\nC（到达时间 9 ∶ 30，执行时间 1 小时）。当作业全部到达后，批处理单道系统\n按照响应比高者优先算法进行调度，则作业被选中的次序是（ ）。","options":{"A":"ABC","B":"BAC","C":"BCA","D":"CBA"},"answer":"B","explanation":"高响应比 = (等待时间+执行时间)/执行时间。9:00 时只有 A、B 到达，B 短周转好；执行 B（9:00-9:24）后用响应比比较 A 和 C → A。最后 C。顺序 BAC。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q22","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"操作系统中利用信号量和 P、V 操作，（ ）。","options":{"A":"只能实现进程的互斥","B":"只能实现进程的同步","C":"可实现进程的互斥和同步","D":"可完成进程调度"},"answer":"C","explanation":"信号量及 P/V 操作既能实现互斥（mutex=1），又能实现同步。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q23","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"有 3 个进程共享一程序段，而每次最多允许两个进程进入该程序段，则信号量\n的取值范围是（ ）。","options":{"A":"2，1，0，-1","B":"3，2，1，0","C":"2，1，0，-1，-2","D":"1，0，-1，-2"},"answer":"A","explanation":"信号量初值=2，最多 2 进程进入。3 个进程时取值 2,1,0,-1。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q24","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"设与某资源相关联的信号量初值为 3，当前为 1，若 M 表示该资源的可用个数，\nN 表示等待该资源的进程数，则 M，N 分别是（ ）。","options":{"A":"0，1","B":"1，0","C":"1，2","D":"2，0"},"answer":"B","explanation":"S=1 表示有 1 个资源可用；当 S>0 时无进程等待。M=1, N=0。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q25","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"下列不属于进程间通信方式的是（ ）。","options":{"A":"全局变量 ——任何一个进程的全局变量在另一个进程中都看不到","B":"消息队列","C":"共享内存","D":"管道"},"answer":"A","explanation":"进程间通信（IPC）方式：管道、消息队列、共享内存、信号量等。全局变量在不同进程地址空间中互不可见。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q26","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"处理器执行的指令被分成两类，其中有一类称为特权指令，它只允许（ ）\n使用。","options":{"A":"操作员","B":"联机用户","C":"操作系统","D":"目标程序"},"answer":"C","explanation":"特权指令（如 I/O 指令）只允许操作系统在内核态使用，用户程序不能直接调用。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q27","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"以下关于缓冲的说法，错误的是（ ）。","options":{"A":"缓冲能缓和 CPU 与 I/O 设备间速度不匹配的矛盾","B":"软件缓冲通常是在磁盘上分配一段空间来实现的","C":"缓冲能减少 I/O 操作对 CPU 的中断频率","D":"缓冲能协调数据处理单位和传输单位不匹配的问题"},"answer":"B","explanation":"软件缓冲通常在内存中分配空间，不是磁盘上。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q28","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"如果一个磁盘的容量为 40G，盘块的大小为 4K，那么该磁盘的 FAT 大小至少\n为（ ）。","options":{"A":"20M","B":"25M","C":"30M","D":"35M"},"answer":"C","explanation":"40G/4K = 10M 个盘块。每个 FAT 表项 3 字节，FAT 大小约 30M。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q29","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"用户程序发出磁盘 I/O 请求后，系统的正确处理流程是（ ）。","options":{"A":"用户程序→系统调用处理程序→中断处理程序→设备驱动程序","B":"用户程序→系统调用处理程序→设备驱动程序→中断处理程序","C":"用户程序→设备驱动程序→系统调用处理程序→中断处理程序","D":"用户程序→设备驱动程序→中断处理程序→系统调用处理程序"},"answer":"B","explanation":"I/O 流程：用户程序 → 系统调用 → 设备驱动 → 中断处理。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q30","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"以下不需要硬件支持的是（ ）。","options":{"A":"进程调度","B":"中断系统——输入输出设备","C":"地址映射——主存储器","D":"时钟管理——硬件定时器"},"answer":"A","explanation":"进程调度是 OS 软件功能，不需特殊硬件支持；中断、地址映射、定时都依赖硬件。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q31","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在页式存储管理中，块内位移量等于页内位移量是因为（ ）。","options":{"A":"页和块的大小都是 2 的整数次方","B":"一页是装入内存的连续空间内的","C":"页和块的大小相等","D":"页和块的大小不等"},"answer":"C","explanation":"页式存储中，逻辑页和物理块大小相等，所以页内位移 = 块内位移。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q32","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"进程和程序的一个本质区别是（ ）。","options":{"A":"前者为动态的，后者为静态的","B":"前者存储在内存，后者存储在外存","C":"前者在一个文件中，后者在多个文件中","D":"前者分时使用 CPU，后者独占 CPU"},"answer":"A","explanation":"进程是动态的（程序的一次执行），程序是静态的代码。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q33","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"以下支持虚拟存储器的存储管理技术是（ ）。","options":{"A":"动态分区法","B":"可重定位分区法","C":"请求分页技术","D":"对换技术"},"answer":"C","explanation":"请求分页（按需调页）是实现虚拟存储器的核心技术，运行需要的页才调入内存。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q34","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"计算机系统资源管理中，主要负责对内存分配与回收管理的是（ ）。","options":{"A":"处理器管理","B":"存储器管理","C":"I/O 设备管理","D":"文件系统管理"},"answer":"B","explanation":"存储器管理负责内存的分配、回收、保护、扩充。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q35","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在多进程的系统中，为了保证公共变量的完整性，各进程应互斥进入临界区，所\n谓临界区是指（ ）。","options":{"A":"一个缓冲区","B":"一段数据区","C":"同步机制","D":"一段程序"},"answer":"D","explanation":"临界区是访问临界资源的那一段程序代码。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q36","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"数据库文件的逻辑结构形式是（ ）。","options":{"A":"字符流式文件 ——无结构","B":"档案文件","C":"记录式文件","D":"只读文件 C 文件分类标准 文件类型 按照性质和用途分类 系统文件、库文件、用户文件 按操作保护分 只读文件、可读可写文件、可执行文件 按用户观点分 普通文件、目录文件 按照文件逻辑结构分 流式文件、记录式文件"},"answer":"C","explanation":"文件分类标准 文件类型\n按照性质和用途分类 系统文件、库文件、用户文件\n按操作保护分 只读文件、可读可写文件、可执行文件\n按用户观点分 普通文件、目录文件\n按照文件逻辑结构分 流式文件、记录式文件","subject":"数据库","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q37","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"一个由 8 个页面，每页有 1024 个字节组成的逻辑空间，问逻辑地址需要\n（ ）位二进制表示。","options":{"A":"10","B":"11","C":"12","D":"13"},"answer":"D","explanation":"8 页 × 1024 字节 = 8192 字节 = 2^13，需 13 位地址。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q38","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"基本分页存储管理中，若没有引入快表，则每次从主存取指令或取操作数，要\n（ ）访问主存。","options":{"A":"1 次","B":"2 次","C":"3 次","D":"4 次"},"answer":"B","explanation":"未引入快表时：先访存查页表（1次），再访存取数据（1次），共 2 次。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q39","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"段页式存储管理汲取了页式管理和段式管理的长处，其实现原理结合了页式和\n段式管理的基本思想，即（ ）。","options":{"A":"用分段方法来分配和管理物理存储空间，用分页方法来管理用户地址空间","B":"用分段方法来分配和管理用户地址空间，用分页方法来管理物理存储空间","C":"用分段方法来分配和管理主存空间，用分页方法来管理辅存空间","D":"用分段方法来分配和管理辅存空间，用分页方法来管理主存空间"},"answer":"B","explanation":"段页式：用段管理用户地址空间（按逻辑），用页管理物理存储（按固定大小）。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q40","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"分区存储管理中的首次适应算法，要求把空闲区按照（ ）的次序登记在空\n闲区表中。","options":{"A":"大小递减","B":"大小递增","C":"地址递减","D":"地址递增"},"answer":"D","explanation":"","subject":"算法与数据结构","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q41","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"静态重定位的时机是（ ）。","options":{"A":"程序编译时","B":"程序链接时","C":"程序装入时","D":"程序运行时"},"answer":"C","explanation":"","subject":"编程语言","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q42","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"按文件用途来分，可执行文件属于（ ）。","options":{"A":"用户文件","B":"档案文件","C":"系统文件","D":"库文件 A 文件分类标准 文件类型 按照性质和用途分类 系统文件、库文件、用户文件 按操作保护分 只读文件、可读可写文件、可执行文件 按用户观点分 普通文件、目录文件 按照文件逻辑结构分 流式文件、记录式文件"},"answer":"A","explanation":"文件分类标准 文件类型\n按照性质和用途分类 系统文件、库文件、用户文件\n按操作保护分 只读文件、可读可写文件、可执行文件\n按用户观点分 普通文件、目录文件\n按照文件逻辑结构分 流式文件、记录式文件","subject":"数据库","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q43","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"对文件的存取时必须按指针进行，效率较低，采用这种物理结构的是（ ）。","options":{"A":"顺序文件","B":"链接文件","C":"索引文件","D":"多重索引文件"},"answer":"B","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q44","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"设文件索引节点中有 7 个地址项，其中 4 个地址项为直接地址索引，2 个地\n址项是一级间接地址索引，1 个地址项是二级间接地址索引，每个地址项大小为 4 字\n节，若磁盘索引块和磁盘数据块大小均为 256 字节，则可表示的单个文件的最大长度\n是（ ）。","options":{"A":"33KB","B":"519KB","C":"1057KB","D":"16513KB"},"answer":"C","explanation":"","subject":"数据库","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q45","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"下列关于进程和线程的叙述中，正确的是（ ）。","options":{"A":"一个进程只可拥有一个线程","B":"一个线程只可拥有一个进程","C":"一个进程可拥有若干个线程","D":"一个线程可拥有若干个进程"},"answer":"C","explanation":"进程是资源分配单位，可拥有多个线程；线程是 CPU 调度单位。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q46","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"当系统中供多个进程共享的资源如打印机、公用队列等，其数目不足以满足诸多\n进程的需要时，会引起（ ）而产生死锁。","options":{"A":"临时资源的竞争","B":"不可剥夺资源的竞争","C":"进程对资源的竞争","D":"可剥夺资源和不可剥夺资源之间的竞争"},"answer":"C","explanation":"不可剥夺资源（如打印机）的竞争是产生死锁的常见原因。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q47","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"通常 Clock 置换算法只有一位访问位，而一种改进的 Clock 置换算法则通过\n一个访问位A 和一个修改位 M 来选出淘汰的页。如果已访问，则 A 为 1，已修改，则\nM 为 1，那么 A 和M 的 4 种组合中，最佳被淘汰页的情况是（ ）。","options":{"A":"A 为 0，M 为 0","B":"A 为 0，M 为 1","C":"A 为 1，M 为 0","D":"A 为 1，M 为 1"},"answer":"A","explanation":"改进 Clock：A=0、M=0 表示\"未访问且未修改\"，最不需要保留，优先淘汰。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q48","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在微机中运行某一程序时，若存储容量不够，可采用下列（ ）办法解决。","options":{"A":"虚拟内存","B":"更新 CPU","C":"采用光盘","D":"采用高密度软盘"},"answer":"A","explanation":"虚拟内存把外存当内存用，可解决物理内存不足。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q49","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"有一虚拟存储系统，若进程在内存中占 3 页（开始时内存为空），若采用先进\n先出（FIFO）页面淘汰算法，当执行以下访问页号序列后 1，3，4，2，1，3，5，1，2，\n5，4，2，会产生多少次缺页（ ）。","options":{"A":"7","B":"8","C":"9","D":"10"},"answer":"C","explanation":"FIFO 算法：1,3,4,2,1,3,5,1,2,5,4,2 — 缺页 9 次（手工模拟得到）。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q50","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在 5 个页框上使用 LRU 页面替换算法，当页框初始为空时，引用序列为 0、1、\n7、8、6、2、3、7、2、9、8、1、0、2，系统将发生（ ）次缺页。","options":{"A":"13","B":"12","C":"11","D":"8"},"answer":"C","explanation":"","subject":"算法与数据结构","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q51","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"虚拟存储的基础是程序局部性理论，它的基本含义是（ ）。","options":{"A":"代码的顺序执行","B":"程序执行时对内存访问的不均匀性","C":"变量的连续访问","D":"指令的局部性"},"answer":"B","explanation":"局部性原理：程序在一段时间内只访问其地址空间的一小部分，这是虚存有效的基础。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q52","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"若干个等待访问磁盘者依次要访问的磁道为 19、43、40、4、79、11、76，当\n前磁头位于 40 号柱面，若用最短寻道时间优先磁盘调度算法，则磁头移动总距离（道\n数）为（ ）。","options":{"A":"271","B":"117","C":"110","D":"129"},"answer":"B","explanation":"SSTF 从 40 出发：43→40？应是 40→43→19→11→4→76→79，距离=3+24+8+7+72+3=117。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q53","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在固定分区分配中，每个分区的大小是（ ）。","options":{"A":"相同","B":"随作业长度变化","C":"可以不同但预先固定","D":"可以不同但根据作业长度固定"},"answer":"C","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q54","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"死锁与安全状态的关系是（ ）。","options":{"A":"死锁状态有可能是安全状态","B":"安全状态也可能是死锁状态","C":"不安全状态必定产生死锁","D":"死锁状态一定是不安全状态"},"answer":"D","explanation":"死锁状态一定是不安全状态，但不安全状态不一定死锁。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q55","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"下面关于检测死锁的叙述错误的是（ ）。","options":{"A":"检测死锁方法对系统资源的分配不加限制，只要有则可以进行分配","B":"检测死锁中系统需要反复检测各进程资源申请和分配情况","C":"检测死锁是预防系统卷入了死锁","D":"检测死锁只能发现死锁，而不能消除死锁"},"answer":"C","explanation":"检测死锁是发现死锁后再处理，不是预防（区分预防/避免/检测）。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q56","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"位示图法可用于（ ）。","options":{"A":"文件目录的查找","B":"分页式存储管理中主存空闲块的分配和回收","C":"磁盘空闲盘块的分配和回收——取值0和1分别表示空闲和占用","D":"页式虚拟存储管理中的页面置换"},"answer":"C","explanation":"位示图用 0/1 标记每个磁盘块是否空闲，是常用空闲块管理方法。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q57","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"若 8 个字（字长 32 位）组成的位示图管理内存，若字、位号从 1 开始。假\n定用户归还一个块号为 100 的内存块时，它对应位示图的位置为（ ）。","options":{"A":"字号为 3，位号为 5","B":"字号为 4，位号为 4","C":"字号为 3，位号为 4","D":"字号为 4，位号为 5 B 字号位号从0开始 b=n*i+j 字号位号从1开始 b-1=n*（i-1）+j-1"},"answer":"B","explanation":"字号位号从0开始\nb=n*i+j\n字号位号从1开始\nb-1=n*（i-1）+j-1","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q58","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"下列算法中用于磁盘磁头臂调度的是（ ）。","options":{"A":"时间片轮转法","B":"LRU 算法","C":"最短寻道时间优先算法","D":"优先级高者优先法"},"answer":"C","explanation":"","subject":"算法与数据结构","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q59","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"在进行作业调度时，要想兼顾作业等待时间和作业执行时间，应选取（ ）。","options":{"A":"优先数调度法","B":"先进先出调度算法","C":"响应比高优先算法","D":"短作业优先调度"},"answer":"C","explanation":"响应比 = (等待+执行)/执行，兼顾等待时间和执行时间，长短作业都公平。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q60","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"磁盘设备的 I/O 控制主要是采取（ ）方式。","options":{"A":"位","B":"字节","C":"帧","D":"DMA——直接存储器访问"},"answer":"D","explanation":"磁盘 I/O 数据量大，采用 DMA（直接存储器访问）方式不经 CPU 直接传输。","subject":"计算机基础","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q61","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"访问磁盘的时间不包括（ ）。","options":{"A":"寻道时间","B":"CPU 调度时间","C":"读写时间","D":"旋转延迟时间"},"answer":"B","explanation":"磁盘访问时间 = 寻道+旋转延迟+读写。CPU 调度时间不算磁盘访问。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q62","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"当一进程运行时，系统可基于某种原则，强行将其撤下，把处理器分配给其他进\n程，这种调度方式是（ ）。","options":{"A":"中断方式","B":"查询方式","C":"非剥夺方式","D":"剥夺方式"},"answer":"D","explanation":"可剥夺方式（抢占式）：高优先级或时间片到时强制切换。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q63","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"把逻辑地址转换成物理地址称为（ ）。","options":{"A":"地址分配","B":"地址映射","C":"地址保护","D":"地址越界"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q64","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"操作系统为每一个文件开辟一个存储区，在它的里面记录着该文件有关信息，这\n就是所谓的（ ）。","options":{"A":"进程控制块","B":"文件控制块","C":"设备控制块","D":"作业控制块"},"answer":"B","explanation":"文件控制块（FCB）记录文件名、属性、位置等元信息。","subject":"数据库","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q65","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"操作系统中的文件系统管理主要负责（ ）。","options":{"A":"内存的分配与回收","B":"处理器的分配和控制","C":"I/O设备的分配与操纵","D":"磁盘文件的创建、存取、复制和删除"},"answer":"D","explanation":"文件系统管理负责文件的创建、读写、复制、删除等。","subject":"操作系统","source_chapter":"第三篇 数据库网络·0119"},{"id":"cg-10-s1-q66","source":"超格","type":"单选","chapter":"第三篇 数据库网络·0119","stem":"以下关于原语正确的是（ ）。","options":{"A":"一条机器指令","B":"由若干条机器指令组成，执行时中途不能打断","C ":"Ctrl+C","D":"Ctrl+V"},"answer":"A","explanation":"保存：Ctrl+S（Save）。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q18","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在“我的电脑”窗口中，按下（    ）快捷键可以一次选取当前文件夹中的所有\n文件。","options":{"A":"Ctrl+A","B":"Ctrl+S","C":"Ctrl+V","D":"Ctrl+U"},"answer":"A","explanation":"Ctrl+A 全选当前文件夹所有文件。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q19","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"当用鼠标拖动操作进行创建文件快捷方式时，需要配合的键为（    ）。","options":{"A":"Fn","B":"Ctrl","C":"Alt","D":"Shift"},"answer":"C","explanation":"","subject":"编程语言","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q20","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"小王同学在正常输入一篇文章时，出现了连续输入大写字母，而不能输入汉字的\n现象，最大可能是小王同学按到了（    ）键。","options":{"A":"Ctrl","B":"Shift","C":"CapsLock","D":"NumLock"},"answer":"C","explanation":"","subject":"多媒体","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q21","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7的资源管理器中，对一个选定的文件进行（    ）操作并确认后，\n该文件无法恢复。","options":{"A":"按SHIFT+Delete快捷键","B":"按Delete键","C":"按鼠标右键并在快捷菜单上选“剪切”","D":"按鼠标右键并在快捷菜单上选“删除”"},"answer":"A","explanation":"Shift+Delete 永久删除（不进回收站），无法恢复。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q22","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7操作系统中，显示桌面的快捷键是（    ）。","options":{"A":"Win+P","B":"Win+D","C":"Win+Tab","D":"Alt+Tab"},"answer":"B","explanation":"Win+D 显示桌面。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q23","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"Windows7系统中，为了操作方便，提供了非常多的快捷键，其中剪切功能的\n快捷键为（    ）。","options":{"A":"Ctrl+C","B":"Ctrl+A","C":"Ctrl+X","D":"Ctrl+V"},"answer":"C","explanation":"剪切：Ctrl+X。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q24","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Win7中，要将当前活动窗口的截图复制到剪贴板中，应该使用（    ）组合键。","options":{"A":"PrintScreen","B":"Alt+PrintScreen","C":"Ctrl+PrintScreen","D":"Ctrl+P"},"answer":"B","explanation":"","subject":"编程语言","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q25","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"小明用的是Windows系统，这天突然鼠标坏了，他想进入“开始”菜单启动某\n程序，可执行下列哪一项操作（    ）。","options":{"A":"按Shift+Tab键","B":"按Ctrl+Esc键","C":"按Ctrl+Shift键","D":"按空格"},"answer":"B","explanation":"","subject":"其他","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q26","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7的默认设置下，用户按（    ）组合键进行全角和半角的切换。","options":{"A":"Alt+Tab","B":"Shift+Space","C":"Alt+F4","D":"Ctrl+Space"},"answer":"B","explanation":"","subject":"编程语言","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q27","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7中，点击键盘上的“Windows徽标”键将（    ）。","options":{"A":"打开选定文件","B":"关闭当前运行程序","C":"显示“系统”属性","D":"显示“开始”菜单"},"answer":"D","explanation":"","subject":"数据库","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q28","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"关于Windows 7“开始”菜单中的搜索框，以下描述正确的是（    ）。","options":{"A":"搜索框具有“运行”功能","B":"搜索框要求用户提供确切的搜索范围","C":"搜索框仅能搜索文件，不能搜索Internet收藏夹和浏览器历史记录等内容","D":"搜索框不可以搜索硬件信息"},"answer":"AD","explanation":"","subject":"数据库","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q29","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"桌面图标实质上是（    ）。","options":{"A":"程序","B":"文本文件","C":"快捷方式","D":"文件夹"},"answer":"C","explanation":"桌面图标本质是文件/程序的快捷方式。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q30","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"Windows 7系统通用桌面图标有五个，但不包含（    ）。","options":{"A":"计算机","B":"用户的文件","C":"控制面板","D":"IE浏览器"},"answer":"D","explanation":"Win7 通用桌面图标：计算机、用户文件夹、网络、回收站、控制面板。IE 不在内。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q31","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"“开始”菜单在功能布局上，除了右窗格上下各有用户账户按钮和计算机关闭选\n项按钮外，主要有三个基本部分，而（    ）不属于“开始”菜单的基本组成。","options":{"A":"程序列表","B":"任务按钮栏","C":"搜索框","D":"常用链接菜单"},"answer":"B","explanation":"","subject":"编程语言","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q32","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7操作系统中，将当前窗口拖动到屏幕顶端，窗口会（    ）。","options":{"A":"关闭","B":"最大化","C":"消失","D":"最小化"},"answer":"B","explanation":"Win7 拖动窗口到屏幕顶端 → 窗口最大化（Aero Snap）。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q33","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"（    ）不属于典型的Windows 7窗口组成部分。","options":{"A":"菜单栏","B":"标题栏","C":"状态栏","D":"CPU使用率"},"answer":"D","explanation":"标准 Windows 窗口包含：标题栏、菜单栏、工具栏、状态栏；CPU 使用率不是窗口组成部分。","subject":"计算机基础","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q34","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Win7环境中，屏幕上可以同时打开若干个窗口，但是（    ）。","options":{"A":"其中只能有一个是当前活动窗口，它的图标在标题栏上的颜色与其他窗口不同","B":"其中只能有一个在工作，其余都不能工作","C":"它们都不能工作，只有其余都关闭，留下一个才能工作","D":"它们都不能工作，只有其余都最小化以后，留下一个窗口才能工作"},"answer":"A","explanation":"","subject":"其他","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q35","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"Windows操作系统中以窗口的方式进行操作时，通常将（    ）称为活动窗口。","options":{"A":"整个屏幕","B":"标题栏变灰的窗口","C":"当前的工作窗口","D":"任务栏第一个窗口"},"answer":"C","explanation":"活动窗口指当前正在交互的窗口（标题栏高亮，接收输入）。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q36","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"Windows系统中的对话框允许用户进行的操作是（    ）。","options":{"A":"最大化","B":"移动位置","C":"最小化","D":"添加功能"},"answer":"B","explanation":"对话框只能移动位置，不能最大化/最小化（不是窗口）。","subject":"计算机基础","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q37","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"Windows中有两个管理系统资源的程序组是（    ）。","options":{"A":"“我的电脑”“控制面板”","B":"“资源管理器”“控制面板”","C":"“我的电脑”“资源管理器”","D":"“控制面板”“开始”菜单"},"answer":"C","explanation":"我的电脑 + 资源管理器 是 Win 管理资源的两个界面。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q38","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7的资源管理器窗口，以下方法中不能新建文件夹的是（    ）。","options":{"A":"执行“文件｜新建｜文件夹”命令","B":"从快捷菜单中选择“新建｜文件夹”命令","C":"执行“组织｜布局｜新建”命令","D":"点击“新建文件夹”命令按钮"},"answer":"C","explanation":"组织 → 布局 → 新建：这条路径不存在。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q39","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"Windows7使用（    ）管理硬件资源。","options":{"A":"显示屏幕","B":"控制面板","C":"资源管理器","D":"窗口"},"answer":"C","explanation":"Win 通过资源管理器（Explorer）管理文件硬件资源。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q40","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7中，资源管理器的（    ）内提供了“收藏夹”“库”“家庭\n组”“计算机”以及“网络”节点。","options":{"A":"导航窗格","B":"菜单栏","C":"地址栏","D":"细节窗格"},"answer":"A","explanation":"资源管理器导航窗格（左侧树）显示收藏夹、库、家庭组、计算机、网络节点。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"zg-94339","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"在 Windows 中，不能在任务栏中进行的操作是（ ）。","options":{"A":"切换活动窗口","B":"排列桌面图标","C":"设置系统日期和时间","D":"启动开始菜单"},"answer":"B","explanation":"排列桌面图标应在桌面空白处单击右键选择“排序方式”。（1）任务栏的组\n成：任务栏通常由 4 部分组成，“开始”按钮、快捷键启动区、应用程序区、系统通知区。（2）任务栏\n的基本操作有：切换活动窗口、设置系统日期和时间、启动开始菜单、锁定或解锁程序任务等。","subject":"操作系统","source_chapter":"第二章 计算机基础知识"},{"id":"cg-14-s1-q42","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7的资源管理器中，选择（    ）查看方式可以显示文件的“大小”\n和“修改时间”。","options":{"A":"大图标","B":"小图标","C":"列表","D":"详细信息 D 排列方式 特点 大图标 缩略图， 只有名称 列表图标 先竖着排，只有名称 详细信息 名称、日期、类型、大小 小图标 先横着排，只有名称 平铺 横着排，比小图标大，比大图标小 内容 名称、修改日期"},"answer":"D","explanation":"排列方式 特点\n大图标 缩略图， 只有名称\n列表图标 先竖着排，只有名称\n详细信息 名称、日期、类型、大小\n小图标 先横着排，只有名称\n平铺 横着排，比小图标大，比大图标小\n内容 名称、修改日期","subject":"编程语言","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q43","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在资源管理器窗口中，要选定多个不连续的文件需要在按（    ）键的同时单击\n文件。","options":{"A":"Shift","B":"Alt","C":"Ctrl","D":"Tab"},"answer":"C","explanation":"","subject":"编程语言","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q44","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows系统中，使用文件搜索功能时，不能按文件的（    ）进行搜索。","options":{"A":"属性","B":"名称","C":"文件夹路径","D":"修改日期"},"answer":"A","explanation":"","subject":"数据库","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q45","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows7中，为了查找文件名以“人事”打头的所有文件，正确的搜索条件\n为（    ）。","options":{"A":"人事.*","B":"人事*.*","C":"人事？.*","D":"人事.#"},"answer":"B","explanation":"","subject":"算法与数据结构","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q46","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows7中，“剪贴板”是（    ）。","options":{"A":"硬盘上的一块区域","B":"软盘上的一块区域","C":"内存中的一块区域","D":"高速缓存中的一块区域"},"answer":"C","explanation":"剪贴板是内存中临时存储复制/剪切数据的区域。","subject":"计算机基础","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q47","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows7 系统中，“回收站”的内容（    ）。","options":{"A":"将被永久删除","B":"不占用磁盘空间","C":"可以被永久删除","D":"只能在桌面上找到"},"answer":"C","explanation":"回收站文件可以恢复或永久删除（清空回收站）。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q48","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows 7系统中，若要卸载某程序，则应该打开“控制面板”选择（    ），\n点击“卸载/更改”完成操作。","options":{"A":"备份和还原","B":"设备管理器","C":"程序和功能","D":"操作中心"},"answer":"C","explanation":"卸载程序：控制面板 → 程序和功能 → 选程序 → 卸载/更改。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"zg-6018","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"如果要新增或删除程序，可以在控制面板上选用（ ）功能。","options":{"A":"系统和安全","B":"硬件和声音","C":"程序","D":"外观及个性化"},"answer":"C","explanation":"A 选项可以查看计算机的状态，备份计算机；B 选项可以查看设备和打印机、\n添加设备、调整常用移动设置；D 选项可以更改主题、更改桌面背景、调整屏幕分辨率。因此本题的答\n案是 C。","subject":"多媒体","source_chapter":"第二章 计算机基础知识"},{"id":"cg-14-s1-q50","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows环境下，可以通过双击“控制面板”中的（    ）来设置计算机名称。","options":{"A":"管理工具","B":"字体","C":"显示","D":"系统"},"answer":"D","explanation":"","subject":"办公软件","source_chapter":"第四篇 Windows"},{"id":"cg-14-s1-q51","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"下列关于任务栏作用的说法中错误的是（    ）。","options":{"A":"显示当前活动窗口的名字","B":"显示正在后台工作程序的名字","C":"实现窗口之间的切换","D":"显示系统所有功能"},"answer":"D","explanation":"","subject":"办公软件","source_chapter":"第四篇 Windows"},{"id":"zg-16876","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"在 Windows 7 中，计算机使用一段时间后，空间会变得零散，可以使用（ ）工具进行整理。","options":{"A":"磁盘空间管理","B":"磁盘碎片整理","C":"磁盘清理程序","D":"磁盘扫描程序"},"answer":"B","explanation":"A 选项可以查看每个磁盘的空间大小及使用情况；B 选项可以将零散的空间\n整理为一大块空间；C 选项帮助释放硬盘驱动器空间，清除垃圾文件；D 选项可以诊断硬盘或软盘的错\n误，分析并修复若干种逻辑错误，查找磁盘上的物理错误并将坏扇区中的数据移动到别的位置。因此本\n题的答案是 B。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"cg-14-s1-q53","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows7中删除某个应用程序不恰当的操作是（    ）。","options":{"A":"删除应用程序在桌面的快捷方式，并且删除该快捷方式所指向的源文件","B":"通过控制面板中的程序进行卸载","C":"用应用程序自带的卸载功能卸载该程序","D":"使用360安全卫士提供的卸载软件功能进行卸载"},"answer":"A","explanation":"应该用控制面板或程序自带卸载，仅删快捷方式不能完整卸载。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"zg-49232","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"Windows 7 中，默认打印机的数量最多可以是（ ）。","options":{"A":"4","B":"2","C":"3","D":"1"},"answer":"D","explanation":"默认的打印机只能选择 1 个，点击电脑左下角的开始菜单，选择设备和打印\n机，在弹出的设备和打印机窗口中可以看到所有的打印机设备，在我们需要设置默认打印机的图标上点\n击右键，选择设置为默认打印机。因此本题的答案是 D。","subject":"操作系统","source_chapter":"第二章 计算机基础知识"},{"id":"cg-14-s1-q55","source":"超格","type":"单选","chapter":"第四篇 Windows","stem":"在Windows系统默认用户中，（    ）是管理员账户，具有对计算机的完全控制\n权。","options":{"A":"User","B":"Root","C":"Quest","D":"Administrator"},"answer":"D","explanation":"","subject":"其他","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q1","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"操作系统的功能有（　　）。","options":{"A":"处理器管理","B":"内存管理","C":"信息管理","D":"设备管理"},"answer":"ABD","explanation":"OS 四大功能：CPU 管理、内存管理、设备管理、文件管理。\"信息管理\"概念过宽。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q2","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"关于操作系统，下列说法正确的有（　　）。","options":{"A":"操作系统是用户和计算机的接口","B":"操作系统是计算机硬件和其他软件的接口","C":"操作系统管理着计算机硬件资源","D":"任何其他软件都必须在操作系统的支持下才能运行"},"answer":"ABCD","explanation":"OS 是用户/硬件/软件之间的接口，管理硬件资源，其他软件依赖 OS。全选。","subject":"计算机基础","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q3","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"下列关于操作系统的叙述正确的是（　　）。","options":{"A":"操作系统管理 CPU、存储器、外部设备等硬件资源，并使其协调工作","B":"操作系统管理软件信息资源","C":"操作系统面向任务或过程，适用于数据处理","D":"操作系统合理的组织计算机工作流程"},"answer":"ABD","explanation":"OS 管硬件、软件，组织工作流程；面向任务/过程是数据库领域概念，C 错。","subject":"计算机基础","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q5","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"Windows 菜单中的“粘贴”命令选项有时是灰色的，无法使用。当发生下述哪\n些情况后，这个命令选项才可使用？（　　）","options":{"A":"剪贴板上有内容","B":"刚执行过“剪切”操作","C":"选中对象","D":"刚执行过“复制”操作"},"answer":"ABD","explanation":"","subject":"编程语言","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q6","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"下列（　　）属于 Windows 文件属性。","options":{"A":"只读属性","B":"管理员属性","C":"共享属性","D":"隐藏属性"},"answer":"AD","explanation":"","subject":"数据库","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q7","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"在 Windows 系统中，以下对文件名或文件夹命名的说法不恰当的有（　　）。","options":{"A":"在同一文件夹中允许建立两个同名的文件或文件夹","B":"无论如何都不允许建立两个同名的文件或文件夹","C":"在同一个文件夹中不允许建立两个同名的文件或文件夹","D":"在不同文件夹中不允许建立两个同名的文件或文件夹"},"answer":"ABD","explanation":"","subject":"办公软件","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q8","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"文件属性包括（　　）。","options":{"A":"只读","B":"隐藏","C":"存档","D":"只写 E. 读写"},"answer":"ABC","explanation":"","subject":"数据库","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q9","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"通常在设置本机共享文件夹的操作中，哪些操作不是必须的？（　　）","options":{"A":"选中要设置共享的文件夹","B":"在“共享”标签下，选中“允许网络用户更改我的文件”","C":"在“共享”标签下，选中“共享此文件夹”","D":"在“共享”标签下，重新命名该文件夹在网络上的共享名称"},"answer":"BD","explanation":"","subject":"办公软件","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q10","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"下列关于回收站叙述正确的是（　　）。","options":{"A":"回收站可以存放硬盘上删除的信息","B":"回收站是属于内存的存储区域","C":"回收站占据空间不可调整","D":"回收站信息可以恢复"},"answer":"AD","explanation":"回收站存硬盘已删除文件，可恢复，A、D 正确。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q11","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"下列关于 Windows 7 系统“回收站”的叙述，正确的是（　　）。","options":{"A":"“回收站”只能存放被删除的文件，不能存放被删除的文件夹","B":"“回收站”中的文件可以被恢复","C":"“回收站”是内存中的一块区域","D":"“回收站”中的文件可以被彻底清除"},"answer":"BD","explanation":"回收站可恢复文件，可彻底清除（清空）。回收站存硬盘空间，能放文件夹。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q12","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"在 Windows 7 中，窗口最大化的方法是（　　）。","options":{"A":"按最大化按钮","B":"按还原按钮","C":"双击标题栏","D":"拖拽窗口到屏幕顶端"},"answer":"AC","explanation":"最大化方法：点最大化按钮、双击标题栏、Win+↑、拖到顶端（Aero Snap）。","subject":"操作系统","source_chapter":"第四篇 Windows"},{"id":"cg-14-s2-q13","source":"超格","type":"多选","chapter":"第四篇 Windows","stem":"在 Windows 7 中可以完成窗口切换的方法是（　　）。","options":{"A":"“Alt”+“Tab”","B":"“Win”+“Tab“","C":"单击要切换窗口的任何可见部位","D":"单击任务栏上要切换的应用程序按钮"},"answer":"ABCD","explanation":"","subject":"办公软件","source_chapter":"第四篇 Windows"},{"id":"cg-15-s1-q1","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"小学中高年级开设的课程有品德与社会、语文、数学、科学、外语、体育和\n（    ）。","options":{"A":"信息技术","B":"综合实践活动","C":"美术","D":"音乐"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"th-72094","source":"题海训练","type":"单选","chapter":"题海训练","stem":"高中信息技术课程的主要内容既包括信息技术的基础知识，信息技术的基本操作等技能\n性知识，也包括应用信息技术解决实际问题的方法，对信息技术过程、方法与结果评价的方法，\n信息技术在学习和生活中的应用，以及相关权利义务、伦理道德、法律法规等。这体现了信息\n技术课程的（\n）性质。","options":{"B":"综合性","A":"工具性","C":"基础性","D":"层次性"},"answer":"B","explanation":"本题考查信息技术课程性质。信息技术课程具有基础性、工具性、\n综合性、实践性以及层次性的性质，而综合性是指：高中信息技术课程的主要内容既包括信息\n技术的基础知识，信息技术的基本操作等技能性知识，也包括应用信息技术解决实际问题的方\n法，对信息技术过程、方法与结果评价的方法，信息技术在学习和生活中的应用，以及相关权\n利义务、伦理道德、法律法规等。故本题答案为B。","subject":"信息基础","source_chapter":"题海训练"},{"id":"cg-15-s1-q3","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"高中信息技术课程的性质有三个，下面哪一个不是正确的？（    ）","options":{"A":"基础性","B":"综合性","C":"人文性","D":"科学性"},"answer":"D","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q4","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"信息技术课程结构遵循高中学生的认知特征和个性化学习需要，体现信息技术课\n程的（    ）。","options":{"A":"实际性、相关性、互补性","B":"有效性、高效性、启发性","C":"层次性、多样性、选择性","D":"自主性、趣味性、合作性"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"th-15590","source":"题海训练","type":"单选","chapter":"题海训练","stem":"依据信息技术（\n）的特征，设计活动情境，注重学生在项目中学习。","options":{"A":"理论性","B":"工具性","C":"实践性","D":"以上都有"},"answer":"B","explanation":"本题考查 for循环。&&＆表示“与”的意思，在使用上是a&&b：a和\nb同时为 true 才返回 true，否则返回 false。题目中 x=0，y=0，所以 y！=1234为真，进行x的\n自增运算，从 0到 4共执行了五次，在x=5是循环结束。故本题答案为 B。","subject":"编程语言","source_chapter":"题海训练"},{"id":"th-14","source":"题海训练","type":"单选","chapter":"题海训练","stem":"信息技术课程内容紧扣（\n）等学科大概念。","options":{"A":"数据和算法","B":"信息社会","C":"信息系统","D":"以上都是"},"answer":"D","explanation":"本题考查信息技术课程内容。根据中华人民共和国教育部指定的普\n通高中信息技术课程标准（2017版），信息技术课程内容以计算机和网络技术为主，分为基\n本模块和拓展模块，紧扣数据、算法、信息系统和信息社会等学科大概念，结合信息技术变革\n的前沿知识与国际信息技术教育的发展趋势，弓导学生学习信息技术的基本知识与技术，感悟\n信息技术学科方法与学科思想。故本题答案为D。\n7．答案】D。解析：本题考查课程评价的依据。根据中华人民共和国教育部指定的普通\n高中信息技术课程标准（2017版），课程评价是指检查课程的目标、编订和实施是否实现了\n教育目的，实现的程度如何，以判定课程设计的效果，并据此作出改进课程的决策。学科核心\n素养是学科育人价值的集中体现，是学生通过学科学习而逐步形成的正确价值观念、必备品格\n和关键能力。构建基于学科核心素养的评价体系，推动数字化时代的学习创新是信息技术课程\n标准的基本理念之一。故本题答案为 D。","subject":"信息基础","source_chapter":"题海训练"},{"id":"cg-15-s1-q7","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"课程评价以（    ）的分级体系为依据，利用多元方式跟踪学生的学习过程，采集\n学习数据，及时反馈学生的学习状况，改进学习，优化教学，评估学业成就。","options":{"A":"学科课程特点","B":"学科基本理论","C":"学科教学方式","D":"学科核心素养"},"answer":"D","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q8","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"学科核心素养是学科（    ）的集中体现，是学生通过学科学习而逐步形成的正确\n价值观念、必备品格和关键能力。","options":{"A":"育人价值","B":"课程特色","C":"教学地位","D":"教育理念"},"answer":"A","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q9","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"高中信息技术学科核心素养由（    ）核心要素组成。\n①信息意识 ②计算思维 ③数字化学习与创新 ④信息社会责任","options":{"A":"②③④","B":"①②③","C":"①②③④","D":"①③④"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q10","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"（    ）是指个体运用计算机科学领域的思想方法，在形成问题解决方案的过程\n中产生的一系列思维活动。","options":{"A":"信息意识","B":"计算思维","C":"数字化学习与创新","D":"信息社会责任"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q11","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"（    ）是指个体通过评估并选用常见的数字化资源与工具，有效地管理学习过\n程与学习资源，创造性地解决问题，从而完成学习任务，形成创新作品的能力。","options":{"A":"信息意识","B":"计算思维","C":"数字化学习与创新","D":"信息社会责任"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q12","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"具备计算思维的学生，在信息活动中能够采用计算机可以处理的方式（    ）。\n①界定问题 ②抽象特征 ③建立结构模型 ④合理组织数据","options":{"A":"①②③④","B":"①②③","C":"②③④","D":"①③④"},"answer":"A","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q13","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"在信息技术与课程整合中经常提及“新型教学结构”它指的是（    ）。","options":{"A":"以“学”为主的结构","B":"以“教”为主的结构","C":"“主导—主体”的结构","D":"以资源整合为主的结构"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q14","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"具备信息意识的学生能够根据解决问题的需要，自觉、主动地寻求恰当的方式\n（    ）。","options":{"A":"获取与处理信息","B":"发现与解决问题","C":"合作与交流课程","D":"完成上机任务"},"answer":"A","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q15","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"信息技术课程的核心目标就是提高信息素养，信息技术最核心的能力是（    ）。","options":{"A":"信息技术知识技能","B":"信息技术人文观","C":"信息技术价值观","D":"信息技术问题的解决"},"answer":"D","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q16","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"关于信息技术新课程改革的理念，下列说法错误的是（    ）。","options":{"A":"关照全体学生，把学生的信息知识提高到同一水平","B":"强调问题解决，倡导创新实践","C":"把信息技术与学生的日常生活、学习紧密结合起来","D":"以课程实施为契机，努力创造条件，为学生营造良好的信息环境"},"answer":"A","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q17","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"下列关于信息技术与课程整合的目标中，说法不正确的是（    ）。","options":{"A":"培养学生具有终身学习的态度和能力","B":"培养学生具有良好的信息素养","C":"培养学生学会使用计算机","D":"培养学生掌握信息时代的学习方式"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q18","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"课程设计充分挖掘信息技术学科中的（    ），引导学生健康的技术价值追求，\n提高学生在信息社会中生存、发展与创新的能力。\n①思想 ②文化内涵 ③育人因素 ④技术要领","options":{"A":"①③④","B":"①②③","C":"②③④","D":"①②③④"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q19","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"下列内容中作为中学信息技术课程设计主要依据的是（    ）。","options":{"A":"学生的年龄特点和接受能力","B":"学生的学习兴趣和接受能力","C":"学生的年龄特点和知识水平","D":"学生的学习基础和接受能力"},"answer":"D","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q20","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"键盘训练是小学信息技术教学的重要内容，下列说法错误的是（    ）。","options":{"A":"可以利用每节课的课前时间让学生练习","B":"因课时少，教学重点在于讲解相关知识","C":"上课时尽可能利用多种形式让学生练习","D":"键盘输入作为一项技能必须通过一点一点的训练"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q21","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"关于初中信息技术课程目标，下列描述不正确的是（    ）。","options":{"A":"增强学生的信息意识，了解信息技术的发展变化及其对工作和社会的影响","B":"深入了解计算机基本工作原理，能熟练使用各种工具和软件","C":"能够与他人协作或独立解决与课程相关的问题，完成各种任务","D":"在他人帮助下学会评价和识别信息来源的真实性、准确性和相关性"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q22","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"教师在信息技术教学过程中，必须随时了解学生的学习效果，以便评价自己的教\n学行为，调整教学策略。下列方法中，不能快速、便捷了解教学效果的是（    ）。","options":{"A":"观察学生屏幕","B":"让学生举手统计","C":"让学生展示作品","D":"纸笔考试"},"answer":"D","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"zg-82040","source":"中公","type":"单选","chapter":"第三章 教学评价","stem":"教学评价必须以（ ）为依据，本着对发展学生个性和创造精神有利的原则进行。","options":{"A":"教学内容","B":"教学目标","C":"学生情况","D":"教师意愿"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第三章 教学评价"},{"id":"cg-15-s1-q24","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"（    ）是信息技术课程发展的重要力量，为信息技术的发展提供新的依据和内\n容。","options":{"A":"评价","B":"认知","C":"实践","D":"技能"},"answer":"A","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"zg-73210","source":"中公","type":"单选","chapter":"第三章 教学评价","stem":"评价是信息技术教学的有机组成部分，关于信息技术教学评价，以下叙述正确的是（ ）。","options":{"A":"评价作品是信息技术教学常用的评价方式","B":"评价学生作品时，一般不说其存在的问题","C":"纸笔测试客观，故适宜用试卷进行评价","D":"一般只选择完成度好的学生作品进行评价"},"answer":"A","explanation":"B 选项评价学生作品时要全面，以鼓励为主既要说优点，也要说存在的问题\n及改进的方法。C 选项期末考试的主要功能是考察学生所学模块的基础知识、实际操作技能和利用信息\n技术解决实际问题的能力，诊断本学期教学存在的问题，帮助教师和学生改进随后的教与学。在组织期\n末考试等总结性评价时，要根据课程标准的要求和具体考试内容选择合适的题型和考试方式，综合运用\n纸笔测验、上机测验等多种评价方法；教学评价必须以教学目标为依据，本着对发展学生个性和创造精\n神有利的原则进行。D 选项信息技术教学评价要全面评价，既要关注到完成好的学生，也要关注到其他\n同学。","subject":"教学论","source_chapter":"第三章 教学评价"},{"id":"cg-15-s1-q26","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"下列关于网络探究学习任务的设计的说法不正确的是（    ）。","options":{"A":"学习任务应该具有开放性和层次性，使学生能根据自己的兴趣和能力进行选择","B":"学习任务的设计应体现网络教室的优势发挥网络环境的功能","C":"学习任务的最终作品必须以多媒体形式呈现，如多媒体演示文稿、网页等","D":"学习任务最好与学生的生活相联系"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q27","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"教学策略主要包括（    ）、学法和资源媒体的选择。","options":{"A":"学习","B":"教法","C":"策略","D":"目的"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q28","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"下列教学策略当中不属于“以教为主的教学策略”的是（    ）。","options":{"A":"随机进入教学策略","B":"“先行组织者”策略","C":"“示范—模仿”策略","D":"“九段教学”策略"},"answer":"A","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q29","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"下列的教学策略不属于以学为主的教学策略的是（    ）。","options":{"A":"探究式学习策略","B":"情境—陶冶教学策略","C":"启发式教学策略","D":"抛锚式教学策略"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q30","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"信息技术在授课过程当中常常采用课堂讨论、角色扮演、竞争、协同和伙伴等\n方式 apter":"第五篇 教学论"},{"id":"cg-15-s1-q53","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"某教师下列的做法当中能够起到培养学生态度、情感的教学目标的是（    ）。","options":{"A":"作品的制作","B":"资料的阅读","C":"作品的赏析","D":"任务驱动教学方法"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q54","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"在信息技术教学中，确定教学重点的主要根据是（    ）。","options":{"A":"教师教学能力","B":"教学硬件条件","C":"教学主要内容","D":"学生兴趣爱好"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q55","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"教学过程中，积累的教学资源需要按照不同的分类方法存储。如果将教学资源\n分为：文字、图像、视频、动画等类别，其分类方式为（    ）。","options":{"A":"制作时间","B":"教学需求","C":"媒体用途","D":"媒体形式"},"answer":"D","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q56","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"网络资源技术性是指（    ）。","options":{"A":"资源具备客观、真实、有效的特点能为教学活动提供参考价值","B":"资源的格式、质量、运行环境等应符合教学要求","C":"符合新课程标准，有利于激发学生的学习动机和提高学习兴趣，有利于促进学生 的全面发展","D":"资源具有多样的表现手法、生动的情节、合理的构图以及灵活的画面等"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q57","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"在初中“快快乐乐上学去”一课教学中，老师先展示了 Flash 制作的动画，取\n得较好的效果，这种课堂导入的作用是（    ）。","options":{"A":"总结规则，抽象分析","B":"激发学生的兴趣，启发思考","C":"培养分析问题的能力","D":"促进迁移"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q58","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"图中所示教学片段是描述教学流程的（    ）。","options":{"A":"创设情景情节","B":"讲授新知环节","C":"交流评价环节","D":"归纳总结环节 A 教学片断： 师：同学们，两幅图我们一起欣赏 师：打开一幅图，率先安装了 ACDSEC 软件，图片较 小 生：好漂亮，就是有点小 师：想更好欣赏吗？那我们来放大它！"},"answer":"A","explanation":"教学片断：\n师：同学们，两幅图我们一起欣赏\n师：打开一幅图，率先安装了 ACDSEC 软件，图片较\n小\n生：好漂亮，就是有点小\n师：想更好欣赏吗？那我们来放大它！","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q59","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"教学过程中通过评价，教师可以判定自己所用的教学方法的有效性和可行性，\n从而对自己的教学方式、方法等做出适当的调整。这在信息技术课中，体现了评价的什\n么作用？（    ）。","options":{"A":"评价的证明作用","B":"评价的教学作用","C":"评价的诊断作用","D":"评价的定向作用"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q60","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"师生民主评价体现的评价理念是（    ）。","options":{"A":"多元评价","B":"过程评价","C":"结果评价","D":"甄别评价"},"answer":"A","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"zg-17706","source":"中公","type":"单选","chapter":"第一章 信息技术课程知识","stem":"倡导“立足过程，促进发展”的信息技术课程评价理念，其目的是（ ）。","options":{"A":"促进学生、教师、学校和信息技术课程的发展","B":"形成新的教育评价制度，研究新的教育评价手段与方法","C":"全面了解学生学习的过程与结果，激励学生学习和改进教师教学","D":"为教师进行教学改革提供依据"},"answer":"C","explanation":"新一轮课程改革倡导“立足过程，促进发展”的课程评价观，强调促进学生\n的全面健康发展，关注个体的进步和多方面潜能的发挥，重视评价的激励和改进功能，激励性评价作为\n新课程评价理念的一个重要组成部分，它可以营造、和谐的教学氛围，诱发学生的学习动力，激发学生\n的学习兴趣，让学生更多地体验成功的喜悦，是连接师生心灵的桥梁。综上所述答案选项为 C。","subject":"教学论","source_chapter":"第一章 信息技术课程知识"},{"id":"cg-15-s1-q62","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"下列关于 PowerPoint 课件辅助教学的表述中，错误的是（    ）。","options":{"A":"通过图像、声音、视频等多媒体手段，将抽象的概念、理论转化为直观的视觉效 果，便于学生理解","B":"将复制的操作过程记录下来，便于重复播放观看，方便学生学习","C":"简洁的课件是最基本的原则，为避免学生转移注意力，最好在无颜色、无背景的 幻灯片上进行课件的编辑","D":"课件的内容是对书本知识的简化提炼，有助于学生加深对知识的记忆"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q63","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"课程结束时进行期末考试，考试依据课程标准来确定试题范围，采用纸笔测试评\n卷评分的方式，以下不正确的是（    ）。","options":{"A":"它是总结性评价","B":"它是定量评价","C":"它是绝对评价","D":"它是形成性评价"},"answer":"D","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q64","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"为了便于学生学习Flash渐变动画，将拍摄制作的微课给学生上课时自主学习，\n这体现了教学媒体（    ）。","options":{"A":"设置疑点，引发思考方面的功能","B":"创设情境，建立共同经验方面的功能","C":"提供示范，便于模仿方面的功能","D":"展示事实，获得直观方面的功能"},"answer":"C","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q65","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"多媒体网络教室环境下的教学的基本特征中，不正确的有（    ）。","options":{"A":"在学习活动的安排上，以学生的自主—合作—探究活动为主","B":"在教师的作用发挥上，突出传授与指导的功能","C":"在学习内容的组织上，以单元学习和综合学习为主","D":"在技术支持教学过程中，充分发挥网络的功能"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q66","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"随着三通两平台建设的推进，电子白板已经普遍用于课堂教学，下列关于电子\n白板的说法正确的是（    ）。","options":{"A":"电子白板完全代替投影仪和 PPT","B":"白板、软件和 PPT 可以相互调用","C":"白板可能较容易生成课件","D":"白板适用于任何一节课，而 PPT 不行"},"answer":"B","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s1-q67","source":"超格","type":"单选","chapter":"第五篇 教学论","stem":"随着教育信息化的推进，“翻转课堂”教学模式正成为当前中小学探究的热点，\n微课是该教学模式中不可或缺的资源。下列对微课理解不恰当的是？（    ）","options":{"A":"微课通常把教学重点、难点、疑点等以视频形式出现","B":"微课主要 用来帮助学习者进入自主学习","C":"微课所呈现的知识点呈“点”状、“碎片”状","D":"把一节正常上课录像进行分解就变成多个微课"},"answer":"D","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s2-q1","source":"超格","type":"多选","chapter":"第五篇 教学论","stem":"关于教育技术与信息技术的关系，你认为错误的说法是（    ）。","options":{"A":"教育技术从属于信息技术","B":"具备信息技术素养是教师掌握教育技术的基础","C":"信息技术水平高的老师没必要加教育技术的培训","D":"教育技术的核心是信息技术"},"answer":"ACD","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"th-80091","source":"题海训练","type":"多选","chapter":"题海训练","stem":"关于中学信息技术教学中使用的“任务驱动”原理，计算机运行程序的过程就是执行程\n序中指令的过程，下面说法正确的是（","options":{"A":"幻灯投影机、网络连接","B":"网络连接、实物展示台","C":"多媒体计算机、控制系统","D":"资源系统、网络连接"},"answer":"AC","explanation":"本题考查 Photoshop。用鼠标点击一次，再点击一次就可以形成直\n线型的多边形选择区域，A项正确。多边形套索属于套索工具，B项错误。鼠标拖拽出来的区\n域形成的轨迹就是选择区域。C项正确。多边形套索工具由于区域不规则，·所以不是规则选框\n工具。D项错误。故正确答案为 AC。","subject":"多媒体","source_chapter":"题海训练"},{"id":"cg-15-s2-q3","source":"超格","type":"多选","chapter":"第五篇 教学论","stem":"自主—合作—探究学习活动的网络学习环境主要包含哪几部分？（    ）","options":{"A":"学习资源","B":"学习工具","C":"协作交流平台","D":"学习评价"},"answer":"ABC","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s2-q4","source":"超格","type":"多选","chapter":"第五篇 教学论","stem":"下列陈述中，哪些是使用图像辅助教学的好处？（    ）","options":{"A":"为学生提供形象的教学内容","B":"为学生提供直观的教学内容","C":"能够再现声场","D":"有助于帮助学生形成感性认识"},"answer":"ABD","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"cg-15-s2-q5","source":"超格","type":"多选","chapter":"第五篇 教学论","stem":"网络教室完整构成包括（    ）。","options":{"A":"幻灯投影机、网络连接","B":"网络连接、实物展示台","C":"多媒体计算机、控制系统","D":"资源系统、网络连接"},"answer":"ABCD","explanation":"","subject":"教学论","source_chapter":"第五篇 教学论"},{"id":"zg-97406","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"下列关于信息的特征说明错误的是（ ）。","options":{"A":"信息具有扩散性，可以共享","B":"信息可以进行压缩","C":"人们不太关心过期的报纸体现信息的实用性","D":"在计算机中，信息必须以数据的形式存储体中，这体现信息的依附性"},"answer":"C","explanation":"信息的特征主要包括：普遍性、载体依附性、共享性、传递性、价值性、时\n效性、真伪性等。\n普遍性：信息是不以人的意志为转移的客观存在。信息是无处不在，无时不有的。\n载体依附性：信息必须依附一定的载体才能够表现出来，为人们所接收。\n价值性：信息本身是有价值的，能够满足人们的需要，一是精神上的满足，二是可以促进物质、能\n量的生产和使用。\n时效性：信息具有生命周期，其价值随着时间的推移而变化，因此信息的效用以信息价值为前提，\n信息需要不断更新。\n共享性：信息本身可传递，具有扩散性，它可以被多个信息接收者接收并且多次使用。\n传递性：无论在空间还是时间上，信息都具有可传递性。\n真伪性：信息有真伪之分，而衡量信息准确与否的标准是信息客观反映现实世界事物的程度。\n过期的报纸体现信息的时效性。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-1019","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"下列关于信息来源的说法错误的是（ ）。","options":{"A":"小李写论文参考的书籍资料偏于文献型信息源","B":"车站广播信息属于实物型信息源","C":"老师上课传递的知识属于口头型信息源","D":"通过因特网获取的信息属于电子型信息源"},"answer":"B","explanation":"信息的来源按照载体分为：\n（1）文献型信息源：文献是记录知识的一切载体；\n（2）口头型信息源（个人型信息源）：如同学、父母、朋友、老师等；\n（3）电子型信息源：如广播、电视、电话、因特网等；\n（4）实物型信息源（现场信息源）：如运动会、动物园、各类公共场所及事件；\n因此，广播属于电子型信息源。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-63475","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"要检索目前世界濒危动物华南虎的数量，可以访问百度搜索引擎，输入的关键词是（ ）。","options":{"A":"华南虎和动物","B":"濒危动物和华南虎","C":"华南虎和数量","D":"濒危动物和数量"},"answer":"C","explanation":"由题干可知要查找的是濒危动物华南虎的数量，所以根据全文搜索引擎可提\n炼出关键词华南虎、数量，两者是与的关系，所以为华南虎和数量。","subject":"数据库","source_chapter":"第一章 信息与信息技术"},{"id":"zg-65050","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"对搜索引擎的描述错误的是（ ）。","options":{"A":"搜索英文资料，Google 较为合适","B":"搜索中文资料时，百度的资源更丰富","C":"网络提供的多种搜索引擎在查询范围，检索功能等方面各具特色","D":"搜索时，输入的关键词越多越好"},"answer":"D","explanation":"本题考査搜索引擎使用时的注意事项。搜索时，并不是关键词越多越好，关\n键是选取的关键词必须涵盖所要检索的资料的关键信息。故选 D。","subject":"数据库","source_chapter":"第一章 信息与信息技术"},{"id":"zg-61416","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"将几幅看似无关的旧照片通过图像处理软件（如 Photoshop）加工后，形成一幅富有创意、有实际\n用途的图片，这体现的信息是（ ）。","options":{"A":"需依附一定载体的","B":"可以共享的","C":"可以加工的","D":"具有时效性的"},"answer":"C","explanation":"对照片进行加工处理，使信息表达更有创意，有实际用途，体现了信息具有\n可加工的特征。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-62991","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"信息技术的三大支柱除了计算机技术和通信技术之外，还有（ ）。","options":{"A":"传感技术","B":"能源技术","C":"自动化技术","D":"工程技术"},"answer":"A","explanation":"信息技术的三大支柱是测控技术、通信技术和计算机技术，而传感器技术是\n测控技术的基础。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-67306","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"某用户使用手机“导航”软件，从 A 地驶向 B 地，规划路线后开始行驶，途中“导航”提示前方\n道路拥堵，建议改变路线，并实时提供新的导航路径，该事例主要体现信息的是（ ）。","options":{"A":"载体依附性","B":"时效性","C":"共享性","D":"真伪性"},"answer":"B","explanation":"题目中的导航软件提供的信息具有时效性，过了这个时间段该信息就失效了。\n故选：B。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-29060","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"在计算机中，用文字、图象、声音、数字等所表示的内容都可称为（ ）。","options":{"A":"表象","B":"文章","C":"消息","D":"信息"},"answer":"D","explanation":"根据信息基本概念的理解，在计算机中，用文字、图象、声音、数字等所表\n示的内容都可称为信息。故选：D。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-69365","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"朱明做“验证欧姆定律”实验后，分析时发现有数据测量错了，需要重做实验。“需要重做实验”\n的结论是下列哪个过程中得出的（ ）。","options":{"A":"获取信息","B":"加工信息","C":"评价信息","D":"存储信息"},"answer":"C","explanation":"朱明做“验证欧姆定律”实验后，收集到一些数据，这是获取信息的过程，\n分析数据是对信息的加工，分析时发现有数据测量错了，需要重做实验，这是对信息的评价，如果信息\n获取不成功或者获取的信息不合适，则需要调整过程重新获取信息。故选：C。","subject":"编程语言","source_chapter":"第一章 信息与信息技术"},{"id":"zg-27001","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"数千年后的今天，我们能看到商代青铜器、越王宝剑等图片，这主要体现信息的（ ）。","options":{"A":"时效性","B":"载体依附性","C":"传递性","D":"普遍性"},"answer":"C","explanation":"时效性：信息具有生命周期，其价值随着时间的推移而变化；普遍性：信息\n是不以人的意志为转移的客观存在；载体依附性：信息必须依附一定的载体才能够表现出来，为人们所\n接收；传递性：无论在空间还是时间上，信息都具有可传递性。由题意可知，信息跨越了空间的限制，\n因此本题的答案是 C。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-3296","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"我们经常使用手机微信或支付宝通过扫描二维码来付款，扫描二维码属于（ ）。","options":{"A":"信息的获取","B":"信息的加工","C":"信息的表达","D":"信息的管理"},"answer":"A","explanation":"扫描二维码的目的是为了实现用户与商家支付宝账户的支付结算。因此本题\n的答案是 A。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-93070","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"向搜索引擎公司交一定数额的竞价排名费用，可以使要发布的信息在搜索结果中排在靠前的位置。\n以下说法正确的是（ ）。","options":{"A":"排在最前面的信息是最重要的信息","B":"排在最前面的信息是最相关的信息","C":"对获取的信息应当仔细筛选","D":"完全不能相信搜索引擎给出的搜索结果"},"answer":"C","explanation":"竞价排名是搜索引擎公司以付费的方式给企业推广的一种途径，故其中可能\n有不良企业发布不实信息，所以我们用户应当对搜索结果仔细判别筛选。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-5355","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"下列选项中，属于信息范畴的是（ ）。","options":{"A":"航空公司","B":"机场","C":"关于大陆与台湾实现三通的报道","D":"报纸"},"answer":"C","explanation":"信息是通过语言、文字、图形、图像等信号传送的音信、消息，它反映一切\n事物的属性、状态及动态。选项 ABC 都可以是信息的载体，只有 C 选项是内容，是信息。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-3780","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"王丽个人计算机上的照片非常多，查找起来很不方便，于是她对计算机中的照片进行了整理和归\n类.下列四种文件夹存放结构中，不合理的是（ ）。","options":{"A":"华山、鼓浪屿、九寨沟、颐和园","B":"2011 年 10 月、2012 年 2 月、2012 年 10 月、2013 年 8 月","C":"幼儿园、小学、初中、高中、大学","D":"学习、生活、工作、旅游、海南"},"answer":"D","explanation":"信息资源管理的目的是提高信息资源的利用效益，帮助人们提高学习、工作、\n生产等效率。信息资源管理的方式主要有三种：人工管理、文件管理和数据库管理。人工管理灵活、简\n便，无需依赖环境设备，但对大量信息资源进行重新组织管理比较困难；文件管理以文件和文件夹为信\n息单位，方便了信息的整理、加工和检索，但需要人与计算机的高度交互；数据库信息管理便于信息的\n分类、排序、检索、统计等，处理速度快，效率高，但对计算机硬件和软件要求较高，适合于大数据量、\n专门化的信息资源管理。A 以地名分类，B 以时间日期分类，C 以时间段分类，D 在学习、生活、工作、\n旅游分类可以，但加上海南就不合理了，可以把海南放在旅游文件夹里面。故选：D。","subject":"数据库","source_chapter":"第一章 信息与信息技术"},{"id":"zg-60714","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"下列属于信息的是（ ）。","options":{"A":"报纸","B":"电视机","C":"天气预报内容","D":"光盘"},"answer":"C","explanation":"信息是反映一切事物属性及动态的消息、情报、指令、数据和信号中所包含\n的内容。A、B、D 是传递信息所用的载体，不属于信息。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-37711","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"小明到博物馆参观，使用爸爸很多年前购买的模拟摄像机拍摄了一段视频。它可以使用下列哪种\n方法，将这段视频信息输入到电脑中（ ）。","options":{"A":"视频采集","B":"屏幕捕获","C":"视频截取","D":"视频编辑"},"answer":"A","explanation":"将视频输入到电脑中属于视频采集的方法。，故选 A。","subject":"多媒体","source_chapter":"第一章 信息与信息技术"},{"id":"zg-41345","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"信息无时不在，无处不有。这句话表明了信息具有（ ）的特点。","options":{"A":"多样性","B":"普遍性","C":"变化性","D":"储存性"},"answer":"B","explanation":"信息的特征包括普遍性、载体依附性、共享性、传递性、价值性、时效性、\n真伪性。故选择 B 选项。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-39770","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"下列不属于信息的基本特征的是（ ）。","options":{"A":"时效性","B":"共享性","C":"有穷性","D":"真伪性"},"answer":"C","explanation":"信息的特征包括普遍性、载体依附性、共享性、传递性、价值性、时效性、\n真伪性。故选择 C 选项。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-43404","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"信息技术是对人类信息器官功能的扩展，通信技术是对人类（ ）的扩展。","options":{"A":"感觉器官","B":"神经器官 C 视觉器官","D":"思维器官"},"answer":"B","explanation":"通信技术延伸人的神经系统传递信息的功能。通信技术包含信息的变换、传\n递、存储、处理以及某些控制与调节的技术，其本质上是实现信源和信宿之间信息的传输和交换。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-73701","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"星期六，张涛参加了校运会 1500 米项目的比赛，并获得了冠军。回家后，他把这一喜讯告诉父\n母。请问，描述这段内容用到了信息来源的（ ）类型。","options":{"A":"文献","B":"口头","C":"电子","D":"实物"},"answer":"B","explanation":"把消息面对面的告知父母，是通过口头表达的方式，没有用到任何七大介质，\n故选择 B 选项。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-79490","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"用图片来表达信息可以起到文字、数据难以替代的作用。下列哪种图可以起到深化主题的作用\n（ ）。","options":{"A":"实景图","B":"图解图","C":"类比图","D":"概念图"},"answer":"C","explanation":"不同的图具有不同的表达作用，实景图的作用是增强真实感，图解图的作用\n是描述一个复杂过程，或一个复杂事物的构造和结构，类比图的作用是起到深化主题的作用。","subject":"编程语言","source_chapter":"第一章 信息与信息技术"},{"id":"zg-75760","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"下面哪些属于信息技术的应用（ ）。\n①克隆绵羊 ②移动电话 ③远程培训 ④刷卡消费 ⑤指纹识别 ⑥电子图书\n⑦转基因工程","options":{"A":"①②③④⑤⑥⑦","B":"②③④⑤⑥","C":"①②③④⑤⑥","D":"②③④⑤⑥⑦"},"answer":"B","explanation":"信息技术（Information Technology，缩写 IT），是主要用于管理和处理信息所\n采用的各种技术的总称。选项中克隆绵羊和转基因工程属于生物上的技术，其他的选项属于信息技术的\n应用。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-77431","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"现在我们常常听人家说到（或在报纸电视上也看到）IT 行业各种各样的消息，那么这里所提到\n的“IT”指的是（ ）。","options":{"A":"信息","B":"信息技术","C":"通信技术","D":"感测技术"},"answer":"B","explanation":"信息技术（Information Technology，IT）指的是用来扩展人们信息器官功能、\n协助人们进行信息处理的一类技术。人们的信息器官主要有感觉器官、神经网络、思维器官及效能器官，\n它们分别用于获取信息、传递信息、处理并再生信息以及使用信息使之产生实际效用。选择 B 选项。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-9691","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"在邮箱里收到了一封带有附件的邮件，张华打开看附件并运行它。此后，他的电脑常常出现死机，\n运行缓慢等一系列问题。经朋友检查，机器由于接收不明来历的软件中毒了。从这事例中，张华接收不\n明来历的邮件时没有对一下哪项（ ）做出慎重判断，以致造成了损失。","options":{"A":"信息的来源","B":"信息的价值","C":"信息的普遍性","D":"信息的时效性"},"answer":"A","explanation":"从题干中的描述可知，是由于接收到来历不明的软件，才导致了电脑中毒，\n所以是没有对所收到信息的发送方进行判断，也就是信息的来源，故选择 A 答案。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-43500","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"信息源的正确分类是（ ）。","options":{"A":"文件类型、口头类型、电子类型、叙述类型信息源","B":"文献类型、口头类型、电子类型、实物类型信息源","C":"文件类型、口头类型、电子类型信息源","D":"文件类型、口头类型、物理类型信息源"},"answer":"B","explanation":"根据信息的载体信息来源划分为实物型、口头型、文献型信和电子型信息源。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-11750","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"某同学要给留学国外的朋友发邮件，若对方电脑中没有汉字处理系统，可使用的有效、快捷的方\n法是（ ）。","options":{"A":"将汉字文稿打印，并扫描为 JPG 格式发送","B":"用汉语拼音发送邮件","C":"将其译成英文，发送邮件","D":"用 Photoshop 等软件把汉字文稿文件制作为 JPEG 图片并发送"},"answer":"D","explanation":"同一种信息内容可以采用不同的表达方式，以满足信息接收者的实际需要.\n最常用的信息表达方式有：文字、语言、图形、图象、声音和形体动作等。根据题中问题描述，因为对\n方电脑没有汉字处理系统，而读取图片信息不需汉字处理系统的支持，所以最好可采用 Photoshop 等软\n件把汉字文稿文件制作为 JPEG 图片并发送。故选：D。","subject":"多媒体","source_chapter":"第一章 信息与信息技术"},{"id":"zg-41441","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"小敏想在网络上找自己喜欢的一首歌，你认为通过网络帮助他的最好办法是（ ）。","options":{"A":"问某公司网站","B":"访问学校网站","C":"用专门的音乐搜索引擎搜索","D":"访问本地政府的门户网站"},"answer":"C","explanation":"通过专门的搜索引擎更加有针对性，搜索起来更加方便快捷。","subject":"数据库","source_chapter":"第一章 信息与信息技术"},{"id":"zg-11144","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"某同学希望在网上查找一种需要的资料，那么较好的信息搜索流程是（ ）。","options":{"A":"选择查找方式——确定搜索目标——确定搜索引擎——查找、筛选","B":"确定搜索目标——选择查找方式——确定搜索引擎——查找、筛选","C":"确定搜索引擎——确定搜索目标——选择查找方式——查找、筛选","D":"确定搜索目标——确定搜索引擎——选择查找方式——查找、筛选"},"answer":"D","explanation":"信息搜索的一般流程：\n（1）明确信息检索的目标；\n（2）根据目标选择合适的搜索引擎；\n（3）选择查找方式；\n（4）对结果进行筛选。","subject":"算法与数据结构","source_chapter":"第一章 信息与信息技术"},{"id":"zg-44106","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"关于信息获取的方法，下列说法不正确的是（ ）。","options":{"A":"信息的来源具有多样性","B":"同一种信息的获取方式可以有多种途径","C":"人类社会不同时间获取信息的手段各不相同","D":"凡是信息都可以通过国际互联网获取到"},"answer":"D","explanation":"信息源内涵丰富，它不仅包括各种信息载体，也包括各种信息机构；不仅包\n括传统印刷型文献资料，也包括现代电子图书报刊；不仅包括各种信息储存和信息传递机构，也包括各\n种信息生产机构；信息源的多样性决定了获取信息的方法多种多样；随着人类社会发展，获取信息的手\n段也各不相同。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-9085","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"获取信息的来源决定了信息的可靠程度，下列信息来源中哪一种来源获得的信息最可靠（ ）。","options":{"A":"报刊杂志","B":"朋友、同学","C":"亲自进行科学实验","D":"因特网"},"answer":"C","explanation":"亲自进行科学实验是获得信息最可靠的方法。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-5451","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"人类在信息传递方面首次突破了时间和空间的限制的是（ ）。","options":{"A":"语言的产生和实用","B":"造纸术和印刷术的发明和应用","C":"电报电话的发明和应用","D":"文字的发明和使用"},"answer":"D","explanation":"文字的发明和使用首次突破了时间和空间的限制。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-75154","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"千千万万的人们可以通过电视了解到发生在远方的消息，这体现了信息可以在（ ）上传送。","options":{"A":"时间","B":"通信","C":"信道","D":"空间"},"answer":"D","explanation":"电话、电报、广播、电视的发明进一步突破了时间与空间的限制，信息传递\n的手段和效率再次发生了质的飞跃。人们通过电视了解到远方的消息，体现了信息可以在空间上传送。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-23271","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"对于计算机来说，信息处理其本质就是（ ）。","options":{"A":"数据处理","B":"事件处理","C":"控制处理","D":"资源应用"},"answer":"A","explanation":"信息的处理是指对信息进行相应的分析与加工，使它们成为有效的、可以利\n用的信息。信息在计算机中主要以二进制数据的形式存储，所以对于计算机来说，信息处理本质就是数\n据处理。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-73095","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"人们把人造卫星发射上天，得到了大量的数据信息和情报，这是（ ）的过程。","options":{"A":"信息处理","B":"信息储存","C":"信息加工","D":"信息采集"},"answer":"D","explanation":"信息输入即信息采集，是指通过各种途径对相关信息进行搜索、归纳、整理\n并最终形成所需有效信息的过程。人造卫星获得数据信息和情报是属于信息采集的过程。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-39164","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"下面对信息的特征的理解，错误的（ ）。","options":{"A":"“孙膑减灶”引出信息有传递性和真伪性特征","B":"天气预报、情报等引出信息有时效性","C":"信息不会随着时间的推移而变化","D":"盲人摸象引出信息具有不完全性，人们难以一次就获得客观事物的全部信息"},"answer":"C","explanation":"“孙膑减灶”这个故事中，通过减灶传递给敌军错误的信息，体现了信息的\n传递性和真伪性；天气预报、情报都具有时间上的性质，过了特定时间，信息的价值就大打折扣甚至毫\n无价值，体现了信息的时效性；盲人摸象的故事中，盲人根据自己摸到的部分得到相关信息进行猜测，\n体现了信息的不完全性；信息反映的是事物某一特定时刻的状态，会随着时间的推移而变化，比如天气\n预报信息和交通信息，所以 C 选项错误。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-40739","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"《三国演义》中有关“蒋干盗书”的故事说：在赤壁之战时，蒋干从周瑜处偷走了人家事前伪造\n好的蔡瑁、张允的投降书，交给曹操，结果曹操将二人斩首示众，致使曹操失去了仅有的水军将领；最\n后落得“火烧三军命丧尽”的下场。这说明信息具有（ ）。","options":{"A":"共享性","B":"时效性","C":"真伪性","D":"价值相对性"},"answer":"C","explanation":"信息的真伪性是指信息有真伪之分，而衡量信息准确与否的标准是信息客观\n反映现实世界中事物的程度。题干故事中，伪造的投降书体现了信息具有真伪性。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-37105","source":"中公","type":"单选","chapter":"第一章 信息与信息技术","stem":"有人说“信息是一种资源”，也有人说“信息能消除认识上的不确定性\"。这些说法表明了（ ）。","options":{"A":"信息是静止的","B":"信息可以被人类所利用","C":"信息是一种能量","D":"信息是一种物质"},"answer":"B","explanation":"“信息是一种资源”，“信息能消除认识上的不确定性”都体现了信息可以拿\n来被人们利用。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-45267","source":"中公","type":"多选","chapter":"第一章 信息与信息技术","stem":"下列关于信息的说法，正确的是（ ）。","options":{"A":"二十一世纪是信息社会，信息是发展到二十一世纪才出现的","B":"信息是伴随着人类的诞生而产生","C":"信息总是以文字、声音、图像、气味等形式被人们的感觉器官所接收","D":"信息就像空气一样，无处不在"},"answer":"CD","explanation":"信息是反映一切事物属性及动态的消息、情报、指令、数据和信号中所包含\n的内容，信息是客观存在的不随人类社会的产生而改变。因此 A、B 选项错误，C 选项是信息的表现形\n式即载体；D 选项体现的是信息的普遍性特征。因此本题的答案是 CD。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-75564","source":"中公","type":"多选","chapter":"第一章 信息与信息技术","stem":"在使用搜索引擎查找信息时经常需要使用一些方法和技巧，下列正确的有（ ）。","options":{"A":"使用逻辑运算符","B":"提炼关键词","C":"细化搜索条件","D":"强制搜索"},"answer":"ABCD","explanation":"常用的搜索技巧包括提炼搜索关键词、细化搜索条件、用好逻辑符号、\n运用逗号、星号、括号和引号、运用高级搜索技术。在搜索时，如果想让搜索引擎把关键词作为一个固\n定的词组进行检索，不进行拆分，可以使用强制搜索，即在不能拆分的关键字上加双引号。","subject":"数据库","source_chapter":"第一章 信息与信息技术"},{"id":"zg-77627","source":"中公","type":"多选","chapter":"第一章 信息与信息技术","stem":"下列属于现代信息技术应用实例的有（ ）。","options":{"A":"量子计算机","B":"虚拟现实","C":"机器人","D":"数字地球和智能化小区"},"answer":"BCD","explanation":"BCD 解析：信息技术的应用范围十分广泛，已经渗透到社会生活的各个领域，常见的有\n数字地球、虚拟现实技术、人工智能、流媒体技术、数据库技术等。其中人工智能具体应用包括机器人\n走进家庭、智能化家居、以及模式识别中常见的指纹识别、门禁等。流媒体技术的具体应用包括腾讯视\n频、优酷、爱奇艺等网络在线视频播放软件均采用的是流媒体技术。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-51517","source":"中公","type":"判断","chapter":"第一章 信息与信息技术","stem":"交通广播电视台中的实时路况信息会不断的发生变化，这体现了信息的时效性。（ ）","options":{},"answer":"正确","explanation":"时效性是指信息具有生命周期，其价值随着时间的推移而变化，因此信息\n的效用以信息价值为前提，信息需要不断更新。题干中描述的路况信息就是在随着时间的变化而变化，\n为出行的人提供实时的路况信息。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-53092","source":"中公","type":"判断","chapter":"第一章 信息与信息技术","stem":"信息必须寄存于某种传播媒介之中如纸张，声波等。（ ）","options":{},"answer":"正确","explanation":"题干体现了信息的载体依附性。载体依附性是指信息必须依附于一定的载\n体才能够表现出来，为人们所接收。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-45333","source":"中公","type":"判断","chapter":"第一章 信息与信息技术","stem":"及时掌握交通道路信息对出租司机来讲至关重要，体现了信息真伪性。（ ）","options":{},"answer":"错误","explanation":"交通信息属于实时更新的，体现了信息的时效性。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-48967","source":"中公","type":"判断","chapter":"第一章 信息与信息技术","stem":"搜索引擎只有目录搜索和全文搜索两种。（ ）","options":{},"answer":"错误","explanation":"搜索引擎有目录搜索引擎、全文搜索引擎、元搜索引擎以及其他搜索引擎，\n并不是只有这两类。","subject":"数据库","source_chapter":"第一章 信息与信息技术"},{"id":"zg-47392","source":"中公","type":"判断","chapter":"第一章 信息与信息技术","stem":"某论坛主对一个“2016 年中国大学排名”的帖子进行“置顶”操作，这属于信息资源评价中的统\n计评价。（ ）","options":{},"answer":"错误","explanation":"信息资源的评价方式有三种，分别是统计评价、专家或核心刊物评价、个\n人推荐。某个人对帖子的置顶操作，不属于统计评价，属于个人推荐。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-74727","source":"中公","type":"填空","chapter":"第一章 信息与信息技术","stem":"在因特网上查找所需要信息，通常通过_________来搜索。","options":{},"answer":"搜索引擎","explanation":"搜索引擎。解析：搜索引擎（Search Engine）是指根据一定的策略、运用特定的计算机\n程序从互联网上搜集信息，在对信息进行组织和处理后，为用户提供检索服务，将用户检索相关的信息\n展示给用户的系统。因此在因特网上查找所需要信息，通常通过搜索引擎来搜索。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-71093","source":"中公","type":"填空","chapter":"第一章 信息与信息技术","stem":"信息处理过程包括：获取信息、________、________、应用信息。","options":{},"answer":"传递信息、加工信息","explanation":"传递信息、加工信息。解析：本题属于信息处理基础知识中的信息处理概念部分。信息\n处理（Information Processing）是指获取原始信息，采用某种方法和设备，按一定的目的和步骤对原始\n信息进行加工，使之转变成可利用的有效信息过程的总称。可见，信息处理包括了信息的采集（获取）、\n传递、加工和应用。","subject":"信息基础","source_chapter":"第一章 信息与信息技术"},{"id":"zg-18526","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"下列设备中属于计算机输入设备的是（ ）。","options":{"A":"WPS","B":"服务器","C":"投影仪","D":"光笔"},"answer":"D","explanation":"A 选项是文字编辑工具；B 选项是为用户提供服务；C 选项是输出设备。","subject":"多媒体","source_chapter":"第二章 计算机基础知识"},{"id":"zg-77840","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"计算机能够自动准确快速地按照人们的意图进行运行的最基本的思想是（ ）。","options":{"A":"采用超大规模集成电路","B":"采用 CPU 作为中央核心部件","C":"采用操作系统","D":"存储程序和程序控制"},"answer":"D","explanation":"计算机采用“存储程序和程序控制”，即将编好的程序和执行程序所需要的数\n据存储在计算机中，计算机在工作时能在不需要人员干预的情况下，自动准确快速的按照人们的意图逐\n条取出指令并加以执行。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-52457","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"某单位自行开发的工资管理系统，按计算机应用的类型划分，它属于（ ）。","options":{"A":"科学计算","B":"辅助设计","C":"数据处理","D":"实时控制"},"answer":"C","explanation":"数据处理又称为非数值计算，是指对大量的数据进行加工处理，是计算机最\n重要的应用领域，80%的计算机都用于数据处理。例如：工资管理和图书管理等。科学计算也称为数值\n计算，是指用于完成科学研究和工程技术中提出的数学问题的计算，是计算机最早的应用领域，例如：\n地震预测、神十上天等。过程控制也称为实时控制，是指计算机对被控制对象实时地进行数据采集、检\n测和处理，按最佳状态迅速地对控制对象进行自动控制或自动调节。例如：空调对温度的自动控制等。\n辅助设计是计算机辅助应用的一种，英文简称为 CAD。","subject":"编程语言","source_chapter":"第二章 计算机基础知识"},{"id":"zg-43909","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"一个汉字的国标码可以用两个字节存储，这两个字节的最高位分别是（ ）。","options":{"A":"1 和 1","B":"0 和 0","C":"1 和 0","D":"0 和 1"},"answer":"A","explanation":"为了区别汉字与普通 ASCII 字符，并最大限度保障与 ASCII 字符兼容性。汉\n字两个字节的最高位必须为 1，这样国标汉字内码与 ASCII 字符兼容而有区别。所以只有 A 正确，其他\n的都错误。故选：A。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-54516","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"在计算机中，bit 中文含义（ ）。","options":{"A":"二进制位","B":"双字","C":"字节","D":"字"},"answer":"A","explanation":"二进制用 bit 表示，字节用 Byte 表示。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-41850","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"十进制 269 转换为十六进制数是（ ）。","options":{"A":"10E","B":"10D","C":"10C","D":"10B"},"answer":"B","explanation":"十进制转换为十六进制采用的是除以基数取余，直到商为 0 为，余数倒写。\n269 除以 16，商为 16 余数 13；16 除以 16；商为 1，余数为 0；1 除以 16，商为 0 余数为 1。将余数倒\n着写，为 10D。故本题答案是 B。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-11553","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"下列图象属于二维码的是（ ）。","options":{"A":"B.","C":"D."},"answer":"A","explanation":"A 是二维码。B 是条形码。C 是验证码。D 是二进制编码。故选：A。","subject":"信息基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-86872","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"各种计算机中字符的 ASCII 码不完全相同，但 26 个字母从 A-Z 在 ASCII 码中的序号是相同的，\n下面的说法正确的是（ ）。","options":{"A":"其序号依次为 0-25","B":"其序号依次为 1-26","C":"其序号依次为 48-57","D":"其序号依次为 65-90"},"answer":"D","explanation":"26 个英文字母 A-Z 的序号依次为 65-90，a-z 依次为 97-122。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-90506","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"通常微型处理器是按（ ）进行分类。","options":{"A":"字长","B":"规格","C":"性能","D":"价格"},"answer":"A","explanation":"微处理器由是一片或少数几片大规模集成电路组成的中央处理器，字长是微\n型处理器一次能够处理的二进制的位数。","subject":"计算机基础","source_chapter":"第二章 计算机基础知识"},{"id":"zg-88931","source":"中公","type":"单选","chapter":"第二章 计算机基础知识","stem":"下列选项中，不属于计算机硬件系统的是（ ）。","options":{"A":"I/O 设备","B":"软件","C":"运算器","D":"控制器"},"answer":"B","explanation":"计算机的硬件系统由 CPU、存储器、输入和输出设备组成；其中 CPU 即中\n央处理器，由运算器
