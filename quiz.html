<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#143b6b">
  <meta name="description" content="围绕事业单位专业知识常见考点，按科目、题型和复习状态练习，支持错题、收藏、到期复习与进度备份。">
  <title>刷题器</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="筛选和操作" aria-hidden="true" tabindex="-1" inert>
      <div class="drawer-head">
        <strong>刷题器</strong>
        <button class="icon-btn" id="drawer-close" aria-label="关闭">×</button>
      </div>

      <section class="drawer-section drawer-search-section">
        <div class="drawer-title">搜索题目</div>
        <div class="quick-filters" aria-label="搜索">
          <input id="search-input" type="search" aria-label="搜索题干、选项和解析" placeholder="输入关键词" autocomplete="off">
          <button id="clear-search" class="secondary-btn" type="button">清除</button>
        </div>
      </section>

      <section class="drawer-section">
        <div class="drawer-title">题型</div>
        <div class="drawer-list" id="drawer-types"></div>
      </section>

      <section class="drawer-section">
        <div class="drawer-title">知识点</div>
        <div class="drawer-list drawer-list-compact" id="drawer-chapters"></div>
      </section>

      <div class="drawer-filter-actions">
        <button type="button" id="drawer-reset-filters">重置筛选</button>
        <button type="button" class="primary" id="drawer-apply">应用并返回</button>
      </div>

      <details class="drawer-section drawer-settings">
        <summary>数据与设置</summary>
        <div class="drawer-list drawer-settings-list">
          <button class="drawer-action" id="export-wrong">导出错题本</button>
          <button class="drawer-action" id="export-flags">导出纠错标记</button>
          <button class="drawer-action" id="export-progress">导出进度</button>
          <button class="drawer-action" id="import-progress">导入进度</button>
          <button class="drawer-action" id="restore-progress">恢复导入前进度</button>
          <button class="drawer-action danger" id="reset">重置进度</button>
        </div>
      </details>
    </aside>

    <div class="drawer-mask" id="drawer-mask" aria-hidden="true"></div>

    <main class="main" id="app-main">
      <header class="topbar" id="topbar">
        <div class="topbar-row">
          <button class="icon-btn filter-trigger" id="drawer-toggle" aria-label="打开筛选" aria-controls="drawer" aria-expanded="false"><span aria-hidden="true">☷</span></button>
          <select id="subject-select" aria-label="科目"></select>
          <span class="mini-stat" id="mini-stat">0/0 · 0%</span>
          <button class="icon-btn" id="stats-toggle" aria-label="展开统计" aria-controls="stats" aria-expanded="false">▸</button>
        </div>
        <div class="stats collapsed" id="stats">
          <span>已做 <b id="stat-done">0</b></span>
          <span class="ok">对 <b id="stat-correct">0</b></span>
          <span class="ng">错 <b id="stat-wrong">0</b></span>
          <span>正确率 <b id="stat-rate">0%</b></span>
          <span class="ng">错题本 <b id="stat-wrongbook">0</b></span>
        </div>
        <div class="progress" id="progress" role="progressbar" aria-label="当前范围完成进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="progress-fill"></div></div>
      </header>

      <nav class="module-switcher desktop-module-switcher" aria-label="学习模块">
        <a class="module-switcher-link" href="./index.html">课程</a>
        <a class="module-switcher-link" href="./notes.html">讲义</a>
        <a class="module-switcher-link" href="./color-notes.html">三色回忆</a>
        <a class="module-switcher-link" aria-current="page" href="./quiz.html">刷题</a>
      </nav>
      <section class="active-filters hidden" id="active-filters" aria-label="当前筛选条件"></section>

      <header class="runner-header" id="runner-header">
        <button type="button" id="runner-exit">← 返回</button>
        <div><strong id="runner-title">练习</strong><span id="runner-scope">全部课程</span></div>
      </header>

      <section id="card-area"></section>
    </main>
  </div>

  <nav class="mobile-tabbar quiz-mobile-tabbar" aria-label="主导航">
    <a href="./index.html"><span aria-hidden="true">⌂</span><strong>课程</strong></a>
    <a id="mobile-notes-link" href="./notes.html"><span aria-hidden="true">读</span><strong>讲义</strong></a>
    <a id="mobile-recall-link" href="./color-notes.html"><span aria-hidden="true">忆</span><strong>回忆</strong></a>
    <a aria-current="page" href="./quiz.html"><span aria-hidden="true">练</span><strong>刷题</strong></a>
  </nav>

  <input id="progress-file" type="file" accept="application/json,.json" hidden>
  <div class="sr-only" id="answer-live" role="status" aria-live="assertive" aria-atomic="true"></div>
  <script src="./build-meta.js"></script>
  <script src="./questions.js"></script>
  <script src="./question-media.js"></script>
  <script src="./app.js"></script>
</body>
</html>
