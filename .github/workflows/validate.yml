name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check JavaScript
        run: |
          node --check app.js
          node --check questions.js
          node --check sw.js
      - name: Check JSON
        run: |
          python -m json.tool questions.json > /dev/null
          python -m json.tool manifest.webmanifest > /dev/null
      - name: Validate question bank
        run: python scripts/validate_questions.py
