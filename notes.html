<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#175cd3">
  <title>邵阳备考 · 零基础讲义</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #fff;
      --text: #182230;
      --muted: #667085;
      --border: #e4e7ec;
      --primary: #175cd3;
      --primary-soft: #eff6ff;
      --red: #b42318;
      --red-soft: #fff2f0;
      --blue: #175cd3;
      --black: #182230;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }
    html { max-width: 100%; overflow-x: hidden; scroll-behavior: smooth; }
    body {
      max-width: 100%;
      overflow-x: hidden;
      margin: 0;
      background: linear-gradient(180deg, #eaf2ff 0, var(--bg) 280px);
      color: var(--text);
      font: 16px/1.75 system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    :where(button, input, a):focus-visible {
      outline: 3px solid rgba(23, 92, 211, .38);
      outline-offset: 2px;
    }
    .skip-link {
      position: fixed;
      left: 12px;
      top: -60px;
      z-index: 100;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
    }
    .skip-link:focus { top: 12px; }
    .hidden { display: none !important; }
    .sr-only { position: absolute !important; width: 1px !important; height: 1px !important; padding: 0 !important; margin: -1px !important; overflow: hidden !important; clip: rect(0, 0, 0, 0) !important; white-space: nowrap !important; border: 0 !important; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(228, 231, 236, .82);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(14px);
      padding-top: env(safe-area-inset-top);
    }
    .header-inner {
      width: min(1160px, 100%);
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: auto;
      padding: 8px max(18px, env(safe-area-inset-right)) 8px max(18px, env(safe-area-inset-left));
    }
    .module-link {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--primary);
      text-decoration: none;
      font-weight: 650;
      white-space: nowrap;
    }
    .module-link:hover { border-color: #84adff; background: var(--primary-soft); }
    .module-link[aria-current="page"] { border-color: var(--primary); background: var(--primary); color: #fff; }
    .header-brand { min-width: 0; color: inherit; text-decoration: none; }
    .module-nav { display: flex; gap: 7px; margin-left: auto; }
    .brand { font-size: 18px; font-weight: 800; letter-spacing: .01em; }
    .brand-sub { color: var(--muted); font-size: 13px; }

    main {
      width: min(1160px, 100%);
      margin: auto;
      padding: 26px max(18px, env(safe-area-inset-right)) max(56px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    }
    .directory-head {
      max-width: 720px;
      margin: 8px 0 22px;
    }
    .directory-head h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 38px); line-height: 1.25; }
    .directory-head p { margin: 0; color: var(--muted); }
    .directory-search { max-width: 560px; margin: 18px 0; }
    .search-box {
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 3px 12px rgba(16, 24, 40, .04);
    }
    .search-box:focus-within { border-color: var(--primary); }
    .search-box input { min-width: 0; flex: 1; border: 0; outline: 0; background: transparent; color: var(--text); }
    .search-box input { min-height: 44px; }
    .search-icon { color: var(--muted); }
    .icon-button {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 20px;
    }
    .icon-button:hover { background: var(--primary-soft); color: var(--primary); }
    .course-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .course-card {
      min-height: 104px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      color: var(--text);
      text-align: left;
      box-shadow: 0 6px 20px rgba(16, 24, 40, .05);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }
    .course-card:hover { transform: translateY(-2px); border-color: #84adff; box-shadow: var(--shadow); }
    .course-icon {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      background: var(--primary-soft);
      font-size: 24px;
    }
    .course-name { font-size: 17px; font-weight: 750; line-height: 1.45; overflow-wrap: anywhere; }
    .empty-result { margin: 18px 0; padding: 26px; border-radius: 14px; background: #fff; color: var(--muted); text-align: center; }

    .study-toolbar {
      position: sticky;
      top: 59px;
      z-index: 15;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      margin: -10px 0 14px;
      padding: 10px 0;
      background: linear-gradient(180deg, rgba(244, 247, 251, .98), rgba(244, 247, 251, .92));
      backdrop-filter: blur(10px);
      align-items: start;
    }
    .search-area { min-width: 0; }
    .search-area .search-status { margin: 4px 4px 0; }
    .toolbar-actions { display: flex; align-items: flex-start; gap: 8px; }
    .text-button {
      min-height: 46px;
      height: 46px;
      padding: 0 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      white-space: nowrap;
    }
    .text-button:hover { border-color: #84adff; color: var(--primary); }
    .mobile-nav-toggle { display: none; }

    .study-layout { display: grid; grid-template-columns: 238px minmax(0, 1fr); gap: 18px; align-items: start; }
    .chapter-nav {
      position: sticky;
      top: 128px;
      max-height: calc(100vh - 148px);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 6px 22px rgba(16, 24, 40, .06);
    }
    .chapter-nav-head {
      position: sticky;
      top: 0;
      z-index: 2;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 8px 7px 14px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      font-weight: 750;
    }
    .chapter-links { padding: 8px; }
    .chapter-link {
      width: 100%;
      min-height: 44px;
      display: -webkit-box;
      margin: 2px 0;
      padding: 9px 10px;
      overflow: hidden;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #475467;
      text-align: left;
      line-height: 1.45;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .chapter-link:hover, .chapter-link.active { background: var(--primary-soft); color: var(--primary); }
    .study.nav-collapsed .study-layout { grid-template-columns: 58px minmax(0, 1fr); }
    .study.nav-collapsed .chapter-nav-head { justify-content: center; padding: 7px; }
    .study.nav-collapsed .chapter-nav-label,
    .study.nav-collapsed .chapter-links { display: none; }

    .note {
      min-width: 0;
      padding: clamp(18px, 3vw, 34px);
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .note:focus { outline: none; }
    .note > h1 { margin: 0 0 14px; font-size: clamp(24px, 3.5vw, 32px); line-height: 1.35; overflow-wrap: anywhere; }
    .note p { margin: 0 0 13px; overflow-wrap: anywhere; }
    .note code {
      padding: .1em .36em;
      border-radius: 5px;
      background: #f2f4f7;
      color: #7a271a;
      font: .92em/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .note ul { margin: 0 0 15px; padding-left: 1.35em; }
    .note ol { margin: 0 0 15px; padding-left: 1.6em; }
    .note li { margin: 5px 0; }
    .note blockquote { margin: 14px 0; padding: 10px 14px; border-left: 4px solid #98a2b3; background: #f8fafc; color: #475467; }
    .note pre { max-width: 100%; overflow: auto; margin: 14px 0; padding: 14px; border-radius: 10px; background: #101828; color: #f2f4f7; line-height: 1.65; }
    .note pre code { padding: 0; background: transparent; color: inherit; white-space: pre; }
    .note mark { padding: 0 .08em; border-radius: 3px; background: #fef08a; color: #422006; }
    .red { color: var(--red); font-weight: 750; }
    .blue { color: var(--blue); font-weight: 750; }
    .black { color: var(--black); }
    .study.recall-mode .note :is(.red, .blue, .black):not(.recall-revealed) {
      display: inline;
      border-radius: 4px;
      background: repeating-linear-gradient(135deg, rgba(37, 99, 235, .13) 0 8px, rgba(37, 99, 235, .06) 8px 16px);
      color: transparent !important;
      text-shadow: none;
      cursor: pointer;
      user-select: none;
    }
    .study.recall-mode .note :is(.red, .blue, .black):not(.recall-revealed) * { visibility: hidden; }
    .study.recall-mode .note :is(.red, .blue, .black):focus-visible { outline: 3px solid rgba(37, 99, 235, .42); outline-offset: 2px; }
    .recall-hint { display: none; margin: 0 0 13px; padding: 10px 12px; border: 1px solid #84adff; border-radius: 10px; background: var(--primary-soft); color: var(--blue); font-size: 13px; }
    .study.recall-mode .recall-hint { display: block; }
    .chapter-section { margin: 24px 0 10px; scroll-margin-top: 138px; }
    .chapter-heading { margin: 0 0 14px; }
    .chapter-toggle {
      width: 100%;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 15px;
      border: 0;
      border-left: 6px solid var(--red);
      border-radius: 10px;
      background: var(--red-soft);
      color: var(--red);
      text-align: left;
      font-size: clamp(18px, 2.5vw, 22px);
      font-weight: 800;
      line-height: 1.45;
    }
    .chapter-chevron { flex: 0 0 auto; transition: transform .16s ease; }
    .chapter-section.collapsed .chapter-chevron { transform: rotate(-90deg); }
    .chapter-section.collapsed .chapter-body { display: none; }
    .point {
      margin: 20px 0 10px;
      padding: 10px 13px;
      border-left: 5px solid var(--blue);
      border-radius: 8px;
      background: var(--primary-soft);
      color: var(--blue);
      font-size: 17px;
      line-height: 1.5;
    }
    .table-wrap { width: 100%; overflow-x: auto; margin: 16px 0; border: 1px solid var(--border); border-radius: 10px; }
    .table-hint { margin: -8px 0 12px !important; color: var(--muted); font-size: 13px; }
    .note-figure { margin: 18px 0; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: #fff; text-align: center; }
    .note-figure img { display: block; width: 100%; max-width: 920px; max-height: 560px; margin: 0 auto; object-fit: contain; }
    .note-figure figcaption { margin-top: 10px; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .note table { width: 100%; min-width: 620px; border-collapse: collapse; background: #fff; font-size: 14px; }
    .note th, .note td { padding: 10px 12px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    .note tr:last-child td { border-bottom: 0; }
    .note th:last-child, .note td:last-child { border-right: 0; }
    .note th { background: var(--primary-soft); color: var(--blue); font-weight: 750; }
    .search-status { min-height: 24px; margin: 8px 0 0; color: var(--muted); font-size: 13px; }
    .search-status:empty { display: none; }
    .nav-mask { display: none; }

    @media (max-width: 900px) {
      .course-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .study-layout { grid-template-columns: 210px minmax(0, 1fr); gap: 12px; }
    }

    @media (max-width: 700px) {
      .site-header { position: static; }
      .header-inner { min-height: 54px; flex-wrap: wrap; padding: 6px max(10px, env(safe-area-inset-right)) 6px max(10px, env(safe-area-inset-left)); }
      .header-brand { flex: 1 1 100%; }
      .brand-sub { display: none; }
      .module-nav { width: 100%; min-width: 0; margin-left: 0; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }
      .module-link { min-width: 0; padding: 4px 2px; font-size: 13px; line-height: 1.25; white-space: normal; text-align: center; overflow-wrap: anywhere; }
      main { padding: 18px max(10px, env(safe-area-inset-right)) max(42px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left)); }
      .course-grid { grid-template-columns: 1fr; gap: 10px; }
      .course-card { min-height: 76px; padding: 14px; border-radius: 14px; }
      .course-icon { width: 42px; height: 42px; flex-basis: 42px; }
      .study-toolbar { top: 0; grid-template-columns: 46px minmax(0, 1fr) auto; gap: 6px; margin-top: -8px; padding: 8px 0; }
      .mobile-nav-toggle { display: inline-flex; }
      .toolbar-actions .text-button { width: 46px; padding: 0; font-size: 0; }
      .toolbar-actions #back::before { content: "↩"; font-size: 21px; }
      .toolbar-actions #recall-toggle::before { content: "忆"; font-size: 17px; font-weight: 750; }
      .study-layout, .study.nav-collapsed .study-layout { display: block; }
      .chapter-nav {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 40;
        width: min(84vw, 330px);
        max-height: none;
        border: 0;
        border-radius: 0;
        transform: translateX(-105%);
        transition: transform .18s ease;
        box-shadow: 10px 0 28px rgba(16, 24, 40, .2);
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .study.mobile-nav-open .chapter-nav { transform: translateX(0); }
      .study.nav-collapsed .chapter-nav-label { display: inline; }
      .study.nav-collapsed .chapter-links { display: block; }
      .nav-mask {
        position: fixed;
        inset: 0;
        z-index: 35;
        display: block;
        opacity: 0;
        pointer-events: none;
        background: rgba(16, 24, 40, .46);
        transition: opacity .18s ease;
      }
      .study.mobile-nav-open .nav-mask { opacity: 1; pointer-events: auto; }
      .note { padding: 18px 13px; border-radius: 14px; }
      .note > h1 { font-size: 23px; }
      .chapter-section { scroll-margin-top: 122px; }
      .chapter-toggle { min-height: 54px; padding: 11px 12px; border-left-width: 5px; font-size: 18px; }
      .point { margin-top: 17px; padding: 9px 10px; font-size: 16px; }
      .note p { line-height: 1.85; }
      .table-wrap { margin-right: -3px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">跳到主要内容</a>
  <header class="site-header">
    <div class="header-inner">
      <a class="header-brand" href="./index.html" aria-label="返回学习平台首页">
        <div class="brand">邵阳备考 · 零基础讲义</div>
        <div class="brand-sub">从基本概念到例题，按章节系统学习</div>
      </a>
      <nav class="module-nav" aria-label="学习模块">
        <a class="module-link" href="./index.html">首页</a>
        <a class="module-link" aria-current="page" href="./notes.html">讲义</a>
        <a class="module-link"  href="./color-notes.html">三色笔记</a>
        <a class="module-link" href="./quiz.html">刷题</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section id="directory" aria-labelledby="directory-title">
      <div class="directory-head">
        <h1 id="directory-title">选择课程</h1>
        <p>适合零基础先学概念、原理和计算方法；学完一章，再到三色笔记记忆重点、到习题模块检验掌握程度。</p>
      </div>
      <div class="directory-search search-box">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input id="course-search" type="search" aria-label="搜索课程" placeholder="搜索课程名称" autocomplete="off">
        <button class="icon-button hidden" id="course-search-clear" type="button" aria-label="清空课程搜索">×</button>
      </div>
      <div class="course-grid" id="courses"></div>
      <div class="empty-result hidden" id="course-empty">没有找到匹配的课程</div>
      <p class="sr-only" id="course-status" role="status" aria-live="polite"></p>
    </section>

    <section class="study hidden" id="study" aria-label="课程内容">
      <div class="study-toolbar">
        <button class="icon-button mobile-nav-toggle" id="mobile-nav-toggle" type="button" aria-label="打开章节目录" aria-controls="chapter-nav" aria-expanded="false">☰</button>
        <div class="search-area">
          <div class="search-box">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input id="search" type="search" aria-label="搜索当前课程内容" placeholder="搜索当前课程" autocomplete="off">
            <button class="icon-button hidden" id="search-clear" type="button" aria-label="清空内容搜索">×</button>
          </div>
          <p class="search-status" id="search-status" role="status" aria-live="polite"></p>
        </div>
        <div class="toolbar-actions">
          <button class="text-button hidden" id="recall-toggle" type="button" aria-pressed="false">回忆模式</button>
          <button class="text-button" id="back" type="button" aria-label="返回选择课程">换课程</button>
        </div>
      </div>

      <div class="study-layout">
        <nav class="chapter-nav" id="chapter-nav" aria-label="章节目录" aria-hidden="false">
          <div class="chapter-nav-head">
            <span class="chapter-nav-label">章节目录</span>
            <button class="icon-button" id="nav-collapse" type="button" aria-label="收起章节目录" aria-expanded="true"><span aria-hidden="true">‹</span></button>
          </div>
          <div class="chapter-links" id="chapter-links"></div>
        </nav>
        <article class="note" id="content" tabindex="-1"></article>
      </div>
      <div class="nav-mask" id="nav-mask" aria-hidden="true"></div>
    </section>
  </main>

  <script>
    const items = [{"name":"Office软件操作","text":"# 📚 Office 与 WPS 办公软件操作\n\n使用说明：🔴红色 = 核心考点、判断改错点；🔵蓝色 = 得分关键词、公式与操作步骤；⚫️黑色 = 条件、版本差异、解释与例子。本讲义将 **Microsoft Office 与 WPS Office** 结合复习：概念、公式和文档结构以二者共性为主；菜单位置、文件兼容和特色功能必须结合题干指定软件及版本作答。\n\n零章：Microsoft Office 与 WPS 对照\n\n🔴【组件对应】：Microsoft Word ↔ WPS 文字，Microsoft Excel ↔ WPS 表格，Microsoft PowerPoint ↔ WPS 演示。三组软件分别承担文字处理、电子表格和演示文稿制作，核心对象与操作逻辑高度相似。\n\n🔴【通用文件格式】：两套软件都能处理常见的 `.docx/.xlsx/.pptx`，也可兼容多种旧格式和导出 PDF；但复杂域、宏、特殊字体、动画、图表、公式及第三方插件在跨软件打开时可能出现差异。\n\n🔵【跨软件操作答题法】：先写功能目标和对象 → 再写共性步骤 → 若题干指定软件，使用其组件名与菜单名 → 最后检查版式、公式结果、动画和打印效果。\n\n🔵【常用功能映射】：Word“邮件合并/审阅/样式”在 WPS 文字中有对应功能；Excel“数据透视表/函数/数据验证”在 WPS 表格中有对应功能；PowerPoint“母版/切换/动画”在 WPS 演示中有对应功能。具体入口随版本和界面模式变化。\n\n⚫️【版本差异】：Microsoft 365 与永久授权版 Office 的更新节奏不同；WPS 个人版、教育版、专业版及不同年份版本的云服务、宏、协作和高级功能支持也可能不同。考试不能把某一版本的默认值或按钮位置写成永恒结论。\n\n⚫️【兼容陷阱】：WPS 能打开 Office 格式不等于所有效果百分之百一致；Microsoft Office 能打开 WPS 保存的通用格式也不代表专有功能完全保留。跨平台提交前应在目标环境复核并按要求嵌入字体或导出 PDF。\n\n第一章：Word 文字处理软件\n\n考点1：文件、视图与编辑状态\n\n🔴【常见格式】：Word 2007 及以后默认格式为 `.docx`，Word 97—2003 常用 `.doc`；还可另存或导出为 `.pdf`、`.txt`、网页等。`.dotx` 是不含宏的模板，`.dotm` 是启用宏的模板。\n\n🔴【常用视图】：\n\n页面/打印布局视图：按打印页面显示页边距、页眉页脚等，适合排版；多数桌面版默认采用该视图。\n\n阅读模式：侧重阅读，部分编辑工具会收起；不同版本名称和布局略有差异。\n\nWeb 版式视图：按网页方式连续显示，内容随窗口宽度重排。\n\n大纲视图：按标题级别查看、折叠和调整长文档结构。\n\n草稿视图：侧重快速编辑正文，不按完整打印页面呈现页眉页脚等对象。\n\n⚫️【版本条件】：不能把“默认视图”“按钮位置”写成跨版本不变的结论；Word 2003、2010、2016、Microsoft 365 的界面和默认设置可能不同。\n\n🔴【插入与改写】：插入模式在插入点处加入字符；改写模式会覆盖插入点后的字符。`Insert` 是否直接切换改写模式取决于 Word 选项和键盘，较新版本可能需要先启用该功能。\n\n考点2：文本选择、删除与移动\n\n🔴【鼠标操作必须说明位置】：\n\n🔵正文文字区域：单击定位插入点；双击通常选中一个词；在同一段落内快速三击通常选中整个段落。\n\n🔵页面左侧选定栏（正文左边距）：单击选中所指行；双击选中相邻段落；三击选中整篇文档。\n\n🔵拖动可选择连续文本；按住 `Ctrl` 再选择可选取多个不连续区域；`Ctrl+A` 选中全文。\n\n⚫️【判断陷阱】：题目只写“单击、双击、三击”，却不说明鼠标位于正文还是选定栏，结论是不完整的。触摸设备、Web 版 Word 的手势也不宜直接套用桌面版鼠标规则。\n\n🔴【Backspace 与 Delete】：没有选中文本时，`Backspace` 通常删除插入点左侧字符，`Delete` 通常删除右侧字符；已经选中文本时，两者都可删除选中内容。\n\n🔴【移动与复制】：拖动选中文本通常是移动；按住 `Ctrl` 拖动通常是复制。`Ctrl+X/C/V` 分别是剪切、复制、粘贴。\n\n🔴【字号】：中文字号中一般“初号”大于“一号”，“二号”大于“四号”；以磅为单位时，磅值越大，字越大。不能混用两套序列直接比较而不看换算值。\n\n考点3：段落、页面与节\n\n🔴【段落格式】：对齐、缩进、段前/段后间距、行距属于段落格式；字体、字号、颜色、字符间距属于字符格式。\n\n🔵【行距辨析】：单倍、1.5 倍、多倍行距会随字体等因素计算；“固定值”按指定磅值设置，字号过大时可能出现字符被遮挡；“最小值”至少保证指定值，必要时会自动增大。\n\n🔴【分页符与分节符】：\n\n分页符只强制从下一页开始，不创建新的节。\n\n分节符把文档分成不同的节，可分别设置页边距、纸张方向、分栏、页码格式以及页眉页脚等。\n\n🔵【不同页眉页脚步骤】：插入分节符 → 进入后一节页眉/页脚 → 关闭“链接到前一节” → 分别编辑。仅插入分页符不能实现独立设置。\n\n⚫️【首页不同/奇偶页不同】：若只是同一节的首页或奇偶页需要不同页眉页脚，可启用相应选项，不一定要新增分节符。\n\n🔴【分栏】：分栏属于页面布局，既可应用于选中文本，也可应用于当前节或整篇文档。可设置栏宽、间距和分隔线。\n\n⚫️【数量陷阱】：可设栏数受 Word 版本、页面宽度、页边距和栏间距约束；“最多 11 栏”只可能是特定教材环境或默认页面参数下的口径，不应当作所有版本的绝对上限。\n\n考点4：图文混排与对象\n\n🔴【嵌入型与浮动对象】：嵌入型图片像一个字符一样随文本排列；其他环绕方式属于浮动对象，可相对页面、段落或字符定位。\n\n🔴【常见环绕方式】：四周型按对象外接矩形环绕；紧密型更贴近对象轮廓；衬于文字下方常用于背景；浮于文字上方可能遮挡文字。\n\n⚫️【默认方式有条件】：很多桌面版 Word 的“插入图片”默认采用嵌入型，但用户可在选项中修改默认环绕方式，粘贴来源也会影响结果。题干未指定环境时，应说“通常/默认设置下”。\n\n🔴【等比例绘制】：拖动矩形或椭圆时按住 `Shift` 通常约束为正方形或正圆；按住 `Ctrl` 常用于从中心绘制。不同工具、触控方式可能略有差异。\n\n🔴【组合条件】：通常只能组合浮动对象；嵌入型对象需先改为非嵌入型环绕。组合后可整体移动、缩放和设置格式。\n\n考点5：表格\n\n🔴【选择对象决定操作结果】：\n\n选中单元格内容后按 `Delete`，通常只清除内容，不删除单元格结构。\n\n使用“删除单元格/行/列/表格”命令，才会改变表格结构；选中整张表并执行“删除表格”可删除表格和内容。\n\n🔵【拆分与合并】：合并单元格是把相邻单元格合为一个；拆分单元格是把一个单元格分成多个；拆分表格会在指定行前把一张表分成两张。两张相邻表格能否重新连接，取决于它们之间的段落标记、环绕方式和结构，不能笼统写成“拆分后一定可直接合并”。\n\n🔴【表格计算】：Word 表格可使用 `SUM`、`AVERAGE` 等简单公式，例如 `=SUM(ABOVE)`；修改源数据后往往需要手动更新域（如选中后按 `F9`），不像 Excel 那样普遍实时重算。\n\n🔴【重复标题行】：跨页表格可将首行设置为标题行重复出现；若表格被手动分页或嵌套，效果可能受限。\n\n考点6：查找替换、样式与自动化\n\n🔴【查找与替换】：可查找/替换文本、格式、通配符和多种特殊字符。桌面版还可用特殊代码查找某些嵌入式图形；浮动形状及复杂对象的查找能力有限。因此“只能替换文字”或“绝对不能查找图形”都不严谨。\n\n🔴【格式刷】：单击格式刷通常使用一次；双击可连续应用；按 `Esc` 或再次单击退出。格式刷复制的是格式，不复制正文内容。\n\n🔴【样式】：样式是一组命名格式，可统一标题与正文外观，也是自动目录、大纲导航和长文档结构化的基础。手工把字放大加粗不等于设置了“标题样式”。\n\n🔴【目录】：先正确应用标题样式，再插入自动目录；标题或页码变化后需要更新目录，而不是手工逐项修改。\n\n🔴【修订与批注】：修订记录插入、删除和格式更改，审阅者可接受或拒绝；批注用于讨论和备注，通常不直接改正文。删除批注不等于接受修订。\n\n🔴【邮件合并】：由主文档、数据源和合并域构成，可批量生成格式相同而个别字段不同的信函、标签、证书等。\n\n🔴【宏】：宏是为自动执行一系列操作而记录或编写的命令序列，常以 VBA 过程实现；“宏是一段应用程序”过于笼统。宏功能本身不是病毒，但不可信文档中的宏可能携带恶意代码。\n\n第二章：Excel 电子表格软件\n\n考点1：工作簿、工作表与单元格\n\n🔴【常见格式】：Excel 2007 及以后默认 `.xlsx`；旧格式为 `.xls`；含 VBA 宏的工作簿常用 `.xlsm`；模板常用 `.xltx`。\n\n🔴【工作簿与工作表】：工作簿是文件，工作表是工作簿内的表页。新建工作簿默认工作表数量可由版本和用户设置决定：Excel 2013 及以后通常默认 1 张，较早版本常见 3 张，不能统一写成“永远 3 张”。\n\n⚫️【数量上限】：现代 Excel 可添加的工作表数量主要受可用内存限制；“最多 255 张”不是现代版本的固定上限。旧版设置中“新工作簿内工作表数”可选到 255，也不等于所有工作簿只能有 255 张。\n\n🔴【单元格地址】：`B3` 表示 B 列第 3 行。活动单元格是当前输入位置，通常只有一个；一个选区可以同时包含许多单元格。\n\n🔴【现代工作表规模】：Excel 2007 及以后每张工作表为 1,048,576 行、16,384 列，最后一列为 `XFD`；Excel 2003 及以前为 65,536 行、256 列。\n\n考点2：数据输入、显示与填充\n\n🔴【长编号】：身份证号、学号等不参与运算的编号应按文本存储，可先设为“文本”，或在输入时加英文单引号。Excel 对数值仅保证约 15 位有效数字，直接当数值输入可能导致末位变为 0。\n\n🔴【`######`】：最常见原因是列宽不足；日期或时间结果为负数等情况下也可能显示一串 `#`。因此应先结合单元格内容和格式判断，不能只认定为列宽问题。\n\n🔴【单元格内换行】：Windows 桌面版通常用 `Alt+Enter`；还可启用“自动换行”。\n\n🔴【自动填充】：可复制常量和公式，也可扩展日期、星期、等差序列及自定义序列。公式被填充时，引用会按相对/绝对规则变化。“不能填充公式”是错误说法。\n\n⚫️【自动识别有环境条件】：输入 `1/2` 可能按当前区域设置识别为日期，也可能按格式或区域设置产生不同结果；要保留字符串应设为文本。公式必须以 `=` 开头，`=2/5` 才执行除法。\n\n考点3：引用、运算符与错误值\n\n🔴【相对引用】：`A1`，复制公式时行列按相对位置改变。\n\n🔴【绝对引用】：`$A$1`，复制公式时行列都锁定。\n\n🔴【混合引用】：`$A1` 锁列不锁行；`A$1` 锁行不锁列。编辑公式时可用 `F4` 在引用形式间切换（部分笔记本需配合 `Fn`）。\n\n🔴【跨表引用】：`Sheet2!$A$4` 表示 Sheet2 中 A4 的绝对引用；工作表名含空格时需写成 `'期末成绩'!A1`。\n\n🔴【运算优先级】：引用运算 → 负号/百分号/幂 → 乘除 → 加减 → 连接 `&` → 比较；有疑问时用括号明确顺序。\n\n🔴【常见错误值】：`#DIV/0!` 除数为 0 或空；`#VALUE!` 数据类型不合适；`#NAME?` 名称或函数名无法识别；`#REF!` 引用无效；`#N/A` 没有可用值；`#SPILL!` 是动态数组结果区域被占用等（新版 Excel）。\n\n考点4：函数与公式\n\n🔴【公式规则】：公式以 `=` 开头；函数由函数名、括号和参数组成。文本条件通常需要英文双引号。\n\n🔵【高频函数】：\n\n`SUM(B2:B5)` 求和；`AVERAGE(B2:B5)` 求算术平均；`MAX/MIN` 求极值；`COUNT` 统计数值单元格个数；`COUNTA` 统计非空单元格个数。\n\n`COUNTIF(B2:B8,\">=60\")` 单条件计数；`SUMIF` 单条件求和；`COUNTIFS/SUMIFS` 处理多条件。\n\n`IF(B2>=60,\"及格\",\"不及格\")` 条件判断；新版可使用 `IFS`，但旧版本不支持。\n\n`ROUND(A1,2)` 四舍五入保留两位小数；`LEFT/RIGHT/MID` 提取文本；`LEN` 统计字符数；`TODAY()` 返回当前日期。\n\n⚫️【范围边界】：`A1:A4` 包含 A1、A2、A3、A4；冒号表示连续区域，逗号在多数环境中分隔参数（受区域设置影响，部分环境使用分号）。\n\n考点5：排序、筛选、汇总与透视表\n\n🔴【排序】：可按一个或多个关键字排序。排序连续数据区域时应让相关列一起扩展选择，否则可能破坏记录之间的对应关系。\n\n🔴【筛选】：筛选通常隐藏不符合条件的整行，不删除记录；清除筛选条件可恢复显示。高级筛选可处理较复杂的条件区域并可将结果复制到别处。\n\n🔴【分类汇总】：使用传统“分类汇总”命令前，应先按分类字段排序，使同类记录相邻；“全部删除”可移除分类汇总。是否能撤销取决于后续操作和应用状态，不能写成“删除后绝对不能撤销”。\n\n🔴【数据透视表】：用于对大量明细按字段分组、汇总、交叉分析；源数据变化后通常需要刷新数据透视表，不能与普通图表“自动实时更新”混为一谈。\n\n🔴【数据有效性/数据验证】：可限制允许输入的数据类型或范围、创建下拉列表并设置出错警告；它不能代替密码保护。\n\n考点6：图表、打印与保护\n\n🔴【图表选择】：柱形/条形图适合比较类别；折线图适合展示随时间变化的趋势；饼图适合少量类别构成比例，且通常只表达一个数据系列；散点图适合研究两个数值变量关系。\n\n⚫️【图表联动】：普通图表引用的源数据变化后通常会更新；若新增数据不在原引用区域内，图表未必自动扩展。把数据区域转换为“表格”可提高自动扩展能力。\n\n🔴【冻结窗格】：用于滚动时保持标题行/列可见；不是锁定编辑。保护工作表用于限制对锁定单元格等内容的修改，但不等同于强加密。\n\n🔴【打印】：打印区域、分页、页边距、缩放和重复打印标题行是高频设置；“将工作表调整为一页”可能使内容过小，应区分“1 页宽”和“1 页高”。\n\n第三章：PowerPoint 演示文稿软件\n\n考点1：文件、页面与视图\n\n🔴【常见格式】：`.pptx` 为普通演示文稿，`.ppt` 为旧格式，`.ppsx` 打开时通常直接进入放映，`.potx` 为模板；含宏文件分别常用 `.pptm/.ppsm/.potm`。\n\n🔴【演示文稿与幻灯片】：演示文稿是文件，幻灯片是其中的一页。单页可复制到新演示文稿，也可导出为图片或 PDF 页面，因此“幻灯片绝对不能单独保存”不严谨。\n\n🔴【常见视图】：普通视图用于编辑；幻灯片浏览视图适合整体排序；备注页视图编辑讲者备注；阅读视图在窗口中播放。不同版本是否单列“大纲视图”有所差异，较新版本常在普通视图的大纲窗格中使用。\n\n考点2：编辑与放映\n\n🔴【`Ctrl+A` 有对象范围】：焦点在幻灯片缩略图窗格时选中所有幻灯片；焦点在当前页编辑区时选中当前页的全部对象；焦点在文本框内时选中该文本框文字。不能只写“Ctrl+A = 全选幻灯片”。\n\n🔴【放映快捷键】：Windows 桌面版通常 `F5` 从头放映，`Shift+F5` 从当前幻灯片放映，`Esc` 退出。笔记本可能需要配合 `Fn`，网页版/移动版快捷键可能不同。\n\n🔴【复制幻灯片】：可用复制粘贴或“复制幻灯片”；在缩略图/浏览视图中按住 `Ctrl` 拖动通常可复制，单纯拖动通常是移动。\n\n🔴【隐藏幻灯片】：放映时跳过该页，但页面仍保留在文件中；并非删除。\n\n考点3：主题、母版与版式\n\n🔴【主题】：统一定义颜色、字体、效果和背景样式；模板是在主题基础上还可包含版式、占位符和示例内容的文件。\n\n🔴【幻灯片母版】：控制一组版式的共同格式和占位符。母版不是 `.potx` 文件；`.potx` 是演示文稿模板的扩展名。\n\n⚫️【母版修改范围】：修改母版通常影响使用该母版/版式且未被单页覆盖的幻灯片；单页手工格式、被删除的占位符或多母版演示文稿可能不会完全同步。因此“母版一改，所有对象无条件变化”是错误说法。\n\n🔴【多主题/多母版】：一个演示文稿可以包含多个幻灯片母版，从而让不同部分使用不同主题或版式。\n\n考点4：动画、切换与交互\n\n🔴【动画与切换】：动画作用于一张幻灯片内的对象，常见类别为进入、强调、退出、动作路径；切换作用于幻灯片之间。二者对象不同，不能混淆。\n\n🔵【动画触发方式】：单击时、与上一动画同时、上一动画之后；还可设置持续时间、延迟、重复和触发器。动画窗格用于调整顺序和参数。\n\n🔴【超链接】：超链接可附着在文字、图片、形状等对象上；目标可以是网页、文件、电子邮件地址、本演示文稿中的指定幻灯片，也可在支持的桌面版本中定位到另一演示文稿中的特定幻灯片。原稿“不能链接到某个对象/另一演示文稿某一页”表述错误。\n\n🔴【动作按钮】：可设置跳转、运行程序/宏、播放声音等动作；“鼠标单击”和“鼠标移过”是不同触发方式。\n\n考点5：媒体、打包与演示规范\n\n🔴【音视频】：现代 PowerPoint 可插入音频和视频，并设置自动播放、单击播放、跨幻灯片播放、循环等；可用格式与编解码器、Office 版本和操作系统有关。\n\n🔴【字体与链接资源】：把文件交给另一台电脑时，应检查特殊字体、外部链接的视频/音频和文件路径；较新版本通常会嵌入部分媒体，但外部链接资源仍可能丢失。可使用“打包演示文稿”等功能降低缺失风险。\n\n🔴【演示者视图】：演讲者可查看当前页、下一页、备注和计时，观众只看到放映画面；需要正确配置多显示器。\n\n口诀速记\n\n“鼠标点击看位置，删除操作看对象；分页只换页，分节才分格式；表格 Delete 清内容，删表要用结构命令；Excel 默认表数看版本，填充可以复制公式；井号先查列宽，也查负日期时间；相对 A1 绝对 `$A$1`，分类汇总先排序；PPT 全选先看焦点，F5 从头、Shift+F5 从当前；主题管风格，母版管版式，动画管对象、切换管页面。”\n"},{"name":"信息技术与教学论","text":"# 📚 信息科技与教学论\n\n使用说明：🔴红色 = 课程标准、核心考点与判断改错点；🔵蓝色 = 简答题得分词、设计步骤与评价术语；⚫️黑色 = 适用条件、案例和不同教材口径。本章同时涉及《义务教育信息科技课程标准（2022年版）》和《普通高中信息技术课程标准（2017年版2020年修订）》，答题必须先辨明学段与课标版本。\n\n第一章：课程标准与课程性质\n\n考点1：学段、课程名称与现行依据\n\n🔴【义务教育】：2022 年秋季起执行《义务教育信息科技课程标准（2022年版）》，课程名称为“信息科技”，并从综合实践活动中独立设置。\n\n🔴【普通高中】：现行国家课标通常指《普通高中信息技术课程标准（2017年版2020年修订）》，课程名称为“信息技术”。\n\n⚫️【口径陷阱】：旧教材、地方教材和不同学段可能使用“信息技术课程五大性质”等归纳。不能把“基础性、综合性、实践性、层次性、工具性”写成所有现行国家课标唯一固定表述，更不能断言“工具性是唯一的本质属性”。\n\n考点2：义务教育信息科技课程性质与理念\n\n🔴【课程性质】：义务教育信息科技课程是现代科学技术领域的重要组成部分，主要研究以数字形式表达的信息及其应用中的科学原理、思维方法、处理过程和工程实现；课程具有基础性、实践性和综合性。\n\n🔵【课程理念得分词】：反映数字时代正确育人方向；构建逻辑关联的课程结构；遴选科学原理和实践应用并重的课程内容；倡导真实性学习；强化素养导向的多元评价。\n\n⚫️【判断陷阱】：信息科技课程不等于软件操作培训。操作技能是载体，还要理解数据、算法、网络、系统等原理，发展计算思维、创新能力和信息社会责任。\n\n考点3：核心素养\n\n🔴【四项核心素养】：信息意识、计算思维、数字化学习与创新、信息社会责任。四者相互支持、相互渗透，共同促进数字素养与技能提升。\n\n🔵信息意识：对信息的敏感度和信息价值的判断力；能评估来源、可靠性和时效性，主动利用信息解决问题。\n\n🔵计算思维：运用计算机科学领域的思想方法，通过抽象、分解、建模、算法设计、自动化等活动形成问题解决方案。\n\n🔵数字化学习与创新：合理选择数字工具和资源，管理学习过程，协同学习并创造性解决问题、形成作品。\n\n🔵信息社会责任：遵守法律规范与伦理道德，保护隐私和安全，尊重知识产权，负责任地发布和使用信息。\n\n⚫️【判断陷阱】：计算思维不等于“只会编程”；数字化学习不等于“用了电脑上课”；信息意识不等于信息越多越好。\n\n第二章：学习理论与教学观\n\n考点4：主要学习理论\n\n🔴【行为主义】：关注刺激—反应、强化、练习和可观察行为；适合基础操作训练，但若只模仿步骤，可能忽视理解与迁移。\n\n🔴【认知主义】：关注信息加工、知识结构、先备知识和认知策略；教学可运用先行组织者、概念图、分块与精加工。\n\n🔴【建构主义】：学习者在一定情境中借助协作和必要帮助，利用学习资源主动建构意义；强调情境、协作、会话和意义建构。\n\n⚫️【教师角色】：强调学生主体不等于教师退出。教师仍需设计环境、提供支架、组织反馈并纠正关键误解。\n\n🔴【最近发展区与支架】：任务应略高于学生独立完成水平，在帮助下可完成；随着能力提升逐步撤去支架。\n\n第三章：教学设计\n\n考点5：教学设计基本流程\n\n🔵【常用答题骨架】：分析学习需要与课标 → 分析学习者 → 分析内容和任务 → 制定素养导向目标 → 选择策略、资源与环境 → 设计活动和评价 → 实施、反馈与修订。\n\n⚫️【系统观】：目标、活动和评价应一致。若目标要求“设计并实现算法”，评价却只考术语记忆，就没有实现教—学—评一致性。\n\n考点6：学习者分析\n\n🔴【分析维度】：起点知识与技能、认知发展、学习动机与兴趣、学习风格和个体差异、数字设备经验、特殊学习需要。\n\n🔵【起点能力确认】：可用访谈、问卷、前测、作品分析、课堂观察等，不应只凭教师主观猜测。\n\n考点7：教学目标\n\n🔴【现行导向】：目标应指向核心素养，并转化为可观察、可评价的学习表现。传统“三维目标”可用于理解知识技能、过程方法、情感价值等维度，但在现行课标答题中不应取代核心素养导向。\n\n🔴【ABCD 表述】：A 学习者，B 可观察行为，C 条件，D 达成程度。不是每句话都必须机械写齐四项，但行为主体、表现和标准应尽量清楚。\n\n🔵【行为动词】：识别、描述、比较、解释、设计、调试、评价、创作等；“了解、掌握、培养、提高”若无表现证据，难以直接测量。\n\n⚫️【示例】：在给定的校园数据表中（C），学生（A）能使用合适图表呈现趋势并解释选择理由（B），关键字段和结论完整（D）。\n\n考点8：重点与难点\n\n🔴【教学重点】：由课标要求、内容结构和育人价值决定，是本课必须掌握的核心内容。\n\n🔴【教学难点】：由内容特性和具体学生的认知基础共同决定，是理解或操作障碍所在，具有相对性和动态性。\n\n⚫️【判断陷阱】：重点不一定就是难点；不能只按教师觉得难来确定，也不能把每个环节都列为重点。\n\n第四章：教学方法与学习方式\n\n考点9：任务驱动教学\n\n🔴【定义】：把知识与技能融入具有意义的任务，学生在分析、实施和评价任务的过程中学习。\n\n🔵【常用流程】：创设情境 → 呈现并明确任务 → 分析任务、形成方案 → 自主/协作探究与实施 → 展示交流 → 评价反思与迁移。\n\n🔵【设计得分词】：真实性、目标一致、难度适切、层次递进、开放选择、成果可评价、安全可实施。\n\n⚫️【“核心”口径】：不同教材对“任务设计是核心”“怎样驱动是关键”等表述可能不同。简答题应写清任务如何承载目标、学生如何主动解决问题、教师如何提供支架，而不是死背一句口号。\n\n⚫️【常见失误】：把任务写成“照着教师演示操作”；情境热闹但与目标无关；只评价作品外观；任务过大却没有子任务和支架。\n\n考点10：项目式学习与问题解决\n\n🔴【项目式学习】：围绕真实、复杂且可探究的问题，持续开展设计、制作、迭代与展示，形成公开成果；项目比单一课堂任务更综合、周期更长。\n\n🔵【流程骨架】：提出驱动性问题 → 规划与分工 → 调研/设计 → 制作与测试 → 迭代改进 → 展示答辩 → 反思评价。\n\n🔴【探究式学习】：学生经历提出问题、作出假设、收集与分析证据、形成解释、交流评价等过程；教师需控制探究开放度并提供必要支架。\n\n考点11：讲授、演示、练习与讨论\n\n🔴【讲授法】：适合系统解释概念、原理和背景，效率高；应结合提问、案例、可视化和练习，避免长时间单向灌输。\n\n🔴【演示—练习】：教师示范关键操作并口述思路，学生模仿、独立练习和迁移。演示前应确认屏幕可见，步骤应分段，并预留学生操作时间。\n\n🔴【讨论法】：适合有多种观点、需要比较论证的问题。低年级或新知识阶段并非“绝对不能用”，但问题难度、语言要求、先备知识和组织方式要适合学生。\n\n考点12：合作学习\n\n🔴【基本特征】：共同目标、积极相互依赖、个体责任、面对面促进性互动、合作技能与小组反思。\n\n🔵【组织要点】：异质分组、角色明确、成果与个人责任并重、过程巡视、及时反馈。4～6 人是常见建议，不是所有任务的硬性人数标准。\n\n⚫️【防止“搭便车”】：设置个人可追踪任务、随机汇报、同伴互评与个人反思；仅把学生围坐在一起不等于合作学习。\n\n考点13：WebQuest、微课与翻转课堂\n\n🔴【WebQuest】：以网络资源为主要信息来源的探究活动。经典结构常包括导言、任务、过程、资源、评价和结论；不同模板可能把资源并入过程或增加教师页，不能脱离教材断言只有一种绝对结构。\n\n🔴【微课】：围绕相对聚焦的学习目标，以短小数字化学习资源为核心并配套学习活动。视频是常见载体，但“微课=一个短视频”不完整。\n\n⚫️【时长口径】：5～10 分钟是常见经验值，不是所有学段、内容和国家标准的法定上限；应以目标聚焦、认知负荷适当和学习效果为准。\n\n🔴【翻转课堂】：把部分直接讲授或知识获取前移到课前，课堂时间更多用于问题解决、协作和个别化指导。它不是简单地“课前看视频、课上做作业”，也不意味着教师作用减弱。\n\n第五章：教学评价\n\n考点14：按评价时机和参照分类\n\n🔴【诊断性评价】：教学前或新单元开始时了解起点和困难，如前测、访谈、先备作品分析。\n\n🔴【形成性评价】：教学过程中收集证据、反馈并改进学习，如观察、提问、调试记录、阶段作品和学习单。\n\n🔴【总结性评价】：阶段或课程结束后判断目标达成，如期末考试、综合作品与答辩。\n\n🔴【目标/标准参照评价】：对照预定标准判断达成程度；【常模参照评价】：与群体表现比较；【个体内差异评价】：与学习者自己过去的表现比较。\n\n⚫️【判断陷阱】：一次测验属于哪类，不只看形式，还看使用目的。相同测验用于课前诊断、课中反馈或期末认定，性质可能不同。\n\n考点15：多元评价与评价工具\n\n🔴【评价原则】：素养导向、目标一致、过程与结果结合、定性与定量结合、主体多元、关注差异、以评促学。\n\n🔵【信息科技常用证据】：纸笔测验、上机操作、项目作品、程序运行结果、设计文档、过程日志、答辩、档案袋。不能断言“纸笔+上机”是所有情境唯一最合适的总结性评价。\n\n🔴【量规 Rubric】：把评价维度和不同水平的表现描述清楚。优秀量规应对应目标、维度可区分、描述可观察，避免只用“好/一般/差”。\n\n🔴【作品评价】：既看功能正确性、算法/技术合理性，也看创意、规范、安全责任、协作过程和表达；评价维度应与任务目标匹配。\n\n考点16：测验质量指标\n\n🔴【信度】：测量结果的一致性和稳定性；【效度】：是否真正测到了预期目标。信度是效度的必要但非充分条件。\n\n🔴【难度】：题目通过率越高，通常表示题目越容易（采用不同难度指数定义时要看公式）；【区分度】：区分不同水平学习者的能力。\n\n🔵【客观题命制】：题干清楚、只有一个最佳答案、干扰项有迷惑性且同质、避免无意线索和双重否定；判断题避免使用“永远、全部、绝不”等无条件绝对词。\n\n第六章：课堂实施与案例分析\n\n考点17：信息科技课堂组织\n\n🔵【上机课流程】：设备与账号检查 → 明确目标和安全规则 → 分段示范/任务发布 → 学生实践、教师巡视 → 保存与提交 → 展示评价 → 退出账号和整理设备。\n\n🔴【故障应对】：先保证人身和数据安全，再定位电源、连接、账号、网络、软件、文件路径等；准备离线资源、备用设备或同伴协作方案。不能把技术故障时间全部变成无目标自由活动。\n\n🔴【差异化教学】：提供基础任务、进阶任务和挑战任务；给予步骤卡、半成品、示例数据等支架，同时为高水平学生提供开放拓展。\n\n考点18：案例分析答题框架\n\n🔵【先判断】：指出做法是否符合素养导向、学生主体、目标一致和安全伦理。\n\n🔵【再依据】：结合课标、学习理论、教学方法或评价原则解释原因。\n\n🔵【后改进】：从目标、任务、支架、互动、资源、评价和课堂管理提出可执行措施。\n\n🔵【补证据】：说明如何观察改进是否有效，如作品质量、调试过程、学生解释、量规得分或反思记录。\n\n⚫️【高频问题】：教师包办操作、任务脱离真实问题、只重结果不看过程、评价主体单一、忽视版权隐私、目标不可测、合作学习无个人责任。\n\n口诀速记\n\n“义教信息科技二二课标，高中信息技术一七二〇修订；核心素养信计数社；目标、活动、评价要一致；任务真实有梯度，项目规划做测改；讨论不是任何阶段都禁用，合作人数不是硬规定；诊断看起点，形成促改进，总结判达成；课前先分析，课中给支架，课后用证据评价。”\n"},{"name":"多媒体技术","text":"# 📚 多媒体技术\n\n使用说明：🔴红色 = 核心考点与判断改错点；🔵蓝色 = 计算公式、步骤与区分词；⚫️黑色 = 条件、版本差异、解释和例子。\n\n第一章：多媒体基础\n\n考点1：概念与主要特征\n\n🔴【多媒体技术】：以计算机为核心，对文本、图形、图像、声音、动画、视频等多种媒体信息进行数字化获取、处理、存储、集成、控制和交互呈现的技术。\n\n🔴【高频特征】：集成性、交互性、数字化是多数教材的核心表述；有的教材还强调实时性。题目问“三大特征”或“本质特征”时必须依据所用教材口径和选项判断，不能同时断言“交互性”和“数字化”都是唯一的本质特征。\n\n🔵集成性：对多种媒体统一组织与协同处理。\n\n🔵交互性：用户能主动选择、控制信息呈现并得到反馈。\n\n🔵数字化：各种媒体在计算机中以数字形式表示和处理。\n\n🔵实时性：音视频播放或交互系统需在规定时间内连续响应。\n\n⚫️【超文本与超媒体】：超文本以链接组织文本节点；节点扩展到图像、声音、视频等多种媒体时称为超媒体。超链接是实现非线性组织的一种机制。\n\n考点2：媒体分类\n\n🔴【感觉媒体】：直接作用于感官的信息形态，如声音、图像、文字。\n\n🔴【表示媒体】：为交换和处理而规定的编码形式，如 ASCII、JPEG 编码。\n\n🔴【表现媒体】：输入或输出信息的物理设备，如键盘、摄像头、显示器、扬声器。\n\n🔴【存储媒体】：保存信息的介质，如磁盘、光盘、闪存。\n\n🔴【传输媒体】：承载信号传输的介质，如双绞线、光纤、无线电波。\n\n第二章：图形与图像\n\n考点3：位图与矢量图\n\n🔴【位图】：以像素为基本单元；适合照片和色彩层次丰富的图像；按像素放大通常出现锯齿或模糊。常见格式有 BMP、JPEG、PNG、GIF、TIFF，PSD 是 Photoshop 常用源文件。\n\n🔴【矢量图】：以点、线、曲线、形状及其属性描述；适合标志、图标、示意图；在重新计算的条件下缩放通常不失真。常见格式有 SVG、AI、EPS、WMF。\n\n⚫️【判断条件】：矢量文件不一定总比位图小，复杂路径也会很大；SWF 是可包含矢量图、位图、音频和脚本的容器/发布格式，不能简单等同于“纯矢量图格式”；Office 剪贴画的实际类型取决于资源文件，不能一概认定都是 WMF。\n\n考点4：常见图像格式\n\n🔴【BMP】：常见位图格式；可采用不压缩或无损压缩，文件通常较大，但不能一概写成“BMP 永远无压缩”。\n\n🔴【JPEG/JPG】：常用于照片，通常采用有损压缩；不支持常规透明通道，不适合反复编辑保存文字线稿。\n\n🔴【GIF】：索引色，单帧最多 256 色；支持动画和 1 位透明（透明/不透明），不支持 PNG 那样的完整半透明 alpha 通道；LZW 压缩为无损压缩。\n\n🔴【PNG】：无损压缩，支持透明和 alpha 半透明，适合网页图标、截图和线条图；标准 PNG 本身不等同于 GIF 动画。\n\n🔴【PSD】：可保留图层、蒙版、通道等编辑信息；导出为 JPEG 等格式通常会失去可编辑图层结构。\n\n⚫️【压缩陷阱】：格式转换后的大小和质量还取决于尺寸、颜色、压缩参数及原始内容，不能只凭扩展名断言一定缩小多少。“JPEG2000 比 JPEG 高 30%”不是通用固定值，应删除。\n\n考点5：分辨率、颜色与容量\n\n🔴【像素尺寸】：如 1920×1080，表示横向和纵向像素数；打印分辨率常用 PPI/DPI 表述，必须结合物理尺寸理解。仅写“分辨率”时要看题目是在问像素尺寸、显示分辨率还是打印精度。\n\n🔴【颜色深度】：每像素使用的二进制位数。若不考虑调色板和保留色，n 位最多表示 `2^n` 种状态。24 位 RGB 通常为 R、G、B 各 8 位，可表示约 1677 万种颜色。\n\n🔴【RGB】：加色模型；常见 8 位通道范围为 0～255。`(0,0,0)` 为黑，`(255,255,255)` 为白。印刷常用 CMYK 减色模型，不能和 RGB 通道直接混淆。\n\n🔵【未压缩位图容量】：`字节数 = 宽度像素 × 高度像素 × 每像素位数 ÷ 8`。\n\n⚫️【公式适用范围】：该式估算未压缩像素数据，不含文件头、调色板、元数据、行填充和压缩影响。题目说“RGB 每通道 8 bit”时，每像素位数是 `3×8=24 bit`，不能再额外重复乘色彩数。\n\n考点6：OCR 与图像采集\n\n🔴【OCR】：把图像中的印刷或手写文字识别为可检索、可编辑字符。典型流程包括图像采集、预处理、版面分析/字符识别、校对与导出。\n\n⚫️【条件辨析】：倾斜校正、去噪并非每张图片都必做，但可提高复杂扫描件识别率；支持哪些输入格式由 OCR 软件决定，不能用“PSD 一定不能识别”作跨软件结论；识别后的文件也不必然比原图小，若保留原图、版式和字体，文件可能更大。\n\n第三章：音频技术\n\n考点7：音频数字化\n\n🔴【基本过程】：采样 → 量化 → 编码。\n\n🔵采样频率：每秒采样次数；在理想带限条件下，为无失真重建，采样频率应至少大于最高频率的 2 倍（奈奎斯特采样定理）。\n\n🔵量化位数：每个样本的二进制位数，位数越高通常量化级数越多、动态范围越大，数据量也越大。\n\n🔵声道数：单声道为 1，立体声通常为 2。\n\n考点8：音频格式与容量\n\n🔴【WAV】：容器格式，可保存未压缩 PCM，也可装载压缩音频；不能简单写成“WAV 一定无损且文件大”。\n\n🔴【MP3/AAC/WMA】：常见有损编码格式，目标是以感知冗余换取较小数据量；具体音质取决于码率、编码器和源文件。\n\n🔴【FLAC/ALAC】：无损压缩，解码后可还原原 PCM 数据。\n\n🔴【MIDI】：记录音符、时值、力度、音色控制等演奏事件，不记录麦克风采集的人声波形。它可驱动音源播放人声采样音色，但 MIDI 文件本身并不等于人声音频录音。\n\n🔵【未压缩 PCM 容量】：`字节数 = 采样频率 × 量化位数 × 声道数 × 时间(秒) ÷ 8`。\n\n⚫️【CD 常见口径】：音频 CD 的 PCM 参数通常为 44.1 kHz、16 bit、双声道。5 分钟未压缩数据约为 `44100×16×2×300÷8 ≈ 52.92 MB（十进制）`，若按 `1024²` 换算约 50.47 MiB。选择题要看 MB 的换算口径。\n\n⚫️【压缩音频容量】：已知码率时用 `文件大小 ≈ 码率 × 时间 ÷ 8`；MP3 等压缩文件不能再直接套用 PCM 采样公式。\n\n第四章：视频与动画\n\n考点9：视频数字化与容量\n\n🔴【视频数字化】：对连续画面进行时间采样和空间采样，再量化、编码；实际系统通常还要进行压缩、封装、存储或传输。把流程写成“采样→A/D→压缩→存储→解压→D/A”混合了采集端与播放端，不是规范的单向数字化步骤。\n\n🔵【未压缩视频容量】：`字节数 = 宽×高×每像素位数×每秒帧数×时间÷8`。\n\n🔵【压缩视频容量】：`文件大小 ≈ 总码率（视频码率+音频码率）×时间÷8`。\n\n⚫️【制式口径】：传统 PAL 常按 25 帧/秒考查；传统 NTSC 实际常为约 29.97 帧/秒，基础教材可能近似写 30 帧/秒。数字视频也可能使用 24、30、50、60 等其他帧率。\n\n考点10：容器、编码与格式\n\n🔴【容器不等于编码】：MP4、AVI、MOV、MKV、WebM 等多为封装容器；H.264/AVC、H.265/HEVC、AV1、VP9 等是视频编码。扩展名相同的文件可能采用不同编码，能否播放取决于播放器是否支持相应解码器。\n\n🔴【流媒体】：强调边下载边播放和连续传输；FLV 曾广泛用于网页视频，但已不是现代网页视频的唯一或“必然主流”格式。现代平台常使用 MP4/WebM 及 HLS、DASH 等传输方案。\n\n⚫️【动画与视频】：GIF、APNG、SWF 可承载动画，但不能因此统称为普通视频格式；`.exe` 是可执行文件，不是视频容器。\n\n第五章：Photoshop 与图像处理\n\n考点11：图层、选区与蒙版\n\n🔴【图层】：分层组织内容便于独立编辑；PSD/PSB 常用于保留图层结构。背景图层在传统 Photoshop 中默认锁定且不含透明区域，但可解锁/转换为普通图层后移动、调透明度或应用更多效果，不能写成“背景图层永远不能改变透明度”。\n\n🔴【选区工具】：魔棒按颜色相似度选区；容差越大通常选取的颜色范围越宽。套索适合自由选区，多边形套索适合直线边界，磁性套索依据边缘对比自动吸附。\n\n🔴【仿制图章】：Windows 下通常按 `Alt` 单击设取样点，再涂抹复制像素；是否能在当前图层、所有图层或调整图层上取样取决于“样本”设置和目标图层类型。\n\n🔴【减淡/加深/海绵】：减淡使局部变亮，加深使局部变暗；海绵工具可按模式提高或降低饱和度，原稿“只能减少饱和度”错误。\n\n🔴【Alpha 通道】：选择范围保存为通道时，默认白色通常代表选中、黑色代表未选、灰色代表部分选中；若反转通道或改变显示选项，视觉表现可不同。\n\n🔴【图层蒙版】：默认白显、黑隐、灰色部分显示；它是非破坏性控制可见性的常用方法，不直接删除原像素。\n\n⚫️【版本条件】：现代 Photoshop 具有时间轴，可处理视频帧和帧动画，也可导出 GIF；“Photoshop 绝对不能播放动画/视频”只适用于某些旧版教材环境。\n\n考点12：常用快捷键\n\n🔵Windows 桌面版常用：`Ctrl+D` 取消选择，`Ctrl+Shift+I` 反选，`Ctrl+U` 色相/饱和度，`D` 恢复默认前景/背景色，`X` 交换前景/背景色，`Alt+Delete` 填充前景色，`Ctrl+Delete` 填充背景色。\n\n⚫️【快捷键条件】：macOS 使用 `Command/Option` 等按键；快捷键可能被系统、工作区或用户自定义修改。题干指定版本/平台时以题干为准。\n\n第六章：Flash/Animate 动画基础\n\n考点13：帧、元件和补间\n\n🔴【历史背景】：Adobe Flash Player 已停止支持，但教师招聘旧教材仍会考查 Flash 创作概念；现行 Adobe Animate 的界面和术语可能与 Flash 旧版不同。\n\n🔴【帧操作】：传统 Flash 中 `F5` 插入普通帧，`F6` 插入关键帧，`F7` 插入空白关键帧。普通帧延续前一关键帧状态；关键帧定义内容变化节点。\n\n🔴【元件类型】：图形、影片剪辑、按钮。影片剪辑有独立时间轴；图形元件时间轴通常受主时间轴控制；按钮经典四帧为“弹起、指针经过、按下、点击”，其中“点击”帧定义感应区域，不是第四个可见播放状态。\n\n🔴【逐帧动画】：关键画面逐帧制作，控制细但数据量和工作量通常较大。\n\n🔴【传统补间】：传统动作补间通常作用于元件实例、组或文本等可补间对象；形状补间作用于未组合的矢量形状。元件实例若要做形状补间，需要先分离为可编辑形状。\n\n🔴【引导层与遮罩层】：传统引导层规定运动路径，发布时引导线通常不显示；遮罩层形状控制被遮罩层的可见区域。\n\n⚫️【帧频条件】：旧版 Flash 新文档常见默认 12 fps，Animate 新版默认值可能不同；允许范围也随版本变化。题目未指定软件版本时，不应把“默认 12、最大 120”作为永恒结论。\n\n考点14：源文件与发布文件\n\n🔴【FLA】：可编辑源文件；【SWF】：传统发布文件，可包含矢量、位图、音频、动画和脚本。GIF 是动画图像，AVI/MOV/MP4 是视频容器；把 GIF、SWF 全列成“视频格式”不严谨。\n\n口诀速记\n\n“多媒体口径看教材，集成、交互、数字化；位图像素，矢量路径，复杂矢量未必小；JPEG 有损，GIF 256 色，PNG 无损带半透；音频采样量化编码，PCM 算采样参数，压缩音频算码率；视频容器不等于编码，压缩容量看总码率；PS 背景可转普通层，海绵既可增也可减；Flash 题先看版本，动作补间与形状补间对象不同。”\n"},{"name":"操作系统原理","text":"# 📚 操作系统原理\n\n使用说明：🔴红色= 一级考点 / 核心术语 / 判断改错点（背下来）🔵蓝色= 简答题踩分关键词 / 调度算法特征 / 概念区分（考试时写上去就是分）⚫️黑色= 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n第一章：操作系统概述\n考点1：操作系统的定义与地位\n🔴【定义】：操作系统（OS）是管理计算机软硬件资源、控制程序执行并为用户和应用提供服务的系统软件。传统教材常说它运行在裸机之上；现代系统还可能位于固件、虚拟机监控器之上。\n🔴【地位】：\n操作系统是用户与计算机硬件之间的接口。\n操作系统是对硬件的第一次扩充。\n操作系统是其他所有软件运行的基础平台。\n⚫️【坑点】：操作系统是核心系统软件，不是一般应用软件。操作系统的功能不包括“高级程序设计语言的编译器”（编译器属于语言处理程序）。\n考点2：操作系统的功能（五大管理）\n🔴【五大功能】：\n处理器（处理机）管理：CPU的分配和调度。\n存储器管理：内存的分配、回收和保护。\n设备管理：I/O设备的分配和管理。\n文件管理（信息管理）：文件的存储、检索、共享和保护。\n作业/用户接口管理：组织和控制作业，并通过命令接口、程序接口（系统调用）等提供服务。不同教材可能概括为四大管理、五大管理或另列用户接口。\n⚫️【坑点】：存储器管理主要负责内存的分配与回收，不是外存（外存属于设备管理或文件管理）。\n考点3：操作系统的分类（必考判断）\n🔴【批处理操作系统】：\n单道批处理：内存中只有一道程序。特点：单道性、顺序性、自动性。\n多道批处理：内存中同时存放多道程序，共享CPU。特点：资源利用率高、系统吞吐量大，但无交互能力（用户无法干预）。设计时首先考虑资源利用率和吞吐量。\n🔴【分时操作系统】：\n将CPU时间划分为时间片，轮流分配给各终端用户。\n四大特点：多路性、独立性、及时性、交互性。（口诀：多独及时交）\n坑点：“自治性”不是分时操作系统的特点！\n单核计算机实现多任务“同时”执行假象的机制是时间片轮转。\n🔴【实时操作系统】：\n对外部事件在规定时间内做出响应。\n特点：正确性同时取决于逻辑结果与规定时限，强调可预测性和可靠性。实时系统可以具有很强的人机交互，“交互性弱”不是定义性特征。\n应用：飞机控制、工业控制等硬实时场景，以及部分通信、媒体等软实时场景。订票系统更常归为联机事务处理，是否算实时系统取决于教材语境。\n输出结果的正确性不仅依赖于结果的正确性，还依赖于产生结果的时间（实时性要求）。\n⚫️【坑点】：\n分时操作系统的时间片不是越小越好（过小会导致频繁切换，系统开销增大）。\n批处理系统没有交互能力。\n实时系统与分时系统的区别：实时系统交互性弱，响应时间敏感度更高。\n考点4：操作系统的特征\n🔴【四大特征】：并发、共享、虚拟、异步。（口诀：并共虚异）\n🔴【并发】：两个或多个事件在同一时间间隔内发生（宏观同时，微观交替）。并发性是指若干事件在同一时间间隔发生。\n🔴【共享】：系统资源供多个并发执行的进程共同使用。\n🔴【虚拟】：把一个物理实体变成若干个逻辑上的对应物（如虚拟内存）。\n🔴【异步】：进程以不可预知的速度向前推进（走走停停）。\n⚫️【坑点】：\n“并发”与“并行”的区别：并发是同一时间间隔（单核），并行是同一时刻（多核）。\n多个进程的实体存在于同一内存中，在一段时间内都得到运行 → 这种性质称作并发性。\n第二章：进程管理\n考点5：进程与程序的区别（绝对高频）\n🔴【程序】：静态的，是指令的有序集合，存储在外存中。\n🔴【进程】：动态的，是程序的一次执行活动；其地址空间可部分驻留内存、部分位于外存，不能简单定义为“进程存储在内存”。\n🔵【本质区别】：\n进程是动态的，程序是静态的。\n进程是资源分配的基本单位（有生命周期）。\n进程 =程序 + PCB + 数据集合。\n⚫️【坑点】：\n进程是动态的，程序是静态的。这是它们的本质区别。\n可执行程序通常以文件形式保存在外存，执行时创建进程；进程的运行状态由PCB等维护，其地址空间不要求全部常驻内存。\n不同进程所执行的代码可以相同（如多个用户同时运行同一个程序）。\n考点6：进程控制块（PCB）\n🔴【PCB定义】：进程控制块，是进程存在的唯一标志。\n🔴【PCB内容】：进程标识符、进程状态、程序计数器、寄存器、内存信息、资源清单等。\n🔴【PCB作用】：系统根据PCB感知进程的存在，通过PCB控制和管理进程。\n⚫️【坑点】：创建/撤销进程的核心操作包括建立/撤销PCB。PCB由内核维护，用户进程通常不能直接读写；应用可通过系统调用查询操作系统允许公开的部分进程信息。\n考点7：进程的三种基本状态及其转换（必考）\n🔴【三种状态】：\n就绪态（Ready）：除CPU外，所有资源都已获得，等待CPU调度。\n运行态（Running）：已获得CPU，正在执行。\n阻塞态（Blocked/Waiting）：因等待某事件（如I/O完成）而暂停执行。\n🔵【状态转换条件】：\n⚫️【坑点】：\n时间片用完 → 进程从运行态变为就绪态。\n等待某一事件 → 进程从运行态变为阻塞态。\n进程申请CPU得不到满足 → 处于就绪态，不是阻塞态。\n单处理器系统中，同时存在12个进程，处于就绪队列的进程数量最多为11个（1个在运行）。\n考点7A：进程与线程（高频辨析）\n🔴【进程】：传统教材中是资源分配和保护的基本单位，拥有独立地址空间及资源。\n🔴【线程】：是处理器调度的基本单位；同一进程内线程共享代码、数据和打开文件等进程资源，但拥有各自的程序计数器、寄存器和栈。\n⚫️【坑点】：线程既有共享的进程资源，也有私有运行现场；“线程之间完全不共享资源”和“线程没有私有状态”都错误。\n考点8：进程调度算法\n🔴【先来先服务（FCFS）】：按就绪/到达先后服务，通常为非抢占，实现简单；长作业在前会使短作业久等，产生护航效应，但平均周转时间并非在任何任务集合中都必然最长。\n🔴【短作业优先（SJF）】：选择运行时间最短的进程先执行。平均周转时间最短（所有作业同时到达时）。需要预知运行时间。\n🔴【高响应比优先（HRRN）】：响应比 = (等待时间 + 要求服务时间) / 要求服务时间。兼顾等待时间和执行时间，既照顾短作业，又不使长作业长期等待。\n🔴【时间片轮转（RR）】：分时系统使用。每个进程轮流获得固定时间片的CPU。\n🔴【优先级调度】：选择优先级最高的进程执行。若使当前运行进程总是优先级最高的进程，应选择高优先级优先调度算法。\n⚫️【坑点】：\n所有作业同时到达时，平均周转时间最短的是短作业优先。\n响应比高优先算法中：等待时间相同时，运行时间短的优先；运行时间相同时，等待时间长的优先。\n某些调度策略会提高I/O密集型或交互型任务优先级，以改善响应并让I/O与CPU并行；优先级仍取决于系统目标，不能把“计算型必低于I/O型”当作通则。\n考点9：进程同步与互斥\n🔴【同步】：多个进程因合作而产生的直接制约关系（如流水线上下工序）。\n🔴【互斥】：多个进程因竞争同一资源而产生的间接制约关系（如多个进程争抢打印机）。\n🔴【临界资源】：一次只允许一个进程访问的资源（如打印机）。\n🔴【临界区】：访问临界资源的那段程序代码。\n🔴【信号量】：用于进程同步与互斥的机制。P操作（申请资源）和V操作（释放资源）是原子操作。\n在部分教材的计数信号量定义中，值大于0表示可用资源数，值小于0时绝对值表示等待进程数；有些实现不允许用户直接观察负值，因此该解释依赖具体P/V定义。\n⚫️【坑点】：\n临界区是一段程序，不是缓冲区或数据区！\nP、V操作既能实现进程互斥，也能实现进程同步。\n按“P操作先减1、负值入队”的教材定义，有3个进程且最多允许2个进入时，信号量可出现2、1、0、-1；题目若采用不同信号量语义，不能机械套用。\n信号量初值为3，当前为1 → 可用资源数M=1，等待进程数N=0。\n考点10：死锁（极高频）\n🔴【定义】：两个或多个进程因互相等待对方占有的资源而无限期阻塞的现象。\n🔴【死锁产生的四个必要条件】（全部满足才可能死锁）：\n互斥：资源一次只能分配给一个进程。\n请求与保持：进程占有一些资源的同时，请求新的资源。\n不可剥夺：进程已获得的资源在使用完毕前不能被强行剥夺。\n环路等待：若干进程形成头尾相接的循环等待资源链。\n🔴【死锁的预防】：在资源分配规则上破坏四个必要条件之一。\n破坏“请求与保持”：一次性申请所有资源。\n破坏“环路等待”：资源有序分配（给资源类型编号，按规定顺序申请）。它是常见预防方法之一，但可能降低资源利用率或增加编程约束。\n🔴【死锁的避免】：银行家算法。系统分配资源前先计算是否会导致不安全状态。\n🔴【死锁与安全状态的关系】：\n死锁状态一定是不安全状态。\n不安全状态不一定会死锁（但可能导致死锁）。\n安全状态一定不会死锁。\n⚫️【坑点】：\n死锁的预防方法中，不太可能的一种是摒弃互斥条件（很多资源本身就是互斥的，无法摒弃）。\n可共享资源通常能减少互斥竞争，但硬盘等设备还涉及控制块、缓冲区和锁，不能绝对说“不会引起死锁”。\n死锁发生后可通过终止进程、资源剥夺、回滚等恢复；“不能被中断或唤醒”不是死锁定义，不可剥夺条件只表示资源在正常规则下不能被强制收回。\n系统中出现环路不一定死锁（还需要其他条件）。\n第三章：存储管理\n考点11：存储管理的目的\n🔴【主要功能】：内存的分配、回收、地址转换、存储保护和内存扩充（虚拟内存）。\n🔴【地址转换（重定位）】：\n静态重定位：程序装入时一次性完成地址转换。\n动态重定位：程序执行过程中借助地址转换硬件完成逻辑地址到物理地址的转换。现代通用操作系统通常采用动态地址转换，但不能写成“所有现代操作系统只采用这一方式”。\n⚫️【坑点】：静态重定位的时机是程序装入时，动态重定位的时机是程序运行时。\n考点12：连续分配方式\n🔴【单一连续分配】：内存分为系统区和用户区，只能用于单用户、单任务操作系统。最简单。\n🔴【固定分区分配】：内存划分为多个固定大小的分区，每个分区可装入一道程序。分区大小可以不同，但预先固定。有内部碎片。\n🔴【动态分区分配】：根据进程需要动态分配内存空间。有外部碎片。可通过“紧凑”解决。\n🔴【首次适应算法】：按地址递增的顺序分配空闲分区。\n⚫️【坑点】：固定分区中，分区大小可以不同但预先固定。首次适应算法要求空闲区按地址递增登记。\n考点13：分页存储管理（离散分配）\n🔴【核心思想】：将进程的逻辑地址空间分成页，将内存的物理地址空间分成块。页和块的大小相等。\n🔴【页表】：记录页号到物理块号的映射关系。每个进程拥有一张页表。\n🔴【地址结构】：逻辑地址 =页号 + 页内地址。物理地址 =块号 + 块内地址（块内地址 = 页内地址）。\n🔴【访问内存次数】：未引入快表时，每次存取指令或数据需2次访问内存（第一次查页表，第二次存取数据）。\n⚫️【坑点】：\n块内位移量等于页内位移量，是因为页和块的大小相等。\n每个进程拥有自己的页表，不是所有进程共享一张页表。\n8个页面，每页1024字节 → 逻辑地址需要3（页号）+ 10（页内地址）= 13位二进制表示。\n考点14：分段存储管理\n🔴【核心思想】：将进程的地址空间按逻辑信息（代码段、数据段等）分成若干段。每段从0开始编址，大小不固定。\n🔴【地址结构】：逻辑地址 =段号 + 段内地址。\n🔴【与分页的区别】：\n页是进程逻辑地址空间的固定大小划分，页框/块是物理内存的固定大小划分；分页主要出于系统管理需要，对用户通常不可见。段按程序逻辑信息划分，对用户可见。\n页大小固定，段大小不固定。\n分页是一维地址空间，分段是二维地址空间（段名+段内地址）。\n考点15：段页式存储管理\n🔴【核心思想】：分段 + 分页的结合。用分段方法管理用户地址空间，用分页方法管理物理存储空间。\n⚫️【坑点】：段页式管理的实现原理是：用分段方法来分配和管理用户地址空间，用分页方法来管理物理存储空间。\n考点16：虚拟存储管理（核心考点）\n🔴【虚拟存储的定义】：基于局部性原理，将进程的部分程序和数据装入内存，其余放在外存，逻辑上扩充内存容量。\n🔴【局部性原理】：程序执行时对内存访问的不均匀性（时间局部性：某条指令被执行后不久可能再次被执行；空间局部性：某存储单元被访问后不久其附近的存储单元也可能被访问）。\n🔴【虚拟存储的实现】：常见为请求分页，也可采用请求分段或段页式；请求分页需要页表、缺页异常处理、地址变换和页面置换等支持。\n⚫️【坑点】：虚拟存储的目的是逻辑上扩充主存容量（让用户感觉内存更大），不是物理上扩大主存。\n考点17：页面置换算法（计算高频）\n🔴【最佳置换算法（OPT）】：选择以后永不使用或最长时间内不再使用的页面淘汰。理论最优，但无法实现（无法预知未来）。\n🔴【先进先出置换算法（FIFO）】：淘汰最早进入内存的页面。可能出现Belady异常（分配的物理块数增加，缺页次数反而增加）。\n🔴【最近最久未使用置换算法（LRU）】：淘汰过去最长时间未被访问的页面，通常表现较好，但不是理论最优；精确实现开销较大，实际系统常采用近似LRU策略。\n🔴【Clock/Second-Chance】：利用访问位循环检查页面，是近似LRU算法；基础Clock主要看访问位。增强Clock还结合修改位，通常优先选择访问位=0、修改位=0的页。\n⚫️【坑点】：\n精确LRU需要维护访问次序，通常需硬件访问位、时间戳或栈等支持，成本较高；实际常用Clock等近似实现。\n系统发生抖动（频繁的页面换入换出）会使系统效率降低。\n页面置换计算必须明确页框初始是否为空、页面序列和算法细节；应逐次记录页框状态，不能脱离前提死记某个缺页次数。\n第四章：设备管理\n考点18：I/O设备分类\n🔴【块设备】：以数据块为单位传输，可随机访问。如：磁盘。I/O控制主要采取DMA方式。\n🔴【字符设备】：以字符为单位传输，顺序访问。如：键盘、鼠标、打印机。\n⚫️【坑点】：磁盘属于块设备，键盘属于字符设备。\n考点19：缓冲技术\n🔴【缓冲的作用】：\n缓和CPU与I/O设备之间速度不匹配的矛盾。\n减少对CPU的中断频率。\n协调数据处理单位与传输单位不匹配的问题。\n🔴【缓冲的实现】：软件缓冲通常是在内存中分配一段空间来实现的（不是在磁盘上）。\n⚫️【坑点】：判断题说“软件缓冲通常是在磁盘上分配一段空间” →错！是在内存中。\n考点20：SPOOLing技术（假脱机技术）\n🔴【定义】：将独占设备改造为共享设备的技术（如打印机共享）。\n🔴【核心】：利用磁盘作为缓冲区（输入井/输出井），在磁盘上形成队列。\n🔴【作用】：实现虚拟设备功能。\n⚫️【坑点】：SPOOLing技术的核心是把独占设备变为共享设备。\n考点21：磁盘调度算法\n🔴【先来先服务（FCFS）】：按请求顺序服务。\n🔴【最短寻道时间优先（SSTF）】：选择距离当前磁头位置最近的磁道访问。每次移动距离最短。\n🔴【扫描算法（SCAN，电梯算法）】：磁头按当前方向移动并服务沿途请求，到磁盘端点后反向；LOOK在当前方向无更远请求时即反向，不必走到物理端点。\n🔴【循环扫描（C-SCAN）】：只在一个方向上服务请求，到端点后快速返回另一端再继续；C-LOOK则在最远请求处回绕。\n⚫️【坑点】：\n磁盘访问时间 =寻道时间 + 旋转延迟时间 + 读写时间。不包括CPU调度时间。\n最短寻道时间优先算法会导致远处的请求饥饿。\n第五章：文件管理\n考点22：文件与文件系统\n🔴【文件】：具有文件名的信息集合。\n🔴【文件控制块（FCB）】：文件存在的标志，记录文件的属性信息（文件名、大小、地址、权限等）。\n🔴【目录结构】：\n单级目录：所有文件在同一目录下（有重名问题）。\n二级目录：主目录 + 用户目录。\n多级目录（树型目录）：最常用，允许不同用户的文件同名。形式为树型结构。\n⚫️【坑点】：为了允许不同用户的文件具有相同的文件名，文件系统中采用多级目录。\n考点23：文件的逻辑结构\n🔴【流式文件（无结构文件）】：文件中的信息是字节流，无结构。如：文本文件（.txt）。\n🔴【记录式文件（有结构文件）】：文件由一组记录组成。如：数据库文件。\n⚫️【坑点】：数据库文件的逻辑结构形式是记录式文件。\n考点24：文件的物理结构（分配方式）\n🔴【连续分配】：文件占用连续磁盘块，支持顺序和随机访问，访问快；难以动态增长并会产生外部碎片。\n🔴【链接分配】：文件占用不连续的磁盘块，通过指针链接。存取时必须按指针顺序进行，效率较低。支持顺序存取，不支持随机存取。\n🔴【索引分配】：文件可占用不连续磁盘块，索引块保存各数据块地址，支持直接访问。这里的“索引分配”是文件物理块索引，不等同于数据库中“关键字→记录地址”的内容索引。\n⚫️【坑点】：\n对文件的存取时必须按指针进行，效率较低 →链接文件。\n文件的逻辑结构、存取方法和物理分配方式是不同层次：顺序存取不要求文件一定连续分配，链接分配也可以顺序访问。\n同一文件的不同副本可以采用相同或不同物理结构，取决于文件系统和介质；不存在“必须不同”的通则。\n考点25：文件的存取方法\n🔴【顺序存取】：按文件中的记录顺序依次访问（磁带、链接文件）。\n🔴【随机存取（直接存取）】：可访问任意位置的记录（磁盘、索引文件）。\n📊 终极数字/算法记忆表（考前过一遍）\n🔥 本章高频简答题汇总\n1. 简述进程和程序的区别。\n🔵【踩分点】：① 进程是动态的，程序是静态的。② 进程有生命周期（创建到撤销），程序是永久的。③ 进程 =程序 + PCB + 数据集合。④ 一个程序可对应多个进程。\n2. 简述进程的三种基本状态及其转换。\n🔵【踩分点】：①就绪态：等待CPU。②运行态：占有CPU执行。③阻塞态：等待某事件（如I/O）。转换：就绪→运行（调度选中），运行→就绪（时间片完），运行→阻塞（等待事件），阻塞→就绪（事件完成）。\n3. 简述死锁产生的必要条件及预防方法。\n🔵【踩分点】：必要条件：互斥、请求与保持、不可剥夺、环路等待。预防通过破坏至少一个必要条件；资源有序分配法破坏环路等待，是常见方法。\n4. 简述分页和分段的区别。\n🔵【踩分点】：① 页是物理单位（为管理内存），段是逻辑单位（为用户需求）。② 页大小固定，段大小不固定。③ 分页是一维地址空间，分段是二维地址空间。\n5. 简述虚拟存储的原理。\n🔵【踩分点】：基于局部性原理（程序执行时对内存访问不均匀），将程序的部分装入内存，部分放在外存，在逻辑上扩充内存容量。当访问的页面不在内存时，产生缺页中断，将其调入内存。\n6. 简述SPOOLing技术的作用。\n🔵【踩分点】：将独占设备（如打印机）改造为共享设备，实现虚拟设备功能，提高了设备利用率。\n口诀速记\n“操作系统五大管，处理内存设文件；分时并共虚异步，批处无交吞吐高；进程动来程序静，PCB是唯一标；就绪运行和阻塞，时间片完跑变等；死锁四因必全有，互斥请保不环等；分页固定一维空，分段不固二维位；虚拟存储局部性，请求分页是核心；LRU淘汰最久未，FIFO会有Belady。”\n【表格1】\n\n转换（🔴） | 触发条件（🔵）\n就绪 → 运行 | 被进程调度程序选中（获得CPU）\n运行 → 就绪 | 时间片用完/ 被更高优先级进程抢占\n运行 → 阻塞 | 等待某事件（请求I/O、等待资源）\n阻塞 → 就绪 | 等待的事件完成（I/O完成、资源到达）\n\n【表格2】\n\n概念 | 值/规则 | 备注\n进程三态 | 就绪、运行、阻塞 | 状态转换条件必背\n信号量负值含义 | 取决于题目给定的P/V语义 | 经典“先减后阻塞”定义下，负值绝对值可表示等待数\n死锁必要条件 | 互斥、请求保持、不可剥夺、环路等待 | 破坏环路等待→资源有序分配\nLRU缺页次数 | 需按初始页框和序列推演 | 通常表现好，但精确实现成本高，并非理论最优\n最佳淘汰页 | A=0, M=0 | Clock算法\n磁盘访问时间 | 寻道 + 旋转延迟 + 读写 | 不包括CPU调度时间\n文件目录结构 | 多级目录（树型） | 允许不同用户文件同名\n缓冲位置 | 内存 | 不在磁盘\n"},{"name":"数据库技术","text":"# 📚 数据库技术\n\n使用说明：🔴红色= 一级考点 / 核心术语 / 判断改错点（背下来）🔵蓝色= 简答题踩分关键词 / SQL语句模板 / 概念区分（考试时写上去就是分）⚫️黑色= 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n第一章：数据库系统概述\n考点1：数据库相关概念（选择/填空必考）\n🔴【数据（Data）】：描述事物的符号记录，是数据库中存储的基本对象。\n🔴【数据库（DB）】：长期存储在计算机内、有组织、可共享并相互关联的数据集合；其数据按一定模型组织，具有尽可能小的冗余并可供多个应用使用。\n🔴【数据库管理系统（DBMS）】：位于用户与操作系统之间的一层数据管理软件。是数据库系统的核心。\n🔴【数据库系统（DBS）】：通常包括数据库、DBMS、应用程序、数据库管理员和用户，并依托计算机硬件、操作系统等运行环境；不同教材的枚举范围略有差异。\n🔴【数据库管理员（DBA）】：负责模式定义、权限与安全、备份恢复、性能监控和日常维护等。应用开发主要由开发人员承担，但小型项目中角色可兼任，不能把“不编写任何程序”当作定义。\n⚫️【坑点】：\nDBMS是建立在操作系统之上的系统软件，不是建立在硬件系统上。\nDBA的职责不包括编写应用程序（那是程序员的工作）。\n数据库系统是在文件系统的基础上发展起来的。\n考点2：数据管理技术的发展（三个阶段）\n🔴【人工管理阶段】：数据不保存，程序管理数据，数据不共享，数据与程序不具有独立性。\n🔴【文件系统阶段】：数据可长期保存，由文件系统管理。数据共享性差、冗余度大、独立性差。\n🔴【数据库系统阶段】：数据结构化、共享性高、冗余度低、数据独立性高。共享性最好的是数据库系统阶段。\n⚫️【坑点】：\n数据管理技术发展的三个阶段中，数据共享性最好的是数据库系统阶段。\n文件系统阶段的数据独立性差，不是强。\n数据库避免了一切数据的重复→错！数据库只是减少了数据冗余，不可能完全避免（如为了查询效率，有时会保留少量冗余）。\n考点3：数据库系统的特点\n🔴【三大特点】：\n数据结构化（主要特点之一）。\n数据共享性高、冗余度低。\n数据独立性高（物理独立性和逻辑独立性）。\n⚫️【坑点】：数据库的主要特点不包括“程序的标准化”。\n考点4：数据独立性（重要概念）\n🔴【物理独立性】：用户的应用程序与数据库的物理存储相互独立。当内模式（存储结构）改变时，模式不变，应用程序不需要修改。\n🔴【逻辑独立性】：模式发生一定范围变化时，可通过调整外模式/模式映像使外模式尽量不变，从而使基于外模式的应用程序不必修改。它通常比物理独立性更难实现。\n⚫️【坑点】：\n逻辑独立性不是说模式怎样改变都能自动保持应用不变，而是由外模式/模式映像屏蔽允许范围内的逻辑变化。\n物理独立性是指内模式改变，模式和应用程序不变。\n数据库三级模式体系结构的划分，有利于保持数据库的数据独立性。\n考点5：数据库三级模式结构\n🔴【外模式（用户模式/子模式）】：用户看到的局部数据逻辑结构。一个数据库可以有多个外模式。\n🔴【模式（概念模式/逻辑模式）】：数据库中全体数据的全局逻辑结构和特征的描述。一个数据库只有一个模式。\n🔴【内模式（存储模式）】：数据物理存储结构的描述。一个数据库只有一个内模式。最接近物理存储设备的结构是内模式。\n⚫️【坑点】：\n数据的全局逻辑结构用模式描述，不是外模式。\n三级模式中，外模式（用户模式）可以有多个，模式（概念模式）和内模式各只有一个。\n最接近物理存储设备的结构是内模式。\n第二章：数据模型\n考点6：数据模型的三要素\n🔴【三要素】：\n数据结构：描述系统的静态特性（数据的组织方式）。\n数据操作：描述系统的动态特性（对数据的增、删、改、查）。\n完整性约束：保证数据的正确性、有效性和相容性。\n⚫️【坑点】：数据模型的三要素不包括“并发控制”。并发控制是数据库保护的内容。\n考点7：概念模型（E-R模型）\n🔴【E-R图三要素】：实体（矩形）、属性（椭圆）、联系（菱形）。\n🔴【实体】：客观存在且可相互区别的事物。\n🔴【属性】：实体所具有的特性。如学生的学号、姓名。\n🔴【联系】：实体之间的对应关系。\n🔴【联系类型】：\n1：1（一对一）：如丈夫与妻子、人与身份证、学生与学籍档案。\n1：N（一对多）：如班级与学生、部门与员工。\nM：N（多对多）：如学生与课程、供应商与零件。\n⚫️【坑点】：\n用E-R图表示实体类型、属性和联系是在概念设计阶段。\n建立E-R模型的正确步骤：确定实体 → 确定实体的属性 → 确定实体之间的联系类型 → 设计出E-R图。\n实体供应商和实体零件之间的联系是多对多（一个供应商可提供多种零件，一种零件可由多个供应商提供）。\n考点8：逻辑模型（三种数据模型）\n🔴【层次模型】：用树形结构表示实体及实体间的联系。一对多。通过指针实现。\n🔴【网状模型】：用网状结构表示实体及实体间的联系。多对多。通过指针实现。\n🔴【关系模型】：用二维表表示实体及实体间的联系。目前最常用。用表（关系）表示数据。\n⚫️【坑点】：\n用树形结构来表示实体及实体间联系的是层次模型。\n通过指针链接来表示和实现实体之间联系的模型是层次模型和网状模型（关系模型用表，不用指针）。\n数据库类型是按照数据模型来划分的。\n概念模型（E-R模型）不是逻辑模型。\n考点9：关系模型的基本术语\n🔴【关系（Relation）】：一张二维表。\n🔴【元组（Tuple）】：二维表中的一行（一条记录）。\n🔴【属性（Attribute）】：二维表中的一列（一个字段）。\n🔴【域（Domain）】：属性的取值范围。\n🔴【码/键（Key）】：能唯一标识一个元组的属性或属性组合。\n🔴【超码（Superkey）】：能唯一标识元组的属性集合，可能包含多余属性。\n🔴【候选码（Candidate Key）】：能唯一标识元组且不含多余属性的最小超码，可以有多个。\n🔴【主码（Primary Key）】：从候选码中选定一个作为主码。主码不能为空。\n🔴【外码（Foreign Key）】：关系中的一个属性组引用本关系或另一关系的候选码/具有唯一性约束的键；外码可以是复合属性，也不必引用“另一个表的主码”这一种情况。\n⚫️【坑点】：\n二维表的行对应元组（记录），列对应属性（字段）。\n一个表中可以有多个候选关键字，但只能有一个主键。\n二维表的列可以任意交换，行也可以任意交换（关系模型的性质）。\n关系中的行、列在逻辑上无序；关系不能有重复元组，每个属性值应来自同一域。SQL表在未写ORDER BY时也不保证输出顺序。\n二维表中的每一列代表一个属性，不是实体。\n关系模型以二维表结构来表示实体与实体之间的联系。\n第三章：关系代数与SQL\n考点10：关系代数基本运算\n🔴【五种基本运算】：并（∪）、差（−）、笛卡尔积（×）、选择（σ）、投影（π）。\n🔴【选择（σ）】：从行的角度进行筛选（水平方向）。选出满足条件的元组。\n🔴【投影（π）】：从列的角度进行筛选（垂直方向）。选出指定的属性。\n🔴【连接（⋈）】：从两个关系的笛卡尔积中选出满足条件的元组。\n🔴【除（÷）】：设R(X,Y)÷S(Y)，结果为满足“对S中的每个Y值，(X,Y)都在R中”的X值集合，常用于表达“至少具有全部……”的查询。\n⚫️【坑点】：\n对R进行投影得到S时，因列被删除且结果要去除重复元组，所以|S|≤|R|；这一结论不能套用于任意两个无关关系R、S。\n集合R与S的交可以用R − (R − S)表示。\n传统集合运算是从行（水平）角度进行的，专门的关系运算是从行和列角度进行的。\n考点11：SQL语言概述\n🔴【SQL全称】：Structured Query Language，结构化查询语言。\n🔴【SQL类型】：关系数据库语言。\n🔴【SQL功能分类】：DDL负责定义结构，DML负责数据操作，DCL负责权限控制；有些教材把SELECT单列为DQL，有些SQL标准/教材把查询纳入DML，答题以题目分类口径为准。\n⚫️【坑点】：\nDELETE是删除数据（记录），DROP是删除表结构。\nSQL语言是关系数据库语言，不是层次或网络数据库语言。\n删除经销商1018的数据记录应使用：DELETE FROM distributors WHERE distri_num = 1018;\n删除Student表的Birthday列，同时删除引用该列的视图和约束：ALTER TABLE Student DROP Birthday CASCADE;\n将查询关系S的权限授予用户WANG，并允许其转授：GRANT SELECT ON S TO WANG WITH GRANT OPTION;\n考点12：SELECT语句（极高频）\n🔵【基本语法模板】：SELECT [DISTINCT] 目标列 FROM 表名 [WHERE 行条件] [GROUP BY 分组列] [HAVING 组条件] [ORDER BY 排序列 [ASC|DESC]];\n🔴【DISTINCT】：去掉查询结果中的重复行。\n🔴【WHERE】：筛选元组（行）的条件。\n🔴【GROUP BY】：按某列分组。\n🔴【HAVING】：对分组后的结果进行筛选。常与 GROUP BY 配合使用。\n🔴【ORDER BY】：对结果进行排序。ASC升序（默认），DESC降序。\n🔴【LIKE】：模糊查询。%（百分号）匹配任意长度的字符串；_（下划线）匹配单个字符。\n🔴【IN】：判断值是否在集合中。\n🔴【BETWEEN…AND…】：判断值是否在区间内（包含边界）。\n⚫️【坑点】：\nSELECT语句的执行结果是集合（表）。\nSELECT * FROM book WHERE book_num NOT BETWEEN 200 AND 300;等价于SELECT * FROM book WHERE book_num < 200 OR book_num > 300;\nLIKE '_A%'表示第二个字符为A且至少2个字符；大小写是否敏感取决于DBMS、字符集与排序规则，不能写成“SQL通常不区分大小写”的通则。\nHAVING用于分组后的条件筛选，WHERE用于分组前的条件筛选。\n返回结果集中不包含相同的行，使用关键字DISTINCT。\nSELECT INTO创建新表的语法和含义依DBMS而异（SQL Server/Access常见，MySQL通常使用CREATE TABLE ... SELECT或INSERT ... SELECT），必须看题设平台。\n考点13：SQL常用函数\n🔴【COUNT()】：统计行数。\n🔴【SUM()】：求总和（数值列）。\n🔴【AVG()】：求平均值（数值列）。\n🔴【MAX()】：求最大值。\n🔴【MIN()】：求最小值。\n⚫️【NULL规则】：COUNT(*)统计结果行数；COUNT(列)、SUM、AVG、MAX、MIN通常忽略NULL。AVG(列)不会把NULL当0。聚合函数支持的数据类型依函数和DBMS而定，MAX/MIN常可用于可排序的字符、日期列。\n考点13A：连接、子查询与NULL（高频SQL）\n🔴【连接】：INNER JOIN只保留匹配行；LEFT JOIN保留左表全部行，右表无匹配处补NULL；RIGHT JOIN反之；FULL OUTER JOIN保留两边未匹配行（并非所有DBMS直接支持）。\n🔵【模板】：SELECT ... FROM A JOIN B ON A.key=B.key WHERE ...；连接条件应写清，否则可能产生笛卡尔积。\n🔴【NULL】：NULL表示未知/缺失，不等于0、空串或任何具体值。判断空值用IS NULL或IS NOT NULL，不能用“= NULL”。\n⚫️【三值逻辑】：涉及NULL的普通比较结果通常为UNKNOWN；WHERE只保留条件为TRUE的行。NOT IN子查询若含NULL可能得到意外空结果，考试中要特别辨析。\n第四章：数据库完整性\n考点14：三种完整性约束\n🔴【实体完整性（Entity Integrity）】：\n主码（主键）的值必须唯一且不能为空。\n通过PRIMARY KEY定义。\n要求userID作为Users表中元组的唯一标识→ 属于实体完整性规则。\n🔴【参照完整性（Referential Integrity）】：\n外码值的非空部分必须与被参照键的某个值匹配；能否为NULL还取决于该外码列是否允许NULL。外键引用的通常是主键或UNIQUE候选键。\n通过FOREIGN KEY定义。\n不允许引用不存在的实体。\n🔴【用户自定义完整性（User-defined Integrity）】：\n用户根据实际需要定义的约束。如：年龄必须在0-150之间、性别只能是“男”或“女”。\n通过CHECK定义。\n⚫️【坑点】：\nPRIMARY KEY是实体完整性，FOREIGN KEY是参照完整性。\nNOT NULL、UNIQUE、CHECK等属于SQL声明性约束；在“实体/参照/用户定义完整性”的教材分类中，非主键列上的取值限制常归用户定义完整性，但具体归类要看约束对象，不能机械地仅凭关键字判断。\n主码子句和外码子句属于DBS的完整性措施，不是安全性措施。\n第五章：范式理论\n考点15：范式（Normal Form）\n🔴【1NF（第一范式）】：属性不可再分（原子性）。所有关系模式都满足1NF。\n🔴【2NF（第二范式）】：满足1NF，且每个非主属性完全函数依赖于每个候选码，即不存在非主属性对候选码真子集的部分依赖。\n🔴【3NF（第三范式）】：满足2NF，且非主属性不传递依赖于任何候选码。形式化地，对每个非平凡函数依赖X→A，X是超码或A是主属性。\n🔴【BCNF】：对关系模式中的每个非平凡函数依赖X→Y，决定因素X都必须是超码。BCNF严格强于3NF，BCNF一定是3NF，3NF不一定是BCNF。\n🔴【部分依赖】：某属性依赖于复合候选码的一部分；只有复合候选码才可能产生这类部分依赖，不能只检查被选为“主码”的一个候选码。\n🔴【传递依赖】：非主属性依赖于另一个非主属性，而该非主属性又依赖于主码。\n⚫️【坑点】：\n如果关系模式R是2NF，且每个非主属性都不传递依赖于R的候选键，那么R的模式是3NF。\n属于BCNF的关系模式必属于3NF。\n关系规范化中的删除操作异常是指不该删除的数据被删除。\n规范化理论中，关系必须满足：其每一属性都是不可分解的（1NF要求）。\n第六章：事务与并发控制\n考点16：事务（Transaction）\n🔴【定义】：事务是用户定义的一个数据库操作序列，构成单一逻辑工作单元，也是并发控制与恢复处理的重要单位；通常以COMMIT提交或ROLLBACK回滚结束。\n🔴【事务的ACID特性】：\n原子性（Atomicity）：事务中的操作要么全做，要么全不做，不可分割。\n一致性（Consistency）：事务执行前后，数据库的完整性约束不被破坏。\n隔离性（Isolation）：一个事务的执行不受其他事务干扰。\n持续性（Durability）：事务一旦提交，对数据库的改变是永久的。\n⚫️【坑点】：\n“一个事务中所有对DB的操作是一个不可分割的操作序列” → 这是原子性。\n事务的4个特征是：原子性、一致性、隔离性、持久性（Durability，部分旧译“持续性”）。\n日志文件用来记录对数据库中数据进行的每一次更新操作（用于恢复）。\n考点17：并发操作的三大问题\n🔴【丢失修改】：两个事务同时修改同一数据，后提交的覆盖了先提交的。\n🔴【不可重复读】：一个事务两次读取同一数据，在此期间被另一个事务修改，导致两次读到的值不同。\n🔴【读“脏”数据】：一个事务读取了另一个未提交事务修改的数据。\n🔴【幻读】：一个事务按同一条件两次查询一组行，另一个已提交事务在其间插入、删除或改变符合条件的行，导致结果集合发生变化。\n⚫️【坑点】：题干中“T1读A=10，T2读A=10并修改为20写回，T1再读A=20” →不可重复读。注意区分：读脏数据是读了未提交的数据，不可重复读是读了已提交但被修改的数据。\n考点18：封锁机制\n🔴【X锁（排它锁/写锁）】：\n事务T对数据加X锁后，T可读可写该数据。\n按常见锁协议，其他事务不能取得与X锁冲突的S锁或X锁，因而需等待；实际读取行为也受隔离级别、多版本并发控制等实现影响。\n🔴【S锁（共享锁/读锁）】：\n事务T对数据加S锁后，T只能读不能写。\n其他事务可以加S锁（共享读），但不能加X锁。\n⚫️【坑点】：\n如果事务T2对数据对象D施加了排它锁X，则事务T2对D可读可写。\n加了X锁后，其他事务不能加任何锁。\n🔴【两段锁协议（2PL）】：事务先处于增长阶段只加锁不解锁，后处于缩减阶段只解锁不加锁；基本2PL可保证冲突可串行化。严格2PL通常把写锁持有到提交/回滚，可避免级联回滚。\n🔴【隔离级别】：由低到高常见为读未提交、读已提交、可重复读、可串行化；级别越高通常并发异常越少、并发开销越大，但各DBMS的MVCC实现细节可能不同。\n第七章：数据库设计\n考点19：数据库设计步骤\n🔴【六个阶段】：\n需求分析：调查业务、数据及处理需求，形成需求说明；数据流图和数据字典是常用分析成果，但具体方法可采用用例、业务规则等，并非所有项目都必须只产出这两项。\n概念结构设计：将用户需求抽象为概念模型（E-R图）。产出：E-R图。\n逻辑结构设计：将E-R图转换为关系模型（二维表）。\n物理结构设计：确定数据的存储结构和存取路径（如建立索引）。选出存取路径。\n数据库实施：建立数据库，编制应用程序，组织数据入库。\n数据库运行与维护：对数据库进行评价、调整与修改。\n⚫️【坑点】：\nE-R图是在概念结构设计阶段使用的。\n逻辑结构设计是将E-R图转换为关系模式。\n物理结构设计是选择存取路径（建立索引等）。\n需求分析阶段产生需求规格说明书。\n第八章：Access数据库\n考点19A：视图与索引（常考对象）\n🔴【视图（View）】：由查询定义的虚表，通常只保存定义而不保存查询结果（物化视图除外）。可简化查询、提供逻辑数据独立性并限制用户可见的行列。\n⚫️【可更新性】：不是所有视图都可直接更新；包含聚合、分组、DISTINCT、复杂连接等的视图通常受限，具体规则依DBMS而定。\n🔴【索引（Index）】：辅助存取结构，可提高特定查询、连接和排序效率，但会占用存储空间，并增加INSERT、UPDATE、DELETE的维护成本。\n⚫️【坑点】：建立索引通常不改变表的逻辑内容；“索引越多越好”“索引一定提高所有操作速度”都错误。主键/唯一约束是否自动创建索引取决于DBMS实现。\n考点19B：恢复技术（高频辨析）\n🔴【故障类型】：事务故障、系统故障、介质故障。事务/系统故障常依靠日志撤销或重做，介质故障通常需要备份配合日志恢复。\n🔵【WAL预写日志】：修改后的数据页写入磁盘前，相应日志记录必须先持久化；提交成功前提交记录也应持久化，这是日志恢复的重要基础。\n🔴【检查点】：缩短故障恢复时需要扫描日志的范围，但不是“有了检查点就不需要日志或备份”。\n⚫️【备份区别】：全量备份保存全部选定数据；增量备份保存自上次任意备份后的变化；差异备份保存自上次全量备份后的变化。恢复链与时间成本不同。\n考点20：Access基础\n🔴【Access类型】：关系数据库管理系统。\n🔴【Access文件扩展名】：.mdb（2003以前）、.accdb（2007以后）。\n🔴【Access对象要看版本】：Access常见核心对象为表、查询、窗体、报表、宏、模块六类；“数据访问页”是Access 2000/2003等旧版本对象，Access 2007起已不再作为受支持对象。旧教材题若明确旧版本，可能按7类作答。\n表：最基础的对象，用于存储数据。\n查询：按条件检索或操作数据。选择查询的结果可视为动态结果集/虚表；Access还存在追加、更新、删除、生成表等操作查询，不能把所有查询都只定义为“虚拟表”。\n窗体：用户交互界面。\n报表：打印输出数据。\n⚫️【坑点】：\nAccess是关系数据库，不是层次数据库或网状数据库。\n旧版Access的数据访问页通常对应独立.htm文件；新版题目不要把它列为现行Access对象。\n查询是Access数据库中的重要对象，是一种虚拟表。\n📊 终极概念/数字记忆表（考前过一遍）\n🔥 本章高频简答题汇总\n1. 简述数据库系统的组成。\n🔵【踩分点】：数据库系统由数据库、DBMS、应用程序、数据库管理员（DBA）和用户组成。\n2. 简述DBMS的功能。\n🔵【踩分点】：① 数据库定义和创建。② 数据组织、存储和管理。③ 数据存取（增删改查）。④ 数据库事务管理和运行管理。⑤ 数据库的建立和维护。\n3. 简述E-R图的三种图素及含义。\n🔵【踩分点】：①实体（矩形框）：客观存在的事物。②属性（椭圆框）：实体的特性。③联系（菱形框）：实体之间的关系。\n4. 简述事务的ACID特性。\n🔵【踩分点】：①原子性：操作不可分割，要么全做，要么全不做。②一致性：事务执行前后，完整性约束不被破坏。③隔离性：事务之间互不干扰。④持续性：事务提交后，修改永久生效。\n5. 写出三个关系完整性约束的名称。\n🔵【踩分点】：①实体完整性（主键非空且唯一）。②参照完整性（外键的非空值须匹配被参照键；是否可空还受NOT NULL约束）。③用户定义完整性（业务域的取值规则）。\n6. 写出删除经销商1018记录的SQL语句。\n🔵【踩分点】：DELETE FROM distributors WHERE distri_num = 1018;\n7. 从学生表中查询性别为“男”且班级为2的学生姓名。\n🔵【踩分点】：SELECT studentname FROM students WHERE gender='男' AND class=2;\n🔥 本章高频SQL语句模板（必背）\n口诀速记\n**“三级模式外多内单，E-R三素矩菱椭；**SQL四大类：定义查询操纵控，增删改查记心中；**实体主键非空一，参照外键要对应；**范式一二三，依次消依与传；事务ACID要记清，原一隔持保完整。”\n【表格1】\n\n类别（🔴） | 动词（🔵必记） | 功能（⚫️）\n数据定义语言（DDL） | CREATE、DROP、ALTER | 定义/删除/修改表结构\n数据查询语言（DQL，部分教材单列） | SELECT | 查询数据；有些体系将其归入DML\n数据操纵语言（DML） | INSERT、UPDATE、DELETE | 插入/修改/删除数据\n数据控制语言（DCL） | GRANT、REVOKE | 授权/收回权限\n\n【表格2】\n\n概念 | 数值/定义 | 备注\n三级模式数量 | 外模式多个，模式1个，内模式1个 | 外:模式:内 = N:1:1\n关系的基本组成 | 元组（行）与属性（列） | “数据库基本单位”须看题干所问层次，不宜一概答记录\n数据项/属性值 | 表示某对象某属性的具体取值 | 物理最小存储单位仍是位/字节，不能与逻辑数据单位混淆\nAccess扩展名 | .mdb / .accdb | 不是.doc或.xls\nE-R图三要素 | 实体、属性、联系 | 矩形、椭圆、菱形\n事务ACID | 原子性、一致性、隔离性、持续性 | 必背！\n范式顺序 | 1NF → 2NF → 3NF → BCNF | 依次消除：非原子性→部分依赖→传递依赖\n\n【表格3】\n\n操作类型 | SQL模板（🔵必记）\n创建表 | CREATE TABLE 表名 (列名 数据类型 约束);\n删除表 | DROP TABLE 表名;\n修改表结构 | ALTER TABLE 表名 ADD/DROP/MODIFY 列名;\n查询所有 | SELECT * FROM 表名;\n条件查询 | SELECT 列名 FROM 表名 WHERE 条件;\n模糊查询 | SELECT * FROM 表名 WHERE 列名 LIKE '%关键词%';\n排序 | SELECT * FROM 表名 ORDER BY 列名 ASC/DESC;\n分组统计 | SELECT 列名, COUNT(*) FROM 表名 GROUP BY 列名 HAVING 条件;\n去重查询 | SELECT DISTINCT 列名 FROM 表名;\n插入数据 | INSERT INTO 表名 (列1, 列2) VALUES (值1, 值2);\n更新数据 | UPDATE 表名 SET 列名 = 值 WHERE 条件;\n删除数据 | DELETE FROM 表名 WHERE 条件;\n"},{"name":"数据结构与算法","text":"# 📚 数据结构与算法\n\n使用说明：🔴红色= 一级考点 / 核心术语 / 判断改错点（背下来）🔵蓝色= 简答题踩分关键词 / 时间复杂度 / 算法特征（考试时写上去就是分）⚫️黑色= 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n第一章：数据结构概述\n考点1：数据结构的基本概念\n🔴【数据】：信息的载体，是描述客观事物的符号。\n🔴【数据元素】：数据的基本单位，在计算机中通常作为一个整体进行考虑和处理。\n🔴【数据项】：数据的最小单位，是数据元素中不可再分的单元。\n🔴【数据对象】：具有相同性质的数据元素的集合。\n⚫️【坑点】：数据的最小单位是数据项，不是数据元素。数据元素是数据的基本单位。\n考点2：数据结构的三个层次\n🔴【逻辑结构】：数据元素之间的逻辑关系，与计算机无关。\n分类：线性结构（线性表、栈、队列、串）和非线性结构（树、图、集合）。\n🔴【存储结构（物理结构）】：数据在计算机中的存储表示。\n分类：顺序存储结构（连续空间）、链式存储结构（非连续空间）、索引存储、散列存储。\n🔴【数据的运算】：对数据进行的操作（插入、删除、查找、排序等）。\n⚫️【坑点】：\n研究数据结构就是研究数据的逻辑结构、存储结构及其基本操作。\n数据的逻辑结构与数据元素本身的内容和形式无关。\n与所使用的计算机无关的是数据的逻辑结构。\n数据结构主要分为线性结构和非线性结构两类。\n考点3：算法\n🔴【算法的定义】：为解决特定问题而规定的、有限的指令序列；算法是对求解步骤的抽象描述，不等同于某一种程序设计语言编写的程序。\n🔴【算法的五大特性】：\n有穷性：必须在有限步内终止。\n确定性：每一步的含义无歧义。\n可行性：每一步操作可执行。\n输入：可以有0个或多个输入。\n输出：必须有1个或多个输出。\n🔴【算法效率的度量】：\n时间复杂度：以输入规模 n 为自变量，分析基本操作执行次数的数量级，常用大 O 记号表示；它不是某台机器上的实际运行秒数。\n空间复杂度：分析算法所需存储空间随输入规模增长的数量级。题目说“辅助空间”时只计算输入数据之外的额外空间；说“总空间”时还应计入输入存储。\n⚫️【坑点】：\n算法必须有输出，但可以没有输入（0个输入）。\n算法的可行性是指每一步都能精确运行，不是指指令没有二义性（那是确定性）。\n算法的时间复杂度关注基本操作次数随输入规模增长的数量级，不等于程序实际运行时间；同一数量级的算法在常数、缓存和数据分布上仍可能有差别。\n第二章：线性表\n考点4：线性表的定义与特点\n🔴【定义】：n 个具有相同性质的数据元素组成的有限序列（n≥0）。“相同性质”是抽象数据结构口径，不必机械等同于某种语言里字节长度完全相同。\n🔴【特点】：数据元素之间是一对一的关系。除了第一个和最后一个，每个元素有且仅有一个直接前驱和一个直接后继。\n⚫️【坑点】：\n线性表可以为空表（n=0）。\n线性表中的元素之间是一对一的关系，不是一对多。\n线性表是n个数据元素的有限序列。\n考点5：顺序存储结构（顺序表）\n🔴【定义】：用连续的存储单元依次存储线性表的数据元素。\n🔴【特点】：\n逻辑相邻的，物理上也相邻。\n可随机存取（通过首地址+下标直接访问任意元素）。\n存储密度高（接近1）。\n插入/删除需要移动大量元素，效率低。\n🔵【插入时间复杂度】：平均移动n/2个元素，时间复杂度O(n)。\n🔵【删除时间复杂度】：平均移动(n-1)/2个元素，时间复杂度O(n)。\n⚫️【坑点】：\n顺序存储的线性表可以实现随机存取。\n顺序存储方式的优点是存储密度大，缺点是插入、删除效率低。\n一个顺序表第一个元素地址90，每个元素长度2，第6个元素地址 = 90 + 5×2 =100。\n考点6：链式存储结构（链表）\n🔴【定义】：用任意的存储单元存储数据元素，元素间通过指针链接。\n🔴【特点】：\n逻辑相邻的，物理上不一定相邻。\n顺序存取（不能随机访问）。\n在已知插入/删除位置及其相关结点指针时，不需要成批移动元素，只需修改链接，局部操作可为 O(1)；若需先从表头查找位置，整体仍可能为 O(n)。\n存储密度小于1（需要额外的指针空间）。\n🔴【单链表】：每个节点包含数据域和指针域（指向下一个节点）。\n🔴【循环链表】：最后一个节点的指针指向头节点，形成环。\n🔴【双向链表】：每个节点包含前驱指针和后继指针。\n⚫️【坑点】：\n线性表采用链式存储时，地址连续与否均可。\n链表的存储密度小于1。\n链表不需成批移动元素且容量调整灵活，但访问第 i 个元素通常要顺链查找；若未给定位置指针，插入/删除的定位成本仍可能是 O(n)。\n带头结点的链表最主要的好处是使空表和非空表的处理统一。\n在单链表指针为p的结点之后插入指针为s的结点：s->next = p->next; p->next = s;（必须先连后断）。\n考点7：顺序表 vs 链表（高频对比）\n第三章：栈和队列\n考点8：栈（Stack）\n🔴【定义】：限定只在表尾（栈顶）进行插入和删除操作的线性表。\n🔴【特点】：后进先出（LIFO，Last In First Out）。\n🔴【基本操作】：入栈（Push）、出栈（Pop）、取栈顶（Top）。\n🔴【栈的应用】：\n函数调用（递归）。\n表达式求值。\n括号匹配。\n深度优先搜索（DFS）。\n🔴【链式栈 vs 顺序栈】：链式栈按需动态申请结点，不受固定数组容量限制，但仍可能因可用内存耗尽而入栈失败。\n⚫️【坑点】：\n栈是线性结构，不是非线性结构。\n栈的特点是后进先出，队列的特点是先进先出。\n入栈顺序为1,2,3，全部入栈后出栈顺序为3,2,1。\n顺序栈和链式栈在已知栈顶时，入栈、出栈通常都是 O(1)；顺序栈可能受固定容量限制，链式栈有指针和动态分配开销。\n考点9：队列（Queue）\n🔴【定义】：限定在一端（队尾）插入，在另一端（队头）删除的线性表。\n🔴【特点】：先进先出（FIFO，First In First Out）。\n🔴【基本操作】：入队（Enqueue）、出队（Dequeue）。\n🔴【队列的应用】：\n广度优先搜索（BFS）。\n缓冲区管理（打印任务队列）。\n二叉树层序遍历（将根节点入队，出队时子节点入队）。\n⚫️【坑点】：队列是一种先进先出的线性表，不是后进先出。\n考点10：循环队列\n🔴【定义】：将队列的存储空间首尾相接，形成逻辑上的环。\n🔴【常见约定】：若 front 指向队头元素、rear 指向下一个可入队位置，并**牺牲一个存储单元**区分空与满，则：\n🔵【判空条件】：front == rear。\n🔵【判满条件】：(rear + 1) % MAXSIZE == front。\n🔵【元素个数】：(rear - front + MAXSIZE) % MAXSIZE；长度为 MAXSIZE 的数组最多存 MAXSIZE-1 个队列元素。\n⚫️【坑点】：\n循环队列是队列的一种顺序存储结构（不是链式存储结构！）。\n循环队列中元素的个数由队头指针和队尾指针共同决定。\n循环队列的判空、判满公式取决于指针含义和实现方案。使用计数器或标志位时可利用全部 n 个单元，判满条件与上述“牺牲一格”公式不同；做题必须先看题设约定。\n第四章：树与二叉树\n考点11：树的基本概念\n🔴【树的定义】：树是 n（n≥0）个结点的有限集合。n=0 时为空树；非空树有且仅有一个根结点，其余结点可分为若干互不相交、且本身也是树的子树。\n🔴【树的性质】：每个节点最多有一个直接前驱，可以有多个直接后继。\n🔴【树的度】：节点拥有的子树个数的最大值。\n🔴【叶子节点（叶节点）】：度为0的节点（没有子节点）。\n🔴【树的深度（高度）】：节点所在的最大层次。\n⚫️【坑点】：树形结构中每个节点最多只有一个直接前驱。根节点没有前驱。\n考点12：二叉树（Binary Tree）\n🔴【定义】：每个节点最多有两棵子树（左子树和右子树），子树有左右之分，不能颠倒。\n🔴【二叉树 ≠ 度为2的树】：二叉树允许空树，度为2的树至少有3个节点。\n🔴【满二叉树】：所有非叶子节点的度都为2，且所有叶子节点都在同一层。\n🔴【完全二叉树】：除最后一层外，其他层都满，最后一层节点从左到右连续排列。\n🔴【二叉树与度为2的树的区别】：\n二叉树中结点的度可以为0、1、2；“度为2的树”是指整棵树的最大结点度为2，并不表示每个结点的度都固定为2。\n二叉树的子树有左右之分，度为2的树没有顺序之分。\n⚫️【坑点】：空二叉树没有根结点；**非空二叉树恰有一个根结点**。\n考点13：二叉树的性质（计算必考）\n🔴【性质1】：在二叉树的第i层上至多有2^(i-1)个节点（i≥1）。\n🔴【性质2】：深度为k的二叉树至多有2^k - 1个节点（k≥1）。至少有k个节点。\n🔴【性质3】：对任意二叉树T，叶子节点数 n0 = 度为2的节点数 n2 + 1。\n🔴【性质4】：具有n个节点的完全二叉树，深度为⌊log₂n⌋ + 1。\n🔴【性质5】：按层序从 1 开始编号的完全二叉树中，结点 i 的双亲为 ⌊i/2⌋（i>1）；若 2i≤n，左孩子为 2i；若 2i+1≤n，右孩子为 2i+1。若数组从 0 编号，公式将改变。\n⚫️【坑点】：\n一棵二叉树中，度为1的节点数为9 → 叶子节点的数目无法确定（需要知道度为2的节点数）。\n设树T的度为4，其中度为1,2,3,4的节点个数分别为4,2,1,1 → 叶子数 = n2+2n3+3n4+1 = 2+2+3+1 =8。\n一个有30个节点的二叉树深度至少为5（1+2+4+8+15=30，深度5）。\n考点14：二叉树的遍历（极高频）\n🔴【前序遍历（Pre-order）】：根 → 左 → 右（递归：先访问根，再遍历左子树，再遍历右子树）。\n🔴【中序遍历（In-order）】：左 → 根 → 右（递归：先遍历左子树，再访问根，再遍历右子树）。\n🔴【后序遍历（Post-order）】：左 → 右 → 根（递归：先遍历左子树，再遍历右子树，再访问根）。\n🔴【层序遍历（Level-order）】：从上到下，从左到右逐层访问。使用队列实现。\n🔴【重要结论】：已知前序+中序或后序+中序可唯一确定一棵二叉树。仅知道前序+后序不能唯一确定。\n⚫️【坑点】：\n若一个树叶是某二叉树的中序遍历的最后一个节点，则它也一定是该二叉树的前序遍历最后一个节点（正确）。\n若一个节点是某二叉树的前序遍历最后一个节点，则它不一定是中序遍历最后一个节点。\n某二叉树中序序列DBAFCE，层次序列FDECBA → 后序序列为ABDCEF。\n结点按中序遍历为SYZ的二叉树可能有5种（卡特兰数：C₃ = 5）。\n考点15：二叉树的构造\n🔴【由前序+中序构造】：\n前序第一个为根节点。\n在中序中找到根节点位置，左侧为左子树，右侧为右子树。\n递归构造。\n🔴【由后序+中序构造】：\n后序最后一个为根节点。\n在中序中找到根节点位置，左侧为左子树，右侧为右子树。\n递归构造。\n⚫️【坑点】：已知一棵二叉树的前序遍历和中序遍历序列，可以构造出这棵二叉树。\n第五章：图\n考点16：图的基本概念\n🔴【图的定义】：由顶点（Vertex）和边（Edge）组成的数据结构。Graph = (V, E)。\n🔴【无向图】：边无方向（如：好友关系）。\n🔴【有向图】：边有方向（如：关注关系）。\n🔴【完全图】：任意两个顶点之间都有边相连。\n无向完全图有n(n-1)/2条边。\n有向完全图有n(n-1)条边。\n🔴【顶点的度】：\n无向图：度 = 与该顶点相连的边数。\n有向图：入度（指向该顶点的边）+出度（从该顶点出发的边）。\n🔵【度数公式】：无向图所有顶点度数之和等于边数的 2 倍；有向图所有顶点入度之和 = 出度之和 = 边数。\n⚫️【坑点】：图中任何两个节点之间都可能有逻辑关系，不是一对一或一对多。\n考点17：图的存储与连通性（高频补充）\n🔴【邻接矩阵】：用 n×n 矩阵表示顶点间是否有边，判断两点是否相邻为 O(1)，空间 O(n²)，适合稠密图。无向图的邻接矩阵关于主对角线对称。\n🔴【邻接表】：每个顶点保存其邻接点链表/集合，空间通常为 O(V+E)，适合稀疏图；检查一条边的成本与相关顶点的度有关。\n🔵【连通图】：无向图任意两顶点间都有路径称连通；有向图任意两顶点间彼此可达称强连通。\n🔵【生成树】：含图中全部 n 个顶点且连通、无环的子图，边数恰为 n-1。连通无向图才存在生成树；最小生成树常用 Prim 或 Kruskal 算法。\n🔵【最短路径】Dijkstra 适用于边权非负的单源最短路径；含负权边时不能直接套用。Floyd 可求所有顶点对最短路径。\n考点18：图的遍历\n🔴【深度优先搜索（DFS）】：使用栈（递归实现）。类似树的前序遍历。\n🔴【广度优先搜索（BFS）】：使用队列。类似树的层序遍历。\n⚫️【坑点】：深度优先搜索实现时需要用的数据结构是栈，广度优先搜索使用队列。\n🔵【复杂度前提】：采用邻接表时，DFS、BFS 的时间复杂度均为 O(V+E)；采用邻接矩阵时通常为 O(V²)。非连通图要从尚未访问的顶点重新启动，才能遍历全部顶点。\n第六章：查找与排序\n考点19：查找算法\n🔴【顺序查找】：\n适用：任意线性表（无序有序都可以）。\n时间复杂度：O(n)。\n在各元素查找概率相等且查找成功的前提下，平均查找长度为 (n+1)/2；查找失败的比较次数取决于实现和表结构。\n🔴【折半查找（二分查找）】：\n适用：有序的顺序存储表（要求随机存取）。\n时间复杂度：O(log₂n)。\n每次比较使搜索范围缩小一半。\n不能用于链表（链表不能随机存取）。\n🔵【最大比较次数】：含 n 个元素的有序顺序表，成功或失败查找的比较次数上界通常为 ⌊log₂n⌋+1（不同循环边界写法可能使失败统计口径略有差异）。\n⚫️【坑点】：\n二分查找要求线性表必须以顺序方式存储，且节点按关键字有序排序。\n折半查找（二分查找）也称二分搜索、对数搜索。\n考点20：树表查找与散列查找（高频补充）\n🔴【二叉排序树 BST】：对任一结点，左子树关键字通常小于该结点，右子树关键字通常大于该结点（重复关键字如何处理由实现约定）；中序遍历得到有序序列。\n🔵【查找复杂度】：BST 查找、插入、删除均为 O(h)，h 为树高。树较平衡时约 O(log n)，退化成单链时为 O(n)，不能一概写成 O(log n)。\n🔴【平衡二叉树 AVL】：任一结点左右子树高度差的绝对值不超过 1，结点平衡因子只能为 -1、0、1；通过旋转维持平衡，查找为 O(log n)。\n🔴【堆】：堆是一棵完全二叉树。大根堆中每个父结点关键字不小于孩子，根最大；小根堆相反。堆只保证父子间偏序，**中序遍历不一定有序**。\n🔴【散列表 Hash Table】：散列函数把关键字映射到表地址；不同关键字映射到同一地址称冲突。常用处理方法有开放定址法（线性探测、二次探测等）和链地址法。\n🔵【散列效率前提】：散列查找平均可接近 O(1)，但依赖散列函数、装填因子和冲突处理；冲突严重时最坏可退化为 O(n)。散列表通常不支持按关键字有序遍历。\n考点21：排序算法（高频对比）\n1. 插入类排序\n🔴【直接插入排序】：将元素逐个插入已排序的有序序列中。\n时间复杂度：最好 O(n)，最坏 O(n²)，平均 O(n²)。\n稳定排序。\n2. 交换类排序\n🔴【冒泡排序（Bubble Sort）】：两两比较，反序则交换，直到没有反序记录为止。\n时间复杂度：带“本趟无交换则提前结束”标志的改进实现最好 O(n)；朴素固定趟数实现即使已有序仍可能 O(n²)。最坏、平均 O(n²)。\n稳定排序。\n记忆口诀：大的往下沉，小的往上冒。\n🔴【快速排序（Quick Sort）】：选一个基准元素，将序列划分为“不大于/不小于”基准的区域（具体等号归属取决于划分算法），再递归排序子区间。\n时间复杂度：最好/平均O(nlog₂n)，最坏O(n²)。\n当总选首元素或尾元素为基准时，初始序列正序或反序会造成极不平衡划分，是典型最坏情况；随机选基准、三数取中或三路划分可降低该风险，因此不能说所有快速排序实现遇到有序序列都必然最坏。\n不稳定排序。\n原地实现、缓存友好，实践中平均性能常很好，但不能绝对表述为“任何数据和平台上最快”。\n3. 选择类排序\n🔴【简单选择排序】：每趟找出最小（或最大）元素，放到序列起始位置。\n时间复杂度：始终O(n²)。\n不稳定排序。\n🔴【堆排序】：利用堆的数据结构进行排序。\n时间复杂度：O(nlog₂n)。\n不稳定排序。\n4. 其他排序\n🔴【希尔排序（Shell Sort）】：插入类排序法。按一定间隔分组，分别进行直接插入排序。\n属于插入类排序，不是交换类或选择类。\n时间复杂度与增量序列有关，不能脱离增量统一给出最好、平均、最坏界；常见基础教材按所指定的增量分析。希尔排序不稳定。\n5. 归并排序\n🔴【归并排序（Merge Sort）】：把序列递归分成子序列，分别排序后再合并。\n🔵【复杂度与性质】：最好、平均、最坏时间复杂度均为 O(nlog₂n)；常见数组实现需要 O(n) 辅助空间；稳定。适合外部排序及链表排序。\n⚫️【坑点】：\n希尔排序属于插入类排序法。\n冒泡排序的基本思想是两两比较，反序交换。\n“快速排序在正序或反序时最坏”需要以固定选首/尾元素作基准等划分策略为前提。\n选择排序第一次交换：从“2，6，4，1”从大到小选最大6与第一个交换 →6，2，4，1。\n📊 终极复杂度/性质记忆表（考前过一遍）\n⚫️【稳定排序总结】：\n稳定的：直接插入排序、冒泡排序、归并排序。（口诀：冒泡直接归并稳）\n不稳定的：希尔、选择、堆、快速。（口诀：希选快堆都不稳）\n📊 本章核心公式汇总\n🔥 本章高频简答题汇总\n1. 简述算法的五个重要特性。\n🔵【踩分点】：有穷性（有限步终止）、确定性（无二义）、可行性（可执行）、输入（0个或多个）、输出（1个或多个）。\n2. 简述数组和链表的区别。\n🔵【踩分点】：① 数组/顺序表占用连续内存空间，链表不要求连续。② 数组随机存取，链表顺序存取。③ 顺序表插入/删除通常需移动元素；链表在已定位时只需修改链接。④ 顺序表存储密度高，链表有指针开销。⑤ 二者操作复杂度都要结合“是否已定位”和具体实现说明。\n3. 简述栈和队列的区别。\n🔵【踩分点】：① 栈后进先出（LIFO），队列先进先出（FIFO）。② 栈只在一端操作，队列在两端操作。③ 栈常用于函数调用、递归，队列常用于缓冲区、层序遍历。\n4. 简述二叉树的前序、中序、后序遍历方法。\n🔵【踩分点】：①前序：根 → 左 → 右。②中序：左 → 根 → 右。③后序：左 → 右 → 根。\n5. 简述折半查找的基本思想。\n🔵【踩分点】：在有序表中，取中间元素与目标比较。相等则查找成功；目标小于中间值，则在左半区继续查找；目标大于中间值，则在右半区继续查找。每次比较使搜索范围缩小一半。\n口诀速记\n“算法五要有穷确，可行输入输出全；线性表序和链表，顺序存密链插简；栈后进先出递归用，队列先进先出层序游；二叉树前根左右，中左右根，后左右根；堆排快排不稳当，冒泡插入最稳当；二分查找O(log n)，有序顺序是前提。”\n【表格1】\n\n对比维度（🔴） | 顺序表（⚫️） | 链表（⚫️）\n存储空间 | 连续 | 无需连续（物理上也可能恰好相邻）\n存取方式 | 随机存取 | 顺序存取\n插入/删除 | 通常需移动元素，O(n) | 已定位时改链接 O(1)，定位可能 O(n)\n存储密度 | 高（≈1） | 低（<1，有指针开销）\n空间分配 | 可静态或动态分配连续区域，扩容可能搬迁 | 通常逐结点动态分配\n适用场景 | 频繁查询（取元素） | 频繁插入/删除\n\n【表格2】\n\n排序算法（🔴） | 最好时间复杂度 | 最坏时间复杂度 | 平均时间复杂度 | 稳定性（⚫️）\n直接插入排序 | O(n) | O(n²) | O(n²) | ✅ 稳定\n冒泡排序（带提前结束标志） | O(n) | O(n²) | O(n²) | ✅ 稳定\n希尔排序 | 依增量序列 | 依增量序列 | 依增量序列 | ❌ 不稳定\n简单选择排序 | O(n²) | O(n²) | O(n²) | ❌ 不稳定\n堆排序 | O(nlog₂n) | O(nlog₂n) | O(nlog₂n) | ❌ 不稳定\n快速排序（常规划分） | O(nlog₂n) | O(n²) | O(nlog₂n) | ❌ 不稳定\n归并排序 | O(nlog₂n) | O(nlog₂n) | O(nlog₂n) | ✅ 稳定\n\n【表格3】\n\n内容（🔴） | 公式（🔵）\n二叉树第i层最大节点数 | 2^(i-1)\n深度k的二叉树最大节点数 | 2^k - 1\n叶子节点数关系（任意二叉树） | n0 = n2 + 1\n完全二叉树深度 | ⌊log₂n⌋ + 1\n完全二叉树父子关系（从1编号且孩子存在） | 左=2i，右=2i+1，父=⌊i/2⌋\n折半查找时间复杂度 | O(log₂n)\n顺序查找成功的平均查找长度（等概率） | (n+1)/2\n无向完全图边数 | n(n-1)/2\n"},{"name":"编程语言","text":"# 📚 编程语言\n\n> **使用说明**：\n> 🔴 **红色** = 一级考点 / 核心术语 / 判断改错点（背下来）\n> 🔵 **蓝色** = 简答题踩分关键词 / 语法规则 / 易混淆区分（考试时写上去就是分）\n> ⚫️ **黑色** = 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n>\n> **课程主线**：按高校程序设计基础常见期末范围，统一为 **C 语言 + Python 3**。C 侧重表达式、控制结构、数组、函数、指针、结构体和文件；Python 侧重内置对象、容器、控制结构、函数与文件。Visual Basic 不再作为独立考试章节。\n\n## 第一部分：C语言\n### 考点1：C语言概述\n- **🔴【C程序结构】**：按标准的宿主环境 C 程序口径，一个程序由一个或多个函数组成，并有一个程序入口 `main`。推荐写作 `int main(void)` 或 `int main(int argc, char *argv[])`；`void main()` 不是 ISO C 的标准形式。嵌入式等独立环境可以不以 `main` 为入口，考试未说明时按宿主环境作答。\n- **🔴【C程序运行步骤】**：**编辑 → 编译 → 连接 → 运行**。\n- **⚫️【坑点】**：`main()`函数可以在程序文件的**任何位置**，不一定在开头或结尾。\n### 考点2：C语言标识符规则\n- **🔴【命名规则】**：\n1. 只能由**字母、数字、下划线**组成。\n2. 第一个字符**必须是字母或下划线**（不能是数字）。\n3. **区分大小写**（`abc`和`ABC`是不同的变量）。\n4. **不能使用C关键字**（如：if、case、switch、int、float、return等）。\n- **⚫️【坑点】**：\n- `_int&int` → **不合法**（含`&`特殊符号）。\n- `_Int` → **合法**（下划线开头）。\n- `intint` → **合法**（不是关键字）。\n- `case` → **不合法**（是关键字）。\n### 考点3：C语言数据类型\n- **🔴【基本类型】**：\n- `char`：字符型，按 C 语言定义恒为 **1 个 C 字节**；一个字节至少 8 位。\n- `short`、`int`、`long` 的精确字节数由实现决定，标准只保证 `sizeof(char) ≤ sizeof(short) ≤ sizeof(int) ≤ sizeof(long)` 以及各自的最小取值范围。\n- 在多数当前 32/64 位教学环境中，`short` 常为 2 字节、`int` 常为 4 字节、`float` 常为 4 字节、`double` 常为 8 字节；题目指定编译器或存储模型时以题设为准。\n- **🔴【常量的合法判断】**：\n- `1.234e04` → **合法**（1.234×10⁴）。\n- `1.234e0.4` → **不合法**（指数必须是整数）。\n- `1.234e4` → **合法**。\n- `1.234e0` → **合法**。\n- **⚫️【坑点】**：在试题常用实现中，`double` 一般为 64 位（8 字节），但不能把实现相关的 `sizeof` 结论写成所有 C 平台都必须如此。\n### 考点4：C语言运算符\n- **🔴【自增自减运算符】**：\n- `i++`：表达式的值是递增前的 i，随后产生 i 加 1 的副作用。\n- `++i`：先使 i 加 1，表达式的值是递增后的 i。\n- *例*：`int i=1; j=-i++;` → i=**2**，j=**-1**（先取i=1，j=-1，再i自增为2）。\n- **🔴【逗号表达式】**：取**最右边表达式**的值。`a=2*6, a*3, a+5` → a=12，表达式值为12+5=**17**。\n- **🔴【条件运算符（三目运算符）】**：`表达式1 ? 表达式2 : 表达式3`。`int a=7,b=9; t=(a>b)?a:b;` → t=**9**（a>b为假，取b）。\n- **🔴【逻辑运算符】**：\n- `&&`（与）：两个都为真才为真。\n- `||`（或）：一个为真即为真。\n- `!`（非）：取反。\n- **🔵【短路求值】**：`a && b` 在 a 为假时不再求值 b；`a || b` 在 a 为真时不再求值 b。可用于防止非法运算，如 `p != NULL && p->value > 0`。\n- **🔵【整数除法】**：两个整数相除仍为整数；C99 及以后标准规定商向 0 截断，如 `-7/3 == -2`，余数满足 `(a/b)*b + a%b == a`，因此 `-7%3 == -1`。\n- **⚫️【坑点】**：\n- 赋值运算符`=`的结合方向是**“自右至左”**。\n- `strcmp(a, b) == 0` 才表示两个字符串内容相等；`if (strcmp(a,b))` 在字符串**不相等**时条件为真。\n- `scanf(\"%d%d%d\", &x, &y, &z)` → 正确的输入语句，`&`取地址。\n- 不要在同一个未规定求值顺序的表达式中多次修改同一标量，例如 `i = i++ + ++i` 会产生未定义行为，不能机械套用“先用后加”求唯一答案。\n- 赋值、条件运算符以及多数一元运算符等均具有从右到左的结合性；不能说“只有赋值运算符从右结合”。结合性也不等同于操作数实际求值顺序。\n### 考点5：C语言流程控制\n- **🔴【if-else语句】**：\n```c\nif (条件) {\n语句1;\n} else {\n语句2;\n}\n```\n- **🔴【switch语句】**：\n```c\nswitch(表达式) {\ncase 值1: 语句1; break;\ncase 值2: 语句2; break;\ndefault: 语句3;\n}\n```\n- **🔴【循环结构】**：\n- `for(i=0; i<5; i++)` → 循环体执行 **5** 次（i=0,1,2,3,4）。\n- `while(条件)` → 先判断后执行。\n- `do-while(条件)` → 先执行后判断，循环体**至少执行一次**。\n- **⚫️【程序阅读真题】**：\n- `for(x=0,y=0; (y!=1234) && (x<5); x++)` → 执行 **5** 次（x=0~4）。\n- `switch(i){ case 9: i+=1; case 10: i+=1; case 11: i+=1; default: i+=1; }` → i=10，无break，依次执行case10、case11、default → i=**13**。\n### 考点6：C语言函数\n- **🔴【函数的定义】**：`返回值类型 函数名(参数列表) { 函数体 }`。\n- **🔴【形参与实参】**：形参是函数定义时的参数，实参是调用时传入的值。形参的修改**不影响**实参（值传递）。\n- **🔵【指针传参辨析】**：C 始终按值传递。传入指针时复制的是地址值，函数可通过该地址修改调用者对象；这不是语言层面的“引用传递”。数组形参在函数参数位置会调整为指针类型。\n- **🔴【递归函数】**：函数调用**自身**。\n```c\nint x(int n) {\nif (n <= 3) return 1;\nelse return x(n-2) + x(n-4) + 1;\n}\n```\n- **⚫️【程序阅读真题】**：\n- `void fun(int x,int y,int z){ z=x*x+y*y; } int main(void){ int a=31; fun(5,2,a); printf(\"%d\",a); return 0; }` → 输出 **31**（形参 z 的修改不影响实参 a）。旧教材省略函数返回类型的写法不符合 C99 及以后标准。\n- 递归函数`x(x(8))`需要计算 **18** 次x函数。\n- **⚫️【递归前提】**：递归必须有可到达的终止条件，并使问题规模趋近终止条件；否则可能无限递归并耗尽调用栈。\n### 考点7：C数组、指针与字符串（期末高频）\n- **🔴【数组】**：同一数组的元素类型相同，并按下标顺序连续存放；长度为 n 的数组合法下标为 0～n-1。越界访问属于未定义行为，编译器不一定报错。\n- **🔵【数组名退化】**：在大多数表达式中，数组名会转换为指向首元素的指针；但作为 `sizeof`、一元 `&` 等运算的操作数时不发生该转换。数组名本身不是可修改的指针变量。\n- **🔴【指针】**：`&x` 取得 x 的地址，`*p` 访问 p 所指对象。使用未初始化、已释放或空指针解引用都会产生未定义行为。\n- **🔵【字符串】**：C 字符串是以空字符 `\\0` 结尾的字符序列。字符数组容量必须为正文字符数加 1，例如 `char s[]=\"abc\"` 占 4 个字节。\n- **⚫️【输入陷阱】**：`scanf(\"%s\", s)` 遇空白停止且必须限制宽度以防溢出；读取整行更适合用 `fgets`。字符串内容比较使用 `strcmp`，不能用 `==` 比较字符数组内容。\n- **🔵【变量作用域与生存期】**：局部变量通常具有块作用域；文件作用域变量常称全局变量。局部 `static` 变量只初始化一次，生存期贯穿程序执行，但作用域仍限于所在块。\n## 第二部分：Python语言\n### 考点8：Python概述\n- **🔴【Python特点】**：\n- Python 通常以解释器运行，但“解释型/编译型”取决于实现：CPython 会先把源代码编译为字节码，再由虚拟机执行。因此“Python 完全不编译”是错的。\n- 可调用C语言编写的底层代码（**黏性扩展**）。\n- **平台无关**（可在Windows、Linux、Mac等平台运行）。\n- 通过缩进表示代码块，强调可读性。\n- **变量无需声明**，赋值即创建。\n- **⚫️【坑点】**：不能脱离实现和任务笼统断言 Python 一定比所有编译型语言慢。Python 广泛用于 Web、数据分析、人工智能、自动化和教学，也能参与系统工具开发；“只能用于某一领域”通常是错误表述。\n### 考点9：Python语法规则\n- **🔴【缩进】**：Python 用缩进表示代码块。同一代码块必须保持一致；PEP 8 **建议**每级 4 个空格，但“语法强制只能用4个空格”是错的。Tab 与空格不一致可能触发 `TabError` 或改变层级。\n- **🔴【注释】**：\n- 单行注释：`# 注释内容`\n- 严格说 Python 没有专门的“多行注释”语法；`'''...'''` 或 `\"\"\"...\"\"\"` 是三引号字符串。未赋给变量的独立字符串常被当作说明文字，模块、类、函数开头的三引号字符串是文档字符串（docstring）。\n- **🔴【变量】**：名字通常无需预先声明，赋值会建立名字与对象的绑定。**对象有类型，变量名本身不固定绑定某一种类型**，因此同一名字可先后绑定不同类型对象。\n- **⚫️【坑点】**：\n- 所有代码都必须在行前至少加一个空格 → **错**！只有需要缩进的代码块才需要缩进。\n- 已知`x=1.5`，赋值`x='china'`**不会报错**（Python变量可以改变类型）。\n### 考点10：Python数据类型与运算\n- **🔴【基本数据类型】**：\n- `int`：整数。\n- `float`：浮点数。\n- `bool`：布尔值（True/False）。\n- `complex`：复数。\n- `str`：字符串。\n- **🔴【运算符】**：\n- `/`：除法（结果为浮点数）。`3.0/5 = 0.6`\n- `//`：向负无穷取整的商（floor division），不是简单“截去小数”。`3//5 = 0`，但 `-3//2 = -2`。\n- `%`：取余。\n- `**`：乘方。\n- **🔴【序列类型】**：元素具有先后次序，可通过整数索引访问，并通常支持切片。\n- 字符串（str）、**元组（tuple）**、**列表（list）**、`range` 都是常见序列类型。\n- **字典（dict）** 是映射类型，**不是**序列类型！\n- **🔴【列表操作】**：\n- 列表中的元素**可以是不同数据类型**。\n- 列表是**可变对象**，`append()` 原地修改同一个列表，因此列表对象的 `id` 不变；但其内部存储区可能重新分配，不能表述为“所有内存地址都不变”。\n- **⚫️【程序阅读真题】**：\n- `x = 12 + 3 * ((5 * 8) - 14) // 6; print(x)` → 25。\n- `for i in range(1,6): if i%4==0: continue; else: print(i)` → 输出 **1,2,3,5**（4被跳过）。\n- `x = 'R\\OS\\OT'; print(len(x))`：`\\O` 不是 Python 定义的转义序列；按当前常见实现保留反斜杠，长度为 **7**，并可能产生无效转义警告。表达 Windows 路径宜写原始字符串 `r'R\\OS\\OT'` 或转义反斜杠 `'R\\\\OS\\\\OT'`，二者长度同为 7。\n### 考点11：Python流程控制\n- **🔴【条件判断】**：\n```python\nif 条件:\n语句块\nelif 条件:\n语句块\nelse:\n语句块\n```\nPython支持链式比较：`4 <= 5 <= 6` → **True**。\n- **🔴【循环】**：\n```python\nfor i in range(1, 10, 2):   # i = 1,3,5,7,9\n循环体\nwhile 条件:\n循环体\n```\n- **🔴【break与continue】**：\n- `break`：**终止整个循环**。\n- `continue`：**结束本次循环**，进入下一次循环。\n- **⚫️【坑点】**：`break`用来结束当前循环语句，**但跳出当前循环体**（是跳出，不是不跳出）。\n### 考点12：Python容器、切片与函数（高频补充）\n- **🔴【可变与不可变】**：列表、字典、集合通常可变；数字、字符串、元组、`frozenset` 不可变。元组不可变是指元组保存的引用序列不能改，元组内部若引用可变对象，该对象本身仍可能被修改。\n- **🔵【切片规则】**：`s[start:stop:step]` 左闭右开，不包含 `stop`；`s[::-1]` 常用于逆序。索引越界通常抛出 `IndexError`，普通切片越过边界会自动截断。\n- **🔵【字典与集合】**：字典按键访问，键必须可哈希；集合元素互异且可哈希。Python 3.7 起语言规范保证字典保持插入顺序，但“集合按插入顺序输出”没有保证。\n- **🔵【函数参数】**：Python 采用“对象引用按值传递/共享传参”。函数可原地修改传入的可变对象，但给形参重新赋值不会让调用者变量改绑。\n- **⚫️【默认参数陷阱】**：默认参数在函数定义时求值一次。避免 `def f(a=[]): ...` 造成多次调用共享同一列表，常写成 `def f(a=None): a = [] if a is None else a`。\n- **⚫️【作用域口诀】**：名字查找遵循 LEGB：Local（局部）→ Enclosing（闭包外层）→ Global（全局）→ Built-in（内置）。函数内给全局变量赋值需声明 `global`；修改外层函数变量绑定使用 `nonlocal`。\n### 考点13：C 与 Python 易混对照（判断题高频）\n- **🔴【相等与赋值】**：C/Python 赋值都用 `=`，相等比较都用 `==`；Python 的 `is` 比较对象身份，不能替代一般的值相等判断。\n- **🔵【逻辑运算】**：C 用 `&&/||/!`，结果按真假语义求值；Python 用 `and/or/not`，其中 `and/or` 返回参与运算的对象之一，不保证只返回 `True/False`。\n- **🔵【整除与取余】**：C 整数 `/` 向零截断；Python `//` 向下取整，因此负数结果可能不同。两者 `%` 都用于求余，但负操作数时结果符号规则随语言语义不同。\n- **🔵【下标与区间】**：C 数组从 0 开始且没有自动边界检查；Python 序列从 0 开始、支持负索引，切片遵循左闭右开。\n- **🔵【参数传递】**：C 是值传递，传地址可间接修改外部对象；Python 是对象共享传参，可变对象可原地修改，给形参重新绑定不改变调用者变量绑定。\n- **⚫️【版本前提】**：Python 题未注明时通常按 Python 3；C 题要留意标准版本、编译器和数据模型，不能把特定实现的字节数当作所有平台定律。\n## 口诀速记\n> **“C与Python都分大小，赋值单等比较双等；**\n> **C的char是一字节，其他字节看实现；**\n> **i++先用后自增，++i先增后使用；**\n> **C整除向零截，Python双斜向下取；**\n> **Python缩进表示块，对象有类型名字可换；**\n> **列表可变原地改，字典是映射非序列。”**\n"},{"name":"计算机组成原理","text":"# 📚 计算机组成原理\n\n使用说明：🔴红色= 一级考点 / 核心术语 / 判断改错点（背下来）🔵蓝色= 简答题踩分关键词 / 计算公式 / 操作步骤动词（考试时写上去就是分）⚫️黑色= 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n第一章：计算机发展史\n考点1：早期电子计算机（题干限定词决定答案）\n🔴【ENIAC】：1946年公开运行于美国宾夕法尼亚大学，通常按我国基础教材口径称“世界上第一台通用电子数字计算机”，主要使用电子管。\n🔴【ENIAC的局限性】：早期主要通过插接线和开关设置程序，并非今天意义上的存储程序计算机，改换任务很不方便。\n🔴【存储程序计算机要分清】：EDVAC是冯·诺依曼等参与设计的早期存储程序方案；Manchester Baby（1948）通常被认为第一台运行存储程序的电子计算机；EDSAC（1949）是较早投入实际使用的存储程序计算机。\n⚫️【坑点】：题目若只问基础教材中的“第一台电子数字计算机”，通常答ENIAC；若题干出现“通用”“运行存储程序”“投入实际使用”等限定词，答案可能不同。ENIAC并不是由冯·诺依曼独立设计的。\n考点2：计算机的四代划分\n🔴【划分依据】：电子元器件（不是按体积、速度、价格！）。\n🔴【各代对应】：\n第1代（1946-1957）：电子管。机器语言，体积大、耗电多、速度慢。\n第2代（1958-1964）：晶体管。高级语言开始出现（FORTRAN、COBOL）。\n第3代（1965-1970）：中小规模集成电路。操作系统雏形出现。\n第4代（1971-至今）：大规模/超大规模集成电路。微型计算机诞生。\n⚫️【坑点】：判断题说“大规模集成电路是第三代计算机的标志” →错！是第四代！\n考点3：计算机之父的尊称（极易混淆）\n🔴【冯·诺依曼】：“现代计算机之父”（提出存储程序+程序控制，确定五大部件结构）。\n🔴【图灵】：“计算机科学之父”、“人工智能之父”（提出图灵机模型、图灵测试）。\n🔴【查尔斯·巴贝奇】：“通用计算机之父”（差分机/分析机的设计者）。\n🔴【阿塔纳索夫】：与贝里研制ABC计算机，它是早期电子数字计算装置，但属于专用、不可编程设备；“电子计算机之父”并非所有教材统一采用的唯一称号。\n⚫️【坑点】：题目问“计算机科学的奠基人/图灵机提出者”通常选图灵；问“存储程序思想或冯·诺依曼体系结构”通常选冯·诺依曼。尊称题必须服从题干和教材口径，不能只凭“某某之父”判断。\n考点4：计算机的特点与分类\n🔴【常见特点】：运算速度快、计算精度高、存储容量大、具有逻辑判断能力、自动化程度高、通用性强。\n🔴【自动工作的基础】：在存储程序控制下，计算机能按程序连续执行；“最关键特点”属于具体教材口径，不宜脱离题干绝对化。\n🔴【传统教材按规模/性能分类】：巨型机、大型机、中型机、小型机、微型机；现代设备边界已不完全由体积或单项速度决定。\n巨型机：“神威·太湖之光”、“天河二号”。\n微型机：PC（个人计算机），以微处理器为核心。\n⚫️【坑点】：世界上第一台计算机ENIAC是巨型机，不是个人计算机。个人计算机（PC）是第四代才出现的。\n第二章：冯·诺依曼体系结构\n考点5：核心设计思想（简答题必背！）\n🔴【思想名称】：“存储程序”与“程序控制”（合称“存储程序控制原理”）。\n🔵【三大核心要点】：\n计算机内部采用二进制表示数据和指令。\n将编好的程序和数据事先存入内存储器（存储程序）。\n计算机在工作时，控制器自动、逐条地从内存中取出指令并加以执行（程序控制）。\n⚫️【坑点】：计算机之所以能“自动连续”工作，最直接的原因是采用了“存储程序控制”，而不是“运算速度快”或“有逻辑判断能力”。\n考点6：硬件五大部件（极高频填空/多选）\n🔴【五大部件】：运算器、控制器、存储器、输入设备、输出设备。\n🔴【CPU的基本组成】：运算器 + 控制器；从实际结构看还包含寄存器组，现代CPU通常集成多级Cache等部件。基础选择题常按“运算器+控制器”作答。\n🔴【主机的组成】：CPU + 内存（主存储器）。（注意：主机不包括外存！）\n🔵【各部件核心功能】：\n⚫️【坑点】：\n运算器不包括译码器（译码器属于控制器）。\n话筒是输入设备（把声音变成电信号），不是输出设备！\n触摸屏既是输入设备（触摸操作），又是输出设备（显示画面）。\n磁盘驱动器（硬盘/U盘）既是输入设备又是输出设备（可读可写）。\n第三章：CPU与指令系统\n考点7：CPU的性能指标\n🔴【机器字长】：CPU定点运算器一次能处理的二进制数据位数（常见32位、64位）。在其他条件相近时，字长会影响整数表示范围、运算精度和寻址/处理能力，但不能单独决定整机性能。\n🔴【主频】：CPU时钟频率（常用GHz）。同一微体系结构且其他条件相近时，主频提高通常可缩短CPU时间；跨架构比较时不能据此断定谁更快。\n🔴【性能指标】：可用执行时间、吞吐率、CPI、IPC、MIPS等描述。MIPS只适合在指令系统和测试负载相近时参考，不能脱离程序直接横向比较。\n🔵【MIPS计算公式】：MIPS = 主频(Hz) / (CPI × 10⁶)，其中CPI是执行一条指令所需的平均时钟周期数。\n🔵【CPU执行时间】：CPU时间 = 指令数 × CPI × 时钟周期 = 指令数 × CPI / 主频。\n⚫️【坑点】：整机性能由CPU、内存层次、I/O、软件和工作负载共同决定，不能写成“只由CPU或主频决定”。“Pentium 4”是处理器系列名称。\n考点8：CPU不能直接访问的存储器\n🔴【核心结论】：CPU不能直接访问外存储器（硬盘、U盘、光盘等）。\n🔵【正确流程】：外存中的数据必须先调入内存（RAM），CPU才能通过数据总线访问。\n⚫️【坑点】：判断题说“CPU可以直接读取硬盘中的程序并执行” →错！必须先调入内存。\n考点9：指令的执行过程\n🔴【三大步骤】：每条指令的执行分为三个阶段：\n取指令：控制器从内存中取出指令，送入指令寄存器（IR）。\n分析指令：指令译码器对操作码进行译码，确定要执行什么操作。\n执行指令：控制器发出控制信号，指挥各部件完成操作。\n🔴【指令的组成】：操作码（规定做什么）+地址码/操作数（规定对谁做）。\n⚫️【坑点】：在冯·诺依曼结构中，指令和数据都以二进制形式存入存储器；某段二进制被当作指令还是数据，取决于程序执行上下文、地址和控制器的解释。不能简单说“仅靠取指/执行两个时间阶段区分”，执行阶段也可能不访存。\n考点10：CISC 与 RISC（拔高题）\n🔴【CISC（复杂指令集）】：\n通常指令种类和寻址方式较丰富，单条指令可完成较复杂功能；指令长度可能可变。\n代表：Intel x86 架构（PC电脑的CPU）。\n传统实现常采用微程序控制，但现代CISC处理器内部也大量采用硬布线、流水线和微操作转换；“一定功耗高、对编译器要求低”不是定义性结论。\n🔴【RISC（精简指令集）】：\n指令系统精简高效，指令长度固定，格式规整。\n代表：ARM 架构（手机、平板、嵌入式设备）。\n典型特点：指令格式规整、寻址方式较少、强调寄存器操作和Load/Store结构，利于流水线；不等于每条指令都单周期，也不保证任何RISC都比CISC更快或更省电。\n⚫️【坑点】：RISC的指令种类少（精简），不是多！说“RISC指令种类多”是错的。\n第四章：存储器系统（极高频，细节极多）\n考点11：存储器的层次结构\n🔴【速度由快到慢】：寄存器（CPU内部） > Cache（高速缓存） > 内存（主存） > 外存（硬盘/U盘）。\n🔴【容量由小到大】：寄存器 < Cache < 内存 < 外存。\n🔴【价格由高到低】：寄存器 > Cache > 内存 > 外存。\n🔴【引入Cache的目的】：解决CPU 与 内存（主存）之间速度不匹配的矛盾。\n⚫️【坑点】：Cache是为了解决CPU和内存的速度矛盾，不是解决内存和外存的矛盾！也不是为了解决容量矛盾！\n考点12：内存（主存） vs 外存（辅存）—— 必考对比\n🔴【内存（主存）】：\n速度快、容量小、价格高。\n其中RAM通常具有易失性，断电后其数据消失；主存概念也可能包括少量ROM，因此不能把“内存”与“RAM”在所有语境下完全等同。\n存放正在运行的程序和数据。\nCPU可以直接访问。\n🔴【外存（辅存）】：\n速度慢、容量大、价格低。\n断电后数据保存。\n存放暂时不用的程序和数据。\nCPU不能直接访问（需先调入内存）。\n⚫️【坑点】：相同容量的内存比外存贵得多，但速度快得多。判断题说“相同容量的内存和外存价格差不多” →错！\n考点13：ROM vs RAM（选择填空必出）\n🔴【RAM（随机存取存储器）】：\n特点：可读可写，断电丢失数据（易失性）。\n作用：存放当前正在运行的程序和数据（就是我们的内存条）。\nSRAM（静态RAM）：速度快，用作Cache（高速缓存）。\nDRAM（动态RAM）：速度较慢，用作主存（需要周期性刷新）。\n🔴【ROM（只读存储器）】：\n基本特征是非易失、正常运行时以读为主。掩膜ROM出厂固化；PROM可一次编程，EPROM/EEPROM/Flash可按相应方式擦写，因此“所有ROM永远不能写”是错误表述。\n作用：存放BIOS（基本输入输出系统）等固定程序。\n注：PROM只能编程一次；EPROM可用紫外线擦除后重写；EEPROM可电擦写。基础题中的“只读”强调正常使用方式，不代表所有ROM技术物理上绝对不可改写。\n⚫️【特别警示】：\nBIOS（基本输入输出系统）存放在ROM中。\nCMOS（互补金属氧化物半导体）是主板上的一块RAM芯片，靠电池供电保存日期/时间/密码等设置信息。CMOS设置程序在BIOS中。\n判断题说“BIOS存放在CMOS中” →错！BIOS在ROM中，CMOS是存设置参数的。\n考点14：存储容量计算\n🔴【基本单位】：字节（Byte，简称B）是存储容量的基本单位。位（bit，简称b）是数据的最小单位。\n🔵【二进制容量换算（传统考试口径）】：1B = 8bit；1KB = 1024B；1MB = 1024KB；1GB = 1024MB；1TB = 1024GB。严格的IEC记号中1024B=1KiB，而SI中的1kB=1000B；做题按题干口径使用。\n🔵【汉字存储空间计算】：\n一个16×16点阵汉字占：16×16/8 = 32字节。\n一个24×24点阵汉字占：24×24/8 = 72字节。\n一个32×32点阵汉字占：32×32/8 = 128字节。\n公式：存储空间(字节) = (点阵行数 × 点阵列数) / 8。\n🔴【字符占用空间要看编码】：GB2312/GBK常用双字节表示汉字，标准ASCII字符占1字节；UTF-8中常用汉字通常占3字节，UTF-16中常见汉字通常占2字节、部分字符占4字节。\n⚫️【坑点】：只有题目明确采用“双字节汉字机内码”时，2KB才可按1024个汉字计算；不能把“任意汉字在任何编码中固定占2字节”当作通则。\n考点15：地址总线与内存容量的关系\n🔴【关键结论】：地址总线的宽度（根数）决定了CPU的寻址范围（最大内存容量）。\n🔵【计算公式】：最大内存容量（字节）= 2^(地址总线根数)（按字节编址时）。\n⚫️【坑点】：公式必须写清“按字节编址”；若按字编址，最大可寻址容量还要乘每个编址单位的字节数。地址总线宽度给出的是可寻址上限，实际安装主存还受芯片组、主板、操作系统等限制。数据总线宽度影响一次并行传送的数据位数。\n考点15A：Cache命中率与平均访问时间（高频计算）\n🔴【局部性基础】：Cache利用时间局部性和空间局部性，把近期可能使用的主存块副本保存在更快的存储器中。\n🔵【命中率】：命中率 h = Cache命中次数 / 总访问次数；失效率 = 1-h。\n🔵【平均访问时间】：若先查Cache、失效后再访问主存，可按题目时序写为 T = h×Tc + (1-h)×(Tc+Tm)；若题目规定Cache与主存并行访问，公式会不同，必须看题干。\n⚫️【映射方法】：直接映射实现简单但冲突较多；全相联冲突少但硬件复杂；组相联是二者折中。写策略常见写直达（Write Through）与写回（Write Back）。\n第五章：I/O设备与总线\n考点16：输入/输出设备分类（务必分清）\n🔴【常见输入设备】：键盘、鼠标、扫描仪、话筒、摄像机、条码阅读器、触摸屏（兼输出）。\n🔴【常见输出设备】：显示器、打印机、音箱、绘图仪、投影仪。\n🔴【兼有输入/输出功能】：触摸显示屏既显示又接收触控；可读写存储设备在I/O数据流角度可输入和输出，但硬盘、U盘通常归入外存/存储设备，分类要看题干口径。\n⚫️【坑点】：\n扫描仪是输入设备（纸上的图→电子版），不是输出设备！\n投影仪是输出设备（电脑画面→投影幕布），不是输入设备！\n打印机用DPI（每英寸点数）衡量打印精度，DPI越高打印越清晰。\n喷墨打印机耗材是墨盒；激光打印机耗材是硒鼓。\nDPI是衡量打印分辨能力的重要指标之一；打印质量还受墨粉/墨水、色彩、纸张、机械精度等影响，不能只由DPI决定。\n考点17：显示器性能指标\n🔴【常考指标】：分辨率（屏幕像素矩阵，如1920×1080）是重要指标之一；显示效果还与尺寸、像素密度、刷新率、色域、亮度等有关。\n🔴【其他指标】：点距（越小越清晰）、刷新率（越高越流畅）、颜色质量（色深）。\n⚫️【坑点】：显示系统的主要性能指标是分辨率、颜色质量、刷新速度，不包括内存容量。\n考点18：系统总线（极高频）\n🔴【总线的英文】：BUS（注意不是UBS，也不是UPS！UPS是不间断电源，UBS是公司名）。\n🔴【系统总线分类（按传输信息）】：\n数据总线（DB）：传输数据。双向。宽度（位数）决定了CPU一次能传输的数据量。\n地址总线（AB）：传输地址。单向（由CPU发出）。宽度决定了寻址范围（最大内存容量）。\n控制总线（CB）：传输读/写、中断、总线请求/响应等控制与状态信号；各条线有各自方向，作为一组通常包含双向的信息流。\n🔵【理想峰值带宽】：带宽 = 每次传输字节数 × 每秒传输次数。若每个时钟只传一次，才可写为（总线宽度/8）×总线频率；DDR或突发传输还要乘每周期传输次数等系数。\n例：32位总线，33MHz → 带宽 = (32/8) × 33 = 4×33 = 132 MB/s。\n⚫️【坑点】：\n决定CPU与外部进行一次数据传输信息量的是数据总线宽度。\n决定主存储器大小的是地址总线宽度。\n数据、地址、控制是“系统总线按所传信息”的三类；按位置或用途还可分片内总线、系统总线、I/O总线等，不能说所有总线在任何分类下都只有三种。\n第六章：I/O数据传送控制方式\n考点19：三种控制方式（高频多选/判断）\n🔴【方式1：程序控制I/O】：无条件传送适用于外设总能按约定及时就绪的简单场景；程序查询方式由CPU反复读取状态并在就绪后传送，两者不宜完全等同。\nCPU主动、不断查询外设状态（“忙不忙？好了没？”）。\n缺点：CPU大量时间浪费在查询等待上，效率极低。\n🔴【方式2：中断方式】：\n外设准备好后，主动向CPU发中断请求，CPU暂停当前工作去处理。\n优点：CP
