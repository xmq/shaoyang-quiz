S是不间断电源，UBS是公司名）。\n🔴【系统总线分类（按传输信息）】：\n数据总线（DB）：传输数据。双向。宽度（位数）决定了CPU一次能传输的数据量。\n地址总线（AB）：传输地址。单向（由CPU发出）。宽度决定了寻址范围（最大内存容量）。\n控制总线（CB）：传输读/写、中断、总线请求/响应等控制与状态信号；各条线有各自方向，作为一组通常包含双向的信息流。\n🔵【理想峰值带宽】：带宽 = 每次传输字节数 × 每秒传输次数。若每个时钟只传一次，才可写为（总线宽度/8）×总线频率；DDR或突发传输还要乘每周期传输次数等系数。\n例：32位总线，33MHz → 带宽 = (32/8) × 33 = 4×33 = 132 MB/s。\n⚫️【坑点】：\n决定CPU与外部进行一次数据传输信息量的是数据总线宽度。\n决定主存储器大小的是地址总线宽度。\n数据、地址、控制是“系统总线按所传信息”的三类；按位置或用途还可分片内总线、系统总线、I/O总线等，不能说所有总线在任何分类下都只有三种。\n第六章：I/O数据传送控制方式\n考点19：三种控制方式（高频多选/判断）\n🔴【方式1：程序控制I/O】：无条件传送适用于外设总能按约定及时就绪的简单场景；程序查询方式由CPU反复读取状态并在就绪后传送，两者不宜完全等同。\nCPU主动、不断查询外设状态（“忙不忙？好了没？”）。\n缺点：CPU大量时间浪费在查询等待上，效率极低。\n🔴【方式2：中断方式】：\n外设准备好后，主动向CPU发中断请求，CPU暂停当前工作去处理。\n优点：CPU利用率提高。缺点：适合少量数据传输，频繁中断也会消耗CPU资源。\n🔴【方式3：直接存储器存取方式（DMA）】（极高频考点）：\n核心：DMA控制器在取得总线控制权后，使I/O设备与主存之间成批传送数据，CPU不逐字节搬运。\n适用场景：大批量数据传送（如磁盘读写、视频数据传输）。\n特点：传送过程中CPU可以执行其他任务，传送结束后才向CPU发中断报告。\n⚫️【坑点判断题】：\n“DMA方式传输数据时，完全不需要CPU干预。” → 严格说传送过程中不需要CPU，但开始和结束仍需CPU参与配置和中断响应。如果选项说“完全不需要CPU”，通常是错的！\n“中断方式适合大批量数据传输” →错！适合小批量。大批量用DMA。\n第七章：数据的表示与编码\n考点20：原码、反码、补码（必考计算！）\n🔴【核心结论】：现代计算机中的有符号整数通常用补码表示；无符号整数、浮点数、字符等采用各自编码，不能统称“所有数据都用补码”。补码使加减法可统一使用加法器，并把零表示唯一化。\n🔵【三码转换规则（以8位为例）】：\n正数：原码 = 反码 = 补码（三者相同）。\n例：+5 → 原码00000101，反码00000101，补码00000101。\n负数：符号位为1（最高位），其余位：\n原码：数值部分为绝对值的二进制。\n例：-5 → 原码10000101。\n反码：符号位不变，其余位按位取反。\n例：-5 → 反码11111010。\n补码：反码 + 1（末位加1）。\n例：-5 → 补码11111011。\n⚫️【特殊值】：8位补码能表示的范围是-128 ~ +127。-128的补码是10000000（这是个必须记住的特殊值）。\n⚫️【坑点】：8位无符号二进制能表示的最大十进制数是255（2⁸-1），不是256。\n考点21：ASCII码\n🔴【ASCII码】：美国信息交换标准代码，7位二进制编码（存储时占1个字节，即8位）。\n🔴【编码数量】：共128个（0-127）。\n🔴【关键数值（必须记住！）】：\n数字'0'→ 48（十进制）→00110000（二进制）\n大写'A'→ 65 →1000001\n小写'a'→ 97 →1100001\n🔴【ASCII码大小排序】：数字（0-9）< 大写字母（A-Z）< 小写字母（a-z）。\n⚫️【坑点】：大写字母和小写字母的ASCII码差32。'A'=65，'a'=97，差32。'a'比'A'大32。\n考点22：汉字编码\n🔴【四个层次】：\n输入码（外码）：用于输入汉字，如五笔（形码）、拼音（音码）。\n交换码（国标码）：传统教材常以GB2312国标码说明信息交换；GBK是对GB2312的扩展编码，Unicode则是现代跨平台字符编码标准。\n机内码（内码）：传统GB2312教材中，汉字机内码由国标码两个字节各加80H得到，两个字节最高位均为1；“占2字节”只适用于该编码口径。\n字形码（字模码）：用于输出显示/打印，用点阵表示（如16×16、24×24）。\n⚫️【坑点】：\n五笔字型属于输入码（外码），不是机内码！\n传统教材中对汉字处理、存储常说使用机内码；现代系统具体采用UTF-8、UTF-16、GBK等编码，应以题干为准。\n输出汉字字形的清晰度与汉字点阵的规模有关（点阵越大越清晰）。\n在GB2312传统双字节口径下，汉字机内码的两个字节分别比国标码高80H，整体常表述为相差8080H。\n考点22A：浮点数表示（常考概念）\n🔴【基本组成】：浮点数通常由符号、阶码和尾数（有效数）组成；IEEE 754单精度为1位符号、8位阶码、23位小数部分，双精度为1+11+52位。\n🔵【规格化目的】：在约定表示下使有效数字尽可能充分，保证表示唯一性并提高精度。\n⚫️【坑点】：浮点数的表示范围主要受阶码位数影响，精度主要受尾数位数影响；浮点运算会有舍入误差，十进制小数不一定能被二进制精确表示。\n第八章：进制转换（计算题必过）\n考点23：R进制转十进制\n🔵【方法】：“按权展开，相加求和”。\n🔵【公式】：(N)R = Σ(每一位数字 × R^(该位所在位置))，小数点左第一位指数为0，向左递增，向右递减为负。\n⚫️【例】：(1101.1)₂ = 1×2³ + 1×2² + 0×2¹ + 1×2⁰ + 1×2⁻¹ = 8+4+0+1+0.5 = 13.5\n考点24：十进制转R进制\n🔵【整数部分】：“除R取余，倒序输出”（一直除到商为0，余数从下往上读）。\n🔵【小数部分】：“乘R取整，正序输出”（一直乘到积为0或达到精度，整数从上往下读）。\n⚫️【例】：(53.125)₁₀ = (110101.001)₂\n考点25：二进制转八进制/十六进制（速算法）\n🔵【二转八】：“三位并一位”。以小数点为界，左右每3位一组，不足补0，每组转成1位八进制数。\n例：(10100010.0011)₂ = (242.14)₈\n🔵【二转十六】：“四位并一位”。以小数点为界，左右每4位一组，不足补0，每组转成1位十六进制数。\n例：(11101111)₂ = (EF)₁₆\n⚫️【坑点】：十六进制数码包括0-9和A-F（A=10，B=11，C=12，D=13，E=14，F=15）。\n考点26：常考数值对照\n第九章：故障与日常维护（常识应用）\n考点27：常见故障原因\n🔴【CMOS设置丢失/时间反复重置】：常见原因是主板实时时钟/CMOS供电电池电量不足，但也可能是固件设置、主板故障等，不能仅凭现象唯一断定。\n🔴【显示器“花屏”/玩3D游戏死机】：通常怀疑显卡问题（特别是玩3D游戏时死机，重点检查显卡性能和散热）。\n🔴【开机报警不启动】：报警码含义取决于BIOS/UEFI和主板厂商，内存接触不良只是常见原因之一。应先断电并按说明书查报警码，再检查内存、显卡、供电等；不应把“用橡皮擦金手指”写成通用标准步骤。\n🔴【投影仪不显示电脑画面】：可能性：①未按笔记本切换键（Fn+F4/F5等）；②分辨率不匹配；③连接线松动或损坏。\n🔴【计算机无声】：可能原因：声卡损坏、扬声器损坏、音量静音。显示器处于屏保状态不是无声的原因！\n⚫️【坑点】：键盘进水后，仅仅擦干表面不能保证键盘恢复正常，水可能已渗入内部电路造成短路。\n📊 终极数字记忆表（考前过一遍）\n🔥 本章高频简答题汇总\n1. 冯·诺依曼计算机的基本特点是什么？\n🔵【踩分点】：① 由运算器、控制器、存储器、输入设备、输出设备五大部件组成。② 计算机内部采用二进制表示数据和指令。③ 采用**“存储程序、程序控制”**技术（将程序事先存入主存，计算机自动逐条取出并执行）。\n2. 简述内存和外存的区别。\n🔵【踩分点】：①内存速度快、容量小、价格高，断电后数据消失，CPU可直接访问，存放正在运行的程序和数据。②外存速度慢、容量大、价格低，断电后数据保留，CPU不能直接访问（需先调入内存），存放暂时不用的程序和数据。\n3. 简述CPU的组成及各部分功能。\n🔵【踩分点】：① CPU由运算器和控制器组成（Cache有时也在CPU内部）。②运算器：进行算术运算和逻辑运算，核心是ALU。③控制器：产生控制信号，指挥协调全机工作，核心是PC（程序计数器）和IR（指令寄存器）。\n4. 简述总线的分类及各自功能。\n🔵【踩分点】：①数据总线（DB）：传输数据，双向，宽度决定一次传输的数据量。②地址总线（AB）：传输地址，单向（CPU发出），宽度决定寻址范围（最大内存容量）。③控制总线（CB）：传输控制信号，双向。\n📈 本章计算题汇总\n1. 点阵汉字存储空间\n公式：字节数 = (点阵行数 × 点阵列数) / 8\n16×16点阵 = 32字节；24×24点阵 = 72字节；32×32点阵 = 128字节。\n2. 进制转换\n二转十：按权展开。十转二：整数除2倒取余，小数乘2正取整。\n二转八：三位并一位。二转十六：四位并一位。\n3. 总线带宽\n公式：带宽 = (总线宽度 / 8) × 工作频率\n单位：字节/秒（B/s）\n4. 补码计算\n负数补码 = 原码除符号位外逐位取反 + 1\n口诀速记\n“冯诺依曼五大件，运算控制器存输；Cache为了缓速度，RAM丢电ROM固；地址总线看容量，数据总线看宽度；补码存储为运算，二进十六四并一；ASCII数字排前，大写小写差三二。”\n【表格1】\n\n部件 | 核心功能（🔵踩分词） | 子部件/别名（⚫️）\n运算器 | 进行算术运算和逻辑运算 | 包含ALU（算术逻辑单元）、累加器（ACC）、寄存器组。不包含译码器！\n控制器 | 指挥中心，产生控制信号，协调全机工作 | 包含PC（程序计数器）、IR（指令寄存器）、指令译码器、时序产生器。\n存储器 | 存储程序和数据 | 分为内存储器（主存）和外存储器（辅存）。\n输入设备 | 将外部信息输入计算机 | 键盘、鼠标、扫描仪、话筒、摄像机、条码阅读器。\n输出设备 | 将计算机结果输出 | 显示器、打印机、音箱、绘图仪、投影仪。\n\n【表格2】\n\n十进制 | 二进制 | 八进制 | 十六进制\n10 | 1010 | 12 | A\n15 | 1111 | 17 | F\n16 | 10000 | 20 | 10\n20 | 10100 | 24 | 14\n30 | 11110 | 36 | 1E\n45 | 101101 | 55 | 2D\n100 | 1100100 | 144 | 64\n215 | 11010111 | 327 | D7\n255 | 11111111 | 377 | FF\n\n【表格3】\n\n概念 | 数值/容量 | 备注\n1个字节 | 8位 | 存储容量的最小基本单位\n标准ASCII码 | 7位编码（存储占1B） | 共128个字符\n汉字机内码 | 2个字节 | 占16位，区别于ASCII的1B\nCD音质采样频率 | 44.1kHz | 标准CD参数\nCD音质量化位数 | 16位 | 标准CD参数\n8位无符号数最大值 | 255 | 2⁸-1\n8位补码范围 | -128 ~ +127 | -128的补码是10000000\n大写A的ASCII码 | 65 | 小写a是97，差32\n数字0的ASCII码 | 48 | 记住！\n"},{"name":"计算机网络","text":"# 📚 计算机网络\n\n使用说明：🔴红色= 一级考点 / 核心术语 / 判断改错点（背下来）🔵蓝色= 简答题踩分关键词 / 计算公式 / 协议功能（考试时写上去就是分）⚫️黑色= 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n第一章：计算机网络概述\n考点1：计算机网络的定义\n🔴【定义】：将地理位置不同的、具有独立功能的多台计算机及其外部设备，通过通信线路连接起来，在网络操作系统、网络管理软件及网络通信协议的管理和协调下，实现资源共享和信息传递的计算机系统。\n🔵【三大要素】：计算机系统 + 通信线路与通信设备 + 网络协议。\n⚫️【坑点】：计算机网络是计算机技术和通信技术相结合的产物，不是计算机技术和传感技术！\n考点2：计算机网络的功能（简答题必背）\n🔴【三大功能】：\n数据通信（最基本功能）：实现计算机之间、计算机与终端之间的信息传输。如：电子邮件、文件传输。\n资源共享（重要功能）：共享硬件（打印机）、软件服务和数据（文件、数据库内容）。数据和信息资源本身也可以成为共享对象。\n分布处理（协同工作）：将大型任务分配给多台计算机并行处理。\n⚫️【坑点】：学校网站上有很多微视频供同学们下载学习，主要体现了网络的资源共享功能，不是数据通信！\n考点3：计算机网络的分类\n🔴【按覆盖范围分类】：\n局域网（LAN）：覆盖范围最小（几公里内），如校园网、机房。传输速率高、误码率低。\n城域网（MAN）：覆盖一个城市（几十公里）。\n广域网（WAN）：跨地区连接多个局域网或城域网，如运营商骨干网；Internet是全球互联网络，不宜简单等同于某一个WAN。现代数据网络以分组交换为主，传统电话网是电路交换通信网，不应直接作为计算机WAN例子。\n🔴【按拓扑结构分类】：总线型、星型、环型、树型、网状型。\n🔴【按工作模式分类】：\nC/S模式（客户机/服务器）：由专用客户端向服务器请求服务，通常需要安装或部署客户端程序，如邮件客户端、数据库客户端。\nB/S模式（浏览器/服务器）：客户端主要通过浏览器访问Web服务器，业务更新通常集中在服务器端，如网页版邮箱、在线教务系统。\n⚫️【坑点】：判断C/S或B/S看系统交互架构，不只看产品名称；许多现代应用是Web、原生客户端和云服务混合架构。“使用浏览器访问Web版”通常按B/S作答，使用专用客户端通常按C/S作答。\n考点4：计算机网络的组成（逻辑划分）\n🔴【从功能上划分】：\n资源子网：负责数据处理和资源共享。包括：主机、终端、外设、软件、数据。核心是主机。\n通信子网：负责数据传输。包括：通信线路、网络连接设备（路由器、交换机等）、通信协议。核心是通信设备和线路。\n⚫️【坑点】：转发器、交换机属于通信子网。主机属于资源子网。判断题说“资源子网负责计算机间的数据通信” →错！那是通信子网的功能！\n考点5：网络拓扑结构（对比记忆）\n🔴【总线型】：\n特点：所有节点连接在一条总线上。结构简单、成本低、易于扩展。\n缺点：总线故障导致全网瘫痪，故障检测困难。\n代表：早期的以太网。\n🔴【星型】：\n特点：所有节点通过中心节点（集线器/交换机）连接。结构简单、易维护、故障隔离容易。\n缺点：中心节点故障导致全网瘫痪，电缆成本高。\n代表：家用路由器网络、绝大多数现代局域网。\n🔴【环型】：\n特点：节点首尾相连形成闭合环。实时性好。\n缺点：可扩充性差，局部节点故障可能导致全网瘫痪，故障检测困难。\n🔴【网状型】：\n特点：节点之间有多条路径相连。可靠性高，路径选择灵活。\n缺点：线路成本高、不易维护。\n代表：Internet的拓扑结构。\n⚫️【坑点】：一旦中心节点出现故障则整个网络瘫痪的是星型结构。Internet属于网状结构。\n第二章：网络体系结构与OSI模型\n考点6：网络协议\n🔴【定义】：网络协议是计算机网络中进行数据交换而建立的规则、标准或约定的集合。是不同结点对等实体之间进行通信的规则。\n🔴【三要素】：\n语法（Syntax）：规定数据的格式和编码。→ “如何讲”。\n语义（Semantics）：规定控制信息的含义和功能。→ “讲什么”。\n时序/同步（Timing）：规定事件执行的顺序和速度匹配。→ “何时讲/讲话次序”。\n⚫️【坑点】：判断题说“语法确定通信双方讲什么” →错！语法是“如何讲”，语义才是“讲什么”。\n考点7：OSI七层模型（绝对高频，滚瓜烂熟）\n🔴【记忆口诀】：“物、数、网、传、会、表、应”（由下到上）。\n🔵【各层核心功能与设备】：\n⚫️【坑点】：\n路由器是网络层设备，交换机是数据链路层设备，集线器是物理层设备。\nTCP提供可靠的端到端传输，UDP提供不可靠的端到端传输。\n数据链路层的PDU叫帧，网络层常称分组/数据报，TCP的传输层PDU常称报文段，UDP称用户数据报；不能把所有传输层PDU一律写成“报文段”。\n考点8：OSI各层特性详解\n🔴【物理层四大特性】：\n机械特性：接口的形状、尺寸、引脚数。\n电气特性：电压范围、信号电平。\n功能特性：各引脚的功能定义。\n过程特性：事件发生的顺序。\n坑点：描述“完成每种功能的事件发生顺序”的是过程特性，不是功能特性！\n🔴【数据链路层】：在相邻节点之间以帧为单位传输，完成成帧、介质访问控制和差错检测等；是否提供确认与重传取决于具体链路协议，不能笼统说一定“无差错”。以太网MAC地址通常为48位，用十六进制表示。\n🔴【网络层】：提供逻辑寻址和路由选择，使分组跨网络到达目的主机。IP、ICMP属于网际层/网络层；ARP用于同一链路上把IPv4地址解析为链路层地址，在不同分层教材中可归到网络接口层或网络层边界，答题按教材口径。\n⚫️【坑点】：以太网物理地址（MAC地址）长度是48位，不是32位。IPv4地址是32位，IPv6地址是128位。\n第三章：TCP/IP协议族\n考点9：TCP/IP参考模型\n🔴【层次结构（4层）】：\n应用层（对应OSI的应用层+表示层+会话层）\n传输层（对应OSI的传输层）\n网络层/网际层（对应OSI的网络层）\n网络接口层（对应OSI的物理层+数据链路层）\n⚫️【坑点】：OSI是7层，TCP/IP是4层。TCP/IP的网络接口层对应OSI的物理层和数据链路层。\n考点10：IP协议（网络层核心）\n🔴【IP协议功能】：无连接、不可靠的数据报传输。负责对数据包进行寻址和路由选择。\n⚫️【坑点】：IP协议是不可靠的，它只负责尽力而为地传输，不保证数据包不丢失、不乱序。可靠性由TCP在传输层保证。\n考点11：ICMP协议\n🔴【全称】：Internet Control Message Protocol，网际控制报文协议。\n🔴【功能】：传递差错报告和控制信息。用于网络诊断。\n🔴【Ping命令】：基于ICMP协议，用于测试两台主机之间的连通性。\n⚫️【坑点】：Ping命令使用的是ICMP协议，不是TCP或UDP。ICMP属于网络层协议。\n考点12：ARP与RARP协议\n🔴【ARP（地址解析协议）】：将主机的IP地址解析为对应的MAC地址（物理地址）。\n🔴【RARP（逆地址解析协议）】：早期用于主机依据MAC地址获取IPv4地址，现已基本被BOOTP/DHCP取代。\n⚫️【坑点】：DNS主要完成域名与资源记录的查询（常见为域名→IP），ARP是在本地链路解析“下一跳IPv4地址→MAC地址”；RARP是早期MAC→IP机制。ARP不能跨路由器解析远端主机的MAC。\n考点13：传输层协议（TCP vs UDP）\n🔴【TCP（传输控制协议）】：\n面向连接（需建立连接，三次握手）。\n可靠传输（有确认、重传机制）。\n提供流量控制和拥塞控制。\n传统协议栈中FTP、HTTP/1.1和HTTP/2、SMTP通常使用TCP；HTTP/3基于QUIC（运行在UDP之上），所以不要把“HTTP永远使用TCP”写成绝对结论。\n核心功能：完成对数据包的确认、流量控制和网络拥塞；自动检测数据包并提供错误重发功能。\n🔴【UDP（用户数据报协议）】：\n无连接（无需建立连接）。\n不可靠传输（不保证到达，不保证顺序）。\n传输效率高，开销小。\n适用于：视频会议、IP电话、在线直播、DNS查询。\n⚫️【坑点】：\nTCP是面向连接的，UDP是无连接的。\n视频会议、IP电话使用UDP，因为实时性要求高，可以容忍少量丢包。\nTCP和UDP都属于传输层协议。\n说“UDP比TCP更可靠” →错！TCP可靠，UDP不可靠。\n考点14：应用层常用协议（端口号必记）\n🔴【HTTP】：超文本传输协议，端口80。用于浏览器与Web服务器之间的通信。\n🔴【HTTPS】：HTTP通过TLS建立受保护的通信，默认端口443，可提供机密性、完整性和服务器身份认证；安全性仍依赖证书验证、TLS配置和应用本身。\n🔴【FTP】：文件传输协议，控制连接默认端口21；主动模式的数据连接常由服务器端口20发起，被动模式的数据端口由协商决定。FTP明文传输，安全传输要区分FTPS和SFTP（SFTP基于SSH，并非FTP加密版）。\n🔴【DNS】：域名系统，默认端口53，常用UDP，响应较大、区域传送等情况可用TCP。它查询多种资源记录，最常见功能是域名解析为IP地址。\n🔴【SMTP】：简单邮件传输协议，端口25。用于发送电子邮件。\n🔴【POP3】：邮局协议第3版，端口110。用于接收电子邮件。\n🔴【Telnet】：远程登录协议，端口23。\n⚫️【坑点】：\nSMTP是发邮件，POP3是收邮件，不要记反！\nSMTP实现的是将邮件从发件人发送到收件人的邮件服务器，不是直接发送到收件人的电脑。\nHTTP是应用层协议，不是传输层协议。\nFTP的21是控制端口；“数据端口固定为20”只适用于经典主动模式，不能套用于被动模式。\n考点15：常用命令\n🔴【Ping】：测试两台主机之间的连通性。基于ICMP协议。\n🔴【Ipconfig】：查看本机的IP地址、子网掩码、默认网关等网络配置信息。\n🔴【Tracert】：显示数据包到达目的主机所经过的路径（路由追踪）。\n🔴【Netstat】：显示网络连接状态、路由表、接口统计等信息。\n⚫️【坑点】：查看本机IP地址的命令是Ipconfig，不是Ping。Ping是测试连通性。\n第四章：IP地址与子网划分\n考点16：IP地址基本概念\n🔴【IP地址长度】：32位（二进制），分为4组，每组8位，用“点分十进制”表示。\n🔴【IP地址组成】：网络号（Net-ID）+ 主机号（Host-ID）。\n🔴【历史分类编址】：IPv4曾按A、B、C、D、E分类，D类用于组播，E类保留。现代互联网地址分配和路由采用CIDR前缀，不再以A/B/C类作为实际划分基础；分类地址仍是基础考试常考口径。\n⚫️【坑点】：D类地址用于组播（224.0.0.0-239.255.255.255），不是用于普通主机通信。\n考点17：A、B、C类地址范围（必须烂熟于心）\n🔴【A类】：1 ~ 126（0和127保留）。默认子网掩码：255.0.0.0。网络号占1字节，主机号占3字节。每个网络可容纳约1677万台主机。\n范围：1.0.0.0 ~ 126.255.255.255\n🔴【B类】：128 ~ 191。默认子网掩码：255.255.0.0。网络号占2字节，主机号占2字节。每个网络可容纳65534台主机。\n范围：128.0.0.0 ~ 191.255.255.255\n🔴【C类】：192 ~ 223。默认子网掩码：255.255.255.0。网络号占3字节，主机号占1字节。每个网络可容纳254台主机。\n范围：192.0.0.0 ~ 223.255.255.255\n⚫️【坑点】：\n判断IP地址类别，只看第一个十进制数！\n192.168.0.12 → 第一个数是192，属于C类地址。\n127.0.0.0/8保留为回送地址块，127.0.0.1是最常用回送地址。按首位模式它落在历史A类范围，但不能分配给普通网络接口或作为公网主机地址；“完全不属于A类”并不严谨。\nC类地址中，主机号全0表示网络号，全1表示广播地址，都不能分配给主机。所以C类每个网络最多254台主机（2⁸-2=254）。\n考点18：特殊IP地址\n🔴【127.0.0.1】：本机回送地址，用于主机自我测试。不能作为互联网上的有效IP地址。\n🔴【主机号全0】：代表本网络（网络地址）。如：192.168.1.0。\n🔴【主机号全1】：代表广播地址。如：192.168.1.255。\n🔴【0.0.0.0】：作为主机地址时常表示“未指定地址/本主机尚无地址”；路由表中的0.0.0.0/0才表示默认路由，二者不能混为一个含义。\n⚫️【坑点】：不能作为互联网可用的IP地址的是127.0.0.1（回送地址）。192.168.1.0是网络地址，不能分配给主机。\n考点19：子网掩码\n🔴【定义】：用于区分IP地址中的网络号和主机号。1对应网络位，0对应主机位。\n🔴【默认子网掩码】：\nA类：255.0.0.0\nB类：255.255.0.0\nC类：255.255.255.0\n🔴【子网划分的目的】：把一个地址前缀划成多个更小的广播域，便于分层管理、隔离广播和更合理地分配地址；提高地址利用率只是常见收益之一。\n🔵【判断同网段】：两台主机的IP地址分别与子网掩码进行“与（AND）”运算，结果相同则在同一子网，可直接通信；结果不同则不能直接通信，需要通过路由器。\n⚫️【坑点】：\n子网掩码必须是连续的1后面跟连续的0。255.241.0.0不可能是子网掩码（241转二进制11110001，不连续）。\n子网掩码不能单独存在，必须结合IP地址一起使用。\n主机A的IP为202.96.128.130，子网掩码255.255.255.128 → 网络号为202.96.128.128。\n考点20：IPv6\n🔴【长度】：128位，分为8组，每组16位，用十六进制表示。\n🔴【地址总数】：2¹²⁸个。\n🔴【表示方式】：用冒号分隔的十六进制数，如：2001:0db8:85a3:0000:0000:8a2e:0370:7334。连续零可压缩为::。\n🔴【IPv6出现的原因】：解决IPv4地址枯竭问题。\n⚫️【压缩规则】：每组可省略前导0；一段或多段连续的全0组可用“::”压缩，但一个地址中“::”最多出现一次。IPv6没有广播，使用组播和任播等方式。\n⚫️【坑点】：IPv6由16个字节（128位）表示，不是16位或8个字节。IPv4由4个字节（32位）表示。\n考点20A：CIDR与子网计算（岗位考试高频）\n🔴【前缀长度】：/n表示前n位是网络前缀。例如255.255.255.192的二进制有26个连续1，因此等价于/26。\n🔵【地址总数】：一个IPv4 /n地址块共有2^(32-n)个地址。传统普通子网题中可分配主机数通常按2^(32-n)-2计算，扣除网络地址和定向广播地址；/31点到点链路、/32主机路由是特殊情形。\n🔵【求网络地址】：IP地址与子网掩码逐位AND；广播地址是在该网络地址基础上把主机位全置1。\n⚫️【例】：192.168.1.130/26中，每段块大小为64，130落在128～191，因此网络地址192.168.1.128，广播地址192.168.1.191，传统可用主机范围129～190。\n考点20B：DHCP与NAT（常考功能配对）\n🔴【DHCP】：动态主机配置协议，可向客户端分配IP地址、子网掩码、默认网关、DNS服务器等参数；典型IPv4过程为Discover、Offer、Request、ACK（DORA），使用UDP 67/68端口。\n🔴【NAT】：在网络边界转换内部地址和外部地址；NAPT/PAT还利用端口号让多台内网主机共享少量公网IPv4地址。\n⚫️【坑点】：DHCP负责“自动配置地址参数”，DNS负责“名称解析”，ARP负责“同链路IPv4到MAC解析”，NAT负责“地址/端口转换”，四者不可互换。\n第五章：网络设备与传输介质\n考点21：网络互联设备（工作层级对比）\n🔴【中继器（Repeater）】：物理层。放大信号，延长传输距离。不能识别数据内容。\n🔴【集线器（Hub）】：物理层。多端口的中继器，将信号广播到所有端口。共享式设备，同一时刻只能一台设备发送数据。不能识别MAC地址。\n🔴【网桥（Bridge）】：数据链路层。连接两个同类型局域网，能识别MAC地址，可以隔离冲突域。\n🔴【交换机（Switch）】：数据链路层。多端口的网桥，能识别MAC地址，根据MAC地址表定向转发。隔离冲突域，但不能隔离广播域。\n🔴【路由器（Router）】：网络层。连接不同网络，能识别IP地址，进行路由选择。隔离冲突域和广播域。\n🔴【网关（Gateway）】：广义上指连接不同网络、承担转发或协议转换的实体；“默认网关”通常就是本子网通向其他网络的路由器接口。旧式OSI教材常把执行高层协议转换的网关归于高层，但不能据此断言所有网关都只工作在传输层以上。\n⚫️【坑点】：\n中继器和集线器属于物理层设备。\n交换机和网桥属于数据链路层设备。\n路由器属于网络层设备。\n集线器（Hub）不能识别目的地址，交换机可以识别MAC地址。\n路由器可以实现有线网络和无线网络的连接。\n考点22：传输介质\n🔴【有线传输介质】：\n双绞线：最常用、最便宜的传输介质。传输距离最长100米。分为非屏蔽（UTP）和屏蔽（STP）。\n同轴电缆：抗干扰能力强。粗缆传输距离500米，细缆185米。\n光纤：带宽高、传输距离远、抗电磁干扰、误码率低，常用于骨干和高速链路；接入终端和局域网中双绞线同样广泛，不能说光纤在所有场景“应用最广泛”。成本应综合光纤、光模块、施工和维护，不能只写“价格一定贵”。\n🔴【无线传输介质/信号】：常见电磁波形式包括无线电波、地面/卫星微波、红外线和激光；蓝牙是使用2.4GHz频段的短距离无线通信技术/协议，不是独立的物理介质。\n微波通信：卫星通信是微波接力通信向空间的扩展。\n蓝牙：短距离数据交换（10米左右），功耗低。\n红外线：短距离，需要直线传输。\n⚫️【坑点】：\n“性能最好”需说明比较维度；若题目强调带宽、距离和抗干扰，通常选光纤，若强调以太网水平布线的普及和成本，通常是双绞线。\n常见铜缆以太网信道长度上限为100米（典型为90米永久链路+两端跳线），具体仍取决于线缆类别和以太网标准。\n粗同轴电缆支持的最大电缆长度是500米，细同轴电缆185米。\n“价格便宜”不是光纤相对于双绞线的固有技术优势；成本比较要结合光模块、施工距离和维护场景。\n考点22A：以太网与无线局域网（高频补充）\n🔴【以太网】：IEEE 802.3标准，使用MAC地址标识链路接口。传统共享式半双工以太网采用CSMA/CD；现代交换式全双工以太网不存在冲突，不使用CSMA/CD处理冲突。\n🔴【无线局域网】：IEEE 802.11系列，常采用CSMA/CA以尽量避免冲突；SSID是无线网络名称，不是密码或MAC地址。\n🔴【冲突域与广播域】：交换机每个端口通常形成独立冲突域；同一VLAN仍属于同一广播域。路由器或三层设备可分隔广播域，VLAN也能在二层逻辑划分广播域。\n⚫️【坑点】：交换机“不能隔离广播域”只适用于未划分VLAN、同一二层广播域的传统题设；交换机可通过VLAN划分多个广播域。\n第六章：网络应用与服务\n考点23：域名系统（DNS）\n🔴【域名结构】：由标号序列组成，从右到左级别升高。如：www.sina.com.cn。\ncn：顶级域名（国家域名）\ncom：二级域名（机构域名，商业机构）\nsina：三级域名\nwww：四级域名（Web服务器）\n🔴【常见顶级域名】：\n.com：商业机构\n.edu：教育机构\n.gov：政府机构\n.mil：军事机构\n.org：非盈利组织\n.net：网络机构\n🔴【域名解析】：客户端通过递归/迭代查询获得DNS资源记录，常见是将域名解析为IPv4/IPv6地址（A/AAAA记录）；反向解析使用PTR记录。DNS不只保存IP地址。\n🔴【负责中国域名管理的机构】：CNNIC（中国互联网络信息中心）。\n⚫️【坑点】：\n域名不分大小写。\nhttp://www.China.edu.cn中，代表国家的顶级域名是cn，代表教育机构的二级域名是edu。\n请求域名解析的客户不需要知道根域名服务器和本地域名服务器父结点的名字。\n考点24：电子邮件（E-mail）\n🔴【E-mail地址格式】：用户名@域名（如：qwer@163.com，用户名为qwer）。\n🔴【发送/转发邮件】：客户端提交邮件以及邮件服务器之间转发通常使用SMTP。\n🔴【读取邮件】：客户端可使用POP3下载邮件，也可用IMAP在服务器上同步文件夹和状态；Web邮箱则由浏览器通过HTTP(S)访问前端，服务器内部仍使用邮件协议处理投递。\n🔴【邮件发送特点】：\n可以同时发送给多个收件人。\n发送邮件不需要对方开机。\n发送电子邮件时，可以不输入邮件主题（但建议输入）。\nE-mail采用存储转发，投递时间一般不由地理距离直接决定，但会受网络、服务器队列、反垃圾策略和故障影响，不能保证“即发即收”。\n⚫️【坑点】：\n电子邮件地址@之后表示邮件服务器名。\n电子邮件不是即时通讯工具（即时通讯如QQ、微信）。\n收件箱内带有回形针标志的邮件表示该邮件有附件。\n电子邮件服务的功能不包括制作动画。\n考点25：WWW（万维网）\n🔴【全称】：World Wide Web，全球信息网。\n🔴【核心协议】：HTTP（超文本传输协议）。\n🔴【URL格式】：协议名://主机名/目录名/文件名\n例：http://www.ye21.cn/news/index.aspx→ http（服务标志）、www.ye21.cn（主机域名）、news（目录名）、index.aspx（文件名）。\n🔴【收藏夹功能】：保存网页地址（URL），不是保存网页内容。\n🔴【Web服务器】：以网页形式存储信息资源的服务器。www通常指Web服务器。\n⚫️【坑点】：HTML是超文本标记语言，不是协议。HTTP是协议。\n第七章：网络安全\n考点26：计算机病毒\n🔴【定义】：人为编制的一组计算机指令或程序代码，能破坏计算机功能或数据，能自我复制。\n🔴【病毒特征】：寄生性、传染性、潜伏性、隐蔽性、可触发性、破坏性、不可预见性。\n坑点：病毒没有“智能性”和“免疫性”特征。\n🔴【病毒分类】：\n引导型病毒：感染主引导记录（MBR）或引导扇区。\n文件型病毒：感染可执行文件（.exe、.com）。如：CIH病毒。\n宏病毒：感染Office文档（.doc、.xls）。通过文档中的宏传播。\n混合型病毒：同时感染引导区和文件。\n蠕虫病毒：独立程序，通过网络主动传播。如：冲击波、震荡波。\n木马病毒：伪装成正常软件，不自我复制，通过欺骗安装。\n⚫️【坑点】：\nCIH病毒属于文件型病毒。\n宏病毒主要感染.doc和.xls文件。\n蠕虫病毒不需要寄生宿主程序，是独立的。\n特洛伊木马不具有自我复制能力。\n计算机病毒不会传染给人类。\n考点27：病毒传播途径\n🔴【主要途径】：\n移动存储设备（U盘、移动硬盘）。\n网络（电子邮件附件、网页链接、下载文件、即时通讯）。\n⚫️【坑点】：使用扫描仪不会感染病毒。病毒不能通过硬件设备本身传播。\n考点28：网络安全技术\n🔴【防火墙】：\n功能：隔离内部网络和外部网络，过滤网络通信，防止外部攻击。\n类型：硬件防火墙和软件防火墙。\n传统边界防火墙难以防住绕过其路径的内部攻击、允许流量中的应用漏洞或终端已感染恶意软件；下一代防火墙可提供应用识别、入侵防御等能力，但仍不能替代终端防护、身份控制和安全管理。\n防火墙的核心职责是按安全策略过滤和控制流量，路由器的核心职责是选路和转发；实际安全网关常同时具备路由、NAT、防火墙等功能，不能说二者在设备形态上绝不重合。\n防火墙不能过滤掉一切攻击，只能起到防护作用。\n🔴【数字签名】：\n功能：保证信息的完整性、身份认证、不可抵赖性。\n不能防止计算机病毒入侵。\n🔴【身份认证技术】：如银行取款输入密码，属于身份识别/身份认证。\n🔴【加密方式】：\n对称加密：加密和解密使用同一个密钥（速度快，密钥管理困难）。\n非对称加密：加密和解密使用一对密钥（公钥和私钥）。如：U盾。工行U盾使用的是非对称加密算法。\n⚫️【坑点】：\n防火墙设置的位置应该在学校局域网与外网连接处。\n防火墙是网络边界防护的重要技术之一；“最基本/唯一”属于旧教材口径，完整防护还需身份认证、补丁、最小权限、加密、备份、监测与响应。\n数字签名的主要功能是防止交易中的抵赖行为。\nU盾/USB Key常安全保存私钥和数字证书，利用公钥密码完成身份认证或数字签名，也可能配合对称加密等机制；具体实现不能简化为“只使用一种非对称算法”。\n第八章：网络基础知识补充\n考点29：交换技术\n🔴【电路交换】：建立物理连接，独占线路（如传统电话）。实时性好，但线路利用率低。\n🔴【报文交换】：存储-转发，整个报文一起发送（如老式电报）。延迟大，对节点缓存要求高。\n🔴【分组交换】：采用存储-转发，把报文拆成分组并可统计复用链路（Internet采用）。链路利用率通常较高，但存在排队时延、丢包和时延抖动；不能无条件说“延迟一定最小”或“利用率永远最高”。\n⚫️【坑点】：目前广域网主要采用分组交换技术，不是电路交换。\n考点30：数据通信基础\n🔴【调制/解调】：\n调制：数字信号 → 模拟信号（发送端）。\n解调：模拟信号 → 数字信号（接收端）。\n电话拨号上网需要调制解调器（Modem）。\n🔴【数据传输方式】：\n单工：单向传输（如：电视广播）。\n半双工：双向交替传输（如：对讲机）。\n全双工：双向同时传输（如：电话）。\n🔴【波特率 vs 比特率】：\n波特率：每秒传输的码元数（码元速率，单位Bd），不等同于“波形变化次数”。\n比特率：每秒钟传输的比特数（数据传输速率）。\n🔵【二者关系】：若每个码元有M种可区分状态且等概率携带log₂M位，则理想情况下比特率 = 波特率 × log₂M；二进制调制时二者数值可能相等。\n⚫️【坑点】：波特率不是每秒传输的比特数，也不应简单定义为“信号变化次数”。\n考点31：Internet基础知识\n🔴【Internet雏形】：ARPANET（阿帕网），美国国防部1969年创建。\n🔴【TCP/IP协议】：Internet采用的核心协议。\n🔴【ISP（互联网服务提供商）】：提供Internet接入服务的公司（如中国电信、中国联通）。个人用户注册后，ISP提供上网账号、上网口令和DNS地址。\n⚫️【坑点】：Internet的最早雏形是ARPANET，不是NSFNET或CERNET。\n📊 终极数字/端口记忆表（考前过一遍）\n🔥 本章高频简答题汇总\n1. 简述OSI七层模型（由低到高）。\n🔵【踩分点】：物理层、数据链路层、网络层、传输层、会话层、表示层、应用层（口诀：物数网传会表应）。\n2. 简述TCP和UDP的区别。\n🔵【踩分点】：① TCP是面向连接的，UDP是无连接的。② TCP提供可靠传输，UDP提供不可靠传输。③ TCP有流量控制和拥塞控制，UDP没有。④ TCP适用于FTP、HTTP等，UDP适用于视频会议、IP电话等。\n3. 简述IP地址的分类及判断方法。\n🔵【踩分点】：看第一个十进制数。A类1-126、B类128-191、C类192-223。D类组播，E类实验。\n4. 简述DNS的作用。\n🔵【踩分点】：DNS（域名系统）将域名解析为对应的IP地址，方便用户记忆和访问网站。\n5. 写出电子邮件发送和接收使用的协议。\n🔵【踩分点】：发送邮件使用SMTP协议，接收邮件使用POP3协议。\n口诀速记\n“物数网传会表应，七层模型要记清；路由IP在三层，交换MAC在二层；TCP可靠面向连，UDP不可靠无连；HTTP 80 DNS 53，SMTP发 POP3收；A类1到126，B类128到191，C类192到223；光纤快又好，双绞线百米到。”\n【表格1】\n\n层级（🔴） | 数据单位（🔵） | 核心功能（🔵） | 典型硬件/协议（🔴必记）\n7. 应用层 | 数据（Data） | 用户与网络的接口，提供应用程序服务 | HTTP、FTP、SMTP、DNS、Telnet\n6. 表示层 | 数据（Data） | 数据加密/解密、压缩/解压、格式转换 | 数据加密、JPEG/MPEG编码\n5. 会话层 | 数据（Data） | 建立、管理和终止会话/通信进程 | RPC（远程过程调用）\n4. 传输层 | TCP报文段/UDP用户数据报 | 端到端进程通信；可靠性、流量控制等由具体协议提供 | TCP、UDP\n3. 网络层 | 分组/数据报（Packet/Datagram） | 路由选择、逻辑寻址（IP地址） | 路由器、IP、ICMP；ARP位于网际层与链路层边界，教材归类可能不同\n2. 数据链路层 | 帧（Frame） | 相邻节点成帧、介质访问和差错检测；可靠性由具体协议决定 | 交换机、网桥、网卡\n1. 物理层 | 比特（bit） | 在物理介质上透明传输比特流，定义机械、电气、功能、过程特性 | 中继器、集线器\n\n【表格2】\n\n协议/概念 | 端口/数值 | 备注\nHTTP | 80 | 超文本传输\nHTTPS | 443 | 加密超文本传输\nFTP | 21 | 文件传输（控制端口）\nDNS | 53 | 域名解析\nSMTP | 25 | 发送邮件\nPOP3 | 110 | 接收邮件\nTelnet | 23 | 远程登录\nMAC地址长度 | 48位（6字节） | 物理地址\nIPv4地址长度 | 32位（4字节） | 点分十进制\nIPv6地址长度 | 128位（16字节） | 冒号分隔十六进制\nA类地址范围 | 1-126 | 掩码255.0.0.0\nB类地址范围 | 128-191 | 掩码255.255.0.0\nC类地址范围 | 192-223 | 掩码255.255.255.0\n双绞线最大传输距离 | 100米 | —\n粗同轴电缆最大距离 | 500米 | —\n"},{"name":"软件工程","text":"# 📚 软件工程\n\n使用说明：🔴红色= 一级考点 / 核心术语 / 判断改错点（背下来）🔵蓝色= 简答题踩分关键词 / 开发模型特征 / 测试方法区分（考试时写上去就是分）⚫️黑色= 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n第一章：软件工程概述\n考点1：软件的定义与特点\n🔴【软件的定义】：软件 =程序 + 数据 + 相关文档的完整集合。\n🔴【软件的特点】：\n软件是一种逻辑产品，不是物理实体。\n软件的开发主要是研制，不是生产制造。\n软件不会像硬件那样因物理磨损失效，但持续修改可能引入缺陷、破坏结构，使其出现“退化”；运行环境变化也会导致原本正确的软件不再适用。\n软件的开发和运行受计算机系统限制。\n⚫️【坑点】：\n程序不等于软件（软件还包括数据和文档）。\n软件既是逻辑实体，不是物理实体。\n软件安装的越多，计算机性能不一定越好（过多软件会占用系统资源）。\n“裸机”是指不装备任何软件的计算机。\n考点2：软件危机（Software Crisis）\n🔴【定义】：在软件开发和维护过程中遇到的一系列严重问题。\n🔴【主要表现】：\n进度滞后：软件开发进度难以预测。\n成本超支：软件开发成本难以控制。\n质量不可控：软件产品质量无法保证。\n维护困难：软件产品难以维护。\n文档缺乏：缺少适当的文档资料。\n🔴【产生原因】：\n用户需求描述不准确。\n缺乏有力的组织和管理。\n缺乏有力的方法学和工具支持。\n软件规模越来越大，复杂度越来越高。\n⚫️【坑点】：\n软件危机不是“电脑坏了”或“硬件故障”，而是软件开发生产力跟不上硬件发展。\n软件危机的表现不包括“软件依赖于硬件”（那是软件的特性之一）。\n考点3：软件工程（Software Engineering）\n🔴【定义】：采用工程的概念、原理、技术和方法来开发和维护软件，以经济地开发出高质量的软件并有效地维护它。\n🔴【软件工程三要素】：方法（技术手段）+工具（自动化支撑）+过程（质量管理的纽带）。（口诀：方工过）\n🔴【软件工程的目标】：在给定成本和进度的前提下，开发出具有适用性、有效性、可修改性、可靠性、可理解性、可维护性、可重用性、可移植性、可追踪性、可互操作性的软件产品。\n⚫️【坑点】：软件工程的核心是管理复杂性，不是单纯地写代码。\n第二章：软件生命周期\n考点4：软件生命周期（SDLC）\n🔴【定义】：软件从产生到报废的整个周期。\n🔴【常见教材口径】：定义期（问题定义、可行性研究、需求分析）、开发期（概要设计、详细设计、编码、测试）、运行维护期。生命周期阶段的名称和划分会因过程标准与模型不同而变化，并非只能固定为“三期八阶段”。\n⚫️【坑点】：\n维护通常持续时间很长、累计成本占比较高，但具体比例随系统寿命、类型和统计口径而变，不能把60%～70%当作通用定律。\n性能优化可能发生在设计、编码、测试和维护中，是软件工程活动的一部分；优化前应有可测量目标并避免牺牲正确性和可维护性。\n详细设计属于软件开发期，不属于定义期或维护期。\n第三章：软件开发模型（极高频）\n考点5：瀑布模型（Waterfall Model）\n🔴【核心特征】：阶段化、文档驱动，阶段成果经评审后进入后续阶段；经典瀑布强调顺序和基线控制，但实际可有反馈与返工，并非物理上绝对不能回退。\n🔴【优点】：文档驱动，每个阶段都有明确的产出，易于管理和审查。\n🔴【缺点】：需求变更极难，必须等全部做完才能看到效果。不适合需求不明确的项目。\n🔴【适用场景】：需求较明确稳定、技术成熟、强调阶段审查和可追踪文档的项目。军工、银行等项目是否采用瀑布不能仅凭行业名称判断。\n⚫️【坑点】：瀑布模型的最大优点是将软件开发各个阶段划分得十分清晰。\n考点6：原型模型（Prototyping Model）\n🔴【核心特征】：快速构建原型以澄清需求、验证方案并获取反馈。抛弃式原型在需求明确后废弃；演化式原型在工程控制下逐步演化为产品，不能混为“边看边改直到交付”。\n🔴【优点】：能有效解决需求模糊的问题，降低风险，促进用户与开发人员的沟通。\n🔴【缺点】：若不加控制，容易导致设计草率、结构混乱，原型可能被直接当作最终产品交付。\n🔴【适用场景】：需求不明确、用户交互复杂的系统（如：UI界面设计、新概念验证）。\n⚫️【坑点】：快速原型模型可以有效地适应用户需求的动态变化。\n考点7：增量模型（Incremental Model）\n🔴【核心特征】：分批次交付，每次交付一个可运行的子集（增量），逐步完善。\n🔴【优点】：用户可以尽早拿到核心功能，分散风险，先交付核心功能。\n🔴【适用场景】：大型项目，且核心功能需尽快上线的场景。\n考点8：螺旋模型（Spiral Model）\n🔴【核心特征】：迭代演化并由风险驱动，每轮通常经历目标确定、风险分析与化解、开发验证、下一轮计划。它综合了原型和系统化开发思想，突出风险分析。\n🔴【优点】：强调风险规避，适合大型高风险项目。\n🔴【缺点】：过分依赖风险评估经验，成本较高，对风险分析人员要求高。\n🔴【适用场景】：内部开发的大型、高风险、复杂项目。\n⚫️【坑点】：风险分析是螺旋模型的标志性活动，但其他过程也可以做风险管理，不能理解成“只有螺旋模型才允许分析风险”。\n考点9：敏捷开发（Agile Development）\n🔴【核心特征】：迭代增量交付、快速反馈、响应变化、重视人员协作和可工作的软件。敏捷强调“够用且有价值的文档”，不是不要文档。\n🔴【代表性方法】：\n极限编程（XP）：测试驱动开发、结对编程、持续集成。\nScrum：冲刺（Sprint）、每日站会、产品待办列表。\n🔴【优点】：响应变化快，客户满意度高，交付迅速。\n🔴【局限】：对协作、持续反馈和工程实践要求较高；规模扩大时还要处理跨团队协调、架构治理和合规文档。大型项目也可采用规模化敏捷或混合过程，不能笼统说“不适合”。\n🔴【适用场景】：需求快速变化的互联网产品（如：APP开发、网站开发）。\n⚫️【坑点】：敏捷开发强调**“拥抱变化”**，不是拒绝变化。\n考点10：模型对比速记表\n第四章：需求分析\n考点11：需求分析的任务与产出\n🔴【核心任务】：准确回答系统**“必须做什么”**（WHAT），而不是“怎样做”（HOW）。\n🔴【主要工作】：\n问题识别：明确功能需求、性能需求、环境需求、用户界面需求。\n分析与综合：导出软件的逻辑模型。\n编写文档：产出需求规格说明书（SRS）。\n🔴【最终产物】：需求规格说明书（SRS）。\n⚫️【坑点】：需求分析不仅确定功能，还要明确性能、安全、接口、数据、约束和验收标准。需求应正确、完整、一致、可验证、可追踪，并与利益相关者确认。\n考点12：需求的分类（极高频判断/选择）\n🔴【功能需求】：系统必须做什么（具体的业务功能）。\n例：“用户输入账号密码，系统验证登录。”\n例：“系统能够完成数据的增删改查。”\n🔴【非功能需求】：系统做得好不好（质量属性、性能、安全、可靠性、可维护性）。\n例：“系统支持500人并发访问。”\n例：“页面响应时间小于3秒。”\n例：“数据必须加密传输。”\n🔴【约束需求】：开发过程中的限制条件（外部硬性规定）。\n例：“必须使用MySQL数据库。”\n例：“开发语言必须是Java。”\n例：“必须在Windows环境下运行。”\n⚫️【坑点】：\n看到**“必须使用XX语言/平台/工具”** → 选约束需求，不是功能需求！\n看到**“响应时间/吞吐量/并发数”** → 选非功能需求！\n“系统需要支持1000个用户同时在线查询” →非功能需求（性能指标）。\n考点13：需求获取方式（简答题）\n🔵【常用方式】：\n问卷调查法：向用户发放调查问卷收集需求。\n会议讨论法：开发方和用户方召开需求讨论会议。\n界面原型法：通过“界面原型”这一载体与用户沟通需求。\n可运行原型系统法：在以往类似项目基础上修改得到可运行系统，让用户试用以挖掘需求。\n访谈与现场观察：通过访谈利益相关者、观察真实业务流程识别显性与隐性需求。\n文档分析与工作坊：分析现有规章、表单和系统资料，组织JAD/需求工作坊协调冲突并形成共识。\n第五章：软件设计\n考点14：模块设计原则（极高频）\n🔴【核心原则】：“高内聚、低耦合”。\n🔴【内聚（Cohesion）】：一个模块内部各元素之间结合的紧密程度。内聚越高越好（模块内部团结一致）。\n内聚强度从低到高：偶然内聚 < 逻辑内聚 < 时间内聚 < 过程内聚 < 通信内聚 < 顺序内聚 <功能内聚（最强）。\n🔴【耦合（Coupling）】：不同模块之间相互依赖的程度。耦合越低越好（模块之间独立性强）。\n耦合强度从低到高：非直接耦合 <数据耦合< 标记耦合 < 控制耦合 < 公共耦合 < 内容耦合（最强）。\n降低耦合不仅是“传得少”，还要让接口简单稳定、只传必要数据，避免共享全局数据、控制标志和直接访问另一模块内部实现。\n⚫️【坑点】：\n数据耦合、标记耦合、控制耦合、公共耦合的耦合性从低到高：数据 < 标记 < 控制 < 公共。\n要减少模块间的耦合，应减少直接传递的信息量。\n模块设计应追求低耦合、高内聚。\n考点15：概要设计（总体设计）\n🔴【主要任务】：\n确定软件的体系结构（模块结构）。\n模块划分。\n确定全局数据结构。\n定义模块之间的接口。\n🔴【产出文档】：模块结构图和模块说明书。\n考点16：详细设计\n🔴【主要任务】：确定每个模块的算法和使用的数据结构。\n🔴【常用工具】：程序流程图（PFD）、N-S图（盒图）、PAD图、伪代码。\n🔴【程序流程图中的箭头】：代表控制流（不是数据流！）。\n⚫️【坑点】：程序流程图中的箭头代表控制流，系统流程图中的箭头代表数据流。\n第六章：软件测试（极高频，题型多样）\n考点17：测试的目的\n🔴【测试目的】：发现软件中的错误，不是为了证明软件正确。\n🔴【经典名言】：测试是为了发现错误而执行程序的过程。好的测试用例是能发现迄今为止尚未发现的错误的用例。\n⚫️【坑点】：软件测试的目的是发现软件的错误，不是“找出软件的所有错误”或“证明软件是正确的”（后者不可能实现）。\n考点18：黑盒测试（Black-box Testing）\n🔴【定义】：不看内部代码，只关注输入和输出（把程序当黑盒子）。又称功能测试。\n🔴【常用方法】：\n等价类划分：将输入数据划分为若干有效等价类和无效等价类，从每类中选一个代表测试。\n边界值分析：重点测试边界及其邻近值（如整数范围1～100可测0、1、2、99、100、101）。它对边界缺陷很有效，但不存在对所有缺陷都“能力最强”的单一黑盒方法。\n错误猜测法：根据经验猜测可能出错的情况。\n因果图：描述多种条件组合的测试用例。\n⚫️【坑点】：\n黑盒测试的测试用例不是根据程序内部逻辑设计的（那是白盒测试）。\n边界值分析尤其擅长发现边界处理错误，应与等价类、判定表、状态迁移等方法组合，不能绝对称为任何场景都最强。\n等价类划分法不是白盒测试技术，是黑盒测试技术。\n常用的黑盒测试方法包括：等价类划分、边界值分析、错误猜测、因果图。（α测试和β测试是测试阶段，不是测试方法）\n考点19：白盒测试（White-box Testing）\n🔴【定义】：看内部逻辑结构，检查代码路径是否走通。又称结构测试。\n🔴【常见覆盖标准】：\n语句覆盖（最弱）：每条可执行语句至少执行一次。\n判定覆盖（分支覆盖）：每个判断的真/假分支至少执行一次。\n条件覆盖：每个判断中每个条件的真/假至少出现一次。\n判定/条件覆盖：同时满足判定覆盖和条件覆盖。\n条件组合覆盖：每个判断中所有条件的组合至少出现一次。\n路径覆盖（最强）：程序中所有可能的执行路径都至少走一遍。\n⚫️【坑点】：\n判定覆盖通常包含语句覆盖；条件覆盖与判定覆盖一般互不蕴含，所以不能简单写成“语句<判定<条件<路径”的全序。判定/条件覆盖同时满足二者，条件组合覆盖更强。\n条件覆盖不一定包含判定覆盖！（极高频坑点：两个独立条件都出现了，但整体判定可能没走全）。\n有限、无环控制流中覆盖所有可行路径是很强的标准；存在循环时路径可能无限，实际通常覆盖选定的独立路径或限定循环次数。结构覆盖率高也不能证明需求和业务逻辑正确。\n考点20：测试阶段（顺序必记）\n🔴【测试顺序】：单元测试 → 集成测试 → 系统测试 → 验收测试。\n🔴【单元测试】：测试最小模块（如函数、类、方法）。用例主要依据详细设计设计。\n🔴【集成测试（组装测试）】：逐步组合模块，重点检查接口、数据传递、调用关系和协作行为；可发现设计、实现及环境配置等多类缺陷，不能只说发现设计阶段错误。\n🔴【系统测试】：测试整个系统的功能和性能是否满足需求。\n🔴【验收测试】：用户确认系统是否满足需求。\nAlpha测试：通常在开发组织可控环境中，由内部人员或受邀用户测试，开发方可观察和支持。\nBeta测试：发布给有限外部用户在真实或接近真实环境中试用并反馈。两者定义会因组织发布流程略有差异。\n⚫️【坑点】：\n集成测试测试的是模块接口，不是内部功能。\n单元测试的用例依据详细设计设计，不是需求分析。\n集合测试（集成测试）的主要目的是发现设计阶段的错误。\n第七章：软件维护\n考点21：软件维护的类型（简答题必背）\n🔴【维护特点】：维护通常贯穿软件交付后的较长时期，累计投入常很高；是否“花费最多”取决于系统寿命与统计口径。\n🔵【四大维护类型】：\n改正性维护：识别和纠正已发现的错误（修复缺陷）。\n适应性维护：使软件适应外部环境变化（平台、法规、接口等）。\n完善性维护：根据新需求扩充功能、改善性能或可用性。\n预防性维护：改善内部结构、可维护性或可靠性，以降低未来故障和修改风险。\n⚫️【坑点】：\n许多经典统计中完善性维护占比较大，但比例随项目和口径显著变化，题目未给教材数据时不应死记20/25/50/5。\n改正性维护是修复Bug，适应性维护是适应外部环境变化。\n第八章：软件项目管理\n考点21A：验证、确认与评审（高频辨析）\n🔴【Verification，验证】：检查工作产品是否符合上一阶段规定和规格，常概括为“是否正确地构造产品”。评审、检查、静态分析不要求运行程序，也属于质量保证手段。\n🔴【Validation，确认】：检查最终系统是否满足用户真实需要和预期用途，常概括为“是否构造了正确的产品”。验收测试是重要确认活动。\n⚫️【坑点】：软件测试通常需要运行被测程序，静态评审不运行程序；二者都能发现缺陷，不能把“测试”与“评审”混为一种方法。\n考点21B：UML常用图（岗位考试高频）\n🔴【用例图】：描述参与者与系统功能需求的关系，常用于需求分析；参与者是角色，不一定等同某个具体人。\n🔴【类图】：描述类、属性、操作及关联、聚合、组合、泛化等静态关系。\n🔴【顺序图】：按时间顺序描述对象之间的消息交互；【活动图】描述业务流程、控制流和并发分支；【状态机图】描述对象状态及事件触发的迁移。\n⚫️【坑点】：数据流图DFD是结构化分析工具，不是UML图；程序流程图描述算法控制流，也不等同于UML活动图。\n考点22：可行性研究\n🔴【目的】：用最小的代价在尽可能短的时间内确定问题是否能够解决。\n🔴【四种可行性】：\n经济可行性：成本-效益分析。\n技术可行性：从技术角度研究实现系统的可行性（对系统所要求的功能、性能及限制条件进行分析）。\n操作可行性：系统的运行方式在用户组织中是否可行。\n法律可行性：是否触犯法律或有侵权行为。\n考点23：软件质量与文档\n🔴【软件文档的作用】：不仅是开发各阶段的依据，而且影响软件的可理解性。\n🔴【软件配置管理】：\n“检出（Check-out）”和“检入（Check-in）”用于受控获取、提交配置项版本，可辅助实现存取控制、版本管理和并行修改协调；现代分布式版本控制并不一定采用独占检出模式。\n🔥 本章高频简答题汇总\n1. 什么是软件危机？主要表现有哪些？\n🔵【踩分点】：软件危机是在软件开发和维护中遇到的一系列问题。主要表现：进度滞后、成本超支、质量不可控、维护困难、文档缺乏。\n2. 简述软件生命周期的三大时期和主要阶段。\n🔵【踩分点】：\n软件定义期：问题定义、可行性研究、需求分析。\n软件开发期：概要设计、详细设计、编码、测试。\n软件运行期：维护（花费最多、时间最长）。\n3. 比较瀑布模型和原型模型。\n🔵【踩分点】：\n瀑布：线性顺序、需求明确时适用、文档驱动、变更困难。\n原型：边看边改、需求模糊时适用、快速构建、容易导致结构混乱。\n4. 简述螺旋模型的核心特点。\n🔵【踩分点】：螺旋模型 =瀑布模型 + 原型模型 + 风险分析。每轮迭代都包含风险分析是其独有特征，适合大型高风险项目。\n5. 区分功能需求、非功能需求和约束需求。\n🔵【踩分点】：\n功能需求：系统必须做什么（具体功能）。\n非功能需求：系统做得好不好（性能、安全、可靠性等）。\n约束需求：开发的外部限制条件（必须使用XX语言/平台）。\n6. 简述黑盒测试和白盒测试的区别。\n🔵【踩分点】：\n黑盒测试：不看内部代码，只测输入输出（功能测试）。方法：等价类划分、边界值分析。\n白盒测试：看内部逻辑结构（结构测试）。方法：语句覆盖、判定覆盖、条件覆盖、路径覆盖。\n7. 简述软件测试的四个阶段及其任务。\n🔵【踩分点】：\n单元测试：测试每个模块内部。\n集成测试：测试模块之间的接口。\n系统测试：测试整个系统。\n验收测试：用户确认是否满足需求（Alpha = 开发环境，Beta = 真实环境）。\n8. 简述软件维护的四种类型。\n🔵【踩分点】：\n改正性维护：修复已发现缺陷。\n适应性维护：适应平台、法规、接口等环境变化。\n完善性维护：扩充功能、改善性能或可用性。\n预防性维护：改善内部质量，降低未来故障和修改风险。\n口诀速记\n“软件由程序数据文档成，逻辑产品修改会退化；软件危机滞后超支质量弱，工程三要素方法工具过程；瀑布阶段需求稳，原型澄清需求，螺旋核心风险析，敏捷迭代反馈快；模块高内聚低耦合；黑盒看功能，白盒看结构；测试单元、集成、系统、验收；维护改正、适应、完善、预防。”\n\n【表格1】\n\n时期（🔴） | 阶段（🔵） | 主要产出/任务（⚫️）\n软件定义期 | 问题定义 | 明确“要解决什么问题”\n | 可行性研究 | 确定问题是否有可行的解法，产生可行性分析报告\n | 需求分析 | 确定系统“必须做什么”，产生需求规格说明书\n软件开发期 | 概要设计（总体设计） | 确定软件体系结构、模块划分\n | 详细设计 | 确定每个模块的算法和数据结构\n | 编码 | 编写程序代码\n | 测试 | 通过执行和检查发现缺陷；定位并修正缺陷属于调试/修改活动\n软件运行期 | 维护 | 花费最多、持续时间最长的阶段\n\n【表格2】\n\n模型（🔴） | 核心机制（🔵） | 最大优点（⚫️） | 最大缺点（⚫️） | 适用场景\n瀑布 | 线性顺序、阶段化 | 易于管理和审查 | 需求变更极难 | 需求明确稳定\n原型 | 边看边改 | 解决需求模糊 | 易导致结构混乱 | 需求不明确\n螺旋 | 瀑布+原型+风险分析 | 强调风险规避 | 依赖风险评估经验 | 大型高风险\n敏捷 | 拥抱变化、快速迭代 | 响应变化快 | 缺乏规范文档 | 需求快速变化\n增量 | 分批次交付 | 尽早拿到核心功能 | 要求模块化好 | 大型项目分步上线\n"},{"name":"信息安全","text":"# 📚 信息安全\n\n使用说明：🔴红色 = 核心考点与判断改错点；🔵蓝色 = 简答题得分词、技术流程与防护措施；⚫️黑色 = 适用条件、解释、案例和法律口径。法律部分按 2026 年 7 月现行公开规范整理，考试若指定旧版法规，应按题干时间作答。\n\n第一章：信息安全目标与风险管理\n\n考点1：安全目标\n\n🔴【CIA 三要素】：保密性（Confidentiality）、完整性（Integrity）、可用性（Availability）是最通用的三项核心目标。\n\n🔵保密性：信息只向获得授权的主体披露。\n\n🔵完整性：防止信息被未经授权地修改或破坏，并能发现异常变更。\n\n🔵可用性：授权主体在需要时能够访问和使用信息及系统。\n\n🔴【扩展目标】：真实性、可控性、可追溯/可审计性、不可否认性等可按不同标准加入，但不是所有教材都把它们和 CIA 并列为同一固定“五目标”。\n\n⚫️【概念区分】：不可否认性强调参与者不能否认已实施的发送、签署等行为；可审计性强调行为可记录、追踪和审查，二者相关但不是同义词。\n\n考点2：威胁、脆弱性与风险\n\n🔴【基本关系】：资产具有价值；威胁可能利用脆弱性造成影响；风险通常综合考虑发生可能性与后果。漏洞本身不等于一次已经发生的攻击。\n\n🔵【风险处置】：规避、降低/缓解、转移、接受。安全措施应覆盖预防、检测、响应和恢复，不能只依赖单一产品。\n\n🔴【最小权限】：用户、程序和服务只获得完成任务所需的最少权限；【纵深防御】：在身份、终端、网络、应用、数据等多层部署相互补充的控制。\n\n第二章：恶意代码与社会工程\n\n考点3：病毒、蠕虫与木马\n\n🔴【计算机病毒】：通常指编制或插入计算机程序中，破坏功能或数据、影响使用并能自我复制的一组指令或程序代码。病毒一般依附于宿主文件、引导区或文档宏等传播。\n\n🔴【常见特征】：传染/复制、寄生、潜伏、隐蔽、可触发和破坏等是教材常见归纳，但“固定七大特征”并非所有标准的唯一分类，选择题要结合题干来源。\n\n🔴【蠕虫】：可独立运行并利用网络或系统漏洞自我传播，通常不需要寄生传统宿主程序。\n\n🔴【特洛伊木马】：伪装为正常程序或功能诱导用户执行，常用于窃密、远控或下载其他恶意代码；其定义重点不是自我复制。\n\n🔴【勒索软件】：通过加密文件、锁定系统或窃取数据进行勒索；它是一种攻击目的/恶意软件类型，可能借助木马、漏洞或蠕虫能力传播，不能把所有勒索软件都归为蠕虫。\n\n🔴【逻辑炸弹】：隐藏在程序中，在特定时间或条件满足时触发恶意操作；它不同于用大量流量使服务不可用的 DoS/DDoS。\n\n🔴【宏病毒】：利用 Office 等应用的宏机制传播。现代 Office 格式中，含宏文档常见 `.docm/.xlsm`，旧格式也可能含宏；不能只背 `.doc/.xls/.dot`。\n\n考点4：传播与防护\n\n🔵【常见入口】：钓鱼邮件和链接、恶意附件、盗版或被篡改软件、漏洞利用、弱口令、移动介质、供应链与远程服务。\n\n⚫️【设备表述】：显示器本身通常不存储并执行恶意代码；但扫描仪、打印机等现代设备可能接入网络、使用固件或配套软件，相关驱动、扫描文件或服务也可能存在安全风险。因此“使用扫描仪绝对不会感染”过于绝对。\n\n🔵【防护清单】：及时修补系统和软件；从可信来源安装软件；启用终端防护和防火墙；对附件、宏和链接保持警惕；使用多因素认证；重要数据按 3-2-1 思路备份，并保留离线或不可变副本；定期验证恢复能力。\n\n⚫️【杀毒局限】：安全软件可检测和阻断大量已知及部分未知威胁，但存在误报、漏报和更新滞后，不能承诺查杀所有恶意代码。\n\n第三章：身份、访问与网络安全\n\n考点5：认证、授权与审计\n\n🔴【认证 Authentication】：确认“你是谁”；【授权 Authorization】：确定“你能做什么”；【审计 Accounting/Auditing】：记录“你做了什么”。三者不能混淆。\n\n🔴【认证因素】：所知道的（密码）、所持有的（令牌/手机/安全密钥）、所具有的（指纹/人脸）。多因素认证要求来自不同因素类别，两个密码不算真正的双因素。\n\n🔵【密码安全】：使用长且唯一的口令；不同站点不复用；借助可信密码管理器；服务端采用带盐的专用口令哈希算法存储，不应明文保存。\n\n考点6：防火墙与入侵检测\n\n🔴【防火墙】：依据安全策略控制不同网络区域或主机之间的通信，可实现包过滤、状态检测、应用层代理等功能。\n\n🔴【局限】：防火墙不能保证阻断所有攻击；对绕过防火墙的路径、合法账号滥用、允许流量中的攻击和加密流量存在可见性限制。\n\n⚫️【绝对化陷阱】：现代下一代防火墙可集成入侵防御、恶意代码检测等能力，路由器也可集成访问控制；因此“防火墙绝对不能防病毒”“防火墙绝对不是路由设备”都不严谨。设备名称不如实际功能和部署策略重要。\n\n🔴【IDS 与 IPS】：IDS 侧重发现、告警；IPS 通常串联部署并可实时阻断。误报是把正常行为判为攻击，漏报是未发现真实攻击。\n\n考点7：常见网络攻击\n\n🔴【网络钓鱼】：冒充可信主体诱骗用户交出凭据、付款或执行恶意程序；鱼叉式钓鱼面向特定个人或组织。\n\n🔴【DoS/DDoS】：消耗带宽、连接或计算资源，使服务对正常用户不可用；DDoS 使用多个分布式来源。邮件炸弹可视为资源滥用方式之一，但逻辑炸弹不是 DoS 的同义词。\n\n🔴【中间人攻击】：攻击者介入通信并窃听或篡改数据；正确验证证书并使用 TLS 可降低风险。\n\n🔴【SQL 注入】：把恶意输入拼入 SQL 语句；核心防护是参数化查询/预编译、输入校验与最小数据库权限，不能只靠前端过滤。\n\n🔴【XSS】：恶意脚本在受害者浏览器执行；核心防护包括按输出上下文编码、内容安全策略和安全 Cookie 等。\n\n第四章：密码学、哈希与数字签名\n\n考点8：对称与非对称密码\n\n🔴【对称加密】：加密和解密使用同一密钥或可相互推导的共享密钥，速度快，适合大量数据；难点是密钥安全分发与管理。常见算法有 AES。\n\n🔴【非对称加密】：使用公钥和私钥对，便于密钥分发和身份认证，但计算开销较大。常见体系有 RSA、ECC。\n\n🔵【混合加密】：通常用非对称机制协商或保护会话密钥，再用对称算法加密大量通信数据。HTTPS/TLS 的具体流程随协议版本和密码套件变化，不能简化成唯一固定算法。\n\n考点9：哈希、签名与证书\n\n🔴【密码散列/哈希】：把任意长度数据映射为固定长度摘要，具有单向性和抗碰撞等目标；哈希不是可逆加密。\n\n🔴【数字签名基本流程】：发送者用私钥相关的签名算法对消息摘要签名，接收者用相应公钥验证。\n\n🔵【签名提供】：来源认证、完整性校验和一定条件下的不可否认性；数字签名本身不保证消息保密，也不防止病毒入侵。\n\n🔴【数字证书】：由可信 CA 等签发，把主体身份与公钥等信息绑定；验证证书时还要检查有效期、域名/用途、签发链及吊销状态。\n\n⚫️【加密与签名方向】：为接收者保密常使用接收者公钥加密、接收者私钥解密；签名使用签名者私钥生成、签名者公钥验证。二者目标不同。\n\n第五章：数据、个人信息与法律规范\n\n考点10：数据与个人信息保护\n\n🔴【数据全生命周期】：收集、存储、使用、加工、传输、提供、公开、删除等环节都需落实安全与合规要求。\n\n🔴【个人信息】：以电子或其他方式记录的、与已识别或可识别自然人有关的各种信息，不包括匿名化处理后的信息。\n\n🔵【个人信息处理原则】：合法、正当、必要和诚信；目的明确、合理并与处理目的直接相关；采取对个人权益影响最小的方式；公开透明；保证质量；采取安全保护措施。\n\n⚫️【同意不是唯一基础】：取得个人同意是重要处理依据，但《个人信息保护法》还规定履行合同、履行法定职责等其他法定情形；不能写成“任何处理都必须一律同意”。处理敏感个人信息通常要求特定目的、充分必要、严格保护，并依法取得单独同意等。\n\n考点11：现行法律框架与考试边界\n\n🔴【高频法律】：\n\n《中华人民共和国网络安全法》是网络安全领域基础性法律；2025 年修正文本自 2026 年 1 月 1 日起施行。\n\n《中华人民共和国数据安全法》规范数据处理活动，建立数据分类分级保护等制度。\n\n《中华人民共和国个人信息保护法》保护自然人个人信息权益并规范个人信息处理活动。\n\n《中华人民共和国著作权法》《计算机软件保护条例》保护计算机软件著作权；保护的是符合法律条件的表达，不是把思想、算法或功能概念一概垄断。\n\n🔴【“5000/500”必须写全条件】：两高关于利用信息网络实施诽谤等刑事案件的司法解释中，对“利用信息网络诽谤他人”的“情节严重”列有数量标准：同一诽谤信息实际被点击、浏览 5000 次以上，或者被转发 500 次以上。它不是“所有网络谣言达到次数就自动构成犯罪”的通用公式，还要满足捏造事实诽谤他人、主观认识及刑法规定等构成条件，并结合案件事实认定。\n\n⚫️【时效提醒】：法律法规可能修订；答题时先看题干给出的法规名称、年份和行为条件。仅凭“违法/合法”标签，不分析主体、行为、主观状态、后果和适用条款，通常不够严谨。\n\n🔵【网络文明与职业伦理】：尊重知识产权和个人隐私；不越权访问；不传播违法有害信息；不制作、传播恶意代码；发现漏洞应按授权范围测试并负责任披露。\n\n口诀速记\n\n“CIA：保密、完整、可用；认证问是谁，授权问能做什么，审计记录做过什么；病毒多寄生，蠕虫可自传，木马靠伪装，勒索不一定是蠕虫；防火墙按策略控流量，但不能包治百病；哈希不可逆，加密保机密，签名验来源和完整；私钥签、公钥验，接收者公钥加、私钥解；法律次数有前提，个人信息处理看合法基础。”\n"}];
    const directory = document.getElementById("directory");
    const courses = document.getElementById("courses");
    const courseEmpty = document.getElementById("course-empty");
    const courseStatus = document.getElementById("course-status");
    const courseSearch = document.getElementById("course-search");
    const courseSearchClear = document.getElementById("course-search-clear");
    const study = document.getElementById("study");
    const content = document.getElementById("content");
    const search = document.getElementById("search");
    const searchClear = document.getElementById("search-clear");
    const searchStatus = document.getElementById("search-status");
    const chapterNav = document.getElementById("chapter-nav");
    const chapterLinks = document.getElementById("chapter-links");
    const navCollapse = document.getElementById("nav-collapse");
    const mobileNavToggle = document.getElementById("mobile-nav-toggle");
    const navMask = document.getElementById("nav-mask");
    const studyToolbar = document.querySelector(".study-toolbar");
    const siteHeader = document.querySelector(".site-header");
    const mobileMedia = window.matchMedia("(max-width: 700px)");
    let currentCourse = null;
    let activeObserver = null;
    let collapsedBeforeSearch = null;
    let searchTimer = null;
    let mobileNavReturnFocus = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[char]));
    }

    function formatInline(value) {
      const source = String(value || "");
      let output = escapeHtml(source)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      if (source.startsWith("🔴")) output = `<span class="red">${output}</span>`;
      else if (source.startsWith("🔵")) output = `<span class="blue">${output}</span>`;
      else if (source.startsWith("⚫")) output = `<span class="black">${output}</span>`;
      return output;
    }

    function tableCells(line) {
      let trimmed = line.trim();
      if (trimmed.startsWith("|")) trimmed = trimmed.slice(1);
      if (trimmed.endsWith("|")) trimmed = trimmed.slice(0, -1);
      const cells = [];
      let cell = "";
      for (let index = 0; index < trimmed.length; index += 1) {
        if (trimmed[index] === "\\" && trimmed[index + 1] === "|") {
          cell += "|";
          index += 1;
        } else if (trimmed[index] === "|") {
          cells.push(cell.trim());
          cell = "";
        } else {
          cell += trimmed[index];
        }
      }
      cells.push(cell.trim());
      return cells;
    }

    function isSeparatorRow(cells) {
      return cells.length > 0 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
    }

    function isTableStart(lines, index) {
      if (index + 1 >= lines.length || !lines[index].includes("|") || !lines[index + 1].includes("|")) return false;
      const first = tableCells(lines[index]);
      const second = tableCells(lines[index + 1]);
      return first.length >= 2 && second.length === first.length;
    }

    function renderTable(rows) {
      const parsed = rows.map(tableCells);
      const bodyRows = isSeparatorRow(parsed[1] || []) ? parsed.slice(2) : parsed.slice(1);
      const header = parsed[0];
      return `<div class="table-wrap" tabindex="0" aria-label="可横向滚动的表格"><table><thead><tr>${header.map((cell) => `<th scope="col">${formatInline(cell)}</th>`).join("")}</tr></thead><tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${formatInline(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div><p class="table-hint">↔ 左右滑动查看完整表格</p>`;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.split(/\r?\n/);
      const output = ["<div class=\"preface\">"];
      let index = 0;
      let chapterOpen = false;
      let prefaceOpen = true;
      let listType = null;

      const closeList = () => {
        if (!listType) return;
        output.push(`</${listType}>`);
        listType = null;
      };
      const closePreface = () => {
        if (!prefaceOpen) return;
        closeList();
        output.push("</div>");
        prefaceOpen = false;
      };
      const closeChapter = () => {
        closeList();
        if (!chapterOpen) return;
        output.push("</div></section>");
        chapterOpen = false;
      };

      while (index < lines.length) {
        const trimmed = lines[index].trim();
        if (!trimmed) {
          closeList();
          index += 1;
          continue;
        }
        if (trimmed.startsWith("使用说明")) {
          index += 1;
          continue;
        }
        if (trimmed.startsWith("```")) {
          closeList();
          const language = trimmed.slice(3).trim().replace(/[^a-zA-Z0-9_-]/g, "");
          const code = [];
          index += 1;
          while (index < lines.length && !lines[index].trim().startsWith("```")) {
            code.push(lines[index]);
            index += 1;
          }
          if (index < lines.length) index += 1;
          output.push(`<pre><code${language ? ` class="language-${language}"` : ""}>${escapeHtml(code.join("\n"))}</code></pre>`);
          continue;
        }
        if (isTableStart(lines, index)) {
          closeList();
          const rows = [lines[index]];
          const columnCount = tableCells(lines[index]).length;
          index += 1;
          while (index < lines.length && lines[index].trim() && lines[index].includes("|") && tableCells(lines[index]).length === columnCount) {
            rows.push(lines[index]);
            index += 1;
          }
          output.push(renderTable(rows));
          continue;
        }

        const h1 = trimmed.match(/^#\s+(.+)$/);
        const markdownH2 = trimmed.match(/^##\s+(.+)$/);
        const markdownH3 = trimmed.match(/^###\s+(.+)$/);
        const plainChapter = trimmed.match(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?.*$/);
        const plainPoint = trimmed.match(/^(?:考点|专题|模块)\s*\d+[：:]?.*$/);

        if (markdownH2 || plainChapter) {
          closeChapter();
          closePreface();
          const title = markdownH2 ? markdownH2[1] : plainChapter[0];
          output.push(`<section class="chapter-section"><h2 class="chapter-heading"><button class="chapter-toggle" type="button" aria-expanded="true"><span class="chapter-title">${formatInline(title)}</span><span class="chapter-chevron" aria-hidden="true">▾</span></button></h2><div class="chapter-body">`);
          chapterOpen = true;
        } else if (h1) {
          closeList();
          output.push(`<h1>${formatInline(h1[1])}</h1>`);
        } else if (markdownH3 || plainPoint) {
          closeList();
          const title = markdownH3 ? markdownH3[1] : plainPoint[0];
          output.push(`<h3 class="point">${formatInline(title)}</h3>`);
        } else if (/^>\s?/.test(trimmed)) {
          closeList();
          output.push(`<blockquote>${formatInline(trimmed.replace(/^>\s?/, ""))}</blockquote>`);
        } else if (/^[-*]\s+/.test(trimmed) || /^\d+[.)]\s+/.test(trimmed)) {
          const nextListType = /^\d+[.)]\s+/.test(trimmed) ? "ol" : "ul";
          if (listType !== nextListType) {
            closeList();
            output.push(`<${nextListType}>`);
            listType = nextListType;
          }
          output.push(`<li>${formatInline(trimmed.replace(/^(?:[-*]|\d+[.)])\s+/, ""))}</li>`);
        } else {
          closeList();
          output.push(`<p>${formatInline(trimmed)}</p>`);
        }
        index += 1;
      }
      closePreface();
      closeChapter();
      content.innerHTML = output.join("");
      bindChapters();
    }

    function cleanChapterLabel(label) {
      const cleaned = label.replace(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?\s*/, "").trim();
      return cleaned || label;
    }

    function bindChapters() {
      if (activeObserver) activeObserver.disconnect();
      chapterLinks.innerHTML = "";
      const sections = [...content.querySelectorAll(".chapter-section")];
      sections.forEach((section, index) => {
        section.id = `chapter-${index + 1}`;
        const toggle = section.querySelector(".chapter-toggle");
        const title = section.querySelector(".chapter-title").textContent.trim();
        toggle.setAttribute("aria-controls", `${section.id}-body`);
        section.querySelector(".chapter-body").id = `${section.id}-body`;
        toggle.addEventListener("click", () => {
          const collapsed = section.classList.toggle("collapsed");
          toggle.setAttribute("aria-expanded", String(!collapsed));
        });

        const link = document.createElement("button");
        link.type = "button";
        link.className = "chapter-link";
        link.textContent = cleanChapterLabel(title);
        link.addEventListener("click", () => {
          section.classList.remove("collapsed");
          toggle.setAttribute("aria-expanded", "true");
          section.scrollIntoView({behavior: "smooth", block: "start"});
          if (mobileMedia.matches) {
            closeMobileNav({restoreFocus: false});
            toggle.focus({preventScroll: true});
          }
        });
        chapterLinks.appendChild(link);
      });

      chapterNav.classList.toggle("hidden", sections.length === 0);
      mobileNavToggle.classList.toggle("hidden", sections.length === 0);
      if (!sections.length) return;
      activeObserver = new IntersectionObserver((entries) => {
        const visible = entries.filter((entry) => entry.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
        if (!visible) return;
        const index = sections.indexOf(visible.target);
        chapterLinks.querySelectorAll(".chapter-link").forEach((link, linkIndex) => {
          const active = linkIndex === index;
          link.classList.toggle("active", active);
          if (active) link.setAttribute("aria-current", "location");
          else link.removeAttribute("aria-current");
        });
      }, {rootMargin: "-135px 0px -62% 0px", threshold: 0});
      sections.forEach((section) => activeObserver.observe(section));
    }

    function openCourse(course) {
      currentCourse = course;
      collapsedBeforeSearch = null;
      renderMarkdown(course.text);
      directory.classList.add("hidden");
      study.classList.remove("hidden");
      search.value = "";
      searchClear.classList.add("hidden");
      searchStatus.textContent = "";
      window.scrollTo({top: 0, behavior: "auto"});
      content.focus({preventScroll: true});
    }

    function showDirectory() {
      closeMobileNav();
      currentCourse = null;
      collapsedBeforeSearch = null;
      study.classList.add("hidden");
      directory.classList.remove("hidden");
      search.value = "";
      searchStatus.textContent = "";
      window.scrollTo({top: 0, behavior: "auto"});
      const title = document.getElementById("directory-title");
      title.setAttribute("tabindex", "-1");
      title.focus({preventScroll: true});
    }

    function courseHash(course) {
      return `#course=${encodeURIComponent(course.name)}`;
    }

    function navigateToCourse(course) {
      const target = courseHash(course);
      if (location.hash === target) {
        openCourse(course);
        return;
      }
      history.pushState({shaoyangCourse: true}, "", target);
      applyLocation();
    }

    function applyLocation() {
      const params = new URLSearchParams(location.hash.replace(/^#/, ""));
      const name = params.get("course");
      const course = name ? items.find((item) => item.name === name) : null;
      if (course) openCourse(course);
      else if (!study.classList.contains("hidden")) showDirectory();
    }

    function renderCourses(query = "") {
      const normalized = query.trim().toLowerCase();
      courses.innerHTML = "";
      const matches = items.filter((course) => course.name.toLowerCase().includes(normalized));
      matches.forEach((course) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "course-card";
        const icon = document.createElement("span");
        icon.className = "course-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.textContent = "📘";
        const name = document.createElement("span");
        name.className = "course-name";
        name.textContent = course.name;
        button.append(icon, name);
        button.addEventListener("click", () => navigateToCourse(course));
        courses.appendChild(button);
      });
      courseEmpty.classList.toggle("hidden", matches.length > 0);
      courseStatus.textContent = normalized ? `找到 ${matches.length} 门课程` : "";
    }

    function highlightMatches(root, query) {
      const nodes = [];
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.nodeValue.trim() || node.parentElement.closest("mark")) return NodeFilter.FILTER_REJECT;
          return node.nodeValue.toLowerCase().includes(query) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        },
      });
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach((node) => {
        const text = node.nodeValue;
        const lower = text.toLowerCase();
        const fragment = document.createDocumentFragment();
        let offset = 0;
        let found = lower.indexOf(query, offset);
        while (found !== -1) {
          fragment.append(document.createTextNode(text.slice(offset, found)));
          const mark = document.createElement("mark");
          mark.textContent = text.slice(found, found + query.length);
          fragment.append(mark);
          offset = found + query.length;
          found = lower.indexOf(query, offset);
        }
        fragment.append(document.createTextNode(text.slice(offset)));
        node.replaceWith(fragment);
      });
    }

    function filterContent() {
      const query = search.value.trim().toLowerCase();
      searchClear.classList.toggle("hidden", !query);
      if (!currentCourse) return;
      if (query && collapsedBeforeSearch === null) {
        collapsedBeforeSearch = new Set([...content.querySelectorAll(".chapter-section")]
          .map((section, index) => section.classList.contains("collapsed") ? index : -1)
          .filter((index) => index >= 0));
      }
      renderMarkdown(currentCourse.text);
      const sections = [...content.querySelectorAll(".chapter-section")];
      const targets = [...content.querySelectorAll(".preface, .chapter-section")];
      let matches = 0;
      let firstMatch = null;
      targets.forEach((target) => {
        const show = !query || target.textContent.toLowerCase().includes(query);
        target.classList.toggle("hidden", !show);
        if (query && show) {
          matches += 1;
          firstMatch ||= target;
          target.classList.remove("collapsed");
          target.querySelector(".chapter-toggle")?.setAttribute("aria-expanded", "true");
          highlightMatches(target, query);
        }
      });
      if (!query && collapsedBeforeSearch) {
        sections.forEach((section, index) => {
          const collapsed = collapsedBeforeSearch.has(index);
          section.classList.toggle("collapsed", collapsed);
          section.querySelector(".chapter-toggle")?.setAttribute("aria-expanded", String(!collapsed));
        });
        collapsedBeforeSearch = null;
      }
      searchStatus.textContent = query ? (matches ? `找到 ${matches} 个相关内容区，已定位到首个结果` : "当前课程没有匹配内容") : "";
      chapterLinks.querySelectorAll(".chapter-link").forEach((link, index) => link.classList.toggle("hidden", Boolean(query) && sections[index]?.classList.contains("hidden")));
      if (firstMatch) requestAnimationFrame(() => firstMatch.scrollIntoView({behavior: "smooth", block: "start"}));
    }

    function setDesktopNavCollapsed(collapsed) {
      study.classList.toggle("nav-collapsed", collapsed);
      navCollapse.setAttribute("aria-expanded", String(!collapsed));
      navCollapse.setAttribute("aria-label", collapsed ? "展开章节目录" : "收起章节目录");
      navCollapse.querySelector("span").textContent = collapsed ? "›" : "‹";
    }

    function openMobileNav() {
      mobileNavReturnFocus = document.activeElement;
      study.classList.add("mobile-nav-open");
      chapterNav.setAttribute("aria-hidden", "false");
      chapterNav.setAttribute("role", "dialog");
      chapterNav.setAttribute("aria-modal", "true");
      chapterNav.inert = false;
      studyToolbar.inert = true;
      content.inert = true;
      siteHeader.inert = true;
      mobileNavToggle.setAttribute("aria-expanded", "true");
      mobileNavToggle.setAttribute("aria-label", "关闭章节目录");
      navCollapse.setAttribute("aria-label", "关闭章节目录");
      navCollapse.querySelector("span").textContent = "×";
      document.body.style.overflow = "hidden";
      navCollapse.focus();
    }

    function closeMobileNav({restoreFocus = true} = {}) {
      const wasOpen = study.classList.contains("mobile-nav-open");
      study.classList.remove("mobile-nav-open");
      chapterNav.setAttribute("aria-hidden", String(mobileMedia.matches));
      chapterNav.removeAttribute("role");
      chapterNav.removeAttribute("aria-modal");
      chapterNav.inert = mobileMedia.matches;
      studyToolbar.inert = false;
      content.inert = false;
      siteHeader.inert = false;
      mobileNavToggle.setAttribute("aria-expanded", "false");
      mobileNavToggle.setAttribute("aria-label", "打开章节目录");
      document.body.style.overflow = "";
      if (wasOpen && restoreFocus && mobileNavReturnFocus && document.contains(mobileNavReturnFocus)) mobileNavReturnFocus.focus();
      mobileNavReturnFocus = null;
    }

    function trapMobileNavFocus(event) {
      const focusable = [...chapterNav.querySelectorAll("button:not([disabled]), [href], [tabindex]:not([tabindex='-1'])")]
        .filter((element) => !element.hidden && element.getClientRects().length);
      if (!focusable.length) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    courseSearch.addEventListener("input", () => {
      renderCourses(courseSearch.value);
      courseSearchClear.classList.toggle("hidden", !courseSearch.value);
    });
    courseSearchClear.addEventListener("click", () => {
      courseSearch.value = "";
      renderCourses();
      courseSearchClear.classList.add("hidden");
      courseSearch.focus();
    });
    search.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(filterContent, 160);
    });
    searchClear.addEventListener("click", () => {
      search.value = "";
      filterContent();
      search.focus();
    });
    document.getElementById("back").addEventListener("click", () => {
      if (history.state?.shaoyangCourse) history.back();
      else {
        history.replaceState(null, "", location.href.split("#")[0]);
        showDirectory();
      }
    });
    navCollapse.addEventListener("click", () => {
      if (mobileMedia.matches) closeMobileNav();
      else setDesktopNavCollapsed(!study.classList.contains("nav-collapsed"));
    });
    mobileNavToggle.addEventListener("click", () => {
      if (study.classList.contains("mobile-nav-open")) closeMobileNav();
      else openMobileNav();
    });
    navMask.addEventListener("click", closeMobileNav);
    document.addEventListener("keydown", (event) => {
      if (study.classList.contains("mobile-nav-open")) {
        if (event.key === "Escape") closeMobileNav();
        else if (event.key === "Tab") trapMobileNavFocus(event);
      }
    });
    mobileMedia.addEventListener("change", () => {
      closeMobileNav();
      if (!mobileMedia.matches) setDesktopNavCollapsed(study.classList.contains("nav-collapsed"));
    });

    window.addEventListener("popstate", applyLocation);
    renderCourses();
    closeMobileNav();
    applyLocation();
  </script>
</body>
</html>
