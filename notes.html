U利用率提高。缺点：适合少量数据传输，频繁中断也会消耗CPU资源。\n🔴【方式3：直接存储器存取方式（DMA）】（极高频考点）：\n核心：DMA控制器在取得总线控制权后，使I/O设备与主存之间成批传送数据，CPU不逐字节搬运。\n适用场景：大批量数据传送（如磁盘读写、视频数据传输）。\n特点：传送过程中CPU可以执行其他任务，传送结束后才向CPU发中断报告。\n⚫️【坑点判断题】：\n“DMA方式传输数据时，完全不需要CPU干预。” → 严格说传送过程中不需要CPU，但开始和结束仍需CPU参与配置和中断响应。如果选项说“完全不需要CPU”，通常是错的！\n“中断方式适合大批量数据传输” →错！适合小批量。大批量用DMA。\n第七章：数据的表示与编码\n考点20：原码、反码、补码（必考计算！）\n🔴【核心结论】：现代计算机中的有符号整数通常用补码表示；无符号整数、浮点数、字符等采用各自编码，不能统称“所有数据都用补码”。补码使加减法可统一使用加法器，并把零表示唯一化。\n🔵【三码转换规则（以8位为例）】：\n正数：原码 = 反码 = 补码（三者相同）。\n例：+5 → 原码00000101，反码00000101，补码00000101。\n负数：符号位为1（最高位），其余位：\n原码：数值部分为绝对值的二进制。\n例：-5 → 原码10000101。\n反码：符号位不变，其余位按位取反。\n例：-5 → 反码11111010。\n补码：反码 + 1（末位加1）。\n例：-5 → 补码11111011。\n⚫️【特殊值】：8位补码能表示的范围是-128 ~ +127。-128的补码是10000000（这是个必须记住的特殊值）。\n⚫️【坑点】：8位无符号二进制能表示的最大十进制数是255（2⁸-1），不是256。\n考点21：ASCII码\n🔴【ASCII码】：美国信息交换标准代码，7位二进制编码（存储时占1个字节，即8位）。\n🔴【编码数量】：共128个（0-127）。\n🔴【关键数值（必须记住！）】：\n数字'0'→ 48（十进制）→00110000（二进制）\n大写'A'→ 65 →1000001\n小写'a'→ 97 →1100001\n🔴【ASCII码大小排序】：数字（0-9）< 大写字母（A-Z）< 小写字母（a-z）。\n⚫️【坑点】：大写字母和小写字母的ASCII码差32。'A'=65，'a'=97，差32。'a'比'A'大32。\n考点22：汉字编码\n🔴【四个层次】：\n输入码（外码）：用于输入汉字，如五笔（形码）、拼音（音码）。\n交换码（国标码）：传统教材常以GB2312国标码说明信息交换；GBK是对GB2312的扩展编码，Unicode则是现代跨平台字符编码标准。\n机内码（内码）：传统GB2312教材中，汉字机内码由国标码两个字节各加80H得到，两个字节最高位均为1；“占2字节”只适用于该编码口径。\n字形码（字模码）：用于输出显示/打印，用点阵表示（如16×16、24×24）。\n⚫️【坑点】：\n五笔字型属于输入码（外码），不是机内码！\n传统教材中对汉字处理、存储常说使用机内码；现代系统具体采用UTF-8、UTF-16、GBK等编码，应以题干为准。\n输出汉字字形的清晰度与汉字点阵的规模有关（点阵越大越清晰）。\n在GB2312传统双字节口径下，汉字机内码的两个字节分别比国标码高80H，整体常表述为相差8080H。\n考点22A：浮点数表示（常考概念）\n🔴【基本组成】：浮点数通常由符号、阶码和尾数（有效数）组成；IEEE 754单精度为1位符号、8位阶码、23位小数部分，双精度为1+11+52位。\n🔵【规格化目的】：在约定表示下使有效数字尽可能充分，保证表示唯一性并提高精度。\n⚫️【坑点】：浮点数的表示范围主要受阶码位数影响，精度主要受尾数位数影响；浮点运算会有舍入误差，十进制小数不一定能被二进制精确表示。\n第八章：进制转换（计算题必过）\n考点23：R进制转十进制\n🔵【方法】：“按权展开，相加求和”。\n🔵【公式】：(N)R = Σ(每一位数字 × R^(该位所在位置))，小数点左第一位指数为0，向左递增，向右递减为负。\n⚫️【例】：(1101.1)₂ = 1×2³ + 1×2² + 0×2¹ + 1×2⁰ + 1×2⁻¹ = 8+4+0+1+0.5 = 13.5\n考点24：十进制转R进制\n🔵【整数部分】：“除R取余，倒序输出”（一直除到商为0，余数从下往上读）。\n🔵【小数部分】：“乘R取整，正序输出”（一直乘到积为0或达到精度，整数从上往下读）。\n⚫️【例】：(53.125)₁₀ = (110101.001)₂\n考点25：二进制转八进制/十六进制（速算法）\n🔵【二转八】：“三位并一位”。以小数点为界，左右每3位一组，不足补0，每组转成1位八进制数。\n例：(10100010.0011)₂ = (242.14)₈\n🔵【二转十六】：“四位并一位”。以小数点为界，左右每4位一组，不足补0，每组转成1位十六进制数。\n例：(11101111)₂ = (EF)₁₆\n⚫️【坑点】：十六进制数码包括0-9和A-F（A=10，B=11，C=12，D=13，E=14，F=15）。\n考点26：常考数值对照\n第九章：故障与日常维护（常识应用）\n考点27：常见故障原因\n🔴【CMOS设置丢失/时间反复重置】：常见原因是主板实时时钟/CMOS供电电池电量不足，但也可能是固件设置、主板故障等，不能仅凭现象唯一断定。\n🔴【显示器“花屏”/玩3D游戏死机】：通常怀疑显卡问题（特别是玩3D游戏时死机，重点检查显卡性能和散热）。\n🔴【开机报警不启动】：报警码含义取决于BIOS/UEFI和主板厂商，内存接触不良只是常见原因之一。应先断电并按说明书查报警码，再检查内存、显卡、供电等；不应把“用橡皮擦金手指”写成通用标准步骤。\n🔴【投影仪不显示电脑画面】：可能性：①未按笔记本切换键（Fn+F4/F5等）；②分辨率不匹配；③连接线松动或损坏。\n🔴【计算机无声】：可能原因：声卡损坏、扬声器损坏、音量静音。显示器处于屏保状态不是无声的原因！\n⚫️【坑点】：键盘进水后，仅仅擦干表面不能保证键盘恢复正常，水可能已渗入内部电路造成短路。\n📊 终极数字记忆表（考前过一遍）\n🔥 本章高频简答题汇总\n1. 冯·诺依曼计算机的基本特点是什么？\n🔵【踩分点】：① 由运算器、控制器、存储器、输入设备、输出设备五大部件组成。② 计算机内部采用二进制表示数据和指令。③ 采用**“存储程序、程序控制”**技术（将程序事先存入主存，计算机自动逐条取出并执行）。\n2. 简述内存和外存的区别。\n🔵【踩分点】：①内存速度快、容量小、价格高，断电后数据消失，CPU可直接访问，存放正在运行的程序和数据。②外存速度慢、容量大、价格低，断电后数据保留，CPU不能直接访问（需先调入内存），存放暂时不用的程序和数据。\n3. 简述CPU的组成及各部分功能。\n🔵【踩分点】：① CPU由运算器和控制器组成（Cache有时也在CPU内部）。②运算器：进行算术运算和逻辑运算，核心是ALU。③控制器：产生控制信号，指挥协调全机工作，核心是PC（程序计数器）和IR（指令寄存器）。\n4. 简述总线的分类及各自功能。\n🔵【踩分点】：①数据总线（DB）：传输数据，双向，宽度决定一次传输的数据量。②地址总线（AB）：传输地址，单向（CPU发出），宽度决定寻址范围（最大内存容量）。③控制总线（CB）：传输控制信号，双向。\n📈 本章计算题汇总\n1. 点阵汉字存储空间\n公式：字节数 = (点阵行数 × 点阵列数) / 8\n16×16点阵 = 32字节；24×24点阵 = 72字节；32×32点阵 = 128字节。\n2. 进制转换\n二转十：按权展开。十转二：整数除2倒取余，小数乘2正取整。\n二转八：三位并一位。二转十六：四位并一位。\n3. 总线带宽\n公式：带宽 = (总线宽度 / 8) × 工作频率\n单位：字节/秒（B/s）\n4. 补码计算\n负数补码 = 原码除符号位外逐位取反 + 1\n口诀速记\n“冯诺依曼五大件，运算控制器存输；Cache为了缓速度，RAM丢电ROM固；地址总线看容量，数据总线看宽度；补码存储为运算，二进十六四并一；ASCII数字排前，大写小写差三二。”\n【表格1】\n\n部件 | 核心功能（🔵踩分词） | 子部件/别名（⚫️）\n运算器 | 进行算术运算和逻辑运算 | 包含ALU（算术逻辑单元）、累加器（ACC）、寄存器组。不包含译码器！\n控制器 | 指挥中心，产生控制信号，协调全机工作 | 包含PC（程序计数器）、IR（指令寄存器）、指令译码器、时序产生器。\n存储器 | 存储程序和数据 | 分为内存储器（主存）和外存储器（辅存）。\n输入设备 | 将外部信息输入计算机 | 键盘、鼠标、扫描仪、话筒、摄像机、条码阅读器。\n输出设备 | 将计算机结果输出 | 显示器、打印机、音箱、绘图仪、投影仪。\n\n【表格2】\n\n十进制 | 二进制 | 八进制 | 十六进制\n10 | 1010 | 12 | A\n15 | 1111 | 17 | F\n16 | 10000 | 20 | 10\n20 | 10100 | 24 | 14\n30 | 11110 | 36 | 1E\n45 | 101101 | 55 | 2D\n100 | 1100100 | 144 | 64\n215 | 11010111 | 327 | D7\n255 | 11111111 | 377 | FF\n\n【表格3】\n\n概念 | 数值/容量 | 备注\n1个字节 | 8位 | 存储容量的最小基本单位\n标准ASCII码 | 7位编码（存储占1B） | 共128个字符\n汉字机内码 | 2个字节 | 占16位，区别于ASCII的1B\nCD音质采样频率 | 44.1kHz | 标准CD参数\nCD音质量化位数 | 16位 | 标准CD参数\n8位无符号数最大值 | 255 | 2⁸-1\n8位补码范围 | -128 ~ +127 | -128的补码是10000000\n大写A的ASCII码 | 65 | 小写a是97，差32\n数字0的ASCII码 | 48 | 记住！\n"},{"name":"计算机网络","text":"# 📚 计算机网络\n\n使用说明：🔴红色= 一级考点 / 核心术语 / 判断改错点（背下来）🔵蓝色= 简答题踩分关键词 / 计算公式 / 协议功能（考试时写上去就是分）⚫️黑色= 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n第一章：计算机网络概述\n考点1：计算机网络的定义\n🔴【定义】：将地理位置不同的、具有独立功能的多台计算机及其外部设备，通过通信线路连接起来，在网络操作系统、网络管理软件及网络通信协议的管理和协调下，实现资源共享和信息传递的计算机系统。\n🔵【三大要素】：计算机系统 + 通信线路与通信设备 + 网络协议。\n⚫️【坑点】：计算机网络是计算机技术和通信技术相结合的产物，不是计算机技术和传感技术！\n考点2：计算机网络的功能（简答题必背）\n🔴【三大功能】：\n数据通信（最基本功能）：实现计算机之间、计算机与终端之间的信息传输。如：电子邮件、文件传输。\n资源共享（重要功能）：共享硬件（打印机）、软件服务和数据（文件、数据库内容）。数据和信息资源本身也可以成为共享对象。\n分布处理（协同工作）：将大型任务分配给多台计算机并行处理。\n⚫️【坑点】：学校网站上有很多微视频供同学们下载学习，主要体现了网络的资源共享功能，不是数据通信！\n考点3：计算机网络的分类\n🔴【按覆盖范围分类】：\n局域网（LAN）：覆盖范围最小（几公里内），如校园网、机房。传输速率高、误码率低。\n城域网（MAN）：覆盖一个城市（几十公里）。\n广域网（WAN）：跨地区连接多个局域网或城域网，如运营商骨干网；Internet是全球互联网络，不宜简单等同于某一个WAN。现代数据网络以分组交换为主，传统电话网是电路交换通信网，不应直接作为计算机WAN例子。\n🔴【按拓扑结构分类】：总线型、星型、环型、树型、网状型。\n🔴【按工作模式分类】：\nC/S模式（客户机/服务器）：由专用客户端向服务器请求服务，通常需要安装或部署客户端程序，如邮件客户端、数据库客户端。\nB/S模式（浏览器/服务器）：客户端主要通过浏览器访问Web服务器，业务更新通常集中在服务器端，如网页版邮箱、在线教务系统。\n⚫️【坑点】：判断C/S或B/S看系统交互架构，不只看产品名称；许多现代应用是Web、原生客户端和云服务混合架构。“使用浏览器访问Web版”通常按B/S作答，使用专用客户端通常按C/S作答。\n考点4：计算机网络的组成（逻辑划分）\n🔴【从功能上划分】：\n资源子网：负责数据处理和资源共享。包括：主机、终端、外设、软件、数据。核心是主机。\n通信子网：负责数据传输。包括：通信线路、网络连接设备（路由器、交换机等）、通信协议。核心是通信设备和线路。\n⚫️【坑点】：转发器、交换机属于通信子网。主机属于资源子网。判断题说“资源子网负责计算机间的数据通信” →错！那是通信子网的功能！\n考点5：网络拓扑结构（对比记忆）\n🔴【总线型】：\n特点：所有节点连接在一条总线上。结构简单、成本低、易于扩展。\n缺点：总线故障导致全网瘫痪，故障检测困难。\n代表：早期的以太网。\n🔴【星型】：\n特点：所有节点通过中心节点（集线器/交换机）连接。结构简单、易维护、故障隔离容易。\n缺点：中心节点故障导致全网瘫痪，电缆成本高。\n代表：家用路由器网络、绝大多数现代局域网。\n🔴【环型】：\n特点：节点首尾相连形成闭合环。实时性好。\n缺点：可扩充性差，局部节点故障可能导致全网瘫痪，故障检测困难。\n🔴【网状型】：\n特点：节点之间有多条路径相连。可靠性高，路径选择灵活。\n缺点：线路成本高、不易维护。\n代表：Internet的拓扑结构。\n⚫️【坑点】：一旦中心节点出现故障则整个网络瘫痪的是星型结构。Internet属于网状结构。\n第二章：网络体系结构与OSI模型\n考点6：网络协议\n🔴【定义】：网络协议是计算机网络中进行数据交换而建立的规则、标准或约定的集合。是不同结点对等实体之间进行通信的规则。\n🔴【三要素】：\n语法（Syntax）：规定数据的格式和编码。→ “如何讲”。\n语义（Semantics）：规定控制信息的含义和功能。→ “讲什么”。\n时序/同步（Timing）：规定事件执行的顺序和速度匹配。→ “何时讲/讲话次序”。\n⚫️【坑点】：判断题说“语法确定通信双方讲什么” →错！语法是“如何讲”，语义才是“讲什么”。\n考点7：OSI七层模型（绝对高频，滚瓜烂熟）\n🔴【记忆口诀】：“物、数、网、传、会、表、应”（由下到上）。\n🔵【各层核心功能与设备】：\n⚫️【坑点】：\n路由器是网络层设备，交换机是数据链路层设备，集线器是物理层设备。\nTCP提供可靠的端到端传输，UDP提供不可靠的端到端传输。\n数据链路层的PDU叫帧，网络层常称分组/数据报，TCP的传输层PDU常称报文段，UDP称用户数据报；不能把所有传输层PDU一律写成“报文段”。\n考点8：OSI各层特性详解\n🔴【物理层四大特性】：\n机械特性：接口的形状、尺寸、引脚数。\n电气特性：电压范围、信号电平。\n功能特性：各引脚的功能定义。\n过程特性：事件发生的顺序。\n坑点：描述“完成每种功能的事件发生顺序”的是过程特性，不是功能特性！\n🔴【数据链路层】：在相邻节点之间以帧为单位传输，完成成帧、介质访问控制和差错检测等；是否提供确认与重传取决于具体链路协议，不能笼统说一定“无差错”。以太网MAC地址通常为48位，用十六进制表示。\n🔴【网络层】：提供逻辑寻址和路由选择，使分组跨网络到达目的主机。IP、ICMP属于网际层/网络层；ARP用于同一链路上把IPv4地址解析为链路层地址，在不同分层教材中可归到网络接口层或网络层边界，答题按教材口径。\n⚫️【坑点】：以太网物理地址（MAC地址）长度是48位，不是32位。IPv4地址是32位，IPv6地址是128位。\n第三章：TCP/IP协议族\n考点9：TCP/IP参考模型\n🔴【层次结构（4层）】：\n应用层（对应OSI的应用层+表示层+会话层）\n传输层（对应OSI的传输层）\n网络层/网际层（对应OSI的网络层）\n网络接口层（对应OSI的物理层+数据链路层）\n⚫️【坑点】：OSI是7层，TCP/IP是4层。TCP/IP的网络接口层对应OSI的物理层和数据链路层。\n考点10：IP协议（网络层核心）\n🔴【IP协议功能】：无连接、不可靠的数据报传输。负责对数据包进行寻址和路由选择。\n⚫️【坑点】：IP协议是不可靠的，它只负责尽力而为地传输，不保证数据包不丢失、不乱序。可靠性由TCP在传输层保证。\n考点11：ICMP协议\n🔴【全称】：Internet Control Message Protocol，网际控制报文协议。\n🔴【功能】：传递差错报告和控制信息。用于网络诊断。\n🔴【Ping命令】：基于ICMP协议，用于测试两台主机之间的连通性。\n⚫️【坑点】：Ping命令使用的是ICMP协议，不是TCP或UDP。ICMP属于网络层协议。\n考点12：ARP与RARP协议\n🔴【ARP（地址解析协议）】：将主机的IP地址解析为对应的MAC地址（物理地址）。\n🔴【RARP（逆地址解析协议）】：早期用于主机依据MAC地址获取IPv4地址，现已基本被BOOTP/DHCP取代。\n⚫️【坑点】：DNS主要完成域名与资源记录的查询（常见为域名→IP），ARP是在本地链路解析“下一跳IPv4地址→MAC地址”；RARP是早期MAC→IP机制。ARP不能跨路由器解析远端主机的MAC。\n考点13：传输层协议（TCP vs UDP）\n🔴【TCP（传输控制协议）】：\n面向连接（需建立连接，三次握手）。\n可靠传输（有确认、重传机制）。\n提供流量控制和拥塞控制。\n传统协议栈中FTP、HTTP/1.1和HTTP/2、SMTP通常使用TCP；HTTP/3基于QUIC（运行在UDP之上），所以不要把“HTTP永远使用TCP”写成绝对结论。\n核心功能：完成对数据包的确认、流量控制和网络拥塞；自动检测数据包并提供错误重发功能。\n🔴【UDP（用户数据报协议）】：\n无连接（无需建立连接）。\n不可靠传输（不保证到达，不保证顺序）。\n传输效率高，开销小。\n适用于：视频会议、IP电话、在线直播、DNS查询。\n⚫️【坑点】：\nTCP是面向连接的，UDP是无连接的。\n视频会议、IP电话使用UDP，因为实时性要求高，可以容忍少量丢包。\nTCP和UDP都属于传输层协议。\n说“UDP比TCP更可靠” →错！TCP可靠，UDP不可靠。\n考点14：应用层常用协议（端口号必记）\n🔴【HTTP】：超文本传输协议，端口80。用于浏览器与Web服务器之间的通信。\n🔴【HTTPS】：HTTP通过TLS建立受保护的通信，默认端口443，可提供机密性、完整性和服务器身份认证；安全性仍依赖证书验证、TLS配置和应用本身。\n🔴【FTP】：文件传输协议，控制连接默认端口21；主动模式的数据连接常由服务器端口20发起，被动模式的数据端口由协商决定。FTP明文传输，安全传输要区分FTPS和SFTP（SFTP基于SSH，并非FTP加密版）。\n🔴【DNS】：域名系统，默认端口53，常用UDP，响应较大、区域传送等情况可用TCP。它查询多种资源记录，最常见功能是域名解析为IP地址。\n🔴【SMTP】：简单邮件传输协议，端口25。用于发送电子邮件。\n🔴【POP3】：邮局协议第3版，端口110。用于接收电子邮件。\n🔴【Telnet】：远程登录协议，端口23。\n⚫️【坑点】：\nSMTP是发邮件，POP3是收邮件，不要记反！\nSMTP实现的是将邮件从发件人发送到收件人的邮件服务器，不是直接发送到收件人的电脑。\nHTTP是应用层协议，不是传输层协议。\nFTP的21是控制端口；“数据端口固定为20”只适用于经典主动模式，不能套用于被动模式。\n考点15：常用命令\n🔴【Ping】：测试两台主机之间的连通性。基于ICMP协议。\n🔴【Ipconfig】：查看本机的IP地址、子网掩码、默认网关等网络配置信息。\n🔴【Tracert】：显示数据包到达目的主机所经过的路径（路由追踪）。\n🔴【Netstat】：显示网络连接状态、路由表、接口统计等信息。\n⚫️【坑点】：查看本机IP地址的命令是Ipconfig，不是Ping。Ping是测试连通性。\n第四章：IP地址与子网划分\n考点16：IP地址基本概念\n🔴【IP地址长度】：32位（二进制），分为4组，每组8位，用“点分十进制”表示。\n🔴【IP地址组成】：网络号（Net-ID）+ 主机号（Host-ID）。\n🔴【历史分类编址】：IPv4曾按A、B、C、D、E分类，D类用于组播，E类保留。现代互联网地址分配和路由采用CIDR前缀，不再以A/B/C类作为实际划分基础；分类地址仍是基础考试常考口径。\n⚫️【坑点】：D类地址用于组播（224.0.0.0-239.255.255.255），不是用于普通主机通信。\n考点17：A、B、C类地址范围（必须烂熟于心）\n🔴【A类】：1 ~ 126（0和127保留）。默认子网掩码：255.0.0.0。网络号占1字节，主机号占3字节。每个网络可容纳约1677万台主机。\n范围：1.0.0.0 ~ 126.255.255.255\n🔴【B类】：128 ~ 191。默认子网掩码：255.255.0.0。网络号占2字节，主机号占2字节。每个网络可容纳65534台主机。\n范围：128.0.0.0 ~ 191.255.255.255\n🔴【C类】：192 ~ 223。默认子网掩码：255.255.255.0。网络号占3字节，主机号占1字节。每个网络可容纳254台主机。\n范围：192.0.0.0 ~ 223.255.255.255\n⚫️【坑点】：\n判断IP地址类别，只看第一个十进制数！\n192.168.0.12 → 第一个数是192，属于C类地址。\n127.0.0.0/8保留为回送地址块，127.0.0.1是最常用回送地址。按首位模式它落在历史A类范围，但不能分配给普通网络接口或作为公网主机地址；“完全不属于A类”并不严谨。\nC类地址中，主机号全0表示网络号，全1表示广播地址，都不能分配给主机。所以C类每个网络最多254台主机（2⁸-2=254）。\n考点18：特殊IP地址\n🔴【127.0.0.1】：本机回送地址，用于主机自我测试。不能作为互联网上的有效IP地址。\n🔴【主机号全0】：代表本网络（网络地址）。如：192.168.1.0。\n🔴【主机号全1】：代表广播地址。如：192.168.1.255。\n🔴【0.0.0.0】：作为主机地址时常表示“未指定地址/本主机尚无地址”；路由表中的0.0.0.0/0才表示默认路由，二者不能混为一个含义。\n⚫️【坑点】：不能作为互联网可用的IP地址的是127.0.0.1（回送地址）。192.168.1.0是网络地址，不能分配给主机。\n考点19：子网掩码\n🔴【定义】：用于区分IP地址中的网络号和主机号。1对应网络位，0对应主机位。\n🔴【默认子网掩码】：\nA类：255.0.0.0\nB类：255.255.0.0\nC类：255.255.255.0\n🔴【子网划分的目的】：把一个地址前缀划成多个更小的广播域，便于分层管理、隔离广播和更合理地分配地址；提高地址利用率只是常见收益之一。\n🔵【判断同网段】：两台主机的IP地址分别与子网掩码进行“与（AND）”运算，结果相同则在同一子网，可直接通信；结果不同则不能直接通信，需要通过路由器。\n⚫️【坑点】：\n子网掩码必须是连续的1后面跟连续的0。255.241.0.0不可能是子网掩码（241转二进制11110001，不连续）。\n子网掩码不能单独存在，必须结合IP地址一起使用。\n主机A的IP为202.96.128.130，子网掩码255.255.255.128 → 网络号为202.96.128.128。\n考点20：IPv6\n🔴【长度】：128位，分为8组，每组16位，用十六进制表示。\n🔴【地址总数】：2¹²⁸个。\n🔴【表示方式】：用冒号分隔的十六进制数，如：2001:0db8:85a3:0000:0000:8a2e:0370:7334。连续零可压缩为::。\n🔴【IPv6出现的原因】：解决IPv4地址枯竭问题。\n⚫️【压缩规则】：每组可省略前导0；一段或多段连续的全0组可用“::”压缩，但一个地址中“::”最多出现一次。IPv6没有广播，使用组播和任播等方式。\n⚫️【坑点】：IPv6由16个字节（128位）表示，不是16位或8个字节。IPv4由4个字节（32位）表示。\n考点20A：CIDR与子网计算（岗位考试高频）\n🔴【前缀长度】：/n表示前n位是网络前缀。例如255.255.255.192的二进制有26个连续1，因此等价于/26。\n🔵【地址总数】：一个IPv4 /n地址块共有2^(32-n)个地址。传统普通子网题中可分配主机数通常按2^(32-n)-2计算，扣除网络地址和定向广播地址；/31点到点链路、/32主机路由是特殊情形。\n🔵【求网络地址】：IP地址与子网掩码逐位AND；广播地址是在该网络地址基础上把主机位全置1。\n⚫️【例】：192.168.1.130/26中，每段块大小为64，130落在128～191，因此网络地址192.168.1.128，广播地址192.168.1.191，传统可用主机范围129～190。\n考点20B：DHCP与NAT（常考功能配对）\n🔴【DHCP】：动态主机配置协议，可向客户端分配IP地址、子网掩码、默认网关、DNS服务器等参数；典型IPv4过程为Discover、Offer、Request、ACK（DORA），使用UDP 67/68端口。\n🔴【NAT】：在网络边界转换内部地址和外部地址；NAPT/PAT还利用端口号让多台内网主机共享少量公网IPv4地址。\n⚫️【坑点】：DHCP负责“自动配置地址参数”，DNS负责“名称解析”，ARP负责“同链路IPv4到MAC解析”，NAT负责“地址/端口转换”，四者不可互换。\n第五章：网络设备与传输介质\n考点21：网络互联设备（工作层级对比）\n🔴【中继器（Repeater）】：物理层。放大信号，延长传输距离。不能识别数据内容。\n🔴【集线器（Hub）】：物理层。多端口的中继器，将信号广播到所有端口。共享式设备，同一时刻只能一台设备发送数据。不能识别MAC地址。\n🔴【网桥（Bridge）】：数据链路层。连接两个同类型局域网，能识别MAC地址，可以隔离冲突域。\n🔴【交换机（Switch）】：数据链路层。多端口的网桥，能识别MAC地址，根据MAC地址表定向转发。隔离冲突域，但不能隔离广播域。\n🔴【路由器（Router）】：网络层。连接不同网络，能识别IP地址，进行路由选择。隔离冲突域和广播域。\n🔴【网关（Gateway）】：广义上指连接不同网络、承担转发或协议转换的实体；“默认网关”通常就是本子网通向其他网络的路由器接口。旧式OSI教材常把执行高层协议转换的网关归于高层，但不能据此断言所有网关都只工作在传输层以上。\n⚫️【坑点】：\n中继器和集线器属于物理层设备。\n交换机和网桥属于数据链路层设备。\n路由器属于网络层设备。\n集线器（Hub）不能识别目的地址，交换机可以识别MAC地址。\n路由器可以实现有线网络和无线网络的连接。\n考点22：传输介质\n🔴【有线传输介质】：\n双绞线：最常用、最便宜的传输介质。传输距离最长100米。分为非屏蔽（UTP）和屏蔽（STP）。\n同轴电缆：抗干扰能力强。粗缆传输距离500米，细缆185米。\n光纤：带宽高、传输距离远、抗电磁干扰、误码率低，常用于骨干和高速链路；接入终端和局域网中双绞线同样广泛，不能说光纤在所有场景“应用最广泛”。成本应综合光纤、光模块、施工和维护，不能只写“价格一定贵”。\n🔴【无线传输介质/信号】：常见电磁波形式包括无线电波、地面/卫星微波、红外线和激光；蓝牙是使用2.4GHz频段的短距离无线通信技术/协议，不是独立的物理介质。\n微波通信：卫星通信是微波接力通信向空间的扩展。\n蓝牙：短距离数据交换（10米左右），功耗低。\n红外线：短距离，需要直线传输。\n⚫️【坑点】：\n“性能最好”需说明比较维度；若题目强调带宽、距离和抗干扰，通常选光纤，若强调以太网水平布线的普及和成本，通常是双绞线。\n常见铜缆以太网信道长度上限为100米（典型为90米永久链路+两端跳线），具体仍取决于线缆类别和以太网标准。\n粗同轴电缆支持的最大电缆长度是500米，细同轴电缆185米。\n“价格便宜”不是光纤相对于双绞线的固有技术优势；成本比较要结合光模块、施工距离和维护场景。\n考点22A：以太网与无线局域网（高频补充）\n🔴【以太网】：IEEE 802.3标准，使用MAC地址标识链路接口。传统共享式半双工以太网采用CSMA/CD；现代交换式全双工以太网不存在冲突，不使用CSMA/CD处理冲突。\n🔴【无线局域网】：IEEE 802.11系列，常采用CSMA/CA以尽量避免冲突；SSID是无线网络名称，不是密码或MAC地址。\n🔴【冲突域与广播域】：交换机每个端口通常形成独立冲突域；同一VLAN仍属于同一广播域。路由器或三层设备可分隔广播域，VLAN也能在二层逻辑划分广播域。\n⚫️【坑点】：交换机“不能隔离广播域”只适用于未划分VLAN、同一二层广播域的传统题设；交换机可通过VLAN划分多个广播域。\n第六章：网络应用与服务\n考点23：域名系统（DNS）\n🔴【域名结构】：由标号序列组成，从右到左级别升高。如：www.sina.com.cn。\ncn：顶级域名（国家域名）\ncom：二级域名（机构域名，商业机构）\nsina：三级域名\nwww：四级域名（Web服务器）\n🔴【常见顶级域名】：\n.com：商业机构\n.edu：教育机构\n.gov：政府机构\n.mil：军事机构\n.org：非盈利组织\n.net：网络机构\n🔴【域名解析】：客户端通过递归/迭代查询获得DNS资源记录，常见是将域名解析为IPv4/IPv6地址（A/AAAA记录）；反向解析使用PTR记录。DNS不只保存IP地址。\n🔴【负责中国域名管理的机构】：CNNIC（中国互联网络信息中心）。\n⚫️【坑点】：\n域名不分大小写。\nhttp://www.China.edu.cn中，代表国家的顶级域名是cn，代表教育机构的二级域名是edu。\n请求域名解析的客户不需要知道根域名服务器和本地域名服务器父结点的名字。\n考点24：电子邮件（E-mail）\n🔴【E-mail地址格式】：用户名@域名（如：qwer@163.com，用户名为qwer）。\n🔴【发送/转发邮件】：客户端提交邮件以及邮件服务器之间转发通常使用SMTP。\n🔴【读取邮件】：客户端可使用POP3下载邮件，也可用IMAP在服务器上同步文件夹和状态；Web邮箱则由浏览器通过HTTP(S)访问前端，服务器内部仍使用邮件协议处理投递。\n🔴【邮件发送特点】：\n可以同时发送给多个收件人。\n发送邮件不需要对方开机。\n发送电子邮件时，可以不输入邮件主题（但建议输入）。\nE-mail采用存储转发，投递时间一般不由地理距离直接决定，但会受网络、服务器队列、反垃圾策略和故障影响，不能保证“即发即收”。\n⚫️【坑点】：\n电子邮件地址@之后表示邮件服务器名。\n电子邮件不是即时通讯工具（即时通讯如QQ、微信）。\n收件箱内带有回形针标志的邮件表示该邮件有附件。\n电子邮件服务的功能不包括制作动画。\n考点25：WWW（万维网）\n🔴【全称】：World Wide Web，全球信息网。\n🔴【核心协议】：HTTP（超文本传输协议）。\n🔴【URL格式】：协议名://主机名/目录名/文件名\n例：http://www.ye21.cn/news/index.aspx→ http（服务标志）、www.ye21.cn（主机域名）、news（目录名）、index.aspx（文件名）。\n🔴【收藏夹功能】：保存网页地址（URL），不是保存网页内容。\n🔴【Web服务器】：以网页形式存储信息资源的服务器。www通常指Web服务器。\n⚫️【坑点】：HTML是超文本标记语言，不是协议。HTTP是协议。\n第七章：网络安全\n考点26：计算机病毒\n🔴【定义】：人为编制的一组计算机指令或程序代码，能破坏计算机功能或数据，能自我复制。\n🔴【病毒特征】：寄生性、传染性、潜伏性、隐蔽性、可触发性、破坏性、不可预见性。\n坑点：病毒没有“智能性”和“免疫性”特征。\n🔴【病毒分类】：\n引导型病毒：感染主引导记录（MBR）或引导扇区。\n文件型病毒：感染可执行文件（.exe、.com）。如：CIH病毒。\n宏病毒：感染Office文档（.doc、.xls）。通过文档中的宏传播。\n混合型病毒：同时感染引导区和文件。\n蠕虫病毒：独立程序，通过网络主动传播。如：冲击波、震荡波。\n木马病毒：伪装成正常软件，不自我复制，通过欺骗安装。\n⚫️【坑点】：\nCIH病毒属于文件型病毒。\n宏病毒主要感染.doc和.xls文件。\n蠕虫病毒不需要寄生宿主程序，是独立的。\n特洛伊木马不具有自我复制能力。\n计算机病毒不会传染给人类。\n考点27：病毒传播途径\n🔴【主要途径】：\n移动存储设备（U盘、移动硬盘）。\n网络（电子邮件附件、网页链接、下载文件、即时通讯）。\n⚫️【坑点】：使用扫描仪不会感染病毒。病毒不能通过硬件设备本身传播。\n考点28：网络安全技术\n🔴【防火墙】：\n功能：隔离内部网络和外部网络，过滤网络通信，防止外部攻击。\n类型：硬件防火墙和软件防火墙。\n传统边界防火墙难以防住绕过其路径的内部攻击、允许流量中的应用漏洞或终端已感染恶意软件；下一代防火墙可提供应用识别、入侵防御等能力，但仍不能替代终端防护、身份控制和安全管理。\n防火墙的核心职责是按安全策略过滤和控制流量，路由器的核心职责是选路和转发；实际安全网关常同时具备路由、NAT、防火墙等功能，不能说二者在设备形态上绝不重合。\n防火墙不能过滤掉一切攻击，只能起到防护作用。\n🔴【数字签名】：\n功能：保证信息的完整性、身份认证、不可抵赖性。\n不能防止计算机病毒入侵。\n🔴【身份认证技术】：如银行取款输入密码，属于身份识别/身份认证。\n🔴【加密方式】：\n对称加密：加密和解密使用同一个密钥（速度快，密钥管理困难）。\n非对称加密：加密和解密使用一对密钥（公钥和私钥）。如：U盾。工行U盾使用的是非对称加密算法。\n⚫️【坑点】：\n防火墙设置的位置应该在学校局域网与外网连接处。\n防火墙是网络边界防护的重要技术之一；“最基本/唯一”属于旧教材口径，完整防护还需身份认证、补丁、最小权限、加密、备份、监测与响应。\n数字签名的主要功能是防止交易中的抵赖行为。\nU盾/USB Key常安全保存私钥和数字证书，利用公钥密码完成身份认证或数字签名，也可能配合对称加密等机制；具体实现不能简化为“只使用一种非对称算法”。\n第八章：网络基础知识补充\n考点29：交换技术\n🔴【电路交换】：建立物理连接，独占线路（如传统电话）。实时性好，但线路利用率低。\n🔴【报文交换】：存储-转发，整个报文一起发送（如老式电报）。延迟大，对节点缓存要求高。\n🔴【分组交换】：采用存储-转发，把报文拆成分组并可统计复用链路（Internet采用）。链路利用率通常较高，但存在排队时延、丢包和时延抖动；不能无条件说“延迟一定最小”或“利用率永远最高”。\n⚫️【坑点】：目前广域网主要采用分组交换技术，不是电路交换。\n考点30：数据通信基础\n🔴【调制/解调】：\n调制：数字信号 → 模拟信号（发送端）。\n解调：模拟信号 → 数字信号（接收端）。\n电话拨号上网需要调制解调器（Modem）。\n🔴【数据传输方式】：\n单工：单向传输（如：电视广播）。\n半双工：双向交替传输（如：对讲机）。\n全双工：双向同时传输（如：电话）。\n🔴【波特率 vs 比特率】：\n波特率：每秒传输的码元数（码元速率，单位Bd），不等同于“波形变化次数”。\n比特率：每秒钟传输的比特数（数据传输速率）。\n🔵【二者关系】：若每个码元有M种可区分状态且等概率携带log₂M位，则理想情况下比特率 = 波特率 × log₂M；二进制调制时二者数值可能相等。\n⚫️【坑点】：波特率不是每秒传输的比特数，也不应简单定义为“信号变化次数”。\n考点31：Internet基础知识\n🔴【Internet雏形】：ARPANET（阿帕网），美国国防部1969年创建。\n🔴【TCP/IP协议】：Internet采用的核心协议。\n🔴【ISP（互联网服务提供商）】：提供Internet接入服务的公司（如中国电信、中国联通）。个人用户注册后，ISP提供上网账号、上网口令和DNS地址。\n⚫️【坑点】：Internet的最早雏形是ARPANET，不是NSFNET或CERNET。\n📊 终极数字/端口记忆表（考前过一遍）\n🔥 本章高频简答题汇总\n1. 简述OSI七层模型（由低到高）。\n🔵【踩分点】：物理层、数据链路层、网络层、传输层、会话层、表示层、应用层（口诀：物数网传会表应）。\n2. 简述TCP和UDP的区别。\n🔵【踩分点】：① TCP是面向连接的，UDP是无连接的。② TCP提供可靠传输，UDP提供不可靠传输。③ TCP有流量控制和拥塞控制，UDP没有。④ TCP适用于FTP、HTTP等，UDP适用于视频会议、IP电话等。\n3. 简述IP地址的分类及判断方法。\n🔵【踩分点】：看第一个十进制数。A类1-126、B类128-191、C类192-223。D类组播，E类实验。\n4. 简述DNS的作用。\n🔵【踩分点】：DNS（域名系统）将域名解析为对应的IP地址，方便用户记忆和访问网站。\n5. 写出电子邮件发送和接收使用的协议。\n🔵【踩分点】：发送邮件使用SMTP协议，接收邮件使用POP3协议。\n口诀速记\n“物数网传会表应，七层模型要记清；路由IP在三层，交换MAC在二层；TCP可靠面向连，UDP不可靠无连；HTTP 80 DNS 53，SMTP发 POP3收；A类1到126，B类128到191，C类192到223；光纤快又好，双绞线百米到。”\n【表格1】\n\n层级（🔴） | 数据单位（🔵） | 核心功能（🔵） | 典型硬件/协议（🔴必记）\n7. 应用层 | 数据（Data） | 用户与网络的接口，提供应用程序服务 | HTTP、FTP、SMTP、DNS、Telnet\n6. 表示层 | 数据（Data） | 数据加密/解密、压缩/解压、格式转换 | 数据加密、JPEG/MPEG编码\n5. 会话层 | 数据（Data） | 建立、管理和终止会话/通信进程 | RPC（远程过程调用）\n4. 传输层 | TCP报文段/UDP用户数据报 | 端到端进程通信；可靠性、流量控制等由具体协议提供 | TCP、UDP\n3. 网络层 | 分组/数据报（Packet/Datagram） | 路由选择、逻辑寻址（IP地址） | 路由器、IP、ICMP；ARP位于网际层与链路层边界，教材归类可能不同\n2. 数据链路层 | 帧（Frame） | 相邻节点成帧、介质访问和差错检测；可靠性由具体协议决定 | 交换机、网桥、网卡\n1. 物理层 | 比特（bit） | 在物理介质上透明传输比特流，定义机械、电气、功能、过程特性 | 中继器、集线器\n\n【表格2】\n\n协议/概念 | 端口/数值 | 备注\nHTTP | 80 | 超文本传输\nHTTPS | 443 | 加密超文本传输\nFTP | 21 | 文件传输（控制端口）\nDNS | 53 | 域名解析\nSMTP | 25 | 发送邮件\nPOP3 | 110 | 接收邮件\nTelnet | 23 | 远程登录\nMAC地址长度 | 48位（6字节） | 物理地址\nIPv4地址长度 | 32位（4字节） | 点分十进制\nIPv6地址长度 | 128位（16字节） | 冒号分隔十六进制\nA类地址范围 | 1-126 | 掩码255.0.0.0\nB类地址范围 | 128-191 | 掩码255.255.0.0\nC类地址范围 | 192-223 | 掩码255.255.255.0\n双绞线最大传输距离 | 100米 | —\n粗同轴电缆最大距离 | 500米 | —\n"},{"name":"电路分析与电工技术","text":"# 📚 电路分析与电工技术\n\n使用说明：🔴红色 = 期末必须掌握的定律、公式和判断结论；🔵蓝色 = 计算题标准步骤与得分点；⚫️黑色 = 条件、解释和常见陷阱。以大学《电路分析基础》《电工技术》常见期末范围为骨架，带“选学”的内容在核心知识掌握后处理。\n\n## 零基础预备：先学会“看电路”\n\n考点0：电路到底是什么\n\n⚫️【电路】：电流能够流过的完整路径。最小的实际电路通常包含电源、负载、连接导线和控制/保护元件。电源提供能量，负载把电能转化为光、热、机械能或其他形式。\n\n⚫️【直流与交流】：直流DC的方向通常不随时间改变；交流AC的大小和方向随时间周期变化。电池属于直流源，市电属于正弦交流源。\n\n⚫️【节点】：两条或多条支路的连接点；理想导线连接在一起的所有点电位相同。【支路】：流过同一电流的一段电路。【回路】：沿支路走一圈后回到出发点的闭合路径。\n\n🔴【开路】：电流为0，端口电压不一定为0；【短路】：端口电压为0，电流不一定为0。这是零基础最容易混淆的一对概念。\n\n考点0.1：单位与数量级\n\n🔴【常用单位】：电压V、电流A、电阻Ω、电容F、电感H、频率Hz、功率W、能量J。\n\n🔴【前缀】：`k=10³`、`M=10⁶`、`m=10⁻³`、`μ=10⁻⁶`、`n=10⁻⁹`、`p=10⁻¹²`。例如 `100 μF = 100×10⁻⁶ F`。\n\n⚫️【计算习惯】：代公式前先统一单位；结果应带单位；最后检查数量级是否合理。\n\n考点0.2：零基础做题通用流程\n\n🔵1. 看清电路拓扑：哪些元件真正串联，哪些真正并联。\n\n🔵2. 标出已知量、未知量和参考方向，不要只凭“看起来”判断正负。\n\n🔵3. 先化简能化简的部分，再选欧姆定律、KCL/KVL、节点法或网络定理。\n\n🔵4. 解完用功率守恒、极端情况和数量级复核。\n\n第一章：电路模型与基本定律\n\n考点1：电流、电压、功率与参考方向\n\n🔴【关联参考方向】：电流流入电压正端时，元件吸收功率 `p = ui`；算得 `p > 0` 表示吸收功率，`p < 0` 表示发出功率。\n\n🔴【功率守恒】：任一完整电路中，各元件功率代数和为零，即 `Σp = 0`。\n\n⚫️【坑点】：电压或电流算出负值不代表计算错误，只表示实际方向与所设参考方向相反。\n\n考点2：欧姆定律、KCL与KVL\n\n🔴【欧姆定律】：关联参考方向下 `u = Ri`。\n\n🔴【KCL】：任一节点流入电流之和等于流出电流之和，等价写作 `Σi = 0`。\n\n🔴【KVL】：任一闭合回路中各段电压代数和为零，即 `Σu = 0`。\n\n![KCL节点示意：流入节点的电流之和等于流出节点的电流之和](../media/ee_kcl_node.svg)\n\n🔵【列方程步骤】：先标参考方向 → 选节点或回路 → 统一正负号 → 解方程 → 用功率守恒或数量级复核。\n\n考点3：串并联与分压分流\n\n🔴【电阻串联】：`Req = R1 + R2 + …`；同一电流，电压按电阻成比例分配。`Uk = U·Rk/ΣR`。\n\n🔴【电阻并联】：`1/Req = 1/R1 + 1/R2 + …`；同一电压，电流与电阻成反比分配。两支路时 `I1 = I·R2/(R1+R2)`。\n\n🔴【相同电阻】：`n` 个相同的 `R` 并联，`Req = R/n`。三个 `6 Ω` 并联为 `2 Ω`。\n\n⚫️【坑点】：分压公式要求串联支路中间没有额外负载；接入负载后应先求并联等效电阻。\n\n![电阻串联分压与并联分流](../media/ee_series_parallel.svg)\n\n考点4：理想电源与实际电源\n\n🔴【理想电压源】：端电压由电源规定；不同电压的理想电压源不能直接并联。\n\n🔴【理想电流源】：支路电流由电源规定；不同电流的理想电流源不能直接串联。\n\n🔴【电源等效变换】：电压源 `Us` 串联 `R` 可等效为电流源 `Is = Us/R` 并联同一个 `R`，外部端口特性不变。\n\n⚫️【坑点】：等效只针对外部端口，不能用等效后的内部支路电流或功率替代原电路内部量。\n\n第二章：线性电阻电路的系统分析\n\n考点5：支路、节点与网孔分析\n\n🔴【节点电压法】：以参考节点为零电位，对其余独立节点列KCL；电阻支路电流写成“本节点电压减邻节点电压，再除以电阻”。\n\n🔴【网孔电流法】：对平面电路的独立网孔设网孔电流并列KVL；公共电阻压降由两个网孔电流之差决定。\n\n🔵【超级节点】：理想电压源跨接两个非参考节点时，把两节点整体列KCL，再补充电压约束方程。\n\n🔵【超级网孔】：电流源位于两个网孔公共支路时，绕开该支路列KVL，再补充网孔电流关系。\n\n考点6：叠加定理\n\n🔴【适用范围】：线性电路中，多个独立源共同产生的电压或电流响应等于各独立源单独作用响应的代数和。\n\n🔵【置零规则】：独立电压源置零后短路；独立电流源置零后开路；受控源必须保留。\n\n⚫️【坑点】：功率是电压或电流的二次函数，不能直接使用叠加定理。\n\n考点7：戴维宁与诺顿定理\n\n🔴【戴维宁等效】：任一线性含源二端网络可等效为开路电压 `Uoc` 串联等效电阻 `Rth`。\n\n🔴【诺顿等效】：可等效为短路电流 `Isc` 并联 `Rn`，且 `Rn = Rth`、`Uoc = IscRth`。\n\n🔵【求Rth】：关掉全部独立源，从端口向内看等效电阻；含受控源时保留受控源，并在端口加测试源，用 `Rth = Utest/Itest`。\n\n🔴【最大功率传输】：直流纯电阻负载满足 `RL = Rth` 时功率最大，`Pmax = Uth²/(4Rth)`；此时效率只有50%。\n\n考点8：常用网络定理（选学）\n\n🔴【替代定理】：已知某支路的电压和电流时，可用具有相同端口电压、电流的理想源替代该支路，但不能据此研究替代后该支路内部变化。\n\n🔴【互易定理】：仅适用于单一独立源激励的线性、双向网络；含受控源或非线性元件时不能随意套用。\n\n第三章：动态电路\n\n考点9：电容与电感\n\n🔴【电容】：`iC = C·duC/dt`，储能 `WC = 1/2·C·uC²`；直流稳态时理想电容相当于开路。\n\n🔴【电感】：`uL = L·diL/dt`，储能 `WL = 1/2·L·iL²`；直流稳态时理想电感相当于短路。\n\n🔴【换路定则】：无冲激电流时 `uC(0+) = uC(0-)`；无冲激电压时 `iL(0+) = iL(0-)`。\n\n⚫️【坑点】：连续的是电容电压和电感电流，不是电容电流和电感电压。\n\n考点10：一阶电路三要素法\n\n🔴【统一表达式】：`f(t) = f(∞) + [f(0+) - f(∞)]e^(-t/τ)`，适用于一阶RC/RL电路的零输入、零状态和全响应。\n\n🔴【时间常数】：RC电路 `τ = ReqC`；RL电路 `τ = L/Req`。求 `Req` 时从储能元件端口向内看并关掉独立源。\n\n🔵【三要素】：求初值 `f(0+)` → 求终值 `f(∞)` → 求时间常数 `τ` → 代入统一式。\n\n⚫️【数量级】：经过约 `τ` 达到总变化的63.2%，约 `3τ` 达到95%，约 `5τ` 可视为稳态。\n\n![RC充放电曲线与时间常数](../media/ee_rc_response.svg)\n\n考点11：二阶电路（选学）\n\n🔴【典型形式】：二阶RLC自然响应可能为过阻尼、临界阻尼或欠阻尼；欠阻尼时出现衰减振荡。\n\n⚫️【考试策略】：若课程范围没有二阶微分方程，先掌握阻尼类型判断和储能元件初值；完整推导放在核心内容掌握后学习。\n\n第四章：正弦稳态交流电路\n\n考点12：正弦量三要素与有效值\n\n🔴【表达式】：`u(t) = Um sin(ωt + φ)`；三要素为最大值 `Um`、角频率 `ω`、初相位 `φ`。\n\n🔴【频率关系】：`ω = 2πf`，`T = 1/f`。正弦量有效值 `U = Um/√2`、`I = Im/√2`。\n\n⚫️【坑点】：交流电表通常显示有效值；相量只表示同频正弦量，不包含时间因子。\n\n考点13：相量与阻抗\n\n🔴【三种阻抗】：电阻 `ZR = R`；电感 `ZL = jωL = jXL`；电容 `ZC = 1/(jωC) = -j/(ωC) = -jXC`。\n\n🔴【容抗】：`XC = 1/(2πfC)`，单位Ω；频率或电容量越大，容抗越小。\n\n🔴【感抗】：`XL = 2πfL`，单位Ω；频率或电感量越大，感抗越大。\n\n🔵【交流计算】：把正弦量化为相量 → 用复阻抗列KCL/KVL → 复数运算 → 转回幅值与相位。\n\n考点14：RLC串联与谐振\n\n🔴【串联阻抗】：`Z = R + j(XL - XC)`；`|Z| = √[R²+(XL-XC)²]`。\n\n🔴【相位判断】：`XL > XC` 为感性、电流滞后；`XL < XC` 为容性、电流超前；相等时为纯电阻性。\n\n🔴【串联谐振】：`ω0 = 1/√(LC)`，`f0 = 1/(2π√LC)`；谐振时 `XL = XC`、阻抗最小、电流最大、功率因数为1。\n\n![RLC串联电路相量关系与感性、容性判断](../media/ee_rlc_phasor.svg)\n\n考点15：交流功率与功率因数\n\n🔴【功率】：有功功率 `P = UIcosφ`，无功功率 `Q = UIsinφ`，视在功率 `S = UI`，满足 `S² = P² + Q²`。\n\n🔴【功率因数】：`cosφ = P/S`。感性负载常并联电容补偿，使线路电流和无功功率减小；负载有功功率通常不因此改变。\n\n⚫️【坑点】：不能把视在功率的单位VA写成W；无功功率单位为var。\n\n第五章：三相电路、变压器与可靠性\n\n考点16：对称三相电路\n\n🔴【星形Y接】：`UL = √3Up`，`IL = Ip`。\n\n🔴【三角形Δ接】：`UL = Up`，`IL = √3Ip`。\n\n🔴【对称三相功率】：`P = √3ULILcosφ`，其中 `UL、IL` 为线电压和线电流。\n\n⚫️【坑点】：线量和相量关系取决于接法，不能固定写成“线电压总是相电压的√3倍”。\n\n考点17：互感与理想变压器（选学）\n\n🔴【理想变压器】：`U1/U2 = N1/N2`，电流比与匝数比相反，`I1/I2 = N2/N1`；理想情况下输入输出功率相等。\n\n🔴【阻抗折算】：负载折算到原边为 `Zin = (N1/N2)²ZL`。\n\n考点18：系统可靠性\n\n🔴【前提】：以下公式要求各元件失效相互独立，且题目对“系统成功”的定义明确。\n\n🔴【串联系统】：任一元件失效系统即失效，`Rs = ΠRi`。两个可靠度0.9的元件串联，`Rs = 0.9² = 0.81`。\n\n🔴【并联系统】：至少一个元件成功系统就成功，`Rp = 1 - Π(1-Ri)`。两个可靠度0.9的元件并联，`Rp = 1 - 0.1² = 0.99`。\n\n⚫️【坑点】：可靠性“串联/并联”描述的是功能逻辑，不等同于电阻物理连接，也不使用电阻分压、分流公式。\n\n专题1：三相异步电动机（课程名含“电工技术”时常考）\n\n🔴【旋转磁场】：三相对称电流在定子绕组中产生旋转磁场；转子转速必须略低于同步转速才有相对运动并产生感应电流和电磁转矩。\n\n🔴【同步转速】：`n1 = 60f/p` r/min，其中 `p` 为磁极对数；转差率 `s = (n1-n)/n1`。电动运行时通常 `0<s<1`。\n\n🔴【起动与调速】：直接起动电流大；Y-Δ起动可降低起动电流和起动转矩；变频调速通过改变电源频率调节同步转速。\n\n⚫️【坑点】：异步电动机正常运行时转子转速不等于同步转速；若完全相等则相对切割磁力线消失，电磁转矩不能维持。\n\n专题2：继电接触控制（课程名含“电工技术”时常考）\n\n🔴【自锁】：接触器常开辅助触点与启动按钮并联，使按钮松开后线圈继续得电。\n\n🔴【互锁】：正、反转接触器的常闭辅助触点交叉串入对方线圈，防止两接触器同时吸合造成相间短路。\n\n🔴【保护分工】：熔断器/断路器用于短路保护；热继电器用于长期过载保护；接触器失电释放可形成失压保护。\n\n⚫️【点动与长动】：点动没有自锁，按下运行、松开停止；长动使用自锁维持运行。\n\n![接触器自锁控制回路：停止、启动、自锁和过载保护](../media/ee_self_hold_control.svg)\n\n第六章：典型计算题\n\n考点19：并联电阻例题\n\n🔵【题目】：三个 `6 Ω` 电阻并联，求等效电阻。\n\n🔵【解】：相同电阻并联，`Req = R/n = 6/3 = 2 Ω`。\n\n考点20：容抗例题\n\n🔵【题目】：`f = 50 Hz`、`C = 100 μF`，求容抗。\n\n🔵【解】：先换单位 `C = 100×10⁻⁶ F`；`XC = 1/(2πfC) ≈ 31.8 Ω`。\n\n考点21：戴维宁负载例题\n\n🔵【题目】：某网络等效为 `Uth = 12 V`、`Rth = 3 Ω`，接 `RL = 3 Ω`，求负载功率。\n\n🔵【解】：`I = 12/(3+3) = 2 A`，`PL = I²RL = 12 W`；因 `RL = Rth`，这也是最大功率。\n\n第七章：期末自测与答案\n\n考点22：自测题\n\n1. 两个 `8 Ω` 电阻并联后的等效电阻是多少？\n2. 叠加定理能否直接叠加各独立源产生的功率？\n3. 电容电压和电感电流在一般换路瞬间是否连续？\n4. `f` 增大一倍、`C` 不变时，`XC` 如何变化？\n5. RLC串联谐振时电路呈感性、容性还是电阻性？\n6. 戴维宁电阻为 `5 Ω` 时，纯电阻负载取多少可得最大功率？\n7. 两个独立可靠度均为0.8的串联系统可靠度是多少？\n8. 对称Y接负载中，线电压和相电压是什么关系？\n\n考点23：自测答案\n\n🔵1. `4 Ω`。2. 不能。3. 一般连续。4. 变为原来的一半。5. 电阻性。6. `5 Ω`。7. `0.64`。8. `UL = √3Up`。\n\n第八章：复习优先级与取舍\n\n考点24：复习优先级\n\n🔴【A级必会】：串并联、KCL/KVL、分压分流、正弦三要素、有效值、容抗/感抗、RLC相位、可靠性。\n\n🔵【B级得分】：节点法、叠加、戴维宁、三要素法、交流功率、三相关系；若课程名称含“电工技术”，再加异步电动机与继电接触控制。\n\n⚫️【C级选学】：二阶电路、互易定理、耦合电感与复杂二端口。只有明确在考试范围内且A级已掌握后再学。\n\n第九章：公开试题提炼训练\n\n考点25：网络题型分析\n\n⚫️公开课程大纲与历年试卷栏目显示，电路期末通常不是只考电阻串并联，而是形成“基本定律 → 一般分析方法 → 网络定理 → 动态电路 → 正弦稳态/三相”的完整链条。某高校公开大纲的一个样例把一般分析方法列为38%、正弦稳态22%、动态电路18%；这不是全国统一比例，但说明综合计算题是主要得分区。\n\n| 题型 | 常见任务 | 本讲义对应方法 |\n|---|---|---|\n| 基础判断 | 参考方向、开短路、功率正负、串并联 | 欧姆定律与拓扑识别 |\n| 方程分析 | 节点电压、网孔电流、受控源 | KCL/KVL、超级节点/网孔 |\n| 网络定理 | 叠加、戴维宁、最大功率 | 求开路电压和端口电阻 |\n| 动态电路 | 初值、终值、时间常数 | 三要素法 |\n| 交流综合 | 阻抗、相位、功率、谐振 | 相量法 |\n| 电工应用 | 三相功率、电动机、控制回路 | 线相量关系与控制逻辑 |\n\n考点26：基础层原创练习\n\n1. `12 Ω、6 Ω、4 Ω` 三个电阻并联，求等效电阻。\n\n2. 某节点有 `2 A` 和 `3 A` 流入，已有 `1.2 A` 流出，另一流出电流是多少？\n\n3. 使用叠加定理令一个独立电压源单独不作用时，应把它替换为什么？受控源是否关闭？\n\n4. 换路前电容电压为 `5 V`、电感电流为 `0.4 A`，无冲激条件下求 `uC(0+)` 和 `iL(0+)`。\n\n5. 两个功能元件可靠度分别为0.95和0.9，任一失效系统就失效。系统可靠度是多少？\n\n考点27：基础层答案与思路\n\n🔵1. `1/R = 1/12+1/6+1/4 = 1/2`，所以 `R=2 Ω`。并联结果必须小于最小支路电阻4 Ω，数量级合理。\n\n🔵2. 由KCL：`2+3=1.2+I`，得 `I=3.8 A`。\n\n🔵3. 独立电压源置零后用短路替代；受控源必须保留，因为它是电路内部关系的一部分。\n\n🔵4. 电容电压、电感电流连续，故 `uC(0+)=5 V`、`iL(0+)=0.4 A`。\n\n🔵5. 串联系统 `R=0.95×0.9=0.855`。这不是电阻串联计算。\n\n考点28：计算层原创练习\n\n1. 一个 `12 V` 电源串联 `3 Ω` 与 `6 Ω`，以 `6 Ω` 两端为输出。求该端口的戴维宁电压和戴维宁电阻；再接 `2 Ω` 负载，求负载功率。\n\n2. RC充电电路中 `R=100 kΩ`、`C=10 μF`，电容初始电压为0，最终电压为10 V。求时间常数和 `t=1 s` 时电容电压。\n\n3. 串联交流电路中 `R=20 Ω、XL=30 Ω、XC=15 Ω`，端电压有效值100 V。求阻抗、总电流、功率因数和有功功率。\n\n4. 对称三相负载的线电压380 V、线电流10 A、功率因数0.8，求总有功功率。\n\n5. 50 Hz四极异步电动机运行转速1440 r/min，求同步转速和转差率。\n\n考点29：计算层详细解析\n\n🔵1. 开路时是分压电路，`Uth=12×6/(3+6)=8 V`。关闭电压源后，端口看到 `3 Ω∥6 Ω=2 Ω`，故 `Rth=2 Ω`。接 `RL=2 Ω` 后电流 `I=8/(2+2)=2 A`，负载功率 `PL=I²RL=8 W`；同时满足最大功率条件。\n\n🔵2. `τ=RC=100×10³×10×10⁻⁶=1 s`。`uC(t)=10(1-e⁻ᵗ)`，故 `uC(1)=10(1-e⁻¹)≈6.32 V`。\n\n🔵3. `Z=20+j(30-15)=20+j15 Ω`，`|Z|=25 Ω`；`I=100/25=4 A`；`cosφ=20/25=0.8`，为感性；`P=UIcosφ=100×4×0.8=320 W`。\n\n🔵4. `P=√3ULILcosφ≈1.732×380×10×0.8≈5.27 kW`。\n\n🔵5. 四极即磁极对数 `p=2`，`n1=60f/p=1500 r/min`；`s=(1500-1440)/1500=0.04=4%`。\n\n考点30：错题诊断\n\n⚫️若第1题错，多半是不会从负载端“向内看”等效网络；若第2题错，重点复习单位换算和三要素法；若第3题错，重点练复数阻抗与有效值；若第4题错，通常混淆线量和相量；若第5题错，通常把极数和极对数混用。\n\n第十章：公开课程依据\n\n考点31：课程框架来源\n\n⚫️【南京邮电大学《电路分析基础》】：https://www.icourse163.org/course/NJUPT-1001656002\n\n⚫️【北京邮电大学《电路分析基础》】：https://www.icourse163.org/course/BUPT-1003377004\n\n⚫️【北京交通大学《电路》】：https://www.icourse163.org/course/NJTU-1002084010\n\n⚫️【中南大学《电工技术A》教学大纲】：https://dgdz.csu.edu.cn/theory_teach/electrotechnics_A/teaching_outline/teaching_outline.html\n\n⚫️【哈尔滨工业大学《电工技术》】：https://www.icourse163.org/course/HIT-1206448827\n\n⚫️【浙江万里学院公开考核范围与比例】：https://kcsz.zwu.edu.cn/b2/fb/c6537a176891/page.htm\n\n⚫️【福建工程学院电路历年试卷栏目】：https://ceep.fjut.edu.cn/_t1273/3851/list.htm\n"},{"name":"模拟电子技术","text":"# 📚 模拟电子技术\n\n使用说明：🔴红色 = 期末必须掌握的器件状态、公式和结论；🔵蓝色 = 分析电路的固定步骤与计算得分点；⚫️黑色 = 近似条件、波形理解和陷阱。本讲义按童诗白、华成英《模拟电子技术基础》常见章节组织，先帮助零基础学习者掌握核心得分内容，再扩展进阶分析。\n\n## 零基础预备：模电在研究什么\n\n考点0：模拟信号、放大与直流电源\n\n⚫️【模拟信号】：幅度随时间连续变化的电压或电流，例如声音经麦克风转换后的微弱电压。数字信号通常只关心有限个离散电平。\n\n⚫️【放大】：用较小的输入变化控制较大的输出变化。放大器不是“凭空制造能量”，输出增加的能量来自直流电源，输入信号只承担控制作用。\n\n🔴【三类量要分开】：直流电源建立器件的静态工作条件；交流输入是要处理的信号；地是电位参考点，不必然等于物理大地。\n\n考点0.1：为什么要先求静态、再求动态\n\n⚫️晶体管是非线性器件。先用直流偏置把它放在合适的放大区工作点Q附近，再把小信号变化近似看成线性，才能使用电压增益和小信号等效电路。\n\n🔵【静态分析】：只看直流，求 `IBQ、ICQ、UCEQ`。【动态分析】：只看交流小变化，求增益、输入电阻、输出电阻和频率响应。最后把直流与交流叠加理解真实波形。\n\n考点0.2：读模电图的顺序\n\n🔵1. 找电源、地、输入和输出；2. 识别核心有源器件；3. 沿直流通路找偏置；4. 沿交流通路找信号；5. 判断有无反馈；6. 检查输出摆幅是否会碰到截止或饱和。\n\n⚫️【增益】：电压增益 `Av=uo/ui`，负号表示反相；分贝增益 `20lg|Av|`。不要把“增益为负”误解成信号幅度变小。\n\n第一章：半导体与二极管\n\n考点1：本征、杂质半导体与PN结\n\n🔴【N型半导体】：多数载流子为自由电子，少数载流子为空穴；整体仍呈电中性。\n\n🔴【P型半导体】：多数载流子为空穴，少数载流子为自由电子；P型不等于“带正电”。\n\n🔴【PN结】：正向偏置使势垒降低、导通增强；反向偏置使势垒升高，通常近似截止。\n\n考点2：二极管伏安特性与模型\n\n🔴【核心特性】：单向导电。硅二极管工程估算常取导通压降约 `0.7 V`，锗管常取约 `0.2～0.3 V`，实际值随器件和电流变化。\n\n🔴【三种模型】：理想模型导通压降为0；恒压降模型导通后压降近似固定；小信号模型在静态工作点附近用动态电阻表示。\n\n🔵【判断步骤】：先假设导通或截止 → 按模型计算端电压和电流 → 检查结果是否满足假设 → 不满足则改判。\n\n⚫️【坑点】：反向电压未达到击穿区时电流很小；普通二极管进入击穿区可能损坏，但稳压二极管可在限流条件下工作于反向击穿区。\n\n![二极管伏安特性：正向导通、反向截止与击穿](../media/analog_diode_iv.svg)\n\n考点3：整流、限幅与稳压\n\n🔴【整流】：半波整流只利用一个半周期；桥式全波整流利用两个半周期，输出脉动频率是输入频率的2倍。\n\n🔴【滤波电容】：接在整流输出端并联负载，利用充放电减小脉动；负载越重或电容越小，纹波通常越大。\n\n🔴【稳压二极管】：反向击穿区稳压，必须串联限流电阻；稳压值近似为其击穿电压。\n\n第二章：双极型晶体管与基本放大电路\n\n考点4：BJT电流关系与工作区\n\n🔴【电流关系】：`IE = IB + IC`；放大区近似 `IC = βIB`、`IE = (β+1)IB`。\n\n| 状态 | NPN管发射结 | NPN管集电结 | 典型用途 |\n|---|---|---|---|\n| 截止 | 反偏或未充分正偏 | 反偏 | 开关断开 |\n| 放大 | 正偏 | 反偏 | 线性放大 |\n| 饱和 | 正偏 | 正偏 | 开关闭合 |\n\n🔴【硅管估算】：导通时常取 `UBE ≈ 0.7 V`；饱和时常取 `UCE(sat) ≈ 0.2 V`，具体题目给定值优先。\n\n⚫️【坑点】：`IC = βIB` 只适用于放大区，不能在饱和区继续使用；三极管放大的是能量受控的信号，输出能量来自直流电源。\n\n![NPN三极管截止、放大、饱和三种状态](../media/analog_bjt_states.svg)\n\n考点5：静态工作点Q\n\n🔴【作用】：静态工作点决定晶体管是否处于放大区，并影响最大不失真输出幅度。\n\n🔵【直流通路】：令交流信号源为零，耦合和旁路电容视为开路，求 `IBQ、ICQ、UCEQ`。\n\n🔵【固定偏置常用式】：`IBQ = (VCC-UBE)/RB`，`ICQ = βIBQ`，`UCEQ = VCC-ICQRC`；算完必须检查是否仍在放大区。\n\n🔴【分压偏置】：基极分压网络配合发射极电阻可形成直流负反馈，使静态工作点对温度和β变化更稳定。\n\n考点6：截止失真与饱和失真\n\n🔴【判断本质】：看输出波形摆动时晶体管触及截止区还是饱和区，而不是只背“削顶/削底”。\n\n⚫️【共射电路】：输出与输入反相，因此输入正半周使集电极电压下降，过大时可能进入饱和；输入负半周使集电极电压上升，过大时可能截止。\n\n🔵【改善】：调整偏置使Q点大致居中或减小输入幅度。Q点过低更易截止，过高更易饱和。\n\n考点7：小信号模型与性能指标\n\n🔴【分析前提】：小信号变化围绕Q点，晶体管必须处于放大区。\n\n🔵【交流通路】：直流电压源视为交流地；容量足够大的耦合、旁路电容视为短路；用小信号模型替代晶体管。\n\n🔴【共射近似增益】：常见模型下 `Av ≈ -β(RC∥RL)/rbe`，负号表示反相；具体公式随发射极电阻是否旁路而变化。\n\n🔴【输入/输出电阻】：输入电阻反映对信号源的负载；输出电阻反映带负载能力。计算时要明确是“放大级自身”还是“含偏置网络/负载后的整体”。\n\n![分压偏置共射放大电路：直流偏置与交流信号通路](../media/analog_common_emitter.svg)\n\n考点8：三种基本组态\n\n| 组态 | 电压增益 | 相位 | 输入电阻 | 输出电阻 | 典型特点 |\n|---|---|---|---|---|---|\n| 共射 | 较大 | 反相 | 中等 | 较大 | 常用电压放大 |\n| 共集/射极跟随器 | 约1 | 同相 | 高 | 低 | 缓冲、阻抗变换 |\n| 共基 | 较大 | 同相 | 低 | 较大 | 高频性能较好 |\n\n🔴【级联】：中频区总电压增益等于各级增益乘积；以分贝表示时相加，`Gv(dB) = 20lg|Av|`。\n\n第三章：场效应管、差分与集成运放\n\n考点9：MOS场效应管\n\n🔴【控制方式】：MOS管是电压控制器件，栅极绝缘，输入电阻很高；BJT通常称电流控制器件。\n\n🔴【增强型NMOS】：`VGS < Vth` 截止；`VGS > Vth` 后形成沟道。放大常工作在饱和区，开关完全导通常工作在可变电阻/三极区。\n\n⚫️【坑点】：MOS管的“饱和区”对应恒流放大区，与BJT的饱和导通含义不同。\n\n考点10：差分放大电路\n\n🔴【差模与共模】：差模信号是两输入之差，共模信号是两输入中共同变化的部分。\n\n🔴【共模抑制比】：`CMRR = |Ad/Ac|`，分贝表示为 `20lg|Ad/Ac|`；CMRR越大，抑制共模干扰能力越强。\n\n🔴【恒流源尾电流】：可提高静态工作稳定性和共模抑制能力。\n\n考点11：理想运算放大器\n\n🔴【理想参数】：开环差模增益无穷大、输入电阻无穷大、输出电阻为零、共模抑制比无穷大。\n\n🔴【线性区两条规则】：负反馈条件下 `u+ ≈ u-`（虚短），`i+ ≈ i- ≈ 0`（虚断）。\n\n⚫️【坑点】：虚短不是两个输入端真正短路，虚断也不是输入端没有电压；正反馈或输出饱和时不能机械套用虚短。\n\n![反相比例运算电路与虚短、虚断](../media/analog_opamp_inverting.svg)\n\n考点12：基本运算电路\n\n🔴【反相比例】：`uo = -(Rf/R1)ui`，输入端形成虚地。\n\n🔴【同相比例】：`uo = (1+Rf/R1)ui`；电压跟随器是增益为1的特例。\n\n🔴【反相加法】：`uo = -Rf(u1/R1 + u2/R2 + …)`。\n\n🔴【积分】：`uo = -1/(RC)∫ui dt`；方波输入可得到三角波。\n\n🔴【微分】：`uo = -RC·dui/dt`；工程电路通常加入限幅和频率补偿避免噪声放大。\n\n🔵【运放计算步骤】：先确认负反馈且未饱和 → 标出虚短、虚断 → 对输入节点列KCL → 求输出 → 检查输出是否超过电源允许范围。\n\n专题1：电压比较器\n\n🔴【工作区】：比较器通常开环或带正反馈工作在非线性区，输出接近正、负饱和值；不能使用“虚短”求解。\n\n🔴【单限比较器】：输入跨过一个阈值时输出翻转；过零比较器的阈值为0。\n\n🔴【滞回比较器】：正反馈产生上、下两个不同阈值，具有回差，可提高抗噪声能力并把缓慢变化信号整形成矩形波。\n\n🔴【窗口比较器】：判断输入是否落在上下两个阈值之间。\n\n专题2：有源滤波器\n\n🔴【四类】：低通允许低频通过；高通允许高频通过；带通允许某频段通过；带阻抑制某频段。\n\n🔴【一阶滚降】：超过截止区后幅频特性渐近斜率通常为每十倍频约 `20 dB`；二阶约 `40 dB/十倍频`。\n\n⚫️【坑点】：滤波器“截止频率”通常对应幅值下降到通带值的 `1/√2`，不是信号绝对为零。\n\n第四章：负反馈放大电路\n\n考点13：反馈极性与组态\n\n🔴【负反馈】：反馈信号削弱净输入；正反馈增强净输入。瞬时极性法可沿信号通路标注正负变化判断。\n\n🔴【输出取样】：在输出端并联取样电压属于电压反馈；在输出通路串联取样电流属于电流反馈。\n\n🔴【输入比较】：反馈信号与输入串联比较属于串联反馈；在同一节点并联比较属于并联反馈。\n\n考点14：负反馈对性能的影响\n\n🔴【闭环增益】：`Af = A/(1+AF)`，其中后一个 `F` 为反馈系数；深度负反馈 `|AF| ≫ 1` 时，`Af ≈ 1/F`。\n\n🔴【一般影响】：降低但稳定增益、减小非线性失真、抑制放大器内部噪声、展宽通频带。\n\n🔴【电阻影响】：串联反馈提高输入电阻，并联反馈降低输入电阻；电压反馈降低输出电阻，电流反馈提高输出电阻。\n\n⚫️【坑点】：负反馈不能消除反馈环外部已经混入的噪声，也不保证电路在任何频率都稳定；相移过大可能产生自激。\n\n![负反馈放大器方框图与闭环增益](../media/analog_feedback_block.svg)\n\n第五章：频率响应、振荡与功率放大\n\n考点15：频率响应\n\n🔴【低频下降】：耦合电容、旁路电容的容抗增大导致增益下降。\n\n🔴【高频下降】：器件结电容和分布电容影响增强导致增益下降。\n\n🔴【截止频率】：增益下降到中频增益的 `1/√2`，即约 `-3 dB`；带宽 `BW = fH - fL`。\n\n考点16：正弦波振荡\n\n🔴【振荡条件】：环路幅值条件 `|AF| = 1`，相位条件 `∠AF = 2kπ`；起振时通常要求环路增益略大于1，稳定后由非线性稳幅到1。\n\n🔴【RC桥式振荡器】：适于低频，典型对称网络振荡频率 `f0 = 1/(2πRC)`，放大环节闭环增益通常需满足约3的起振条件。\n\n🔴【LC振荡器】：适于较高频率，理想谐振频率近似 `f0 = 1/(2π√LC)`。\n\n考点17：功率放大器\n\n| 类别 | 导通角 | 特点 |\n|---|---|---|\n| A类 | 360° | 失真小、效率低 |\n| B类 | 180° | 效率高、易有交越失真 |\n| AB类 | 大于180°小于360° | 减小交越失真，效率居中 |\n| C类 | 小于180° | 失真大，配合选频网络用于高频功放 |\n\n🔴【互补对称B类】：理想最大效率 `ηmax = π/4 ≈ 78.5%`；两管在过零附近都未充分导通会产生交越失真。\n\n🔴【AB类改善】：给功率管提供小的静态偏置，使过零附近仍有微小导通。\n\n第六章：直流稳压电源\n\n考点18：电源组成与指标\n\n🔴【流程】：交流电网 → 变压 → 整流 → 滤波 → 稳压 → 直流负载。\n\n🔴【桥式整流】：每半周有两只二极管导通；输出脉动频率为电网频率的2倍。\n\n🔴【线性串联稳压】：调整管工作在线性区，输出纹波小但效率较低、压差功耗明显。\n\n⚫️【稳压指标】：稳压系数反映输入变化影响，输出电阻反映负载变化影响；数值越小通常越好。\n\n![直流稳压电源从交流到稳定直流的处理流程](../media/analog_power_supply.svg)\n\n第七章：典型计算题\n\n考点19：三极管状态判断例题\n\n🔵【题目】：硅NPN管，`VCC = 5 V`，`RC = 1 kΩ`，基极电流 `IB = 0.1 mA`，`β = 100`。判断能否按放大区计算。\n\n🔵【先假设放大】：`IC = βIB = 10 mA`，则 `RC` 压降应为 `10 V`，超过 `VCC`，物理上不可能。\n\n🔵【结论】：原假设不成立，晶体管进入饱和区；不能继续使用 `IC = βIB`。\n\n考点20：运放例题\n\n🔵【题目】：反相放大器 `R1 = 10 kΩ`、`Rf = 50 kΩ`、`ui = 0.2 V`，求输出。\n\n🔵【解】：`uo = -(Rf/R1)ui = -5×0.2 = -1 V`。若电源电压允许该输出，则工作在线性区。\n\n考点21：深度负反馈例题\n\n🔵【题目】：开环增益 `A = 1000`，反馈系数 `F = 0.01`，求闭环增益。\n\n🔵【解】：`Af = 1000/(1+1000×0.01) ≈ 90.9`；因为环路增益为10，不宜直接把结果近似成 `1/F = 100` 而不说明误差。\n\n第八章：期末自测与答案\n\n考点22：自测题\n\n1. P型半导体是否整体带正电？\n2. NPN管放大区两个PN结分别如何偏置？\n3. 共射放大器输出与输入同相还是反相？\n4. 射极跟随器的电压增益、输入电阻和输出电阻有什么特点？\n5. 运放虚短和虚断在什么条件下使用？\n6. 电压串联负反馈怎样影响输入、输出电阻？\n7. B类互补功放的主要失真是什么？\n8. RC振荡器和LC振荡器通常分别适合什么频段？\n\n考点23：自测答案\n\n🔵1. 否，整体电中性。2. 发射结正偏、集电结反偏。3. 反相。4. 增益约1、输入电阻高、输出电阻低。5. 运放处于负反馈线性工作区。6. 输入电阻提高、输出电阻降低。7. 交越失真。8. RC偏低频，LC偏高频。\n\n第九章：复习优先级与取舍\n\n考点24：复习优先级\n\n🔴【A级必会】：二极管状态、BJT三状态、静态工作点、共射/共集特点、虚短虚断、反相/同相运放、负反馈影响。\n\n🔵【B级得分】：小信号增益、反馈组态、比较器、有源滤波、频率响应、振荡条件、功率放大、直流电源。\n\n⚫️【C级选学】：复杂差分参数、精确高频模型、多级直接耦合漂移计算。先确保A级题型能独立完成。\n\n第十章：公开试题提炼训练\n\n考点25：网络题型分析\n\n⚫️公开课程、考试大纲和试卷样例反复出现以下能力链：器件状态判断 → 放大电路静态/动态分析 → 反馈判断 → 运放运算 → 波形产生/比较 → 功放与电源。零基础应先学会“假设状态并回代检查”，再背公式。\n\n| 题型 | 常见问法 | 核心动作 |\n|---|---|---|\n| 器件判断 | 二极管是否导通、BJT类型和状态 | 看偏置与端电位 |\n| 放大电路 | 求Q点、增益、输入/输出电阻 | 分直流通路和交流通路 |\n| 波形题 | 限幅、失真、比较器输出 | 找阈值和饱和值 |\n| 反馈题 | 正/负反馈、四种组态、性能变化 | 瞬时极性＋取样/比较方式 |\n| 运放题 | 比例、加减、积分与设计 | 虚短、虚断、节点KCL |\n| 系统题 | 振荡、功放、整流滤波稳压 | 识别功能模块与工作区 |\n\n考点26：基础层原创练习\n\n1. 一个硅二极管采用恒压降 `0.7 V` 模型，`5 V` 电源经 `1 kΩ` 电阻和正向二极管串联到地，求电流。\n\n2. 某NPN管处于放大区，`IB=20 μA、β=100`，求 `IC` 和 `IE`。\n\n3. 共射、共集、共基中，哪一种常用于缓冲和阻抗变换？为什么？\n\n4. 理想运放在负反馈线性区的两条分析规则是什么？\n\n5. 电压串联负反馈对输入电阻和输出电阻分别有什么影响？\n\n6. 比较器为什么一般不能使用“虚短”？\n\n考点27：基础层答案\n\n🔵1. 二极管正向导通，`I=(5-0.7)/1 kΩ=4.3 mA`。\n\n🔵2. `IC=βIB=2 mA`，`IE=IB+IC=2.02 mA`。\n\n🔵3. 共集电极，也叫射极跟随器；电压增益约1、输入电阻高、输出电阻低，适合级间缓冲。\n\n🔵4. `u+≈u-`（虚短）和 `i+≈i-≈0`（虚断）。前提是负反馈且输出没有饱和。\n\n🔵5. 串联反馈提高输入电阻，电压反馈降低输出电阻。\n\n🔵6. 比较器通常开环或正反馈工作，输出进入正/负饱和区，不满足线性负反馈条件。\n\n考点28：计算层原创练习\n\n1. 固定偏置共射电路中 `VCC=12 V、RB=565 kΩ、RC=2 kΩ、β=100、UBE=0.7 V`。求Q点并检查工作状态。\n\n2. NPN开关电路中 `VCC=5 V、RC=1 kΩ、IB=80 μA、β=100、UCE(sat)=0.2 V`。判断放大还是饱和，并估算集电极电流。\n\n3. 反相运放中 `R1=20 kΩ、Rf=100 kΩ、ui=-0.3 V`，求输出。\n\n4. 反相加法器中 `Rf=20 kΩ`，两输入分别通过 `10 kΩ` 和 `20 kΩ` 接入，`u1=0.5 V、u2=-0.2 V`，求输出。\n\n5. 某两级放大器电压增益分别为 `-20` 和 `5`，求总增益、相位关系和分贝增益。\n\n6. 某放大器中频增益为100，在截止频率处幅值增益约是多少？对应分贝相对中频下降多少？\n\n考点29：计算层详细解析\n\n🔵1. `IBQ=(12-0.7)/565 kΩ=20 μA`；`ICQ=βIBQ=2 mA`；`UCEQ=12-2 mA×2 kΩ=8 V`。`UCEQ` 明显高于饱和压降且集电极电流未受电源限制，可按放大区处理。\n\n🔵2. 假设放大区，`IC=8 mA`；但外电路允许的饱和电流约 `IC(sat)=(5-0.2)/1 kΩ=4.8 mA`。预测值超过外电路上限，故进入饱和，实际集电极电流约4.8 mA，不能取8 mA。\n\n🔵3. `uo=-(100/20)×(-0.3)=+1.5 V`。两个负号分别来自反相结构和负输入。\n\n🔵4. `uo=-20k(0.5/10k + (-0.2)/20k)=-20k(50-10)μA=-0.8 V`。\n\n🔵5. `Av=(-20)×5=-100`，负号表示总输出与输入反相；`20lg100=40 dB`。\n\n🔵6. 截止频率处为中频幅值的 `1/√2`，所以约 `70.7`；相对下降约 `3 dB`。\n\n考点30：综合判断练习\n\n1. 某运放输出允许范围为 `±12 V`，按线性公式算得输出 `+18 V`。实际输出大约怎样？还能否继续用虚短分析？\n\n2. 一个放大器引入负反馈后增益从200降到20。若反馈网络不变，说明这一变化换来了哪些典型好处？\n\n3. 一个正弦波振荡器接通电源后没有外加输入却能输出稳定正弦波，它需要满足哪两个环路条件？起振初期与稳定后有何不同？\n\n考点31：综合题答案\n\n🔵1. 实际输出被限制在接近正饱和值，约 `+12 V` 附近，具体还取决于器件输出摆幅；进入饱和后不能继续使用虚短。\n\n🔵2. 一般换来增益稳定性提高、失真减小、带宽展宽，并按反馈组态改变输入/输出电阻。不能笼统写“所有噪声都消失”。\n\n🔵3. 稳定振荡时 `|AF|=1` 且总相移为 `2kπ`；起振初期环路增益需略大于1，使微小扰动增长，稳定后非线性稳幅使等效环路增益回到1。\n\n第十一章：公开课程与教材依据\n\n考点32：课程框架来源\n\n⚫️【天津大学《模拟电子技术基础》】：https://www.icourse163.org/course/TJU-1003156001\n\n⚫️【南京工程学院《电子技术基础—模拟电子技术》】：https://www.icourse163.org/course/NJIT-1002182003\n\n⚫️【大学MOOC《模拟电子技术》完整章节大纲】：https://www.icourse163.org/course/detail.htm?cid=1206684820\n\n⚫️【教材口径】：华成英、童诗白主编《模拟电子技术基础》是上述公开课程列出的主要参考教材之一；不同版次的符号和章节顺序可能略有差异。\n\n⚫️【公开试卷题型样例】：https://elearning.gdpepe.edu.cn/suite/portal/res?key=21375876\n\n⚫️【安徽三联学院模拟电子技术考试大纲】：https://zsb.slu.edu.cn/2021/0302/c462a32779/page.htm\n"},{"name":"数字电子技术","text":"# 📚 数字电子技术\n\n使用说明：🔴红色 = 期末必须掌握的逻辑规则、状态表和公式；🔵蓝色 = 分析与设计题标准步骤；⚫️黑色 = 器件条件、时序细节与陷阱。讲义按大学《数字电子技术基础》的典型期末结构组织，“RJ触发器”若出现在题目中，应结合选项判断它实际指RS还是JK触发器。\n\n## 零基础预备：从电平到逻辑\n\n考点0：0和1并不是固定的0 V和1 V\n\n⚫️【逻辑电平】：数字电路把一段电压范围解释为逻辑0，把另一段范围解释为逻辑1；具体阈值由TTL、CMOS系列和电源电压决定。不能把所有“1”都理解为1伏。\n\n⚫️【正逻辑】：高电平表示1、低电平表示0，是教材最常用约定；若采用负逻辑，含义相反。\n\n🔴【位bit】：一位二进制只能表示0或1；n位共有 `2^n` 种组合。数字电路的核心工作是“表示、变换和保存这些状态”。\n\n考点0.1：四种描述方式要能互相转换\n\n🔴【逻辑功能的四种表示】：逻辑表达式、真值表、逻辑图和波形图。表达式便于代数运算，真值表穷举输入输出，逻辑图体现实现，波形图体现随时间变化。\n\n🔵【零基础顺序】：先逐行看真值表 → 写最小项表达式 → 化简 → 画门电路。时序题则先找有效时钟边沿，再逐个边沿更新状态。\n\n考点0.2：组合逻辑与时序逻辑\n\n⚫️组合逻辑像“即时计算器”，输出只看现在输入；时序逻辑像“带记忆的机器”，输出还与过去保存下来的状态有关。\n\n![组合逻辑与时序逻辑的结构区别](../media/digital_comb_seq.svg)\n\n第一章：数制、编码与逻辑代数\n\n考点1：数制转换\n\n🔴【按权展开】：任意进制数的值等于各位数字乘以基数相应次幂后求和。\n\n🔵【十进制转二进制】：整数部分除2取余、倒序排列；小数部分乘2取整、顺序排列。\n\n🔴【二进制与八/十六进制】：从小数点向两边分组，三位二进制对应一位八进制，四位二进制对应一位十六进制。\n\n考点2：原码、反码与补码\n\n🔴【正数】：原码、反码、补码相同。\n\n🔴【负数补码】：符号位不变，数值位按位取反再加1；补码减法可转化为补码加法。\n\n🔴【n位补码范围】：`-2^(n-1) ～ 2^(n-1)-1`。\n\n⚫️【坑点】：补码的零只有一种表示；原码存在正零和负零。\n\n考点3：常用编码\n\n🔴【8421 BCD码】：用四位二进制表示一位十进制数字0～9，`1010～1111` 为非法码。\n\n🔴【格雷码】：相邻码字只有一位不同，可减少机械位置编码切换时的竞争错误。\n\n🔴【奇偶校验】：增加一位校验位，可检测奇数个位错误，不能定位错误，也不能保证检测所有偶数个位错误。\n\n考点4：基本逻辑与复合逻辑\n\n🔴【与AND】：全1出1；【或OR】：有1出1；【非NOT】：输入取反；【异或XOR】：不同出1；【同或XNOR】：相同出1。\n\n🔴【常用表达】：异或 `A⊕B = ĀB + AḂ`；同或 `A⊙B = AB + ĀḂ`。\n\n🔴【功能完备】：仅用与非门NAND或仅用或非门NOR都能实现任意组合逻辑函数。\n\n考点5：逻辑代数定律\n\n🔴【德摩根定律】：`overline(A+B) = Ā·B̄`，`overline(AB) = Ā+B̄`。\n\n🔴【吸收律】：`A+AB = A`，`A(A+B) = A`。\n\n🔴【消去律】：`A+ĀB = A+B`，`A(Ā+B) = AB`。\n\n⚫️【对偶规则】：交换“与/或”和“0/1”可得到对偶式，但变量及其反变量不交换。\n\n第二章：逻辑函数化简\n\n考点6：最小项、最大项与标准形式\n\n🔴【最小项】：每个变量恰出现一次的乘积项；在唯一一组输入下取1。`Σm(...)` 表示最小项之和。\n\n🔴【最大项】：每个变量恰出现一次的和项；在唯一一组输入下取0。`ΠM(...)` 表示最大项之积。\n\n⚫️【编号】：按变量二进制取值确定，通常最高位变量写在最左；考试以题目规定变量顺序为准。\n\n考点7：卡诺图化简\n\n🔴【排列规则】：行列按格雷码顺序排列，如 `00, 01, 11, 10`，相邻格只有一位不同。\n\n🔵【化简步骤】：填1 → 按 `1、2、4、8…` 个格尽量圈大 → 所有1至少覆盖一次 → 可重复利用 → 写出圈内保持不变的变量。\n\n🔴【相邻关系】：左右边界相邻、上下边界相邻，四角也相邻；对角线不相邻。\n\n🔴【无关项X】：可按0或1使用，以得到更简表达式；没有必要时可不圈。\n\n![四变量卡诺图的格雷码排列、成组与边界相邻](../media/digital_kmap.svg)\n\n第三章：组合逻辑电路\n\n考点8：组合逻辑分析与设计\n\n🔴【特征】：任一时刻输出只由该时刻输入决定，不具有记忆功能。\n\n🔵【分析步骤】：由电路逐级写表达式 → 化简 → 列真值表 → 说明逻辑功能。\n\n🔵【设计步骤】：明确输入输出含义 → 列真值表 → 写逻辑函数 → 化简 → 选门电路或集成器件实现。\n\n考点9：加法器与比较器\n\n🔴【半加器】：和 `S = A⊕B`，进位 `C = AB`，不考虑低位进位。\n\n🔴【全加器】：`S = A⊕B⊕Cin`，`Cout = AB + (A⊕B)Cin`。\n\n🔴【数值比较器】：判断 `A>B、A=B、A<B`，三个输出在正常条件下互斥。\n\n考点10：编码器与译码器\n\n🔴【编码器】：把多个输入状态转换为较少位的二进制代码；优先编码器在多个输入同时有效时只编码最高优先级输入。\n\n🔴【译码器】：把n位输入译成最多 `2^n` 个互斥输出，可用于地址译码和实现逻辑函数。\n\n⚫️【使能端】：使能状态可能是高有效或低有效，必须看引脚符号和题设，不能一律按1有效。\n\n考点11：数据选择器与数据分配器\n\n🔴【数据选择器MUX】：选择地址决定多路输入中的哪一路送到单一输出，`2^n` 选1通常需要n位选择信号。\n\n🔴【数据分配器DEMUX】：把一路数据按地址送往多个输出中的一路。\n\n🔵【用MUX实现函数】：把部分变量接选择端，根据真值表将数据端接0、1、变量或反变量。\n\n考点12：竞争与冒险\n\n🔴【竞争】：同一输入信号经不同路径到达某点的时间不同；【冒险】：竞争导致输出出现不应有的瞬时尖峰。\n\n🔵【常用消除方法】：增加冗余项、选通脉冲避开过渡期、加滤波电容或采用同步设计。\n\n专题1：OC门、三态门与总线\n\n🔴【OC门/开集电极门】：输出晶体管集电极开路，使用时通常需要外接上拉电阻；多个OC输出可并联实现线与功能。\n\n🔴【三态门】：除0和1外还有高阻态 `Z`；高阻态相当于暂时与总线断开，使多个设备可分时共享同一总线。\n\n⚫️【坑点】：普通推挽输出门不能直接并联，否则不同输出电平可能造成大电流冲突；能否并联取决于输出结构。\n\n第四章：锁存器与触发器\n\n考点13：锁存器和触发器的区别\n\n🔴【锁存器】：电平敏感，在使能有效期间输入变化可能影响输出。\n\n🔴【触发器】：通常在时钟边沿到来时采样输入，具有记忆一位二进制状态的能力。\n\n⚫️【坑点】：电路符号上的小圆圈表示低有效，三角符号常表示边沿触发；三角加小圆圈通常表示下降沿触发。\n\n考点14：SR锁存器/触发器\n\n🔴【高有效NOR型SR】：`S=0,R=0` 保持；`S=1,R=0` 置1；`S=0,R=1` 置0；`S=1,R=1` 为禁用/不确定状态。\n\n🔴【低有效NAND型S̄R̄】：`S̄=1,R̄=1` 保持；`0,1` 置1；`1,0` 置0；`0,0` 禁用。\n\n⚫️【坑点】：RS禁用组合取决于输入是高有效还是低有效，不能脱离电路类型背一个固定组合。\n\n考点15：JK、D与T触发器\n\n| 触发器 | 输入条件 | 下一状态Q(n+1) |\n|---|---|---|\n| JK | J=0,K=0 | 保持 |\n| JK | J=0,K=1 | 置0 |\n| JK | J=1,K=0 | 置1 |\n| JK | J=1,K=1 | 翻转 |\n| D | 任意D | `Q(n+1)=D` |\n| T | T=0 | 保持 |\n| T | T=1 | 翻转 |\n\n🔴【特性方程】：JK为 `Q(n+1)=JQ̄(n)+K̄Q(n)`；D为 `Q(n+1)=D`；T为 `Q(n+1)=T⊕Q(n)`。\n\n![上升沿D触发器时序：Q只在有效边沿采样D](../media/digital_flipflop_timing.svg)\n\n🔴【触发器转换】：先写目标触发器激励需求，再与现有触发器特性方程比较，得到输入端组合逻辑。\n\n考点16：时序参数\n\n🔴【建立时间】：有效时钟边沿前输入必须稳定的最短时间；【保持时间】：有效边沿后输入仍须稳定的最短时间。\n\n🔴【传播延迟】：时钟或输入变化到输出稳定之间的时间。违反建立/保持时间可能产生亚稳态。\n\n第五章：时序逻辑电路\n\n考点17：同步时序电路分析\n\n🔴【特征】：输出不仅与当前输入有关，还与原状态有关；状态由触发器保存。\n\n🔵【分析步骤】：写各触发器激励方程 → 代入特性方程求次态 → 写输出方程 → 列状态表/画状态图 → 判断逻辑功能与有效循环。\n\n考点18：寄存器与移位寄存器\n\n🔴【寄存器】：暂存多位二进制数据；n位寄存器通常由n个触发器组成。\n\n🔴【移位寄存器】：每个时钟使数据左移或右移一位，可完成串并转换、延时和序列产生。\n\n考点19：计数器\n\n🔴【模N计数器】：共有N个有效状态；需要触发器数量 `n ≥ ceil(log2N)`。\n\n🔴【同步计数器】：所有触发器受同一时钟控制，速度较快；异步计数器逐级触发，结构简单但累计延迟较大。\n\n🔵【任意进制】：可利用清零、置数或状态反馈截取所需N个状态；必须检查是否能从无效状态回到有效循环，即自启动能力。\n\n![模6计数器的有效循环与无效状态自启动](../media/digital_counter_states.svg)\n\n考点20：状态机设计\n\n🔵【标准流程】：文字功能 → 原始状态图/表 → 状态化简 → 状态编码 → 选触发器 → 求激励和输出函数 → 画逻辑图 → 检查无效状态。\n\n🔴【Mealy与Moore】：Mealy输出与当前状态和输入有关；Moore输出只与当前状态有关。\n\n第六章：脉冲电路与数模/模数转换\n\n考点21：施密特、单稳态与多谐振荡器\n\n🔴【施密特触发器】：具有两个不同阈值和回差特性，适合把缓慢或带噪信号整形成矩形波。\n\n🔴【单稳态】：一个稳定状态、一个暂稳状态，受触发后输出固定宽度脉冲。\n\n🔴【多谐振荡器】：没有稳定状态，可自激产生连续矩形脉冲。\n\n考点22：555定时器\n\n🔴【典型内部阈值】：比较基准通常为 `1/3VCC` 和 `2/3VCC`；可构成单稳态、多谐振荡器和施密特触发器。\n\n⚫️【考试策略】：若给出具体电路，先判断充放电路径和电容电压跨越的两个阈值，再计算高、低电平持续时间。\n\n考点23：D/A转换\n\n🔴【DAC】：把数字量转换为与其数值成比例的模拟电压或电流；常见权电阻网络和倒T形R-2R网络。\n\n🔴【分辨率】：n位DAC有 `2^n` 个代码；1 LSB所代表的模拟变化取决于满量程的定义，答题时应写清采用 `FS/2^n` 还是 `FS/(2^n-1)`。\n\n考点24：A/D转换\n\n🔴【基本过程】：采样 → 保持 → 量化 → 编码。\n\n🔴【量化误差】：理想均匀量化器通常不超过 `±1/2 LSB`。\n\n| ADC类型 | 速度 | 特点 |\n|---|---|---|\n| 并行比较型 | 最快 | 比较器数量多、成本高 |\n| 逐次逼近型 | 较快 | 速度与精度折中，应用广 |\n| 双积分型 | 较慢 | 抗干扰、精度较好，常用于数字仪表 |\n\n![A/D转换的采样、保持、量化与编码过程](../media/digital_adc_process.svg)\n\n专题2：半导体存储器与可编程逻辑\n\n🔴【容量表示】：`2^n × m` 表示有 `2^n` 个字、每字m位，通常需要n根地址线和m根数据线。\n\n🔵【例】：`8K×8` 存储器有8192个字，需要 `log₂8192 = 13` 根地址线，数据线8根，总容量为64 Kbit，即8 KB。\n\n🔴【RAM】：可读写，通常易失；【ROM】：正常使用中以读为主，断电后信息通常保留。Flash可电擦写，属于非易失存储。\n\n🔴【PLD】：用可编程逻辑资源实现组合或时序逻辑；FPGA通常含可编程逻辑块、互连和I/O资源。\n\n第七章：典型题\n\n考点25：JK状态例题\n\n🔵【题目】：某上升沿JK触发器当前 `Q=0`，时钟有效边沿到来时 `J=K=1`，求下一状态。\n\n🔵【解】：JK在 `J=K=1` 时翻转，因此 `Q(n+1)=1`。\n\n考点26：计数器位数例题\n\n🔵【题目】：设计模10计数器至少需要多少个触发器？\n\n🔵【解】：`2³=8<10`，`2⁴=16≥10`，至少需要4个触发器，并有6个无效状态需考虑自启动。\n\n考点27：全加器例题\n\n🔵【题目】：`A=1,B=1,Cin=0`，求和与进位。\n\n🔵【解】：`S=1⊕1⊕0=0`，`Cout=1`。\n\n第八章：期末自测与答案\n\n考点28：自测题\n\n1. 四位二进制对应几位十六进制？\n2. 异或门在两个输入怎样时输出1？\n3. 组合逻辑电路是否具有记忆功能？\n4. 高有效NOR型SR锁存器的禁用输入是什么？\n5. JK触发器 `J=K=1` 时执行什么操作？\n6. D触发器的下一状态是什么？\n7. 模12计数器至少需要几个触发器？\n8. 逐次逼近ADC和双积分ADC哪个通常更快？\n\n考点29：自测答案\n\n🔵1. 一位。2. 两输入不同。3. 不具有。4. `S=R=1`。5. 翻转。6. `Q(n+1)=D`。7. 4个。8. 逐次逼近型。\n\n第九章：复习优先级与取舍\n\n考点30：复习优先级\n\n🔴【A级必会】：基本门、德摩根、真值表、组合/时序区别、RS/JK/D/T状态、计数器位数。\n\n🔵【B级得分】：卡诺图、组合电路分析、OC/三态门、加法器/译码器/MUX、同步时序分析、寄存器、存储器容量与ADC/DAC。\n\n⚫️【C级选学】：复杂状态机设计、竞争冒险证明、555精确充放电推导和HDL。先把状态表与基本计算拿稳。\n\n第十章：公开试题提炼训练\n\n考点31：网络题型分析\n\n⚫️公开大学期末试卷显示，数电通常采用“基础填空/选择＋组合逻辑分析与设计＋触发器波形＋时序电路状态分析＋计数器/555综合”的结构。真正的大分题要求写过程：表达式、真值表、状态方程、状态图和自启动不能互相替代。\n\n| 题型 | 高频任务 | 必写过程 |\n|---|---|---|\n| 逻辑基础 | 数制、逻辑门、OC/三态、存储器 | 写清有效电平和单位 |\n| 化简 | 代数法、卡诺图 | 圈组或写使用的定律 |\n| 组合分析 | 门电路、MUX、译码器 | 表达式→真值表→功能 |\n| 组合设计 | 表决、比较、编码 | 定义变量→真值表→化简→实现 |\n| 波形题 | D/JK/T触发器 | 标有效沿，逐沿更新 |\n| 时序分析 | 计数器、状态机 | 驱动方程→状态方程→状态表/图 |\n\n考点32：基础层原创练习\n\n1. 把十进制45转换为二进制和十六进制。\n\n2. 用德摩根定律展开 `overline(A+BC)`。\n\n3. 一个16选1数据选择器需要多少根选择线？\n\n4. 为什么普通推挽输出门不能随意并联，而OC门可以在外接上拉电阻后并联？\n\n5. 高有效NOR型SR锁存器的保持、置1、置0和禁用组合分别是什么？\n\n6. JK触发器当前 `Q=1`，有效时钟沿到来时 `J=K=1`，下一状态是什么？\n\n考点33：基础层答案\n\n🔵1. `45=32+8+4+1`，故二进制为 `101101₂`；按四位分组 `0010 1101`，十六进制为 `2D₁₆`。\n\n🔵2. `overline(A+BC)=Ā·overline(BC)=Ā(B̄+C̄)`。\n\n🔵3. 因 `2⁴=16`，需要4根选择线。\n\n🔵4. 推挽门若一个输出高、另一个输出低，会形成低阻大电流冲突；OC输出的上拉统一由电阻完成，多个晶体管只负责拉低，可实现线与。\n\n🔵5. `00`保持、`10`置1、`01`置0、`11`禁用。若是低有效NAND型，组合必须重新判断。\n\n🔵6. JK在 `11` 时翻转，所以从1变为0。\n\n考点34：分析与设计层原创练习\n\n1. 化简逻辑函数 `F=A+ĀB`。\n\n2. 三个独立温度传感器A、B、C中至少两个报警时，系统输出F=1。列真值表的报警行并写最简与或式。\n\n3. 一个上升沿D触发器初态 `Q=0`，连续四个有效边沿到来前的D依次为 `1、0、1、1`。写出每个边沿后的Q。\n\n4. 设计模24计数器至少需要几个触发器？有多少个二进制组合未使用？\n\n5. `16K×8` ROM需要多少根地址线和数据线？总容量是多少bit和Byte？\n\n6. 8位均匀ADC参考范围为 `0～5.12 V`，若按 `FS/2^n` 定义1 LSB，求分辨率和理想最大量化误差。\n\n考点35：详细解析\n\n🔵1. 用吸收/消去律：`A+ĀB=(A+Ā)(A+B)=A+B`。\n\n🔵2. 报警行是 `011、101、110、111`；最简式 `F=AB+AC+BC`。设计题应先说明1表示报警，再列真值表，不能直接猜公式。\n\n🔵3. D触发器每个上升沿执行 `Q⁺=D`，所以状态依次为 `1、0、1、1`；两个边沿之间不随D变化。\n\n🔵4. `2⁴=16<24`、`2⁵=32≥24`，至少5个触发器；共有 `32-24=8` 个未使用状态，需检查自启动。\n\n🔵5. `16K=16384=2¹⁴`，地址线14根、数据线8根；总容量 `16K×8=128 Kbit=16 KB`。\n\n🔵6. `1 LSB=5.12/256=0.02 V=20 mV`；理想最大量化误差为 `±10 mV`。\n\n考点36：时序综合训练\n\n1. 一个三位模6加法计数器按 `000→001→010→011→100→101→000` 循环。写出有效状态数量、触发器数量和无效状态；说明“能自启动”是什么意思。\n\n2. 施密特触发器、单稳态触发器、多谐振荡器分别有几个稳定状态，各适合完成什么功能？\n\n3. 某触发器时序题中，D在时钟上升沿附近恰好变化。能否只凭理想特性方程确定Q？为什么？\n\n考点37：时序综合答案\n\n🔵1. 有效状态6个，触发器3个，无效状态为 `110、111`。能自启动指电路意外进入无效状态后，仍能在有限个时钟内自动返回有效循环，而不是锁死在无效环中。\n\n🔵2. 施密特有两个稳定状态，用于带回差整形；单稳态有一个稳定状态，用于产生固定宽度脉冲；多谐振荡器没有稳定状态，用于连续产生矩形波。\n\n🔵3. 不能。真实触发器要求建立时间和保持时间，若输入在有效沿附近变化，可能违反时序约束并产生亚稳态；理想题若未说明，通常假设输入避开边沿。\n\n第十一章：公开课程依据\n\n考点38：课程框架来源\n\n⚫️【华中科技大学《数字电子技术基础》】：https://www.icourse163.org/course/detail.htm?cid=1001909001\n\n⚫️【北京交通大学《数字电子技术基础》】：https://www.icourse163.org/course/NJTU-1002105006\n\n⚫️【口径提示】：触发器有效电平、异步置位/清零和芯片引脚题应以题图与指定教材为准。\n\n⚫️【中南大学公开数字电子技术期末试卷】：https://dgdz.csu.edu.cn/sitefiles/377B607CD3E9D731F24247D78BAE939F/145D0FA8BD8FB40DA48A7095A1258A70.pdf\n"},{"name":"通信原理与高频电子线路","text":"# 📚 通信原理与高频电子线路\n\n使用说明：🔴红色 = 期末必须掌握的系统框图、公式和比较结论；🔵蓝色 = 计算步骤与简答题得分关键词；⚫️黑色 = 适用条件、物理解释和陷阱。本讲义把《通信原理》的信号传输理论与《高频电子线路》的收发电路放在同一系统中理解。\n\n## 零基础预备：先分清六个词\n\n考点0：消息、信息、信号、信道、噪声、系统\n\n⚫️【消息】：人希望传递的内容，例如语音、文字和图像。【信息】：消息中消除不确定性的部分。【信号】：承载消息的物理量，例如随时间变化的电压、光强或电磁波。\n\n⚫️【信道】：信号传播所经过的媒介及相关设备，可为双绞线、光纤、自由空间等。【噪声】：接收端不希望出现的随机扰动。【通信系统】：完成信息产生、变换、传输和恢复的整体。\n\n考点0.1：基带、载波、调制与解调\n\n⚫️【基带信号】：由信源直接产生、频谱通常靠近零频的原始电信号。【载波】：便于远距离传输的高频周期信号。\n\n🔴【调制】：在发送端让载波的幅度、频率或相位随消息变化；【解调】：在接收端从已调信号中恢复基带消息；【混频】：改变信号中心频率，一般保留原调制内容。\n\n考点0.2：最常混淆的单位\n\n🔴【Hz】：每秒周期数或带宽单位；【Baud】：每秒码元数；【bit/s】：每秒信息比特数；【dB】：两个功率或幅度比值的对数表示，不是绝对功率单位。\n\n🔵看到题目先在量旁写单位，再判断它是频率、码元速率、比特率还是信噪比，能避免大多数公式套错。\n\n第一章：通信系统基础\n\n考点1：通信系统模型\n\n🔴【基本模型】：信源 → 发送设备 → 信道 → 接收设备 → 信宿；噪声通常在信道及接收端模型中引入。\n\n🔵【各部分作用】：信源产生消息；发送设备完成编码、调制和放大；信道承载信号；接收设备完成选频、放大、解调和译码；信宿接收消息。\n\n🔴【模拟与数字通信】：模拟通信直接处理连续消息波形；数字通信以离散符号传输信息，通常具有抗干扰、易再生、易加密和便于处理等优点，但需要同步并占用相应系统资源。\n\n![通信系统基本模型：信源、发送设备、信道、接收设备和信宿](../media/comm_system.svg)\n\n考点2：通信方式\n\n🔴【单工】：只能单向通信，如传统广播。\n\n🔴【半双工】：双方都能发送，但同一时刻只能一方发送，如对讲机。\n\n🔴【全双工】：双方可同时发送和接收，如普通电话通话。\n\n⚫️【串行与并行】：串行逐位传输、线路少且适合远距离；并行多位同时传输、近距离速度高但线路多并存在偏斜问题。\n\n考点3：信号、频谱与带宽\n\n🔴【周期与频率】：`f = 1/T`，角频率 `ω = 2πf`；波长 `λ = c/f`，真空中 `c ≈ 3×10⁸ m/s`。\n\n🔴【时域与频域】：时域看波形随时间变化；频域看信号由哪些频率分量组成。调制本质上常表现为频谱搬移或角度变化。\n\n🔴【带宽】：信号带宽描述主要频谱占据范围；信道带宽描述信道可有效传输的频率范围，二者不是同一概念。\n\n第二章：信息量、信道与容量\n\n考点4：信息量与熵\n\n🔴【自信息量】：事件概率为 `p` 时，信息量 `I = -log₂p` bit；越不可能发生的事件，发生后提供的信息量越大。\n\n🔴【离散信源熵】：`H(X) = -Σp(x)log₂p(x)` bit/符号；等概率时熵最大。\n\n考点5：码元速率与信息速率\n\n🔴【码元速率】：每秒传输码元数，单位Baud；【比特率】：每秒传输信息比特数，单位bit/s。\n\n🔴【关系】：若每个码元有 `M` 种等概状态并携带 `log₂M` bit，则 `Rb = Rs log₂M`。\n\n⚫️【坑点】：只有二进制码元且每码元携带1 bit时，码元速率与比特率数值才可能相等。\n\n考点6：奈奎斯特与香农公式\n\n🔴【奈奎斯特无噪声极限】：理想低通信道最高码元速率 `Rs,max = 2B`；M进制最高比特率 `Rb,max = 2B log₂M`。\n\n🔴【香农容量】：高斯白噪声信道 `C = B log₂(1+S/N)` bit/s，`S/N` 必须使用线性功率比。\n\n🔵【dB换算】：若信噪比给成 `x dB`，先用 `S/N = 10^(x/10)` 转为线性值再代入香农公式。\n\n⚫️【理解】：增大带宽或信噪比都能提高容量，但信噪比的收益呈对数增长；香农公式给出理论上限，不保证某种具体调制编码自动达到该速率。\n\n考点7：香农公式例题\n\n🔵【题目】：信道带宽 `B = 3 kHz`，信噪比 `30 dB`，求理论容量。\n\n🔵【解】：线性信噪比 `S/N = 10^(30/10)=1000`；`C = 3000log₂(1001) ≈ 29.9 kbit/s`。\n\n专题1：随机过程与噪声基础\n\n🔴【平稳随机过程】：统计特性不随时间平移而改变；广义平稳通常要求均值为常数、自相关只与时间差有关。\n\n🔴【功率谱密度】：广义平稳随机过程的自相关函数与功率谱密度构成傅里叶变换对。\n\n🔴【白噪声】：理想白噪声功率谱密度在全部频率上为常数；实际系统只在有限带宽内近似为白噪声。\n\n🔴【高斯噪声】：幅度服从高斯分布；“高斯”描述幅度统计，“白”描述频谱，两者不是同义词。\n\n第三章：模拟调制\n\n考点8：为什么要调制\n\n🔴【目的】：把基带信号搬移到适合信道和天线辐射的频段；实现频分复用；改善抗干扰或适配传输特性；减小实际天线尺寸。\n\n🔴【三类连续波调制】：调幅AM改变载波幅度；调频FM改变瞬时频率；调相PM改变瞬时相位。\n\n![基带消息、调幅AM和调频FM波形对比](../media/comm_modulation.svg)\n\n考点9：普通调幅AM\n\n🔴【单音AM】：`s(t)=Ac[1+m cosωmt]cosωct`，`m` 为调幅度。包络不失真通常要求 `0≤m≤1`；`m>1` 为过调幅。\n\n🔴【频谱】：含载波 `fc` 和上下边带 `fc±fm`；若基带最高频率为 `W`，普通AM带宽 `BAM = 2W`。\n\n🔴【功率效率】：单音、`m=1` 时，普通AM边带功率占总功率最大约1/3，大量功率在不携带消息的载波上。\n\n考点10：DSB-SC与SSB\n\n🔴【DSB-SC】：抑制载波双边带，带宽 `2W`，需相干解调，功率利用率高于普通AM。\n\n🔴【SSB】：只传一个边带，带宽 `W`，节省带宽和功率，但产生和同步解调更复杂。\n\n🔴【包络检波条件】：适用于具有足够载波且不过调的普通AM；DSB-SC不能直接用普通包络检波无失真恢复。\n\n考点11：角度调制\n\n🔴【FM】：消息改变瞬时频率，载波幅度不变，抗幅度噪声能力通常优于AM，但占用带宽可能更大。\n\n🔴【PM】：消息改变瞬时相位；FM与PM都属于角度调制，频谱是非线性变换。\n\n🔴【Carson近似带宽】：单音FM常用 `BFM ≈ 2(Δf+fm)`，其中 `Δf` 为最大频偏。\n\n第四章：采样、量化与基带传输\n\n考点12：采样定理\n\n🔴【低通信号】：最高频率为 `fH` 的带限信号，为避免频谱混叠，应满足 `fs ≥ 2fH`；实际系统通常留有过渡带裕量。\n\n⚫️【坑点】：采样频率等于2倍最高频率是理想边界，工程上还要考虑抗混叠滤波器。\n\n![采样充分与采样过稀导致混叠的直观对比](../media/comm_sampling.svg)\n\n考点13：PCM\n\n🔴【PCM流程】：抽样 → 量化 → 编码；接收端完成译码、低通重建。\n\n🔴【码率】：若采样频率 `fs`、每样值编码 `n` bit，则单路PCM码率 `Rb = nfs`。\n\n🔴【量化噪声】：量化级越多、位数越高，量化误差通常越小，但码率和系统复杂度增加。\n\n🔴【非均匀量化】：电话语音常用压扩改善小信号量化信噪比；我国/欧洲PCM体系常见A律13折线，美国、日本传统体系常见μ律。\n\n⚫️【考试提醒】：若题目要求A律13折线逐次比较编码，需按题目给定的极性码、段落码和段内码规则计算；不同教材位序标法应服从题设。\n\n考点14：数字基带与码间串扰\n\n🔴【码间串扰ISI】：信道带限使相邻码元波形在抽样时刻互相影响，可能造成判决错误。\n\n🔴【无码间串扰思想】：合理设计发送、信道和接收滤波器，使除本码元抽样点外，其他码元在该抽样点贡献为零。\n\n🔴【眼图】：眼睛张开越大，抽样判决裕量通常越大；闭合表示噪声、失真或码间串扰加重。\n\n🔴【升余弦滚降】：滚降系数 `0≤α≤1` 时，无码间串扰系统常用关系 `B = (1+α)Rs/2`，等价于 `Rs,max = 2B/(1+α)`。\n\n⚫️【权衡】：α越大，时域波形衰减更快、定时容差通常更好，但占用带宽更宽。\n\n考点15：常用线路码\n\n🔴【单极性NRZ】：实现简单但直流分量较大、同步信息弱。\n\n🔴【双极性AMI】：1交替用正、负脉冲表示，0为零电平，直流分量较小且可利用极性破坏检测错误。\n\n🔴【曼彻斯特码】：每比特中间必有跳变，自同步能力强，但所需带宽较大。\n\n🔴【HDB3码】：在AMI基础上把连续四个0替换为含破坏脉冲V的特定模式，限制长连零并保留近似无直流特性；V脉冲违反正常AMI极性交替规律。\n\n专题2：误码率与不失真传输\n\n🔴【误码率】：`Pe = 错误比特数/传输总比特数`；误码率是统计指标，不等同于某一小段数据必然出现的错误比例。\n\n🔴【线性系统无失真条件】：系统幅频特性在信号带宽内为常数，相频特性为随频率线性变化；等价于输出只是输入的比例缩放和固定时延。\n\n🔴【中继再生】：数字中继通过判决、整形、定时恢复抑制噪声累积，但每级仍可能产生判决错误。\n\n第五章：数字频带传输\n\n考点16：ASK、FSK与PSK\n\n| 方式 | 被键控参数 | 典型特点 |\n|---|---|---|\n| ASK | 幅度 | 实现简单，较易受幅度噪声影响 |\n| FSK | 频率 | 包络恒定，可非相干检测，带宽通常较大 |\n| PSK | 相位 | 功率效率和抗噪性能较好，需要相位参考 |\n\n🔴【BPSK】：两个相位相差π表示0和1；相干检测存在载波相位同步问题。\n\n🔴【DPSK】：用相邻码元相位变化传递信息，缓解绝对相位模糊，但性能通常略逊于相干PSK。\n\n🔴【QPSK】：每码元有4种相位，理想映射每码元携带2 bit，因此相同码元率下比特率是BPSK的2倍。\n\n考点17：差错控制基础\n\n🔴【奇偶校验】：可检出奇数个位错误，不能纠错。\n\n🔴【汉明距离】：码组之间不同位数；若最小距离为 `dmin`，可检测最多 `dmin-1` 位错误，可纠正最多 `floor[(dmin-1)/2]` 位错误。\n\n🔴【ARQ与FEC】：ARQ检测错误后请求重传；FEC加入冗余使接收端直接纠错，适合时延或回传受限场景。\n\n第六章：复用、交换与光纤通信\n\n考点18：复用方式\n\n🔴【FDM】：不同信号占不同频带，同时传输；【TDM】：不同信号占不同时间片；【WDM】：光纤中以不同光波长复用；【CDM/CDMA】：以不同码序列区分用户。\n\n⚫️【OFDM】：把高速数据分配到多个相互正交的子载波，能提高频谱利用率并便于对抗多径，但峰均功率比较高且对频偏敏感。\n\n考点19：光纤原理与窗口\n\n🔴【导光机制】：纤芯折射率略高于包层，满足条件时光在界面发生全反射并沿纤芯传播。\n\n🔴【单模与多模】：单模光纤模间色散小、适合高速长距离；多模光纤芯径较大、耦合容易，常用于较短距离。\n\n🔴【常用窗口】：`1310 nm` 附近标准单模光纤色散较小；`1550 nm` 附近衰减最低，适合长距离并可配合光放大器。\n\n⚫️【坑点】：窗口是波长范围的简称，不是只有一个精确波长；题目只给 `1.31 μm/1.55 μm` 时，应分别联想到低色散/低损耗。\n\n第七章：电磁波与移动通信\n\n考点20：电磁波谱\n\n🔴【频率由低到高】：无线电波 → 微波（常视为无线电波子范围）→ 红外线 → 可见光 → 紫外线 → X射线 → γ射线。\n\n🔴【波长关系】：`c = λf`；频率越高，波长越短，单个光子能量也越高。\n\n⚫️【坑点】：有的简化题只列“无线电、红外、可见、紫外”，顺序仍按频率升高排列；若题目问波长则顺序相反。\n\n![电磁波谱：频率、能量与波长的变化方向](../media/comm_spectrum.svg)\n\n考点21：1G至5G\n\n| 代际 | 核心特征 | 常见关键词 |\n|---|---|---|\n| 1G | 模拟蜂窝语音 | 模拟、语音、FDMA |\n| 2G | 数字蜂窝通信 | GSM/CDMA、短信、数字语音 |\n| 3G | 移动多媒体数据 | IMT-2000、视频与数据能力增强 |\n| 4G | 全IP移动宽带 | LTE、OFDM、高速数据 |\n| 5G | 多场景智能连接 | eMBB、URLLC、mMTC、低时延与大连接 |\n\n⚫️【考试口径】：代际是系统能力与标准体系的概括，不宜把单一频段、单一业务或某家公司设备当作定义。\n\n第八章：高频电子线路\n\n考点22：LC选频与品质因数\n\n🔴【谐振频率】：理想LC回路 `f0 = 1/(2π√LC)`；谐振回路用于从许多频率中选择所需频率。\n\n🔴【品质因数Q】：反映储能与损耗关系；一般Q越高，谐振峰越尖、选择性越好、通频带越窄。\n\n考点23：高频小信号与功率放大器\n\n🔴【高频小信号放大器】：主要指标包括增益、通频带、选择性、稳定性和噪声系数，常使用调谐回路作负载。\n\n🔴【丙类谐振功放】：晶体管导通角小于180°，集电极电流脉冲经LC选频网络恢复近似正弦输出；效率高但不适合直接线性放大任意包络信号。\n\n考点24：反馈振荡器\n\n🔴【巴克豪森条件】：稳定振荡时 `|AF|=1` 且总相移为 `2kπ`；起振时环路增益需略大于1。\n\n🔴【类型】：RC振荡器偏低频，LC振荡器偏高频，石英晶体振荡器频率稳定度高。\n\n考点25：混频与超外差接收机\n\n🔴【混频】：把已调信号的载频变换到另一频率，理想情况下保留原调制信息；输出包含和频、差频等分量，再由滤波器选取。\n\n🔴【中频】：常选 `fIF = |fLO - fRF|`。超外差接收机把不同电台频率统一变换为固定中频，便于获得稳定的增益与选择性。\n\n🔵【接收链路】：天线 → 高频放大/选频 → 混频器＋本振 → 中频放大 → 解调 → 低频放大。\n\n![超外差接收机：混频到固定中频后统一放大与解调](../media/comm_superhet.svg)\n\n考点26：解调与反馈控制\n\n🔴【AM解调】：普通AM可用包络检波；DSB-SC/SSB通常用同步检波。\n\n🔴【FM解调】：称鉴频，把瞬时频率变化恢复为基带信号；PM解调称鉴相。\n\n🔴【锁相环PLL】：主要由鉴相器、环路滤波器和压控振荡器组成，可用于载波同步、频率合成和FM解调。\n\n第九章：系统型综合题\n\n考点27：发射机与接收机\n\n🔵【发射机】：消息 → 变换/编码 → 调制 → 高频功率放大 → 天线。\n\n🔵【接收机】：天线 → 选频与低噪声放大 → 变频/中频放大 → 解调 → 译码/输出。\n\n⚫️【区分】：调制发生在发送端，解调发生在接收端；混频主要改变中心频率，不应丢失原有调制信息。\n\n考点28：带宽与速率综合判断\n\n🔵【标准顺序】：确认题目给的是基带带宽还是信道带宽 → 确认有噪/无噪模型 → dB转线性 → 选奈奎斯特或香农公式 → 写单位与理论上限含义。\n\n⚫️【坑点】：奈奎斯特公式含M进制数，香农公式含S/N；两者约束可能同时存在，实际速率不能超过较严格的上限。\n\n第十章：期末自测与答案\n\n考点29：自测题\n\n1. 对讲机属于单工、半双工还是全双工？\n2. `20 dB` 的功率信噪比对应多少线性比值？\n3. 基带最高频率为4 kHz，理想最低采样频率是多少？\n4. 普通AM在基带带宽为5 kHz时占用多少带宽？\n5. DSB-SC能否直接用普通包络检波无失真恢复？\n6. QPSK每码元理想携带多少比特？\n7. 1310 nm和1550 nm窗口分别突出什么优点？\n8. 超外差接收机为什么把不同射频变到固定中频？\n9. 电磁波频率由无线电到紫外升高时，波长怎样变化？\n10. PLL的三个基本组成是什么？\n\n考点30：自测答案\n\n🔵1. 半双工。2. `100`。3. `8 kHz`。4. `10 kHz`。5. 不能，通常需同步检波。6. 2 bit。7. 1310 nm低色散，1550 nm低损耗。8. 便于固定选频、稳定放大和统一解调。9. 变短。10. 鉴相器、环路滤波器、压控振荡器。\n\n第十一章：复习优先级与取舍\n\n考点31：复习优先级\n\n🔴【A级必会】：系统框图、单双工、码元/比特率、香农、采样、AM/FM/PM、ASK/FSK/PSK、电磁波谱、光纤窗口、1G～5G。\n\n🔵【B级得分】：奈奎斯特、PCM码率、升余弦滚降、AMI/HDB3、AM/DSB/SSB带宽、FM带宽、复用方式、LC谐振、振荡条件、混频与超外差。\n\n⚫️【C级选学】：随机过程完整推导、最佳接收、精确误码率积分、丙类功放动态线和复杂锁相环计算。先掌握概念比较和一步公式题，再进入这些进阶专题。\n\n第十二章：公开试题提炼训练\n\n考点32：网络题型分析\n\n⚫️公开考试大纲和期末试卷样例表明，《通信原理》常把一条完整链路拆成多个计算点：信息量/速率 → 采样与PCM → 基带成形 → 数字调制 → 带宽与误码；《高频电子线路》则更重视谐振、振荡、混频、调制解调和收发机框图。零基础先掌握系统位置，再记公式。\n\n| 题型 | 常见任务 | 易错点 |\n|---|---|---|\n| 基本概念 | 系统模型、性能指标、单双工 | 把消息、信号、信息混为一谈 |\n| 速率容量 | Baud/bit/s、奈奎斯特、香农 | dB未转线性、M进制漏乘log₂M |\n| 数字化 | 采样、量化、编码、PCM复用 | 采样率与码率混淆 |\n| 基带传输 | 线路码、眼图、升余弦 | 把带宽B和码元率Rs混用 |\n| 调制 | AM/FM/PSK带宽和波形 | 调制、混频、解调混淆 |\n| 高频电路 | LC、振荡器、超外差 | 本振、射频、中频关系写反 |\n\n考点33：基础层原创练习\n\n1. 对讲机为什么属于半双工，而广播为什么属于单工？\n\n2. 8进制码元速率为 `2400 Baud`，每个码元等概携带信息，求比特率。\n\n3. 功率信噪比为 `15 dB`，换算为线性比值。\n\n4. 最高频率为 `3.4 kHz` 的语音信号，理想最低采样率是多少？若实际采用 `8 kHz`、每个样值8 bit，单路PCM码率是多少？\n\n5. 基带最高频率为 `5 kHz`，普通AM、DSB-SC和SSB各占多少带宽？\n\n6. QPSK比特率为 `2 Mbit/s`，理想码元速率是多少？\n\n考点34：基础层答案\n\n🔵1. 对讲机双方都能发送但不能同时发送，属于半双工；广播只有发射台向听众单向传输，属于单工。\n\n🔵2. `Rb=Rslog₂M=2400×log₂8=7200 bit/s`。\n\n🔵3. `S/N=10^(15/10)≈31.6`。功率比使用 `10lg`，不是 `20lg`。\n\n🔵4. 理想边界 `fs≥2fH=6.8 kHz`；实际PCM码率 `Rb=8k×8=64 kbit/s`。\n\n🔵5. 普通AM与DSB-SC均为 `2W=10 kHz`；SSB只占一个边带，为 `W=5 kHz`。\n\n🔵6. QPSK每码元2 bit，`Rs=2 Mbit/s÷2=1 MBaud`。\n\n考点35：计算层原创练习\n\n1. AWGN信道带宽 `4 kHz`、信噪比 `15 dB`，求香农容量。\n\n2. M进制无噪理想低通信道带宽 `3 kHz`，采用8进制码元，按奈奎斯特公式求最高比特率。\n\n3. 升余弦系统码元速率 `8 kBaud`、滚降系数 `α=0.25`，求最小单边低通等效带宽。\n\n4. 单音FM最大频偏 `75 kHz`、最高调制频率 `15 kHz`，用Carson公式估算带宽。\n\n5. 超外差接收机接收 `100 MHz` 信号，本振为 `110.7 MHz`，求中频。\n\n6. 理想LC振荡回路 `L=10 μH、C=100 pF`，估算谐振频率。\n\n考点36：计算层详细解析\n\n🔵1. 先转线性 `S/N=31.6`；`C=4000log₂(1+31.6)≈4000×5.03≈20.1 kbit/s`。结果是理论上限。\n\n🔵2. `Rb,max=2B log₂M=2×3000×3=18 kbit/s`。\n\n🔵3. `B=(1+α)Rs/2=1.25×8000/2=5 kHz`。若直接写8 kHz，说明把码元率当成带宽。\n\n🔵4. `BFM≈2(Δf+fm)=2×(75+15)=180 kHz`。\n\n🔵5. `fIF=|fLO-fRF|=|110.7-100|=10.7 MHz`。\n\n🔵6. `f0=1/(2π√LC)`；`LC=10×10⁻⁶×100×10⁻¹²=10⁻¹⁵`，所以 `f0≈1/(2π×3.162×10⁻⁸)≈5.03 MHz`。\n\n考点37：综合分析练习\n\n1. 某数字语音链路采用 `8 kHz` 采样、每样值8 bit，随后用QPSK传输。忽略信道编码，求单路比特率和QPSK码元率；若成形滚降系数0.5，求低通等效带宽。\n\n2. 一个码的最小汉明距离为4，最多能检测几位错误？最多能纠正几位错误？能否保证同时纠正2位错误？\n\n3. 普通AM信号调幅度 `m=1.2`，使用包络检波会发生什么问题？如何改善？\n\n4. 说明接收机中“高频选频—混频—中频放大—解调”四个环节分别做什么。\n\n考点38：综合题答案\n\n🔵1. PCM比特率 `Rb=8k×8=64 kbit/s`；QPSK码元率 `Rs=64k/2=32 kBaud`；`B=(1+0.5)×32k/2=24 kHz`。\n\n🔵2. 可检测最多 `dmin-1=3` 位错误；可纠正最多 `floor[(4-1)/2]=1` 位错误；不能保证纠正2位错误。\n\n🔵3. `m>1` 发生过调幅，包络与原消息不再一一对应，包络检波产生失真。可减小调制信号幅度/调幅度，或采用能够正确同步恢复的其他调制解调方案。\n\n🔵4. 高频选频选择目标台并抑制带外干扰；混频把目标射频搬到固定中频；中频放大提供主要增益和选择性；解调从已调信号恢复基带消息。\n\n考点39：进阶题的取舍\n\n⚫️公开通信专业试卷还常考A律13折线逐次比较编码、HDB3编译码、匹配滤波器、循环码矩阵和具体误码率。这些属于完整通信专业期末的重要内容，零基础学习成本较高。若课程范围明确包含，应在A级内容掌握后单独做专题训练，不能只背一句定义。\n\n第十三章：公开课程与扩展依据\n\n考点40：课程框架来源\n\n⚫️【国家精品在线开放课程《通信原理》】：https://www.icourse163.org/course/detail.htm?cid=316006\n\n⚫️【东南大学《通信原理》】：https://www.icourse163.org/course/SEU-1001752356\n\n⚫️【国家级一流课程《高频电子线路》】：https://www.icourse163.org/course/detail.htm?cid=1003428003\n\n⚫️【NASA电磁波谱教学资源】：https://science.nasa.gov/learn/basics-of-space-flight/chapter6-2/\n\n⚫️【英国开放大学光纤衰减教学】：https://www.open.edu/openlearn/digital-computing/digital-communications/content-section-2.3\n\n⚫️【ITU移动通信代际术语】：https://www.itu.int/ITU-D/tech/MobileCommunications/IMT_INTRODUCING/IMT_Introducing.html\n\n⚫️【重庆邮电大学《通信原理C》考试大纲】：https://scie.cqupt.edu.cn/__local/C/C8/D0/FE064DDCA4225A1B8F69D6F9BFE_AAA435D8_2AC54.pdf\n\n⚫️【青岛科技大学公开通信原理试卷样例】：https://xk.qust.edu.cn/__local/3/68/37/1AAC303D0EAA89C7A1436849252_E4FDA68C_216AF.pdf\n"},{"name":"软件工程","text":"# 📚 软件工程\n\n使用说明：🔴红色= 一级考点 / 核心术语 / 判断改错点（背下来）🔵蓝色= 简答题踩分关键词 / 开发模型特征 / 测试方法区分（考试时写上去就是分）⚫️黑色= 具体定义解释、例子、选择题常见正确/错误描述（理解即可）\n第一章：软件工程概述\n考点1：软件的定义与特点\n🔴【软件的定义】：软件 =程序 + 数据 + 相关文档的完整集合。\n🔴【软件的特点】：\n软件是一种逻辑产品，不是物理实体。\n软件的开发主要是研制，不是生产制造。\n软件不会像硬件那样因物理磨损失效，但持续修改可能引入缺陷、破坏结构，使其出现“退化”；运行环境变化也会导致原本正确的软件不再适用。\n软件的开发和运行受计算机系统限制。\n⚫️【坑点】：\n程序不等于软件（软件还包括数据和文档）。\n软件既是逻辑实体，不是物理实体。\n软件安装的越多，计算机性能不一定越好（过多软件会占用系统资源）。\n“裸机”是指不装备任何软件的计算机。\n考点2：软件危机（Software Crisis）\n🔴【定义】：在软件开发和维护过程中遇到的一系列严重问题。\n🔴【主要表现】：\n进度滞后：软件开发进度难以预测。\n成本超支：软件开发成本难以控制。\n质量不可控：软件产品质量无法保证。\n维护困难：软件产品难以维护。\n文档缺乏：缺少适当的文档资料。\n🔴【产生原因】：\n用户需求描述不准确。\n缺乏有力的组织和管理。\n缺乏有力的方法学和工具支持。\n软件规模越来越大，复杂度越来越高。\n⚫️【坑点】：\n软件危机不是“电脑坏了”或“硬件故障”，而是软件开发生产力跟不上硬件发展。\n软件危机的表现不包括“软件依赖于硬件”（那是软件的特性之一）。\n考点3：软件工程（Software Engineering）\n🔴【定义】：采用工程的概念、原理、技术和方法来开发和维护软件，以经济地开发出高质量的软件并有效地维护它。\n🔴【软件工程三要素】：方法（技术手段）+工具（自动化支撑）+过程（质量管理的纽带）。（口诀：方工过）\n🔴【软件工程的目标】：在给定成本和进度的前提下，开发出具有适用性、有效性、可修改性、可靠性、可理解性、可维护性、可重用性、可移植性、可追踪性、可互操作性的软件产品。\n⚫️【坑点】：软件工程的核心是管理复杂性，不是单纯地写代码。\n第二章：软件生命周期\n考点4：软件生命周期（SDLC）\n🔴【定义】：软件从产生到报废的整个周期。\n🔴【常见教材口径】：定义期（问题定义、可行性研究、需求分析）、开发期（概要设计、详细设计、编码、测试）、运行维护期。生命周期阶段的名称和划分会因过程标准与模型不同而变化，并非只能固定为“三期八阶段”。\n⚫️【坑点】：\n维护通常持续时间很长、累计成本占比较高，但具体比例随系统寿命、类型和统计口径而变，不能把60%～70%当作通用定律。\n性能优化可能发生在设计、编码、测试和维护中，是软件工程活动的一部分；优化前应有可测量目标并避免牺牲正确性和可维护性。\n详细设计属于软件开发期，不属于定义期或维护期。\n第三章：软件开发模型（极高频）\n考点5：瀑布模型（Waterfall Model）\n🔴【核心特征】：阶段化、文档驱动，阶段成果经评审后进入后续阶段；经典瀑布强调顺序和基线控制，但实际可有反馈与返工，并非物理上绝对不能回退。\n🔴【优点】：文档驱动，每个阶段都有明确的产出，易于管理和审查。\n🔴【缺点】：需求变更极难，必须等全部做完才能看到效果。不适合需求不明确的项目。\n🔴【适用场景】：需求较明确稳定、技术成熟、强调阶段审查和可追踪文档的项目。军工、银行等项目是否采用瀑布不能仅凭行业名称判断。\n⚫️【坑点】：瀑布模型的最大优点是将软件开发各个阶段划分得十分清晰。\n考点6：原型模型（Prototyping Model）\n🔴【核心特征】：快速构建原型以澄清需求、验证方案并获取反馈。抛弃式原型在需求明确后废弃；演化式原型在工程控制下逐步演化为产品，不能混为“边看边改直到交付”。\n🔴【优点】：能有效解决需求模糊的问题，降低风险，促进用户与开发人员的沟通。\n🔴【缺点】：若不加控制，容易导致设计草率、结构混乱，原型可能被直接当作最终产品交付。\n🔴【适用场景】：需求不明确、用户交互复杂的系统（如：UI界面设计、新概念验证）。\n⚫️【坑点】：快速原型模型可以有效地适应用户需求的动态变化。\n考点7：增量模型（Incremental Model）\n🔴【核心特征】：分批次交付，每次交付一个可运行的子集（增量），逐步完善。\n🔴【优点】：用户可以尽早拿到核心功能，分散风险，先交付核心功能。\n🔴【适用场景】：大型项目，且核心功能需尽快上线的场景。\n考点8：螺旋模型（Spiral Model）\n🔴【核心特征】：迭代演化并由风险驱动，每轮通常经历目标确定、风险分析与化解、开发验证、下一轮计划。它综合了原型和系统化开发思想，突出风险分析。\n🔴【优点】：强调风险规避，适合大型高风险项目。\n🔴【缺点】：过分依赖风险评估经验，成本较高，对风险分析人员要求高。\n🔴【适用场景】：内部开发的大型、高风险、复杂项目。\n⚫️【坑点】：风险分析是螺旋模型的标志性活动，但其他过程也可以做风险管理，不能理解成“只有螺旋模型才允许分析风险”。\n考点9：敏捷开发（Agile Development）\n🔴【核心特征】：迭代增量交付、快速反馈、响应变化、重视人员协作和可工作的软件。敏捷强调“够用且有价值的文档”，不是不要文档。\n🔴【代表性方法】：\n极限编程（XP）：测试驱动开发、结对编程、持续集成。\nScrum：冲刺（Sprint）、每日站会、产品待办列表。\n🔴【优点】：响应变化快，客户满意度高，交付迅速。\n🔴【局限】：对协作、持续反馈和工程实践要求较高；规模扩大时还要处理跨团队协调、架构治理和合规文档。大型项目也可采用规模化敏捷或混合过程，不能笼统说“不适合”。\n🔴【适用场景】：需求快速变化的互联网产品（如：APP开发、网站开发）。\n⚫️【坑点】：敏捷开发强调**“拥抱变化”**，不是拒绝变化。\n考点10：模型对比速记表\n第四章：需求分析\n考点11：需求分析的任务与产出\n🔴【核心任务】：准确回答系统**“必须做什么”**（WHAT），而不是“怎样做”（HOW）。\n🔴【主要工作】：\n问题识别：明确功能需求、性能需求、环境需求、用户界面需求。\n分析与综合：导出软件的逻辑模型。\n编写文档：产出需求规格说明书（SRS）。\n🔴【最终产物】：需求规格说明书（SRS）。\n⚫️【坑点】：需求分析不仅确定功能，还要明确性能、安全、接口、数据、约束和验收标准。需求应正确、完整、一致、可验证、可追踪，并与利益相关者确认。\n考点12：需求的分类（极高频判断/选择）\n🔴【功能需求】：系统必须做什么（具体的业务功能）。\n例：“用户输入账号密码，系统验证登录。”\n例：“系统能够完成数据的增删改查。”\n🔴【非功能需求】：系统做得好不好（质量属性、性能、安全、可靠性、可维护性）。\n例：“系统支持500人并发访问。”\n例：“页面响应时间小于3秒。”\n例：“数据必须加密传输。”\n🔴【约束需求】：开发过程中的限制条件（外部硬性规定）。\n例：“必须使用MySQL数据库。”\n例：“开发语言必须是Java。”\n例：“必须在Windows环境下运行。”\n⚫️【坑点】：\n看到**“必须使用XX语言/平台/工具”** → 选约束需求，不是功能需求！\n看到**“响应时间/吞吐量/并发数”** → 选非功能需求！\n“系统需要支持1000个用户同时在线查询” →非功能需求（性能指标）。\n考点13：需求获取方式（简答题）\n🔵【常用方式】：\n问卷调查法：向用户发放调查问卷收集需求。\n会议讨论法：开发方和用户方召开需求讨论会议。\n界面原型法：通过“界面原型”这一载体与用户沟通需求。\n可运行原型系统法：在以往类似项目基础上修改得到可运行系统，让用户试用以挖掘需求。\n访谈与现场观察：通过访谈利益相关者、观察真实业务流程识别显性与隐性需求。\n文档分析与工作坊：分析现有规章、表单和系统资料，组织JAD/需求工作坊协调冲突并形成共识。\n第五章：软件设计\n考点14：模块设计原则（极高频）\n🔴【核心原则】：“高内聚、低耦合”。\n🔴【内聚（Cohesion）】：一个模块内部各元素之间结合的紧密程度。内聚越高越好（模块内部团结一致）。\n内聚强度从低到高：偶然内聚 < 逻辑内聚 < 时间内聚 < 过程内聚 < 通信内聚 < 顺序内聚 <功能内聚（最强）。\n🔴【耦合（Coupling）】：不同模块之间相互依赖的程度。耦合越低越好（模块之间独立性强）。\n耦合强度从低到高：非直接耦合 <数据耦合< 标记耦合 < 控制耦合 < 公共耦合 < 内容耦合（最强）。\n降低耦合不仅是“传得少”，还要让接口简单稳定、只传必要数据，避免共享全局数据、控制标志和直接访问另一模块内部实现。\n⚫️【坑点】：\n数据耦合、标记耦合、控制耦合、公共耦合的耦合性从低到高：数据 < 标记 < 控制 < 公共。\n要减少模块间的耦合，应减少直接传递的信息量。\n模块设计应追求低耦合、高内聚。\n考点15：概要设计（总体设计）\n🔴【主要任务】：\n确定软件的体系结构（模块结构）。\n模块划分。\n确定全局数据结构。\n定义模块之间的接口。\n🔴【产出文档】：模块结构图和模块说明书。\n考点16：详细设计\n🔴【主要任务】：确定每个模块的算法和使用的数据结构。\n🔴【常用工具】：程序流程图（PFD）、N-S图（盒图）、PAD图、伪代码。\n🔴【程序流程图中的箭头】：代表控制流（不是数据流！）。\n⚫️【坑点】：程序流程图中的箭头代表控制流，系统流程图中的箭头代表数据流。\n第六章：软件测试（极高频，题型多样）\n考点17：测试的目的\n🔴【测试目的】：发现软件中的错误，不是为了证明软件正确。\n🔴【经典名言】：测试是为了发现错误而执行程序的过程。好的测试用例是能发现迄今为止尚未发现的错误的用例。\n⚫️【坑点】：软件测试的目的是发现软件的错误，不是“找出软件的所有错误”或“证明软件是正确的”（后者不可能实现）。\n考点18：黑盒测试（Black-box Testing）\n🔴【定义】：不看内部代码，只关注输入和输出（把程序当黑盒子）。又称功能测试。\n🔴【常用方法】：\n等价类划分：将输入数据划分为若干有效等价类和无效等价类，从每类中选一个代表测试。\n边界值分析：重点测试边界及其邻近值（如整数范围1～100可测0、1、2、99、100、101）。它对边界缺陷很有效，但不存在对所有缺陷都“能力最强”的单一黑盒方法。\n错误猜测法：根据经验猜测可能出错的情况。\n因果图：描述多种条件组合的测试用例。\n⚫️【坑点】：\n黑盒测试的测试用例不是根据程序内部逻辑设计的（那是白盒测试）。\n边界值分析尤其擅长发现边界处理错误，应与等价类、判定表、状态迁移等方法组合，不能绝对称为任何场景都最强。\n等价类划分法不是白盒测试技术，是黑盒测试技术。\n常用的黑盒测试方法包括：等价类划分、边界值分析、错误猜测、因果图。（α测试和β测试是测试阶段，不是测试方法）\n考点19：白盒测试（White-box Testing）\n🔴【定义】：看内部逻辑结构，检查代码路径是否走通。又称结构测试。\n🔴【常见覆盖标准】：\n语句覆盖（最弱）：每条可执行语句至少执行一次。\n判定覆盖（分支覆盖）：每个判断的真/假分支至少执行一次。\n条件覆盖：每个判断中每个条件的真/假至少出现一次。\n判定/条件覆盖：同时满足判定覆盖和条件覆盖。\n条件组合覆盖：每个判断中所有条件的组合至少出现一次。\n路径覆盖（最强）：程序中所有可能的执行路径都至少走一遍。\n⚫️【坑点】：\n判定覆盖通常包含语句覆盖；条件覆盖与判定覆盖一般互不蕴含，所以不能简单写成“语句<判定<条件<路径”的全序。判定/条件覆盖同时满足二者，条件组合覆盖更强。\n条件覆盖不一定包含判定覆盖！（极高频坑点：两个独立条件都出现了，但整体判定可能没走全）。\n有限、无环控制流中覆盖所有可行路径是很强的标准；存在循环时路径可能无限，实际通常覆盖选定的独立路径或限定循环次数。结构覆盖率高也不能证明需求和业务逻辑正确。\n考点20：测试阶段（顺序必记）\n🔴【测试顺序】：单元测试 → 集成测试 → 系统测试 → 验收测试。\n🔴【单元测试】：测试最小模块（如函数、类、方法）。用例主要依据详细设计设计。\n🔴【集成测试（组装测试）】：逐步组合模块，重点检查接口、数据传递、调用关系和协作行为；可发现设计、实现及环境配置等多类缺陷，不能只说发现设计阶段错误。\n🔴【系统测试】：测试整个系统的功能和性能是否满足需求。\n🔴【验收测试】：用户确认系统是否满足需求。\nAlpha测试：通常在开发组织可控环境中，由内部人员或受邀用户测试，开发方可观察和支持。\nBeta测试：发布给有限外部用户在真实或接近真实环境中试用并反馈。两者定义会因组织发布流程略有差异。\n⚫️【坑点】：\n集成测试测试的是模块接口，不是内部功能。\n单元测试的用例依据详细设计设计，不是需求分析。\n集合测试（集成测试）的主要目的是发现设计阶段的错误。\n第七章：软件维护\n考点21：软件维护的类型（简答题必背）\n🔴【维护特点】：维护通常贯穿软件交付后的较长时期，累计投入常很高；是否“花费最多”取决于系统寿命与统计口径。\n🔵【四大维护类型】：\n改正性维护：识别和纠正已发现的错误（修复缺陷）。\n适应性维护：使软件适应外部环境变化（平台、法规、接口等）。\n完善性维护：根据新需求扩充功能、改善性能或可用性。\n预防性维护：改善内部结构、可维护性或可靠性，以降低未来故障和修改风险。\n⚫️【坑点】：\n许多经典统计中完善性维护占比较大，但比例随项目和口径显著变化，题目未给教材数据时不应死记20/25/50/5。\n改正性维护是修复Bug，适应性维护是适应外部环境变化。\n第八章：软件项目管理\n考点21A：验证、确认与评审（高频辨析）\n🔴【Verification，验证】：检查工作产品是否符合上一阶段规定和规格，常概括为“是否正确地构造产品”。评审、检查、静态分析不要求运行程序，也属于质量保证手段。\n🔴【Validation，确认】：检查最终系统是否满足用户真实需要和预期用途，常概括为“是否构造了正确的产品”。验收测试是重要确认活动。\n⚫️【坑点】：软件测试通常需要运行被测程序，静态评审不运行程序；二者都能发现缺陷，不能把“测试”与“评审”混为一种方法。\n考点21B：UML常用图（岗位考试高频）\n🔴【用例图】：描述参与者与系统功能需求的关系，常用于需求分析；参与者是角色，不一定等同某个具体人。\n🔴【类图】：描述类、属性、操作及关联、聚合、组合、泛化等静态关系。\n🔴【顺序图】：按时间顺序描述对象之间的消息交互；【活动图】描述业务流程、控制流和并发分支；【状态机图】描述对象状态及事件触发的迁移。\n⚫️【坑点】：数据流图DFD是结构化分析工具，不是UML图；程序流程图描述算法控制流，也不等同于UML活动图。\n考点22：可行性研究\n🔴【目的】：用最小的代价在尽可能短的时间内确定问题是否能够解决。\n🔴【四种可行性】：\n经济可行性：成本-效益分析。\n技术可行性：从技术角度研究实现系统的可行性（对系统所要求的功能、性能及限制条件进行分析）。\n操作可行性：系统的运行方式在用户组织中是否可行。\n法律可行性：是否触犯法律或有侵权行为。\n考点23：软件质量与文档\n🔴【软件文档的作用】：不仅是开发各阶段的依据，而且影响软件的可理解性。\n🔴【软件配置管理】：\n“检出（Check-out）”和“检入（Check-in）”用于受控获取、提交配置项版本，可辅助实现存取控制、版本管理和并行修改协调；现代分布式版本控制并不一定采用独占检出模式。\n🔥 本章高频简答题汇总\n1. 什么是软件危机？主要表现有哪些？\n🔵【踩分点】：软件危机是在软件开发和维护中遇到的一系列问题。主要表现：进度滞后、成本超支、质量不可控、维护困难、文档缺乏。\n2. 简述软件生命周期的三大时期和主要阶段。\n🔵【踩分点】：\n软件定义期：问题定义、可行性研究、需求分析。\n软件开发期：概要设计、详细设计、编码、测试。\n软件运行期：维护（花费最多、时间最长）。\n3. 比较瀑布模型和原型模型。\n🔵【踩分点】：\n瀑布：线性顺序、需求明确时适用、文档驱动、变更困难。\n原型：边看边改、需求模糊时适用、快速构建、容易导致结构混乱。\n4. 简述螺旋模型的核心特点。\n🔵【踩分点】：螺旋模型 =瀑布模型 + 原型模型 + 风险分析。每轮迭代都包含风险分析是其独有特征，适合大型高风险项目。\n5. 区分功能需求、非功能需求和约束需求。\n🔵【踩分点】：\n功能需求：系统必须做什么（具体功能）。\n非功能需求：系统做得好不好（性能、安全、可靠性等）。\n约束需求：开发的外部限制条件（必须使用XX语言/平台）。\n6. 简述黑盒测试和白盒测试的区别。\n🔵【踩分点】：\n黑盒测试：不看内部代码，只测输入输出（功能测试）。方法：等价类划分、边界值分析。\n白盒测试：看内部逻辑结构（结构测试）。方法：语句覆盖、判定覆盖、条件覆盖、路径覆盖。\n7. 简述软件测试的四个阶段及其任务。\n🔵【踩分点】：\n单元测试：测试每个模块内部。\n集成测试：测试模块之间的接口。\n系统测试：测试整个系统。\n验收测试：用户确认是否满足需求（Alpha = 开发环境，Beta = 真实环境）。\n8. 简述软件维护的四种类型。\n🔵【踩分点】：\n改正性维护：修复已发现缺陷。\n适应性维护：适应平台、法规、接口等环境变化。\n完善性维护：扩充功能、改善性能或可用性。\n预防性维护：改善内部质量，降低未来故障和修改风险。\n口诀速记\n“软件由程序数据文档成，逻辑产品修改会退化；软件危机滞后超支质量弱，工程三要素方法工具过程；瀑布阶段需求稳，原型澄清需求，螺旋核心风险析，敏捷迭代反馈快；模块高内聚低耦合；黑盒看功能，白盒看结构；测试单元、集成、系统、验收；维护改正、适应、完善、预防。”\n\n【表格1】\n\n时期（🔴） | 阶段（🔵） | 主要产出/任务（⚫️）\n软件定义期 | 问题定义 | 明确“要解决什么问题”\n | 可行性研究 | 确定问题是否有可行的解法，产生可行性分析报告\n | 需求分析 | 确定系统“必须做什么”，产生需求规格说明书\n软件开发期 | 概要设计（总体设计） | 确定软件体系结构、模块划分\n | 详细设计 | 确定每个模块的算法和数据结构\n | 编码 | 编写程序代码\n | 测试 | 通过执行和检查发现缺陷；定位并修正缺陷属于调试/修改活动\n软件运行期 | 维护 | 花费最多、持续时间最长的阶段\n\n【表格2】\n\n模型（🔴） | 核心机制（🔵） | 最大优点（⚫️） | 最大缺点（⚫️） | 适用场景\n瀑布 | 线性顺序、阶段化 | 易于管理和审查 | 需求变更极难 | 需求明确稳定\n原型 | 边看边改 | 解决需求模糊 | 易导致结构混乱 | 需求不明确\n螺旋 | 瀑布+原型+风险分析 | 强调风险规避 | 依赖风险评估经验 | 大型高风险\n敏捷 | 拥抱变化、快速迭代 | 响应变化快 | 缺乏规范文档 | 需求快速变化\n增量 | 分批次交付 | 尽早拿到核心功能 | 要求模块化好 | 大型项目分步上线\n"},{"name":"信息安全","text":"# 📚 信息安全\n\n使用说明：🔴红色 = 核心考点与判断改错点；🔵蓝色 = 简答题得分词、技术流程与防护措施；⚫️黑色 = 适用条件、解释、案例和法律口径。法律部分按 2026 年 7 月现行公开规范整理，考试若指定旧版法规，应按题干时间作答。\n\n第一章：信息安全目标与风险管理\n\n考点1：安全目标\n\n🔴【CIA 三要素】：保密性（Confidentiality）、完整性（Integrity）、可用性（Availability）是最通用的三项核心目标。\n\n🔵保密性：信息只向获得授权的主体披露。\n\n🔵完整性：防止信息被未经授权地修改或破坏，并能发现异常变更。\n\n🔵可用性：授权主体在需要时能够访问和使用信息及系统。\n\n🔴【扩展目标】：真实性、可控性、可追溯/可审计性、不可否认性等可按不同标准加入，但不是所有教材都把它们和 CIA 并列为同一固定“五目标”。\n\n⚫️【概念区分】：不可否认性强调参与者不能否认已实施的发送、签署等行为；可审计性强调行为可记录、追踪和审查，二者相关但不是同义词。\n\n考点2：威胁、脆弱性与风险\n\n🔴【基本关系】：资产具有价值；威胁可能利用脆弱性造成影响；风险通常综合考虑发生可能性与后果。漏洞本身不等于一次已经发生的攻击。\n\n🔵【风险处置】：规避、降低/缓解、转移、接受。安全措施应覆盖预防、检测、响应和恢复，不能只依赖单一产品。\n\n🔴【最小权限】：用户、程序和服务只获得完成任务所需的最少权限；【纵深防御】：在身份、终端、网络、应用、数据等多层部署相互补充的控制。\n\n第二章：恶意代码与社会工程\n\n考点3：病毒、蠕虫与木马\n\n🔴【计算机病毒】：通常指编制或插入计算机程序中，破坏功能或数据、影响使用并能自我复制的一组指令或程序代码。病毒一般依附于宿主文件、引导区或文档宏等传播。\n\n🔴【常见特征】：传染/复制、寄生、潜伏、隐蔽、可触发和破坏等是教材常见归纳，但“固定七大特征”并非所有标准的唯一分类，选择题要结合题干来源。\n\n🔴【蠕虫】：可独立运行并利用网络或系统漏洞自我传播，通常不需要寄生传统宿主程序。\n\n🔴【特洛伊木马】：伪装为正常程序或功能诱导用户执行，常用于窃密、远控或下载其他恶意代码；其定义重点不是自我复制。\n\n🔴【勒索软件】：通过加密文件、锁定系统或窃取数据进行勒索；它是一种攻击目的/恶意软件类型，可能借助木马、漏洞或蠕虫能力传播，不能把所有勒索软件都归为蠕虫。\n\n🔴【逻辑炸弹】：隐藏在程序中，在特定时间或条件满足时触发恶意操作；它不同于用大量流量使服务不可用的 DoS/DDoS。\n\n🔴【宏病毒】：利用 Office 等应用的宏机制传播。现代 Office 格式中，含宏文档常见 `.docm/.xlsm`，旧格式也可能含宏；不能只背 `.doc/.xls/.dot`。\n\n考点4：传播与防护\n\n🔵【常见入口】：钓鱼邮件和链接、恶意附件、盗版或被篡改软件、漏洞利用、弱口令、移动介质、供应链与远程服务。\n\n⚫️【设备表述】：显示器本身通常不存储并执行恶意代码；但扫描仪、打印机等现代设备可能接入网络、使用固件或配套软件，相关驱动、扫描文件或服务也可能存在安全风险。因此“使用扫描仪绝对不会感染”过于绝对。\n\n🔵【防护清单】：及时修补系统和软件；从可信来源安装软件；启用终端防护和防火墙；对附件、宏和链接保持警惕；使用多因素认证；重要数据按 3-2-1 思路备份，并保留离线或不可变副本；定期验证恢复能力。\n\n⚫️【杀毒局限】：安全软件可检测和阻断大量已知及部分未知威胁，但存在误报、漏报和更新滞后，不能承诺查杀所有恶意代码。\n\n第三章：身份、访问与网络安全\n\n考点5：认证、授权与审计\n\n🔴【认证 Authentication】：确认“你是谁”；【授权 Authorization】：确定“你能做什么”；【审计 Accounting/Auditing】：记录“你做了什么”。三者不能混淆。\n\n🔴【认证因素】：所知道的（密码）、所持有的（令牌/手机/安全密钥）、所具有的（指纹/人脸）。多因素认证要求来自不同因素类别，两个密码不算真正的双因素。\n\n🔵【密码安全】：使用长且唯一的口令；不同站点不复用；借助可信密码管理器；服务端采用带盐的专用口令哈希算法存储，不应明文保存。\n\n考点6：防火墙与入侵检测\n\n🔴【防火墙】：依据安全策略控制不同网络区域或主机之间的通信，可实现包过滤、状态检测、应用层代理等功能。\n\n🔴【局限】：防火墙不能保证阻断所有攻击；对绕过防火墙的路径、合法账号滥用、允许流量中的攻击和加密流量存在可见性限制。\n\n⚫️【绝对化陷阱】：现代下一代防火墙可集成入侵防御、恶意代码检测等能力，路由器也可集成访问控制；因此“防火墙绝对不能防病毒”“防火墙绝对不是路由设备”都不严谨。设备名称不如实际功能和部署策略重要。\n\n🔴【IDS 与 IPS】：IDS 侧重发现、告警；IPS 通常串联部署并可实时阻断。误报是把正常行为判为攻击，漏报是未发现真实攻击。\n\n考点7：常见网络攻击\n\n🔴【网络钓鱼】：冒充可信主体诱骗用户交出凭据、付款或执行恶意程序；鱼叉式钓鱼面向特定个人或组织。\n\n🔴【DoS/DDoS】：消耗带宽、连接或计算资源，使服务对正常用户不可用；DDoS 使用多个分布式来源。邮件炸弹可视为资源滥用方式之一，但逻辑炸弹不是 DoS 的同义词。\n\n🔴【中间人攻击】：攻击者介入通信并窃听或篡改数据；正确验证证书并使用 TLS 可降低风险。\n\n🔴【SQL 注入】：把恶意输入拼入 SQL 语句；核心防护是参数化查询/预编译、输入校验与最小数据库权限，不能只靠前端过滤。\n\n🔴【XSS】：恶意脚本在受害者浏览器执行；核心防护包括按输出上下文编码、内容安全策略和安全 Cookie 等。\n\n第四章：密码学、哈希与数字签名\n\n考点8：对称与非对称密码\n\n🔴【对称加密】：加密和解密使用同一密钥或可相互推导的共享密钥，速度快，适合大量数据；难点是密钥安全分发与管理。常见算法有 AES。\n\n🔴【非对称加密】：使用公钥和私钥对，便于密钥分发和身份认证，但计算开销较大。常见体系有 RSA、ECC。\n\n🔵【混合加密】：通常用非对称机制协商或保护会话密钥，再用对称算法加密大量通信数据。HTTPS/TLS 的具体流程随协议版本和密码套件变化，不能简化成唯一固定算法。\n\n考点9：哈希、签名与证书\n\n🔴【密码散列/哈希】：把任意长度数据映射为固定长度摘要，具有单向性和抗碰撞等目标；哈希不是可逆加密。\n\n🔴【数字签名基本流程】：发送者用私钥相关的签名算法对消息摘要签名，接收者用相应公钥验证。\n\n🔵【签名提供】：来源认证、完整性校验和一定条件下的不可否认性；数字签名本身不保证消息保密，也不防止病毒入侵。\n\n🔴【数字证书】：由可信 CA 等签发，把主体身份与公钥等信息绑定；验证证书时还要检查有效期、域名/用途、签发链及吊销状态。\n\n⚫️【加密与签名方向】：为接收者保密常使用接收者公钥加密、接收者私钥解密；签名使用签名者私钥生成、签名者公钥验证。二者目标不同。\n\n第五章：数据、个人信息与法律规范\n\n考点10：数据与个人信息保护\n\n🔴【数据全生命周期】：收集、存储、使用、加工、传输、提供、公开、删除等环节都需落实安全与合规要求。\n\n🔴【个人信息】：以电子或其他方式记录的、与已识别或可识别自然人有关的各种信息，不包括匿名化处理后的信息。\n\n🔵【个人信息处理原则】：合法、正当、必要和诚信；目的明确、合理并与处理目的直接相关；采取对个人权益影响最小的方式；公开透明；保证质量；采取安全保护措施。\n\n⚫️【同意不是唯一基础】：取得个人同意是重要处理依据，但《个人信息保护法》还规定履行合同、履行法定职责等其他法定情形；不能写成“任何处理都必须一律同意”。处理敏感个人信息通常要求特定目的、充分必要、严格保护，并依法取得单独同意等。\n\n考点11：现行法律框架与考试边界\n\n🔴【高频法律】：\n\n《中华人民共和国网络安全法》是网络安全领域基础性法律；2025 年修正文本自 2026 年 1 月 1 日起施行。\n\n《中华人民共和国数据安全法》规范数据处理活动，建立数据分类分级保护等制度。\n\n《中华人民共和国个人信息保护法》保护自然人个人信息权益并规范个人信息处理活动。\n\n《中华人民共和国著作权法》《计算机软件保护条例》保护计算机软件著作权；保护的是符合法律条件的表达，不是把思想、算法或功能概念一概垄断。\n\n🔴【“5000/500”必须写全条件】：两高关于利用信息网络实施诽谤等刑事案件的司法解释中，对“利用信息网络诽谤他人”的“情节严重”列有数量标准：同一诽谤信息实际被点击、浏览 5000 次以上，或者被转发 500 次以上。它不是“所有网络谣言达到次数就自动构成犯罪”的通用公式，还要满足捏造事实诽谤他人、主观认识及刑法规定等构成条件，并结合案件事实认定。\n\n⚫️【时效提醒】：法律法规可能修订；答题时先看题干给出的法规名称、年份和行为条件。仅凭“违法/合法”标签，不分析主体、行为、主观状态、后果和适用条款，通常不够严谨。\n\n🔵【网络文明与职业伦理】：尊重知识产权和个人隐私；不越权访问；不传播违法有害信息；不制作、传播恶意代码；发现漏洞应按授权范围测试并负责任披露。\n\n口诀速记\n\n“CIA：保密、完整、可用；认证问是谁，授权问能做什么，审计记录做过什么；病毒多寄生，蠕虫可自传，木马靠伪装，勒索不一定是蠕虫；防火墙按策略控流量，但不能包治百病；哈希不可逆，加密保机密，签名验来源和完整；私钥签、公钥验，接收者公钥加、私钥解；法律次数有前提，个人信息处理看合法基础。”\n"}];
    const courseIcon = "📖";
    const colorMode = false;
    const pageKind = "lecture";
    const recallToggle = document.getElementById("recall-toggle");
    const directory = document.getElementById("directory");
    const courses = document.getElementById("courses");
    const courseEmpty = document.getElementById("course-empty");
    const courseStatus = document.getElementById("course-status");
    const courseSearch = document.getElementById("course-search");
    const courseSearchClear = document.getElementById("course-search-clear");
    const study = document.getElementById("study");
    const content = document.getElementById("content");
    const search = document.getElementById("search");
    const searchClear = document.getElementById("search-clear");
    const searchStatus = document.getElementById("search-status");
    const chapterNav = document.getElementById("chapter-nav");
    const chapterLinks = document.getElementById("chapter-links");
    const navCollapse = document.getElementById("nav-collapse");
    const mobileNavToggle = document.getElementById("mobile-nav-toggle");
    const navMask = document.getElementById("nav-mask");
    const studyToolbar = document.querySelector(".study-toolbar");
    const siteHeader = document.querySelector(".site-header");
    const mobileMedia = window.matchMedia("(max-width: 700px)");
    let currentCourse = null;
    let activeObserver = null;
    let collapsedBeforeSearch = null;
    let searchTimer = null;
    let mobileNavReturnFocus = null;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[char]));
    }

    function syncRecallTargets() {
      const active = study.classList.contains("recall-mode");
      content.querySelectorAll(".red, .blue, .black").forEach((item) => {
        item.classList.remove("recall-revealed");
        if (active) {
          item.setAttribute("role", "button");
          item.setAttribute("tabindex", "0");
          item.setAttribute("aria-label", "显示这条笔记");
        } else {
          item.removeAttribute("role");
          item.removeAttribute("tabindex");
          item.removeAttribute("aria-label");
        }
      });
    }

    function revealRecallItem(item) {
      if (!study.classList.contains("recall-mode") || !item) return;
      item.classList.add("recall-revealed");
      item.removeAttribute("role");
      item.removeAttribute("tabindex");
      item.removeAttribute("aria-label");
    }

    function formatInline(value) {
      const source = String(value || "");
      let output = escapeHtml(source)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      if (colorMode && source.startsWith("🔴")) output = `<span class="red">${output}</span>`;
      else if (colorMode && source.startsWith("🔵")) output = `<span class="blue">${output}</span>`;
      else if (colorMode && source.startsWith("⚫")) output = `<span class="black">${output}</span>`;
      return output;
    }

    function tableCells(line) {
      let trimmed = line.trim();
      if (trimmed.startsWith("|")) trimmed = trimmed.slice(1);
      if (trimmed.endsWith("|")) trimmed = trimmed.slice(0, -1);
      const cells = [];
      let cell = "";
      for (let index = 0; index < trimmed.length; index += 1) {
        if (trimmed[index] === "\\" && trimmed[index + 1] === "|") {
          cell += "|";
          index += 1;
        } else if (trimmed[index] === "|") {
          cells.push(cell.trim());
          cell = "";
        } else {
          cell += trimmed[index];
        }
      }
      cells.push(cell.trim());
      return cells;
    }

    function isSeparatorRow(cells) {
      return cells.length > 0 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
    }

    function isTableStart(lines, index) {
      if (index + 1 >= lines.length || !lines[index].includes("|") || !lines[index + 1].includes("|")) return false;
      const first = tableCells(lines[index]);
      const second = tableCells(lines[index + 1]);
      return first.length >= 2 && second.length === first.length;
    }

    function renderTable(rows) {
      const parsed = rows.map(tableCells);
      const bodyRows = isSeparatorRow(parsed[1] || []) ? parsed.slice(2) : parsed.slice(1);
      const header = parsed[0];
      return `<div class="table-wrap" tabindex="0" aria-label="可横向滚动的表格"><table><thead><tr>${header.map((cell) => `<th scope="col">${formatInline(cell)}</th>`).join("")}</tr></thead><tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${formatInline(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div><p class="table-hint">↔ 左右滑动查看完整表格</p>`;
    }

    function renderMarkdown(markdown) {
      const lines = markdown.split(/\r?\n/);
      const output = [
        ...(colorMode ? ['<p class="recall-hint">先根据标题口述答案，再点击被遮住的内容逐条核对。</p>'] : []),
        "<div class=\"preface\">",
      ];
      let index = 0;
      let chapterOpen = false;
      let prefaceOpen = true;
      let listType = null;

      const closeList = () => {
        if (!listType) return;
        output.push(`</${listType}>`);
        listType = null;
      };
      const closePreface = () => {
        if (!prefaceOpen) return;
        closeList();
        output.push("</div>");
        prefaceOpen = false;
      };
      const closeChapter = () => {
        closeList();
        if (!chapterOpen) return;
        output.push("</div></section>");
        chapterOpen = false;
      };

      while (index < lines.length) {
        const trimmed = lines[index].trim();
        if (!trimmed) {
          closeList();
          index += 1;
          continue;
        }
        if (trimmed.startsWith("使用说明")) {
          index += 1;
          continue;
        }
        if (trimmed.startsWith("```")) {
          closeList();
          const language = trimmed.slice(3).trim().replace(/[^a-zA-Z0-9_-]/g, "");
          const code = [];
          index += 1;
          while (index < lines.length && !lines[index].trim().startsWith("```")) {
            code.push(lines[index]);
            index += 1;
          }
          if (index < lines.length) index += 1;
          output.push(`<pre><code${language ? ` class="language-${language}"` : ""}>${escapeHtml(code.join("\n"))}</code></pre>`);
          continue;
        }
        if (isTableStart(lines, index)) {
          closeList();
          const rows = [lines[index]];
          const columnCount = tableCells(lines[index]).length;
          index += 1;
          while (index < lines.length && lines[index].trim() && lines[index].includes("|") && tableCells(lines[index]).length === columnCount) {
            rows.push(lines[index]);
            index += 1;
          }
          output.push(renderTable(rows));
          continue;
        }

        const imageMatch = trimmed.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if (imageMatch) {
          closeList();
          const caption = imageMatch[1].trim();
          const rawSource = imageMatch[2].trim();
          const normalizedSource = rawSource.replace(/^\.\.\/media\//, "media/");
          if (/^media\/[a-zA-Z0-9_./-]+\.svg$/i.test(normalizedSource)) {
            output.push(`<figure class="note-figure"><img src="${escapeHtml(normalizedSource)}" alt="${escapeHtml(caption)}" loading="lazy" decoding="async">${caption ? `<figcaption>${formatInline(caption)}</figcaption>` : ""}</figure>`);
          }
          index += 1;
          continue;
        }

        const h1 = trimmed.match(/^#\s+(.+)$/);
        const markdownH2 = trimmed.match(/^##\s+(.+)$/);
        const markdownH3 = trimmed.match(/^###\s+(.+)$/);
        const plainChapter = trimmed.match(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?.*$/);
        const plainPoint = trimmed.match(/^(?:考点|专题|模块)\s*\d+[：:]?.*$/);

        if (markdownH2 || plainChapter) {
          closeChapter();
          closePreface();
          const title = markdownH2 ? markdownH2[1] : plainChapter[0];
          output.push(`<section class="chapter-section"><h2 class="chapter-heading"><button class="chapter-toggle" type="button" aria-expanded="true"><span class="chapter-title">${formatInline(title)}</span><span class="chapter-chevron" aria-hidden="true">▾</span></button></h2><div class="chapter-body">`);
          chapterOpen = true;
        } else if (h1) {
          closeList();
          output.push(`<h1>${formatInline(h1[1])}</h1>`);
        } else if (markdownH3 || plainPoint) {
          closeList();
          const title = markdownH3 ? markdownH3[1] : plainPoint[0];
          output.push(`<h3 class="point">${formatInline(title)}</h3>`);
        } else if (/^>\s?/.test(trimmed)) {
          closeList();
          output.push(`<blockquote>${formatInline(trimmed.replace(/^>\s?/, ""))}</blockquote>`);
        } else if (/^[-*]\s+/.test(trimmed) || /^\d+[.)]\s+/.test(trimmed)) {
          const nextListType = /^\d+[.)]\s+/.test(trimmed) ? "ol" : "ul";
          if (listType !== nextListType) {
            closeList();
            output.push(`<${nextListType}>`);
            listType = nextListType;
          }
          output.push(`<li>${formatInline(trimmed.replace(/^(?:[-*]|\d+[.)])\s+/, ""))}</li>`);
        } else {
          closeList();
          output.push(`<p>${formatInline(trimmed)}</p>`);
        }
        index += 1;
      }
      closePreface();
      closeChapter();
      content.innerHTML = output.join("");
      bindChapters();
    }

    function cleanChapterLabel(label) {
      const cleaned = label.replace(/^第[一二三四五六七八九十百\d]+(?:章|节|篇|部分)[：:]?\s*/, "").trim();
      return cleaned || label;
    }

    function bindChapters() {
      if (activeObserver) activeObserver.disconnect();
      chapterLinks.innerHTML = "";
      const sections = [...content.querySelectorAll(".chapter-section")];
      sections.forEach((section, index) => {
        section.id = `chapter-${index + 1}`;
        const toggle = section.querySelector(".chapter-toggle");
        const title = section.querySelector(".chapter-title").textContent.trim();
        toggle.setAttribute("aria-controls", `${section.id}-body`);
        section.querySelector(".chapter-body").id = `${section.id}-body`;
        toggle.addEventListener("click", () => {
          const collapsed = section.classList.toggle("collapsed");
          toggle.setAttribute("aria-expanded", String(!collapsed));
        });

        const link = document.createElement("button");
        link.type = "button";
        link.className = "chapter-link";
        link.textContent = cleanChapterLabel(title);
        link.addEventListener("click", () => {
          section.classList.remove("collapsed");
          toggle.setAttribute("aria-expanded", "true");
          section.scrollIntoView({behavior: "smooth", block: "start"});
          if (mobileMedia.matches) {
            closeMobileNav({restoreFocus: false});
            toggle.focus({preventScroll: true});
          }
        });
        chapterLinks.appendChild(link);
      });

      chapterNav.classList.toggle("hidden", sections.length === 0);
      mobileNavToggle.classList.toggle("hidden", sections.length === 0);
      if (!sections.length) return;
      activeObserver = new IntersectionObserver((entries) => {
        const visible = entries.filter((entry) => entry.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
        if (!visible) return;
        const index = sections.indexOf(visible.target);
        chapterLinks.querySelectorAll(".chapter-link").forEach((link, linkIndex) => {
          const active = linkIndex === index;
          link.classList.toggle("active", active);
          if (active) link.setAttribute("aria-current", "location");
          else link.removeAttribute("aria-current");
        });
      }, {rootMargin: "-135px 0px -62% 0px", threshold: 0});
      sections.forEach((section) => activeObserver.observe(section));
    }

    function openCourse(course) {
      currentCourse = course;
      collapsedBeforeSearch = null;
      renderMarkdown(course.text);
      syncRecallTargets();
      try {
        localStorage.setItem("shaoyang-last-learning", JSON.stringify({course: course.name, module: pageKind, savedAt: new Date().toISOString()}));
      } catch {}
      directory.classList.add("hidden");
      study.classList.remove("hidden");
      search.value = "";
      searchClear.classList.add("hidden");
      searchStatus.textContent = "";
      window.scrollTo({top: 0, behavior: "auto"});
      content.focus({preventScroll: true});
    }

    function showDirectory() {
      closeMobileNav();
      currentCourse = null;
      collapsedBeforeSearch = null;
      study.classList.add("hidden");
      directory.classList.remove("hidden");
      search.value = "";
      searchStatus.textContent = "";
      window.scrollTo({top: 0, behavior: "auto"});
      const title = document.getElementById("directory-title");
      title.setAttribute("tabindex", "-1");
      title.focus({preventScroll: true});
    }

    function courseHash(course) {
      return `#course=${encodeURIComponent(course.name)}`;
    }

    function navigateToCourse(course) {
      const target = courseHash(course);
      if (location.hash === target) {
        openCourse(course);
